<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agri Water Glossary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a56db;
      --bg: #f3f4f6;
      --card: #fff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --radius: 10px;
    }
    body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP','Meiryo',sans-serif; font-size: 16px; line-height: 1.6; color: var(--text); background: var(--bg); }

    /* Sticky header wrapper */
    .site-header { position: sticky; top: 0; z-index: 100; }

    /* Header */
    header { background: var(--primary); color: white; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .header-inner { max-width: 720px; margin: 0 auto; }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    .lang-bar { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .lang-btn { padding: 6px 18px; border-radius: 999px; border: 2px solid rgba(255,255,255,0.5); background: transparent; color: white; font-size: 0.9rem; font-weight: 600; cursor: pointer; min-height: 44px; transition: background 0.2s; }
    .lang-btn.active { background: white; color: var(--primary); border-color: white; }
    .lang-btn:hover:not(.active) { background: rgba(255,255,255,0.15); }

    /* Controls bar */
    .controls-bar { background: white; border-bottom: 1px solid var(--border); padding: 8px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .controls-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; align-items: center; }
    .filter-group { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .filter-all-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: white; font-size: 0.9rem; cursor: pointer; min-height: 44px; white-space: nowrap; font-weight: 600; transition: all 0.15s; }
    .filter-all-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .filter-all-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
    #categorySelect { display: inline-block; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: white; font-size: 0.9rem; cursor: pointer; min-height: 44px; min-width: 120px; color: var(--text); }
    #categorySelect:focus { outline: 2px solid var(--primary); outline-offset: 0; }
    .search-box { position: relative; flex: 1; min-width: 0; }
    .search-box input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; min-height: 44px; background: white; }
    .search-box input:focus { border-color: var(--primary); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }

    /* Main */
    main { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; }

    /* Result count */
    .result-count { font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; }

    /* Term list */
    .term-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: white; }

    /* Term item */
    .term-item { border-bottom: 1px solid var(--border); }
    .term-item:last-child { border-bottom: none; }

    /* Term name button */
    .term-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 16px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      min-height: 44px;
      gap: 12px;
      transition: background 0.15s;
    }
    .term-toggle:hover { background: #f9fafb; }
    .term-toggle.open { background: #eff6ff; color: var(--primary); }
    .term-toggle-text { flex: 1; display: flex; flex-direction: column; align-items: flex-start; }
    .term-reading { font-size: 0.8rem; font-weight: 400; color: var(--muted); margin-left: 6px; }
    .term-romaji { font-size: 1rem; color: #374151; font-weight: 500; margin-top: 2px; }
    .term-arrow { font-size: 0.75rem; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; }
    .term-toggle.open .term-arrow { transform: rotate(180deg); color: var(--primary); }

    /* Summary panel */
    .term-summary-panel { display: none; padding: 0 16px 16px; border-top: 1px solid #dbeafe; background: #f8faff; }
    .term-summary-panel.open { display: block; }
    .term-summary-text { font-size: 0.97rem; line-height: 1.75; color: #374151; padding-top: 14px; }

    /* Detail toggle button */
    .detail-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 10px 18px;
      border: 2px solid var(--primary);
      border-radius: 999px;
      background: white;
      color: var(--primary);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: background 0.15s;
    }
    .detail-toggle:hover { background: #eff6ff; }
    .detail-arrow { font-size: 0.7rem; transition: transform 0.2s; }
    .detail-toggle.open .detail-arrow { transform: rotate(180deg); }

    /* Detail panel */
    .term-detail-panel { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .term-detail-panel.open { display: block; }
    .term-detail-text { font-size: 0.95rem; line-height: 1.8; color: #374151; white-space: pre-wrap; }
    .term-detail-image { width: 100%; border-radius: 8px; margin-top: 16px; display: block; }
    .term-detail-caption { font-size: 0.82rem; color: var(--muted); text-align: center; margin-top: 6px; }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); background: white; border: 1px solid var(--border); border-radius: var(--radius); }
    .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* Images in detail panel */
    .term-images-section { margin-top: 16px; }
    .term-images-title { font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .term-image-item { margin-bottom: 16px; }
    .term-image-item:last-child { margin-bottom: 0; }
    .term-detail-caption { font-size: 14px; color: var(--muted); text-align: center; margin-top: 6px; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.1rem; }
      main { padding: 16px 12px 60px; }
      .term-toggle { padding: 13px 14px; }
      .term-summary-panel { padding: 0 14px 14px; }
    }
  </style>
</head>
<body>

<div class="site-header">
  <header>
    <div class="header-inner">
      <h1>Agri Water Glossary</h1>
      <div class="lang-bar">
        <button class="lang-btn active" onclick="setLang('ja', this)">JPN</button>
        <button class="lang-btn" onclick="setLang('en', this)">ENG</button>
        <button class="lang-btn" onclick="setLang('lang3', this)">FRE</button>
      </div>
    </div>
  </header>
  <div class="controls-bar">
    <div class="controls-inner">
      <div class="filter-group">
        <button class="filter-all-btn active" id="btn-all" onclick="setCat('all')">All</button>
        <select id="categorySelect" onchange="setCatFromSelect(this)">
          <option value="">分野を選ぶ</option>
        </select>
      </div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="search" id="search-input" placeholder="キーワードで検索..." oninput="renderTerms()" autocomplete="off">
      </div>
    </div>
  </div>
</div>

<main>
  <div class="result-count" id="result-count"></div>
  <div id="term-list-wrap"></div>
</main>

<script>
const TERMS = [{"rowNum":2,"id":"001","catCode":"CAT01","nameJa":"雨水集水","readingJa":"うすいしゅうすい","summaryJa":"降雨を地面で受け止め、農業用水として活用する技術・手法の総称です。水源へのアクセスが限られるアフリカの乾燥・半乾燥地域では重要な水確保の手段です。","detailJa":"雨水集水の主な方法：\n1. 圃場内集水（In-situ rainwater harvesting）\n　・等高線耕起：斜面に沿って等高線状に耕すことで流出を抑え、降水を圃場内に保持する\n　・ザイ（Zaï）：西アフリカの伝統技法。作付け穴を掘り、有機物と雨水を集めて乾燥地の作物生産を可能にする\n　・半月形（Half-moon）：三日月形の土手を造成し、上流から雨水を受け入れる\n\n2. 流域・面的集水（Runoff harvesting）\n　・マイクロ集水域：斜面を整形して水を農地に誘導する\n　・屋根集水：建物屋根から雨水をタンクに貯める（家庭菜園・小規模農業向け）\n　・道路・舗装面集水：道路脇に設けた貯留施設に誘導する\n\nアフリカでの活用：\nサヘル地帯（ブルキナファソ・ニジェール・マリ）ではザイや半月形技法が広く普及し、年降水量300〜500mmの地域でも食料生産を可能にしています。エチオピア高原では斜面管理と組み合わせた集水システムが多くの農村で実践されています。\n\n効果と課題：\n・低コストで導入でき、インフラ整備なしに実施できる\n・降雨量の年変動に対応するため、複数の手法の組み合わせが重要","nameEn":"Rainwater collection","summaryEn":"This is a general term for technologies and methods that capture rainfall on the ground and utilize it as agricultural water. It is an important means of water security in arid and semi-arid regions of Africa where access to water sources is limited.","detailEn":"Main methods of rainwater harvesting:\n\n1. In-situ rainwater harvesting\n   • Contour farming: Plowing along contour lines on slopes to reduce runoff and retain precipitation within the field\n   • Zaï: A traditional technique from West Africa. Planting pits are dug to collect organic matter and rainwater, enabling crop production in arid lands\n   • Half-moon: Construction of crescent-shaped embankments to capture rainwater from upstream\n\n2. Runoff harvesting\n   • Micro-catchment: Shaping slopes to direct water to agricultural land\n   • Rooftop harvesting: Collecting rainwater from building roofs into tanks (for home gardens and small-scale agriculture)\n   • Road and pavement harvesting: Directing water to storage facilities installed alongside roads\n\nApplication in Africa:\nIn the Sahel region (Burkina Faso, Niger, Mali), Zaï and half-moon techniques are widely adopted, enabling food production even in areas with annual precipitation of 300-500mm. In the Ethiopian Highlands, water harvesting systems combined with slope management are practiced in many rural villages.\n\nEffects and challenges:\n• Low-cost implementation possible without infrastructure development\n• Combination of multiple methods is important to cope with annual rainfall variability","image":"","captionJa":"","captionEn":"","published":"","name3":"Collecte des eaux pluviales","summary3":"Il s'agit du terme générique désignant les technologies et méthodes qui permettent de capturer les précipitations au niveau du sol et de les utiliser comme eau d'irrigation agricole. Dans les régions arides et semi-arides d'Afrique où l'accès aux sources d'eau est limité, c'est un moyen important de sécurisation de l'approvisionnement en eau.","detail3":"Principales méthodes de collecte des eaux pluviales :\n\n1. Collecte in-situ des eaux pluviales (In-situ rainwater harvesting)\n   • Labour en courbes de niveau : labourer en suivant les courbes de niveau le long des pentes pour limiter le ruissellement et retenir les précipitations dans les parcelles\n   • Zaï : technique traditionnelle d'Afrique de l'Ouest. Creuser des trous de plantation pour collecter la matière organique et les eaux pluviales, permettant la production agricole en zones arides\n   • Demi-lune (Half-moon) : aménagement de digues en forme de croissant pour recevoir les eaux pluviales en amont\n\n2. Collecte de bassin versant et de surface (Runoff harvesting)\n   • Micro-bassins versants : aménagement des pentes pour diriger l'eau vers les terres agricoles\n   • Collecte sur toiture : stockage des eaux pluviales des toitures de bâtiments dans des réservoirs (pour jardins familiaux et petite agriculture)\n   • Collecte sur routes et surfaces imperméabilisées : direction vers des installations de rétention aménagées en bordure de route\n\nUtilisation en Afrique :\nDans la zone sahélienne (Burkina Faso, Niger, Mali), les techniques zaï et demi-lune sont largement répandues et permettent la production alimentaire même dans des régions avec 300 à 500 mm de précipitations annuelles. Sur le plateau éthiopien, des systèmes de collecte d'eau combinés à la gestion des pentes sont pratiqués dans de nombreux villages ruraux.\n\nEffets et défis :\n• Introduction possible à faible coût, réalisable sans aménagement d'infrastructures\n• Pour faire face aux variations annuelles des précipitations, la combinaison de plusieurs méthodes est importante","caption3":"","images":[]},{"rowNum":3,"id":"002","catCode":"CAT01","nameJa":"農業用水管理","readingJa":"のうぎょうようすいかんり","summaryJa":"農業生産のために必要な水を、適切な量・質・時期に確保・配分・利用し、持続的な農業経営を支えるための技術・組織・制度の総体です。","detailJa":"農業用水管理の主要な要素：\n1. 水源管理：河川・地下水・雨水・ため池など水源の保全と持続的利用\n2. 灌漑施設管理：取水施設・用水路・配水システムの適切な運営と維持管理\n3. 水配分管理：受益農家への公平かつ効率的な水の配分\n4. 需要管理：作物の必要水量に応じた灌漑スケジュールの策定\n\n管理のレベル：\n・幹線レベル（Government/Agency）：取水・幹線水路の管理\n・支線レベル（WUA：Water User Association）：支線水路・圃場への配分\n・圃場レベル（Farmer）：圃場内の灌漑実施\n\nアフリカでの課題：\nサブサハラアフリカでは灌漑農地の多くで施設の老朽化・維持管理不足が深刻で、潜在的灌漑面積の20〜30%しか機能していないと推計されています（FAO, 2022）。水利用者組合（WUA）の組織強化と参加型管理への移行が国際支援の重要な柱となっています。","nameEn":"Agricultural water management","summaryEn":"It is the totality of technologies, organizations, and institutions that secure, distribute, and utilize water necessary for agricultural production in appropriate quantities, quality, and timing to support sustainable agricultural management.","detailEn":"Key Elements of Agricultural Water Management:\n1. Water Source Management: Conservation and sustainable utilization of water sources including rivers, groundwater, rainwater, and reservoirs\n2. Irrigation Facility Management: Proper operation and maintenance of intake facilities, irrigation canals, and distribution systems\n3. Water Distribution Management: Fair and efficient water allocation to beneficiary farmers\n4. Demand Management: Development of irrigation schedules based on crop water requirements\n\nManagement Levels:\n・Main System Level (Government/Agency): Management of intake and main canals\n・Secondary System Level (WUA: Water User Association): Distribution through secondary canals to farmlands\n・Field Level (Farmer): Implementation of irrigation within individual fields\n\nChallenges in Africa:\nIn Sub-Saharan Africa, facility deterioration and inadequate maintenance are severe problems in many irrigated agricultural areas, with estimates indicating that only 20-30% of potential irrigated area is functioning (FAO, 2022). Organizational strengthening of Water User Associations (WUAs) and transition to participatory management have become important pillars of international assistance.","image":"","captionJa":"","captionEn":"","published":"","name3":"Gestion de l'eau agricole","summary3":"Il s'agit de l'ensemble des techniques, organisations et institutions destinées à assurer, répartir et utiliser l'eau nécessaire à la production agricole en quantité, qualité et période appropriées, afin de soutenir une gestion agricole durable.","detail3":"Éléments principaux de la gestion de l'eau agricole :\n1. Gestion des ressources en eau : conservation et utilisation durable des sources d'eau telles que les rivières, eaux souterraines, eaux pluviales et étangs de retenue\n2. Gestion des installations d'irrigation : exploitation et maintenance appropriées des ouvrages de prise d'eau, canaux d'irrigation et systèmes de distribution\n3. Gestion de la répartition de l'eau : distribution équitable et efficace de l'eau aux agriculteurs bénéficiaires\n4. Gestion de la demande : élaboration de calendriers d'irrigation selon les besoins hydriques des cultures\n\nNiveaux de gestion :\n• Niveau principal (Gouvernement/Agence) : gestion des prises d'eau et canaux principaux\n• Niveau secondaire (AUE : Association d'Usagers de l'Eau) : répartition vers les canaux secondaires et parcelles\n• Niveau parcellaire (Agriculteur) : mise en œuvre de l'irrigation dans les parcelles\n\nDéfis en Afrique :\nEn Afrique subsaharienne, la plupart des terres agricoles irriguées souffrent gravement de la vétusté des installations et d'un manque de maintenance, et il est estimé que seulement 20 à 30% de la superficie potentiellement irrigable fonctionne (FAO, 2022). Le renforcement organisationnel des associations d'usagers de l'eau (AUE) et la transition vers une gestion participative constituent un pilier important du soutien international.","caption3":"","images":[]},{"rowNum":4,"id":"003","catCode":"CAT01","nameJa":"洪水利用灌漑","readingJa":"こうずいりようかんがい","summaryJa":"河川の増水・氾濫時に生じる余剰水を農地へ意図的に引き込み、灌漑用水として利用する手法です。ダムや取水施設が不要なため低コストで実施できます。","detailJa":"洪水利用灌漑の仕組みと種類：\n1. 洪水転流灌漑（Flood diversion irrigation）\n　・増水時に堰や簡易取水工で河川水を用水路に引き込み農地に導水する\n　・アフリカではエチオピア南部の spate irrigation（スペート灌漑）が代表例\n2. 氾濫灌漑（Inundation irrigation）\n　・河川が自然に氾濫した水を農地が受け取る伝統的手法\n　・ナイル川流域の歴史的灌漑農業（バシン灌漑）の起源\n\nスペート灌漑（Spate irrigation）：\nエリトリア・エチオピア・スーダン・イエメンなどの乾燥地域で発達した洪水利用灌漑の一形態。季節的な激流（Spate/Torrent）を引き込み、砂礫性扇状地農地に土壌水分を供給します。水と土砂を同時に供給するため地力維持にも寄与します。\n\n利点と限界：\n・ポンプ・電力不要で運営コストが低い\n・洪水の発生時期・水量が年ごとに変動し、作付け計画が不安定になりやすい\n・土砂・ゴミの流入による施設への負荷が大きい","nameEn":"Flood irrigation","summaryEn":"This is a method of intentionally channeling surplus water generated during river flooding and overflow into agricultural land for use as irrigation water. It can be implemented at low cost since it does not require dams or water intake facilities.","detailEn":"Mechanisms and Types of Flood-Based Irrigation:\n1. Flood diversion irrigation\n   ・During high water periods, river water is diverted into irrigation canals through weirs or simple intake structures and conveyed to agricultural land\n   ・In Africa, spate irrigation in southern Ethiopia is a representative example\n2. Inundation irrigation\n   ・A traditional method where agricultural land receives water from natural river flooding\n   ・Origin of historical irrigated agriculture in the Nile River basin (basin irrigation)\n\nSpate irrigation:\nA form of flood-based irrigation developed in arid regions such as Eritrea, Ethiopia, Sudan, and Yemen. Seasonal torrents (spate/torrent) are diverted to supply soil moisture to agricultural land on sandy-gravel alluvial fans. It contributes to maintaining soil fertility by simultaneously supplying water and sediment.\n\nAdvantages and limitations:\n・Low operating costs as it requires no pumps or electricity\n・The timing and volume of floods vary annually, making crop planning unstable\n・Heavy burden on facilities due to inflow of sediment and debris","image":"","captionJa":"","captionEn":"","published":"","name3":"Irrigation par utilisation des crues","summary3":"Il s'agit d'une méthode qui consiste à détourner intentionnellement vers les terres agricoles les eaux excédentaires générées lors des crues et débordements de rivières, afin de les utiliser comme eau d'irrigation. Cette technique peut être mise en œuvre à faible coût car elle ne nécessite ni barrages ni installations de captage d'eau.","detail3":"Mécanisme et types d'irrigation par utilisation des crues :\n1. Irrigation par dérivation des crues (Flood diversion irrigation)\n　・Captage de l'eau fluviale dans les canaux d'irrigation par des déversoirs ou des ouvrages de prise d'eau simples lors des crues pour alimenter les terres agricoles\n　・En Afrique, l'irrigation spate (spate irrigation) du sud de l'Éthiopie constitue un exemple représentatif\n2. Irrigation par inondation (Inundation irrigation)\n　・Technique traditionnelle où les terres agricoles reçoivent l'eau des crues naturelles des rivières\n　・Origine de l'agriculture irriguée historique du bassin du Nil (irrigation de bassin)\n\nIrrigation spate (Spate irrigation) :\nForme d'irrigation par utilisation des crues développée dans les régions arides comme l'Érythrée, l'Éthiopie, le Soudan et le Yémen. Elle consiste à capter les torrents saisonniers (Spate/Torrent) pour alimenter en humidité du sol les terres agricoles des cônes de déjection graveleux. Elle contribue également au maintien de la fertilité des sols en apportant simultanément eau et sédiments.\n\nAvantages et limites :\n・Coûts d'exploitation faibles, ne nécessitant ni pompes ni électricité\n・La période d'occurrence et le volume des crues varient d'une année à l'autre, rendant la planification des cultures instable\n・Charge importante sur les installations due à l'apport de sédiments et de débris","caption3":"","images":[]},{"rowNum":5,"id":"004","catCode":"CAT01","nameJa":"氾濫原灌漑","readingJa":"はんらんげんかんがい","summaryJa":"河川の定期的な氾濫によって浸水する低地（氾濫原・フラッドプレーン）を農地として利用する農業形態です。氾濫後に残留する土壌水分と堆積した肥沃な沖積土を活用します。","detailJa":"氾濫原農業の特徴：\n・河川の増水後に水が引いた氾濫原に作物を作付けする「後退型農業（Recession agriculture）」が代表的\n・土壌水分と沖積土の栄養分を活用するため、人工灌漑なしに作物が育つ\n・ダム建設前のナイル川流域ではこの方式が数千年続いた\n\nアフリカの代表的な氾濫原農業地帯：\n・ナイジェリア：ニジェール川・ベヌエ川氾濫原（後退型農業）\n・マリ：ニジェール川内陸デルタ（浮稲・牧畜）\n・ザンビア：バロツェランド（ザンベジ川氾濫原）\n・スーダン：ナイル川・ブルーナイル氾濫原\n\nダム建設の影響：\n上流のダム建設により氾濫が制御された地域では、氾濫原農業が維持できなくなるケースが多く、下流農家への影響評価と代替水源の確保が開発プロジェクトの重要課題です。\n\n近代的活用：\n一部地域では氾濫原に小規模な土手や水門を設置し、氾濫水を制御して利用する「制御型氾濫灌漑」が普及しています。","nameEn":"Floodplain irrigation","summaryEn":"This is a form of agriculture that utilizes lowlands (floodplains) that are inundated by regular river flooding as farmland. It takes advantage of the residual soil moisture after flooding and the deposited fertile alluvial soil.","detailEn":"Characteristics of Floodplain Agriculture:\n・\"Recession agriculture\" is typical, where crops are planted on floodplains after river waters recede following floods\n・Crops can grow without artificial irrigation by utilizing soil moisture and nutrients from alluvial soil\n・This method continued for thousands of years in the Nile River basin before dam construction\n\nRepresentative Floodplain Agricultural Areas in Africa:\n・Nigeria: Niger River and Benue River floodplains (recession agriculture)\n・Mali: Niger River inland delta (floating rice and pastoralism)\n・Zambia: Barotseland (Zambezi River floodplain)\n・Sudan: Nile River and Blue Nile floodplains\n\nImpact of Dam Construction:\nIn areas where flooding has been controlled by upstream dam construction, floodplain agriculture often becomes unsustainable, making impact assessment on downstream farmers and securing alternative water sources important issues for development projects.\n\nModern Applications:\nIn some regions, \"controlled flood irrigation\" has become widespread, where small-scale embankments and sluice gates are installed on floodplains to control and utilize floodwaters.","image":"","captionJa":"","captionEn":"","published":"","name3":"irrigation des plaines d'inondation","summary3":"Il s'agit d'une forme d'agriculture qui utilise comme terres agricoles les terres basses (plaines d'inondation - floodplains) inondées par les crues périodiques des rivières. Elle exploite l'humidité résiduelle du sol après les inondations et les sols alluviaux fertiles qui se sont déposés.","detail3":"Caractéristiques de l'agriculture de plaine d'inondation :\n・L'« agriculture de décrue (Recession agriculture) » est représentative, consistant à cultiver des cultures sur les plaines d'inondation après le retrait des eaux suite aux crues fluviales\n・Les cultures poussent sans irrigation artificielle en tirant parti de l'humidité du sol et des nutriments des sols alluviaux\n・Cette méthode a perduré pendant des milliers d'années dans le bassin du Nil avant la construction de barrages\n\nZones représentatives d'agriculture de plaine d'inondation en Afrique :\n・Nigeria : plaines d'inondation du fleuve Niger et de la rivière Bénoué (agriculture de décrue)\n・Mali : delta intérieur du fleuve Niger (riz flottant, élevage)\n・Zambie : Barotseland (plaine d'inondation du fleuve Zambèze)\n・Soudan : plaines d'inondation du Nil et du Nil Bleu\n\nImpact de la construction de barrages :\nDans les régions où les inondations sont contrôlées par la construction de barrages en amont, l'agriculture de plaine d'inondation ne peut souvent plus être maintenue, et l'évaluation de l'impact sur les agriculteurs en aval ainsi que la sécurisation de sources d'eau alternatives constituent des enjeux importants des projets de développement.\n\nUtilisation moderne :\nDans certaines régions, l'« irrigation par inondation contrôlée » se répand, consistant à installer de petites digues et des écluses dans les plaines d'inondation pour contrôler et utiliser les eaux d'inondation.","caption3":"","images":[]},{"rowNum":6,"id":"005","catCode":"CAT01","nameJa":"表面灌漑","readingJa":"ひょうめんかんがい","summaryJa":"水を地表面に沿って流し、重力によって農地全体に灌漑する最も古くからある灌漑方式です。施設コストが低い反面、水の均一分布が難しく水利用効率は低くなりやすいです。","detailJa":"表面灌漑の種類：\n1. 畦畔灌漑（Border irrigation）：畦で仕切ったストリップ状の圃場に沿って流す\n2. 畝間灌漑（Furrow irrigation）：作物の畝の間の溝に水を流す（野菜・トウモロコシ等）\n3. 氾濫灌漑（Basin irrigation）：堤で囲んだ圃場全体に水を溜める（水稲・樹木）\n\n水利用効率の目安：\n・表面灌漑の圃場効率：50〜70%（スプリンクラー：70〜80%、点滴：85〜95%）\n・ただし流出水や浸透水が下流で回収・再利用できる場合、システム効率は向上する\n\nアフリカでの普及状況：\nアフリカの灌漑農地の約80〜85%で表面灌漑が採用されており、最も一般的な灌漑方法です。低コスト・低技術で導入できるため小規模農家に適していますが、水の損失が大きく塩類集積のリスクもあります。\n\n改善策：\n・レーザーレベリング（圃場の精密整地）により均一性と効率が大幅に向上する\n・間断灌漑との組み合わせで節水効果が得られる","nameEn":"Surface irrigation","summaryEn":"This is the oldest irrigation method that flows water along the ground surface and irrigates the entire farmland by gravity. While facility costs are low, it is difficult to achieve uniform water distribution and water use efficiency tends to be low.","detailEn":"Types of surface irrigation:\n1. Border irrigation: Water flows along strip-shaped fields separated by ridges\n2. Furrow irrigation: Water flows through furrows between crop rows (vegetables, corn, etc.)\n3. Basin irrigation: Water is ponded over entire fields surrounded by bunds (rice, trees)\n\nWater use efficiency guidelines:\n・Field efficiency of surface irrigation: 50-70% (Sprinkler: 70-80%, Drip: 85-95%)\n・However, system efficiency improves when runoff and deep percolation can be recovered and reused downstream\n\nAdoption status in Africa:\nSurface irrigation is adopted on approximately 80-85% of irrigated farmland in Africa, making it the most common irrigation method. It is suitable for smallholder farmers due to its low cost and low technology requirements, but it has high water losses and risks of salt accumulation.\n\nImprovement measures:\n・Laser leveling (precision land leveling) significantly improves uniformity and efficiency\n・Combination with intermittent irrigation achieves water-saving effects","image":"","captionJa":"","captionEn":"","published":"","name3":"Irrigation de surface","summary3":"Il s'agit du système d'irrigation le plus ancien qui consiste à faire couler l'eau le long de la surface du sol et à irriguer l'ensemble des terres agricoles par gravité. Bien que les coûts d'installation soient faibles, la distribution uniforme de l'eau est difficile et l'efficacité d'utilisation de l'eau tend à être faible.","detail3":"Types d'irrigation de surface :\n1. Irrigation par planches (Border irrigation) : l'eau s'écoule le long de parcelles en bandes délimitées par des diguettes\n2. Irrigation par sillons (Furrow irrigation) : l'eau s'écoule dans les sillons entre les rangs de cultures (légumes, maïs, etc.)\n3. Irrigation par submersion (Basin irrigation) : l'eau est retenue sur l'ensemble de la parcelle entourée de diguettes (riz irrigué, arbres)\n\nIndicateurs d'efficience de l'utilisation de l'eau :\n• Efficience parcellaire de l'irrigation de surface : 50-70% (aspersion : 70-80%, goutte-à-goutte : 85-95%)\n• Cependant, lorsque les eaux de ruissellement ou d'infiltration peuvent être récupérées et réutilisées en aval, l'efficience du système s'améliore\n\nÉtat de diffusion en Afrique :\nL'irrigation de surface est adoptée sur environ 80-85% des terres agricoles irriguées d'Afrique, constituant la méthode d'irrigation la plus courante. Adaptée aux petits exploitants agricoles car elle peut être mise en œuvre à faible coût et avec une technologie simple, elle présente néanmoins de grandes pertes d'eau et des risques d'accumulation saline.\n\nMesures d'amélioration :\n• Le nivellement au laser (nivellement précis des parcelles) améliore considérablement l'uniformité et l'efficience\n• La combinaison avec l'irrigation intermittente permet d'obtenir des effets d'économie d'eau","caption3":"","images":[]},{"rowNum":7,"id":"006","catCode":"CAT01","nameJa":"点滴灌漑","readingJa":"てんてきかんがい","summaryJa":"細いパイプ（ドリッパー）から作物の根元付近に少量ずつ水を直接供給する灌漑方式です。水利用効率が最も高く（85〜95%）、乾燥地域や水資源の乏しい地域での活用が注目されています。","detailJa":"点滴灌漑の仕組み：\n・加圧された水をメインパイプ→支管→ドリップチューブと送り、ドリッパーから滴下\n・ドリッパーの流量は通常1〜8 L/h（超低流量タイプは0.5 L/h以下）\n・土壌の浸透速度に合わせて流量を選択することが重要\n\n点滴灌漑の種類：\n1. 地上式点滴：地表にチューブを設置（野菜・果樹等）\n2. 地下式点滴（SDI）：チューブを地中10〜40cmに埋設、蒸発損失ゼロ\n3. 低圧式点滴：ヘッド差0.5〜1m程度で機能する低コスト型（アフリカの小規模農家向け）\n\n利点：\n・節水効果が高い（表面灌漑比で30〜50%節水）\n・肥料を灌漑水に溶かして施用（液肥灌漑、フェルティゲーション）が可能\n・雑草発生が少なく除草コスト削減\n\n課題とアフリカでの展開：\n初期コストが高いため小規模農家には普及の障壁がありましたが、低圧・簡易型システムの開発により、ケニア・エチオピア・マリなどで小規模農家向け点滴灌漑の普及が進んでいます。KickStartやIDE（国際開発企業）などのNGOが低コストシステムの普及を支援しています。","nameEn":"Drip irrigation","summaryEn":"This is an irrigation method that directly supplies small amounts of water to the vicinity of crop roots through thin pipes (drippers). It has the highest water use efficiency (85-95%) and is gaining attention for use in arid regions and areas with scarce water resources.","detailEn":"Drip Irrigation Mechanism:\n・Pressurized water is delivered through main pipes → lateral pipes → drip tubes, and drips from emitters\n・Emitter flow rates are typically 1-8 L/h (ultra-low flow types are 0.5 L/h or less)\n・It is important to select flow rates according to soil infiltration rates\n\nTypes of Drip Irrigation:\n1. Surface drip: Tubes installed on the ground surface (for vegetables, fruit trees, etc.)\n2. Subsurface drip irrigation (SDI): Tubes buried 10-40cm underground with zero evaporation loss\n3. Low-pressure drip: Low-cost type that functions with head differences of 0.5-1m (for small-scale farmers in Africa)\n\nAdvantages:\n・High water-saving effect (30-50% water savings compared to surface irrigation)\n・Enables fertilizer application dissolved in irrigation water (liquid fertilizer irrigation, fertigation)\n・Reduces weed occurrence and herbicide costs\n\nChallenges and Expansion in Africa:\nHigh initial costs have been a barrier to adoption by small-scale farmers, but with the development of low-pressure, simplified systems, drip irrigation for small-scale farmers is spreading in Kenya, Ethiopia, Mali, and other countries. NGOs such as KickStart and IDE (International Development Enterprises) are supporting the dissemination of low-cost systems.","image":"","captionJa":"","captionEn":"","published":"","name3":"Irrigation goutte-à-goutte","summary3":"Il s'agit d'un système d'irrigation qui fournit directement de petites quantités d'eau près des racines des cultures par de fins tuyaux (goutteurs). Cette méthode présente la plus haute efficacité d'utilisation de l'eau (85 à 95%) et son application dans les régions arides et les zones pauvres en ressources hydriques suscite une attention particulière.","detail3":"Mécanisme de l'irrigation goutte à goutte :\n• L'eau sous pression est acheminée du tuyau principal → aux conduites secondaires → aux tubes goutte-à-goutte, puis s'écoule par les goutteurs\n• Le débit des goutteurs est généralement de 1 à 8 L/h (type à très faible débit : 0,5 L/h ou moins)\n• Il est important de sélectionner le débit en fonction de la vitesse d'infiltration du sol\n\nTypes d'irrigation goutte à goutte :\n1. Irrigation goutte à goutte de surface : installation des tubes en surface (légumes, arbres fruitiers, etc.)\n2. Irrigation goutte à goutte souterraine (SDI) : enfouissement des tubes à 10-40 cm de profondeur, zéro perte par évaporation\n3. Irrigation goutte à goutte basse pression : type économique fonctionnant avec une différence de charge de 0,5 à 1 m environ (destiné aux petits exploitants africains)\n\nAvantages :\n• Effet d'économie d'eau élevé (30 à 50% d'économie par rapport à l'irrigation de surface)\n• Possibilité d'application d'engrais dissous dans l'eau d'irrigation (irrigation liquide, fertigation)\n• Réduction des coûts de désherbage grâce à une moindre prolifération des mauvaises herbes\n\nDéfis et développement en Afrique :\nLe coût initial élevé constituait un obstacle à l'adoption pour les petits exploitants, mais le développement de systèmes basse pression et simplifiés a permis la progression de l'irrigation goutte à goutte pour les petits exploitants au Kenya, en Éthiopie, au Mali et ailleurs. Des ONG comme KickStart et IDE (International Development Enterprises) soutiennent la diffusion de systèmes à faible coût.","caption3":"","images":[]},{"rowNum":8,"id":"007","catCode":"CAT01","nameJa":"スプリンクラー灌漑","readingJa":"すぷりんくらーかんがい","summaryJa":"加圧した水をノズルから空中に噴射し、降雨に似た状態で広範囲の農地に灌漑する方式です。地形の起伏に関わらず均一に散水できる特徴があります。","detailJa":"スプリンクラー灌漑の種類：\n1. 固定式（Solid set）：スプリンクラーヘッドを圃場全体に固定設置、操作が簡単\n2. 半移動式：幹線パイプは固定、支線を移動させながら使用\n3. センターピボット：中心の支柱から回転アームが伸び、円形に自動灌漑（大規模農業向け）\n4. リニアムーバー：直線的に移動しながら矩形圃場を灌漑\n\nスプリンクラーの適応条件：\n・水圧：最低100〜300 kPa（1〜3気圧）が必要、ポンプが必須\n・適正土壌：浸透速度の低い粘土質土壌でも対応可能（点滴より適応幅広い）\n・不向き条件：強風時は散水が乱れ効率が低下する\n\nアフリカでの利用：\n南アフリカ・ケニアの大規模農場やエジプトの砂漠農業でセンターピボット方式が普及しています。エジプトでは衛星画像で砂漠内の円形農場（センターピボット由来）が多数確認できます。初期コストと電力コストが障壁で、小規模農家への普及は限定的です。西アフリカでも実施されています。\n\n水利用効率：70〜85%（正しく設計・管理された場合）","nameEn":"Sprinkler irrigation","summaryEn":"This is a method that sprays pressurized water into the air through nozzles to irrigate extensive farmland in a state similar to rainfall. It has the characteristic of being able to spray water uniformly regardless of topographical undulations.","detailEn":"Types of sprinkler irrigation:\n1. Solid set: Sprinkler heads are permanently installed throughout the entire field, simple to operate\n2. Semi-portable: Main pipelines are fixed, lateral lines are moved during use\n3. Center pivot: Rotating arms extend from a central support tower, providing automatic circular irrigation (for large-scale agriculture)\n4. Linear mover: Irrigates rectangular fields while moving in a straight line\n\nAdaptation conditions for sprinklers:\n• Water pressure: Minimum 100-300 kPa (1-3 atmospheres) required, pumps are essential\n• Suitable soil: Can handle clay soils with low infiltration rates (broader adaptability than drip irrigation)\n• Unsuitable conditions: Strong winds disrupt water distribution and reduce efficiency\n\nUse in Africa:\nCenter pivot systems have been adopted in large-scale farms in South Africa and Kenya, and in desert agriculture in Egypt. In Egypt, numerous circular farms (derived from center pivot systems) within desert areas can be confirmed through satellite imagery. Initial costs and electricity costs are barriers, limiting adoption among small-scale farmers. Implementation is also taking place in West Africa.\n\nWater use efficiency: 70-85% (when properly designed and managed)","image":"","captionJa":"","captionEn":"","published":"","name3":"Irrigation par aspersion","summary3":"Il s'agit d'un système d'irrigation qui projette de l'eau sous pression dans l'air par des buses, créant un état similaire à la pluie pour irriguer de vastes terres agricoles. Ce système a la caractéristique de pouvoir arroser uniformément, indépendamment du relief du terrain.","detail3":"Types d'irrigation par aspersion :\n1. Système fixe (Solid set) : têtes d'arrosage installées de façon permanente sur l'ensemble de la parcelle, fonctionnement simple\n2. Semi-mobile : conduites principales fixes, utilisation avec déplacement des conduites secondaires\n3. Pivot central : bras rotatif s'étendant depuis un support central, irrigation automatique circulaire (destiné à l'agriculture à grande échelle)\n4. Rampe frontale : irrigation de parcelles rectangulaires avec déplacement linéaire\n\nConditions d'adaptation des asperseurs :\n• Pression d'eau : minimum 100 à 300 kPa (1 à 3 atmosphères) nécessaire, pompe indispensable\n• Sols appropriés : compatible même avec les sols argileux à faible vitesse d'infiltration (adaptabilité plus large que le goutte-à-goutte)\n• Conditions défavorables : par vent fort, la dispersion de l'eau est perturbée et l'efficacité diminue\n\nUtilisation en Afrique :\nLe système à pivot central s'est répandu dans les grandes exploitations d'Afrique du Sud et du Kenya ainsi que dans l'agriculture désertique égyptienne. En Égypte, de nombreuses exploitations circulaires dans le désert (issues du pivot central) peuvent être observées sur les images satellites. Les coûts initiaux et les coûts énergétiques constituent des obstacles, et la diffusion auprès des petits exploitants reste limitée. Des projets sont également mis en œuvre en Afrique de l'Ouest.\n\nEfficacité d'utilisation de l'eau : 70 à 85 % (en cas de conception et de gestion correctes)","caption3":"","images":[]},{"rowNum":9,"id":"008","catCode":"CAT01","nameJa":"圃場灌漑","readingJa":"ほじょうかんがい","summaryJa":"灌漑システムの末端部分として、農地（圃場）内で実施される水の配布・管理全般を指します。用水路や管路から受け取った水を、各作物に適した方法で圃場内に均一に分配します。","detailJa":"圃場灌漑の構成要素：\n・圃場取水口（Farm inlet）：用水路から圃場への取水点\n・圃場内水路・畦畔：圃場内での水の誘導\n・排水口：余剰水の排出\n・土地整形（Land leveling）：水の均一な分布のための傾斜調整\n\n圃場灌漑の管理ポイント：\n1. 灌漑時期の判断：土壌水分計やカレンダーによる灌漑タイミングの決定\n2. 灌漑量の管理：オーバーフローによる水損失と水不足の防止\n3. 排水管理：過剰灌漑後の余剰水の速やかな排除\n\n圃場整備の重要性：\n圃場の不均一な地形は表面灌漑では特に水分布を不均一にします。レーザーレベリング（レーザー光線を用いた精密整地）により圃場の均一性を高めることで、水利用効率を20〜30%向上させることができます。\n\nアフリカでの課題：\n多くのアフリカの小規模農家の圃場は整備が不十分で、取水口の規格化・圃場整形・排水路整備が灌漑改良プロジェクトの重要な介入点となっています。","nameEn":"Field Irrigation","summaryEn":"This refers to the overall distribution and management of water implemented within agricultural land (fields) as the terminal part of irrigation systems. Water received from irrigation channels or pipelines is uniformly distributed within the fields using methods appropriate for each crop.","detailEn":"Components of Field Irrigation:\n・Farm inlet: Water intake point from irrigation canal to field\n・Field channels and ridges: Water conveyance within the field\n・Drainage outlet: Discharge of surplus water\n・Land leveling: Slope adjustment for uniform water distribution\n\nManagement Points for Field Irrigation:\n1. Irrigation timing decision: Determining irrigation timing using soil moisture meters or calendar-based scheduling\n2. Irrigation volume management: Prevention of water loss due to overflow and water shortage\n3. Drainage management: Prompt removal of surplus water after excessive irrigation\n\nImportance of Field Development:\nNon-uniform field topography causes particularly uneven water distribution in surface irrigation. By improving field uniformity through laser leveling (precision land leveling using laser beams), water use efficiency can be improved by 20-30%.\n\nChallenges in Africa:\nMany smallholder farmers' fields in Africa are inadequately developed, making standardization of farm inlets, land leveling, and drainage system development important intervention points in irrigation improvement projects.","image":"","captionJa":"","captionEn":"","published":"","name3":"Irrigation des champs","summary3":"En tant que partie terminale du système d'irrigation, cela désigne l'ensemble de la distribution et de la gestion de l'eau effectuées dans les terres agricoles (parcelles). L'eau reçue des canaux d'irrigation ou des conduites est distribuée uniformément dans les parcelles selon des méthodes adaptées à chaque culture.","detail3":"Composants de l'irrigation parcellaire :\n• Prise d'eau parcellaire (Farm inlet) : point de captage de l'eau du canal d'irrigation vers la parcelle\n• Canaux intraparcellaires et diguettes : guidage de l'eau à l'intérieur de la parcelle\n• Exutoire : évacuation de l'eau excédentaire\n• Nivellement des terres (Land leveling) : ajustement de la pente pour une distribution uniforme de l'eau\n\nPoints de gestion de l'irrigation parcellaire :\n1. Détermination du moment d'irrigation : décision du timing d'irrigation par tensiomètre ou calendrier\n2. Gestion du volume d'irrigation : prévention des pertes d'eau par débordement et du manque d'eau\n3. Gestion du drainage : évacuation rapide de l'eau excédentaire après irrigation excessive\n\nImportance de l'aménagement parcellaire :\nLa topographie non uniforme des parcelles rend particulièrement inégale la distribution d'eau en irrigation de surface. Le nivellement au laser (nivellement de précision utilisant un faisceau laser) permet d'améliorer l'uniformité des parcelles et d'augmenter l'efficacité d'utilisation de l'eau de 20 à 30%.\n\nDéfis en Afrique :\nLes parcelles de nombreux petits agriculteurs africains sont insuffisamment aménagées, et la standardisation des prises d'eau, le nivellement des parcelles et l'aménagement des canaux de drainage constituent des points d'intervention importants des projets d'amélioration de l'irrigation.","caption3":"","images":[]},{"rowNum":10,"id":"009","catCode":"CAT01","nameJa":"畦畔灌漑","readingJa":"けいはんかんがい","summaryJa":"圃場を細長いストリップ（帯状区画）に分け、畦（土手）で仕切った区画の上端から水を流し込み、緩やかな傾斜に沿って流下させながら灌漑する表面灌漑の一形態です。","detailJa":"畦畔灌漑の特徴：\n・傾斜：0.1〜0.5%程度の緩傾斜が最適（過急傾斜では侵食、平坦すぎると水が進まない）\n・畦の幅：土壌浸透速度・流量・傾斜により決定（一般に3〜30m）\n・流量：畦幅に比例して設定（水が均一に広がるよう前進流量を確保）\n\n畦畔灌漑が適する作物：\n・密植作物（小麦・大麦・アルファルファ・牧草）\n・水稲（水田における畦畔灌漑は「湛水管理」と一体で実施）\n\n畝間灌漑との違い：\n畦畔灌漑は圃場全面に水を流す（条間なし）のに対し、畝間灌漑は作物の畝と畝の間の溝に水を流す。根群が広い作物や被覆率の高い密植作物に畦畔灌漑が向いている。\n\nアフリカでの適用：\nエジプトのナイルデルタや、エチオピア・スーダンの沖積平野で水稲・小麦の灌漑に利用されています。土地整形（均平化）が普及の前提条件であり、多くのアフリカの圃場では追加投資が必要です。","nameEn":"Ridge irrigation","summaryEn":"This is a form of surface irrigation where fields are divided into long, narrow strips (strip plots) separated by ridges (embankments), with water flowing from the upper end of each plot and irrigating as it flows down along a gentle slope.","detailEn":"Characteristics of Border Irrigation:\n・Slope: Gentle slopes of 0.1-0.5% are optimal (excessive steep slopes cause erosion, while overly flat areas prevent water advance)\n・Border width: Determined by soil infiltration rate, flow rate, and slope (generally 3-30m)\n・Flow rate: Set proportionally to border width (ensuring advance flow rate for uniform water distribution)\n\nCrops suitable for Border Irrigation:\n・Close-planted crops (wheat, barley, alfalfa, pasture grass)\n・Rice (border irrigation in paddy fields is implemented in conjunction with \"ponding management\")\n\nDifferences from Furrow Irrigation:\nBorder irrigation involves flowing water across the entire field surface (without inter-row spaces), whereas furrow irrigation flows water through furrows between crop rows. Border irrigation is suitable for crops with extensive root systems or densely planted crops with high coverage rates.\n\nApplication in Africa:\nIt is utilized for rice and wheat irrigation in Egypt's Nile Delta and the alluvial plains of Ethiopia and Sudan. Land leveling is a prerequisite for adoption, and additional investment is required in many African fields.","image":"","captionJa":"","captionEn":"","published":"","name3":"Irrigation par rigoles de bordure","summary3":"C'est une forme d'irrigation de surface qui consiste à divider le champ en bandes étroites (parcelles en bandes), à faire couler l'eau depuis l'extrémité supérieure des parcelles délimitées par des diguettes (levées de terre), et à irriguer en laissant l'eau s'écouler le long d'une pente douce.","detail3":"Caractéristiques de l'irrigation à la planche :\n• Pente : une pente douce de 0,1 à 0,5% est optimale (une pente trop forte provoque l'érosion, une surface trop plane empêche l'écoulement de l'eau)\n• Largeur des planches : déterminée par la vitesse d'infiltration du sol, le débit et la pente (généralement 3 à 30 m)\n• Débit : fixé proportionnellement à la largeur des planches (assurer un débit d'avancement pour une répartition uniforme de l'eau)\n\nCultures adaptées à l'irrigation à la planche :\n• Cultures à semis dense (blé, orge, luzerne, fourrage)\n• Riz (l'irrigation à la planche dans les rizières est mise en œuvre conjointement avec la « gestion de la submersion »)\n\nDifférences avec l'irrigation par sillons :\nL'irrigation à la planche fait couler l'eau sur toute la surface du champ (sans inter-rangs), tandis que l'irrigation par sillons fait couler l'eau dans les sillons entre les rangs de cultures. L'irrigation à la planche convient aux cultures à système racinaire étendu ou aux cultures à semis dense avec un taux de couverture élevé.\n\nApplication en Afrique :\nElle est utilisée pour l'irrigation du riz et du blé dans le delta du Nil en Égypte, ainsi que dans les plaines alluviales d'Éthiopie et du Soudan. L'aménagement du terrain (nivellement) constitue un prérequis à sa diffusion, et des investissements supplémentaires sont nécessaires dans de nombreux champs africains.","caption3":"","images":[]},{"rowNum":11,"id":"010","catCode":"CAT01","nameJa":"畝間灌漑","readingJa":"うねまかんがい","summaryJa":"作物を栽培する畝（高まり）と畝の間に設けた溝（畝間）に水を流し、土壌中の毛管作用で作物根部に水を供給する表面灌漑の一形態です。野菜・トウモロコシ・サトウキビなど列植え作物に広く使われます。","detailJa":"畝間灌漑の仕組みと設計：\n・畝間（Furrow）の長さ：土壌浸透速度・傾斜・流量によって決定（一般に30〜300m）\n・傾斜：0.1〜2.0%が適正範囲（傾斜過大→侵食、小さすぎ→水が進まない）\n・流量管理：前進フェーズでは最大流量、後退フェーズでは流量を減らしてカットオフ\n\n適用作物と条件：\n・トウモロコシ・サトウキビ・ワタ・野菜（ナス・トマト・トウガラシ）など行間距離のある作物\n・根部を水に浸さない方が良い作物（根腐れ防止）\n・畝間灌漑は作物と土の接触を最小限にするため病害の軽減効果もある\n\n節水改良：\n・パルス灌漑（Surge irrigation）：断続的に送水することで土壌侵透の均一性を高める\n・サイフォン管やゲート付きパイプによる精密流量管理\n\nアフリカでの普及：\nエジプト・スーダン・エチオピアでサトウキビ・野菜栽培の主要灌漑方法として広く普及。南アフリカのマカダマ・バナナ農園でも一般的です。土地整形コストが低い点が小規模農家に適しています。","nameEn":"Furrow irrigation","summaryEn":"This is a form of surface irrigation where water is channeled into furrows created between crop ridges, and water is supplied to crop root zones through capillary action in the soil. It is widely used for row crops such as vegetables, corn, and sugarcane.","detailEn":"Furrow Irrigation System and Design:\n・Furrow length: Determined by soil infiltration rate, slope, and flow rate (generally 30-300m)\n・Slope: 0.1-2.0% is the appropriate range (excessive slope → erosion, too small → water does not advance)\n・Flow management: Maximum flow during advance phase, reduced flow during recession phase with cutoff\n\nApplicable Crops and Conditions:\n・Crops with row spacing such as corn, sugarcane, cotton, and vegetables (eggplant, tomato, pepper)\n・Crops that prefer not to have roots submerged in water (prevention of root rot)\n・Furrow irrigation also has disease reduction effects by minimizing contact between crops and soil\n\nWater-saving Improvements:\n・Surge irrigation: Intermittent water supply to enhance uniformity of soil infiltration\n・Precise flow management using siphon tubes or gated pipes\n\nAdoption in Africa:\nWidely adopted as a major irrigation method for sugarcane and vegetable cultivation in Egypt, Sudan, and Ethiopia. Also common in macadamia and banana plantations in South Africa. The low land preparation costs make it suitable for small-scale farmers.","image":"","captionJa":"","captionEn":"","published":"","name3":"irrigation par sillons","summary3":"Il s'agit d'une forme d'irrigation de surface qui consiste à faire couler l'eau dans les sillons (inter-rangs) aménagés entre les billons (buttes surélevées) où sont cultivées les cultures, et à alimenter en eau les racines des plantes par action capillaire dans le sol. Cette méthode est largement utilisée pour les cultures en rangs telles que les légumes, le maïs et la canne à sucre.","detail3":"Mécanisme et conception de l'irrigation par sillons :\n• Longueur des sillons : déterminée par la vitesse d'infiltration du sol, la pente et le débit (généralement 30 à 300 m)\n• Pente : plage appropriée de 0,1 à 2,0 % (pente excessive → érosion, trop faible → l'eau n'avance pas)\n• Gestion du débit : débit maximum pendant la phase d'avancement, réduction du débit pendant la phase de récession avec cut-off\n\nCultures applicables et conditions :\n• Cultures avec espacement entre rangs comme le maïs, la canne à sucre, le coton, les légumes (aubergine, tomate, piment)\n• Cultures pour lesquelles il vaut mieux ne pas immerger les racines (prévention de la pourriture racinaire)\n• L'irrigation par sillons minimise le contact entre les cultures et le sol, ayant également un effet de réduction des maladies\n\nAméliorations pour économiser l'eau :\n• Irrigation par impulsions (Surge irrigation) : améliore l'uniformité de l'infiltration du sol par un apport d'eau intermittent\n• Gestion précise du débit par tubes siphons ou tuyaux à vannes\n\nDiffusion en Afrique :\nLargement répandue en Égypte, au Soudan et en Éthiopie comme méthode d'irrigation principale pour la culture de la canne à sucre et des légumes. Également commune dans les plantations de macadamia et de bananes en Afrique du Sud. Le faible coût de nivellement des terres convient aux petits exploitants.","caption3":"","images":[]},{"rowNum":12,"id":"011","catCode":"CAT01","nameJa":"地下灌漑","readingJa":"ちかかんがい","summaryJa":"地表面への散水ではなく、地下に設置した有孔管・多孔管から直接土壌中に水を供給する灌漑方式です。地表からの蒸発損失がなく節水効果が高い点が特徴です。","detailJa":"地下灌漑の種類：\n1. 地下点滴灌漑（SDI：Subsurface Drip Irrigation）\n　・有孔チューブを地下10〜40cmに埋設して少量ずつ給水\n　・蒸発損失が実質ゼロ、地表からの雑草発生も抑制\n2. 地下水位制御型灌漑（水田等）\n　・地下水位を一定レベルに保つことで毛管作用により上方に給水\n　・排水路を逆用して水を保持する方法（オランダで発達）\n\n利点：\n・蒸発損失ゼロで最高水準の節水効果（効率90〜95%）\n・地表が乾いているため農作業（トラクター走行）に支障なし\n・土壌塩分を根域から離れた地表に集積させる効果\n\n課題：\n・初期設置コストが高い\n・ドリッパーの目詰まり（根の侵入・微生物・ミネラル沈着）対策が必要\n・埋設後の点検・補修が困難\n\nアフリカでの展開：\n水資源の乏しいイスラエル発の技術として中東で普及し、現在はモロッコ・チュニジア・南アフリカの高付加価値農業（野菜・果樹）で導入が進んでいます。","nameEn":"Underground irrigation","summaryEn":"This is an irrigation system that supplies water directly into the soil through perforated pipes or porous tubes installed underground, rather than sprinkling water on the ground surface. It is characterized by high water-saving effects with no evaporation loss from the ground surface.","detailEn":"Types of Subsurface Irrigation:\n1. Subsurface Drip Irrigation (SDI)\n   ・Perforated tubes are buried 10-40cm underground to supply water in small quantities\n   ・Virtually zero evaporation losses and suppression of weed growth from the surface\n2. Groundwater Level Control Irrigation (paddy fields, etc.)\n   ・Water is supplied upward through capillary action by maintaining groundwater at a constant level\n   ・Method of retaining water by reverse use of drainage channels (developed in the Netherlands)\n\nAdvantages:\n・Zero evaporation losses with the highest level of water conservation effect (90-95% efficiency)\n・No interference with agricultural operations (tractor operation) due to dry surface conditions\n・Effect of concentrating soil salinity on the surface away from the root zone\n\nChallenges:\n・High initial installation costs\n・Need for measures against dripper clogging (root intrusion, microorganisms, mineral deposition)\n・Difficulty in inspection and repair after burial\n\nDevelopment in Africa:\nAs a technology originating from water-scarce Israel, it has spread throughout the Middle East and is currently being adopted in high-value agriculture (vegetables and fruit trees) in Morocco, Tunisia, and South Africa.","image":"","captionJa":"","captionEn":"","published":"","name3":"Irrigation souterraine","summary3":"Il s'agit d'un système d'irrigation qui alimente directement le sol en eau par des tubes perforés ou poreux installés sous terre, plutôt que par aspersion en surface. Il se caractérise par l'absence de pertes par évaporation depuis la surface et par un effet d'économie d'eau élevé.","detail3":"Types d'irrigation souterraine :\n1. Irrigation goutte-à-goutte souterraine (SDI : Subsurface Drip Irrigation)\n　・Installation de tubes perforés enfouis à 10-40 cm de profondeur pour un apport d'eau par petites quantités\n　・Pertes par évaporation pratiquement nulles, suppression également de la croissance des mauvaises herbes en surface\n2. Irrigation par contrôle du niveau de la nappe phréatique (rizières, etc.)\n　・Maintien du niveau de la nappe phréatique à un niveau constant pour alimenter vers le haut par action capillaire\n　・Méthode utilisant les canaux de drainage en sens inverse pour retenir l'eau (développée aux Pays-Bas)\n\nAvantages :\n・Effet d'économie d'eau de plus haut niveau avec zéro perte par évaporation (efficacité 90-95%)\n・Aucun obstacle aux travaux agricoles (circulation des tracteurs) car la surface reste sèche\n・Effet d'accumulation de la salinité du sol en surface, loin de la zone racinaire\n\nDéfis :\n・Coût d'installation initial élevé\n・Nécessité de mesures contre le colmatage des goutteurs (intrusion racinaire, micro-organismes, dépôts minéraux)\n・Inspection et réparation difficiles après enfouissement\n\nDéploiement en Afrique :\nEn tant que technologie originaire d'Israël, pays aux ressources en eau limitées, elle s'est répandue au Moyen-Orient et l'introduction progresse actuellement dans l'agriculture à haute valeur ajoutée (légumes, arbres fruitiers) au Maroc, en Tunisie et en Afrique du Sud.","caption3":"","images":[]},{"rowNum":13,"id":"012","catCode":"CAT01","nameJa":"マイクロ灌漑","readingJa":"まいくろかんがい","summaryJa":"少量の水を作物の根域に直接供給する灌漑方式の総称で、点滴灌漑・マイクロスプレー・バブラーなどを含みます。水の無駄を最小限にする効率的な灌漑技術です。","detailJa":"マイクロ灌漑の種類：\n1. 点滴灌漑（Drip irrigation）：ドリッパーから1〜8 L/hで滴下\n2. マイクロスプレー（Micro-sprayer）：小型スプリンクラーで半径0.5〜3mに散水\n3. バブラー（Bubbler）：4〜10 L/minの高流量で根元付近を潤す（樹木・果樹）\n4. ウーズーチューブ（Ooze tube）：多孔質の管全体から水が滲み出る\n\nシステム構成：\n・フィルター（スクリーン・ディスク・砂フィルター）：目詰まり防止が最重要\n・圧力調整弁：均一な圧力（50〜150 kPa）を保持\n・フラッシングバルブ：定期的にシステム内を洗浄\n\nフェルティゲーション（液肥灌漑）との組み合わせ：\nマイクロ灌漑はフェルティゲーションと組み合わせることで、施肥精度を高め肥料の利用効率を大幅に向上できます（通常施肥比較で窒素利用効率30〜50%向上）。\n\nアフリカでの普及支援：\nUSAID・JICA・世界銀行などが小規模農家向け低コストマイクロ灌漑の普及を支援。ケニア・エチオピア・マリ・モロッコで実績があります。","nameEn":"Micro-irrigation","summaryEn":"A general term for irrigation systems that directly supply small amounts of water to the root zone of crops, including drip irrigation, micro-spray, and bubblers. This is an efficient irrigation technology that minimizes water waste.","detailEn":"Types of Micro-irrigation:\n1. Drip irrigation: Water drips from drippers at 1-8 L/h\n2. Micro-sprayer: Small sprinklers that irrigate within a radius of 0.5-3m\n3. Bubbler: High flow rate of 4-10 L/min to moisten around the root zone (for trees and fruit trees)\n4. Ooze tube: Water seeps out through the entire porous tube\n\nSystem Components:\n・Filters (screen, disc, sand filters): Prevention of clogging is of utmost importance\n・Pressure regulating valve: Maintains uniform pressure (50-150 kPa)\n・Flushing valve: Periodically cleans the system interior\n\nCombination with Fertigation:\nMicro-irrigation can be combined with fertigation to improve fertilization accuracy and significantly enhance fertilizer use efficiency (30-50% improvement in nitrogen use efficiency compared to conventional fertilization).\n\nExtension Support in Africa:\nUSAID, JICA, World Bank and other organizations support the promotion of low-cost micro-irrigation systems for smallholder farmers. Implementation records exist in Kenya, Ethiopia, Mali, and Morocco.","image":"","captionJa":"","captionEn":"","published":"","name3":"Micro-irrigation","summary3":"Terme générique désignant les systèmes d'irrigation qui fournissent directement de petites quantités d'eau à la zone racinaire des cultures, incluant l'irrigation goutte-à-goutte, les micro-asperseurs et les diffuseurs à bulles. Il s'agit d'une technologie d'irrigation efficace qui minimise le gaspillage d'eau.","detail3":"Types de micro-irrigation :\n1. Irrigation goutte à goutte (Drip irrigation) : goutte-à-goutte à partir de goutteurs à un débit de 1 à 8 L/h\n2. Micro-asperseur (Micro-sprayer) : petit asperseur arrosant dans un rayon de 0,5 à 3 m\n3. Bulleur (Bubbler) : irrigation à haut débit de 4 à 10 L/min pour humidifier la zone racinaire (arbres et arbres fruitiers)\n4. Tube suintant (Ooze tube) : l'eau suinte sur toute la longueur du tube poreux\n\nConfiguration du système :\n• Filtres (filtres à tamis, à disques et à sable) : la prévention du colmatage est primordiale\n• Régulateur de pression : maintien d'une pression uniforme (50 à 150 kPa)\n• Vanne de rinçage : nettoyage périodique du système\n\nCombinaison avec la fertigation (irrigation fertilisante) :\nLa micro-irrigation combinée à la fertigation permet d'améliorer la précision de la fertilisation et d'augmenter considérablement l'efficacité d'utilisation des engrais (amélioration de l'efficacité d'utilisation de l'azote de 30 à 50 % par rapport à la fertilisation conventionnelle).\n\nSoutien à la diffusion en Afrique :\nL'USAID, la JICA, la Banque mondiale et d'autres organisations soutiennent la diffusion de la micro-irrigation à faible coût destinée aux petits exploitants agricoles. Des résultats probants ont été obtenus au Kenya, en Éthiopie, au Mali et au Maroc.","caption3":"","images":[]},{"rowNum":14,"id":"013","catCode":"CAT01","nameJa":"ポンプ灌漑","readingJa":"ぽんぷかんがい","summaryJa":"電動モーター・ディーゼルエンジン・太陽光発電などで駆動するポンプを使って、水源から農地へ水を揚水・加圧して供給する灌漑方式です。重力灌漑が困難な地形や深い水源での灌漑を可能にします。","detailJa":"ポンプの種類と用途：\n1. 遠心ポンプ：最も普及。揚程・流量ともに汎用性が高い\n2. 軸流ポンプ：大流量・低揚程に適する（河川から田への取水等）\n3. 水中ポンプ：深井戸への設置に使用\n4. ソーラーポンプ：太陽光発電駆動、電力インフラのない農村に適合\n\n動力源の選択：\n・電動（系統電力）：ランニングコスト最低だが送電網が必要\n・ディーゼル発電：汎用性高いが燃料コスト・管理負担が大きい\n・太陽光発電：燃料不要・環境負荷小さいが初期コスト高、近年急速に普及\n\nアフリカでのポンプ灌漑の課題と展望：\nサブサハラアフリカでは送電網が農村に届かず、ディーゼルポンプに依存する地域が多い。燃料費が灌漑コストの30〜60%を占めることもあり、経営を圧迫します。近年の太陽光パネルコストの急激な低下（2010年比1/10以下）により、ソーラーポンプが急速に普及しており、ケニア・マリ・ブルキナファソなどで数万台規模の導入実績があります。","nameEn":"Pump irrigation","summaryEn":"This is an irrigation system that uses pumps driven by electric motors, diesel engines, solar power generation, and other power sources to lift and pressurize water from water sources for supply to agricultural land. It enables irrigation in terrain where gravity irrigation is difficult and from deep water sources.","detailEn":"Types and Applications of Pumps:\n1. Centrifugal pump: Most widely used. High versatility in both head and flow rate\n2. Axial flow pump: Suitable for high flow rate and low head (water intake from rivers to fields, etc.)\n3. Submersible pump: Used for installation in deep wells\n4. Solar pump: Solar-powered drive, suitable for rural areas without electrical infrastructure\n\nSelection of Power Sources:\n・Electric (grid power): Lowest running cost but requires transmission network\n・Diesel generation: High versatility but high fuel costs and maintenance burden\n・Solar power: No fuel required and low environmental impact but high initial cost, rapidly spreading in recent years\n\nChallenges and Prospects of Pump Irrigation in Africa:\nIn Sub-Saharan Africa, transmission networks do not reach rural areas, and many regions depend on diesel pumps. Fuel costs sometimes account for 30-60% of irrigation costs, putting pressure on farm management. Due to the dramatic decline in solar panel costs in recent years (less than 1/10 compared to 2010), solar pumps are rapidly spreading, with tens of thousands of units installed in Kenya, Mali, Burkina Faso, and other countries.","image":"","captionJa":"","captionEn":"","published":"","name3":"Irrigation par pompage","summary3":"Il s'agit d'un système d'irrigation qui utilise des pompes alimentées par des moteurs électriques, des moteurs diesel ou l'énergie solaire photovoltaïque pour pomper et pressuriser l'eau depuis la source d'eau vers les terres agricoles. Ce système permet l'irrigation dans des terrains où l'irrigation gravitaire est difficile ou avec des sources d'eau profondes.","detail3":"Types et usages des pompes :\n1. Pompe centrifuge : la plus répandue. Polyvalence élevée tant pour la hauteur de refoulement que pour le débit\n2. Pompe axiale : adaptée aux gros débits et faibles hauteurs de refoulement (captage d'eau des rivières vers les rizières, etc.)\n3. Pompe immergée : utilisée pour l'installation dans les puits profonds\n4. Pompe solaire : alimentée par énergie photovoltaïque, adaptée aux zones rurales dépourvues d'infrastructure électrique\n\nChoix de la source d'énergie :\n・Électrique (réseau électrique) : coût de fonctionnement minimal mais nécessite un réseau de distribution électrique\n・Générateur diesel : polyvalence élevée mais coût du carburant et charge de gestion importants\n・Énergie photovoltaïque : sans carburant, faible impact environnemental mais coût initial élevé, diffusion rapide ces dernières années\n\nDéfis et perspectives de l'irrigation par pompage en Afrique :\nEn Afrique subsaharienne, le réseau électrique n'atteint pas les zones rurales et de nombreuses régions dépendent des pompes diesel. Les coûts de carburant représentent parfois 30 à 60% des coûts d'irrigation, ce qui pèse sur la gestion. Avec la chute drastique des coûts des panneaux solaires ces dernières années (moins d'1/10 par rapport à 2010), les pompes solaires se diffusent rapidement, avec des résultats d'introduction à l'échelle de dizaines de milliers d'unités au Kenya, au Mali, au Burkina Faso et ailleurs.","caption3":"","images":[]},{"rowNum":15,"id":"014","catCode":"CAT01","nameJa":"小規模農家灌漑スキーム","readingJa":"しょうきぼのうかかんがいすきーむ","summaryJa":"個人または小グループの農家が運営・管理する、比較的小規模な灌漑農業の仕組みです。アフリカの農業開発において最も普及している灌漑形態であり、食料安全保障と農家収入向上に直結します。","detailJa":"小規模灌漑スキームの特徴：\n・規模：一般に灌漑面積100ha以下（多くは1〜10ha）\n・水源：河川・地下水・雨水・ため池など多様\n・灌漑方法：表面灌漑・小型ポンプ・雨水集水など簡易技術\n・運営：農家自身または水利用者組合（WUA）が主体的に管理\n\nアフリカの小規模灌漑の現状：\nFAO（2022）によると、サブサハラアフリカの灌漑農地のうち約70%以上が小規模農家スキームによるものです。国際的な大型灌漑プロジェクトよりも、小規模スキームの方が農家の食料安全保障に直接的に貢献するという評価が高まっています。\n\n成功要因：\n・農家のニーズに即した技術選択\n・水利用者組合（WUA）による自主的管理\n・政府・NGOからの技術支援と市場アクセス確保\n・適切な維持管理費用の回収メカニズム\n\n主要支援機関：\nJICA・世界銀行・AfDB（アフリカ開発銀行）・IWMI（国際水管理研究所）が小規模灌漑スキームの改良・拡大を支援しています。","nameEn":"Small-scale farmer irrigation scheme","summaryEn":"This is a relatively small-scale irrigation farming system operated and managed by individual farmers or small groups of farmers. It is the most widespread form of irrigation in African agricultural development and directly contributes to food security and improved farm income.","detailEn":"Characteristics of Small-scale Irrigation Schemes:\n・Scale: Generally 100ha or less of irrigated area (mostly 1-10ha)\n・Water sources: Diverse sources including rivers, groundwater, rainwater, and ponds\n・Irrigation methods: Simple technologies such as surface irrigation, small pumps, and rainwater harvesting\n・Management: Primarily managed by farmers themselves or Water Users Associations (WUAs)\n\nCurrent Status of Small-scale Irrigation in Africa:\nAccording to FAO (2022), approximately 70% or more of irrigated farmland in Sub-Saharan Africa is attributed to smallholder farmer schemes. There is growing recognition that small-scale schemes contribute more directly to farmers' food security than large-scale international irrigation projects.\n\nSuccess Factors:\n・Technology selection that meets farmers' needs\n・Autonomous management by Water Users Associations (WUAs)\n・Technical support from government and NGOs and ensuring market access\n・Appropriate cost recovery mechanisms for operation and maintenance\n\nMajor Supporting Organizations:\nJICA, World Bank, AfDB (African Development Bank), and IWMI (International Water Management Institute) support the improvement and expansion of small-scale irrigation schemes.","image":"","captionJa":"","captionEn":"","published":"","name3":"Schéma d'irrigation pour petits exploitants agricoles","summary3":"Il s'agit d'un système d'agriculture irriguée à relativement petite échelle, exploité et géré par des agriculteurs individuels ou de petits groupes. C'est la forme d'irrigation la plus répandue dans le développement agricole en Afrique, directement liée à la sécurité alimentaire et à l'amélioration des revenus des agriculteurs.","detail3":"Caractéristiques des systèmes d'irrigation à petite échelle :\n• Échelle : généralement surface irriguée de 100 ha ou moins (souvent 1 à 10 ha)\n• Sources d'eau : diverses sources telles que rivières, eaux souterraines, eaux pluviales, bassins de retenue\n• Méthodes d'irrigation : technologies simples comme l'irrigation de surface, petites pompes, collecte des eaux pluviales\n• Gestion : gérée principalement par les agriculteurs eux-mêmes ou par des associations d'usagers de l'eau (AUE)\n\nSituation actuelle de l'irrigation à petite échelle en Afrique :\nSelon la FAO (2022), plus de 70% des terres agricoles irriguées en Afrique subsaharienne relèvent de systèmes de petits agriculteurs. L'évaluation s'accroît selon laquelle les systèmes à petite échelle contribuent plus directement à la sécurité alimentaire des agriculteurs que les grands projets d'irrigation internationaux.\n\nFacteurs de succès :\n• Choix technologique adapté aux besoins des agriculteurs\n• Gestion autonome par les associations d'usagers de l'eau (AUE)\n• Soutien technique du gouvernement et des ONG et assurance de l'accès au marché\n• Mécanisme approprié de recouvrement des coûts de maintenance\n\nPrincipales institutions de soutien :\nLa JICA, la Banque mondiale, la BAD (Banque africaine de développement) et l'IWMI (Institut international de gestion de l'eau) soutiennent l'amélioration et l'expansion des systèmes d'irrigation à petite échelle.","caption3":"","images":[]},{"rowNum":16,"id":"015","catCode":"CAT01","nameJa":"ペダル式ポンプ","readingJa":"ぺだるしきぽんぷ","summaryJa":"人力（足踏み）でシリンダーを動かし、浅い井戸や河川・ため池から水を汲み上げる低コスト・低技術の揚水装置です。電力・燃料が不要で、農村の零細農家が自力で設置・維持できます。","detailJa":"ペダル式ポンプの仕組みと性能：\n・両足で交互にペダルを踏み、二連シリンダーを往復運動させてポンプ作用を生む\n・揚程：最大7m程度（浅層地下水・河川・ため池からの揚水に適合）\n・流量：1〜5 m³/時（0.3〜1.4 L/秒）\n・価格：約25〜75米ドル（地域によって異なる）\n\n歴史と普及：\n1980年代にバングラデシュで開発（IDEが主導）、その後アフリカに導入。マリ・ザンビア・モザンビーク・エチオピアなどで数十万台規模が普及しています。\n\n適用作物と効果：\n・野菜（トマト・タマネギ・キャベツ・コショウ）などの高収益作物の灌漑に特に効果的\n・乾季に0.1〜0.5haの野菜栽培を可能にし、家庭収入を2〜5倍に増やす事例あり（KickStart International報告）\n\n限界と課題：\n・揚水深7m以内の浅い水源にしか使えない\n・1人分の労力を消費するため、家族労働力の少ない世帯には負担\n・スペアパーツの入手性が普及の鍵\n\n日本の関連技術：\n同様の原理で、日本の農村地帯でも江戸時代から踏車（ふみぐるま）・龍骨車（りゅうこつしゃ）が使われており、小規模農業の水確保に貢献してきた歴史があります。","nameEn":"Pedal pump","summaryEn":"This is a low-cost, low-technology water pumping device that moves cylinders through human power (foot pedaling) to lift water from shallow wells, rivers, and ponds. It requires no electricity or fuel and can be installed and maintained independently by small-scale farmers in rural areas.","detailEn":"Mechanism and Performance of Pedal Pumps:\n・Alternating foot pedaling operates dual cylinders in reciprocating motion to generate pumping action\n・Head: Maximum approximately 7m (suitable for pumping from shallow groundwater, rivers, and ponds)\n・Flow rate: 1-5 m³/hour (0.3-1.4 L/second)\n・Price: Approximately 25-75 USD (varies by region)\n\nHistory and Dissemination:\nDeveloped in Bangladesh in the 1980s (led by IDE), later introduced to Africa. Hundreds of thousands of units have been deployed in Mali, Zambia, Mozambique, Ethiopia, and other countries.\n\nApplicable Crops and Effects:\n・Particularly effective for irrigation of high-value crops such as vegetables (tomatoes, onions, cabbage, peppers)\n・Enables vegetable cultivation on 0.1-0.5 hectares during dry seasons, with cases of 2-5 fold increases in household income (reported by KickStart International)\n\nLimitations and Challenges:\n・Can only be used with shallow water sources within 7m pumping depth\n・Requires one person's labor input, creating burden for households with limited family labor\n・Availability of spare parts is key to widespread adoption\n\nRelated Japanese Technology:\nBased on similar principles, treadle wheels (fumiguruma) and chain pumps (ryukokutsusha) have been used in Japanese rural areas since the Edo period, contributing to water security for small-scale agriculture.","image":"","captionJa":"","captionEn":"","published":"","name3":"Pompe à pédale","summary3":"Il s'agit d'un dispositif de pompage à faible coût et faible technologie qui actionne un cylindre par force humaine (pédalage) pour puiser l'eau de puits peu profonds, de rivières et d'étangs de retenue. Il ne nécessite ni électricité ni carburant, et peut être installé et entretenu de manière autonome par de petits agriculteurs ruraux.","detail3":"Mécanisme et performance des pompes à pédale :\n• Actionner alternativement les pédales avec les deux pieds pour créer un mouvement de va-et-vient des cylindres doubles générant l'effet de pompage\n• Hauteur de refoulement : environ 7 m maximum (adaptée au pompage des eaux souterraines peu profondes, des rivières et des étangs de retenue)\n• Débit : 1 à 5 m³/h (0,3 à 1,4 L/s)\n• Prix : environ 25 à 75 dollars américains (variable selon les régions)\n\nHistorique et diffusion :\nDéveloppée au Bangladesh dans les années 1980 (sous la direction d'IDE), puis introduite en Afrique. Plusieurs centaines de milliers d'unités ont été diffusées au Mali, en Zambie, au Mozambique, en Éthiopie et dans d'autres pays.\n\nCultures d'application et effets :\n• Particulièrement efficace pour l'irrigation de cultures à haute rentabilité comme les légumes (tomates, oignons, choux, poivrons)\n• Permet la culture maraîchère sur 0,1 à 0,5 ha en saison sèche, avec des cas d'augmentation du revenu familial de 2 à 5 fois (rapport de KickStart International)\n\nLimites et défis :\n• Utilisable uniquement pour des sources d'eau peu profondes dans la limite de 7 m de profondeur de pompage\n• Consomme la force de travail d'une personne, représentant une charge pour les ménages disposant de peu de main-d'œuvre familiale\n• L'accessibilité aux pièces de rechange constitue la clé de la diffusion\n\nTechnologies japonaises connexes :\nSelon le même principe, les roues à pédales (fumiguruma) et les roues à os de dragon (ryūkokushya) ont été utilisées dans les zones rurales japonaises depuis l'époque d'Edo, contribuant historiquement à l'approvisionnement en eau de l'agriculture à petite échelle.","caption3":"","images":[]},{"rowNum":17,"id":"016","catCode":"CAT02","nameJa":"計画基準年","readingJa":"けいかくきじゅんねん","summaryJa":"灌漑計画の設計に用いる水文・農業データの基準となる年を指します。将来の灌漑用水の必要量と水源の利用可能量を評価するための比較基準として設定します。","detailJa":"計画基準年の設定方法：\n・過去の水文データ（降水量・河川流量）から統計的に設定\n・一般的に「10年に1度の干ばつ」に相当する渇水年（再現期間10年）を基準とする\n・農業開発では「安全側」の設計が必要なため、平均年ではなく渇水年を基準にする\n\n水文統計の考え方：\n・過去30〜50年間の年降水量・月別流量データを収集\n・頻度分析（正規分布・対数正規分布等）により超過確率を推定\n・75〜80%の確率で利用可能な水量を計画基準値とすることが多い\n\nアフリカでの課題：\nサブサハラアフリカでは水文観測データが短期間・欠測が多いため、統計的な計画基準年の設定が困難な場合があります。衛星データ（CHIRPS等の降水量推定）やリモートセンシングを補完的に活用する手法が普及しています。\n\n気候変動への対応：\n近年は「将来の気候変動シナリオ」を考慮した計画基準年の再検討が求められており、過去データのみに基づく設計では将来の渇水・洪水リスクを過小評価する可能性があります。","nameEn":"Planning base year","summaryEn":"This refers to the reference year for hydrological and agricultural data used in irrigation project design. It is established as a comparative baseline for evaluating future irrigation water requirements and available water source capacity.","detailEn":"Setting of Planning Base Year:\n- Statistically determined from historical hydrological data (precipitation and river flow)\n- Generally based on drought years corresponding to \"once-in-10-years drought\" (10-year return period)\n- Agricultural development requires \"safety-oriented\" design, therefore drought years rather than average years are used as the baseline\n\nHydrological Statistics Approach:\n- Collect annual precipitation and monthly flow data for the past 30-50 years\n- Estimate exceedance probability through frequency analysis (normal distribution, log-normal distribution, etc.)\n- Water volume available with 75-80% probability is often used as the planning baseline value\n\nChallenges in Africa:\nIn Sub-Saharan Africa, statistical setting of planning base years can be difficult due to short-term hydrological observation data with frequent data gaps. Methods that complementarily utilize satellite data (precipitation estimation such as CHIRPS) and remote sensing are becoming widespread.\n\nResponse to Climate Change:\nIn recent years, there is a demand for re-examination of planning base years considering \"future climate change scenarios,\" as designs based solely on historical data may underestimate future drought and flood risks.","image":"","captionJa":"","captionEn":"","published":"","name3":"année de référence du plan","summary3":"Il s'agit de l'année de référence pour les données hydrologiques et agricoles utilisées dans la conception des plans d'irrigation. Elle est établie comme critère de comparaison pour évaluer les besoins futurs en eau d'irrigation et la disponibilité des ressources en eau.","detail3":"Méthode de définition de l'année de référence pour la planification :\n・Définition statistique basée sur les données hydrologiques passées (précipitations et débits des cours d'eau)\n・Généralement basée sur une année de sécheresse correspondant à « une sécheresse décennale » (période de retour de 10 ans)\n・Pour le développement agricole, une conception « sécuritaire » est nécessaire, c'est pourquoi l'année de sécheresse sert de référence plutôt que l'année moyenne\n\nConcept des statistiques hydrologiques :\n・Collecte des données de précipitations annuelles et de débits mensuels sur les 30 à 50 dernières années\n・Estimation de la probabilité de dépassement par analyse de fréquence (distribution normale, distribution log-normale, etc.)\n・Les volumes d'eau disponibles avec une probabilité de 75 à 80% sont souvent utilisés comme valeurs de référence pour la planification\n\nDéfis en Afrique :\nEn Afrique subsaharienne, la définition statistique de l'année de référence pour la planification peut être difficile en raison de données d'observation hydrologique de courte durée et de nombreuses lacunes dans les mesures. Des méthodes utilisant de manière complémentaire les données satellitaires (estimation des précipitations comme CHIRPS) et la télédétection se généralisent.\n\nAdaptation au changement climatique :\nCes dernières années, une révision de l'année de référence pour la planification tenant compte des « scénarios futurs de changement climatique » est demandée, car une conception basée uniquement sur les données passées risque de sous-estimer les risques futurs de sécheresse et d'inondation.","caption3":"","images":[]},{"rowNum":18,"id":"017","catCode":"CAT02","nameJa":"地域用水","readingJa":"ちいきようすい","summaryJa":"農業用水に加え、農村地域の生活・生産活動全般（家畜用水・農産物洗浄・農道散水等）に使用される水の総称です。灌漑計画ではこれらを含めた総必要水量として計上します。","detailJa":"地域用水の内訳：\n・家畜用水：牛・羊・ヤギなどの飲み水・洗浄（1頭/日：牛40〜60L、羊5〜15L）\n・農産物調製用水：脱穀後の洗浄・加工処理に使用\n・農道散水・防火用水：農業関連インフラの維持・管理\n・農村生活用水（農業関連分）：農家が農作業に使う水\n\n日本の灌漑設計での位置づけ：\n日本の農業用水計画では、地域用水を「農業用水」の一部として計上し、受益地の農家戸数・家畜頭数等から算定します。\n\nアフリカでの重要性：\nアフリカ農村では農業用水施設が生活用水（飲料・洗濯・入浴）の唯一の供給源となる場合も多く、人間用の安全な飲料水と農業用水の適切な分離・管理が、衛生・健康の観点から重要です。地域用水の需要把握は統合的な水資源管理（IWRM）の基礎となります。","nameEn":"Regional water supply","summaryEn":"This is a general term for water used not only for agricultural irrigation but also for all daily and productive activities in rural areas (such as livestock water, crop washing, farm road sprinkling, etc.). In irrigation planning, this is calculated as the total required water volume including all these uses.","detailEn":"Breakdown of regional water use:\n・Livestock water: Drinking water and washing for cattle, sheep, goats, etc. (per head/day: cattle 40-60L, sheep 5-15L)\n・Agricultural product processing water: Used for washing and processing after threshing\n・Farm road sprinkling and fire prevention water: Maintenance and management of agriculture-related infrastructure\n・Rural domestic water (agriculture-related portion): Water used by farmers for agricultural work\n\nPosition in Japan's irrigation design:\nIn Japan's agricultural water planning, regional water use is included as part of \"agricultural water\" and calculated based on the number of farming households and livestock in the beneficiary area.\n\nImportance in Africa:\nIn African rural areas, agricultural water facilities often serve as the sole source of domestic water supply (drinking, washing, bathing). Proper separation and management of safe drinking water for human use and agricultural water is crucial from sanitation and health perspectives. Understanding regional water demand forms the foundation of Integrated Water Resources Management (IWRM).","image":"","captionJa":"","captionEn":"","published":"","name3":"Eau d'usage régional","summary3":"En plus de l'eau agricole, il s'agit du terme générique désignant l'eau utilisée pour l'ensemble des activités de vie et de production des zones rurales (eau pour le bétail, lavage des produits agricoles, arrosage des chemins agricoles, etc.). Dans les plans d'irrigation, ces éléments sont comptabilisés comme la quantité totale d'eau nécessaire.","detail3":"Répartition de l'eau régionale :\n・Eau pour le bétail : eau de boisson et lavage pour bovins, ovins, caprins, etc. (par tête/jour : bovins 40-60L, ovins 5-15L)\n・Eau pour la préparation des produits agricoles : utilisée pour le lavage et le traitement après battage\n・Arrosage des chemins agricoles et eau anti-incendie : maintenance et gestion des infrastructures liées à l'agriculture\n・Eau domestique rurale (part liée à l'agriculture) : eau utilisée par les exploitants agricoles pour les travaux agricoles\n\nPosition dans la conception de l'irrigation au Japon :\nDans la planification de l'eau agricole au Japon, l'eau régionale est comptabilisée comme une partie de « l'eau agricole » et calculée à partir du nombre de foyers agricoles et du cheptel dans la zone bénéficiaire.\n\nImportance en Afrique :\nDans les zones rurales africaines, les installations d'eau agricole constituent souvent la seule source d'approvisionnement en eau domestique (boisson, lessive, bain). La séparation et la gestion appropriées de l'eau potable sûre pour les humains et de l'eau agricole sont importantes du point de vue sanitaire et sanitaire. La compréhension de la demande en eau régionale constitue la base de la gestion intégrée des ressources en eau (GIRE).","caption3":"","images":[]},{"rowNum":19,"id":"018","catCode":"CAT02","nameJa":"灌漑必要水量","readingJa":"かんがいひつようすいりょう","summaryJa":"農作物の生育に必要な水量（作物必要水量）から、有効雨量・地下水の寄与分を差し引いた、実際に灌漑として供給すべき水量です。灌漑設計・水配分計画の基本的な数量指標です。","detailJa":"灌漑必要水量の計算：\n灌漑必要水量（NIR）= 作物必要水量（ET）− 有効雨量（Pe）− その他寄与量\n　単位：mm/日、mm/月、m³/ha・月\n\n月別の計算例（トウモロコシ乾季栽培）：\n・ET（蒸発散量）：150 mm/月\n・Pe（有効雨量）：0 mm/月（乾季）\n・NIR：150 mm/月 = 1,500 m³/ha・月\n\n総灌漑必要水量（GIR）への変換：\nGIR = NIR ÷ 圃場灌漑効率\n　例：NIR 150mm、圃場効率60% → GIR = 150 ÷ 0.60 = 250 mm\n\n設計上の重要ポイント：\n・ピーク月（最大灌漑必要月）の灌漑必要水量が取水施設・水路の設計基準となる\n・作付け時期の調整でピーク需要を平準化できる\n\nアフリカでの計算ツール：\nFAOが提供するCROPWATソフトウェアが世界標準で広く利用されており、気象データ入力により各作物・各季節の灌漑必要水量を自動計算できます。","nameEn":"Irrigation water requirement","summaryEn":"This is the amount of water that should actually be supplied as irrigation, calculated by subtracting the contributions of effective rainfall and groundwater from the water requirement necessary for crop growth (crop water requirement). It serves as a fundamental quantitative indicator for irrigation design and water allocation planning.","detailEn":"Calculation of Net Irrigation Requirements:\nNet Irrigation Requirements (NIR) = Crop Water Requirements (ET) - Effective Rainfall (Pe) - Other Contributions\nUnits: mm/day, mm/month, m³/ha·month\n\nMonthly Calculation Example (Maize Dry Season Cultivation):\n・ET (Evapotranspiration): 150 mm/month\n・Pe (Effective Rainfall): 0 mm/month (dry season)\n・NIR: 150 mm/month = 1,500 m³/ha·month\n\nConversion to Gross Irrigation Requirements (GIR):\nGIR = NIR ÷ Field Irrigation Efficiency\nExample: NIR 150mm, field efficiency 60% → GIR = 150 ÷ 0.60 = 250 mm\n\nImportant Design Considerations:\n・The irrigation water requirements of the peak month (maximum irrigation requirement month) serve as the design criteria for intake facilities and irrigation channels\n・Peak demand can be leveled by adjusting cropping schedules\n\nCalculation Tools for Africa:\nThe CROPWAT software provided by FAO is widely used as a global standard and can automatically calculate irrigation water requirements for each crop and season by inputting meteorological data.","image":"","captionJa":"","captionEn":"","published":"","name3":"Quantité d'eau nécessaire pour l'irrigation","summary3":"La quantité d'eau qui doit être effectivement fournie par irrigation, obtenue en soustrayant les contributions des précipitations efficaces et des eaux souterraines de la quantité d'eau nécessaire à la croissance des cultures (besoins en eau des cultures). Il s'agit d'un indicateur quantitatif fondamental pour la conception de l'irrigation et la planification de la distribution de l'eau.","detail3":"Calcul des besoins en eau d'irrigation :\nBesoins nets en eau d'irrigation (NIR) = Besoins en eau des cultures (ET) − Pluviométrie efficace (Pe) − Autres apports\n　Unités : mm/jour, mm/mois, m³/ha

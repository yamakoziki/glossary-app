 from subsistence to commercial agriculture. \"Semi-commercial agriculture,\" where farmers cultivate cash crops such as vegetables using surplus water during the dry season to supplement farm income, is observed in many African rural areas.\n\nPolicy Implications:\nSupport for subsistence farming households requires an approach that prioritizes ensuring food security while gradually strengthening market linkages. Rapid transition to commercialization may involve risks.","image":"","captionJa":"","captionEn":"","published":"","name3":"agriculture de subsistance","summary3":"Il s'agit d'une forme d'agriculture où la majeure partie des produits agricoles cultivés est destinée à l'autoconsommation (alimentation et fourrage). Seuls les excédents sont vendus sur le marché, l'objectif principal étant d'assurer la sécurité alimentaire de la famille plutôt que de générer des revenus. La plupart des petits agriculteurs en Afrique partent de ce modèle.","detail3":"Caractéristiques de l'agriculture de subsistance :\n・ Choix des cultures : centrée sur les cultures vivrières de base (maïs, sorgho, manioc, riz)\n・ Intrants : faibles intrants (utilisation limitée d'engrais chimiques et de pesticides)\n・ Techniques : utilisation de méthodes agricoles traditionnelles et de savoirs locaux\n・ Risques : exposée à la fois à l'insécurité alimentaire et aux risques de marché\n\nLimites et défis de l'agriculture de subsistance :\n・ Vulnérabilité aux risques météorologiques agricoles (sécheresse, inondations)\n・ Faible productivité : rendements et revenus faibles par unité de surface et par unité d'eau\n・ Isolement du marché : accès limité aux informations sur les prix, aux intrants et au crédit\n\nTransition de l'agriculture de subsistance vers l'agriculture commerciale :\nL'introduction de l'irrigation constitue un moyen important de transition de l'agriculture de subsistance vers l'agriculture commerciale. Une « agriculture semi-commerciale » où les agriculteurs cultivent des cultures de rente comme les légumes avec l'eau excédentaire pendant la saison sèche pour compléter leurs revenus agricoles est observée dans de nombreuses zones rurales africaines.\n\nImplications politiques :\nDans le soutien aux exploitants agricoles de subsistance, une approche qui donne la priorité absolue à la sécurisation de la sécurité alimentaire tout en renforçant progressivement les liens avec le marché est importante. Une transition brutale vers la commercialisation peut comporter des risques.","caption3":"","images":[]},{"rowNum":78,"id":"077","catCode":"CAT05","nameJa":"作付パターン","readingJa":"さくつけぱたーん","summaryJa":"一定の農地で年間を通じて、どの作物をいつ・どこに作付けするかの体系的な組み合わせ計画です。灌漑水需要の時間的分布・土地利用強度・農家収益に直接影響します。","detailJa":"作付パターンの要素：\n・作物の種類（主食・換金・飼料等）\n・作付け時期（播種・収穫のカレンダー）\n・作付け面積比率（各作物の受益地面積に対する比率）\n・輪作・間作・混作の組み合わせ\n\n灌漑計画との関係：\n・作付パターンによって月別灌漑必要水量が決まる\n・ピーク用水量月（取水施設設計の基準）が作付パターンで変わる\n・複数作物の多様な作付パターンは水需要の平準化に有効\n\nアフリカの代表的な作付パターン：\n・水稲+野菜（乾季）：ギニア・セネガルなど西アフリカ\n・トウモロコシ+豆類（混作）：東南アフリカの小農\n・小麦+トウモロコシ（二毛作）：エジプト・エチオピアの灌漑農地\n・野菜多品種複合栽培：都市近郊の換金農業\n\n作付強度との関係：\n作付パターンの多様化と乾季栽培の追加により、作付強度（年間の土地利用率）が向上します。同じ灌漑面積でも作付パターンの改善により農業生産量・農家収益を増加させることができます。","nameEn":"Cropping pattern","summaryEn":"It is a systematic combination plan that determines which crops to plant when and where throughout the year on a given farmland. It directly affects the temporal distribution of irrigation water demand, land use intensity, and farm income.","detailEn":"Elements of Cropping Patterns:\n・Crop types (staple crops, cash crops, feed crops, etc.)\n・Cropping calendar (sowing and harvesting schedule)\n・Cropping area ratio (ratio of each crop to the total beneficiary area)\n・Combinations of crop rotation, intercropping, and mixed cropping\n\nRelationship with Irrigation Planning:\n・Monthly irrigation water requirements are determined by cropping patterns\n・Peak water demand months (design criteria for intake facilities) vary depending on cropping patterns\n・Diverse cropping patterns with multiple crops are effective for leveling water demand\n\nRepresentative Cropping Patterns in Africa:\n・Rice + vegetables (dry season): West Africa including Guinea and Senegal\n・Maize + legumes (intercropping): smallholder farmers in Southeast Africa\n・Wheat + maize (double cropping): irrigated farmland in Egypt and Ethiopia\n・Multi-variety vegetable complex cultivation: cash crop farming in peri-urban areas\n\nRelationship with Cropping Intensity:\nDiversification of cropping patterns and addition of dry season cultivation improve cropping intensity (annual land use rate). Even with the same irrigated area, improvement of cropping patterns can increase agricultural production and farm income.","image":"","captionJa":"","captionEn":"","published":"","name3":"Modèle de culture","summary3":"Il s'agit d'un plan de combinaison systématique déterminant quelles cultures planter, quand et où sur une superficie agricole donnée tout au long de l'année. Cela influence directement la distribution temporelle de la demande d'eau d'irrigation, l'intensité d'utilisation des terres et la rentabilité des exploitations agricoles.","detail3":"Éléments des modèles de culture :\n・Types de cultures (cultures vivrières, cultures de rente, cultures fourragères, etc.)\n・Périodes de culture (calendrier des semis et des récoltes)\n・Ratio de superficie cultivée (proportion de chaque culture par rapport à la superficie bénéficiaire)\n・Combinaisons d'assolement, de cultures intercalaires et de cultures associées\n\nRelation avec les plans d'irrigation :\n・Les modèles de culture déterminent les besoins mensuels en eau d'irrigation\n・Le mois de pointe de la demande en eau (critère de conception des installations de prise d'eau) varie selon les modèles de culture\n・Les modèles de culture diversifiés avec plusieurs cultures sont efficaces pour niveler la demande en eau\n\nModèles de culture représentatifs en Afrique :\n・Riz irrigué + légumes (saison sèche) : Afrique de l'Ouest comme la Guinée et le Sénégal\n・Maïs + légumineuses (cultures associées) : petits agriculteurs d'Afrique australe et orientale\n・Blé + maïs (double culture) : terres irriguées d'Égypte et d'Éthiopie\n・Culture complexe multi-variétés de légumes : agriculture commerciale périurbaine\n\nRelation avec l'intensité culturale :\nLa diversification des modèles de culture et l'ajout de cultures de saison sèche améliorent l'intensité culturale (taux d'utilisation annuel des terres). Même avec la même superficie irriguée, l'amélioration des modèles de culture peut augmenter la production agricole et les revenus des agriculteurs.","caption3":"","images":[]},{"rowNum":79,"id":"078","catCode":"CAT05","nameJa":"雨季栽培","readingJa":"うきさいばい","summaryJa":"降雨期（雨季）の自然降水を主要な水源として行う農業です。アフリカのほとんどの小農が実践する基本的な農業形態で、主食作物（トウモロコシ・ソルガム・ミレット・コメ等）が中心です。","detailJa":"アフリカの雨季の特徴：\n・サヘル地帯：6〜9月の短い雨季（降水量300〜600mm）\n・東アフリカ：長雨季（3〜5月）と短雨季（10〜12月）の二雨季型\n・熱帯収束帯地域（赤道付近）：年間を通じて雨季・乾季が繰り返す\n\n雨季栽培の農学的特性：\n・雨季開始時のタイミングが播種の鍵（初降雨後の土壌水分確保）\n・干ばつストレスのリスク：雨季中の中断（dry spell）が収量に大打撃\n・病害虫の多発（高温多湿）\n・収穫後の乾燥・貯蔵が品質維持に重要\n\n補足灌漑（Supplemental Irrigation）：\n雨季栽培に少量の灌漑水を組み合わせる「補足灌漑」は、干ばつリスクを大幅に軽減し収量の安定性を高めます。FAOの推計では、補足灌漑によりアフリカの雨季作物収量を平均50〜100%向上できるとされています。\n\n気候変動の影響：\n気候変動により雨季の開始が不規則になり、乾燥期の長期化が進むと予測されており、補足灌漑の重要性がさらに高まっています。","nameEn":"Wet season cultivation","summaryEn":"This is agriculture that relies primarily on natural precipitation during the rainy season as the main water source. It is the fundamental form of agriculture practiced by most smallholder farmers in Africa, focusing mainly on staple crops such as maize, sorghum, millet, and rice.","detailEn":"Characteristics of Africa's Rainy Season:\n・Sahel Region: Short rainy season from June to September (precipitation 300-600mm)\n・East Africa: Bimodal rainfall pattern with long rainy season (March-May) and short rainy season (October-December)\n・Intertropical Convergence Zone (near the equator): Alternating rainy and dry seasons throughout the year\n\nAgronomic Characteristics of Rainy Season Cultivation:\n・Timing of rainy season onset is key for sowing (securing soil moisture after initial rainfall)\n・Risk of drought stress: Interruptions during rainy season (dry spells) severely impact yields\n・High incidence of pests and diseases (high temperature and humidity)\n・Post-harvest drying and storage are crucial for quality maintenance\n\nSupplemental Irrigation:\nSupplemental irrigation, which combines small amounts of irrigation water with rainy season cultivation, significantly reduces drought risk and enhances yield stability. According to FAO estimates, supplemental irrigation can improve African rainy season crop yields by an average of 50-100%.\n\nClimate Change Impact:\nClimate change is predicted to make rainy season onset irregular and prolong dry periods, further increasing the importance of supplemental irrigation.","image":"","captionJa":"","captionEn":"","published":"","name3":"culture de saison des pluies","summary3":"C'est une agriculture qui utilise principalement les précipitations naturelles de la saison des pluies comme source d'eau principale. Il s'agit de la forme agricole de base pratiquée par la plupart des petits agriculteurs africains, centrée sur les cultures vivrières (maïs, sorgho, mil, riz, etc.).","detail3":"Caractéristiques de la saison des pluies en Afrique :\n・Zone sahélienne : courte saison des pluies de juin à septembre (précipitations de 300 à 600 mm)\n・Afrique de l'Est : système bimodal avec une longue saison des pluies (mars-mai) et une courte saison des pluies (octobre-décembre)\n・Zone de convergence intertropicale (près de l'équateur) : alternance de saisons des pluies et saisons sèches tout au long de l'année\n\nCaractéristiques agronomiques de la culture en saison des pluies :\n・Le timing du début de la saison des pluies est la clé du semis (assurance de l'humidité du sol après les premières pluies)\n・Risque de stress hydrique : les interruptions pluviométriques (dry spell) pendant la saison des pluies causent des dommages considérables au rendement\n・Forte incidence de maladies et ravageurs (chaleur et humidité élevées)\n・Le séchage et le stockage post-récolte sont importants pour maintenir la qualité\n\nIrrigation d'appoint (Supplemental Irrigation) :\nL'« irrigation d'appoint » qui combine la culture en saison des pluies avec de petites quantités d'eau d'irrigation réduit considérablement les risques de sécheresse et améliore la stabilité des rendements. Selon les estimations de la FAO, l'irrigation d'appoint pourrait améliorer les rendements des cultures de saison des pluies en Afrique de 50 à 100 % en moyenne.\n\nImpact du changement climatique :\nLe changement climatique rend le début de la saison des pluies irrégulier et on prédit une prolongation des périodes sèches, ce qui accroît davantage l'importance de l'irrigation d'appoint.","caption3":"","images":[]},{"rowNum":80,"id":"079","catCode":"CAT05","nameJa":"乾季栽培","readingJa":"かんきさいばい","summaryJa":"降雨がほとんどない乾季（乾燥期）に、灌漑用水を水源として行う農業です。雨季農業に続く第2・第3作として行われ、野菜・果物・小麦・豆類等の換金作物が中心です。","detailJa":"乾季栽培の特徴と意義：\n・完全に灌漑水源に依存（天水は期待できない）\n・雨季とは異なる作物が作付けできる（野菜・小麦・大麦等）\n・市場価格が高い時期に出荷できる（食料不足期の乾季に出荷）\n・農閑期の農家の所得・雇用創出効果が大きい\n\nアフリカでの乾季栽培の可能性：\n・乾季の農業労働人口は余剰状態（農閑期）\n・都市人口の食料需要増大による市場機会\n・ソーラーポンプ・ペダルポンプによる低コスト揚水が可能\n\n乾季栽培の制約：\n・安定した水源（地下水・貯水池・河川常流）の確保が必須\n・高い蒸発散量（乾燥・高温・風）による大きな灌漑水量\n・害虫・疾病の増加（乾燥期の虫害）\n・寒冷地では夜間低温（霜害）リスクがある（エチオピア高原等）\n\n作付け計画上の灌漑水需要：\n乾季栽培の灌漑必要水量は雨季栽培より大きく（有効雨量ゼロ）、乾季の灌漑設計容量を規定することが多いです。","nameEn":"Dry season cultivation","summaryEn":"This is agriculture conducted using irrigation water as the source during the dry season when there is little rainfall. It is practiced as second and third crops following rainy season agriculture, focusing primarily on cash crops such as vegetables, fruits, wheat, and legumes.","detailEn":"Characteristics and Significance of Dry Season Cultivation:\n• Complete dependence on irrigation water sources (no rainfall can be expected)\n• Different crops can be planted compared to the rainy season (vegetables, wheat, barley, etc.)\n• Products can be shipped when market prices are high (shipping during the dry season food shortage period)\n• Significant income and employment generation effects for farmers during the agricultural off-season\n\nPotential for Dry Season Cultivation in Africa:\n• Agricultural labor population is in surplus during the dry season (agricultural off-season)\n• Market opportunities due to increasing food demand from urban populations\n• Low-cost water pumping possible through solar pumps and pedal pumps\n\nConstraints of Dry Season Cultivation:\n• Securing stable water sources (groundwater, reservoirs, perennial rivers) is essential\n• Large irrigation water requirements due to high evapotranspiration (dry, hot, windy conditions)\n• Increased pests and diseases (insect damage during dry periods)\n• Risk of nighttime low temperatures (frost damage) in cold regions (Ethiopian Highlands, etc.)\n\nIrrigation Water Demand in Cropping Plans:\nThe irrigation water requirements for dry season cultivation are larger than those for rainy season cultivation (zero effective rainfall), and often determine the design capacity for dry season irrigation.","image":"","captionJa":"","captionEn":"","published":"","name3":"Culture de saison sèche","summary3":"Il s'agit d'une agriculture pratiquée pendant la saison sèche (période de sécheresse) où les précipitations sont quasi inexistantes, en utilisant l'eau d'irrigation comme source d'eau. Elle est pratiquée comme deuxième et troisième cultures suivant l'agriculture de saison des pluies, et se concentre principalement sur les cultures de rente telles que les légumes, les fruits, le blé et les légumineuses.","detail3":"Caractéristiques et importance de la culture de saison sèche :\n• Dépendance complète des sources d'eau d'irrigation (les précipitations ne peuvent être attendues)\n• Possibilité de cultiver des cultures différentes de la saison des pluies (légumes, blé, orge, etc.)\n• Possibilité d'expédier pendant les périodes de prix élevés sur le marché (expédition pendant la saison sèche, période de pénurie alimentaire)\n• Grands effets de création de revenus et d'emplois pour les agriculteurs pendant la période d'inactivité agricole\n\nPotentiel de la culture de saison sèche en Afrique :\n• La population agricole active de saison sèche est en état d'excédent (période d'inactivité agricole)\n• Opportunités de marché dues à l'augmentation de la demande alimentaire de la population urbaine\n• Possibilité de pompage à faible coût par pompes solaires et pompes à pédales\n\nContraintes de la culture de saison sèche :\n• La sécurisation d'une source d'eau stable (eau souterraine, réservoir, cours d'eau permanent) est essentielle\n• Grande quantité d'eau d'irrigation due à la forte évapotranspiration (sécheresse, haute température, vent)\n• Augmentation des ravageurs et maladies (dégâts d'insectes pendant la période sèche)\n• Dans les régions froides, risque de basses températures nocturnes (dégâts de gel) (plateau éthiopien, etc.)\n\nDemande en eau d'irrigation dans la planification des cultures :\nLa quantité d'eau nécessaire à l'irrigation pour la culture de saison sèche est plus importante que celle de la culture de saison des pluies (précipitations efficaces nulles), et détermine souvent la capacité de conception de l'irrigation de saison sèche.","caption3":"","images":[]},{"rowNum":81,"id":"080","catCode":"CAT05","nameJa":"高価値作物","readingJa":"こうかちさくもつ","summaryJa":"単位面積・単位水量あたりの市場価値が高い農産物を指します。野菜・果物・花卉・スパイス・ハーブ等が代表的で、同じ灌漑水量でも主食作物より数倍〜数十倍の収入が見込めます。","detailJa":"高価値作物の例：\n野菜：トマト・ピーマン・タマネギ・ニンニク・キャベツ・ナス\n果物：マンゴー・アボカド・パパイヤ・バナナ・イチゴ・ブドウ\n輸出向け：バラ（ケニア）・カルネーション・ランナービーン・スナップエンドウ\nスパイス・ハーブ：バジル・唐辛子・生姜・コリアンダー\n\n高価値作物の農業経済的特性：\n・水生産性（kg/m³）が主食作物より高い\n　例：トマト10〜15 kg/m³ vs. トウモロコシ1〜2 kg/m³\n・農家収益：同一面積で主食作物の5〜20倍の収益が可能\n・市場・品質へのアクセスが収益の鍵\n\n高価値作物と灌漑：\n高価値作物は水のストレスに敏感なため、精密灌漑（点滴・スプリンクラー）と土壌水分管理が品質維持に重要です。灌漑への投資回収も主食作物より早く、農家の水利費支払い能力も高くなります。\n\nアフリカの輸出農業：\nケニアの花卉・インゲン豆、エチオピアのバラ・コーヒー、モロッコのトマト・柑橘類は欧州向けに大量輸出されており、灌漑農業の高価値化の成功事例です。","nameEn":"High-value crops","summaryEn":"This refers to agricultural products with high market value per unit area and per unit of water. Typical examples include vegetables, fruits, flowers, spices, and herbs, which can generate several to dozens of times more income than staple crops with the same amount of irrigation water.","detailEn":"Examples of High-Value Crops:\nVegetables: Tomatoes, Bell peppers, Onions, Garlic, Cabbage, Eggplant\nFruits: Mangoes, Avocados, Papayas, Bananas, Strawberries, Grapes\nExport crops: Roses (Kenya), Carnations, Runner beans, Snap peas\nSpices and Herbs: Basil, Chili peppers, Ginger, Coriander\n\nAgricultural Economic Characteristics of High-Value Crops:\n• Water productivity (kg/m³) is higher than staple crops\n  Example: Tomatoes 10-15 kg/m³ vs. Maize 1-2 kg/m³\n• Farm income: 5-20 times higher revenue possible per same area compared to staple crops\n• Access to markets and quality control is key to profitability\n\nHigh-Value Crops and Irrigation:\nHigh-value crops are sensitive to water stress, making precision irrigation (drip and sprinkler systems) and soil moisture management crucial for quality maintenance. Return on irrigation investment is faster than with staple crops, and farmers' capacity to pay water fees is also higher.\n\nExport Agriculture in Africa:\nKenya's floriculture and French beans, Ethiopia's roses and coffee, and Morocco's tomatoes and citrus fruits are exported in large quantities to Europe, representing successful examples of high-value irrigated agriculture.","image":"","captionJa":"","captionEn":"","published":"","name3":"cultures à haute valeur ajoutée","summary3":"Il s'agit de produits agricoles ayant une valeur marchande élevée par unité de surface et par unité d'eau. Les légumes, fruits, fleurs, épices et herbes aromatiques en sont des exemples représentatifs, permettant d'obtenir des revenus plusieurs fois à plusieurs dizaines de fois supérieurs aux cultures vivrières de base, même avec le même volume d'eau d'irrigation.","detail3":"Exemples de cultures à haute valeur ajoutée :\nLégumes : tomate, poivron, oignon, ail, chou, aubergine\nFruits : mangue, avocat, papaye, banane, fraise, raisin\nDestinés à l'exportation : rose (Kenya), œillet, haricot vert, pois gourmand\nÉpices et herbes aromatiques : basilic, piment, gingembre, coriandre\n\nCaractéristiques agro-économiques des cultures à haute valeur ajoutée :\n• Productivité de l'eau (kg/m³) supérieure aux cultures vivrières de base\n  Exemple : tomate 10-15 kg/m³ vs. maïs 1-2 kg/m³\n• Revenus agricoles : possibilité de revenus 5 à 20 fois supérieurs aux cultures vivrières de base sur une même superficie\n• L'accès au marché et à la qualité constitue la clé de la rentabilité\n\nCultures à haute valeur ajoutée et irrigation :\nLes cultures à haute valeur ajoutée étant sensibles au stress hydrique, l'irrigation de précision (goutte-à-goutte, aspersion) et la gestion de l'humidité du sol sont importantes pour maintenir la qualité. Le retour sur investissement de l'irrigation est également plus rapide que pour les cultures vivrières de base, et la capacité de paiement des agriculteurs pour les frais d'irrigation est plus élevée.\n\nAgriculture d'exportation en Afrique :\nLa floriculture et les haricots verts du Kenya, les roses et le café d'Éthiopie, les tomates et les agrumes du Maroc sont massivement exportés vers l'Europe et constituent des exemples réussis de valorisation de l'agriculture irriguée.","caption3":"","images":[]},{"rowNum":82,"id":"081","catCode":"CAT05","nameJa":"商品作物","readingJa":"しょうひんさくもつ","summaryJa":"主として市場販売・輸出を目的として栽培される農産物です。換金作物とも呼ばれ、コーヒー・カカオ・サトウキビ・綿花・タバコ・花卉・切花等が代表的です。","detailJa":"商品作物と農業水管理：\n・サトウキビ：最大の水消費作物の一つ（年間1,500〜2,000mm）。灌漑が必須\n・コーヒー：年間降水量1,500〜2,000mmが必要。乾燥地では補足灌漑が収量安定化に有効\n・綿花：水ストレスに弱く、開花〜結実期の水管理が収量の鍵\n・バナナ：週次の定期灌漑が必要、生育全期間を通じて湿潤状態を維持\n\n商品作物経済の特徴：\n・国際市場価格に左右される（価格変動リスク）\n・外貨収入の主要源泉（特にアフリカ諸国の輸出）\n・大企業農場と小農の両方が生産\n\n商品作物と食料安全保障のトレードオフ：\n農地・水資源を商品作物に振り向けることは輸出収入を生む一方、自国の食料生産が減少するリスクがあります。水資源が限られる国では、商品作物の灌漑拡大と自給食料生産のバランスを国家政策として判断する必要があります。\n\nアフリカの代表的商品作物産地：\nガーナ・コートジボワール（カカオ）、エチオピア・ケニア（コーヒー）、南アフリカ・ジンバブエ（タバコ・砂糖）","nameEn":"Commercial crops","summaryEn":"Agricultural products cultivated primarily for market sales and export purposes. Also called cash crops, typical examples include coffee, cacao, sugarcane, cotton, tobacco, ornamental plants, and cut flowers.","detailEn":"Cash Crops and Agricultural Water Management:\n• Sugarcane: One of the highest water-consuming crops (1,500-2,000mm annually). Irrigation is essential\n• Coffee: Requires annual precipitation of 1,500-2,000mm. Supplemental irrigation is effective for yield stabilization in arid regions\n• Cotton: Sensitive to water stress, water management during flowering to fruiting stage is key to yield\n• Banana: Requires regular weekly irrigation, maintaining moist conditions throughout the entire growing period\n\nCharacteristics of Cash Crop Economy:\n• Subject to international market prices (price volatility risk)\n• Major source of foreign currency earnings (particularly for African countries' exports)\n• Produced by both large corporate farms and smallholder farmers\n\nTrade-off between Cash Crops and Food Security:\nWhile allocating agricultural land and water resources to cash crops generates export income, there is a risk of decreased domestic food production. In countries with limited water resources, balancing irrigation expansion for cash crops with subsistence food production needs to be determined as a national policy.\n\nRepresentative Cash Crop Production Areas in Africa:\nGhana and Côte d'Ivoire (cocoa), Ethiopia and Kenya (coffee), South Africa and Zimbabwe (tobacco and sugar)","image":"","captionJa":"","captionEn":"","published":"","name3":"cultures commerciales","summary3":"Il s'agit de produits agricoles cultivés principalement dans le but d'être vendus sur le marché et exportés. Également appelées cultures de rente, les plus représentatives sont le café, le cacao, la canne à sucre, le coton, le tabac, les plantes ornementales et les fleurs coupées.","detail3":"Cultures commerciales et gestion de l'eau agricole :\n• Canne à sucre : l'une des cultures à plus forte consommation d'eau (1 500 à 2 000 mm par an). L'irrigation est indispensable\n• Café : nécessite 1 500 à 2 000 mm de précipitations annuelles. En zone aride, l'irrigation d'appoint est efficace pour stabiliser les rendements\n• Coton : sensible au stress hydrique, la gestion de l'eau pendant la floraison et la fructification est la clé du rendement\n• Banane : nécessite une irrigation régulière hebdomadaire, maintien d'un état humide tout au long de la période de croissance\n\nCaractéristiques de l'économie des cultures commerciales :\n• Dépendance aux prix du marché international (risque de fluctuation des prix)\n• Source principale de devises étrangères (notamment pour les exportations des pays africains)\n• Production assurée à la fois par de grandes exploitations agricoles et par de petits agriculteurs\n\nArbitrage entre cultures commerciales et sécurité alimentaire :\nL'allocation des terres agricoles et des ressources hydriques aux cultures commerciales génère des revenus d'exportation, mais présente le risque de réduire la production alimentaire nationale. Dans les pays aux ressources hydriques limitées, l'équilibre entre l'expansion de l'irrigation pour les cultures commerciales et la production alimentaire d'autosuffisance doit faire l'objet d'une décision de politique nationale.\n\nPrincipales régions productrices de cultures commerciales en Afrique :\nGhana et Côte d'Ivoire (cacao), Éthiopie et Kenya (café), Afrique du Sud et Zimbabwe (tabac et sucre)","caption3":"","images":[]},{"rowNum":83,"id":"082","catCode":"CAT05","nameJa":"二期作","readingJa":"にきさく","summaryJa":"同一農地で年間2回の作付け・収穫を行う農業形態です。灌漑の活用により乾季にも栽培が可能になり、土地利用効率と農家収益を大幅に向上させます。","detailJa":"二期作の条件と特徴：\n・灌漑水の確保（特に乾季の第2作に不可欠）\n・十分な生育期間（雨季1作＋乾季1作、または雨季前半＋後半）\n・土壌肥沃度の維持（2作連続収奪による地力低下を防ぐ施肥管理）\n・害虫・病害管理（連作による病害虫圧増加）\n\n作付けの組み合わせ例：\n・水稲＋水稲（二期稲作）：マリ・セネガルの水稲灌漑地帯\n・水稲＋野菜（乾季野菜）：東南アジア・アフリカの灌漑スキーム\n・トウモロコシ＋豆類（雨季）→ 小麦（乾季）：エジプト・エチオピア\n・野菜→野菜（周年栽培）：都市近郊の集約農業\n\n二期作の灌漑水量計算：\n二期作では年間灌漑必要水量が一期作の約1.5〜2倍になります。水源の年間利用可能水量との整合確認が設計上重要です。また、第1作の収穫から第2作の播種までの期間（輪換期）も用水管理の対象です。\n\n作付強度との関係：\n二期作は作付強度200%（年間2作）を意味します。アフリカの灌漑スキームでは多くの場合、作付強度が100〜150%程度にとどまっており、二期作への移行が生産性向上の大きな機会となっています。","nameEn":"Double cropping","summaryEn":"This is an agricultural system where crops are planted and harvested twice a year on the same farmland. The use of irrigation enables cultivation during the dry season, significantly improving land use efficiency and farm income.","detailEn":"Conditions and Characteristics of Double Cropping:\n• Securing irrigation water (essential especially for the second crop in the dry season)\n• Sufficient growing period (one crop in rainy season + one crop in dry season, or first half + second half of rainy season)\n• Maintaining soil fertility (fertilization management to prevent soil fertility decline due to continuous extraction from two crops)\n• Pest and disease management (increased pest and disease pressure due to continuous cropping)\n\nExamples of Cropping Pattern Combinations:\n• Rice + Rice (double rice cropping): Rice irrigation zones in Mali and Senegal\n• Rice + Vegetables (dry season vegetables): Irrigation schemes in Southeast Asia and Africa\n• Maize + Legumes (rainy season) → Wheat (dry season): Egypt and Ethiopia\n• Vegetables → Vegetables (year-round cultivation): Intensive agriculture in peri-urban areas\n\nIrrigation Water Volume Calculation for Double Cropping:\nIn double cropping, the annual irrigation water requirement becomes approximately 1.5 to 2 times that of single cropping. Verification of consistency with the annual available water volume from water sources is important in design. Additionally, the period from harvest of the first crop to sowing of the second crop (rotation period) is also subject to irrigation management.\n\nRelationship with Cropping Intensity:\nDouble cropping means a cropping intensity of 200% (two crops per year). In most irrigation schemes in Africa, cropping intensity remains at around 100-150%, and the transition to double cropping represents a significant opportunity for improving productivity.","image":"","captionJa":"","captionEn":"","published":"","name3":"Double culture","summary3":"Il s'agit d'une forme d'agriculture qui consiste à effectuer deux cycles de plantation et de récolte par an sur la même parcelle agricole. L'utilisation de l'irrigation permet la cultivation pendant la saison sèche, améliorant considérablement l'efficacité d'utilisation des terres et les revenus des agriculteurs.","detail3":"Conditions et caractéristiques de la double culture :\n・ Sécurisation de l'eau d'irrigation (indispensable notamment pour la 2e culture en saison sèche)\n・ Période de croissance suffisante (1 culture en saison des pluies + 1 culture en saison sèche, ou première moitié + seconde moitié de la saison des pluies)\n・ Maintien de la fertilité du sol (gestion de la fertilisation pour éviter la baisse de fertilité due à l'épuisement consécutif de 2 cultures)\n・ Gestion des ravageurs et maladies (augmentation de la pression phytosanitaire due à la culture continue)\n\nExemples de combinaisons de cultures :\n・ Riz irrigué + riz irrigué (double riziculture) : zones rizicoles irriguées du Mali et du Sénégal\n・ Riz irrigué + légumes (légumes de saison sèche) : périmètres irrigués d'Asie du Sud-Est et d'Afrique\n・ Maïs + légumineuses (saison des pluies) → blé (saison sèche) : Égypte, Éthiopie\n・ Légumes → légumes (culture pérenne) : agriculture intensive périurbaine\n\nCalcul du volume d'eau d'irrigation pour la double culture :\nEn double culture, le volume annuel d'eau d'irrigation nécessaire devient environ 1,5 à 2 fois celui de la culture simple. La vérification de la cohérence avec le volume d'eau disponible annuellement de la source d'eau est importante dans la conception. De plus, la période entre la récolte de la 1ère culture et les semis de la 2e culture (période de rotation) est également un objet de gestion de l'eau d'irrigation.\n\nRelation avec l'intensité culturale :\nLa double culture signifie une intensité culturale de 200% (2 cultures par an). Dans les périmètres irrigués africains, l'intensité culturale reste dans la plupart des cas autour de 100 à 150%, et la transition vers la double culture constitue une grande opportunité d'amélioration de la productivité.","caption3":"","images":[]},{"rowNum":84,"id":"083","catCode":"CAT05","nameJa":"作付強度","readingJa":"さくつけきょうど","summaryJa":"単位農地面積で一定期間（通常1年間）に作付けされた述べ面積の割合です。年1作なら100%、年2作なら200%となります。灌漑農業の生産性・土地利用効率の重要な指標です。","detailJa":"作付強度（Cropping Intensity）の計算：\n作付強度（%）= （年間総作付け面積 ÷ 灌漑受益面積） × 100\n\n例：\n・受益地100haのうち、雨季に80ha、乾季に60ha作付け\n→ 作付強度 = (80 + 60) ÷ 100 × 100 = 140%\n\n作付強度の向上策：\n・乾季灌漑の導入・拡大（1作→2作）\n・育苗・移植による生育期間短縮（単作期間の短縮による輪換促進）\n・早生品種の利用（収穫後の次作準備期間短縮）\n・灌漑システムの信頼性向上（水が来ない不安による農家の乾季栽培回避を防ぐ）\n\nアフリカの現状：\n多くのアフリカの国営灌漑スキームでは、設計作付強度（150〜200%）に対して実際の作付強度が80〜120%程度にとどまっています。主な原因は、灌漑水の不安定供給・農家の技術・資金不足・市場アクセスの欠如です。作付強度の向上は、既存灌漑施設の活用度を高め、新規開発より低コストで農業生産を増加させる手段として重視されています。","nameEn":"Cropping intensity","summaryEn":"It is the ratio of the total cultivated area to the unit farmland area over a certain period (usually one year). It becomes 100% for one crop per year and 200% for two crops per year. It is an important indicator of productivity and land use efficiency in irrigated agriculture.","detailEn":"Calculation of Cropping Intensity:\nCropping Intensity (%) = (Total Annual Cropped Area ÷ Irrigated Command Area) × 100\n\nExample:\n・Out of 100 ha of command area, 80 ha is cultivated in wet season and 60 ha in dry season\n→ Cropping Intensity = (80 + 60) ÷ 100 × 100 = 140%\n\nMeasures to improve cropping intensity:\n・Introduction and expansion of dry season irrigation (single crop → double crop)\n・Shortening of growing period through nursery raising and transplanting (promoting crop rotation by shortening monocropping period)\n・Use of early-maturing varieties (shortening preparation period for next crop after harvest)\n・Improving reliability of irrigation systems (preventing farmers from avoiding dry season cultivation due to uncertainty of water supply)\n\nCurrent situation in Africa:\nIn many national irrigation schemes in Africa, actual cropping intensity remains at around 80-120% against the designed cropping intensity (150-200%). The main causes are unstable irrigation water supply, farmers' lack of technical knowledge and financial resources, and lack of market access. Improving cropping intensity is emphasized as a means to enhance utilization of existing irrigation facilities and increase agricultural production at lower cost than new development.","image":"","captionJa":"","captionEn":"","published":"","name3":"Intensité de culture","summary3":"Il s'agit du rapport entre la superficie totale cultivée sur une unité de surface agricole pendant une période déterminée (généralement une année). Pour une culture par an, ce taux est de 100%, pour deux cultures par an, il atteint 200%. C'est un indicateur important de la productivité et de l'efficacité d'utilisation des terres en agriculture irriguée.","detail3":"Calcul de l'intensité de culture (Cropping Intensity) :\nIntensité de culture (%) = (Surface totale cultivée annuelle ÷ Surface irriguée bénéficiaire) × 100\n\nExemple :\n・Sur une zone bénéficiaire de 100 ha, 80 ha cultivés en saison des pluies et 60 ha en saison sèche\n→ Intensité de culture = (80 + 60) ÷ 100 × 100 = 140%\n\nStratégies d'amélioration de l'intensité de culture :\n・Introduction et extension de l'irrigation en saison sèche (1 culture → 2 cultures)\n・Réduction de la période de croissance par pépinière et repiquage (promotion de la rotation par raccourcissement de la période de monoculture)\n・Utilisation de variétés précoces (réduction de la période de préparation de la culture suivante après récolte)\n・Amélioration de la fiabilité du système d'irrigation (prévenir l'évitement de la culture en saison sèche par les agriculteurs due à l'inquiétude du manque d'eau)\n\nSituation actuelle en Afrique :\nDans de nombreux périmètres irrigués publics africains, l'intensité de culture réelle reste autour de 80 à 120% par rapport à l'intensité de culture de conception (150 à 200%). Les causes principales sont l'approvisionnement instable en eau d'irrigation, le manque de techniques et de financements des agriculteurs, et l'absence d'accès au marché. L'amélioration de l'intensité de culture est considérée comme un moyen important pour augmenter l'utilisation des infrastructures d'irrigation existantes et accroître la production agricole à moindre coût par rapport aux nouveaux développements.","caption3":"","images":[]},{"rowNum":85,"id":"084","catCode":"CAT05","nameJa":"作物収量","readingJa":"さくもつしゅうりょう","summaryJa":"単位面積（通常1ha）あたりの作物の収穫量です。農業生産性の最も基本的な指標で、灌漑・施肥・品種改良等の農業技術の効果を評価する基準となります。","detailJa":"作物収量の表現と標準値：\n・単位：kg/ha または t/ha\n・アフリカの主要作物の平均収量（FAO, 2022）：\n　- トウモロコシ：アフリカ平均約2.0 t/ha（世界平均5.7 t/ha）\n　- 水稲：アフリカ平均約2.5 t/ha（アジア平均4.5〜6 t/ha）\n　- 小麦：アフリカ平均約2.3 t/ha（世界平均3.5 t/ha）\n　- ソルガム：アフリカ平均約1.4 t/ha\n\n収量格差（Yield Gap）：\n実際の収量と試験農場等での最大達成可能収量との差を「収量格差（Yield Gap）」と呼びます。\n・アフリカの収量格差は潜在的最大収量の50〜80%にも達するとされる（CGIAR研究）\n・主な原因：水ストレス（灌漑不足）・土壌肥沃度の低さ・病害虫・品種・市場インセンティブ\n\n灌漑による収量向上効果：\n・灌漑導入により天水農業の2〜3倍の収量が可能（FAO推計）\n・水ストレスの解消と適時の追肥が収量向上の両輪\n・アフリカの小農への灌漑技術普及が収量格差縮小の鍵","nameEn":"Crop yield","summaryEn":"This is the crop yield per unit area (typically 1 hectare). It is the most fundamental indicator of agricultural productivity and serves as a criterion for evaluating the effectiveness of agricultural technologies such as irrigation, fertilization, and crop improvement.","detailEn":"Crop Yield Expression and Standard Values:\n・Unit: kg/ha or t/ha\n・Average yields of major crops in Africa (FAO, 2022):\n　- Maize: Africa average approximately 2.0 t/ha (world average 5.7 t/ha)\n　- Rice: Africa average approximately 2.5 t/ha (Asia average 4.5-6 t/ha)\n　- Wheat: Africa average approximately 2.3 t/ha (world average 3.5 t/ha)\n　- Sorghum: Africa average approximately 1.4 t/ha\n\nYield Gap:\nThe difference between actual yield and maximum achievable yield at experimental farms is called \"Yield Gap.\"\n・Africa's yield gap is said to reach 50-80% of potential maximum yield (CGIAR research)\n・Main causes: water stress (insufficient irrigation), low soil fertility, pests and diseases, varieties, market incentives\n\nYield Improvement Effects through Irrigation:\n・Introduction of irrigation can achieve 2-3 times the yield of rainfed agriculture (FAO estimate)\n・Relief of water stress and timely fertilizer application are both essential for yield improvement\n・Dissemination of irrigation technology to smallholder farmers in Africa is key to reducing yield gaps","image":"","captionJa":"","captionEn":"","published":"","name3":"Rendement des cultures","summary3":"Il s'agit du rendement des cultures par unité de surface (généralement 1 hectare). C'est l'indicateur le plus fondamental de la productivité agricole et il constitue un critère d'évaluation de l'efficacité des techniques agricoles telles que l'irrigation, la fertilisation et l'amélioration des variétés.","detail3":"Expression et valeurs de référence du rendement des cultures :\n・Unité : kg/ha ou t/ha\n・Rendement moyen des principales cultures en Afrique (FAO, 2022) :\n　- Maïs : moyenne africaine d'environ 2,0 t/ha (moyenne mondiale 5,7 t/ha)\n　- Riz paddy : moyenne africaine d'environ 2,5 t/ha (moyenne asiatique 4,5 à 6 t/ha)\n　- Blé : moyenne africaine d'environ 2,3 t/ha (moyenne mondiale 3,5 t/ha)\n　- Sorgho : moyenne africaine d'environ 1,4 t/ha\n\nÉcart de rendement (Yield Gap) :\nL'écart entre le rendement réel et le rendement maximal réalisable dans les stations expérimentales est appelé « écart de rendement (Yield Gap) ».\n・L'écart de rendement en Afrique atteindrait 50 à 80% du rendement potentiel maximal (recherche CGIAR)\n・Principales causes : stress hydrique (irrigation insuffisante), faible fertilité des sols, ravageurs et maladies, variétés, incitations du marché\n\nEffet d'amélioration du rendement par l'irrigation :\n・L'introduction de l'irrigation permet un rendement 2 à 3 fois supérieur à celui de l'agriculture pluviale (estimation FAO)\n・La résolution du stress hydrique et la fertilisation opportune constituent les deux piliers de l'amélioration du rendement\n・La diffusion des techniques d'irrigation aux petits agriculteurs africains est la clé de la réduction de l'écart de rendement","caption3":"","images":[]},{"rowNum":86,"id":"085","catCode":"CAT06","nameJa":"アルカリ性","readingJa":"あるかりせい","summaryJa":"水溶液中の水酸化物イオン（OH⁻）濃度が水素イオン（H⁺）濃度より高い状態を指し、pHが7を超える状態です。農業用水のpHは作物の生育に直接影響します。","detailJa":"農業用水のアルカリ性は、pH値によって測定されます。pH7が中性で、7以上がアルカリ性、7以下が酸性です。\n\n作物生育への影響：\n・多くの作物はpH 6.0〜7.5の範囲で最もよく育ちます\n・pHが高すぎると（強アルカリ性）、鉄・マンガン・亜鉛などの微量元素が溶けにくくなり、作物が吸収できなくなります\n・アフリカの乾燥地域では蒸発による塩分濃縮でアルカリ性が強まる場合があります\n\nアフリカでの注意点：\nアフリカの多くの地域では、地下水やナイル川・ニジェール川などの水源がアルカリ性を示すことがあります。石灰岩地帯の地下水は特にpHが高くなる傾向があります。石灰質土壌での灌漑では、pH管理が収量確保の重要な要素となります。","nameEn":"Alkaline","summaryEn":"This refers to a state in aqueous solution where the concentration of hydroxide ions (OH⁻) is higher than the concentration of hydrogen ions (H⁺), which is a condition where the pH exceeds 7. The pH of agricultural water directly affects crop growth.","detailEn":"The alkalinity of agricultural water is measured by pH value. pH 7 is neutral, above 7 is alkaline, and below 7 is acidic.\n\nEffects on crop growth:\n• Most crops grow best in the pH range of 6.0 to 7.5\n• When pH is too high (strongly alkaline), microelements such as iron, manganese, and zinc become less soluble and cannot be absorbed by crops\n• In arid regions of Africa, alkalinity may increase due to salt concentration through evaporation\n\nKey considerations in Africa:\nIn many regions of Africa, groundwater and water sources such as the Nile River and Niger River may exhibit alkalinity. Groundwater in limestone areas tends to have particularly high pH levels. In irrigation of calcareous soils, pH management becomes a critical factor for securing yields.","image":"","captionJa":"","captionEn":"","published":"","name3":"Alcalin","summary3":"Cela désigne un état où la concentration d'ions hydroxyde (OH⁻) dans une solution aqueuse est supérieure à la concentration d'ions hydrogène (H⁺), soit un état où le pH dépasse 7. Le pH de l'eau agricole influence directement la croissance des cultures.","detail3":"L'alcalinité de l'eau d'irrigation agricole est mesurée par la valeur du pH. Un pH de 7 est neutre, supérieur à 7 est alcalin, et inférieur à 7 est acide.\n\nImpact sur la croissance des cultures :\n• La plupart des cultures se développent le mieux dans une gamme de pH de 6,0 à 7,5\n• Lorsque le pH est trop élevé (fortement alcalin), les oligoéléments tels que le fer, le manganèse et le zinc deviennent moins solubles et ne peuvent plus être absorbés par les cultures\n• Dans les régions arides d'Afrique, l'alcalinité peut s'intensifier en raison de la concentration des sels par évaporation\n\nPoints d'attention en Afrique :\nDans de nombreuses régions d'Afrique, les eaux souterraines et les sources d'eau comme le Nil et le fleuve Niger peuvent présenter une alcalinité. Les eaux souterraines des zones calcaires ont particulièrement tendance à avoir un pH élevé. Dans l'irrigation sur sols calcaires, la gestion du pH devient un élément crucial pour assurer le rendement.","caption3":"","images":[]},{"rowNum":87,"id":"086","catCode":"CAT06","nameJa":"排水","readingJa":"はいすい","summaryJa":"農地や灌漑地域から余剰水を排除するための仕組みおよびプロセスです。適切な排水管理は、土壌の過湿や塩類集積を防ぐために不可欠です。","detailJa":"排水の種類：\n・表面排水（地表排水）：地表に滞留した余剰水を排水路で排除する方法\n・暗渠排水：地下に設置した管や溝によって土壌中の余剰水を排除する方法\n・開渠排水：開放型の水路で排水する方法\n\n農業排水の重要性：\n・土壌の通気性を保ち、根腐れを防ぐ\n・作物の収穫・農作業のための土壌強度を維持する\n・過剰な灌漑による塩類集積を防ぐ（淡水による塩分の洗い出し）\n\nアフリカでの課題：\nアフリカのサブサハラ地域では排水インフラが不十分なケースが多く、雨季の湛水による作物被害が頻発します。特にナイル川流域やサヘル地帯では、排水設計が灌漑プロジェクトの成否を左右する重要な要素です。","nameEn":"Drainage","summaryEn":"It is a system and process for removing excess water from agricultural land and irrigated areas. Proper drainage management is essential to prevent soil waterlogging and salt accumulation.","detailEn":"Types of Drainage:\n・Surface drainage: A method of removing surplus water accumulated on the ground surface through drainage channels\n・Subsurface drainage: A method of removing surplus water from soil through pipes or ditches installed underground\n・Open channel drainage: A method of drainage using open-type waterways\n\nImportance of Agricultural Drainage:\n・Maintains soil aeration and prevents root rot\n・Maintains soil strength for crop harvesting and agricultural operations\n・Prevents salt accumulation due to excessive irrigation (leaching of salts with fresh water)\n\nChallenges in Africa:\nIn sub-Saharan Africa, drainage infrastructure is often inadequate, leading to frequent crop damage due to waterlogging during the rainy season. Particularly in the Nile River basin and the Sahel region, drainage design is a critical factor that determines the success or failure of irrigation projects.","image":"","captionJa":"","captionEn":"","published":"","name3":"évacuation des eaux usées","summary3":"Il s'agit du mécanisme et du processus pour évacuer l'eau excédentaire des terres agricoles et des zones irriguées. Une gestion appropriée du drainage est indispensable pour prévenir l'excès d'humidité du sol et l'accumulation de sels.","detail3":"Types de drainage :\n• Drainage de surface (drainage superficiel) : méthode d'évacuation des eaux excédentaires stagnant à la surface par des canaux de drainage\n• Drainage souterrain : méthode d'évacuation des eaux excédentaires dans le sol par des tuyaux ou des fossés installés sous terre\n• Drainage à ciel ouvert : méthode de drainage par des canaux ouverts\n\nImportance du drainage agricole :\n• Maintenir l'aération du sol et prévenir le pourrissement des racines\n• Maintenir la résistance du sol pour la récolte et les travaux agricoles\n• Prévenir l'accumulation de sels due à l'irrigation excessive (lessivage des sels par l'eau douce)\n\nDéfis en Afrique :\nDans la région subsaharienne de l'Afrique, les infrastructures de drainage sont souvent insuffisantes, et les dommages aux cultures causés par la submersion pendant la saison des pluies se produisent fréquemment. Particulièrement dans le bassin du Nil et la zone du Sahel, la conception du drainage est un élément crucial qui détermine le succès ou l'échec des projets d'irrigation.","caption3":"","images":[]},{"rowNum":88,"id":"087","catCode":"CAT06","nameJa":"塩水","readingJa":"えんすい","summaryJa":"塩類（主にナトリウム・カルシウム・マグネシウムなどの塩化物や硫酸塩）が高濃度で溶け込んだ水を指します。農業用水として使用すると土壌劣化と作物被害をもたらします。","detailJa":"塩水の基準と測定：\n・電気伝導度（EC）で測定します（単位：dS/m またはmS/cm）\n・農業用水の塩分濃度の目安：\n  - EC < 0.7 dS/m：塩害なし（ほとんどの作物に適合）\n  - EC 0.7〜3.0 dS/m：塩分耐性の低い作物に影響\n  - EC > 3.0 dS/m：多くの作物に被害\n  - EC > 8.0 dS/m：耐塩性作物のみ栽培可能\n\nFAO・WHO基準（農業灌漑用水の塩分管理）：\nFAOガイドライン（1985年、Ayers & Westcot）では、ECによる水質分類と適用可能な作物を詳細に定めています。\n\nアフリカでの状況：\nサハラ以南アフリカの沿岸地域や乾燥地帯では、地下水の塩分濃度が高い地域が多く存在します。特にエチオピア、ケニア、タンザニアのリフトバレー地域では高塩分の地下水が問題となっています。海水浸入による沿岸地域の帯水層の塩水化も深刻な課題です。","nameEn":"Salt water","summaryEn":"This refers to water with high concentrations of dissolved salts (primarily chlorides and sulfates of sodium, calcium, magnesium, and other elements). When used as agricultural irrigation water, it causes soil degradation and crop damage.","detailEn":"Salinity Standards and Measurement:\n・Measured by electrical conductivity (EC) (units: dS/m or mS/cm)\n・Guidelines for salinity concentration in agricultural water:\n  - EC < 0.7 dS/m: No salinity hazard (suitable for most crops)\n  - EC 0.7-3.0 dS/m: Effects on salt-sensitive crops\n  - EC > 3.0 dS/m: Damage to many crops\n  - EC > 8.0 dS/m: Only salt-tolerant crops can be cultivated\n\nFAO・WHO Standards (Salinity Management for Agricultural Irrigation Water):\nThe FAO Guidelines (1985, Ayers & Westcot) provide detailed water quality classification by EC and applicable crops.\n\nSituation in Africa:\nMany areas with high groundwater salinity exist in coastal regions and arid zones of sub-Saharan Africa. High-salinity groundwater is particularly problematic in the Rift Valley regions of Ethiopia, Kenya, and Tanzania. Salinization of coastal aquifers due to seawater intrusion is also a serious challenge.","image":"","captionJa":"","captionEn":"","published":"","name3":"Eau salée","summary3":"L'eau qui contient une forte concentration de sels (principalement des chlorures et des sulfates de sodium, calcium, magnésium, etc.). Son utilisation comme eau d'irrigation agricole entraîne une dégradation des sols et des dommages aux cultures.","detail3":"Normes et mesure de l'eau salée :\n• Mesurée par la conductivité électrique (CE) (unités : dS/m ou mS/cm)\n• Indicateurs de la concentration saline de l'eau agricole :\n  - CE < 0,7 dS/m : absence de dommages salins (convient à la plupart des cultures)\n  - CE 0,7~3,0 dS/m : affecte les cultures à faible tolérance saline\n  - CE > 3,0 dS/m : dommages à de nombreuses cultures\n  - CE > 8,0 dS/m : seules les cultures halophytes peuvent être cultivées\n\nNormes FAO・OMS (gestion de la salinité de l'eau d'irrigation agricole) :\nLes directives de la FAO (1985, Ayers & Westcot) définissent en détail la classification de la qualité de l'eau par CE et les cultures applicables.\n\nSituation en Afrique :\nDans les régions côtières et les zones arides de l'Afrique subsaharienne, de nombreuses régions présentent une forte concentration saline des eaux souterraines. En particulier, dans les régions de la vallée du Rift en Éthiopie, au Kenya et en Tanzanie, les eaux souterraines à haute salinité constituent un problème. La salinisation des aquifères des régions côtières due à l'intrusion d'eau de mer représente également un défi majeur.","caption3":"","images":[]},{"rowNum":89,"id":"088","catCode":"CAT01","nameJa":"湛水灌漑","readingJa":"たんすいかんがい","summaryJa":"農地が水で覆われた状態、または農地に意図的に水を溜める灌漑方法を指します。水稲栽培では必須の技術ですが、過剰な湛水は排水不良や塩類集積を引き起こします。","detailJa":"湛水の目的別分類：\n1. 水稲栽培のための湛水：水稲は一般に田植え後から出穂期にかけて5〜10cmの湛水を維持します\n2. 土壌洗浄（脱塩）のための湛水：塩類が集積した土壌に水を貯め、塩分を下方へ溶脱させます\n3. 雑草抑制のための湛水：湛水状態により好気性雑草の発芽を抑制します\n\n湛水と水質の関係：\n・長期湛水により土壌は嫌気性（酸素不足）状態になり、還元状態となります\n・還元状態では鉄・マンガンが可溶化し、排水に含まれて環境汚染の原因になることがあります\n・湛水の水質基準（pH、EC等）は非湛水灌漑より緩やかな場合があります\n\nアフリカでの水稲灌漑：\n西アフリカ（マリ、ギニアなど）では湛水水稲栽培が広く行われています。ニジェール川内陸デルタのオフィス・デュ・ニジェール（マリ）は大規模湛水稲作地帯の代表例です。","nameEn":"Flood irrigation","summaryEn":"This refers to a state where farmland is covered with water, or an irrigation method that intentionally retains water on agricultural land. While it is an essential technique in paddy rice cultivation, excessive flooding can cause poor drainage and salt accumulation.","detailEn":"Classification of flooding by purpose:\n1. Flooding for rice cultivation: Rice generally maintains 5-10 cm of flooding from after transplanting to the heading stage\n2. Flooding for soil leaching (desalination): Water is stored in soil with accumulated salts to leach salinity downward\n3. Flooding for weed control: Flooding conditions suppress the germination of aerobic weeds\n\nRelationship between flooding and water quality:\n・Long-term flooding causes soil to become anaerobic (oxygen-deficient) and reach a reduced state\n・Under reduced conditions, iron and manganese become soluble and can be contained in drainage water, potentially causing environmental pollution\n・Water quality standards for flooding (pH, EC, etc.) may be more lenient than those for non-flooded irrigation\n\nRice irrigation in Africa:\nFlooded rice cultivation is widely practiced in West Africa (Mali, Guinea, etc.). The Office du Niger in Mali's Niger River Inland Delta is a representative example of large-scale flooded rice cultivation areas.","image":"","captionJa":"","captionEn":"","published":"","name3":"irrigation par submersion","summary3":"Cela désigne l'état où les terres agricoles sont recouvertes d'eau, ou une méthode d'irrigation consistant à retenir intentionnellement l'eau sur les terres agricoles. Il s'agit d'une technique indispensable pour la culture du riz aquatique, mais une submersion excessive provoque un mauvais drainage et une accumulation de sels.","detail3":"Classification des submersions par objectif :\n1. Submersion pour la culture du riz paddy : le riz paddy maintient généralement une submersion de 5 à 10 cm depuis la transplantation jusqu'à l'épiaison\n2. Submersion pour le lessivage des sols (dessalage) : l'eau est retenue dans les sols où les sels se sont accumulés pour lessiver la salinité vers le bas\n3. Submersion pour la suppression des mauvaises herbes : l'état de submersion supprime la germination des mauvaises herbes aérobies\n\nRelation entre submersion et qualité de l'eau :\n・La submersion prolongée rend le sol anaérobie (manque d'oxygène) et crée un état de réduction\n・Dans l'état de réduction, le fer et le manganèse se solubilisent et peuvent être contenus dans les eaux de drainage, causant une pollution environnementale\n・Les normes de qualité de l'eau pour la submersion (pH, CE, etc.) peuvent être plus souples que pour l'irrigation non submergée\n\nIrrigation rizicole en Afrique :\nEn Afrique de l'Ouest (Mali, Guinée, etc.), la riziculture submergée est largement pratiquée. L'Office du Niger dans le delta intérieur du fleuve Niger (Mali) est un exemple représentatif de grande zone rizicole submergée.","caption3":"","images":[]},{"rowNum":90,"id":"089","catCode":"CAT06","nameJa":"溶脱","readingJa":"ようだつ","summaryJa":"水が土壌中を浸透する際に、塩類・栄養素・化学物質などを溶かしながら下層へ運ぶ現象です。塩害防止には意図的な溶脱（脱塩灌漑）が利用されますが、過剰な溶脱は栄養素の流亡をもたらします。","detailJa":"溶脱の農業的役割：\n1. 脱塩（有益な溶脱）：塩類が集積した土壌に余剰水を与え、塩分を地下へ洗い出す操作\n   - 溶脱必要量（Leaching Requirement, LR）として計算・管理します\n   - LR = ECw ÷ (5×ECe - ECw)（FAOの計算式）\n     （ECw：灌漑水のEC、ECe：飽和抽出液のEC）\n2. 栄養素流亡（有害な溶脱）：過剰灌漑により窒素・カリウムなどが根圏から流亡し、収量低下や地下水汚染を招きます\n\nアフリカの乾燥・半乾燥地域での重要性：\n年間降水量が少なく蒸発散が多いサヘル地帯やホーン・オブ・アフリカでは、塩類が土壌表層に集積しやすく、脱塩溶脱は灌漑農業維持の基本技術です。ただし、溶脱用の余分な灌漑水の確保が水資源の乏しい地域では課題となります。","nameEn":"Leaching","summaryEn":"This is the phenomenon where water carries dissolved salts, nutrients, and chemicals to lower layers as it infiltrates through soil. Intentional leaching (desalination irrigation) is used for salt damage prevention, but excessive leaching causes nutrient loss.","detailEn":"Agricultural Role of Leaching:\n1. Desalination (Beneficial Leaching): An operation that applies excess water to salt-accumulated soil to wash salts downward into the subsurface\n   - Calculated and managed as Leaching Requirement (LR)\n   - LR = ECw ÷ (5×ECe - ECw) (FAO formula)\n     (ECw: EC of irrigation water, ECe: EC of saturated extract)\n2. Nutrient Loss (Harmful Leaching): Excessive irrigation causes nitrogen, potassium, and other nutrients to leach from the root zone, leading to yield reduction and groundwater contamination\n\nImportance in Africa's Arid and Semi-Arid Regions:\nIn the Sahel and Horn of Africa, where annual precipitation is low and evapotranspiration is high, salts tend to accumulate in the soil surface layer, making desalination leaching a fundamental technology for maintaining irrigated agriculture. However, securing additional irrigation water for leaching poses challenges in regions with scarce water resources.","image":"","captionJa":"","captionEn":"","published":"","name3":"lixiviation","summary3":"Il s'agit d'un phénomène où l'eau, en s'infiltrant dans le sol, dissout et transporte vers les couches inférieures les sels, les éléments nutritifs et les substances chimiques. Pour la prévention de la salinisation, on utilise un lessivage intentionnel (irrigation de dessalement), mais un lessivage excessif entraîne la perte d'éléments nutritifs.","detail3":"Rôle agricole du lessivage :\n1. Dessalement (lessivage bénéfique) : opération consistant à apporter de l'eau excédentaire aux sols où les sels se sont accumulés, afin de lessiver la salinité vers les couches souterraines\n   - Calculé et géré comme besoin de lessivage (Leaching Requirement, LR)\n   - LR = ECw ÷ (5×ECe - ECw) (formule de calcul de la FAO)\n     (ECw : CE de l'eau d'irrigation, ECe : CE de l'extrait de saturation)\n2. Perte d'éléments nutritifs (lessivage nuisible) : l'irrigation excessive entraîne la perte d'azote, de potassium et autres éléments de la rhizosphère, causant une baisse de rendement et une pollution des eaux souterraines\n\nImportance dans les régions arides et semi-arides d'Afrique :\nDans la zone sahélienne et la Corne de l'Afrique où les précipitations annuelles sont faibles et l'évapotranspiration élevée, les sels tendent à s'accumuler dans les couches superficielles du sol, et le lessivage de dessalement constitue une technique fondamentale pour maintenir l'agriculture irriguée. Cependant, l'approvisionnement en eau d'irrigation supplémentaire pour le lessivage représente un défi dans les régions où les ressources en eau sont limitées.","caption3":"","images":[]},{"rowNum":91,"id":"090","catCode":"CAT06","nameJa":"水質汚染","readingJa":"すいしつおせん","summaryJa":"農業用水として利用する水源（河川・地下水・ため池など）が、工業排水・農薬・肥料・生活排水・病原菌などによって汚染され、作物生産や人体に悪影響を与える状態です。","detailJa":"農業用水の主要汚染源：\n1. 微生物汚染：大腸菌・サルモネラ菌・寄生虫卵など（野菜の生食による食中毒リスク）\n2. 化学汚染：\n   - 重金属（カドミウム・鉛・ヒ素）：鉱山廃水や工業排水から\n   - 農薬・除草剤残留：農地からの流出\n   - 硝酸塩：過剰な化学肥料や家畜排泄物から\n3. 物理的汚染：\n   - 浮遊物質（SS）・濁り：土壌侵食による\n   - 高温水：工業冷却水の流入\n\nWHO・FAO基準（主要パラメータ）：\n・大腸菌（E. coli）：≤1,000 CFU/100mL（野菜灌漑）\n・重金属：カドミウム0.01mg/L以下、ヒ素0.1mg/L以下など\n・硝酸塩：50mg/L以下（EU基準）\n\nアフリカでの課題：\n急速な都市化と工業化により、アフリカ多くの河川で農業用水の水質汚染が深刻化しています。特に鉱業活動が活発な地域（南アフリカ、ザンビア、コンゴなど）では、重金属汚染が農業・健康リスクとして問題になっています。","nameEn":"Water pollution","summaryEn":"Water sources used for agricultural irrigation (rivers, groundwater, reservoirs, etc.) become contaminated by industrial wastewater, pesticides, fertilizers, domestic wastewater, pathogens, and other pollutants, resulting in adverse effects on crop production and human health.","detailEn":"Major Sources of Agricultural Water Contamination:\n1. Microbial contamination: E. coli, Salmonella, parasite eggs, etc. (food poisoning risk from raw vegetable consumption)\n2. Chemical contamination:\n   - Heavy metals (cadmium, lead, arsenic): from mine wastewater and industrial effluent\n   - Pesticide and herbicide residues: runoff from agricultural land\n   - Nitrates: from excessive chemical fertilizers and livestock excrement\n3. Physical contamination:\n   - Suspended solids (SS) and turbidity: due to soil erosion\n   - High-temperature water: inflow of industrial cooling water\n\nWHO/FAO Standards (Key Parameters):\n・E. coli: ≤1,000 CFU/100mL (vegetable irrigation)\n・Heavy metals: Cadmium ≤0.01mg/L, Arsenic ≤0.1mg/L, etc.\n・Nitrates: ≤50mg/L (EU standards)\n\nChallenges in Africa:\nRapid urbanization and industrialization have led to serious water quality contamination of agricultural water in many African rivers. Particularly in regions with active mining activities (South Africa, Zambia, Congo, etc.), heavy metal contamination has become a problem as agricultural and health risks.","image":"","captionJa":"","captionEn":"","published":"","name3":"Pollution de l'eau","summary3":"Les sources d'eau utilisées pour l'irrigation agricole (cours d'eau, eaux souterraines, bassins de retenue, etc.) sont contaminées par les effluents industriels, les pesticides, les engrais, les eaux usées domestiques, les agents pathogènes, etc., créant un état qui affecte négativement la production agricole et la santé humaine.","detail3":"Principales sources de contamination de l'eau d'irrigation agricole :\n1. Contamination microbienne : Escherichia coli, Salmonella, œufs de parasites, etc. (risque d'intoxication alimentaire par consommation de légumes crus)\n2. Contamination chimique :\n   - Métaux lourds (cadmium, plomb, arsenic) : provenant des eaux usées minières et des effluents industriels\n   - Résidus de pesticides et herbicides : ruissellement des terres agricoles\n   - Nitrates : provenant d'un excès d'engrais chimiques ou d'excréments de bétail\n3. Contamination physique :\n   - Matières en suspension (MES) et turbidité : causées par l'érosion des sols\n   - Eaux à haute température : infiltration d'eaux de refroidissement industrielles\n\nNormes OMS/FAO (paramètres principaux) :\n・E. coli : ≤1 000 UFC/100mL (irrigation des légumes)\n・Métaux lourds : cadmium ≤0,01mg/L, arsenic ≤0,1mg/L, etc.\n・Nitrates : ≤50mg/L (norme UE)\n\nDéfis en Afrique :\nEn raison de l'urbanisation et de l'industrialisation rapides, la contamination de la qualité de l'eau d'irrigation agricole s'aggrave gravement dans de nombreux cours d'eau africains. En particulier, dans les régions où l'activité minière est intensive (Afrique du Sud, Zambie, Congo, etc.), la contamination par les métaux lourds pose problème en tant que risque agricole et sanitaire.","caption3":"","images":[]},{"rowNum":92,"id":"091","catCode":"CAT06","nameJa":"農業用水の水質基準","readingJa":"のうぎょうようすいのすいしつきじゅん","summaryJa":"灌漑用水の物理的・化学的・生物学的特性を定めたもので、作物の生産性と農業環境の保全に関係します。各国の基準では微生物学的・化学的・物理的パラメータが規制されています。","detailJa":"主要なパラメータ（FAO/WHO基準）：\n1. 微生物学的パラメータ\n・大腸菌（E. coli）：根菜類や葉物野菜の生食用灌漑では≤1,000 CFU/100mL\n・WHO（2006年）はリスクレベル別の多段階基準を提示\n\n2. 化学的パラメータ\n・塩分濃度（EC）：0.7 dS/m以下（無制限使用）、3.0 dS/m以上（塩害リスク）\n・pH：6.0〜8.5の範囲が一般的な適正値\n・重金属：カドミウム0.01mg/L、ヒ素0.1mg/L、鉛5.0mg/L など\n・硝酸態窒素（NO₃-N）：30mg/L以下が目安\n\n3. 物理的パラメータ\n・濁度（TSS）：50〜100mg/L以下（点滴灌漑では特に重要）\n\n主要国・地域の規制：\n・日本：農林水産省「農業用水要望水質（水稲）」（1970年）\n・EU：EU規制2020/741（処理排水の農業再利用基準、4段階クラスA〜D）\n・アメリカ：FDA FSMA農業用水基準（幾何平均126 CFU/100mL以下）\n・WHO：1973年初版→1989年→2006年改訂ガイドライン（世界基準の参考）\n\nアフリカへの適用：\n2020年時点で70か国以上が農業用水質基準を整備。アフリカ各国ではFAO/WHO基準を参考に自国の実情に合わせた基準策定が進んでいます。アフリカ諸国では水質検査体制の整備も重要な課題です。","nameEn":"Agricultural Water Quality Standards","summaryEn":"This defines the physical, chemical, and biological characteristics of irrigation water, which relates to crop productivity and agricultural environmental conservation. Standards in each country regulate microbiological, chemical, and physical parameters.","detailEn":"Key Parameters (FAO/WHO Standards):\n1. Microbiological Parameters\n・E. coli: ≤1,000 CFU/100mL for irrigation of root vegetables and leafy vegetables for raw consumption\n・WHO (2006) presents multi-stage standards by risk level\n\n2. Chemical Parameters\n・Salinity (EC): ≤0.7 dS/m (unrestricted use), ≥3.0 dS/m (salt damage risk)\n・pH: 6.0-8.5 range is generally appropriate\n・Heavy metals: Cadmium 0.01mg/L, Arsenic 0.1mg/L, Lead 5.0mg/L, etc.\n・Nitrate nitrogen (NO₃-N): ≤30mg/L as guideline\n\n3. Physical Parameters\n・Turbidity (TSS): ≤50-100mg/L (particularly important for drip irrigation)\n\nRegulations in Major Countries/Regions:\n・Japan: Ministry of Agriculture, Forestry and Fisheries \"Desired Water Quality for Agricultural Water (Rice)\" (1970)\n・EU: EU Regulation 2020/741 (Standards for agricultural reuse of treated wastewater, 4-tier classes A-D)\n・USA: FDA FSMA agricultural water standards (geometric mean ≤126 CFU/100mL)\n・WHO: First edition 1973 → 1989 → 2006 revised guidelines (reference for global standards)\n\nApplication to Africa:\nAs of 2020, more than 70 countries have established agricultural water quality standards. African countries are advancing the development of standards adapted to their national circumstances with reference to FAO/WHO standards. Establishing water quality testing systems is also an important challenge for African countries.","image":"","captionJa":"","captionEn":"","published":"","name3":"Normes de qualité de l'eau d'irrigation agricole","summary3":"Il s'agit de la définition des caractéristiques physiques, chimiques et biologiques de l'eau d'irrigation, qui sont liées à la productivité des cultures et à la conservation de l'environnement agricole. Les normes de chaque pays réglementent les paramètres microbiologiques, chimiques et physiques.","detail3":"Paramètres principaux (normes FAO/OMS) :\n1. Paramètres microbiologiques\n・Escherichia coli (E. coli) : ≤1 000 UFC/100mL pour l'irrigation des légumes-racines et légumes-feuilles destinés à la consommation crue\n・L'OMS (2006) présente des normes multi-niveaux selon les niveaux de risque\n\n2. Paramètres chimiques\n・Concentration saline (CE) : ≤0,7 dS/m (usage illimité), ≥3,0 dS/m (risque de salinisation)\n・pH : plage de 6,0 à 8,5 généralement considérée comme valeur appropriée\n・Métaux lourds : cadmium 0,01mg/L, arsenic 0,1mg/L, plomb 5,0mg/L, etc.\n・Azote nitrique (NO₃-N) : ≤30mg/L comme référence\n\n3. Paramètres physiques\n・Turbidité (MES) : ≤50-100mg/L (particulièrement important pour l'irrigation goutte-à-goutte)\n\nRéglementations des principaux pays/régions :\n・Japon : « Qualité d'eau souhaitée pour l'eau d'irrigation agricole (riziculture) » du ministère de l'Agriculture, des Forêts et de la Pêche (1970)\n・UE : Règlement UE 2020/741 (normes de réutilisation agricole des eaux usées traitées, 4 niveaux classes A à D)\n・États-Unis : Normes d'eau agricole FDA FSMA (≤126 UFC/100mL en moyenne géométrique)\n・OMS : Première édition 1973 → 1989 → Directives révisées 2006 (référence pour les normes mondiales)\n\nApplication en Afrique :\nEn 2020, plus de 70 pays ont établi des normes de qualité de l'eau agricole. Les pays africains progressent dans l'élaboration de normes adaptées à leur situation nationale en se référant aux normes FAO/OMS. L'amélioration des systèmes de contrôle de la qualité de l'eau constitue également un enjeu important pour les pays africains.","caption3":"","images":[]},{"rowNum":93,"id":"092","catCode":"CAT06","nameJa":"土壌塩分","readingJa":"どじょうえんぶん","summaryJa":"土壌中に蓄積した塩類（食塩・硫酸塩・炭酸塩など）の濃度を指します。過剰な土壌塩分は作物の水分吸収を妨げ、収量低下・枯死をもたらします。灌漑農業において最も重要な土壌劣化問題の一つです。","detailJa":"土壌塩分の測定と指標：\n・飽和抽出液電気伝導度（ECe）：土壌塩分の標準的指標（単位：dS/m）\n  - ECe < 2 dS/m：ほとんどの作物に問題なし\n  - ECe 2〜4 dS/m：塩分感受性の高い作物（イチゴ・ニンジンなど）に被害\n  - ECe 4〜8 dS/m：多くの作物に収量低下\n  - ECe > 8 dS/m：耐塩性作物（ナツメヤシ・大麦など）のみ栽培可能\n\n土壌塩分の発生原因：\n1. 一次塩類化：元来の鉱物が風化・溶解して塩類が生成（自然プロセス）\n2. 二次塩類化（人為的）：排水不良な土地への過剰灌漑により地下水位が上昇し、塩類が地表に集積\n\nアフリカの土壌塩分問題：\nアフリカでは約4,500万haの農地が塩類化の影響を受けており、特にエジプトのナイルデルタ、ソマリア・ケニアの沿岸低地、南アフリカのカルー地方などで深刻です。不適切な灌漑管理による二次塩類化が主要な土地劣化要因となっています。\n\n対策：\n・排水改善（暗渠設置）\n・脱塩灌漑（余剰水による塩分洗い出し）\n・耐塩性品種の導入\n・石膏（ガイプサム）施用","nameEn":"Soil salinity","summaryEn":"This refers to the concentration of salts (sodium chloride, sulfates, carbonates, etc.) accumulated in soil. Excessive soil salinity impedes crop water uptake, leading to yield reduction and plant death. It is one of the most important soil degradation problems in irrigated agriculture.","detailEn":"Measurement and Indicators of Soil Salinity:\n・Electrical Conductivity of Saturated Extract (ECe): Standard indicator of soil salinity (unit: dS/m)\n  - ECe < 2 dS/m: No problem for most crops\n  - ECe 2-4 dS/m: Damage to highly salt-sensitive crops (strawberries, carrots, etc.)\n  - ECe 4-8 dS/m: Yield reduction in many crops\n  - ECe > 8 dS/m: Only salt-tolerant crops (date palm, barley, etc.) can be cultivated\n\nCauses of Soil Salinity:\n1. Primary salinization: Salt formation through weathering and dissolution of original minerals (natural process)\n2. Secondary salinization (anthropogenic): Groundwater level rises due to excessive irrigation on poorly drained land, causing salt accumulation at the surface\n\nSoil Salinity Problems in Africa:\nApproximately 45 million hectares of agricultural land in Africa are affected by salinization, with particularly severe problems in Egypt's Nile Delta, coastal lowlands of Somalia and Kenya, and South Africa's Karoo region. Secondary salinization due to inappropriate irrigation management has become a major cause of land degradation.\n\nCountermeasures:\n・Drainage improvement (subsurface drainage installation)\n・Leaching irrigation (salt removal through excess water)\n・Introduction of salt-tolerant varieties\n・Gypsum application","image":"","captionJa":"","captionEn":"","published":"","name3":"Salinité du sol","summary3":"Cela désigne la concentration des sels accumulés dans le sol (chlorure de sodium, sulfates, carbonates, etc.). Un excès de salinité du sol entrave l'absorption d'eau par les cultures et entraîne une diminution des rendements et le dépérissement des plantes. Il s'agit de l'un des problèmes de dégradation des sols les plus importants dans l'agriculture irriguée.","detail3":"Mesure et indicateurs de la salinité des sols :\n・Conductivité électrique de l'extrait de saturation (CEe) : indicateur standard de la salinité des sols (unité : dS/m)\n  - CEe < 2 dS/m : aucun problème pour la plupart des cultures\n  - CEe 2-4 dS/m : dommages aux cultures très sensibles au sel (fraises, carottes, etc.)\n  - CEe 4-8 dS/m : diminution du rendement pour de nombreuses cultures\n  - CEe > 8 dS/m : seules les cultures tolérantes au sel (palmiers dattiers, orge, etc.) peuvent être cultivées\n\nCauses de la salinité des sols :\n1. Salinisation primaire : génération de sels par altération et dissolution de minéraux originels (processus naturel)\n2. Salinisation secondaire (anthropique) : remontée de la nappe phréatique due à un excès d'irrigation sur des terres mal drainées, entraînant l'accumulation de sels en surface\n\nProblème de salinité des sols en Afrique :\nEn Afrique, environ 45 millions d'hectares de terres agricoles sont affectés par la salinisation, particulièrement grave dans le delta du Nil en Égypte, les basses terres côtières de Somalie et du Kenya, et la région du Karoo en Afrique du Sud. La salinisation secondaire due à une gestion inappropriée de l'irrigation constitue un facteur majeur de dégradation des terres.\n\nMesures correctives :\n・Amélioration du drainage (installation de drains souterrains)\n・Irrigation de dessalement (lessivage des sels par excès d'eau)\n・Introduction de variétés tolérantes au sel\n・Application de gypse","caption3":"","images":[]},{"rowNum":94,"id":"093","catCode":"CAT06","nameJa":"塩分","readingJa":"えんぶん","summaryJa":"水や土壌に溶け込んでいるナトリウム・カルシウム・マグネシウム・塩化物・硫酸塩などの無機塩類の総称です。農業用水の塩分濃度は作物の収量と土壌の長期的な生産能力に大きな影響を与えます。","detailJa":"塩分の組成と分類：\n1. 主要な塩類イオン：\n・陽イオン：Na⁺（ナトリウム）、Ca²⁺（カルシウム）、Mg²⁺（マグネシウム）、K⁺（カリウム）\n・陰イオン：Cl⁻（塩化物）、SO₄²⁻（硫酸塩）、HCO₃⁻（重炭酸塩）、CO₃²⁻（炭酸塩）\n\n2. 塩分の測定方法：\n・電気伝導度（EC）：最も一般的、単位はdS/m（デシジーメンス/メートル）またはmS/cm\n・総溶解固形物（TDS）：EC × 640 ≒ TDS（mg/L）の概算換算が使用される\n・塩分濃度（‰）：海水は約35‰（電気伝導度約55 dS/m）\n\n3. 作物への塩分影響メカニズム（浸透圧ストレス）：\n塩分が高いと土壌水の浸透圧が上がり、作物の根が水を吸収しにくくなります（生理的干ばつ）。さらにナトリウムイオンの過剰摂取は葉の焼け（イオン毒性）を引き起こします。\n\nアフリカ農業における塩分管理：\nFAOの調査では、世界の灌漑農地の約20%が塩分の悪影響を受けており、アフリカではその割合がさらに高い地域があります。適切な水質モニタリングと排水設計が持続的農業の基盤です。","nameEn":"Salt content","summaryEn":"This is a general term for inorganic salts such as sodium, calcium, magnesium, chloride, and sulfate that are dissolved in water and soil. The salinity concentration of agricultural water significantly affects crop yields and the long-term productive capacity of soil.","detailEn":"Salinity Composition and Classification:\n1. Major Salt Ions:\n• Cations: Na⁺ (sodium), Ca²⁺ (calcium), Mg²⁺ (magnesium), K⁺ (potassium)\n• Anions: Cl⁻ (chloride), SO₄²⁻ (sulfate), HCO₃⁻ (bicarbonate), CO₃²⁻ (carbonate)\n\n2. Salinity Measurement Methods:\n• Electrical Conductivity (EC): Most common, units are dS/m (deciSiemens per meter) or mS/cm\n• Total Dissolved Solids (TDS): Approximate conversion of EC × 640 ≒ TDS (mg/L) is used\n• Salinity concentration (‰): Seawater is approximately 35‰ (electrical conductivity approximately 55 dS/m)\n\n3. Salinity Impact Mechanism on Crops (Osmotic Stress):\nWhen salinity is high, the osmotic pressure of soil water increases, making it difficult for crop roots to absorb water (physiological drought). Furthermore, excessive sodium ion uptake causes leaf burn (ion toxicity).\n\nSalinity Management in African Agriculture:\nAccording to FAO surveys, approximately 20% of the world's irrigated farmland is adversely affected by salinity, with some regions in Africa having even higher percentages. Proper water quality monitoring and drainage design are the foundation of sustainable agriculture.","image":"","captionJa":"","captionEn":"","published":"","name3":"Sel","summary3":"C'est un terme générique désignant les sels inorganiques tels que le sodium, le calcium, le magnésium, les chlorures et les sulfates dissous dans l'eau et le sol. La concentration en sel de l'eau d'irrigation agricole a un impact considérable sur le rendement des cultures et la capacité de production à long terme du sol.","detail3":"Composition et classification de la salinité :\n1. Principaux ions salins :\n・Cations : Na⁺ (sodium), Ca²⁺ (calcium), Mg²⁺ (magnésium), K⁺ (potassium)\n・Anions : Cl⁻ (chlorure), SO₄²⁻ (sulfate), HCO₃⁻ (bicarbonate), CO₃²⁻ (carbonate)\n\n2. Méthodes de mesure de la salinité :\n・Conductivité électrique (CE) : la plus courante, unité en dS/m (déciSiemens/mètre) ou mS/cm\n・Total des solides dissous (TDS) : la conversion approximative CE × 640 ≒ TDS (mg/L) est utilisée\n・Concentration saline (‰) : l'eau de mer est d'environ 35‰ (conductivité électrique d'environ 55 dS/m)\n\n3. Mécanisme d'impact de la salinité sur les cultures (stress osmotique) :\nLorsque la salinité est élevée, la pression osmotique de l'eau du sol augmente, rendant difficile l'absorption d'eau par les racines des cultures (sécheresse physiologique). De plus, l'absorption excessive d'ions sodium provoque des brûlures foliaires (toxicité ionique).\n\nGestion de la salinité dans l'agriculture africaine :\nSelon les enquêtes de la FAO, environ 20% des terres agricoles irriguées mondiales sont affectées par les impacts négatifs de la salinité, et en Afrique, certaines régions présentent des proportions encore plus élevées. Un monitoring approprié de la qualité de l'eau et une conception de drainage adéquate constituent les fondements d'une agriculture durable.","caption3":"","images":[]},{"rowNum":95,"id":"094","catCode":"CAT06","nameJa":"ソーダ性","readingJa":"そーだせい","summaryJa":"土壌や水中に占めるナトリウムイオン（Na⁺）の割合が異常に高い状態を指します。ソーダ性土壌は構造が崩壊して透水性・通気性が悪化し、農地として利用不能になることがあります。","detailJa":"ソーダ性の指標：\n1. ナトリウム吸着比（SAR：Sodium Adsorption Ratio）：\n   灌漑水のナトリウム性を評価する指標\n   SAR = Na⁺ ÷ √[(Ca²⁺ + Mg²⁺) / 2]（イオン濃度はmmol/Lで計算）\n   \n   FAO基準による水質分類：\n   ・SAR < 10：ソーダ性リスク低（制限なし使用可能）\n   ・SAR 10〜18：ソーダ性リスク中程度（要注意）\n   ・SAR > 18：ソーダ性リスク高（使用に重大な制限）\n\n2. 交換性ナトリウム比率（ESP：Exchangeable Sodium Percentage）：\n   土壌の陽イオン交換容量に占めるNa⁺の割合\n   ・ESP > 15%：ソーダ性土壌（Sodic soil）と分類\n\nソーダ性土壌の特徴と問題：\n・土壌粘土粒子が分散・膨張し、団粒構造が破壊される\n・透水性が著しく低下（透水係数が1/10以下になることも）\n・乾燥すると土壌が板状に固結し、耕起が困難になる\n・表面にアルカリ性の白い被膜（白色ソーダ）が生じる\n\nアフリカでの発生地域と対策：\nエジプト、エチオピア、南アフリカなどのアルカリ性地下水を多用する地域でソーダ性土壌が問題となっています。石膏（硫酸カルシウム）の施用によりナトリウムをカルシウムで置換する改良工法が広く使われています。","nameEn":"Sodicity","summaryEn":"This refers to a condition where the proportion of sodium ions (Na⁺) in soil or water is abnormally high. Sodic soils undergo structural collapse, resulting in deteriorated permeability and aeration, which can render agricultural land unusable.","detailEn":"Sodicity Indicators:\n1. Sodium Adsorption Ratio (SAR):\n   An indicator for evaluating the sodium content of irrigation water\n   SAR = Na⁺ ÷ √[(Ca²⁺ + Mg²⁺) / 2] (ion concentrations calculated in mmol/L)\n   \n   Water quality classification based on FAO standards:\n   ・SAR < 10: Low sodicity risk (unrestricted use)\n   ・SAR 10-18: Moderate sodicity risk (caution required)\n   ・SAR > 18: High sodicity risk (severe restrictions on use)\n\n2. Exchangeable Sodium Percentage (ESP):\n   The percentage of Na⁺ in the soil's cation exchange capacity\n   ・ESP > 15%: Classified as sodic soil\n\nCharacteristics and Problems of Sodic Soils:\n・Soil clay particles disperse and swell, destroying aggregate structure\n・Permeability decreases significantly (hydraulic conductivity can drop to 1/10 or less)\n・Upon drying, soil hardens into plate-like formations, making cultivation difficult\n・Alkaline white films (white alkali) form on the surface\n\nOccurrence Areas and Countermeasures in Africa:\nSodic soils are problematic in regions such as Egypt, Ethiopia, and South Africa where alkaline groundwater is extensively used. Improvement methods involving the application of gypsum (calcium sulfate) to replace sodium with calcium are widely employed.","image":"","captionJa":"","captionEn":"","published":"","name3":"Sodicité","summary3":"Les sols sodiques désignent un état où la proportion d'ions sodium (Na⁺) dans le sol ou l'eau est anormalement élevée. Les sols sodiques subissent une dégradation structurale qui entraîne une détérioration de la perméabilité et de l'aération, pouvant les rendre inutilisables comme terres agricoles.","detail3":"Indicateurs de sodicité :\n\n1. Rapport d'adsorption du sodium (SAR : Sodium Adsorption Ratio) :\n   Indicateur pour évaluer la sodicité de l'eau d'irrigation\n   SAR = Na⁺ ÷ √[(Ca²⁺ + Mg²⁺) / 2] (concentration ionique calculée en mmol/L)\n   \n   Classification de la qualité de l'eau selon les critères FAO :\n   ・SAR < 10 : Risque de sodicité faible (utilisation sans restriction)\n   ・SAR 10〜18 : Risque de sodicité modéré (attention requise)\n   ・SAR > 18 : Risque de sodicité élevé (restrictions importantes à l'utilisation)\n\n2. Pourcentage de sodium échangeable (ESP : Exchangeable Sodium Percentage) :\n   Proportion de Na⁺ dans la capacité d'échange cationique du sol\n   ・ESP > 15% : Classifié comme sol sodique (Sodic soil)\n\nCaractéristiques et problèmes des sols sodiques :\n・Les particules argileuses du sol se dispersent et gonflent, détruisant la structure grumeleuse\n・Diminution drastique de la perméabilité (le coefficient de perméabilité peut chuter à moins d'1/10)\n・En séchant, le sol se solidifie en plaques, rendant le labour difficile\n・Formation d'un film blanc alcalin en surface (soude blanche)\n\nZones d'occurrence et contre-mesures en Afrique :\nLes sols sodiques posent problème dans les régions utilisant massivement les eaux souterraines alcalines comme l'Égypte, l'Éthiopie et l'Afrique du Sud. La méthode d'amélioration par application de gypse (sulfate de calcium) pour remplacer le sodium par le calcium est largement utilisée.","caption3":"","images":[]},{"rowNum":96,"id":"095","catCode":"CAT07","nameJa":"水ガバナンス","readingJa":"みずがばなんす","summaryJa":"水資源の配分・利用・保全に関する意思決定の仕組み・制度・プロセス全般を指します。政府・民間・市民社会が水に関するルールをどのように定め・実施・監視するかの枠組みです。","detailJa":"水ガバナンスの主要要素：\n・法制度：水資源法・灌漑法・環境法等の制度的枠組み\n・組織・機関：水資源管理機関・河川流域機関・地方政府の役割と権限\n・意思決定プロセス：ステークホルダー参加・透明性・説明責任\n・情報と知識：水文データ、水利用情報の共有・公開\n・財政メカニズム：水関連インフラへの投資・料金制度\n\n良い水ガバナンスの条件（OECDの原則）：\n・効果性：水資源・水サービス管理の目標達成\n・効率性：コスト・便益のバランス\n・信頼性と参加：ステークホルダーの参加と信頼確保\n・公平性：恵まれない人々のアクセス確保\n\nアフリカの水ガバナンスの課題：\n・複数の省庁・機関による所管分散（農業省・水省・環境省等）\n・農村地域での法制度の実施能力不足\n・農家・女性・少数民族の意思決定参加の欠如\n・上流国と下流国間の国際水ガバナンスの課題（ナイル川・ニジェール川等）\n\n水ガバナンス改革の事例：\n南アフリカは1998年水法により、水は公共の財として国が管理する原則を確立。流域管理機関（Catchment Management Agency）の設立と農家参加型管理を推進しています。","nameEn":"Water Governance","summaryEn":"This refers to the overall mechanisms, institutions, and processes for decision-making regarding the allocation, utilization, and conservation of water resources. It is a framework for how government, private sector, and civil society establish, implement, and monitor water-related rules.","detailEn":"Key Elements of Water Governance:\n・Legal frameworks: Institutional frameworks including water resources law, irrigation law, environmental law, etc.\n・Organizations and institutions: Roles and authorities of water resource management agencies, river basin organizations, and local governments\n・Decision-making processes: Stakeholder participation, transparency, and accountability\n・Information and knowledge: Sharing and disclosure of hydrological data and water use information\n・Financial mechanisms: Investment in water-related infrastructure and tariff systems\n\nConditions for Good Water Governance (OECD Principles):\n・Effectiveness: Achievement of water resource and water service management objectives\n・Efficiency: Balance of costs and benefits\n・Trust and engagement: Stakeholder participation and trust building\n・Equity: Ensuring access for disadvantaged populations\n\nChallenges in African Water Governance:\n・Fragmented jurisdiction among multiple ministries and agencies (Ministry of Agriculture, Ministry of Water, Ministry of Environment, etc.)\n・Insufficient implementation capacity of legal frameworks in rural areas\n・Lack of participation by farmers, women, and ethnic minorities in decision-making\n・International water governance challenges between upstream and downstream countries (Nile River, Niger River, etc.)\n\nCase Study of Water Governance Reform:\nSouth Africa established the principle of water as a public good managed by the state through the 1998 Water Act. The country has promoted the establishment of Catchment Management Agencies and participatory management involving farmers.","image":"","captionJa":"","captionEn":"","published":"","name3":"Gouvernance de l'eau","summary3":"La gouvernance de l'eau désigne l'ensemble des mécanismes, institutions et processus de prise de décision concernant la répartition, l'utilisation et la conservation des ressources en eau. Il s'agit du cadre définissant comment les gouvernements, le secteur privé et la société civile établissent, mettent en œuvre et surveillent les règles relatives à l'eau.","detail3":"Éléments clés de la gouvernance de l'eau :\n・Cadre juridique : cadre institutionnel comprenant la loi sur les ressources en eau, la loi sur l'irrigation, la loi environnementale, etc.\n・Organisations et institutions : rôles et pouvoirs des organismes de gestion des ressources en eau, des organismes de bassin versant et des gouvernements locaux\n・Processus de prise de décision : participation des parties prenantes, transparence, responsabilité\n・Information et connaissances : partage et publication des données hydrologiques et des informations sur l'utilisation de l'eau\n・Mécanismes financiers : investissement dans les infrastructures liées à l'eau, système tarifaire\n\nConditions d'une bonne gouvernance de l'eau (principes de l'OCDE) :\n・Efficacité : réalisation des objectifs de gestion des ressources en eau et des services d'eau\n・Efficience : équilibre coûts-bénéfices\n・Fiabilité et participation : participation des parties prenantes et établissement de la confiance\n・Équité : garantie d'accès pour les populations défavorisées\n\nDéfis de la gouvernance de l'eau en Afrique :\n・Dispersion des compétences entre plusieurs ministères et organismes (ministère de l'Agriculture, ministère de l'Eau, ministère de l'Environnement, etc.)\n・Insuffisance des capacités de mise en œuvre du cadre juridique dans les zones rurales\n・Absence de participation des agriculteurs, des femmes et des minorités ethniques dans la prise de décision\n・Défis de gouvernance internationale de l'eau entre pays d'amont et d'aval (Nil, Niger, etc.)\n\nExemples de réforme de la gouvernance de l'eau :\nL'Afrique du Sud a établi en 1998, par la loi sur l'eau, le principe selon lequel l'eau est un bien public géré par l'État. Elle promeut la création d'agences de gestion de bassin versant (Catchment Management Agency) et la gestion participative des agriculteurs.","caption3":"","images":[]},{"rowNum":97,"id":"096","catCode":"CAT07","nameJa":"水配分","readingJa":"みずはいぶん","summaryJa":"複数の利用者・目的・地域間で限られた水資源をいかに分配するかを決定する仕組みとプロセスです。農業・都市・工業・環境等の用途間での優先順位と配分量を定めます。","detailJa":"水配分の原則と方法：\n1. 先占水利（First-come, first-served）：先に使用権を得た者が優先（米国西部等）\n2. 配分割合制（Proportional sharing）：水量に比例して全利用者に配分（渇水時も比例縮小）\n3. 優先順位制：飲料水＞農業＞工業等の優先順位をあらかじめ設定\n4. 交渉・合意制：利用者間の合意によって配分を決定（参加型管理）\n\n国際水配分の問題：\nナイル川を共有するエジプト・スーダン・エチオピア間の水配分は長年の国際問題です。1959年のナイル水条約はエジプト・スーダン間のみで締結され、エチオピアを含む上流国は含まれていませんでした。グランドルネサンスダム建設をめぐる交渉が現在も続いています。\n\n渇水時の水配分：\n渇水時には需要が供給を超えるため、事前に定めた優先順位・削減ルールに基づく配分調整が必要です。「渇水マネジメント計画（Drought Management Plan）」の策定と農家への周知が重要です。\n\nアフリカの流域水配分機関：\nナイル川（ナイル流域イニシアチブ）、ニジェール川（ニジェール川流域機関）、ザンベジ川（ザンベジ川流域機関）等が設立され、国際水配分の調整を担っています。","nameEn":"Water distribution","summaryEn":"It is a mechanism and process for determining how to allocate limited water resources among multiple users, purposes, and regions. It establishes priorities and allocation amounts among uses such as agriculture, urban, industrial, and environmental purposes.","detailEn":"Pr

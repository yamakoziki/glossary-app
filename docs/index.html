単位水量あたりの収量」として表現され、散水効率・送水効率と合わせて農業用水の利用成果を評価します。\n\nアフリカでの分析：\n多くの研究で、アフリカの灌漑農家の技術効率は50〜80%程度で、改善余地が大きいことが示されています。技術普及・農民学校・農業研究の農家への普及が技術効率向上の有効な手段です。","nameEn":"Technical efficiency","summaryEn":"This concept indicates the efficiency of production activities aimed at obtaining maximum output (yield and revenue) from invested resources (water, fertilizer, labor, and capital). It shows the degree to which production approaches technically optimal levels.","detailEn":"Definition and Measurement of Technical Efficiency:\nTechnical Efficiency (TE) = Actual Output ÷ Maximum Technical Output (Frontier Output)\n→ Perfect efficiency = 1.0 (achieving maximum output)\n→ TE = 0.7 means only 70% of the maximum achievable output is being achieved\n\nFactors Affecting Technical Efficiency:\n・Adoption of agricultural technology (improved varieties, appropriate fertilization, irrigation timing)\n・Farmers' technical knowledge and experience\n・Quality of land and water\n・Access to capital and inputs\n・Pest and disease risks and weather risks\n\nWater Use Technical Efficiency:\nTechnical efficiency in irrigation is expressed as \"yield per unit of water\" and is used to evaluate the performance of agricultural water use together with sprinkler efficiency and conveyance efficiency.\n\nAnalysis in Africa:\nMany studies show that the technical efficiency of irrigated farmers in Africa is around 50-80%, indicating significant room for improvement. Technology extension, farmer field schools, and dissemination of agricultural research to farmers are effective means of improving technical efficiency.","image":"","captionJa":"","captionEn":"","published":"","name3":"Efficacité technique","summary3":"C'est un concept qui indique l'efficacité des activités de production pour obtenir le maximum de production (rendement et revenus) à partir des ressources investies (eau, engrais, main-d'œuvre, capital). Il indique le degré d'approche d'une production techniquement optimale.","detail3":"Définition et mesure de l'efficacité technique :\nEfficacité technique (ET) = Production réelle ÷ Production technique maximale (production frontière)\n→ Efficacité parfaite = 1,0 (production maximale atteinte)\n→ ET = 0,7 signifie que seulement 70% de la production maximale réalisable est atteinte\n\nFacteurs influençant l'efficacité technique :\n・Adoption de technologies agricoles (variétés améliorées・fertilisation appropriée・calendrier d'irrigation)\n・Connaissances techniques et expérience des agriculteurs\n・Qualité des terres et de l'eau\n・Accès au capital et aux intrants\n・Risques phytosanitaires et climatiques\n\nEfficacité technique de l'utilisation de l'eau :\nL'efficacité technique en irrigation s'exprime comme « rendement par unité d'eau » et évalue, conjointement avec l'efficacité d'aspersion et l'efficacité de transport, les résultats de l'utilisation de l'eau agricole.\n\nAnalyse en Afrique :\nDe nombreuses études montrent que l'efficacité technique des agriculteurs irrigants africains se situe autour de 50 à 80%, révélant un important potentiel d'amélioration. La vulgarisation technique, les écoles paysannes et la diffusion de la recherche agricole auprès des exploitants constituent des moyens efficaces pour améliorer l'efficacité technique.","caption3":"","images":[]},{"rowNum":116,"id":"115","catCode":"CAT08","nameJa":"ベースライン調査","readingJa":"べーすらいんちょうさ","summaryJa":"プロジェクト開始前に、対象地域・受益者の現状（農業生産量・農家収入・灌漑面積・水管理状況等）を定量的・定性的に把握するための調査です。事業の効果測定・評価の基準データを提供します。","detailJa":"ベースライン調査の目的：\n・プロジェクト前の「0点」のデータを記録する\n・事業完了後・事後評価時に変化量を測定するための比較基準\n・事業のターゲット設定（誰に・何を・どのくらい）の根拠データ\n・ロジカルフレームワーク（Logframe）の指標値の設定\n\nベースライン調査の主要調査項目（農業水管理）：\n・農家の圃場面積・作付け状況・収量・収入\n・現在の灌漑方法と水源\n・農家組合の組織状況・財務状況\n・灌漑施設の状態（水路・取水施設・水門等の状態）\n・水利費の徴収率\n・農家の知識・技術レベル\n\n調査手法：\n・農家アンケート（サンプリング調査）\n・農家インタビュー（KII：Key Informant Interview）\n・フォーカスグループディスカッション（FGD）\n・施設状態の現地踏査\n・既存統計データの収集・整理\n\nジェンダー統計の重要性：\n女性農家・男性農家を分けたデータ収集がジェンダー公平な事業評価に不可欠です。","nameEn":"Baseline survey","summaryEn":"This is a survey to quantitatively and qualitatively understand the current situation of target areas and beneficiaries (agricultural production volume, farm income, irrigated area, water management status, etc.) before project commencement. It provides baseline data for measuring and evaluating project effectiveness.","detailEn":"Purpose of Baseline Survey:\n・Record \"zero point\" data before project implementation\n・Establish comparison standards for measuring changes during post-project completion and ex-post evaluation\n・Provide evidence data for project target setting (who, what, how much)\n・Set indicator values for the Logical Framework (Logframe)\n\nMain Survey Items for Baseline Survey (Agricultural Water Management):\n・Farm field area, cropping patterns, yield, and income of farmers\n・Current irrigation methods and water sources\n・Organizational and financial status of farmers' associations\n・Condition of irrigation facilities (status of canals, water intake facilities, water gates, etc.)\n・Collection rate of water fees\n・Knowledge and technical level of farmers\n\nSurvey Methods:\n・Farmer questionnaire (sampling survey)\n・Farmer interviews (KII: Key Informant Interview)\n・Focus Group Discussions (FGD)\n・Field survey of facility conditions\n・Collection and organization of existing statistical data\n\nImportance of Gender Statistics:\nSeparate data collection for female and male farmers is essential for gender-equitable project evaluation.","image":"","captionJa":"","captionEn":"","published":"","name3":"Enquête de base","summary3":"Il s'agit d'une enquête visant à saisir de manière quantitative et qualitative la situation actuelle de la zone cible et des bénéficiaires (volume de production agricole, revenus des exploitants agricoles, superficie irriguée, état de la gestion de l'eau, etc.) avant le début du projet. Elle fournit les données de référence pour la mesure et l'évaluation des effets du projet.","detail3":"Objectifs de l'enquête de référence :\n• Enregistrer les données du « point zéro » avant le projet\n• Critère de comparaison pour mesurer les changements lors de l'évaluation post-achèvement et ex-post du projet\n• Données de base pour la définition des cibles du projet (à qui, quoi, dans quelle mesure)\n• Définition des valeurs d'indicateurs du cadre logique (Logframe)\n\nPrincipaux éléments d'enquête de l'enquête de référence (gestion de l'eau agricole) :\n• Surface des parcelles, situation des cultures, rendement et revenus des exploitants agricoles\n• Méthodes d'irrigation actuelles et sources d'eau\n• Situation organisationnelle et financière des associations d'agriculteurs\n• État des installations d'irrigation (état des canaux, installations de prise d'eau, écluses, etc.)\n• Taux de recouvrement des redevances d'eau\n• Niveau de connaissances et de compétences techniques des agriculteurs\n\nMéthodes d'enquête :\n• Questionnaire aux agriculteurs (enquête par échantillonnage)\n• Entretiens avec les agriculteurs (KII : Key Informant Interview)\n• Discussions de groupe focalisées (FGD)\n• Enquête de terrain sur l'état des installations\n• Collecte et organisation de données statistiques existantes\n\nImportance des statistiques de genre :\nLa collecte de données séparées entre agricultrices et agriculteurs est indispensable pour une évaluation de projet équitable en termes de genre.","caption3":"","images":[]},{"rowNum":117,"id":"116","catCode":"CAT08","nameJa":"影響評価","readingJa":"えいきょうひょうか","summaryJa":"プロジェクトや政策が引き起こした直接的・間接的な変化（意図した・しないを問わず）を測定・分析する評価手法です。農業収入・食料安全保障・環境・社会構造等の変化を多面的に評価します。","detailJa":"影響評価の種類：\n1. 社会経済影響評価：農家収入・雇用・食料安全保障・ジェンダーへの影響\n2. 環境影響評価（EIA）：生態系・水質・土壌・大気等への影響\n3. 健康影響評価：灌漑関連疾患（マラリア・住血吸虫症等）への影響\n\n比較対照アプローチ：\n影響をプロジェクトの「せいだ」と主張するためには、「プロジェクトなしにどうなっていたか（反事実的状況）」との比較が必要です。\n・比較対照グループ設計（RCT・準実験的手法）\n・差分の差分法（DiD）：前後×介入・非介入の4セル比較\n・傾向スコアマッチング（PSM）：類似した非受益者との比較\n\nアフリカ灌漑プロジェクトの影響評価の知見：\n多くの評価研究で、農家が灌漑にアクセスすることで：\n・農家収入が非灌漑農家より30〜100%高い\n・食料安全保障が改善（食料不足月数の削減）\n・女性の農業参加・収入が増加\nが確認されています（IWMI・世界銀行・JICA評価より）。","nameEn":"Impact Assessment","summaryEn":"This is an evaluation methodology that measures and analyzes direct and indirect changes (whether intended or unintended) caused by projects or policies. It comprehensively evaluates changes in agricultural income, food security, environment, social structures, and other aspects from multiple perspectives.","detailEn":"Types of Impact Assessment:\n1. Socioeconomic Impact Assessment: Impact on farmer income, employment, food security, and gender\n2. Environmental Impact Assessment (EIA): Impact on ecosystems, water quality, soil, atmosphere, etc.\n3. Health Impact Assessment: Impact on irrigation-related diseases (malaria, schistosomiasis, etc.)\n\nComparative Control Approach:\nTo claim that impacts are \"due to\" the project, comparison with \"what would have happened without the project (counterfactual situation)\" is necessary.\n・Comparison control group design (RCT, quasi-experimental methods)\n・Difference-in-Differences (DiD): 4-cell comparison of before/after × intervention/non-intervention\n・Propensity Score Matching (PSM): Comparison with similar non-beneficiaries\n\nFindings from Impact Evaluations of African Irrigation Projects:\nMany evaluation studies have confirmed that when farmers gain access to irrigation:\n・Farmer income is 30-100% higher than non-irrigated farmers\n・Food security improves (reduction in months of food shortage)\n・Women's agricultural participation and income increase\n(Based on evaluations by IWMI, World Bank, and JICA).","image":"","captionJa":"","captionEn":"","published":"","name3":"Évaluation d'impact","summary3":"Il s'agit d'une méthode d'évaluation qui mesure et analyse les changements directs et indirects (qu'ils soient intentionnels ou non) causés par des projets ou des politiques. Elle évalue de manière multidimensionnelle les changements concernant les revenus agricoles, la sécurité alimentaire, l'environnement, les structures sociales, etc.","detail3":"Types d'évaluation d'impact :\n1. Évaluation d'impact socio-économique : impacts sur les revenus agricoles, l'emploi, la sécurité alimentaire et le genre\n2. Évaluation d'impact environnemental (EIE) : impacts sur les écosystèmes, la qualité de l'eau, les sols, l'atmosphère, etc.\n3. Évaluation d'impact sanitaire : impacts sur les maladies liées à l'irrigation (paludisme, schistosomiase, etc.)\n\nApproche comparative :\nPour affirmer que les impacts sont « dus » au projet, il est nécessaire de comparer avec « ce qui se serait passé sans le projet (situation contrefactuelle) ».\n• Conception de groupes de contrôle comparatifs (ECR, méthodes quasi-expérimentales)\n• Méthode des différences de différences (DiD) : comparaison à 4 cellules avant/après × intervention/non-intervention\n• Appariement par score de propension (PSM) : comparaison avec des non-bénéficiaires similaires\n\nConclusions des évaluations d'impact des projets d'irrigation en Afrique :\nDe nombreuses études d'évaluation confirment que l'accès des agriculteurs à l'irrigation permet :\n• Des revenus agricoles 30 à 100% plus élevés que ceux des agriculteurs non irrigants\n• Une amélioration de la sécurité alimentaire (réduction du nombre de mois d'insécurité alimentaire)\n• Une augmentation de la participation des femmes à l'agriculture et de leurs revenus\n(d'après les évaluations de l'IWMI, de la Banque mondiale et de la JICA).","caption3":"","images":[]},{"rowNum":118,"id":"117","catCode":"CAT08","nameJa":"成果評価","readingJa":"せいかひょうか","summaryJa":"プロジェクトの直接的な産出物（アウトプット）や直接的な変化（アウトカム）を測定・評価することです。「何を作ったか」（施設・研修数等）だけでなく「何が変わったか」（農家行動・収量・収入の変化）を重視します。","detailJa":"成果の階層と評価：\nインプット（資源）\n→ アクティビティ（活動）\n→ アウトプット（産出）：施設整備完了km・研修受講者数等\n→ アウトカム（成果）：農家の灌漑技術採用率・収量向上率等\n→ インパクト（影響）：食料安全保障・貧困削減・環境変化\n\nロジカルフレームワーク（Logframe）：\n成果を階層的に整理し、各段階の指標（Indicator）・検証手段（MOV）・前提条件（Assumption）を表として整理するプロジェクト管理ツール。JICA・世界銀行等の国際援助機関で標準的に使用されます。\n\n成果評価の指標例（灌漑プロジェクト）：\n・アウトプット：補修された用水路延長（km）、研修実施回数\n・アウトカム：作付け率（%）、農家の水利費支払い率（%）\n・インパクト：農家世帯収入の増加率（%）、栄養状態の改善\n\n重要な注意点：\nアウトプット（施設が完成した）とアウトカム（農家が実際に水を使って収量が上がった）は別物です。施設完成だけを成功指標にする評価では、持続性や実際の農家への裨益が見えません。","nameEn":"Performance Evaluation","summaryEn":"It is the measurement and evaluation of direct outputs and direct changes (outcomes) of a project. It emphasizes not only \"what was produced\" (facilities, number of training sessions, etc.) but also \"what changed\" (changes in farmer behavior, yield, and income).","detailEn":"Results Hierarchy and Evaluation:\nInput (Resources)\n→ Activity\n→ Output: Completed facility development (km), number of training participants, etc.\n→ Outcome: Farmers' irrigation technology adoption rate, yield improvement rate, etc.\n→ Impact: Food security, poverty reduction, environmental change\n\nLogical Framework (Logframe):\nA project management tool that organizes results hierarchically and systematically arranges indicators, means of verification (MOV), and assumptions for each stage in a table format. It is standardly used by international aid agencies such as JICA and the World Bank.\n\nExamples of Result Evaluation Indicators (Irrigation Project):\n・Output: Length of rehabilitated irrigation channels (km), number of training sessions conducted\n・Outcome: Cropping intensity (%), farmers' water fee payment rate (%)\n・Impact: Increase rate of farm household income (%), improvement in nutritional status\n\nImportant Note:\nOutput (facilities completed) and Outcome (farmers actually using water resulting in increased yields) are different things. Evaluation that uses only facility completion as a success indicator fails to capture sustainability and actual benefits to farmers.","image":"","captionJa":"","captionEn":"","published":"","name3":"Évaluation des résultats","summary3":"Il s'agit de mesurer et d'évaluer les produits directs (outputs) et les changements directs (outcomes) du projet. L'accent est mis non seulement sur « ce qui a été créé » (installations, nombre de formations, etc.) mais aussi sur « ce qui a changé » (changements dans le comportement des agriculteurs, le rendement et les revenus).","detail3":"Hiérarchie des résultats et évaluation :\nIntrants (ressources)\n→ Activités\n→ Extrants (produits) : km d'infrastructures achevées, nombre de participants aux formations, etc.\n→ Effets (résultats) : taux d'adoption des techniques d'irrigation par les agriculteurs, taux d'amélioration du rendement, etc.\n→ Impact : sécurité alimentaire, réduction de la pauvreté, changements environnementaux\n\nCadre logique (Logframe) :\nOutil de gestion de projet qui organise hiérarchiquement les résultats et structure sous forme de tableau les indicateurs, les moyens de vérification (MOV) et les hypothèses de chaque étape. Il est utilisé de manière standard par les organismes d'aide internationale tels que la JICA et la Banque mondiale.\n\nExemples d'indicateurs d'évaluation des résultats (projet d'irrigation) :\n• Extrants : longueur des canaux d'irrigation réparés (km), nombre de sessions de formation réalisées\n• Effets : taux de mise en culture (%), taux de paiement des redevances hydrauliques par les agriculteurs (%)\n• Impact : taux d'augmentation du revenu des ménages agricoles (%), amélioration de l'état nutritionnel\n\nPoint d'attention important :\nLes extrants (les infrastructures sont achevées) et les effets (les agriculteurs utilisent effectivement l'eau et leur rendement augmente) sont deux choses distinctes. Une évaluation qui ne considère que l'achèvement des infrastructures comme indicateur de succès ne permet pas de percevoir la durabilité ni les bénéfices réels pour les agriculteurs.","caption3":"","images":[]},{"rowNum":119,"id":"118","catCode":"CAT08","nameJa":"事業計画","readingJa":"じぎょうけいかく","summaryJa":"灌漑・農業開発事業の実施内容・スケジュール・費用・担当機関・モニタリング方法を詳細に計画した文書です。実施管理の基本ガイドラインとして機能します。","detailJa":"事業計画の主な構成要素：\n・事業概要（目的・場所・規模・受益者）\n・工事・活動の詳細内容と工程（WBS：Work Breakdown Structure）\n・スケジュール（ガントチャート等）\n・予算・資金計画（費目別・年度別）\n・実施体制・役割分担\n・調達計画（資材・機材・サービスの調達方法）\n・モニタリング・評価（M&E）計画\n・リスク管理計画\n\nプロジェクト管理のフレームワーク：\n・PCM（プロジェクトサイクルマネジメント）：JICAが採用する参加型プロジェクト管理手法\n・PMBOKガイド（プロジェクトマネジメント知識体系）：国際標準のPM手法\n・論理フレームワーク（Logframe）：成果の論理構造を明示\n\nアフリカのプロジェクトでの課題：\n計画段階での「楽観的バイアス」（スケジュールや予算を甘く見積もる）が多くのプロジェクトで工期・費用の超過を招いています。リスク分析と余裕（バッファ）を組み込んだ現実的な計画策定が重要です。","nameEn":"Business Plan","summaryEn":"This is a document that provides detailed planning for the implementation content, schedule, costs, responsible agencies, and monitoring methods of irrigation and agricultural development projects. It functions as a basic guideline for implementation management.","detailEn":"Main Components of Business Plan:\n・Business overview (purpose, location, scale, beneficiaries)\n・Detailed contents and processes of construction/activities (WBS: Work Breakdown Structure)\n・Schedule (Gantt chart, etc.)\n・Budget and financial plan (by cost category and fiscal year)\n・Implementation structure and role allocation\n・Procurement plan (procurement methods for materials, equipment, and services)\n・Monitoring and Evaluation (M&E) plan\n・Risk management plan\n\nProject Management Framework:\n・PCM (Project Cycle Management): Participatory project management methodology adopted by JICA\n・PMBOK Guide (Project Management Body of Knowledge): International standard PM methodology\n・Logical Framework (Logframe): Clarifies logical structure of outcomes\n\nChallenges in African Projects:\n\"Optimistic bias\" (underestimating schedules and budgets) during the planning stage leads to schedule and cost overruns in many projects. It is important to develop realistic plans that incorporate risk analysis and buffers.","image":"","captionJa":"","captionEn":"","published":"","name3":"Plan d'affaires","summary3":"Il s'agit d'un document qui planifie en détail le contenu de mise en œuvre, le calendrier, les coûts, les organismes responsables et les méthodes de suivi des projets de développement de l'irrigation et de l'agriculture. Il fonctionne comme guide de base pour la gestion de la mise en œuvre.","detail3":"Principaux éléments constitutifs du plan d'affaires :\n• Aperçu du projet (objectifs, lieu, échelle, bénéficiaires)\n• Contenu détaillé et processus des travaux et activités (WBS : Work Breakdown Structure)\n• Calendrier (diagramme de Gantt, etc.)\n• Budget et plan de financement (par poste budgétaire et par année)\n• Système de mise en œuvre et répartition des rôles\n• Plan d'approvisionnement (méthodes d'approvisionnement en matériaux, équipements et services)\n• Plan de suivi et d'évaluation (S&E)\n• Plan de gestion des risques\n\nCadre de gestion de projet :\n• PCM (Project Cycle Management) : méthode de gestion de projet participative adoptée par la JICA\n• Guide PMBOK (Project Management Body of Knowledge) : méthode de gestion de projet de standard international\n• Cadre logique (Logframe) : clarification de la structure logique des résultats\n\nDéfis dans les projets en Afrique :\nLe « biais d'optimisme » (sous-estimation des délais et budgets) lors de la phase de planification entraîne des dépassements de délais et de coûts dans de nombreux projets. Il est important d'élaborer des plans réalistes intégrant une analyse des risques et des marges de sécurité (buffer).","caption3":"","images":[]},{"rowNum":120,"id":"119","catCode":"CAT08","nameJa":"管理運営計画","readingJa":"かんりうんえいけいかく","summaryJa":"灌漑施設が完成・稼働を開始した後の、施設の日常的な運営（Operation）と維持管理（Maintenance）をどのように実施するかを定めた計画書です。O&M計画ともいいます。","detailJa":"管理運営計画（O&M計画）の内容：\n1.  運営計画：\n・灌漑スケジュール（誰にいつどのくらいの水を配分するか）\n・施設操作手順（水門・ポンプ・バルブの操作標準手順書）\n・緊急時対応手順\n\n2.  維持管理計画：\n・日常維持管理作業（除草・清掃・潤滑等）の頻度・手順・担当者\n・定期点検スケジュールとチェックリスト\n・予防的補修計画（Preventive Maintenance）\n・大規模補修・更新計画（Major Rehabilitation）の時期と費用見積もり\n\n3.  財務計画：\n・年間O&M費用の積算\n・水利費設定額と徴収計画\n・緊急補修用の予備費\n\n4.  組織・人員計画：\n・管理担当者の配置・職務分掌\n・訓練計画\n・政府機関・農家組合との役割分担\n\n重要性：\nO&M計画は「施設が完成してから終わり」ではなく「施設完成は農業発展の始まり」という考え方を実践するための文書です。計画なき維持管理は施設の急速な劣化につながります。","nameEn":"Management and Operations Plan","summaryEn":"This is a plan that defines how to implement the daily operation and maintenance of irrigation facilities after their completion and commencement of operation. It is also called an O&M plan.","detailEn":"Contents of Operation and Maintenance Plan (O&M Plan):\n\n1. Operation Plan:\n・Irrigation schedule (who receives how much water and when)\n・Facility operation procedures (standard operating procedures for gates, pumps, and valves)\n・Emergency response procedures\n\n2. Maintenance Plan:\n・Frequency, procedures, and personnel responsible for routine maintenance work (weeding, cleaning, lubrication, etc.)\n・Periodic inspection schedule and checklists\n・Preventive maintenance plan\n・Timing and cost estimates for major rehabilitation plans\n\n3. Financial Plan:\n・Annual O&M cost estimation\n・Water fee setting and collection plan\n・Reserve funds for emergency repairs\n\n4. Organizational and Personnel Plan:\n・Assignment and job descriptions of management personnel\n・Training plan\n・Role allocation among government agencies and farmers' associations\n\nImportance:\nThe O&M plan is a document to implement the concept that \"completion of facilities is not the end\" but rather \"facility completion is the beginning of agricultural development.\" Maintenance without planning leads to rapid deterioration of facilities.","image":"","captionJa":"","captionEn":"","published":"","name3":"Plan de gestion et d'administration","summary3":"Il s'agit d'un document de planification qui définit comment mettre en œuvre l'exploitation quotidienne (Operation) et la maintenance (Maintenance) des installations après l'achèvement et la mise en service des infrastructures d'irrigation. On l'appelle aussi plan O&M.","detail3":"Contenu du plan de gestion et d'exploitation (plan O&M) :\n\n1. Plan d'exploitation :\n• Programme d'irrigation (qui reçoit quelle quantité d'eau et quand)\n• Procédures d'exploitation des installations (manuel de procédures standard pour l'exploitation des vannes, pompes et valves)\n• Procédures d'intervention d'urgence\n\n2. Plan de maintenance :\n• Fréquence, procédures et responsables des travaux de maintenance courante (désherbage, nettoyage, lubrification, etc.)\n• Programme d'inspection périodique et listes de contrôle\n• Plan de maintenance préventive (Preventive Maintenance)\n• Calendrier et estimation des coûts pour les réparations et rénovations majeures (Major Rehabilitation)\n\n3. Plan financier :\n• Estimation des coûts O&M annuels\n• Montant des redevances hydrauliques et plan de perception\n• Fonds de réserve pour les réparations d'urgence\n\n4. Plan organisationnel et de personnel :\n• Affectation et répartition des tâches des responsables de gestion\n• Plan de formation\n• Répartition des rôles entre organismes gouvernementaux et associations d'agriculteurs\n\nImportance :\nLe plan O&M est un document qui met en pratique la conception selon laquelle « l'achèvement des installations n'est pas une fin en soi » mais « l'achèvement des installations est le début du développement agricole ». Une maintenance sans planification entraîne une détérioration rapide des installations.","caption3":"","images":[]},{"rowNum":121,"id":"120","catCode":"CAT08","nameJa":"実施計画","readingJa":"じっしけいかく","summaryJa":"事業・プロジェクトを実際に遂行するための詳細なスケジュール・作業手順・資源配分計画です。事業計画をより具体的・現場レベルに落とし込んだ実行計画書です。","detailJa":"実施計画の主な内容：\n・作業分解構造（WBS）：事業を詳細な作業単位に分解\n・ガントチャート：各作業の開始・終了時期と担当者\n・資源配分計画：人員・機材・資材の各作業への割り当て\n・調達スケジュール：資材・役務の発注・納入スケジュール\n・品質管理計画：施工品質の確認方法・基準\n・安全管理計画：工事の安全衛生対策\n\nクリティカルパス分析（CPM）：\n複数の並行作業がある場合、全体スケジュールに影響するボトルネック（クリティカルパス）を特定し、重点管理対象とする手法。建設工事のスケジュール管理に広く活用されます。\n\n農業施設建設の特有の課題：\n・農繁期を避けた工事スケジュールの設定（農業用水路工事は灌漑シーズン外に実施）\n・雨季の工事制約（アクセス道路の泥濘等）\n・農家の工事への参加（労働力提供・理解促進）\n\nアフリカのプロジェクトでの課題：\n資材調達の遅延・季節的な悪天候・行政承認の遅れ等によりスケジュール超過が頻発します。リスクを見越したバッファ時間の確保と契約管理の強化が重要です。","nameEn":"Implementation Plan","summaryEn":"This is a detailed schedule, work procedures, and resource allocation plan for actually executing business operations and projects. It is an implementation plan that breaks down the business plan into more specific, field-level details.","detailEn":"Main Contents of Implementation Plan:\n・Work Breakdown Structure (WBS): Decomposing the project into detailed work units\n・Gantt Chart: Start and end timing of each task and responsible personnel\n・Resource Allocation Plan: Assignment of personnel, equipment, and materials to each task\n・Procurement Schedule: Ordering and delivery schedule for materials and services\n・Quality Control Plan: Methods and standards for confirming construction quality\n・Safety Management Plan: Safety and health measures for construction work\n\nCritical Path Method (CPM):\nA methodology to identify bottlenecks (critical path) that affect the overall schedule when multiple parallel tasks exist, and make them priority management targets. It is widely utilized in construction project schedule management.\n\nSpecific Challenges in Agricultural Facility Construction:\n・Setting construction schedules that avoid busy farming seasons (irrigation canal construction is conducted outside irrigation seasons)\n・Construction constraints during rainy seasons (muddy access roads, etc.)\n・Farmer participation in construction work (provision of labor force and promotion of understanding)\n\nChallenges in African Projects:\nSchedule overruns frequently occur due to material procurement delays, seasonal severe weather, administrative approval delays, etc. Securing buffer time in anticipation of risks and strengthening contract management are important.","image":"","captionJa":"","captionEn":"","published":"","name3":"Plan de mise en œuvre","summary3":"Il s'agit d'un calendrier détaillé, de procédures de travail et d'un plan d'allocation des ressources pour l'exécution effective d'une activité ou d'un projet. C'est un plan d'exécution qui transpose le plan d'affaires de manière plus concrète et au niveau opérationnel.","detail3":"Contenu principal du plan de mise en œuvre :\n• Structure de répartition du travail (SRT) : décomposition du projet en unités de travail détaillées\n• Diagramme de Gantt : dates de début et de fin de chaque tâche et responsables\n• Plan d'allocation des ressources : attribution du personnel, équipements et matériaux à chaque tâche\n• Calendrier d'approvisionnement : planning de commande et de livraison des matériaux et services\n• Plan de gestion de la qualité : méthodes et critères de vérification de la qualité de construction\n• Plan de gestion de la sécurité : mesures de sécurité et d'hygiène du chantier\n\nAnalyse du chemin critique (CPM) :\nEn cas de travaux parallèles multiples, méthode consistant à identifier les goulots d'étranglement (chemin critique) qui affectent le planning global et à en faire l'objet d'une gestion prioritaire. Cette méthode est largement utilisée dans la gestion des plannings de travaux de construction.\n\nDéfis spécifiques à la construction d'installations agricoles :\n• Établissement d'un planning de travaux évitant les périodes de forte activité agricole (les travaux de canaux d'irrigation agricole sont réalisés en dehors de la saison d'irrigation)\n• Contraintes de travaux pendant la saison des pluies (boue sur les routes d'accès, etc.)\n• Participation des agriculteurs aux travaux (fourniture de main-d'œuvre, promotion de la compréhension)\n\nDéfis dans les projets en Afrique :\nLes dépassements de planning sont fréquents en raison de retards d'approvisionnement en matériaux, d'intempéries saisonnières, de retards d'approbations administratives, etc. Il est important de prévoir des temps de réserve anticipant les risques et de renforcer la gestion contractuelle.","caption3":"","images":[]},{"rowNum":122,"id":"121","catCode":"CAT08","nameJa":"防災計画","readingJa":"ぼうさいけいかく","summaryJa":"灌漑施設・農業インフラが洪水・地滑り・干ばつ等の自然災害によって被害を受けることを防ぎ、万一被害が生じた際に迅速に復旧するための事前の備えと手順を定めた計画です。","detailJa":"農業水管理における防災の対象：\n1.  洪水リスク：\n・取水施設・水路の洪水による決壊・損傷\n・農地の浸水による作物被害\n・対策：設計洪水流量の適切な設定・余水吐の整備・早期警報システム\n\n2.  干ばつリスク：\n・水源の枯渇による農業用水不足\n・対策：渇水時の配分優先順位・補助水源の確保・節水技術の普及\n\n3.  地滑り・侵食リスク：\n・水路沿いの斜面崩壊\n・対策：植生保護・法面保護・ドレーン設置\n\n4.  施設被害リスク：\n・地震・強風・堆砂等による施設損傷\n・対策：耐震・耐風設計・定期点検・緊急補修体制\n\n気候変動対応との統合：\n気候変動により極端気象（洪水・干ばつ）の頻度・強度が増大しており、防災計画は「過去の最大被害」ではなく「将来の気候変動リスク」を考慮した設計が必要です。\n\nアフリカの農村防災：\nサヘル地帯の干ばつ・東アフリカの洪水等、アフリカは自然災害リスクが高い地域です。早期警報システム・地域住民の防災訓練・農家の多様化戦略（複数水源・複数作物）が重要な対策です。","nameEn":"Disaster Prevention Plan","summaryEn":"This is a plan that establishes advance preparations and procedures to prevent irrigation facilities and agricultural infrastructure from being damaged by natural disasters such as floods, landslides, and droughts, and to enable rapid recovery in the event that damage does occur.","detailEn":"Disaster Prevention Targets in Agricultural Water Management:\n\n1. Flood Risk:\n・Collapse and damage of intake facilities and irrigation channels due to flooding\n・Crop damage from farmland inundation\n・Countermeasures: Appropriate setting of design flood discharge, development of spillways, early warning systems\n\n2. Drought Risk:\n・Agricultural water shortage due to water source depletion\n・Countermeasures: Distribution priority during water scarcity, securing auxiliary water sources, promotion of water-saving technologies\n\n3. Landslide and Erosion Risk:\n・Slope collapse along irrigation channels\n・Countermeasures: Vegetation protection, slope protection, drain installation\n\n4. Facility Damage Risk:\n・Facility damage due to earthquakes, strong winds, sediment accumulation, etc.\n・Countermeasures: Earthquake-resistant and wind-resistant design, regular inspections, emergency repair systems\n\nIntegration with Climate Change Response:\nClimate change is increasing the frequency and intensity of extreme weather events (floods and droughts), requiring disaster prevention plans to consider \"future climate change risks\" rather than \"past maximum damage\" in their design.\n\nRural Disaster Prevention in Africa:\nAfrica is a region with high natural disaster risks, including droughts in the Sahel region and floods in East Africa. Key countermeasures include early warning systems, disaster prevention training for local communities, and diversification strategies for farmers (multiple water sources and multiple crops).","image":"","captionJa":"","captionEn":"","published":"","name3":"Plan de prévention des catastrophes","summary3":"Il s'agit d'un plan qui définit les préparations et procédures préalables pour prévenir les dommages causés aux installations d'irrigation et aux infrastructures agricoles par les catastrophes naturelles telles que les inondations, les glissements de terrain et la sécheresse, et pour assurer une restauration rapide en cas de dommages.","detail3":"Objets de la prévention des catastrophes dans la gestion de l'eau agricole :\n\n1. Risque d'inondation :\n・Rupture et dommages des installations de captage d'eau et des canaux dus aux inondations\n・Dégâts aux cultures causés par l'inondation des terres agricoles\n・Mesures : définition appropriée du débit de crue de conception, aménagement de déversoirs, système d'alerte précoce\n\n2. Risque de sécheresse :\n・Pénurie d'eau agricole due au tarissement des sources d'eau\n・Mesures : priorités de répartition en période de sécheresse, sécurisation de sources d'eau auxiliaires, diffusion des techniques d'économie d'eau\n\n3. Risque de glissement de terrain et d'érosion :\n・Effondrement des pentes le long des canaux\n・Mesures : protection de la végétation, protection des talus, installation de drains\n\n4. Risque de dommages aux installations :\n・Dommages aux installations causés par les séismes, vents forts, ensablement, etc.\n・Mesures : conception antisismique et résistante au vent, inspections périodiques, système de réparation d'urgence\n\nIntégration avec l'adaptation au changement climatique :\nLe changement climatique augmente la fréquence et l'intensité des phénomènes météorologiques extrêmes (inondations, sécheresses), et les plans de prévention des catastrophes nécessitent une conception qui prend en compte non pas les « dommages maximaux du passé » mais les « risques futurs du changement climatique ».\n\nPrévention des catastrophes rurales en Afrique :\nL'Afrique est une région à haut risque de catastrophes naturelles, avec les sécheresses dans la zone sahélienne, les inondations en Afrique de l'Est, etc. Les systèmes d'alerte précoce, la formation des communautés locales à la prévention des catastrophes, et les stratégies de diversification des agriculteurs (sources d'eau multiples, cultures multiples) constituent des mesures importantes.","caption3":"","images":[]},{"rowNum":123,"id":"122","catCode":"CAT08","nameJa":"施設更新計画","readingJa":"しせつこうしんけいかく","summaryJa":"灌漑施設の耐用年数を考慮した上で、将来の設備・構造物の更新・改良をいつ・どのように・どの費用で行うかを長期的に計画したものです。施設の持続的機能と財政持続可能性の両立を図ります。","detailJa":"施設更新計画の内容：\n・主要施設の耐用年数と更新時期の整理\n　（例：コンクリート水路50年、ポンプ15年、電気設備20年、ゲート25年）\n・更新費用の長期推計（年次・設備別）\n・更新資金の積立計画（減価償却基金・準備金）\n・優先順位の設定（老朽化の激しい施設から順次更新）\n・更新時の機能改良（効率向上・省エネ化）の検討\n\n施設老朽化の現状（アフリカ）：\nアフリカの多くの灌漑施設は1960〜80年代に建設されたもので、耐用年数を超えた老朽施設が多いです。更新費用の積立がなく、突発的な施設崩壊・機能不全が発生しています。\n\n施設更新費用の財源：\n・農家負担（水利費からの積立）\n・政府予算（特別補助・一般会計）\n・ドナー支援（リハビリプロジェクト）\n・民間投資（コンセッション・PPP）\n\nPPP（官民連携）の活用：\n大規模灌漑施設の更新に民間投資を活用するPPP（Public-Private Partnership）が一部アフリカ諸国で試みられていますが、農業水利分野では収益性が低く普及は限定的です。","nameEn":"Facility Renewal Plan","summaryEn":"This is a long-term plan that considers the service life of irrigation facilities and determines when, how, and at what cost future equipment and structure renewal and improvement should be carried out. It aims to achieve both sustainable facility functionality and fiscal sustainability.","detailEn":"Contents of Facility Renewal Plan:\n・Organization of service life and renewal timing of major facilities\n　(Examples: concrete channels 50 years, pumps 15 years, electrical equipment 20 years, gates 25 years)\n・Long-term projection of renewal costs (by year and equipment type)\n・Reserve fund accumulation plan for renewal (depreciation fund and reserves)\n・Priority setting (sequential renewal starting from severely deteriorated facilities)\n・Examination of functional improvements during renewal (efficiency enhancement and energy saving)\n\nCurrent Status of Facility Deterioration (Africa):\nMany irrigation facilities in Africa were constructed in the 1960s-1980s, with numerous aging facilities exceeding their service life. Without accumulated renewal funds, sudden facility collapse and functional failures are occurring.\n\nFinancial Sources for Facility Renewal Costs:\n・Farmer burden (accumulation from water user fees)\n・Government budget (special subsidies and general account)\n・Donor support (rehabilitation projects)\n・Private investment (concessions and PPP)\n\nUtilization of PPP (Public-Private Partnership):\nPPP (Public-Private Partnership) utilizing private investment for renewal of large-scale irrigation facilities has been attempted in some African countries, but adoption is limited due to low profitability in the agricultural water management sector.","image":"","captionJa":"","captionEn":"","published":"","name3":"Plan de renouvellement des installations","summary3":"Il s'agit d'un plan à long terme qui détermine quand, comment et à quel coût effectuer le renouvellement et l'amélioration des équipements et structures futurs, en tenant compte de la durée de vie utile des installations d'irrigation. Il vise à concilier le maintien durable des fonctions des installations et la viabilité financière.","detail3":"Contenu du plan de renouvellement des installations :\n• Organisation de la durée de vie utile et des périodes de renouvellement des installations principales\n　(Exemple : canaux en béton 50 ans, pompes 15 ans, équipements électriques 20 ans, vannes 25 ans)\n• Estimation à long terme des coûts de renouvellement (par année et par équipement)\n• Plan d'accumulation des fonds de renouvellement (fonds d'amortissement et réserves)\n• Définition des priorités (renouvellement progressif en commençant par les installations les plus dégradées)\n• Examen des améliorations fonctionnelles lors du renouvellement (amélioration de l'efficacité et économies d'énergie)\n\nÉtat actuel de la vétusté des installations (Afrique) :\nDe nombreuses installations d'irrigation en Afrique ont été construites dans les années 1960-80, et beaucoup d'installations vétustes ont dépassé leur durée de vie utile. En l'absence d'accumulation de fonds pour les coûts de renouvellement, des effondrements soudains d'installations et des dysfonctionnements se produisent.\n\nSources de financement des coûts de renouvellement des installations :\n• Charge des agriculteurs (accumulation à partir des redevances hydrauliques)\n• Budget gouvernemental (subventions spéciales et budget général)\n• Aide des bailleurs de fonds (projets de réhabilitation)\n• Investissement privé (concession et PPP)\n\nUtilisation des PPP (partenariats public-privé) :\nLes PPP (Public-Private Partnership) utilisant l'investissement privé pour le renouvellement des grandes installations d'irrigation sont tentés dans certains pays africains, mais leur diffusion reste limitée en raison de la faible rentabilité dans le domaine de l'hydraulique agricole.","caption3":"","images":[]},{"rowNum":124,"id":"123","catCode":"CAT08","nameJa":"営農計画","readingJa":"えいのうけいかく","summaryJa":"灌漑農地で実施する農業（作物栽培・飼育・加工等）の内容・方法・スケジュールを体系的に計画したものです。何を・いつ・どこで・どのように生産し、どこに売るかの全体設計です。","detailJa":"営農計画の主な内容：\n・作付計画：作物種類・品種・作付け時期・面積配分\n・灌漑計画：灌漑方法・スケジュール・水量計画\n・施肥計画：肥料種類・施用量・施用時期\n・病害虫・雑草管理計画\n・農機具・労働力計画\n・出荷・販売計画（市場・価格・出荷時期）\n・収益計算（農業収益の見通し）\n\n営農計画と灌漑計画の整合：\n営農計画の作付け内容が灌漑水需要（月別）を決定し、灌漑計画の水利用可能量が営農計画の実現性を制約します。両者の整合を確認することがプロジェクト設計の基本です。\n\nアフリカの小農への営農支援：\n多くのアフリカの小農は営農計画を明示的には持っていませんが、農業普及（Extension）を通じた営農指導（作付け・施肥・市場情報の提供）が農業生産性向上の核心的支援です。農家学校（FFS）での体験学習も営農計画能力の向上に貢献しています。\n\n市場志向の営農計画：\n灌漑農業の収益性を高めるためには、「生産できるものを作る」から「市場が求めるものを生産する」への転換が重要です。市場調査・バリューチェーン分析と営農計画の統合が農家収益向上の鍵です。","nameEn":"Agricultural Management Plan","summaryEn":"This is a systematic plan for the content, methods, and schedule of agricultural activities (crop cultivation, livestock raising, processing, etc.) conducted on irrigated farmland. It is an overall design that determines what to produce, when, where, how to produce it, and where to sell it.","detailEn":"Main Components of Farming Plans:\n・Cropping plan: crop types, varieties, planting schedules, area allocation\n・Irrigation plan: irrigation methods, schedules, water volume planning\n・Fertilization plan: fertilizer types, application rates, application timing\n・Pest, disease, and weed management plan\n・Agricultural machinery and labor planning\n・Shipping and marketing plan (markets, prices, shipping schedules)\n・Revenue calculation (agricultural income projections)\n\nIntegration of Farming Plans and Irrigation Plans:\nThe cropping content of farming plans determines irrigation water demand (by month), while the available water volume in irrigation plans constrains the feasibility of farming plans. Ensuring consistency between both is fundamental to project design.\n\nAgricultural Support for Smallholder Farmers in Africa:\nWhile many smallholder farmers in Africa do not explicitly have farming plans, agricultural extension providing farming guidance (cropping, fertilization, and market information) is core support for improving agricultural productivity. Experiential learning at Farmer Field Schools (FFS) also contributes to improving farming planning capabilities.\n\nMarket-Oriented Farming Plans:\nTo enhance the profitability of irrigated agriculture, it is important to shift from \"growing what can be produced\" to \"producing what the market demands.\" The integration of market research, value chain analysis, and farming plans is key to improving farmer income.","image":"","captionJa":"","captionEn":"","published":"","name3":"Plan d'exploitation agricole","summary3":"C'est une planification systématique du contenu, des méthodes et du calendrier des activités agricoles (culture des récoltes, élevage, transformation, etc.) mises en œuvre sur les terres agricoles irriguées. Il s'agit d'une conception globale de ce qui sera produit, quand, où et comment, ainsi que des lieux de vente.","detail3":"Contenu principal du plan cultural :\n• Plan d'assolement : types de cultures, variétés, périodes de plantation, répartition des superficies\n• Plan d'irrigation : méthodes d'irrigation, calendrier, plan de distribution d'eau\n• Plan de fertilisation : types d'engrais, doses d'application, périodes d'application\n• Plan de gestion des maladies, ravageurs et mauvaises herbes\n• Plan de matériel agricole et de main-d'œuvre\n• Plan d'expédition et de commercialisation (marchés, prix, périodes d'expédition)\n• Calcul de rentabilité (perspectives de revenus agricoles)\n\nCohérence entre le plan cultural et le plan d'irrigation :\nLe contenu d'assolement du plan cultural détermine la demande en eau d'irrigation (mensuelle), et la disponibilité en eau du plan d'irrigation limite la faisabilité du plan cultural. La vérification de la cohérence entre ces deux éléments constitue la base de la conception de projet.\n\nAppui cultural aux petits exploitants africains :\nBien que de nombreux petits exploitants africains ne disposent pas explicitement de plans culturaux, l'orientation agricole par la vulgarisation (Extension) - fourniture d'informations sur l'assolement, la fertilisation et les marchés - constitue un soutien essentiel à l'amélioration de la productivité agricole. L'apprentissage expérientiel dans les écoles paysannes (FFS) contribue également à l'amélioration des capacités de planification agricole.\n\nPlan cultural orienté marché :\nPour améliorer la rentabilité de l'agriculture irriguée, il est important de passer de « produire ce qui peut être produit » à « produire ce que demande le marché ». L'intégration de l'étude de marché, de l'analyse de la chaîne de valeur et du plan cultural constitue la clé de l'amélioration des revenus des exploitants.","caption3":"","images":[]},{"rowNum":125,"id":"124","catCode":"CAT08","nameJa":"レジリエンス","readingJa":"れじりえんす","summaryJa":"気候変動・干ばつ・洪水・市場変動・紛争等の外部ショックや長期的な変化に対して、農業システム・農家・コミュニティが「耐え・適応し・変革する」能力を指します。","detailJa":"農業レジリエンスの3要素：\n1. 耐性（Robustness）：衝撃が来ても崩壊しない強さ\n2. 回復力（Rapidity/Recovery）：衝撃後に素早く回復する能力\n3. 冗長性（Redundancy）：代替手段・多様性による衝撃吸収\n\nレジリエンスを高める農業水管理の戦略：\n・水源の多様化：地下水・ため池・雨水収集を組み合わせ、1つの水源が失われても対応できる\n・節水技術の導入：限られた水から最大の生産を得る（干ばつ時の生産維持）\n・耐乾性品種の採用：水ストレスに強い品種で干ばつリスクを軽減\n・農業保険：天候変動リスクを保険でカバー\n・農家組合の強化：コミュニティの相互支援による回復力向上\n\nアフリカでのレジリエンス事業：\n気候変動適応を主目的とした「Climate-Smart Agriculture（CSA：気候スマート農業）」がアフリカで広く普及しています。FAO・世界銀行・JICAがCSAと灌漑開発の統合的アプローチを推進しています。\n\nレジリエンスと持続性：\n持続可能性（Sustainability）が「現状を長期維持すること」とすると、レジリエンスは「変化する環境の中で変化しながら機能し続けること」であり、より動態的な概念です。","nameEn":"Resilience","summaryEn":"This refers to the capacity of agricultural systems, farmers, and communities to \"withstand, adapt to, and transform\" in response to external shocks and long-term changes such as climate change, droughts, floods, market fluctuations, and conflicts.","detailEn":"Three Elements of Agricultural Resilience:\n1. Robustness: Strength to withstand shocks without collapse\n2. Rapidity/Recovery: Ability to recover quickly after shocks\n3. Redundancy: Shock absorption through alternative means and diversity\n\nStrategies for Agricultural Water Management to Enhance Resilience:\n・Water source diversification: Combining groundwater, reservoirs, and rainwater harvesting to ensure response capability even when one water source is lost\n・Introduction of water-saving technologies: Maximizing production from limited water resources (maintaining production during droughts)\n・Adoption of drought-resistant varieties: Reducing drought risk with varieties resistant to water stress\n・Agricultural insurance: Covering weather variability risks through insurance\n・Strengthening farmers' associations: Improving recovery capacity through community mutual support\n\nResilience Projects in Africa:\nClimate-Smart Agriculture (CSA), primarily aimed at climate change adaptation, is widely promoted across Africa. FAO, World Bank, and JICA are advancing an integrated approach combining CSA and irrigation development.\n\nResilience and Sustainability:\nWhile sustainability refers to \"maintaining the current state over the long term,\" resilience means \"continuing to function while adapting in a changing environment,\" making it a more dynamic concept.","image":"","captionJa":"","captionEn":"","published":"","name3":"Résilience","summary3":"Cela désigne la capacité des systèmes agricoles, des agriculteurs et des communautés à « résister, s'adapter et se transformer » face aux chocs externes et aux changements à long terme tels que le changement climatique, la sécheresse, les inondations, les fluctuations du marché, les conflits, etc.","detail3":"Les 3 éléments de la résilience agricole :\n1. Robustesse (Robustness) : la force de ne pas s'effondrer face aux chocs\n2. Capacité de récupération (Rapidity/Recovery) : l'aptitude à récupérer rapidement après un choc\n3. Redondance (Redundancy) : l'absorption des chocs par les moyens alternatifs et la diversité\n\nStratégies de gestion de l'eau agricole pour renforcer la résilience :\n・Diversification des sources d'eau : combinaison des eaux souterraines, des étangs et de la collecte d'eau de pluie pour pouvoir faire face même si une source d'eau est perdue\n・Introduction de technologies d'économie d'eau : obtenir la production maximale à partir d'une eau limitée (maintien de la production en période de sécheresse)\n・Adoption de variétés résistantes à la sécheresse : réduction du risque de sécheresse avec des variétés résistantes au stress hydrique\n・Assurance agricole : couverture des risques de variations climatiques par l'assurance\n・Renforcement des coopératives agricoles : amélioration de la capacité de récupération par l'entraide communautaire\n\nProjets de résilience en Afrique :\nL'Agriculture Climato-Intelligente (CSA : Climate-Smart Agriculture), ayant pour objectif principal l'adaptation au changement climatique, est largement répandue en Afrique. La FAO, la Banque mondiale et la JICA promeuvent une approche intégrée de la CSA et du développement de l'irrigation.\n\nRésilience et durabilité :\nSi la durabilité (Sustainability) consiste à « maintenir le statu quo à long terme », la résilience est « continuer à fonctionner en évoluant dans un environnement changeant », et constitue un concept plus dynamique.","caption3":"","images":[]},{"rowNum":126,"id":"125","catCode":"CAT08","nameJa":"経済的実行可能性","readingJa":"けいざいていきじっこうかのうせい","summaryJa":"灌漑事業・農業開発投資が経済的に見合うかどうかを評価する分析です。投資コストと期待される経済的便益を比較して、事業が「やる価値がある」かを判断します。","detailJa":"経済的実行可能性の主要評価指標：\n1. 費用便益比（B/C：Benefit-Cost Ratio）：\n　B/C = PV(便益) ÷ PV(費用) > 1.0 であれば経済的実行可能\n2. 純現在価値（NPV：Net Present Value）：\n　NPV = PV(便益) − PV(費用) > 0 であれば実行可能\n3. 経済的内部収益率（EIRR：Economic Internal Rate of Return）：\n　社会的割引率（通常10〜12%）より高ければ実行可能\n4. 投資回収期間：投資費用を回収するまでの年数\n\n便益の推定内容（灌漑事業）：\n・作物収量の増加量×農産物価格\n・作付け面積の拡大による生産増加\n・作付け強度向上（2作化）による生産増加\n・農家収入の向上・貧困削減効果（場合によっては定量化）\n\n課題：\n農業の便益は市場価格のみでは測れない「食料安全保障」「栄養改善」「農村雇用」等の社会的便益が大きく、これらを経済的に評価することが難しいです。社会的費用便益分析（SCBA）ではこれらの定量化を試みます。","nameEn":"Economic feasibility","summaryEn":"This is an analysis to evaluate whether irrigation projects and agricultural development investments are economically viable. It compares investment costs with expected economic benefits to determine if the project is \"worth undertaking.\"","detailEn":"Key Evaluation Indicators for Economic Feasibility:\n1. Benefit-Cost Ratio (B/C):\n   B/C = PV(Benefits) ÷ PV(Costs) > 1.0 indicates economic feasibility\n2. Net Present Value (NPV):\n   NPV = PV(Benefits) − PV(Costs) > 0 indicates feasibility\n3. Economic Internal Rate of Return (EIRR):\n   Feasible if higher than the social discount rate (typically 10-12%)\n4. Payback Period: Number of years required to recover investment costs\n\nBenefit Estimation Content (Irrigation Projects):\n・Increase in crop yield × agricultural product prices\n・Production increase through expansion of cultivated area\n・Production increase through improved cropping intensity (double cropping)\n・Improvement in farm income and poverty reduction effects (quantified in some cases)\n\nChallenges:\nAgricultural benefits include significant social benefits such as \"food security,\" \"nutritional improvement,\" and \"rural employment\" that cannot be measured by market prices alone, making their economic evaluation difficult. Social Cost-Benefit Analysis (SCBA) attempts to quantify these benefits.","image":"","captionJa":"","captionEn":"","published":"","name3":"Faisabilité économique","summary3":"Il s'agit d'une analyse qui évalue si les investissements dans les projets d'irrigation et de développement agricole sont économiquement viables. Elle compare les coûts d'investissement aux bénéfices économiques attendus pour déterminer si le projet « vaut la peine d'être réalisé ».","detail3":"Indicateurs principaux d'évaluation de la faisabilité économique :\n1. Ratio coût-bénéfice (B/C : Benefit-Cost Ratio) :\n　B/C = VA(bénéfices) ÷ VA(coûts) > 1,0 alors économiquement faisable\n2. Valeur actuelle nette (VAN : Net Present Value) :\n　VAN = VA(bénéfices) − VA(coûts) > 0 alors faisable\n3. Taux de rentabilité interne économique (TRIE : Economic Internal Rate of Return) :\n　Faisable si supérieur au taux d'actualisation social (généralement 10-12%)\n4. Période de récupération de l'investissement : nombre d'années nécessaires pour récupérer les coûts d'investissement\n\nContenu de l'estimation des bénéfices (projet d'irrigation) :\n・Augmentation du rendement des cultures × prix des produits agricoles\n・Augmentation de la production due à l'expansion de la superficie cultivée\n・Augmentation de la production due à l'amélioration de l'intensité de culture (double culture)\n・Amélioration du revenu des agriculteurs et effets de réduction de la pauvreté (quantifiés selon les cas)\n\nDéfis :\nLes bénéfices agricoles comportent d'importants bénéfices sociaux tels que la « sécurité alimentaire », « l'amélioration nutritionnelle » et « l'emploi rural » qui ne peuvent être mesurés uniquement par les prix du marché, et il est difficile d'évaluer économiquement ces éléments. L'analyse coût-bénéfice sociale (ACBS) tente de quantifier ces aspects.","caption3":"","images":[]},{"rowNum":127,"id":"126","catCode":"CAT08","nameJa":"プロジェクト管理","readingJa":"ぷろじぇくとかんり","summaryJa":"定められたスケジュール・予算・品質・スコープの中でプロジェクトの目標を達成するための計画・実行・監視・制御・完了の一連のプロセスです。","detailJa":"プロジェクト管理の5プロセス：\n1. 立上げ（Initiating）：プロジェクトの目的・スコープの定義\n2. 計画（Planning）：詳細な作業計画・資源計画・リスク計画\n3. 実行（Executing）：計画に従った作業の実施・チームの指揮\n4. 監視・制御（Monitoring & Controlling）：進捗のモニタリングと是正措置\n5. 終結（Closing）：成果物の引渡し・教訓の記録\n\n主要な管理領域（PMBOK）：\n・スコープ管理・スケジュール管理・コスト管理\n・品質管理・リスク管理・コミュニケーション管理\n・調達管理・ステークホルダー管理\n\n農業水管理プロジェクトの特有の課題：\n・季節的制約（農業サイクル・雨季・乾季）\n・農家参加の確保（意思決定の速度が遅くなりやすい）\n・多数のドナー・関係機関の調整\n・途上国での資材・人材調達の困難\n\nJICA PCMアプローチ：\nJICAの技術協力プロジェクトでは参加型のプロジェクトサイクルマネジメント（PCM）を採用し、PDM（プロジェクトデザインマトリックス）を中心とした計画・管理を実施しています。","nameEn":"Project Management","summaryEn":"It is a series of processes including planning, execution, monitoring, control, and completion to achieve project objectives within the established schedule, budget, quality, and scope.","detailEn":"Five Processes of Project Management:\n1. Initiating: Defining project objectives and scope\n2. Planning: Detailed work planning, resource planning, and risk planning\n3. Executing: Implementation of work according to plan and team management\n4. Monitoring & Controlling: Progress monitoring and corrective actions\n5. Closing: Deliverable handover and lessons learned documentation\n\nKey Management Areas (PMBOK):\n・Scope Management・Schedule Management・Cost Management\n・Quality Management・Risk Management・Communications Management\n・Procurement Management・Stakeholder Management\n\nSpecific Challenges in Agricultural Water Management Projects:\n・Seasonal constraints (agricultural cycles, rainy season, dry season)\n・Ensuring farmer participation (decision-making tends to be slow)\n・Coordination among multiple donors and related organizations\n・Difficulties in procuring materials and human resources in developing countries\n\nJICA PCM Approach:\nJICA's technical cooperation projects adopt a participatory Project Cycle Management (PCM) approach, implementing planning and management centered on the PDM (Project Design Matrix).","image":"","captionJa":"","captionEn":"","published":"","name3":"Gestion de projet","summary3":"Il s'agit d'une série de processus de planification, d'exécution, de surveillance, de contrôle et de clôture visant à atteindre les objectifs d'un projet dans le cadre d'un calendrier, d'un budget, d'une qualité et d'un périmètre définis.","detail3":"Les 5 processus de gestion de projet :\n1. Lancement (Initiating) : Définition des objectifs et du périmètre du projet\n2. Planification (Planning) : Plan de travail détaillé, planification des ressources et des risques\n3. Exécution (Executing) : Mise en œuvre des travaux selon le plan et direction de l'équipe\n4. Surveillance et contrôle (Monitoring & Controlling) : Suivi des progrès et mesures correctives\n5. Clôture (Closing) : Livraison des livrables et enregistrement des enseignements\n\nPrincipaux domaines de gestion (PMBOK) :\n・Gestion du périmètre・Gestion du calendrier・Gestion des coûts\n・Gestion de la qualité・Gestion des risques・Gestion de la communication\n・Gestion des approvisionnements・Gestion des parties prenantes\n\nDéfis spécifiques aux projets de gestion de l'eau agricole :\n・Contraintes saisonnières (cycle agricole, saison des pluies, saison sèche)\n・Assurer la participation des agriculteurs (la vitesse de prise de décision tend à ralentir)\n・Coordination de multiples donateurs et organismes concernés\n・Difficultés d'approvisionnement en matériaux et en ressources humaines dans les pays en développement\n\nApproche PCM de la JICA :\nDans les projets de coopération technique de la JICA, une gestion participative du cycle de projet (PCM) est adoptée, et la planification et la gestion sont mises en œuvre en se concentrant sur la PDM (Matrice de conception de projet).","caption3":"","images":[]},{"rowNum":128,"id":"127","catCode":"CAT09","nameJa":"社会的共通資本","readingJa":"しゃかいてききょうつうしほん","summaryJa":"社会全体が共同で利用・管理する資本（インフラ・制度・自然環境）の総称です。農業用水施設・灌漑インフラは社会的共通資本の代表例であり、個人の利益だけでなく社会全体の福祉を支える基盤です。","detailJa":"社会的共通資本の概念（宇沢弘文）：\n日本の経済学者・宇沢弘文が提唱した概念。社会的共通資本とは「すべての人が豊かな社会生活を営むために不可欠な社会的装置」を指します。\n・自然環境（大気・水・土壌・森林・生態系）\n・社会的インフラ（道路・橋・鉄道・農業用水施設）\n・制度資本（医療・教育・金融・法制度）\n\n農業用水と社会的共通資本：\n灌漑施設・水路・ダム等の農業水利インフラは典型的な社会的共通資本です。\n・非排除性（誰も除外できない）・非競合性（一人の利用が他者を妨げない）という公共財の性格を部分的に持つ\n・市場メカニズムだけでは適切な供給が保証されないため、公的管理・補助が必要\n・世代を超えて維持・継承する責任がある\n\n農業用水インフラの公共財的管理：\n農業用水施設を「公共財」として認識し、政府が適切な投資・維持管理を行うことが、農村社会全体の持続的発展の基盤です。民営化・市場化だけでは農村の零細農家へのアクセスが確保できない可能性があります。\n\nアフリカへの示唆：\nアフリカの多くの国では農業用水インフラへの公共投資が不足しています。社会的共通資本としての農業水利インフラへの継続的な公的投資が、農村全体の生産性・食料安全保障・持続性の基盤です。","nameEn":"Social Common Capital","summaryEn":"It is a general term for capital (infrastructure, institutions, and natural environment) that is collectively used and managed by society as a whole. Agricultural water facilities and irrigation infrastructure are representative examples of social overhead capital, serving as a foundation that supports not only individual interests but the welfare of society as a whole.","detailEn":"The Concept of Social Common Capital (Uzawa Hirofumi):\nA concept proposed by Japanese economist Uzawa Hirofumi. Social common capital refers to \"social institutions indispensable for all people to lead a rich social life.\"\n・Natural environment (atmosphere, water, soil, forests, ecosystems)\n・Social infrastructure (roads, bridges, railways, agricultural water facilities)\n・Institutional capital (medical care, education, finance, legal systems)\n\nAgricultural Water and Social Common Capital:\nAgricultural water infrastructure such as irrigation facilities, waterways, and dams constitutes典型的な social common capital.\n・Partially possesses the characteristics of public goods with non-excludability (no one can be excluded) and non-rivalry (one person's use does not impede others)\n・Requires public management and subsidies as appropriate supply cannot be guaranteed through market mechanisms alone\n・Carries the responsibility to maintain and inherit across generations\n\nPublic Goods Management of Agricultural Water Infrastructure:\nRecognizing agricultural water facilities as \"public goods\" and having the government conduct appropriate investment and maintenance management forms the foundation for sustainable development of rural society as a whole. Privatization and marketization alone may fail to secure access for small-scale farmers in rural areas.\n\nImplications for Africa:\nMany African countries lack sufficient public investment in agricultural water infrastructure. Continuous public investment in agricultural water infrastructure as social common capital forms the foundation for productivity, food security, and sustainability of entire rural areas.","image":"","captionJa":"","captionEn":"","published":"","name3":"Capital social commun","summary3":"Il s'agit de l'ensemble des capitaux (infrastructures, institutions, environnement naturel) utilisés et gérés collectivement par l'ensemble de la société. Les installations d'eau agricole et les infrastructures d'irrigation constituent des exemples représentatifs du capital social commun et forment une base qui soutient non seulement les intérêts individuels mais aussi le bien-être de l'ensemble de la société.","detail3":"Le concept de capital social commun (Hirofumi Uzawa) :\nConcept proposé par l'économiste japonais Hirofumi Uzawa. Le capital social commun désigne « les dispositifs sociaux indispensables pour que tous puissent mener une vie sociale prospère ».\n• Environnement naturel (atmosphère, eau, sol, forêts, écosystèmes)\n• Infrastructures sociales (routes, ponts, chemins de fer, installations d'irrigation agricole)\n• Capital institutionnel (systèmes médicaux, éducatifs, financiers et juridiques)\n\nL'eau agricole et le capital social commun :\nLes infrastructures hydrauliques agricoles telles que les installations d'irrigation, les canaux et les barrages constituent un capital social commun typique.\n• Elles possèdent partiellement les caractéristiques des biens publics : non-exclusion (personne ne peut être exclu) et non-rivalité (l'usage par une personne n'empêche pas celui d'autrui)\n• Une gestion publique et des subventions sont nécessaires car le seul mécanisme de marché ne garantit pas un approvisionnement approprié\n• Il existe une responsabilité de maintien et de transmission à travers les générations\n\nGestion des infrastructures d'eau agricole comme bien public :\nReconnaître les installations d'eau agricole comme « bien public » et assurer des investissements et une maintenance appropriés par le gouvernement constitue la base du développement durable de l'ensemble de la société rurale. La seule privatisation et marchandisation risquent de ne pas garantir l'accès aux petits exploitants agricoles ruraux.\n\nImplications pour l'Afrique :\nDans de nombreux pays africains, l'investissement public dans les infrastructures d'eau agricole est insuffisant. L'investissement public continu dans les infrastructures hydrauliques agricoles en tant que capital social commun constitue la base de la productivité, de la sécurité alimentaire et de la durabilité de l'ensemble du monde rural.","caption3":"","images":[]},{"rowNum":129,"id":"128","catCode":"CAT09","nameJa":"ジェンダー平等","readingJa":"じぇんだーびょうどう","summaryJa":"農業・水管理において、女性と男性が平等に機会・資源・意思決定に参加できることを指します。女性農家は農業労働の主要担い手である一方、土地・水・信用・情報へのアクセスで不平等に直面しています。","detailJa":"農業・水管理におけるジェンダー格差の実態：\n・世界の農業労働の43〜80%を女性が担っている（FAO推計、地域により異なる）\n・しかし女性農家が所有・利用する農地は男性比で大幅に少ない（アフリカ平均で男性の約70〜80%の規模）\n・農業融資・技術普及・農機具・改良種子へのアクセスで女性は不利\n・水利用者組合の意思決定から女性が排除されることが多い\n\nジェンダー不平等の原因：\n・慣習的土地相続制度（男性優先）\n・農業普及員が男性農家のみを訪問\n・組合の会議時間・場所が女性の参加を困難にしている\n・女性の移動の自由・交渉力が文化的に制限される地域\n\nジェンダー平等な水管理の効果：\nFAOの研究によると、女性農家が男性と同等の農業資源にアクセスできれば、農業収量を20〜30%向上させ、農村全体の食料安全保障を大幅に改善できるとされています。\n\nJICAのジェンダー主流化：\nJICAはすべての農業水管理プロジェクトで「ジェンダー分析」「女性の参加促進」「ジェンダー指標の設定」を求めており、女性農家の組合参加率・研修参加率・意思決定参加率を成果指標としています。","nameEn":"Gender Equality","summaryEn":"It refers to the equal participation of women and men in opportunities, resources, and decision-making in agriculture and water management. While women farmers are primary contributors to agricultural labor, they face inequalities in access to land, water, credit, and information.","detailEn":"The Reality of Gender Disparities in Agriculture and Water Management:\n• Women account for 43-80% of global agricultural labor (FAO estimates, varying by region)\n• However, farmland owned and utilized by female farmers is significantly smaller compared to males (approximately 70-80% of male farm size on average in Africa)\n• Women face disadvantages in accessing agricultural credit, extension services, farm equipment, and improved seeds\n• Women are often excluded from decision-making in water user associations\n\nCauses of Gender Inequality:\n• Customary land inheritance systems (male preference)\n• Agricultural extension agents visit only male farmers\n• Meeting times and locations of associations make women's participation difficult\n• Women's freedom of movement and negotiating power are culturally restricted in certain regions\n\nEffects of Gender-Equitable Water Management:\nAccording to FAO research, if female farmers had equal access to agricultural resources as men, they could increase agricultural yields by 20-30% and significantly improve food security for entire rural communities.\n\nJICA's Gender Mainstreaming:\nJICA requires \"gender analysis,\" \"promotion of women's participation,\" and \"establishment of gender indicators\" in all agricultural water management projects, using female farmers' participation rates in associations, training participation rates, and decision-making participation rates as outcome indicators.","image":"","captionJa":"","captionEn":"","published":"","name3":"Égalité des genres","summary3":"Dans l'agriculture et la gestion de l'eau, cela désigne la possibilité pour les femmes et les hommes de participer de manière égale aux opportunités, aux ressources et à la prise de décision. Alors que les femmes agricultrices constituent les principaux acteurs du travail agricole, elles font face à des inégalités dans l'accès à la terre, à l'eau, au crédit et à l'information.","detail3":"Réalité des disparités de genre dans l'agriculture et la gestion de l'eau :\n• Les femmes représentent 43 à 80% de la main-d'œuvre agricole mondiale (estimation FAO, variant selon les régions)\n• Cependant, les terres agricoles possédées et utilisées par les femmes agricultrices sont considérablement inférieures à celles des hommes (en moyenne 70 à 80% de l'échelle masculine en Afrique)\n• Les femmes sont désavantagées dans l'accès au financement agricole, à la vulgarisation technique, aux machines agricoles et aux semences améliorées\n• Les femmes sont souvent exclues des prises de décision des associations d'usagers de l'eau\n\nCauses de l'inégalité de genre :\n• Systèmes coutumiers d'héritage foncier (priorité masculine)\n• Les agents de vulgarisation agricole ne visitent que les exploitants masculins\n• Les horaires et lieux de réunion des associations rendent difficile la participation des femmes\n• La liberté de mouvement et le pouvoir de négociation des femmes sont culturellement limités dans certaines régions\n\nEffets de la gestion équitable de l'eau selon le genre :\nSelon les recherches de la FAO, si les femmes agricultrices pouvaient accéder aux ressources agricoles au même niveau que les hommes, elles pourraient améliorer les rendements agricoles de 20 à 30% et considérablement améliorer la sécurité alimentaire de l'ensemble des zones rurales.\n\nIntégration du genre par la JICA :\nLa JICA exige pour tous les projets de gestion de l'eau agricole une « analyse de genre », la « promotion de la participation des femmes » et « l'établissement d'indicateurs de genre », en utilisant comme indicateurs de résultats les taux de participation des femmes agricultrices aux associations, aux formations et à la prise de décision.","caption3":"","images":[]},{"rowNum":130,"id":"129","catCode":"CAT09","nameJa":"収入創出","readingJa":"しゅうにゅうそうしゅつ","summaryJa":"農村の農家・コミュニティが灌漑農業・農産物加工・農外活動等を通じて現金収入を得る機会を増やすことです。食料安全保障の確保と並んで、農村貧困削減の核心的な目標です。","detailJa":"農業水管理と収入創出の関係：\n灌漑の導入は農家の収入創出に以下のルートで貢献します：\n1. 収量増加：同じ面積から多くの作物を収穫できる\n2. 乾季栽培の実現：農閑期（乾季）に追加収入を得る（年収が2倍になる事例もある）\n3. 高付加価値作物への転換：野菜・果物など主食より高単価の作物が栽培できる\n4. 雇用創出：灌漑農場の労働需要増加で農村の雇用機会が増える\n5. 農産物加工・販売：農産物の付加価値向上と農外収入の確保\n\n小農の収入創出の事例：\n・ペダルポンプ（KickStart報告）：マリ・タンザニア等でペダルポンプ導入後、農家の年収が平均US$300〜500増加した事例\n・ソーラーポンプ灌漑（ケニア）：乾季の野菜栽培で農家年収が2〜3倍になった農家が報告\n・女性グループの野菜栽培：西アフリカの女性水利用者グループが灌漑野菜で収入を得て子供の教育費・医療費を捻出\n\n収入創出を支援する要素：\n灌漑だけでなく、農産物市場へのアクセス、農業融資・マイクロファイナンス、農業加工技術の普及、農家組合によるまとめ売りが収入創出を最大化します。","nameEn":"Income generation","summaryEn":"The goal is to increase opportunities for rural farmers and communities to generate cash income through irrigation agriculture, agricultural product processing, non-farm activities, and other means. This is a core objective of rural poverty reduction, alongside ensuring food security.","detailEn":"The Relationship Between Agricultural Water Management and Income Generation:\nThe introduction of irrigation contributes to farmers' income generation through the following pathways:\n1. Yield increase: More crops can be harvested from the same area\n2. Realization of dry season cultivation: Additional income during the agricultural off-season (dry season) (some cases show doubling of annual income)\n3. Conversion to high-value-added crops: Cultivation of vegetables and fruits with higher unit prices than staple crops\n4. Job creation: Increased labor demand at irrigation farms creates more employment opportunities in rural areas\n5. Agricultural product processing and sales: Value addition of agricultural products and securing off-farm income\n\nCases of Income Generation for Smallholder Farmers:\n・Pedal pumps (KickStart report): Cases where farmers' annual income increased by an average of US$300-500 after introducing pedal pumps in Mali, Tanzania, and other countries\n・Solar pump irrigation (Kenya): Reports of farmers whose annual income increased 2-3 times through dry season vegetable cultivation\n・Women's group vegetable cultivation: Women's water user groups in West Africa generated income from irrigated vegetables to cover children's education and medical expenses\n\nElements Supporting Income Generation:\nNot only irrigation, but also access to agricultural product markets, agricultural credit and microfinance, dissemination of agricultural processing technology, and collective sales through farmers' associations maximize income generation.","image":"","captionJa":"","captionEn":"","published":"","name3":"Génération de revenus","summary3":"Il s'agit d'augmenter les opportunités pour les agriculteurs et communautés rurales d'obtenir des revenus monétaires par le biais de l'agriculture irriguée, de la transformation des produits agricoles, d'activités non agricoles, etc. Parallèlement à la garantie de la sécurité alimentaire, c'est un objectif central de la réduction de la pauvreté rurale.","detail3":"Relation entre la gestion de l'eau agricole et la génération de revenus :\nL'introduction de l'irrigation contribue à la génération de revenus des agriculteurs par les voies suivantes :\n1. Augmentation du rendement : possibilité de récolter davantage de cultures sur la même superficie\n2. Réalisation de la culture de saison sèche : obtention de revenus supplémentaires pendant la période de morte-saison agricole (saison sèche) (des cas où le revenu annuel double ont été observés)\n3. Conversion vers des cultures à haute valeur ajoutée : possibilité de cultiver des légumes et fruits ayant un prix unitaire plus élevé que les aliments de base\n4. Création d'emplois : augmentation des opportunités d'emploi rural due à l'accroissement de la demande de main-d'œuvre dans les exploitations irriguées\n5. Transformation et vente de produits agricoles : amélioration de la valeur ajoutée des produits agricoles et sécurisation de revenus non agricoles\n\nExemples de génération de revenus pour les petits agriculteurs :\n• Pompes à pédale (rapport KickStart) : cas d'augmentation moyenne du revenu annuel des agriculteurs de 300 à 500 dollars US après l'introduction de pompes à pédale au Mali, en Tanzanie, etc.\n• Irrigation par pompes solaires (Kenya) : cas rapportés d'agriculteurs dont le revenu annuel a été multiplié par 2 à 3 grâce à la culture maraîchère en saison sèche\n• Culture maraîchère par groupes de femmes : des groupes d'utilisatrices d'eau en Afrique de l'Ouest ont généré des revenus grâce aux légumes irrigués et financé les frais d'éducation et de soins médicaux de leurs enfants\n\nÉléments soutenant la génération de revenus :\nNon seulement l'irrigation, mais aussi l'accès aux marchés de produits agricoles, le crédit agricole et la microfinance, la diffusion des technologies de transformation agricole, et la vente groupée par les coopératives agricoles maximisent la génération de revenus.","caption3":"","images":[]},{"rowNum":131,"id":"130","catCode":"CAT09","nameJa":"農村生計","readingJa":"のうそんせいけい","summaryJa":"農村世帯が生活を維持・向上させるために活用する、資産・能力・活動・制度・機会の総体を指します。農業だけでなく農外雇用・送金・共有資源利用等を含む多様な生計手段から成ります。","detailJa":"持続可能な生計フレームワーク（SLA）：\nUKのDFIDが開発した「持続可能な生計アプローチ（Sustainable Livelihoods Approach）」では、農村世帯の生計を以下の5つの資本（Pentagon）で分析します：\n・人的資本（Human Capital）：知識・技術・健康・労働力\n・社会的資本（Social Capital）：ネットワーク・組合・信頼関係\n・自然資本（Natural Capital）：土地・水・森林・漁業資源\n・物的資本（Physical Capital）：農機具・施設・道路・電力\n・金融資本（Financial Capital）：貯蓄・信用・現金収入\n\n灌漑と生計資本の関係：\n灌漑の導入は農村世帯の生計資本に以下のような変化をもたらします：\n・自然資本の強化：不安定な天水に頼らない安定的な水資源の確保\n・金融資本の向上：収入増加・農業融資の担保能力向上\n・人的資本の間接効果：収入増加による教育・医療アクセス改善\n\n生計の多様化：\n農村世帯が農業だけに依存しない生計を構築することが、気候変動・市場変動リスクへのレジリエンスを高めます。農業収入＋農外収入（農産物加工・農業サービス・出稼ぎ送金）の組み合わせが農村貧困削減の典型パターンです。","nameEn":"Rural livelihood","summaryEn":"This refers to the totality of assets, capabilities, activities, institutions, and opportunities that rural households utilize to maintain and improve their livelihoods. It consists of diverse livelihood strategies including not only agriculture but also off-farm employment, remittances, and utilization of common resources.","detailEn":"Sustainable Livelihoods Framework (SLA):\nThe \"Sustainable Livelihoods Approach\" developed by the UK's DFID analyzes rural household livelihoods through the following five capitals (Pentagon):\n・Human Capital: knowledge, skills, health, and labor force\n・Social Capital: networks, associations, and trust relationships\n・Natural Capital: land, water, forests, and fishery resources\n・Physical Capital: agricultural machinery, facilities, roads, and electricity\n・Financial Capital: savings, credit, and cash income\n\nRelationship between Irrigation and Livelihood Capital:\nThe introduction of irrigation brings the following changes to rural household livelihood capital:\n・Strengthening of Natural Capital: securing stable water resources without relying on unstable rainfall\n・Improvement of Financial Capital: increased income and enhanced collateral capacity for agricultural loans\n・Indirect effects on Human Capital: improved access to education and healthcare through increased income\n\nLivelihood Diversification:\nRural households building livelihoods that do not depend solely on agriculture enhances resilience to climate change and market volatility risks. The combination of agricultural income + non-farm income (agricultural processing, agricultural services, migrant remittances) is the typical pattern for rural poverty reduction.","image":"","captionJa":"","captionEn":"","published":"","name3":"moyens de subsistance ruraux","summary3":"Il désigne l'ensemble des actifs, capacités, activités, institutions et opportunités que les ménages ruraux utilisent pour maintenir et améliorer leur mode de vie. Il se compose de moyens de subsistance diversifiés qui incluent non seulement l'agriculture, mais aussi l'emploi non agricole, les envois de fonds, l'utilisation des ressources communes, etc.","detail3":"Cadre de moyens de subsistance durables (SLA) :\nL'« Approche des moyens de subsistance durables (Sustainable Livelihoods Approach) » développée par le DFID britannique analyse les moyens de subsistance des ménages ruraux selon les cinq capitaux suivants (Pentagone) :\n・Capital humain (Human Capital) : connaissances, compétences, santé, main-d'œuvre\n・Capital social (Social Capital) : réseaux, coopératives, relations de confiance\n・Capital naturel (Natural Capital) : terres, eau, forêts, ressources halieutiques\n・Capital physique (Physical Capital) : matériel agricole, installations, routes, électricité\n・Capital financier (Financial Capital) : épargne, crédit, revenus monétaires\n\nRelation entre irrigation et capitaux de subsistance :\nL'introduction de l'irrigation apporte les changements suivants aux capitaux de subsistance des ménages ruraux :\n・Renforcement du capital naturel : sécurisation de ressources hydriques stables sans dépendre des précipitations instables\n・Amélioration du capital financier : augmentation des revenus, amélioration de la capacité de garantie pour le crédit agricole\n・Effets indirects sur le capital humain : amélioration de l'accès à l'éducation et aux soins de santé grâce à l'augmentation des revenus\n\nDiversification des moyens de subsistance :\nLa construction par les ménages ruraux de moyens de subsistance ne dépendant pas uniquement de l'agriculture renforce leur résilience face aux risques du changement climatique et des fluctuations du marché. La combinaison revenus agricoles + revenus non agricoles (transformation de produits agricoles, services agricoles, envois de fonds du travail migrant) constitue le modèle type de réduction de la pauvreté rurale.","caption3":"","images":[]},{"rowNum":132,"id":"131","catCode":"CAT09","nameJa":"貧困削減","readingJa":"ひんこくさくげん","summaryJa":"農村世帯の所得・資産・食料・教育・医療等の生活水準を向上させ、絶対的・相対的貧困から脱出することを目指すプロセスと政策目標です。農業水管理は農村貧困削減の有力な手段とされています。","detailJa":"農業・灌漑と貧困削減の証拠：\n多くの研究が農業生産性向上と貧困削減の強い相関を示しています：\n・世界銀行の研究：農業GDP成長は非農業GDP成長の2〜3倍の貧困削減効果を持つ（農業の成長効果は貧困層に多く届く）\n・灌漑農家は天水農家より所得が20〜50%高い（FAO・IWMIの複数研究）\n・乾季灌漑で年収が倍増した農村の事例がサブサハラアフリカで多数報告\n\n貧困の多面性と灌漑の役割：\n貧困はお金だけでなく多面的（食料・教育・健康・環境・社会的排除）です：\n・食料安全保障：灌漑で安定収穫→食料不足期間の短縮\n・教育：農家収入増加→子供の学費確保\n・健康：農業収入増加→医療費支払い能力向上\n・女性のエンパワーメント：灌漑による女性農家の収入増加→家庭内での発言権向上\n\nSDGsとの関係：\nSDGsの目標1「貧困をなくそう」と目標2「飢餓をゼロに」は直接リンクしており、農業水管理の改善はこれら両目標の達成に貢献します。アフリカの農村貧困削減には小規模灌漑の普及が特に重要とされています。\n\n注意点：\n灌漑が貧困削減に直結するためには、農産物の市場アクセス・農業融資・普及サービスとの統合的なアプローチが必要です。灌漑施設だけを建設しても貧困削減効果は限定的になります。","nameEn":"Poverty reduction","summaryEn":"This is a process and policy objective that aims to improve the living standards of rural households in terms of income, assets, food, education, healthcare, and other aspects, with the goal of escaping from both absolute and relative poverty. Agricultural water management is considered a powerful tool for rural poverty reduction.","detailEn":"Evidence on Agriculture, Irrigation, and Poverty Reduction:\nMany studies demonstrate a strong correlation between improved agricultural productivity and poverty reduction:\n・World Bank research: Agricultural GDP growth has 2-3 times greater poverty reduction effects than non-agricultural GDP growth (agricultural growth effects reach more poor people)\n・Irrigated farmers have 20-50% higher incomes than rainfed farmers (multiple studies by FAO and IWMI)\n・Numerous cases in Sub-Saharan Africa report rural communities doubling annual income through dry season irrigation\n\nMultidimensional Nature of Poverty and the Role of Irrigation:\nPoverty is multifaceted, encompassing not only income but also food, education, health, environment, and social exclusion:\n・Food security: Irrigation enables stable harvests → reduction of food shortage periods\n・Education: Increased farm income → securing children's school fees\n・Health: Increased agricultural income → improved ability to pay medical expenses\n・Women's empowerment: Increased income for women farmers through irrigation → enhanced voice in household decisions\n\nRelationship with SDGs:\nSDG Goal 1 \"No Poverty\" and Goal 2 \"Zero Hunger\" are directly linked, and improvements in agricultural water management contribute to achieving both goals. The expansion of small-scale irrigation is considered particularly important for rural poverty reduction in Africa.\n\nImportant Considerations:\nFor irrigation to directly contribute to poverty reduction, an integrated approach with market access for agricultural products, agricultural financing, and extension services is necessary. Constructing irrigation facilities alone results in limited poverty reduction effects.","image":"","captionJa":"","captionEn":"","published":"","name3":"Réduction de la pauvreté","summary3":"Il s'agit d'un processus et d'un objectif politique visant à améliorer le niveau de vie des ménages ruraux en termes de revenus, d'actifs, d'alimentation, d'éducation, de soins médicaux, etc., et à sortir de la pauvreté absolue et relative. La gestion de l'eau agricole est considérée comme un moyen efficace de réduction de la pauvreté rurale.","detail3":"Preuves sur l'agriculture, l'irrigation et la réduction de la pauvreté :\nDe nombreuses études montrent une forte corrélation entre l'amélioration de la productivité agricole et la réduction de la pauvreté :\n• Recherche de la Banque mondiale : la croissance du PIB agricole a un effet de réduction de la pauvreté 2 à 3 fois supérieur à celui de la croissance du PIB non agricole (les effets de la croissance agricole atteignent davantage les populations pauvres)\n• Les exploitants irrigants ont des revenus 20 à 50% supérieurs aux exploitants pluviaux (plusieurs études de la FAO et de l'IWMI)\n• De nombreux cas d'augmentation du double du revenu annuel grâce à l'irrigation de saison sèche ont été rapportés dans les zones rurales d'Afrique subsaharienne\n\nCaractère multidimensionnel de la pauvreté et rôle de l'irrigation :\nLa pauvreté est multidimensionnelle, ne se limitant pas à l'aspect monétaire (alimentation, éducation, santé, environnement, exclusion sociale) :\n• Sécurité alimentaire : irrigation → récoltes stables → réduction des périodes de pénurie alimentaire\n• Éducation : augmentation des revenus agricoles → financement des frais de scolarité des enfants\n• Santé : augmentation des revenus agricoles → amélioration de la capacité à payer les frais médicaux\n• Autonomisation des femmes : augmentation des revenus des femmes agricultrices grâce à l'irrigation → amélioration du pouvoir de décision au sein du foyer\n\nRelation avec les ODD :\nL'objectif 1 des ODD « Pas de pauvreté » et l'objectif 2 « Faim zéro » sont directement liés, et l'amélioration de la gestion de l'eau agricole contribue à la réalisation de ces deux objectifs. La diffusion de l'irrigation à petite échelle est considérée comme particulièrement importante pour la réduction de la pauvreté rurale en Afrique.\n\nPoints d'attention :\nPour que l'irrigation contribue directement à la réduction de la pauvreté, une approche intégrée avec l'accès au marché des produits agricoles, le financement agricole et les services de vulgarisation est nécessaire. La construction d'infrastructures d'irrigation seule limite les effets de réduction de la pauvreté.","caption3":"","images":[]},{"rowNum":133,"id":"132","catCode":"CAT09","nameJa":"食料安全保障","readingJa":"しょくりょうあんぜんほしょう","summaryJa":"すべての人が、活動的で健康的な生活を送るために必要な十分・安全・栄養価の高い食料に、常時・物理的・経済的にアクセスできる状態です。農業水管理は食料安全保障の基盤として世界的に認識されています。","detailJa":"食料安全保障の4つの柱（FAO定義）：\n1. 食料の入手可能性（Availability）：十分な食料が生産・輸入・流通しているか\n2. 食料へのアクセス（Access）：人々が食料を購入・入手できるか（購買力・物理的アクセス）\n3. 食料の利用（Utilization）：安全で栄養価の高い食料を利用できているか（調理法・知識・水・衛生）\n4. 安定性（Stability）：上記3つが一時的なショック（干ばつ・価格高騰）なしに継続できるか\n\n農業水管理と食料安全保障の関係：\n・灌漑は農業生産量を天水農業の2〜3倍に増やし、食料「入手可能性」を向上させる\n・乾季の食料生産により「安定性」（季節的食料不

足の解消）を実現\n・農家収入増加により食料「アクセス」（購買力）が向上\n・多様な作物栽培により食料「利用」（栄養多様性）が改善\n\nアフリカの食料安全保障の現状：\nFAO（2023年）によると、アフリカでは約2.8億人が慢性的な飢餓状態にあり（世界全体の約55%）、サブサハラアフリカでの食料安全保障は最も深刻な地域課題です。\n\n灌漑拡大による食料安全保障改善の可能性：\nアフリカのポテンシャル灌漑可能面積（約2億ha）の10〜20%を追加開発するだけで、アフリカ全体の食料安全保障に大きな貢献ができるとされています。小規模農家への灌漑普及と農業生産性向上が最優先の政策課題です。","nameEn":"Food Security","summaryEn":"It is a state where all people have constant physical and economic access to sufficient, safe, and nutritious food necessary for leading an active and healthy life. Agricultural water management is globally recognized as the foundation of food security.","detailEn":"The Four Pillars of Food Security (FAO Definition):\n1. Food Availability: Whether sufficient food is being produced, imported, and distributed\n2. Food Access: Whether people can purchase and obtain food (purchasing power and physical access)\n3. Food Utilization: Whether safe and nutritious food can be utilized (cooking methods, knowledge, water, and sanitation)\n4. Stability: Whether the above three can be sustained without temporary shocks (drought, price spikes)\n\nRelationship between Agricultural Water Management and Food Security:\n• Irrigation increases agricultural production by 2-3 times compared to rainfed agriculture, improving food \"availability\"\n• Dry season food production achieves \"stability\" (elimination of seasonal food shortages)\n• Increased farm income improves food \"access\" (purchasing power)\n• Diversified crop cultivation improves food \"utilization\" (nutritional diversity)\n\nCurrent State of Food Security in Africa:\nAccording to FAO (2023), approximately 280 million people in Africa are in a state of chronic hunger (about 55% of the global total), and food security in Sub-Saharan Africa is the most serious regional challenge.\n\nPotential for Improving Food Security through Irrigation Expansion:\nIt is estimated that developing just 10-20% of Africa's potential irrigable area (approximately 200 million hectares) could make a significant contribution to food security across the entire continent. Expanding irrigation to smallholder farmers and improving agricultural productivity is the highest priority policy issue.","image":"","captionJa":"","captionEn":"","published":"","name3":"Sécurité alimentaire","summary3":"Tous les individus ont en permanence un accès physique et économique à une alimentation suffisante, sûre et nutritive nécessaire pour mener une vie active et saine. La gestion de l'eau agricole est mondialement reconnue comme le fondement de la sécurité alimentaire.","detail3":"Les quatre piliers de la sécurité alimentaire (définition FAO) :\n1. Disponibilité alimentaire (Availability) : Une production, importation et distribution suffisantes de denrées alimentaires\n2. Accès à l'alimentation (Access) : La capacité des populations à acheter et obtenir de la nourriture (pouvoir d'achat et accès physique)\n3. Utilisation alimentaire (Utilization) : L'utilisation d'aliments sûrs et nutritifs (méthodes de cuisson, connaissances, eau, assainissement)\n4. Stabilité (Stability) : La continuité des trois éléments ci-dessus sans chocs temporaires (sécheresse, flambée des prix)\n\nRelation entre la gestion de l'eau agricole et la sécurité alimentaire :\n• L'irrigation multiplie par 2 à 3 la production agricole par rapport à l'agriculture pluviale et améliore la « disponibilité » alimentaire\n• La production alimentaire en saison sèche assure la « stabilité » (élimination de la pénurie alimentaire saisonnière)\n• L'augmentation des revenus agricoles améliore l'« accès » alimentaire (pouvoir d'achat)\n• La culture diversifiée améliore l'« utilisation » alimentaire (diversité nutritionnelle)\n\nÉtat actuel de la sécurité alimentaire en Afrique :\nSelon la FAO (2023), environ 280 millions de personnes en Afrique souffrent de faim chronique (environ 55% du total mondial), et la sécurité alimentaire en Afrique subsaharienne constitue le défi régional le plus grave.\n\nPotentiel d'amélioration de la sécurité alimentaire par l'expansion de l'irrigation :\nLe développement supplémentaire de seulement 10 à 20% de la superficie irrigable potentielle de l'Afrique (environ 200 millions d'hectares) pourrait contribuer significativement à la sécurité alimentaire de l'ensemble du continent africain. La diffusion de l'irrigation auprès des petits exploitants et l'amélioration de la productivité agricole constituent les priorités politiques les plus urgentes.","caption3":"","images":[]},{"rowNum":134,"id":"133","catCode":"CAT08","nameJa":"問題分析手法","readingJa":"もんだいぶんせきしゅほう","summaryJa":"灌漑・農業開発プロジェクトの計画段階で、対象地域・受益者が直面している課題とその原因・結果の関係を体系的に整理する分析です。問題の根本原因を特定し、解決策設計の根拠とします。","detailJa":"問題分析の手法：\n1. 問題ツリー分析（Problem Tree）：\n　中心問題を特定し、その原因（根）と結果（枝）を樹木状に整理する視覚的手法\n　・中心問題（Core Problem）：最も重要で直接対処すべき問題\n　・原因（Root Causes）：問題を引き起こしている根本的な要因\n　・結果（Effects）：問題が引き起こす悪影響\n\n2. 目標ツリー分析（Objective Tree）：\n　問題ツリーを「問題→解決された状態（目標）」に変換する\n　→ PCMのPDM（プロジェクトデザインマトリックス）の基礎\n\n3. ステークホルダー分析との組み合わせ：\n　誰がどの問題に最も影響を受けているかを明示\n\n農業水管理での問題分析の例：\n中心問題：「灌漑農家の農業収入が低い」\n原因（例）：\n　・水路の老朽化で水が届かない\n　・農家の水管理技術が低い\n　・農産物の市場へのアクセスが悪い\n　・農家組合の管理能力が弱い\n\n問題分析の重要性：\n問題分析を十分に行わずに解決策（施設整備）を先行させると、本質的な問題解決につながらない「施設だけのプロジェクト」になりがちです。原因の正確な特定が持続可能な解決策の設計の出発点です。","nameEn":"Problem Analysis Method","summaryEn":"This is an analysis that systematically organizes the challenges faced by target areas and beneficiaries, along with the cause-and-effect relationships, during the planning phase of irrigation and agricultural development projects. It identifies the root causes of problems and serves as the basis for designing solutions.","detailEn":"Problem Analysis Methods:\n1. Problem Tree Analysis:\n   A visual method that identifies the core problem and organizes its causes (roots) and effects (branches) in a tree-like structure\n   ・Core Problem: The most important problem that should be directly addressed\n   ・Root Causes: Fundamental factors that cause the problem\n   ・Effects: Negative impacts caused by the problem\n\n2. Objective Tree Analysis:\n   Converting the problem tree from \"problems → solved state (objectives)\"\n   → Forms the basis of PDM (Project Design Matrix) in PCM\n\n3. Combination with Stakeholder Analysis:\n   Clarifying who is most affected by which problems\n\nExample of Problem Analysis in Agricultural Water Management:\nCore Problem: \"Low agricultural income of irrigation farmers\"\nCauses (examples):\n・Water cannot reach due to deteriorated irrigation channels\n・Low water management skills of farmers\n・Poor market access for agricultural products\n・Weak management capacity of farmer associations\n\nImportance of Problem Analysis:\nIf solution measures (facility development) are prioritized without sufficient problem analysis, projects tend to become \"facility-only projects\" that do not lead to fundamental problem solving. Accurate identification of causes is the starting point for designing sustainable solutions.","image":"","captionJa":"","captionEn":"","published":"","name3":"Méthodes d'analyse de problèmes","summary3":"Il s'agit d'une analyse qui organise systématiquement les défis auxquels font face la région cible et les bénéficiaires ainsi que les relations de cause à effet lors de la phase de planification des projets de développement agricole et d'irrigation. Elle identifie les causes profondes des problèmes et sert de base à la conception des solutions.","detail3":"Méthodes d'analyse des problèmes :\n\n1. Analyse de l'arbre à problèmes (Problem Tree) :\n   Méthode visuelle qui consiste à identifier le problème central et à organiser en forme d'arbre ses causes (racines) et ses effets (branches)\n   • Problème central (Core Problem) : le problème le plus important nécessitant une intervention directe\n   • Causes profondes (Root Causes) : les facteurs fondamentaux qui provoquent le problème\n   • Effets (Effects) : les impacts négatifs générés par le problème\n\n2. Analyse de l'arbre d'objectifs (Objective Tree) :\n   Transformation de l'arbre à problèmes en « problème → état résolu (objectif) »\n   → Base de la PDM (Matrice de Conception de Projet) du PCM\n\n3. Combinaison avec l'analyse des parties prenantes :\n   Identification claire de qui est le plus affecté par quel problème\n\nExemple d'analyse des problèmes dans la gestion de l'eau agricole :\nProblème central : « Les revenus agricoles des exploitants irrigants sont faibles »\nCauses (exemples) :\n• Détérioration des canaux d'irrigation empêchant l'acheminement de l'eau\n• Faible niveau de techniques de gestion de l'eau des agriculteurs\n• Mauvais accès des produits agricoles aux marchés\n• Faible capacité de gestion des associations d'agriculteurs\n\nImportance de l'analyse des problèmes :\nSans une analyse suffisante des problèmes, faire précéder les solutions (aménagement d'infrastructures) tend à créer des « projets d'infrastructures uniquement » qui ne conduisent pas à une résolution essentielle des problèmes. L'identification précise des causes est le point de départ de la conception de solutions durables.","caption3":"","images":[]},{"rowNum":135,"id":"134","catCode":"CAT07","nameJa":"直接所得保障","readingJa":"ちょくせつしょとくほしょう","summaryJa":"農家の農業収入を一定水準以上に保つため、政府が農家に直接支払いや価格補填等の形で行う所得支援政策です。農業経営の安定と農村地域の維持を目的とします。","detailJa":"直接所得保障の政策形態：\n1. 直接支払い（Direct Payment）：農業を実施している農家に面積・頭数等に応じて直接補填\n2. 価格支持（Price Support）：農産物の市場価格が基準価格を下回った場合に差額を補填\n3. 収入保険：凶作・価格下落による農業収入の減少を保険で補償\n4. デカップリング（切り離し型）直接支払い：農業生産量と切り離した環境・農村維持への対価支払い\n\n日本の制度：\n・水田農業向け「水田直接支払い」「米の収入保険」等\n・農村環境保全活動への「農業・農村多面的機能支払交付金」\n\nアフリカへの適用可能性：\nアフリカ多くの国では財政能力が限られており、日本や欧州のような大規模な直接所得保障制度を導入することは困難です。ただし以下のような小規模な直接支援は実施されています：\n・作物保険（天候インデックス保険）：ケニア・エチオピア等で普及\n・現物支援（種子・肥料の無償配布）：多くのアフリカ諸国で実施\n\n灌漑農業との関係：\n灌漑インフラへの投資（補助金）と直接所得保障は、農家の農業継続・水利費支払い能力の維持に相補的な役割を果たします。","nameEn":"Direct income support","summaryEn":"This is an income support policy where the government provides assistance to farmers in the form of direct payments or price subsidies to maintain agricultural income above a certain level. The purpose is to stabilize farm management and maintain rural communities.","detailEn":"Policy Forms of Direct Income Support:\n1. Direct Payment: Direct subsidies to farmers engaged in agriculture based on area, livestock numbers, etc.\n2. Price Support: Compensation for the difference when market prices of agricultural products fall below reference prices\n3. Revenue Insurance: Insurance coverage for agricultural income reduction due to crop failure and price decline\n4. Decoupling Direct Payment: Payments for environmental and rural maintenance activities disconnected from agricultural production volume\n\nJapanese Systems:\n・\"Paddy Field Direct Payment\" and \"Rice Revenue Insurance\" for paddy agriculture\n・\"Multifunctional Payment Program for Agriculture and Rural Areas\" for rural environmental conservation activities\n\nApplicability to Africa:\nMany African countries have limited fiscal capacity, making it difficult to introduce large-scale direct income support systems like those in Japan and Europe. However, small-scale direct support measures are being implemented as follows:\n・Crop insurance (weather index insurance): Widespread in Kenya, Ethiopia, etc.\n・In-kind support (free distribution of seeds and fertilizers): Implemented in many African countries\n\nRelationship with Irrigated Agriculture:\nInvestment in irrigation infrastructure (subsidies) and direct income support play complementary roles in maintaining farmers' ability to continue farming and pay water fees.","image":"","captionJa":"","captionEn":"","published":"","name3":"Garantie directe de revenu","summary3":"Il s'agit d'une politique de soutien au revenu que le gouvernement met en œuvre sous forme de paiements directs ou de compensations de prix aux agriculteurs afin de maintenir leurs revenus agricoles au-dessus d'un certain niveau. Elle vise à stabiliser l'exploitation agricole et à maintenir les zones rurales.","detail3":"Formes politiques de garantie directe des revenus :\n1. Paiements directs (Direct Payment) : compensation directe aux exploitations agricoles pratiquant l'agriculture selon la superficie, le nombre de têtes de bétail, etc.\n2. Soutien des prix (Price Support) : compensation de la différence lorsque les prix de marché des produits agricoles tombent en dessous des prix de référence\n3. Assurance revenu : couverture par assurance de la diminution des revenus agricoles due aux mauvaises récoltes et à la chute des prix\n4. Paiements directs découplés : paiements en contrepartie du maintien de l'environnement et des zones rurales, découplés du volume de production agricole\n\nSystème japonais :\n• « Paiements directs pour rizières » et « Assurance revenu du riz » destinés à l'agriculture rizicole\n• « Subventions pour les paiements multifonctionnels agricoles et ruraux » pour les activités de conservation de l'environnement rural\n\nApplicabilité à l'Afrique :\nDans de nombreux pays africains, les capacités budgétaires sont limitées et il est difficile d'introduire des systèmes de garantie directe des revenus à grande échelle comme au Japon ou en Europe. Cependant, les petits soutiens directs suivants sont mis en œuvre :\n• Assurance récolte (assurance basée sur des indices météorologiques) : répandue au Kenya, en Éthiopie, etc.\n• Aide en nature (distribution gratuite de semences et d'engrais) : mise en œuvre dans de nombreux pays africains\n\nRelation avec l'agriculture irriguée :\nLes investissements (subventions) dans les infrastructures d'irrigation et la garantie directe des revenus jouent des rôles complémentaires dans le maintien de la continuité agricole des exploitants et de leur capacité à payer les redevances hydrauliques.","caption3":"","images":[]},{"rowNum":136,"id":"135","catCode":"CAT07","nameJa":"国際河川","readingJa":"こくさいかせん","summaryJa":"複数の国にまたがって流れる河川、または国境を形成する河川を指します。上流国の水利用が下流国の水資源量・水質に直接影響するため、水配分・共同管理・紛争解決のための国際的な枠組みが不可欠です。","detailJa":"国際河川には主に2つのタイプがあります。\n・連続型（Successive river）：河川が複数の国を順番に通過するもの（例：ナイル川\n・境界型（Boundary river）：河川が国境線を形成するもの（例：ザンベジ川の一部）\n世界には260以上の国際河川流域が存在し、地球の陸地面積の約45%、世界人口の40%以上が国際河川流域内に居住しています（UN Water）。\n\n国際水法の基本原則（1997年国連水路条約）：\n公平かつ合理的な利用（Equitable and Reasonable Use）：すべての流域国が公平に水資源を利用する権利\n著しい損害を与えない義務（No Significant Harm）：他の流域国に重大な損害を与えてはならない\n事前通知・協議義務：新規開発は他の流域国への事前通知と協議が必要\n情報共有：水文データ・水利用情報の共有\nただし1997年条約はエチオピア・エジプト・中国などが批准しておらず、法的拘束力は限定的です。\n\n国際河川管理のための機関\nナイル流域イニシアティブ（NBI）：1999年設立、流域11か国が参加（ただし協定は未成立）\nニジェール川流域機関（NBA）：1980年設立、9か国\nザンベジ川流域機関（ZAMCOM）：2011年設立、8か国\nオレンジ・センク川委員会（ORASECOM）：4か国で共同管理\n\n農業水管理設計への示唆\n国際河川を水源とする灌漑プロジェクトを計画する際には以下の検討が必要です。\n流域国間の水配分合意・条約の存在と内容の確認\n上流開発が下流の農業用水量に与える影響の定量評価\n下流国への悪影響（流量減少・水質悪化）を最小化する設計\n将来の気候変動・上流開発による水量変化へのリスク評価\n関係国間の情報共有・協議メカニズムへの参加\n\n気候変動と国際河川の将来\n気候変動によってアフリカの多くの国際河川で流量の変化が予測されており、上流・下流国間の水争いが激化するリスクがあります。持続可能な農業水管理のためには、個別国の灌漑計画を超えた「流域全体での統合水資源管理（IWRM）」の枠組みが不可欠です。","nameEn":"International river","summaryEn":"This refers to rivers that flow across multiple countries or rivers that form national borders. Since water use by upstream countries directly affects the water resource quantity and water quality of downstream countries, international frameworks for water allocation, joint management, and conflict resolution are essential.","detailEn":"There are two main types of international rivers:\n• Successive river: Rivers that pass through multiple countries in sequence (e.g., Nile River)\n• Boundary river: Rivers that form national borders (e.g., parts of the Zambezi River)\nThere are over 260 international river basins worldwide, covering approximately 45% of the Earth's land surface, with more than 40% of the world's population residing within international river basins (UN Water).\n\nBasic principles of international water law (1997 UN Watercourses Convention):\nEquitable and Reasonable Use: All riparian states have the right to equitably utilize water resources\nNo Significant Harm: States must not cause significant harm to other riparian states\nPrior notification and consultation obligations: New developments require prior notification and consultation with other riparian states\nInformation sharing: Sharing of hydrological data and water use information\nHowever, the 1997 Convention has not been ratified by Ethiopia, Egypt, China, and others, limiting its legal binding force.\n\nInstitutions for international river management\nNile Basin Initiative (NBI): Established in 1999, with participation from 11 basin countries (however, no agreement has been concluded)\nNiger Basin Authority (NBA): Established in 1980, 9 countries\nZambezi Watercourse Commission (ZAMCOM): Established in 2011, 8 countries\nOrange-Senqu River Commission (ORASECOM): Joint management by 4 countries\n\nImplications for agricultural water management design\nWhen planning irrigation projects that use international rivers as water sources, the following considerations are necessary:\nConfirmation of the existence and content of water allocation agreements and treaties between riparian states\nQuantitative assessment of the impact of upstream development on downstream agricultural water supply\nDesign to minimize adverse effects on downstream countries (flow reduction and water quality deterioration)\nRisk assessment of water quantity changes due to future climate change and upstream development\nParticipation in information sharing and consultation mechanisms among related countries\n\nClimate change and the future of international rivers\nClimate change is predicted to alter flow patterns in many international rivers in Africa, with risks of intensifying water conflicts between upstream and downstream countries. For sustainable agricultural water management, a framework of \"Integrated Water Resources Management (IWRM)\" at the basin level, beyond individual countries' irrigation plans, is essential.","image":"","captionJa":"","captionEn":"","published":"","name3":"Cours d'eau international","summary3":"Il s'agit de cours d'eau qui traversent plusieurs pays ou qui forment des frontières nationales. L'utilisation de l'eau par les pays en amont affecte directement la quantité et la qualité des ressources en eau des pays en aval, ce qui rend indispensables les cadres internationaux pour la répartition de l'eau, la gestion conjointe et la résolution des conflits.","detail3":"Il existe principalement deux types de cours d'eau internationaux :\n• Type successif (Successive river) : cours d'eau qui traversent plusieurs pays de manière séquentielle (exemple : le Nil)\n• Type frontalier (Boundary river) : cours d'eau qui forment une frontière entre pays (exemple : une partie du Zambèze)\nIl existe plus de 260 bassins fluviaux internationaux dans le monde, couvrant environ 45% de la superficie terrestre et abritant plus de 40% de la population mondiale (UN Water).\n\nPrincipes fondamentaux du droit international de l'eau (Convention des Nations Unies sur les cours d'eau de 1997) :\nUtilisation équitable et raisonnable (Equitable and Reasonable Use) : droit de tous les États riverains à utiliser équitablement les ressources en eau\nObligation de ne pas causer de dommages significatifs (No Significant Harm) : ne pas causer de dommages importants aux autres États riverains\nObligation de notification et consultation préalables : tout nouveau développement nécessite une notification préalable et une consultation avec les autres États riverains\nPartage d'informations : partage des données hydrologiques et des informations sur l'utilisation de l'eau\nCependant, la Convention de 1997 n'a pas été ratifiée par l'Éthiopie, l'Égypte, la Chine et d'autres pays, limitant ainsi sa force juridique contraignante.\n\nInstitutions pour la gestion des cours d'eau internationaux\nInitiative du bassin du Nil (NBI) : établie en 1999, participation de 11 pays du bassin (mais accord non conclu)\nAutorité du bassin du Niger (NBA) : établie en 1980, 9 pays\nCommission du bassin du Zambèze (ZAMCOM) : établie en 2011, 8 pays\nCommission de l'Orange-Senqu (ORASECOM) : gestion conjointe par 4 pays\n\nImplications pour la conception de la gestion de l'eau agricole\nLors de la planification de projets d'irrigation utilisant des cours d'eau internationaux comme source, les considérations suivantes sont nécessaires :\nVérification de l'existence et du contenu des accords et traités de répartition de l'eau entre États riverains\nÉvaluation quantitative de l'impact du développement en amont sur les volumes d'eau agricole en aval\nConception visant à minimiser les effets négatifs sur les pays en aval (réduction du débit, dégradation de la qualité de l'eau)\nÉvaluation des risques de changements des volumes d'eau dus au changement climatique et au développement en amont\nParticipation aux mécanismes de partage d'informations et de consultation entre pays concernés\n\nChangement climatique et avenir des cours d'eau internationaux\nLe changement climatique devrait entraîner des modifications de débit dans de nombreux cours d'eau internationaux africains, avec un risque d'intensification des conflits hydriques entre pays d'amont et d'aval. Pour une gestion durable de l'eau agricole, un cadre de « gestion intégrée des ressources en eau (GIRE) à l'échelle du bassin » dépassant les plans d'irrigation nationaux individuels est indispensable.","caption3":"","images":[]},{"rowNum":137,"id":"136","catCode":"CAT04","nameJa":"ブロックライニング水路","readingJa":"ぶろっくらいにんぐすいろ","summaryJa":"コンクリート・ブロックまたはレンガ・ブロックでライニング（内張り）した開水路や閉水路です。素掘り土水路に比べて漏水損失を大幅に削減し、維持管理を容易にします。農家の参加による施工も可能なため、コンクリート水路より建設コストが低くなります。三次用水路ではブロック単体で建設されることもあります。","detailJa":"・ ブロックライニング水路の種類\n1. コンクリート・ブロックライニング水路\n・セメント・砂・砂利を型枠で成型したプレキャストブロックを使用\n・強度が高く耐久性に優れる\n・ブロックサイズ・形状は標準化されており、品質管理が容易\n2. レンガ・ブロックライニング水路\n・粘土を焼成した焼成レンガ、またはセメントと砂を圧縮成型した圧縮土レンガ（CEB: Compressed Earth Block）を使用\n・セネガル川流域のSEADプロジェクトをはじめ、西アフリカで広く採用\n・現地調達の土・砂を原料とするため、材料コストをさらに低減できる場合がある\n\n・ブロックの製造と施工\n1.  製造基地（Block Production Yard）\nブロックは施工現場とは別の製造基地で集中的に生産\n手動プレス機または電動プレス機でブロックを成型・養生\n養生期間（通常7〜28日）を経て所定の強度を確認後、施工現場へ運搬\n地域住民や農家が製造作業に参加することで雇用創出にもつながる\n2. 施工方法\n水路床・側壁をブロックで積み上げ、モルタルで目地を埋める\n施工は熟練工でなくても比較的習得しやすく、農家グループによる施工（Farmer-led Construction）が可能\n施工後は目地部分の防水処理（モルタル仕上げ）が漏水防止の鍵となる\n\n・ コンクリート水路との比較\nコスト面：型枠不要・農家施工が可能なため、建設コストはコンクリート水路の60〜80%程度に抑えられる場合がある\n施工性：大型機械・熟練技術者への依存度が低い\n強度・耐久性：一体打ちコンクリートには劣るが、補修がブロック単位で行えるため維持管理しやすい\n目地部の弱点：目地モルタルの劣化・ひび割れが漏水の主要原因となるため、定期的な点検・補修が重要\n\n・ アフリカでの適用事例\nセネガル川流域（SEAD プロジェクト）：レンガ・ブロック水路が幹線・支線水路に広く導入。農家組合が施工・維持管理を担う参加型モデルが確立されている\nエチオピア・スーダン：小規模灌漑スキームの支線・末端水路にコンクリートブロックライニングが普及\nマリ・ブルキナファソ：現地製造のCEB（圧縮土レンガ）を活用したライニング水路の試みが行われている","nameEn":"Block lining canal","summaryEn":"These are open channels or closed channels lined with concrete blocks or brick blocks. Compared to unlined earth channels, they significantly reduce seepage losses and facilitate maintenance. Since construction with farmer participation is possible, the construction cost is lower than concrete channels. In tertiary irrigation channels, they may be constructed using individual blocks alone.","detailEn":"Types of Block-Lined Channels\n\n1. Concrete Block-Lined Channels\n・Use precast blocks molded in forms using cement, sand, and gravel\n・High strength and excellent durability\n・Block sizes and shapes are standardized, enabling easy quality control\n\n2. Brick Block-Lined Channels\n・Use fired bricks made from fired clay or Compressed Earth Blocks (CEB) made by compressing cement and sand\n・Widely adopted in West Africa, including the SEAD project in the Senegal River Basin\n・Material costs can be further reduced in some cases by using locally sourced soil and sand as raw materials\n\nBlock Manufacturing and Construction\n\n1. Block Production Yard\nBlocks are produced centrally at manufacturing bases separate from construction sites\nBlocks are molded and cured using manual or electric presses\nAfter the curing period (typically 7-28 days) and confirmation of specified strength, blocks are transported to construction sites\nLocal residents and farmers participating in manufacturing work contributes to employment creation\n\n2. Construction Method\nChannel beds and side walls are built up with blocks, and joints are filled with mortar\nConstruction is relatively easy to learn even for non-skilled workers, enabling farmer-led construction by farmer groups\nPost-construction waterproofing treatment of joints (mortar finishing) is key to preventing water leakage\n\nComparison with Concrete Channels\n\nCost: Construction costs can be reduced to approximately 60-80% of concrete channels due to no formwork requirement and possibility of farmer construction\nConstructability: Lower dependence on large machinery and skilled technicians\nStrength/Durability: Inferior to monolithic concrete but easier to maintain as repairs can be performed on a block-by-block basis\nJoint Weakness: Deterioration and cracking of joint mortar is the main cause of water leakage, making regular inspection and repair important\n\nApplication Cases in Africa\n\nSenegal River Basin (SEAD Project): Brick block channels are widely introduced in main and branch channels. A participatory model where farmer associations handle construction and maintenance has been established\nEthiopia/Sudan: Concrete block lining has spread to branch and terminal channels of small-scale irrigation schemes\nMali/Burkina Faso: Attempts are being made with lined channels using locally manufactured CEB (Compressed Earth Blocks)","image":"","captionJa":"","captionEn":"","published":"","name3":"Canal à revêtement en blocs","summary3":"Il s'agit de canaux ouverts ou fermés revêtus (doublés) de blocs de béton ou de briques. Par rapport aux canaux en terre non revêtus, ils réduisent considérablement les pertes par infiltration et facilitent l'entretien. La construction étant possible avec la participation des agriculteurs, les coûts de construction sont inférieurs à ceux des canaux en béton. Pour les canaux d'irrigation tertiaires, ils peuvent parfois être construits avec des blocs individuels.","detail3":"• Types de canaux à revêtement en blocs\n1. Canaux à revêtement en blocs de béton\n・Utilisation de blocs préfabriqués moulés dans des coffrages avec ciment, sable et gravier\n・Résistance élevée et excellente durabilité\n・Tailles et formes de blocs standardisées, facilitant le contrôle qualité\n2. Canaux à revêtement en blocs de brique\n・Utilisation de briques cuites d'argile ou de briques de terre comprimée (CEB : Compressed Earth Block) moulées par compression de ciment et sable\n・Largement adoptés en Afrique de l'Ouest, notamment dans le projet SEAD du bassin du fleuve Sénégal\n・Les coûts de matériaux peuvent être davantage réduits en utilisant comme matières premières la terre et le sable disponibles localement\n\n• Fabrication et construction des blocs\n1. Site de production des blocs (Block Production Yard)\nLes blocs sont produits de manière centralisée sur un site de fabrication séparé du chantier de construction\nMoulage et cure des blocs avec presse manuelle ou électrique\nTransport vers le chantier après la période de cure (généralement 7 à 28 jours) et confirmation de la résistance requise\nLa participation des résidents locaux et des agriculteurs aux travaux de fabrication contribue également à la création d'emplois\n2. Méthode de construction\nEmpilement de blocs pour le lit et les parois latérales du canal, comblement des joints au mortier\nLa construction est relativement facile à maîtriser même sans ouvriers qualifiés, permettant la construction dirigée par les agriculteurs (Farmer-led Construction)\nAprès construction, l'étanchéification des joints (finition au mortier) est la clé de la prévention des fuites\n\n• Comparaison avec les canaux en béton\nAspect coût : Les coûts de construction peuvent être réduits à environ 60-80% de ceux des canaux en béton grâce à l'absence de coffrages et à la possibilité de construction par les agriculteurs\nConstructibilité : Faible dépendance aux machines lourdes et techniciens qualifiés\nRésistance et durabilité : Inférieure au béton coulé monolithique, mais maintenance facilitée car les réparations peuvent être effectuées bloc par bloc\nFaiblesse des joints : La détérioration et fissuration du mortier de joint étant la principale cause de fuites, l'inspection et la réparation régulières sont importantes\n\n• Exemples d'application en Afrique\nBassin du fleuve Sénégal (projet SEAD) : Les canaux à revêtement en blocs de brique sont largement introduits dans les canaux principaux et secondaires. Un modèle participatif où les associations d'agriculteurs assurent la construction et la maintenance est établi\nÉthiopie et Soudan : Le revêtement en blocs de béton se répand dans les canaux secondaires et terminaux des systèmes d'irrigation à petite échelle\nMali et Burkina Faso : Des tentatives de canaux à revêtement utilisant des CEB (briques de terre comprimée) de fabrication locale sont en cours","caption3":"","images":[]},{"rowNum":138,"id":"137","catCode":"CAT04","nameJa":"取水ゲート","readingJa":"しゅすいげーと","summaryJa":"河川・貯水池・用水路から農業用水を取り込む取水施設に設置され、取水量の調節・遮断・制御を行うゲート設備です。頭首工・堰・ため池・用水路分水工など様々な施設に用いられ、水配分管理の要となります。適切な取水量の確保と洪水・土砂の流入防止を両立させる必要があり、施設の規模・用途・維持管理能力に応じた形式の選定が重要です。","detailJa":"1. 取水ゲートの種類\n・ スライドゲート（Slide Gate）：上下にスライドして開閉する最も一般的な形式。構造が単純で製作・維持管理コストが低く、アフリカの小・中規模灌漑施設に広く採用\n・ ローラーゲート（Roller Gate）：大型ゲートを機械ローラーで昇降する形式。大流量・高水圧条件に対応でき、幹線取水施設に使用\n・ フラップゲート（Flap Gate）：水圧差で自動開閉するゲート。動力・操作員が不要で電力供給の不安定な農村部に適しているが、ゴミなどで機能不全となる場合がある\n・ バタフライバルブ・スルースバルブ：管路型取水施設に使用。開閉操作が容易で小規模ため池の底樋として広く普及するが水圧により操作が困難な場合がある\n・ ティルティングウィアー（傾斜堰）：堰全体を傾けることで水位・流量を調節。自動化との親和性が高い\n\n 設置位置と構造\n・ 取水口ゲート：河川・貯水池から水路への取水口に設置。取水量の調節と洪水時の遮断を担う\n・ 分水ゲート：幹線水路から支線水路への分岐点に設置。各支線への配水量を調節\n・ 制水ゲート：水路途中に設置し水路内水位を管理。下流への流量調節や水路閉鎖に使用\n・ スクリーン（除塵設備）：ゲート前面に設置するメッシュ状の設備。流木・ゴミ・粗大土砂の流入を防止しゲートの損傷を防ぐ\n\n 操作方式\n手動操作　ハンドル・ネジ式。最もシンプルで低コスト\n小規模施設　農村部\n電動操作　モーター駆動。遠隔操作も可能　中・大規模施設・電力確保が可能な地域\n油圧操作　大型ゲートの開閉に対応　大規模幹線施設\n自動制御　水位センサーと連動して自動開閉　近代的灌漑システム\n\n維持管理のポイント\n・ 定期作動確認：ゲートの開閉操作を定期的に実施し固着・腐食による不作動を防止\n・ スクリーンの清掃：流木・雑草・ゴミの詰まりを除去。出水期前後は特に重点的に実施\n・ シール・パッキンの点検：止水部材の劣化による漏水を早期発見・補修\n・ 腐食対策：ゲート本体の塗装・防錆処理を定期的に実施。塩分環境では特に重要\n・ 操作記録の保管：開閉操作の日時・開度・水位などを記録し維持管理の基礎データとして活用\n\n アフリカにおける課題\n・ 固着・腐食による不作動：長期間操作されないゲートが錆・土砂の固着により開閉不能になるケースが多く、緊急時の水路閉鎖や洪水対応ができなくなるリスクがある\n・ 部品調達の困難：シール材・ハンドル・モーターなどの補修部品が現地で入手できず修理が長期化するケースが多い\n・ 操作技術の継承不足：操作マニュアルが整備されておらず担当者交代により適切な操作が行われなくなることがある\n・ 無断取水・ゲート改ざん：水配分をめぐる農家間の紛争からゲートが無断操作・破壊されるケースがあり、施錠管理と組織的な水管理体制の確立が重要\n\n 留意点\n取水ゲートは灌漑システムの水配分管理の要であり、設備の適切な維持管理と水利用者組合（WUA）による組織的な操作管理体制の両輪が機能して初めて公平・効率的な水配分が実現します。設計段階から維持管理のしやすさ（部品の現地調達性・操作の簡便さ）を優先した形式選定が、アフリカ農村部では特に重要です。","nameEn":"Intake gate","summaryEn":"This is gate equipment installed at intake facilities that draw agricultural water from rivers, reservoirs, and irrigation canals, and is used to regulate, shut off, and control water intake volume. It is employed in various facilities such as headworks, weirs, farm ponds, and irrigation canal diversion works, serving as a key component in water distribution management. It is necessary to achieve both securing appropriate intake volumes and preventing inflow of floods and sediment, making the selection of appropriate types according to facility scale, purpose, and maintenance capacity crucial.","detailEn":"1. Types of Intake Gates\n・ Slide Gate: The most common type that opens and closes by sliding up and down. Simple structure with low manufacturing and maintenance costs, widely adopted for small to medium-scale irrigation facilities in Africa\n・ Roller Gate: A type that raises and lowers large gates using mechanical rollers. Can handle high flow rates and high water pressure conditions, used for main intake facilities\n・ Flap Gate: A gate that automatically opens and closes based on water pressure differential. Suitable for rural areas with unstable power supply as it requires no power or operators, but may malfunction due to debris\n・ Butterfly Valve/Sluice Valve: Used for pipeline-type intake facilities. Easy to operate and widely used as bottom pipes for small-scale ponds, but operation may become difficult under high water pressure\n・ Tilting Weir: Adjusts water level and flow rate by tilting the entire weir. Highly compatible with automation\n\nInstallation Location and Structure\n・ Intake Gate: Installed at the intake point from rivers/reservoirs to canals. Responsible for adjusting intake volume and blocking during floods\n・ Diversion Gate: Installed at branch points from main canals to branch canals. Adjusts water distribution to each branch\n・ Control Gate: Installed along canals to manage water levels within canals. Used for downstream flow adjustment and canal closure\n・ Screen (Debris Removal Equipment): Mesh-type equipment installed in front of gates. Prevents inflow of driftwood, debris, and coarse sediment to protect gates from damage\n\nOperation Methods\nManual Operation: Handle/screw type. Simplest and lowest cost. Small-scale facilities, rural areas\nElectric Operation: Motor-driven. Remote operation possible. Medium to large-scale facilities, areas with secured power supply\nHydraulic Operation: Handles opening and closing of large gates. Large-scale main facilities\nAutomatic Control: Automatic opening and closing linked with water level sensors. Modern irrigation systems\n\nMaintenance Points\n・ Regular Operation Checks: Regularly perform gate opening and closing operations to prevent non-operation due to seizure and corrosion\n・ Screen Cleaning: Remove blockages from driftwood, weeds, and debris. Implement intensively before and after flood seasons\n・ Seal/Packing Inspection: Early detection and repair of water leakage due to deterioration of water-stop materials\n・ Corrosion Prevention: Regularly implement painting and rust-prevention treatment of gate bodies. Particularly important in saline environments\n・ Maintenance Record Keeping: Record date/time of opening and closing operations, opening degree, water level, etc., and utilize as basic data for maintenance management\n\nChallenges in Africa\n・ Non-operation due to Seizure and Corrosion: Many cases where gates not operated for long periods become unable to open and close due to rust and sediment seizure, creating risks of inability to close canals during emergencies or respond to floods\n・ Difficulty in Parts Procurement: Many cases where repair parts such as sealing materials, handles, and motors cannot be obtained locally, prolonging repair periods\n・ Insufficient Technical Knowledge Transfer: Lack of operation manuals and improper operation following staff changes\n・ Unauthorized Water Intake and Gate Tampering: Cases of unauthorized operation and destruction of gates due to conflicts between farmers over water distribution, making lockable management and establishment of organized water management systems important\n\nKey Considerations\nIntake gates are the cornerstone of water distribution management in irrigation systems, and equitable and efficient water distribution is achieved only when both proper equipment maintenance and organized operational management systems by Water User Associations (WUA) function together. Selecting gate types that prioritize ease of maintenance (local availability of parts and operational simplicity) from the design stage is particularly important in rural Africa.","image":"","captionJa":"","captionEn":"","published":"","name3":"Prise d'eau","summary3":"Il s'agit d'équipements de vannes installés dans les installations de prise d'eau qui captent l'eau agricole à partir de rivières, réservoirs et canaux d'irrigation, et qui effectuent la régulation, l'obstruction et le contrôle du débit de prise d'eau. Ces équipements sont utilisés dans diverses installations telles que les barrages de dérivation, les déversoirs, les étangs de retenue et les ouvrages de répartition des canaux d'irrigation, et constituent l'élément clé de la gestion de la distribution de l'eau. Il est nécessaire de concilier l'assurance d'un débit de prise d'eau approprié avec la prévention de l'intrusion des inondations et des sédiments, et la sélection du type approprié selon l'échelle, l'usage et la capacité de maintenance des installations est importante.","detail3":"1. Types de vannes de prise d'eau\n• Vanne à glissière (Slide Gate) : Type le plus courant qui s'ouvre et se ferme en coulissant verticalement. Structure simple avec des coûts de fabrication et de maintenance faibles, largement adoptée dans les installations d'irrigation de petite et moyenne échelle en Afrique\n• Vanne à rouleaux (Roller Gate) : Type qui élève et abaisse les grandes vannes avec des rouleaux mécaniques. Peut répondre aux conditions de gros débit et haute pression hydraulique, utilisée dans les installations de prise d'eau principales\n• Vanne à clapet (Flap Gate) : Vanne qui s'ouvre et se ferme automatiquement selon la différence de pression hydraulique. Ne nécessite ni alimentation ni opérateur, adaptée aux zones rurales où l'alimentation électrique est instable, mais peut dysfonctionner à cause des détritus\n• Vanne papillon et vanne de chasse : Utilisées dans les installations de prise d'eau de type canalisation. Manœuvre facile et largement répandues comme vannes de fond des petits étangs, mais l'opération peut être difficile selon la pression hydraulique\n• Déversoir basculant (Tilting Weir) : Ajuste le niveau d'eau et le débit en inclinant l'ensemble du déversoir. Haute compatibilité avec l'automatisation\n\nPosition d'installation et structure\n• Vanne de prise d'eau : Installée à l'entrée de prise d'eau des rivières et réservoirs vers les canaux. Responsable de l'ajustement du débit de prise d'eau et de la fermeture en cas d'inondation\n• Vanne de répartition : Installée aux points de bifurcation du canal principal vers les canaux secondaires. Ajuste la distribution d'eau vers chaque canal secondaire\n• Vanne de régulation : Installée le long du canal pour gérer le niveau d'eau dans le canal. Utilisée pour l'ajustement du débit vers l'aval ou la fermeture du canal\n• Écran (équipement de dégrillage) : Équipement en forme de grille installé devant la vanne. Empêche l'infiltration de bois flottant, détritus et gros sédiments pour éviter l'endommagement de la vanne\n\nMode d'opération\nOpération manuelle - À poignée et vis. Le plus simple et à faible coût - Petites installations - Zones rurales\nOpération électrique - Entraînement par moteur. Télécommande possible - Installations de moyenne et grande échelle - Zones où l'alimentation électrique peut être assurée\nOpération hydraulique - Correspond à l'ouverture et fermeture des grandes vannes - Grandes installations principales\nContrôle automatique - Ouverture et fermeture automatiques en liaison avec les capteurs de niveau d'eau - Systèmes d'irrigation modernes\n\nPoints de maintenance\n• Vérification de fonctionnement périodique : Effectuer périodiquement les opérations d'ouverture et fermeture des vannes pour prévenir le dysfonctionnement dû au grippage et à la corrosion\n• Nettoyage des écrans : Éliminer l'obstruction par le bois flottant, les mauvaises herbes et les détritus. Mise en œuvre particulièrement intensive avant et après la saison des crues\n• Inspection des joints et garnitures : Détection précoce et réparation des fuites dues à la détérioration des matériaux d'étanchéité\n• Mesures anticorrosion : Effectuer périodiquement la peinture et le traitement antirouille du corps de la vanne. Particulièrement important dans les environnements salins\n• Conservation des registres d'opération : Enregistrer la date et l'heure des opérations d'ouverture et fermeture, l'ouverture","caption3":"","images":[]},{"rowNum":139,"id":"138","catCode":"CAT04","nameJa":"土砂吐ゲート","readingJa":"どしゃはきげーと","summaryJa":"取水堰・頭首工・ため池・沈砂池などの底部または低位置に設置され、堆積した土砂を水流とともに下流へ排出するためのゲート設備です。定期的に開放することで施設内の土砂堆積を抑制し、有効貯水容量や取水機能を長期にわたって維持します。適切な運用計画と維持管理がなければ効果が発揮されないため、施設設計と一体的に計画することが重要です。","detailJa":"1. 土砂吐ゲートの種類\n・ スライドゲート（Slide Gate）：上下にスライドして開閉する最も一般的な形式。構造が単純で維持管理しやすく、アフリカの小・中規模施設に広く採用\n・ ローラーゲート（Roller Gate）：大型のゲートをローラーで昇降する形式。大流量・高水圧に対応できる\n・ フラップゲート（Flap Gate）：水圧差で自動的に開閉するゲート。動力不要で運用できるため電力供給が不安定な農村部に適している\nバルブ式（Pipe Sluice）：管路の途中に設けたバルブで流量を制御。小規模ため池の底樋（そこひ）として広く使用\n\n2. 設置位置と構造上の留意点\n・ 施設の最低部（底部）に設置することで土砂を効率よく排出できる\n・ ゲート前面に土砂が堆積してゲートが開かなくなる「ゲートの埋没」を防ぐため、ゲート周辺の流速確保と定期的な事前点検が重要\n・ 排砂時の高濃度土砂流による摩耗対策（硬化鋼・ゴムライニングなど）が耐久性確保の鍵\n・ 下流河道への土砂流出が環境・農地に与える影響を考慮した排砂計画が必要\n\n3. 運用方法\n・ 定期フラッシング：出水期前後など決まった時期にゲートを全開にして土砂を一気に排出。水位が高い時期に実施すると排砂効果が高い\n・ 低水位排砂：貯水位を下げた状態でゲートを開放し、底部の堆積土砂を集中的に排出\n・ 部分開放による持続排砂：ゲートを小開度に保ち、常時少量の土砂を排出し続ける方法。堆積の進行を日常的に抑制できる\n\n4. 維持管理のポイント\nゲートの作動確認　開閉操作・油圧系統の点検　月1回以上\nゲート周辺の堆積確認　埋没・閉塞の有無を確認　出水期前後\nシール・ゴムパッキンの点検　漏水・劣化の確認と交換　年1回\nゲート本体の腐食・摩耗点検　塗装補修・部品交換　年1回\n\n5. アフリカにおける課題\n・ 維持管理の不足：ゲートの長期放置による固着・腐食が多く、いざ排砂が必要な時に開閉できないケースが頻発している\n・ 操作技術・記録の欠如：排砂操作の手順や頻度が文書化されておらず、担当者交代により運用ノウハウが引き継がれないことが多い\n・ 部品調達の困難：ゲートのシール材・油圧部品などの交換部品が現地で入手できず、修理が長期間放置されるケースがある\n・ 排砂タイミングの判断：流量観測データが乏しく、最適な排砂タイミング（出水ピーク時など）の判断が経験頼みになりやすい\n\n6. 留意点\n土砂吐ゲートは設置するだけでは効果がなく、定期的な操作・点検・記録を組み込んだ維持管理計画の策定と、水利用者組合（WUA）など地元組織による自立的な管理体制の構築が不可欠です。","nameEn":"Sediment sluice gate","summaryEn":"This is a gate facility installed at the bottom or low position of intake weirs, headworks, reservoirs, settling ponds, and other structures to discharge accumulated sediment downstream along with water flow. By opening periodically, it suppresses sediment accumulation within the facility and maintains effective storage capacity and intake function over the long term. Since effectiveness cannot be achieved without proper operation plans and maintenance management, it is important to plan integrally with facility design.","detailEn":"1. Types of Sediment Release Gates\n・ Slide Gate: The most common type that opens and closes by sliding vertically. It has a simple structure and is easy to maintain, widely adopted in small and medium-scale facilities in Africa\n・ Roller Gate: A type that raises and lowers large gates using rollers. Can handle large flow rates and high water pressure\n・ Flap Gate: A gate that opens and closes automatically based on water pressure difference. Suitable for rural areas with unstable power supply as it can operate without power\n・ Pipe Sluice: Controls flow rate using valves installed in the pipeline. Widely used as bottom outlets for small-scale ponds\n\n2. Installation Position and Structural Considerations\n・ Installation at the lowest part (bottom) of the facility enables efficient sediment discharge\n・ To prevent \"gate burial\" where sediment accumulation in front of the gate prevents opening, ensuring flow velocity around the gate and regular preliminary inspections are important\n・ Wear resistance measures (hardened steel, rubber lining, etc.) against high-concentration sediment flow during flushing are key to ensuring durability\n・ Sediment discharge planning considering the impact of sediment discharge to downstream channels on environment and farmland is necessary\n\n3. Operation Methods\n・ Regular Flushing: Fully opening gates at fixed periods such as before and after flood seasons to discharge sediment at once. More effective when implemented during high water level periods\n・ Low Water Level Sediment Discharge: Opening gates with lowered reservoir water level to intensively discharge accumulated sediment at the bottom\n・ Continuous Discharge through Partial Opening: Method of keeping gates at small opening to continuously discharge small amounts of sediment. Can suppress accumulation progress on a daily basis\n\n4. Maintenance Points\nGate Operation Check: Inspection of opening/closing operation and hydraulic systems - More than once per month\nAccumulation Check around Gates: Confirmation of burial and blockage - Before and after flood seasons\nSeal and Rubber Packing Inspection: Confirmation and replacement of water leakage and deterioration - Once per year\nGate Body Corrosion and Wear Inspection: Paint repair and parts replacement - Once per year\n\n5. Challenges in Africa\n・ Insufficient Maintenance: Gates are often left unattended for long periods, causing seizure and corrosion, frequently resulting in inability to open and close when sediment discharge is needed\n・ Lack of Operational Skills and Records: Sediment discharge operation procedures and frequency are not documented, and operational know-how is often not transferred when personnel change\n・ Difficulty in Parts Procurement: Replacement parts such as gate sealing materials and hydraulic components cannot be obtained locally, leading to cases where repairs are left unattended for long periods\n・ Judgment of Sediment Discharge Timing: Due to scarce flow observation data, judgment of optimal sediment discharge timing (such as during flood peaks) tends to rely on experience\n\n6. Important Points\nSediment release gates are not effective merely by installation; it is essential to establish maintenance plans incorporating regular operation, inspection, and record-keeping, and to build autonomous management systems by local organizations such as Water Users Associations (WUA).","image":"","captionJa":"","captionEn":"","published":"","name3":"Vanne de décharge de sédiments","summary3":"Il s'agit d'un équipement de vannes installé au fond ou en position basse des barrages de prise d'eau, des ouvrages de tête, des bassins de retenue et des bassins de décantation, destiné à évacuer vers l'aval les sédiments accumulés avec le flux d'eau. En ouvrant périodiquement ces vannes, on supprime l'accumulation de sédiments dans les installations et on maintient à long terme la capacité de stockage utile et la fonction de prise d'eau. Il est important de planifier ces équipements de manière intégrée avec la conception des installations, car leur efficacité ne peut être obtenue sans un plan d'exploitation approprié et une maintenance adéquate.","detail3":"1. Types de vannes de décharge de sédiments\n• Vanne à glissière (Slide Gate) : Type le plus courant qui s'ouvre et se ferme par glissement vertical. Structure simple et facile à entretenir, largement adoptée dans les installations de petite et moyenne échelle en Afrique\n• Vanne à rouleaux (Roller Gate) : Type qui soulève et abaisse les grandes vannes avec des rouleaux. Peut faire face à de gros débits et à haute pression hydraulique\n• Vanne à clapet (Flap Gate) : Vanne qui s'ouvre et se ferme automatiquement par différence de pression hydraulique. Convient aux zones rurales où l'alimentation électrique est instable car elle peut fonctionner sans énergie motrice\n• Type à valve (Pipe Sluice) : Contrôle le débit par une valve installée au milieu de la conduite. Largement utilisé comme évacuateur de fond pour les petits réservoirs\n\n2. Position d'installation et points d'attention structurelle\n• L'installation à la partie la plus basse (fond) de l'installation permet d'évacuer efficacement les sédiments\n• Pour prévenir « l'enfouissement de la vanne » où les sédiments s'accumulent devant la vanne et l'empêchent de s'ouvrir, il est important d'assurer la vitesse d'écoulement autour de la vanne et d'effectuer des inspections préalables régulières\n• Les mesures contre l'usure due à l'écoulement de sédiments à haute concentration lors de l'évacuation (acier durci, doublure en caoutchouc, etc.) sont la clé pour assurer la durabilité\n• Un plan d'évacuation des sédiments est nécessaire en considérant l'impact de l'écoulement de sédiments vers le cours d'eau en aval sur l'environnement et les terres agricoles\n\n3. Méthodes d'exploitation\n• Chasse périodique : Ouvrir complètement la vanne à des périodes déterminées comme avant et après la saison des crues pour évacuer les sédiments d'un coup. L'effet d'évacuation est élevé lorsqu'elle est mise en œuvre pendant les périodes de niveau d'eau élevé\n• Évacuation à bas niveau d'eau : Ouvrir la vanne avec le niveau de stockage abaissé pour évacuer de manière concentrée les sédiments accumulés au fond\n• Évacuation continue par ouverture partielle : Méthode consistant à maintenir la vanne à une petite ouverture et à évacuer continuellement une petite quantité de sédiments. Permet de supprimer quotidiennement la progression de l'accumulation\n\n4. Points clés de la maintenance\nVérification du fonctionnement de la vanne - Inspection des opérations d'ouverture/fermeture et du système hydraulique - Plus d'une fois par mois\nVérification de l'accumulation autour de la vanne - Confirmation de la présence d'enfouissement/obstruction - Avant et après la saison des crues\nInspection des joints et garnitures en caoutchouc - Vérification et remplacement des fuites/détérioration - Une fois par an\nInspection de la corrosion/usure du corps de la vanne - Réparation de peinture/remplacement de pièces - Une fois par an\n\n5. Défis en Afrique\n• Insuffisance de la maintenance : Le grippage et la corrosion dus à l'abandon à long terme des vannes sont fréquents, et les cas où l'ouverture/fermeture est impossible lorsque l'évacuation des sédiments est nécessaire se produisent fréquemment\n• Manque de techniques d'exploitation et d'enregistrement : Les procédures et la fréquence des opérations d'évacuation ne sont pas documentées, et le savoir","caption3":"","images":[]},{"rowNum":140,"id":"139","catCode":"CAT04","nameJa":"沈砂池","readingJa":"ちんしゃち","summaryJa":"河川、用水路から取り込んだ水に含まれる土砂、浮遊物を、流速を低下させて自然沈降させることで除去する施設です。取水口の直下流や水路途中に設置され、下流の水路、圃場、施設への土砂流入を防ぎます。定期的な浚渫（堆積土砂の除去）を前提とした施設であり、維持管理計画と一体的に設計することが重要です。アフリカでは土砂濃度の高い河川からの取水が多く、沈砂池は灌漑施設の機能維持に欠かせない重要施設です。","detailJa":"1.  沈砂池の基本原理\n流速を落とすことで土砂粒子が水中を沈降し、池底に堆積する仕組みを利用します。沈降速度は粒径に依存し、粗砂は速やかに沈降しますが、シルト、粘土は沈降速度が遅く除去が難しくなります。\n\n【流入】高流速・高濁度　→　【沈砂池】流速低下・土砂沈降　　　　　　→　【流出】低濁度\n　　　取水口・水路　　　　　　　　拡幅・深掘りにより流速を低下　　　下流水路・圃場へ\n\n2. 設計上の主要パラメータ\n・ 池内流速：沈降させたい粒径に応じて設定。一般に0.3m/s以下が目安（細砂以上を除去する場合）\n・ 滞留時間：対象粒子が池底に到達するのに必要な時間を確保できる池の長さ・深さを設計\n・ 有効容量：浚渫周期（1週間・1ヶ月など）の間に堆積する土砂量を収容できる容量を死水容量として設定\n・ 越流堰・仕切り壁：流れを均一化し短絡流（水が池を横切らずに直進してしまう現象）を防ぐための構造\n\n3.  沈砂池の形式\n・ 単槽式：最もシンプルな形式。1つの池で沈砂と浚渫を交互に実施。小規模施設に適する\n・ 複槽式（並列式）：2槽以上を並列配置し、一方を使用中に他方を浚渫。連続取水が可能で中・大規模施設に適する\n・ 直列多段式：複数の池を直列に配置し、上流側で粗粒土砂、下流側で細粒土砂を段階的に除去\n\n4. 付帯設備\n・ 流入ゲート：取水量の調節と浚渫時の止水\n・ 土砂吐ゲート：底部に設置し堆積土砂を水流で排出（フラッシング）\n・ 越流堰：池内水位を一定に保ち流速を安定させる\n・ 計測設備：流量計・濁度計による流入状況のモニタリング\n\n 5. 維持管理\n・ 浚渫頻度の設定：流入土砂量・池容量から浚渫周期を算定し、計画的に実施\n・ 浚渫方法：小規模施設では人力浚渫が一般的。中・大規模ではバックホウ等の機械を使用\n・ 堆積土砂の処分：除去した土砂は農地への客土・盛土材料として有効活用できる場合がある\n・ 施設点検：ゲート・越流堰・側壁の損傷・漏水を定期確認\n\n6. アフリカにおける課題\n・ 高濁度河川への対応：サヘル地帯・エチオピア高原など侵食の激しい流域では土砂濃度が極めて高く、沈砂池の容量がすぐに満杯になり頻繁な浚渫が必要になる\n・ 浚渫の放置：維持管理体制が弱い施設では浚渫が行われず沈砂池が完全に埋まり、本来の機能を失っているケースが多い\n・ 雨季の集中管理：雨季に土砂流入が集中するため、雨季前後の集中的な点検・浚渫体制の確立が重要\n・ 簡易施設の普及：農村部の小規模灌漑では石積みや土堤による簡易沈砂池が多く、耐久性・機能性に課題がある\n\n7. 留意点\n沈砂池はシルト、粘土など微細粒子の完全除去は困難であり、除去対象粒径を明確にした上で設計することが重要です。また、浚渫を前提とした施設であるため、水利用者組合（WUA）による定期浚渫の実施と記録管理を維持管理計画に明確に位置づけることが長期的な機能維持の鍵となります。","nameEn":"Grit chamber","summaryEn":"This is a facility that removes sediment and suspended matter contained in water drawn from rivers and irrigation channels by reducing flow velocity and allowing natural sedimentation. It is installed directly downstream of intake points or along waterways to prevent sediment inflow into downstream channels, agricultural fields, and facilities. This facility is designed with the premise of regular dredging (removal of accumulated sediment), making it important to design it integrally with maintenance management plans. In Africa, water is frequently drawn from rivers with high sediment concentrations, making sedimentation basins essential facilities for maintaining the functionality of irrigation systems.","detailEn":"1. Basic Principles of Sedimentation Basins\nThe system utilizes the mechanism whereby sediment particles settle through water and deposit at the basin bottom by reducing flow velocity. Settling velocity depends on particle size; coarse sand settles rapidly, but silt and clay have slow settling velocities, making their removal difficult.\n\n[Inflow] High velocity・High turbidity → [Sedimentation Basin] Velocity reduction・Sediment settling → [Outflow] Low turbidity\nIntake・Channel                     Velocity reduction through widening and deepening     Downstream channel・Paddy field\n\n2. Major Design Parameters\n・ Flow velocity in basin: Set according to the particle size to be settled. Generally 0.3m/s or less is the guideline (when removing fine sand or coarser particles)\n・ Retention time: Design basin length and depth to ensure time necessary for target particles to reach the basin bottom\n・ Effective capacity: Set capacity to accommodate sediment volume depositing during dredging cycles (1 week, 1 month, etc.) as dead storage capacity\n・ Overflow weir・Partition walls: Structures to uniformize flow and prevent short-circuiting (phenomenon where water proceeds straight without crossing the basin)\n\n3. Types of Sedimentation Basins\n・ Single-tank type: Simplest form. Sedimentation and dredging performed alternately in one basin. Suitable for small-scale facilities\n・ Multi-tank type (parallel type): Two or more tanks arranged in parallel, allowing dredging of one while the other is in use. Enables continuous water intake and suitable for medium to large-scale facilities\n・ Series multi-stage type: Multiple basins arranged in series, removing coarse sediment upstream and fine sediment downstream in stages\n\n4. Auxiliary Equipment\n・ Inflow gate: Water intake adjustment and water cutoff during dredging\n・ Sediment discharge gate: Installed at bottom to discharge deposited sediment with water flow (flushing)\n・ Overflow weir: Maintains constant water level in basin and stabilizes flow velocity\n・ Measurement equipment: Monitoring of inflow conditions using flow meters and turbidity meters\n\n5. Operation and Maintenance\n・ Setting dredging frequency: Calculate dredging cycles from inflow sediment volume and basin capacity, implement systematically\n・ Dredging methods: Manual dredging common for small-scale facilities. Medium to large-scale use machinery such as backhoes\n・ Disposal of deposited sediment: Removed sediment can sometimes be effectively utilized as soil amendment or embankment material for agricultural land\n・ Facility inspection: Regular confirmation of damage and water leakage in gates, overflow weirs, and side walls\n\n6. Challenges in Africa\n・ Response to high-turbidity rivers: In watersheds with severe erosion such as the Sahel region and Ethiopian Highlands, sediment concentration is extremely high, causing sedimentation basin capacity to fill quickly and requiring frequent dredging\n・ Neglect of dredging: Many facilities with weak maintenance management systems fail to perform dredging, resulting in completely filled sedimentation basins that lose their original function\n・ Concentrated management during rainy season: Since sediment inflow concentrates during rainy season, establishing intensive inspection and dredging systems before and after rainy season is important\n・ Proliferation of simple facilities: Small-scale irrigation in rural areas often uses simple sedimentation basins with stone masonry or earth embankments, presenting challenges in durability and functionality\n\n7. Points for Consideration\nSedimentation basins have difficulty completely removing fine particles such as silt and clay, making it important to design with clearly defined target particle sizes for removal. Additionally, since these are facilities premised on dredging, clearly positioning regular dredging implementation and record management by Water Users Associations (WUA) in maintenance management plans is key to long-term functional maintenance.","image":"","captionJa":"","captionEn":"","published":"","name3":"Bassin de dessablage","summary3":"Il s'agit d'une installation qui élimine les sédiments et les matières en suspension contenus dans l'eau prélevée des rivières et des canaux d'irrigation en réduisant la vitesse d'écoulement pour permettre leur décantation naturelle. Elle est installée directement en aval de la prise d'eau ou le long du canal, et empêche l'infiltration de sédiments dans les canaux, les champs cultivés et les installations en aval. Cette installation présuppose un dragage régulier (élimination des sédiments accumulés), et il est important de la concevoir en intégration avec un plan de maintenance. En Afrique, où les prises d'eau se font souvent à partir de rivières à forte concentration sédimentaire, les bassins de décantation constituent des installations essentielles pour maintenir le fonctionnement des infrastructures d'irrigation.","detail3":"1. Principe de base des bassins de dessablage\nCe système utilise le mécanisme par lequel les particules de sédiments se déposent dans l'eau et s'accumulent au fond du bassin en réduisant la vitesse d'écoulement. La vitesse de sédimentation dépend du diamètre des particules : les sables grossiers se déposent rapidement, mais les silts et les argiles ont une vitesse de sédimentation lente, rendant leur élimination difficile.\n\n【Entrée】Vitesse élevée・Turbidité élevée → 【Bassin de dessablage】Diminution de la vitesse・Sédimentation des sédiments → 【Sortie】Faible turbidité\nPrise d'eau・Canal                    Réduction de la vitesse par élargissement et approfondissement        Canal aval・Vers les parcelles\n\n2. Paramètres principaux de conception\n・ Vitesse d'écoulement dans le bassin : fixée selon le diamètre des particules à faire sédimenter. Généralement 0,3 m/s ou moins comme référence (pour éliminer les sables fins et plus gros)\n・ Temps de séjour : conception de la longueur et de la profondeur du bassin permettant d'assurer le temps nécessaire aux particules cibles pour atteindre le fond\n・ Capacité utile : fixation d'une capacité de volume mort pouvant contenir la quantité de sédiments qui s'accumulent pendant le cycle de dragage (1 semaine, 1 mois, etc.)\n・ Déversoir et cloisons : structures pour uniformiser l'écoulement et empêcher les courts-circuits hydrauliques (phénomène où l'eau avance directement sans traverser le bassin)\n\n3. Types de bassins de dessablage\n・ Type à bassin unique : forme la plus simple. Dessablage et dragage alternés dans un seul bassin. Adapté aux petites installations\n・ Type à bassins multiples (en parallèle) : disposition en parallèle de 2 bassins ou plus, dragage de l'un pendant l'utilisation de l'autre. Prise d'eau continue possible, adapté aux installations moyennes et grandes\n・ Type en série à étages multiples : disposition en série de plusieurs bassins, élimination progressive des sédiments grossiers en amont et des sédiments fins en aval\n\n4. Équipements auxiliaires\n・ Vanne d'entrée : régulation du débit de prise d'eau et arrêt de l'eau lors du dragage\n・ Vanne de chasse : installée en partie basse pour évacuer les sédiments accumulés par écoulement d'eau (chasse)\n・ Déversoir : maintien d'un niveau d'eau constant dans le bassin et stabilisation de la vitesse d'écoulement\n・ Équipements de mesure : surveillance des conditions d'entrée par débitmètre et turbidimètre\n\n5. Maintenance\n・ Fixation de la fréquence de dragage : calcul du cycle de dragage à partir de la quantité de sédiments entrants et de la capacité du bassin, mise en œuvre planifiée\n・ Méthode de dragage : dragage manuel courant pour les petites installations. Utilisation de machines comme les pelleteuses pour les moyennes et grandes installations\n・ Traitement des sédiments de dépôt : les sédiments éliminés peuvent parfois être valorisés comme matériau d'apport de terre ou de remblai pour les terres agricoles\n・ Inspection des installations : vérification périodique des dommages et fuites des vannes, déversoirs et parois latérales\n\n6. Défis en Afrique\n・ Gestion des rivières à forte turbidité : dans les bassins versants à forte érosion comme la zone sahélienne et les hauts plateaux éthiopiens, la concentration de sédiments est extrêmement élevée, la capacité des bassins","caption3":"","images":[]},{"rowNum":141,"id":"140","catCode":"CAT04","nameJa":"土質試験","readingJa":"どしつしけん","summaryJa":"灌漑施設（水路、ため池、堰、圃場）の設計、施工に先立ち、地盤や土壌の物理的、力学的性質を把握したり、施工管理のために実施する調査、試験の総称です。適切な施設設計と施工トラブルの防止に不可欠であり、アフリカの多様な地盤条件（膨張性粘土、砂礫地盤、ラテライト層など）に対応した調査が求められます。","detailJa":"・ 土質試験の目的\n　水路、堰、ため池堤体の設計に必要な地盤強度、透水性の把握\n　圃場の土壌浸透速度、保水性の把握（灌漑方式の選定に直結）\n　地盤沈下、崩壊、パイピング（水の浸透による地盤の空洞化）リスクの評価\n　盛土、堤体材料としての土の適性評価\n\n・ 主な試験の種類\n1. 粒度試験（Grain Size Analysis）\n　　ふるい分析（粗粒土）と比重計分析（細粒土）により、砂、シルト、粘土の割合を測定\n　　土の分類（砂質土、粘性土、礫質土など）と透水性の推定に使用\n2. 土の締固め試験（Compaction Test / Proctor Test）\n　　盛土や堤体を締め固める際の最適含水比と最大乾燥密度を求める\n　　ため池堤体、水路盛土の施工管理の基準値として使用\n3. 透水試験（Permeability Test）\n　　定水位法、変水位法により土の透水係数を測定\n　　水路の漏水量推定、ため池堤体の浸透流解析に必要\n　　現場透水試験（現地での掘削孔を用いた試験）も重要\n4. 浸透速度試験（Infiltration Test）\n　　圃場表面から水が浸み込む速度を測定（ダブルリング法が標準的）\n　　表面灌漑、点滴灌漑など灌漑方式の選定に直結する重要試験\n　　アフリカの小規模灌漑設計では現場で簡易実施されることが多い\n5. 液性限界・塑性限界試験（Atterberg Limits Test）\n　　粘性土の含水比による状態変化（固体→半固体→塑性→液体）の境界値を測定\n　　膨張性粘土（スウェリングクレイ）の識別に重要\n　　アフリカに広く分布するブラックコットンソイル（黒綿土）の判定に活用\n6. 膨潤性試験（Swell Test）\n　　水を吸収したときの土の体積膨張量を測定\n　　膨張性粘土地盤上の水路、構造物の設計に必須\n　　エチオピア、ケニア、スーダンなどでは特に重要\n7. 一軸圧縮試験、三軸圧縮試験（Compression / Triaxial Test）\n　　土の粘着力、内部摩擦角などのせん断強度パラメータを求める\n　　水路法面の安定計算、堤体の安定解析に使用\n\n・ 現場調査の方法\nボーリング調査（Boring）\n　機械掘削により地層構成、地下水位を確認\n　標準貫入試験（SPT）と組み合わせて地盤強度を評価\n試掘（Test Pit）\n　人力または小型機械で地表から2〜3m程度の掘削\n　地層の目視確認と乱さない試料（不撹乱試料）の採取\n　アフリカの農村部では機材制約からボーリングより多く採用される\n簡易貫入試験（Simple Penetration Test）\n　軽量の貫入装置を用いた地盤硬さの現場測定\n　機材が軽量、安価で農村部での調査に適している\n\n・ 留意点\n・ アフリカの農村部では試験機材、技術者の確保が困難な場合が多く、簡易試験と経験的判断を組み合わせた実用的なアプローチが求められる\n・ 雨季、乾季で地盤の含水状態が大きく変わるため、季節を考慮した調査計画が重要\n・ 地域の伝統的知識（地元農家の地盤に関する経験的情報）も初期調査の貴重な情報源となる\n・ ブラックコットンソイル（黒綿土）　エチオピア、ケニア、スーダン、ナイジェリア　乾燥時に亀裂、湿潤時に大きく膨張。水路の変形・破損の主因\n・ ラテライト　西、中央アフリカ全域　表層は硬いが深部は脆弱。盛土材料としての適性評価が必要\n・砂礫地盤（沖積扇状地）　乾燥地、河川沿い　透水性が高く漏水リスク大。ライニングが必須\n・ 膨張性シルト　ナイル川流域　飽和時に強度低下。水路法面の崩壊リスク","nameEn":"Soil testing","summaryEn":"This is a general term for surveys and tests conducted to understand the physical and mechanical properties of ground and soil, or for construction management, prior to the design and construction of irrigation facilities (channels, reservoirs, weirs, and fields). It is essential for appropriate facility design and prevention of construction troubles, and surveys corresponding to Africa's diverse ground conditions (expansive clay, sandy gravel ground, laterite layers, etc.) are required.","detailEn":"• Purpose of Soil Testing\nTo understand ground strength and permeability necessary for the design of irrigation channels, weirs, and pond embankments\nTo understand soil infiltration rate and water retention capacity of farmland (directly linked to irrigation system selection)\nTo evaluate risks of ground subsidence, collapse, and piping (ground cavitation due to water infiltration)\nTo evaluate soil suitability as fill and embankment materials\n\n• Main Types of Tests\n1. Grain Size Analysis\nMeasurement of sand, silt, and clay proportions through sieve analysis (coarse-grained soil) and hydrometer analysis (fine-grained soil)\nUsed for soil classification (sandy soil, cohesive soil, gravelly soil, etc.) and permeability estimation\n2. Compaction Test / Proctor Test\nDetermination of optimum moisture content and maximum dry density when compacting fill or embankments\nUsed as reference values for construction management of pond embankments and channel fills\n3. Permeability Test\nMeasurement of soil permeability coefficient using constant head method and falling head method\nRequired for estimating seepage from channels and seepage flow analysis of pond embankments\nField permeability tests (tests using excavated holes on site) are also important\n4. Infiltration Test\nMeasurement of water infiltration rate from farmland surface (double ring method is standard)\nCritical test directly linked to irrigation system selection such as surface irrigation and drip irrigation\nOften implemented simply in the field for small-scale irrigation design in Africa\n5. Atterberg Limits Test\nMeasurement of boundary values for state changes of cohesive soil due to moisture content (solid → semi-solid → plastic → liquid)\nImportant for identifying expansive clay (swelling clay)\nUtilized for determining black cotton soil widely distributed in Africa\n6. Swell Test\nMeasurement of soil volume expansion when absorbing water\nEssential for designing channels and structures on expansive clay ground\nParticularly important in Ethiopia, Kenya, Sudan, etc.\n7. Compression / Triaxial Test\nDetermination of shear strength parameters such as soil cohesion and internal friction angle\nUsed for stability calculations of channel slopes and stability analysis of embankments\n\n• Field Investigation Methods\nBoring\nConfirmation of geological composition and groundwater level through mechanical excavation\nEvaluation of ground strength in combination with Standard Penetration Test (SPT)\nTest Pit\nExcavation of approximately 2-3m from ground surface by manual labor or small machinery\nVisual confirmation of geological layers and collection of undisturbed samples\nMore frequently adopted than boring in African rural areas due to equipment constraints\nSimple Penetration Test\nField measurement of ground hardness using lightweight penetration equipment\nSuitable for rural area investigations due to lightweight and inexpensive equipment\n\n• Considerations\n• In African rural areas, securing test equipment and technicians is often difficult, requiring practical approaches combining simple tests with empirical judgment\n• Since ground moisture conditions change significantly between rainy and dry seasons, investigation planning considering seasons is important\n• Traditional local knowledge (empirical information about ground conditions from local farmers) also serves as valuable information for initial surveys\n• Black Cotton Soil Ethiopia, Kenya, Sudan, Nigeria - Cracks during dry periods and expands significantly when wet. Main cause of channel deformation and damage\n• Laterite West and Central Africa - Surface layer is hard but deep layers are fragile. Evaluation of suitability as fill material is necessary\n• Sand and gravel ground (alluvial fan) Arid regions, along rivers - High permeability with major seepage risk. Lining is essential\n• Expansive silt Nile River basin - Strength decreases when saturated. Risk of channel slope collapse","image":"","captionJa":"","captionEn":"","published":"","name3":"Essai géotechnique","summary3":"Il s'agit de l'ensemble des études et essais réalisés pour comprendre les propriétés physiques et mécaniques du sol et des terrains, ainsi que pour le contrôle de l'exécution, préalablement à la conception et à la construction d'installations d'irrigation (canaux, bassins de retenue, barrages, parcelles cultivées). Ces investigations sont indispensables pour une conception appropriée des installations et la prévention des problèmes de construction, et nécessitent des études adaptées aux diverses conditions géotechniques de l'Afrique (argiles gonflantes, terrains sablo-graveleux, horizons latéritiques, etc.).","detail3":"• Objectifs des essais géotechniques\nDétermination de la résistance du sol et de la perméabilité nécessaires à la conception des canaux, barrages et digues de retenues d'eau\nDétermination de la vitesse d'infiltration et de la capacité de rétention d'eau des sols agricoles (directement liée au choix du système d'irrigation)\nÉvaluation des risques de tassement, d'effondrement et de renard hydraulique (formation de cavités dans le sol par infiltration d'eau)\nÉvaluation de l'aptitude des sols comme matériau de remblai et de digue\n\n• Principaux types d'essais\n1. Analyse granulométrique (Grain Size Analysis)\nMesure des proportions de sable, limon et argile par tamisage (sols grossiers) et analyse densimétrique (sols fins)\nUtilisée pour la classification des sols (sols sableux, argileux, graveleux, etc.) et l'estimation de la perméabilité\n\n2. Essai de compactage Proctor (Compaction Test / Proctor Test)\nDétermination de la teneur en eau optimale et de la densité sèche maximale lors du compactage des remblais et digues\nUtilisé comme valeur de référence pour le contrôle de mise en œuvre des digues de retenues d'eau et remblais de canaux\n\n3. Essai de perméabilité (Permeability Test)\nMesure du coefficient de perméabilité du sol par méthode à charge constante ou variable\nNécessaire pour l'estimation des fuites de canaux et l'analyse d'écoulement souterrain dans les digues de retenues d'eau\nLes essais de perméabilité in situ (essais utilisant des forages sur site) sont également importants\n\n4. Essai d'infiltration (Infiltration Test)\nMesure de la vitesse d'infiltration de l'eau depuis la surface du champ (méthode du double anneau standard)\nEssai important directement lié au choix du système d'irrigation (irrigation de surface, irrigation goutte à goutte, etc.)\nSouvent réalisé de manière simplifiée sur site pour la conception d'irrigation à petite échelle en Afrique\n\n5. Essai des limites d'Atterberg (Atterberg Limits Test)\nMesure des valeurs limites de changement d'état des sols argileux selon la teneur en eau (solide→semi-solide→plastique→liquide)\nImportant pour l'identification des argiles gonflantes (argiles expansives)\nUtilisé pour la détermination des sols noirs cotonniers (Black Cotton Soil) largement distribués en Afrique\n\n6. Essai de gonflement (Swell Test)\nMesure du volume d'expansion du sol lors de l'absorption d'eau\nIndispensable pour la conception de canaux et structures sur sols argileux expansifs\nParticulièrement important en Éthiopie, Kenya, Soudan, etc.\n\n7. Essai de compression uniaxiale et triaxiale (Compression / Triaxial Test)\nDétermination des paramètres de résistance au cisaillement comme la cohésion et l'angle de frottement interne du sol\nUtilisé pour les calculs de stabilité des talus de canaux et l'analyse de stabilité des digues\n\n• Méthodes d'investigation sur site\nSondage (Boring)\nConfirmation de la composition stratigraphique et du niveau de nappe phréatique par forage mécanique\nÉvaluation de la résistance du sol en combinaison avec l'essai de pénétration standard (SPT)\n\nPuits d'essai (Test Pit)\nExcavation d'environ 2-3 m depuis la surface par main-d'œuvre ou petit engin\nConfirmation visuelle des couches et prélèvement d'échantillons intacts\nPlus fréquemment adopté que le forage dans les zones rurales africaines en raison","caption3":"","images":[]},{"rowNum":142,"id":"141","catCode":"CAT04","nameJa":"設計堆砂量","readingJa":"せっけいたいすなりょう","summaryJa":"ため池、貯水池、取水施設などの設計において、供用期間中に堆積する土砂量を事前に見込んだ計画容量です。河川や用水路を通じて流入する土砂は、施設の有効貯水容量を徐々に減少させるため、設計段階で堆積量を適切に見込むことが施設の長期的な機能維持に不可欠です。アフリカでは土壌侵食が激しい流域が多く、堆積量の過小評価が施設の早期機能喪失につながる重大なリスクとなっています。","detailJa":"1. 堆積土砂の発生メカニズム\n・ 面的侵食（Sheet Erosion）：降雨による表土の剥離、流出。植生被覆の乏しい農地、裸地で特に顕著\n・ ガリー侵食（Gully Erosion）：集中した表面流による溝状の侵食。一度発生すると急速に拡大する\n・ 河床侵食・河岸侵食：出水時の流速増大により河床、河岸が削られ、土砂が下流へ運搬される\n・ 風食（Wind Erosion）：乾燥地・半乾燥地では風による砂の移動、堆積も無視できない\n\n 2. 設計堆積量の算定方法\n・ 土砂流出量の推定（USLE/MUSLE）：汎用土壌侵食式（Universal Soil Loss Equation）により流域からの土砂流出量を算定。降雨侵食力、土壌侵食性、傾斜、植生、保全対策の各係数を乗じて推定\n・ トラップ効率（Trap Efficiency）：流入土砂のうち施設内に堆積する割合。貯水池の容量と流入量の比（容量流入量比）から推定（Brune曲線などを使用）\n・ 実測による推定：既存の類似施設における堆積実績から単位流域面積あたりの年間堆積量を推定し、設計に転用\n\n3.  設計への反映方法\n・ 死水容量（Dead Storage）の設定：ため池・貯水池の設計において、供用期間（一般に20〜50年）分の堆積土砂量を死水容量として確保し、有効貯水容量を別途設定する\n・ 排砂設備の設置：フラッシング（排砂ゲートによる土砂の強制排出）や排砂バイパスの設置により堆積を抑制\n・ 水路設計への反映：用水路では計画流速を土砂が堆積しない自浄流速以上に設定する\n\n 4. 堆積土砂対策\n流域対策\n植林・草地造成・等高線耕作による侵食源の抑制\n施設上流対策\n砂防堰堤・沈砂池による土砂捕捉\n施設内対策\n排砂ゲート・フラッシングによる土砂排出\n維持管理対策\n定期的な浚渫（しゅんせつ）による堆積土砂の除去\n\n 5. アフリカにおける課題\n・ 侵食の激しさ：エチオピア高原、サヘル地帯、マダガスカルなどでは植生破壊と急峻な地形により土壌侵食が極めて深刻で、ため池の堆砂速度が設計値を大幅に上回るケースが多い\n・ 観測データの不足：流砂量の観測記録がほとんどなく、設計堆積量の推定精度が低くなりやすい\n・ 維持管理能力の制約：浚渫機械の調達、運用が困難な農村部では、堆積が進んでも対処できないまま施設が機能を失うケースがある\n・ 気候変動の影響：集中豪雨の増加により土砂流出量が増大する傾向があり、従来の設計値の見直しが求められている\n\n6.  留意点\n設計段階での堆積量算定だけでなく、完成後の定期的な堆砂測量（バシメトリー調査）による実績把握と、流域の侵食対策との一体的な計画が長期的な施設機能の維持に不可欠です。","nameEn":"Design sediment capacity","summaryEn":"This is the planned capacity that anticipates the volume of sediment that will accumulate during the service period in the design of farm ponds, reservoirs, water intake facilities, and similar structures. Sediment flowing in through rivers and irrigation channels gradually reduces the effective storage capacity of facilities, making it essential to appropriately account for sedimentation volume at the design stage for long-term functional maintenance of the facilities. In Africa, many watersheds experience severe soil erosion, and underestimation of sedimentation volume poses a significant risk that can lead to premature loss of facility function.","detailEn":"1. Sediment Generation Mechanisms\n• Sheet Erosion: Stripping and runoff of topsoil due to rainfall. Particularly prominent in farmland and bare land with poor vegetation cover\n• Gully Erosion: Groove-shaped erosion caused by concentrated surface flow. Once initiated, it rapidly expands\n• Riverbed Erosion and Bank Erosion: During floods, increased flow velocity erodes riverbeds and banks, transporting sediment downstream\n• Wind Erosion: In arid and semi-arid regions, sand movement and deposition by wind cannot be ignored\n\n2. Design Sedimentation Volume Calculation Methods\n• Sediment Yield Estimation (USLE/MUSLE): Calculate sediment yield from watersheds using the Universal Soil Loss Equation. Estimated by multiplying rainfall erosivity, soil erodibility, slope, vegetation, and conservation practice factors\n• Trap Efficiency: The proportion of inflowing sediment that deposits within the facility. Estimated from the ratio of reservoir capacity to inflow (capacity-inflow ratio) using Brune curves and similar methods\n• Estimation Based on Field Measurements: Estimate annual sedimentation volume per unit watershed area from actual sedimentation records at existing similar facilities and apply to design\n\n3. Incorporation into Design\n• Dead Storage Setting: In pond and reservoir design, secure dead storage capacity equivalent to sediment accumulation for the service period (generally 20-50 years) and separately establish effective storage capacity\n• Installation of Sediment Discharge Facilities: Suppress sedimentation through flushing (forced sediment discharge via sluice gates) and installation of sediment bypass systems\n• Incorporation into Canal Design: In irrigation canals, set planned flow velocity above the self-cleansing velocity that prevents sediment deposition\n\n4. Sediment Control Measures\nWatershed Measures\nErosion source control through afforestation, grassland establishment, and contour farming\nUpstream Facility Measures\nSediment capture using check dams and settling basins\nIn-facility Measures\nSediment discharge through sluice gates and flushing\nMaintenance and Management Measures\nRemoval of deposited sediment through periodic dredging\n\n5. Challenges in Africa\n• Severity of Erosion: In the Ethiopian Highlands, Sahel region, Madagascar, and other areas, soil erosion is extremely severe due to vegetation destruction and steep topography, with many cases where pond sedimentation rates significantly exceed design values\n• Lack of Observation Data: With virtually no sediment load observation records, the accuracy of design sedimentation volume estimation tends to be low\n• Maintenance and Management Capacity Constraints: In rural areas where procurement and operation of dredging equipment is difficult, facilities may lose function as sedimentation progresses without adequate countermeasures\n• Climate Change Impacts: Increasing concentrated rainfall tends to increase sediment yield, requiring revision of conventional design values\n\n6. Important Considerations\nIn addition to sedimentation volume calculation at the design stage, regular post-completion sediment surveys (bathymetry surveys) for performance assessment and integrated planning with watershed erosion control measures are essential for long-term facility function maintenance.","image":"","captionJa":"","captionEn":"","published":"","name3":"Volume de sédimentation de conception","summary3":"Il s'agit de la capacité de stockage planifiée qui prend en compte à l'avance la quantité de sédiments qui s'accumuleront pendant la période d'exploitation dans la conception d'étangs de retenue, de réservoirs, d'installations de captage d'eau et autres. Les sédiments qui s'écoulent par les rivières et les canaux d'irrigation réduisent progressivement la capacité de stockage utile des installations, il est donc indispensable d'estimer correctement la quantité de sédimentation dès la phase de conception pour maintenir le fonctionnement à long terme des installations. En Afrique, de nombreux bassins versants subissent une érosion des sols intense, et la sous-estimation de la quantité de sédimentation constitue un risque majeur pouvant conduire à une perte prématurée de fonctionnalité des installations.","detail3":"1. Mécanisme de formation des sédiments déposés\n• Érosion en nappe (Sheet Erosion) : Arrachement et écoulement de la couche superficielle du sol par les précipitations. Particulièrement notable dans les terres agricoles et terrains nus à faible couverture végétale\n• Érosion par ravines (Gully Erosion) : Érosion en forme de sillons causée par l'écoulement superficiel concentré. Une fois déclenchée, elle s'étend rapidement\n• Érosion du lit fluvial et des berges : Le lit et les berges sont érodés par l'augmentation de la vitesse d'écoulement lors des crues, et les sédiments sont transportés vers l'aval\n• Érosion éolienne (Wind Erosion) : Dans les zones arides et semi-arides, le déplacement et le dépôt de sable par le vent ne peuvent être négligés\n\n2. Méthodes de calcul du volume de dépôt de conception\n• Estimation du volume d'écoulement sédimentaire (USLE/MUSLE) : Calcul du volume d'écoulement sédimentaire du bassin versant par l'équation universelle de perte de sol (Universal Soil Loss Equation). Estimation par multiplication des coefficients respectifs de force d'érosion pluviale, érodabilité du sol, pente, végétation et mesures de conservation\n• Efficacité de piégeage (Trap Efficiency) : Proportion des sédiments entrants qui se déposent dans l'installation. Estimation à partir du rapport entre la capacité du réservoir et le volume d'entrée (rapport capacité/volume d'entrée) (utilisation de la courbe de Brune, etc.)\n• Estimation par mesures réelles : Estimation du volume de dépôt annuel par unité de surface de bassin versant à partir des résultats de dépôt d'installations similaires existantes, et application à la conception\n\n3. Méthodes de réflexion dans la conception\n• Définition du volume d'eau morte (Dead Storage) : Dans la conception d'étangs de retenue et de réservoirs, sécuriser le volume de sédiments déposés pour la période d'exploitation (généralement 20 à 50 ans) comme volume d'eau morte, et définir séparément la capacité de stockage effective\n• Installation d'équipements d'évacuation des sédiments : Suppression du dépôt par l'installation de chasses (évacuation forcée des sédiments par vannes de décharge) ou de dérivations d'évacuation des sédiments\n• Réflexion dans la conception des canaux : Pour les canaux d'irrigation, définir la vitesse d'écoulement planifiée au-dessus de la vitesse d'auto-épuration où les sédiments ne se déposent pas\n\n4. Mesures contre les sédiments déposés\nMesures du bassin versant\nSuppression des sources d'érosion par reboisement, création de prairies, culture en courbes de niveau\nMesures en amont des installations\nCapture des sédiments par barrages de protection contre l'érosion torrentielle et bassins de décantation\nMesures à l'intérieur des installations\nÉvacuation des sédiments par vannes de décharge et chasses\nMesures de maintenance\nÉlimination des sédiments déposés par dragage périodique\n\n5. Défis en Afrique\n• Intensité de l'érosion : Dans les hauts plateaux éthiopiens, la zone du Sahel, Madagascar, etc., l'érosion du sol est extrêmement grave en raison de la destruction de la végétation et de la topographie abrupte, et il y a de nombreux cas où la vitesse d'envasement des étangs de retenue dépasse largement les valeurs de conception\n• Manque de données d'observation : Il y a très peu

inciples and Methods of Water Allocation:\n1. First-come, first-served (Prior appropriation): Priority given to those who obtained usage rights first (Western United States, etc.)\n2. Proportional sharing: Allocation to all users in proportion to water volume (proportional reduction during droughts)\n3. Priority system: Pre-established priority order such as drinking water > agriculture > industry, etc.\n4. Negotiation and agreement system: Allocation determined through agreement among users (participatory management)\n\nIssues in International Water Allocation:\nWater allocation among Egypt, Sudan, and Ethiopia, which share the Nile River, has been a long-standing international issue. The 1959 Nile Waters Agreement was concluded only between Egypt and Sudan, and did not include upstream countries including Ethiopia. Negotiations regarding the Grand Ethiopian Renaissance Dam construction continue to this day.\n\nWater Allocation During Droughts:\nDuring droughts, demand exceeds supply, necessitating allocation adjustments based on pre-established priorities and reduction rules. Development of a \"Drought Management Plan\" and dissemination to farmers is crucial.\n\nBasin Water Allocation Organizations in Africa:\nOrganizations such as the Nile Basin Initiative (Nile River), Niger Basin Authority (Niger River), and Zambezi Watercourse Commission (Zambezi River) have been established to coordinate international water allocation.","image":"","captionJa":"","captionEn":"","published":"","name3":"Répartition de l'eau","summary3":"C'est un mécanisme et un processus qui détermine comment répartir les ressources hydriques limitées entre plusieurs utilisateurs, objectifs et régions. Il établit les priorités et les volumes d'allocation entre les usages agricoles, urbains, industriels, environnementaux, etc.","detail3":"Principes et méthodes de répartition de l'eau :\n1. Droits d'eau par priorité d'antériorité (First-come, first-served) : priorité à celui qui a obtenu les droits d'usage en premier (ouest des États-Unis, etc.)\n2. Système de répartition proportionnelle (Proportional sharing) : répartition entre tous les utilisateurs proportionnellement au volume d'eau (réduction proportionnelle même en période de sécheresse)\n3. Système de priorité : établissement préalable d'un ordre de priorité tel que eau potable > agriculture > industrie, etc.\n4. Système de négociation et d'accord : détermination de la répartition par accord entre les utilisateurs (gestion participative)\n\nProblèmes de répartition internationale de l'eau :\nLa répartition de l'eau du Nil entre l'Égypte, le Soudan et l'Éthiopie constitue un problème international de longue date. Le Traité des eaux du Nil de 1959 n'a été conclu qu'entre l'Égypte et le Soudan, excluant l'Éthiopie et les autres pays en amont. Les négociations concernant la construction du Grand Barrage de la Renaissance se poursuivent actuellement.\n\nRépartition de l'eau en période de sécheresse :\nEn période de sécheresse, la demande dépassant l'offre, il est nécessaire d'ajuster la répartition selon les priorités et règles de réduction établies à l'avance. L'élaboration d'un « Plan de gestion de la sécheresse (Drought Management Plan) » et sa diffusion auprès des agriculteurs sont importantes.\n\nOrganismes de répartition de l'eau des bassins versants africains :\nL'Initiative du bassin du Nil (pour le Nil), l'Autorité du bassin du Niger (pour le Niger), l'Organisation du bassin du Zambèze (pour le Zambèze), etc., ont été créées et sont chargées de coordonner la répartition internationale de l'eau.","caption3":"","images":[]},{"rowNum":98,"id":"097","catCode":"CAT07","nameJa":"土地利用計画","readingJa":"とちりようけいかく","summaryJa":"農地・森林・都市・インフラ等の土地の使用目的を空間的に計画・配分する行政計画です。農業用地の確保・灌漑開発用地の確定・土地改変の規制に関わります。","detailJa":"土地利用計画と農業水管理の関係：\n・農地の確保：都市化・開発による農地転用の規制\n・灌漑受益地の指定：灌漑開発対象地の確定と土地権利整理\n・流域保全地域：水源涵養林・湿地等の保護区域の設定\n・排水用地：排水路・調整池用地の確保\n\n土地利用計画の手続き：\n・現況調査（土地利用現況図・土地条件図の作成）\n・土地適性評価（農業適性・開発適性の分析）\n・計画策定（ゾーニング・用途地域の設定）\n・承認・告示・実施\n・モニタリングと見直し\n\nアフリカの土地利用計画の課題：\n・土地登記が不完全で土地権利が曖昧な地域が多い\n・慣習的土地利用権と法定土地権利の衝突\n・大規模農地収奪（Land Grabbing）問題：外国投資家による大規模農地の取得\n・農業用地と都市拡張・採掘業の競合\n\n土地利用と灌漑開発：\n灌漑開発予定地の土地権利の明確化は、農家の投資意欲と灌漑施設の持続的利用の前提条件です。土地保有の安定なしに農家は長期的な農地改良投資を行いません。","nameEn":"Land Use Planning","summaryEn":"This is an administrative plan that spatially plans and allocates land use purposes for agricultural land, forests, urban areas, infrastructure, and other land uses. It involves securing agricultural land, determining land for irrigation development, and regulating land modification.","detailEn":"Relationship between Land Use Planning and Agricultural Water Management:\n・Securing farmland: Regulation of farmland conversion due to urbanization and development\n・Designation of irrigation benefit areas: Determination of irrigation development target areas and land rights arrangement\n・Watershed conservation areas: Establishment of protected areas for water source conservation forests, wetlands, etc.\n・Drainage land: Securing land for drainage channels and retention ponds\n\nLand Use Planning Procedures:\n・Current condition survey (preparation of current land use maps and land condition maps)\n・Land suitability evaluation (analysis of agricultural suitability and development suitability)\n・Plan formulation (zoning and land use district designation)\n・Approval, announcement, and implementation\n・Monitoring and review\n\nChallenges in Land Use Planning in Africa:\n・Many areas have incomplete land registration and ambiguous land rights\n・Conflict between customary land use rights and statutory land rights\n・Large-scale Land Grabbing issues: Acquisition of large-scale farmland by foreign investors\n・Competition between agricultural land and urban expansion/mining industry\n\nLand Use and Irrigation Development:\nClarification of land rights in planned irrigation development areas is a prerequisite for farmers' investment motivation and sustainable use of irrigation facilities. Without stable land tenure, farmers will not make long-term agricultural land improvement investments.","image":"","captionJa":"","captionEn":"","published":"","name3":"Plan d'occupation des sols","summary3":"C'est un plan administratif qui planifie et répartit spatialement les usages des terres tels que les terres agricoles, les forêts, les zones urbaines et les infrastructures. Il concerne la sécurisation des terres agricoles, la délimitation des terres de développement de l'irrigation et la réglementation de la modification des terres.","detail3":"Relation entre planification de l'utilisation des terres et gestion de l'eau agricole :\n• Sécurisation des terres agricoles : réglementation de la conversion des terres agricoles due à l'urbanisation et au développement\n• Désignation des zones bénéficiaires d'irrigation : définition des zones cibles de développement de l'irrigation et régularisation des droits fonciers\n• Zones de conservation des bassins versants : établissement de zones protégées pour les forêts de conservation des sources d'eau, zones humides, etc.\n• Terrains de drainage : sécurisation des terrains pour les canaux de drainage et bassins de régulation\n\nProcédures de planification de l'utilisation des terres :\n• Enquête de situation actuelle (élaboration de cartes d'utilisation actuelle des terres et de cartes des conditions foncières)\n• Évaluation de l'aptitude des terres (analyse de l'aptitude agricole et de l'aptitude au développement)\n• Élaboration du plan (zonage et établissement des zones d'affectation)\n• Approbation, publication officielle et mise en œuvre\n• Suivi et révision\n\nDéfis de la planification de l'utilisation des terres en Afrique :\n• L'enregistrement foncier est incomplet et les droits fonciers sont ambigus dans de nombreuses régions\n• Conflit entre droits fonciers coutumiers et droits fonciers légaux\n• Problème d'accaparement des terres à grande échelle (Land Grabbing) : acquisition de terres agricoles à grande échelle par des investisseurs étrangers\n• Concurrence entre terres agricoles et expansion urbaine/industrie minière\n\nUtilisation des terres et développement de l'irrigation :\nLa clarification des droits fonciers sur les zones prévues pour le développement de l'irrigation est une condition préalable à la motivation d'investissement des agriculteurs et à l'utilisation durable des infrastructures d'irrigation. Sans stabilité de la tenure foncière, les agriculteurs n'effectuent pas d'investissements à long terme dans l'amélioration des terres agricoles.","caption3":"","images":[]},{"rowNum":99,"id":"098","catCode":"CAT07","nameJa":"河川法","readingJa":"かせんほう","summaryJa":"河川の管理・利用・保全に関する法律の総称です。日本では「河川法」（1964年制定）が河川管理者・治水・利水・環境保全の法的枠組みを定めています。アフリカ各国でも同様の水法・河川法が存在します。","detailJa":"日本の河川法の概要：\n・河川の管理者：国土交通大臣（一級河川）、都道府県知事（二級河川）\n・河川区域の指定と占用・工事の許可制度\n・農業用水の取水には「河川使用許可」が必要\n・治水と利水・環境保全のバランスを定める\n\nアフリカの水関連法制度：\n・エジプト：ナイル川水法（Nile River Regulation Law）\n・ケニア：水法2016（Water Act 2016）―流域水資源機関の設立を規定\n・南アフリカ：国家水法1998（National Water Act）―水は公共の財として再定義\n・エチオピア：水資源管理政策・法律（1999年以降整備）\n\n農業用水取水の法的手続き：\n多くの国で河川・地下水からの農業用水取水には許可・登録が必要です。しかし、アフリカの多くの農村地域では許可制度が実質的に機能しておらず、インフォーマルな取水が広く行われています。法制度の実施能力強化が課題です。","nameEn":"River Act","summaryEn":"This is a general term for laws related to river management, utilization, and conservation. In Japan, the \"River Act\" (enacted in 1964) establishes the legal framework for river administrators, flood control, water utilization, and environmental conservation. Similar water laws and river acts exist in various African countries as well.","detailEn":"Overview of Japan's River Law:\n・River administrators: Minister of Land, Infrastructure, Transport and Tourism (Class I rivers), prefectural governors (Class II rivers)\n・Designation of river areas and permit system for occupation and construction works\n・\"River use permit\" required for agricultural water intake\n・Defines the balance between flood control, water utilization, and environmental conservation\n\nWater-related legal systems in Africa:\n・Egypt: Nile River Regulation Law\n・Kenya: Water Act 2016 - stipulates the establishment of catchment water resource agencies\n・South Africa: National Water Act 1998 - redefines water as a public good\n・Ethiopia: Water resources management policies and laws (developed from 1999 onwards)\n\nLegal procedures for agricultural water intake:\nMany countries require permits or registration for agricultural water intake from rivers and groundwater. However, in many rural areas of Africa, permit systems do not function effectively in practice, and informal water intake is widely practiced. Strengthening the implementation capacity of legal systems is a challenge.","image":"","captionJa":"","captionEn":"","published":"","name3":"Code des rivières","summary3":"Il s'agit de l'appellation générale des lois relatives à la gestion, à l'utilisation et à la conservation des cours d'eau. Au Japon, la « Loi sur les cours d'eau » (promulguée en 1964) définit le cadre juridique concernant les gestionnaires de cours d'eau, la protection contre les inondations, l'utilisation de l'eau et la conservation de l'environnement. Des lois sur l'eau et des lois sur les cours d'eau similaires existent également dans les pays africains.","detail3":"Aperçu de la Loi sur les cours d'eau du Japon :\n・Gestionnaires des cours d'eau : Ministre du Territoire, des Infrastructures, des Transports et du Tourisme (cours d'eau de première classe), Gouverneurs préfectoraux (cours d'eau de deuxième classe)\n・Désignation des zones fluviales et système d'autorisation pour l'occupation et les travaux\n・Le prélèvement d'eau à usage agricole nécessite une « autorisation d'utilisation fluviale »\n・Définition de l'équilibre entre la prévention des crues, l'utilisation de l'eau et la conservation de l'environnement\n\nSystèmes juridiques relatifs à l'eau en Afrique :\n・Égypte : Loi de réglementation du Nil (Nile River Regulation Law)\n・Kenya : Loi sur l'eau 2016 (Water Act 2016) — stipule la création d'organismes de ressources en eau des bassins versants\n・Afrique du Sud : Loi nationale sur l'eau 1998 (National Water Act) — redéfinit l'eau comme bien public\n・Éthiopie : Politiques et lois de gestion des ressources en eau (développées depuis 1999)\n\nProcédures juridiques pour le prélèvement d'eau à usage agricole :\nDans de nombreux pays, le prélèvement d'eau à usage agricole à partir des cours d'eau et des eaux souterraines nécessite une autorisation ou un enregistrement. Cependant, dans de nombreuses zones rurales d'Afrique, le système d'autorisation ne fonctionne pas effectivement, et les prélèvements informels sont largement pratiqués. Le renforcement des capacités de mise en œuvre des systèmes juridiques constitue un défi.","caption3":"","images":[]},{"rowNum":100,"id":"099","catCode":"CAT07","nameJa":"水利権","readingJa":"すいりけん","summaryJa":"特定の水源（河川・地下水等）から一定量の水を取水・利用する権利です。農業・工業・生活用水等の安定的な水確保の法的根拠となります。","detailJa":"水利権の種類：\n1. 慣行水利権：昔から継続して取水してきた実績に基づく既得権\n2. 許可水利権：行政機関の許可を得て成立する権利（新規取水はほぼすべてこちら）\n3. 慣習水利：法律的な権利ではなく、地域の慣習・合意に基づく水利用（アフリカの農村に多い）\n\n水利権の要素：\n・水量：最大取水量（m³/s または m³/年）\n・取水場所：特定の取水点\n・用途：農業・工業・生活等の使用目的\n・優先順位：渇水時の優先度\n\nアフリカの水利権制度の課題：\n・土地と同様、水利権も未登録・不明確な地域が多い\n・女性農家・小規模農家は慣行的に水利権から排除されやすい\n・大規模農場・企業への水利権集中が中小農家を圧迫するリスク\n・気候変動による水量減少時の水利権の再調整が課題\n\n水利権の改革動向：\n南アフリカの国家水法（1998年）は植民地時代の不公平な水権配分を廃止し、すべての水を公共の財として国が管理する新制度に移行した先進的な改革例として知られています。","nameEn":"Water rights","summaryEn":"This is the right to withdraw and use a fixed amount of water from specific water sources (rivers, groundwater, etc.). It serves as the legal basis for securing stable water supply for agricultural, industrial, domestic, and other uses.","detailEn":"Types of Water Rights:\n1. Riparian water rights: Vested rights based on historical continuous water abstraction practices\n2. Permitted water rights: Rights established through administrative permits (almost all new water abstractions fall under this category)\n3. Customary water rights: Water use based on local customs and agreements rather than legal rights (common in rural Africa)\n\nElements of Water Rights:\n・Water quantity: Maximum abstraction volume (m³/s or m³/year)\n・Abstraction point: Specific water intake location\n・Purpose of use: Usage objectives such as agriculture, industry, domestic use, etc.\n・Priority ranking: Priority level during drought conditions\n\nChallenges in African Water Rights Systems:\n・Like land rights, water rights remain unregistered and unclear in many areas\n・Female farmers and smallholder farmers tend to be systematically excluded from customary water rights\n・Risk of water rights concentration in large-scale farms and corporations pressuring small and medium farmers\n・Challenge of readjusting water rights during water volume reduction due to climate change\n\nWater Rights Reform Trends:\nSouth Africa's National Water Act (1998) is recognized as an advanced reform example that abolished the inequitable water rights distribution from the colonial era and transitioned to a new system where the state manages all water as a public resource.","image":"","captionJa":"","captionEn":"","published":"","name3":"Droit d'usage de l'eau","summary3":"C'est le droit de prélever et d'utiliser une quantité déterminée d'eau provenant de sources spécifiques (cours d'eau, eaux souterraines, etc.). Il constitue le fondement juridique pour assurer un approvisionnement stable en eau pour l'agriculture, l'industrie, l'usage domestique, etc.","detail3":"Types de droits d'usage de l'eau :\n1. Droits d'usage de l'eau coutumiers : droits acquis basés sur l'historique de captage d'eau continu depuis l'ancien temps\n2. Droits d'usage de l'eau sous autorisation : droits établis après obtention d'une autorisation d'organismes administratifs (presque tous les nouveaux captages relèvent de cette catégorie)\n3. Usage coutumier de l'eau : utilisation de l'eau basée sur les coutumes et accords locaux, non pas sur des droits légaux (fréquent dans les zones rurales africaines)\n\nÉléments des droits d'usage de l'eau :\n・Volume d'eau : volume maximal de captage (m³/s ou m³/an)\n・Lieu de captage : point de captage spécifique\n・Usage : objectif d'utilisation (agricole, industriel, domestique, etc.)\n・Ordre de priorité : priorité en période de sécheresse\n\nDéfis du système de droits d'usage de l'eau en Afrique :\n・Comme pour les terres, de nombreuses régions ont des droits d'usage de l'eau non enregistrés et imprécis\n・Les femmes agricultrices et les petits exploitants agricoles tendent à être exclus des droits d'usage de l'eau par tradition\n・Risque que la concentration des droits d'usage de l'eau vers les grandes exploitations et entreprises exerce une pression sur les petits et moyens agriculteurs\n・Le réajustement des droits d'usage de l'eau lors de la diminution du volume d'eau due au changement climatique constitue un défi\n\nTendances de réforme des droits d'usage de l'eau :\nLa Loi nationale sur l'eau d'Afrique du Sud (1998) est connue comme un exemple de réforme avancée qui a aboli la répartition inéquitable des droits sur l'eau de l'époque coloniale et est passée à un nouveau système où l'État gère toute l'eau comme bien public.","caption3":"","images":[]},{"rowNum":101,"id":"100","catCode":"CAT07","nameJa":"土地改良法","readingJa":"とちかいりょうほう","summaryJa":"農地の生産性向上・農業用水の確保・農村環境の整備を目的とした農業土木事業に関する法律です。日本では1949年制定で、農地整備・灌漑施設整備・土地改良区設立の法的根拠となっています。","detailJa":"日本の土地改良法の主要規定：\n・土地改良事業の種類：農地整備（圃場整備）・農業用水利施設整備・排水整備・農道整備等\n・土地改良区の設立：受益農家の同意（2/3以上）により設立\n・事業費負担：国・都道府県・市町村・農家の費用分担を規定\n・換地処分：圃場整備における農地の権利移動手続き\n\n土地改良法の対象事業（日本の例）：\n・圃場整備（区画整理・用排水路・農道の一体的整備）\n・ダム・頭首工・水路の建設・改修\n・客土・暗渠排水による土壌改良\n・農業集落排水施設整備\n\nアフリカへの示唆：\nアフリカの多くの国では「土地改良法」に相当する包括的な農業水利法制度が未整備です。日本のJICA等の技術協力では、現地の農業水利事業実施のための法的枠組み整備・組織制度設計への支援が重要な要素となっています。ただし法律をそのまま移植するのではなく、現地の慣習・法体系・行政能力に合わせたアダプテーションが不可欠です。","nameEn":"Land Improvement Act","summaryEn":"This is a law concerning agricultural civil engineering projects aimed at improving farmland productivity, securing agricultural water, and developing rural environments. Enacted in Japan in 1949, it serves as the legal basis for farmland development, irrigation facility construction, and the establishment of land improvement districts.","detailEn":"Main Provisions of Japan's Land Improvement Act:\n・Types of land improvement projects: Farmland consolidation (field consolidation), agricultural water supply facility development, drainage improvement, farm road development, etc.\n・Establishment of land improvement districts: Established with consent of beneficiary farmers (two-thirds or more)\n・Project cost burden: Stipulates cost sharing among national government, prefectures, municipalities, and farmers\n・Land reallotment: Procedures for farmland rights transfer in field consolidation\n\nLand Improvement Act target projects (Japan's examples):\n・Field consolidation (integrated development of land readjustment, irrigation and drainage channels, and farm roads)\n・Construction and renovation of dams, headworks, and waterways\n・Soil improvement through soil replacement and subsurface drainage\n・Agricultural community sewage facility development\n\nImplications for Africa:\nMany African countries lack comprehensive agricultural water management legal systems equivalent to \"Land Improvement Acts.\" In technical cooperation by Japan's JICA and other organizations, support for legal framework development and institutional design for implementing local agricultural water management projects constitutes an important element. However, rather than transplanting laws as-is, adaptation to local customs, legal systems, and administrative capacity is essential.","image":"","captionJa":"","captionEn":"","published":"","name3":"Loi d'amélioration foncière","summary3":"Il s'agit d'une loi concernant les travaux de génie civil agricole visant à améliorer la productivité des terres agricoles, à assurer l'approvisionnement en eau agricole et à développer l'environnement rural. Au Japon, cette loi a été promulguée en 1949 et constitue le fondement juridique pour l'aménagement des terres agricoles, l'équipement des installations d'irrigation et la création d'associations d'amélioration foncière.","detail3":"Principales dispositions de la loi japonaise sur l'amélioration foncière :\n・Types de projets d'amélioration foncière : aménagement des terres agricoles (aménagement parcellaire) ・ aménagement des installations d'irrigation agricole ・ aménagement du drainage ・ aménagement des voies agricoles, etc.\n・Établissement d'associations d'amélioration foncière : établissement avec le consentement des exploitants agricoles bénéficiaires (2/3 ou plus)\n・Répartition des coûts de projet : répartition des coûts entre l'État, les préfectures, les municipalités et les agriculteurs\n・Attribution compensatoire : procédures de transfert de droits fonciers agricoles dans l'aménagement parcellaire\n\nProjets visés par la loi sur l'amélioration foncière (exemple du Japon) :\n・Aménagement parcellaire (aménagement intégré du remembrement, des canaux d'irrigation et de drainage, et des voies agricoles)\n・Construction et rénovation de barrages, prises d'eau et canaux\n・Amélioration des sols par apport de terre et drainage souterrain\n・Aménagement d'installations de drainage des villages agricoles\n\nImplications pour l'Afrique :\nDans de nombreux pays africains, un système juridique hydraulique agricole global équivalent à la « loi sur l'amélioration foncière » n'est pas encore établi. Dans la coopération technique du JICA japonais et d'autres organisations, le soutien à l'établissement d'un cadre juridique et à la conception de systèmes organisationnels pour la mise en œuvre de projets hydrauliques agricoles locaux constitue un élément important. Cependant, plutôt que de transplanter directement la législation, une adaptation aux coutumes locales, au système juridique et aux capacités administratives est indispensable.","caption3":"","images":[]},{"rowNum":102,"id":"101","catCode":"CAT07","nameJa":"ステークホルダー参加","readingJa":"すてーくほるだーさんか","summaryJa":"農業水管理プロジェクト・政策の計画・実施・評価のプロセスに、影響を受ける関係者（農家・地域住民・NGO・政府機関・民間企業等）が参加することです。持続可能な開発の国際規範として定着しています。","detailJa":"ステークホルダー参加の段階（IAP2モデル）：\n1. 情報提供：関係者に情報を一方向に提供\n2. 協議：意見・フィードバックを収集するが意思決定は行政側\n3. 参加：計画プロセスに直接参加\n4. 協働：共同で選択肢を作り解決策を開発\n5. エンパワーメント：意思決定を関係者に委ねる\n\n参加型アプローチの効果：\n・農家のニーズ・知識が計画に反映される\n・農家の当事者意識が高まり、施設の自主的維持管理につながる\n・社会的受容性が高まりプロジェクトへの反発が減少\n・持続性の向上（農家が「自分たちのもの」と認識）\n\nジェンダーと参加：\n女性農家は農業生産・水くみ・食料調理の主要担い手であるにもかかわらず、意思決定から排除されやすいです。女性の参加確保（クォーター制・女性専用集会等）はジェンダー公平な水管理の基本要件です。\n\nアフリカの事例：\nJICAのプロジェクトでは参加型農村評価（PRA）・参加型灌漑計画（PIM）等の手法を用いて農家・女性の参加を促進しています。","nameEn":"Stakeholder participation","summaryEn":"It involves the participation of affected stakeholders (farmers, local residents, NGOs, government agencies, private companies, etc.) in the planning, implementation, and evaluation processes of agricultural water management projects and policies. This has become established as an international norm for sustainable development.","detailEn":"Stages of Stakeholder Participation (IAP2 Model):\n1. Inform: One-way provision of information to stakeholders\n2. Consult: Collecting opinions and feedback, but decision-making remains with the administrative side\n3. Involve: Direct participation in the planning process\n4. Collaborate: Joint development of options and solutions\n5. Empower: Delegating decision-making to stakeholders\n\nEffects of Participatory Approaches:\n・Farmers' needs and knowledge are reflected in planning\n・Farmers' sense of ownership is enhanced, leading to autonomous maintenance and management of facilities\n・Social acceptability increases and opposition to projects decreases\n・Improved sustainability (farmers recognize it as \"their own\")\n\nGender and Participation:\nAlthough women farmers are the main actors in agricultural production, water collection, and food preparation, they tend to be excluded from decision-making. Ensuring women's participation (quota systems, women-only meetings, etc.) is a basic requirement for gender-equitable water management.\n\nAfrican Case Studies:\nJICA projects promote the participation of farmers and women using methods such as Participatory Rural Appraisal (PRA) and Participatory Irrigation Management (PIM).","image":"","captionJa":"","captionEn":"","published":"","name3":"Participation des parties prenantes","summary3":"Il s'agit de la participation des parties prenantes concernées (agriculteurs, résidents locaux, ONG, organismes gouvernementaux, entreprises privées, etc.) au processus de planification, de mise en œuvre et d'évaluation des projets et politiques de gestion de l'eau agricole. Cela s'est établi comme norme internationale du développement durable.","detail3":"Étapes de la participation des parties prenantes (modèle IAP2) :\n1. Information : fourniture unidirectionnelle d'informations aux parties concernées\n2. Consultation : collecte d'opinions et de retours, mais prise de décision du côté administratif\n3. Participation : participation directe au processus de planification\n4. Collaboration : création conjointe d'options et développement de solutions\n5. Autonomisation : délégation de la prise de décision aux parties concernées\n\nEffets de l'approche participative :\n・Les besoins et connaissances des agriculteurs sont reflétés dans la planification\n・La conscience d'appropriation des agriculteurs s'accroît, conduisant à une maintenance autonome des installations\n・L'acceptabilité sociale s'améliore et la résistance aux projets diminue\n・Amélioration de la durabilité (les agriculteurs reconnaissent les projets comme « les leurs »)\n\nGenre et participation :\nBien que les femmes agricultrices soient les principales actrices de la production agricole, du transport d'eau et de la préparation alimentaire, elles tendent à être exclues de la prise de décision. Assurer la participation des femmes (système de quotas, assemblées exclusivement féminines, etc.) constitue une exigence fondamentale pour une gestion de l'eau équitable en termes de genre.\n\nCas africains :\nDans les projets de la JICA, des méthodes telles que l'évaluation rurale participative (ERP) et la planification participative de l'irrigation (PPI) sont utilisées pour promouvoir la participation des agriculteurs et des femmes.","caption3":"","images":[]},{"rowNum":103,"id":"102","catCode":"CAT07","nameJa":"灌漑政策","readingJa":"かんがいせいさく","summaryJa":"政府が農業灌漑の開発・管理・振興に関して定める目標・戦略・具体的措置の体系です。灌漑インフラへの投資・農家への支援・管理制度・環境保全等の方針を含みます。","detailJa":"灌漑政策の主要な政策テーマ：\n・灌漑開発：新規灌漑地の整備（大規模・小規模）\n・リハビリ：既存施設の補修・改良\n・管理移譲（IMT）：国営灌漑から農家組合管理への移行\n・民間投資促進：灌漑農業への民間企業の参入促進\n・技術普及：節水技術・先進農業技術の普及\n\nアフリカの灌漑政策の変遷：\n・1960〜70年代：政府主導の大規模国営灌漑建設重視\n・1980〜90年代：世界銀行・IMF構造調整下での政府関与縮小\n・2000年代以降：「アフリカ農業開発総合計画（CAADP）」によるGDP比6%の農業投資目標、小規模灌漑支援\n・2020年代：気候変動適応・持続的灌漑への転換\n\n日本のODA灌漑支援：\nJICAはアフリカ20か国以上で灌漑開発・水管理技術支援を行っており、農家参加型管理・O&M強化・小規模灌漑技術普及を重点分野としています。","nameEn":"Irrigation Policy","summaryEn":"It is a system of goals, strategies, and specific measures established by the government regarding the development, management, and promotion of agricultural irrigation. It includes policies on investment in irrigation infrastructure, support for farmers, management systems, and environmental conservation.","detailEn":"Major Policy Themes of Irrigation Policy:\n・Irrigation Development: Development of new irrigated areas (large-scale and small-scale)\n・Rehabilitation: Repair and improvement of existing facilities\n・Irrigation Management Transfer (IMT): Transition from state-run irrigation to farmer association management\n・Private Investment Promotion: Promoting private sector participation in irrigated agriculture\n・Technology Extension: Dissemination of water-saving technologies and advanced agricultural techniques\n\nEvolution of Irrigation Policy in Africa:\n・1960s-70s: Emphasis on government-led large-scale state irrigation construction\n・1980s-90s: Reduction of government involvement under World Bank and IMF structural adjustment programs\n・2000s onward: Agricultural investment target of 6% of GDP and support for small-scale irrigation under the \"Comprehensive Africa Agriculture Development Programme (CAADP)\"\n・2020s: Shift toward climate change adaptation and sustainable irrigation\n\nJapan's ODA Irrigation Support:\nJICA provides irrigation development and water management technical assistance in more than 20 African countries, with participatory farmer management, O&M strengthening, and small-scale irrigation technology extension as priority areas.","image":"","captionJa":"","captionEn":"","published":"","name3":"Politique d'irrigation","summary3":"Il s'agit d'un système d'objectifs, de stratégies et de mesures concrètes que le gouvernement définit concernant le développement, la gestion et la promotion de l'irrigation agricole. Il comprend les politiques d'investissement dans les infrastructures d'irrigation, de soutien aux agriculteurs, de systèmes de gestion et de conservation environnementale.","detail3":"Thèmes politiques principaux de la politique d'irrigation :\n・Développement de l'irrigation : aménagement de nouvelles zones irriguées (grande et petite échelle)\n・Réhabilitation : réparation et amélioration des installations existantes\n・Transfert de gestion (IMT) : transition de l'irrigation nationale vers la gestion par les associations d'agriculteurs\n・Promotion de l'investissement privé : encouragement de l'entrée des entreprises privées dans l'agriculture irriguée\n・Diffusion technologique : diffusion des technologies d'économie d'eau et des techniques agricoles avancées\n\nÉvolution de la politique d'irrigation en Afrique :\n・Années 1960-70 : accent sur la construction d'irrigation nationale à grande échelle menée par le gouvernement\n・Années 1980-90 : réduction de l'implication gouvernementale sous l'ajustement structurel de la Banque mondiale et du FMI\n・Années 2000 et suivantes : objectif d'investissement agricole de 6% du PIB par le « Programme détaillé de développement de l'agriculture africaine (PDDAA) », soutien à l'irrigation à petite échelle\n・Années 2020 : transition vers l'adaptation au changement climatique et l'irrigation durable\n\nSoutien à l'irrigation par l'APD japonaise :\nLa JICA mène des activités de soutien au développement de l'irrigation et aux technologies de gestion de l'eau dans plus de 20 pays africains, avec pour domaines prioritaires la gestion participative des agriculteurs, le renforcement de l'exploitation et de la maintenance, et la diffusion des technologies d'irrigation à petite échelle.","caption3":"","images":[]},{"rowNum":104,"id":"103","catCode":"CAT07","nameJa":"水政策","readingJa":"みずせいさく","summaryJa":"水資源の持続可能な管理・保全・配分・利用に関する政府の方針・法律・制度の全体を指します。農業用水・飲料水・工業用水・環境用水の統合的な管理の枠組みを提供します。","detailJa":"水政策の主要な構成要素：\n・水法・水資源法の整備\n・水の価格設定と費用回収\n・流域統合管理（IWRM：Integrated Water Resources Management）\n・上下流・省間調整と利用権の調整\n・国際水ガバナンス（越境水資源の管理）\n・気候変動適応への対応\n\nIWRMの概念：\n統合水資源管理（IWRM）は1992年のダブリン原則に基づき、「水は有限かつ脆弱な資源であり、水の開発と管理は参加型アプローチで行われるべき」という考え方です。農業・都市・環境のセクターを横断した統合的な管理を求めます。\n\nアフリカの水政策の優先課題：\n・農村部への安全な飲料水・衛生設備アクセスの改善（SDGs目標6）\n・農業用水への公平なアクセス確保（特に小農・女性）\n・水資源情報システムの整備\n・気候変動による水リスク（洪水・干ばつ）への適応\n\n国際基準：\nSDGs（持続可能な開発目標）の目標6「安全な水とトイレを世界中に」が水政策の国際指針となっています。","nameEn":"Water policy","summaryEn":"This refers to the entirety of government policies, laws, and systems related to the sustainable management, conservation, allocation, and utilization of water resources. It provides an integrated management framework for agricultural water, drinking water, industrial water, and environmental water.","detailEn":"Key Components of Water Policy:\n・Development of water law and water resources law\n・Water pricing and cost recovery\n・Integrated Water Resources Management (IWRM)\n・Upstream-downstream and inter-provincial coordination and water rights adjustment\n・International water governance (management of transboundary water resources)\n・Response to climate change adaptation\n\nConcept of IWRM:\nIntegrated Water Resources Management (IWRM) is based on the Dublin Principles of 1992, which state that \"water is a finite and vulnerable resource and water development and management should be carried out through a participatory approach.\" It calls for integrated management across agricultural, urban, and environmental sectors.\n\nPriority Issues in African Water Policy:\n・Improving access to safe drinking water and sanitation facilities in rural areas (SDGs Goal 6)\n・Ensuring equitable access to agricultural water (particularly for smallholder farmers and women)\n・Development of water resource information systems\n・Adaptation to water risks (floods and droughts) caused by climate change\n\nInternational Standards:\nSDGs (Sustainable Development Goals) Goal 6 \"Clean Water and Sanitation for All\" serves as the international guideline for water policy.","image":"","captionJa":"","captionEn":"","published":"","name3":"Politique de l'eau","summary3":"Elle désigne l'ensemble des orientations, lois et institutions gouvernementales relatives à la gestion durable, à la conservation, à la répartition et à l'utilisation des ressources en eau. Elle fournit un cadre de gestion intégrée de l'eau agricole, de l'eau potable, de l'eau industrielle et de l'eau environnementale.","detail3":"Éléments principaux de la politique de l'eau :\n・ Élaboration de la législation sur l'eau et des lois sur les ressources en eau\n・ Tarification de l'eau et recouvrement des coûts\n・ Gestion intégrée des ressources en eau par bassin versant (GIRE : Gestion Intégrée des Ressources en Eau)\n・ Coordination amont-aval et inter-provinciale et ajustement des droits d'usage\n・ Gouvernance internationale de l'eau (gestion des ressources en eau transfrontalières)\n・ Réponses à l'adaptation au changement climatique\n\nConcept de la GIRE :\nLa Gestion Intégrée des Ressources en Eau (GIRE) est basée sur les Principes de Dublin de 1992, selon lesquels « l'eau est une ressource limitée et vulnérable, et le développement et la gestion de l'eau doivent être menés selon une approche participative ». Elle exige une gestion intégrée transversale aux secteurs agricole, urbain et environnemental.\n\nPriorités de la politique de l'eau en Afrique :\n・ Amélioration de l'accès à l'eau potable sûre et aux installations sanitaires en milieu rural (Objectif 6 des ODD)\n・ Garantie d'un accès équitable à l'eau agricole (particulièrement pour les petits agriculteurs et les femmes)\n・ Développement de systèmes d'information sur les ressources en eau\n・ Adaptation aux risques hydriques liés au changement climatique (inondations et sécheresses)\n\nStandards internationaux :\nL'Objectif 6 des ODD (Objectifs de Développement Durable) « De l'eau propre et de l'assainissement pour tous » constitue la directive internationale pour les politiques de l'eau.","caption3":"","images":[]},{"rowNum":105,"id":"104","catCode":"CAT07","nameJa":"土地保有制度","readingJa":"とちほゆうせいど","summaryJa":"土地の所有・利用・売買・相続・担保等に関する権利と義務の体系です。農家が土地に対して安全な権利を持つことは、農業投資・灌漑施設の維持管理・長期的な農業経営の前提条件です。","detailJa":"土地保有制度の種類：\n1. 土地私有制：個人・法人が土地を所有（欧米・日本の基本形）\n2. 国有地の賃貸・使用権：土地は国有で、農家は使用権を取得（エチオピア等）\n3. 慣習的土地保有権（Customary tenure）：部族・コミュニティの慣習規則に基づく土地利用権（アフリカの農村に多い）\n4. 共有地（コモンズ）：共同利用の牧草地・森林\n\n土地保有の安定性と農業投資：\n土地保有が不安定（いつ取り上げられるかわからない）な農家は：\n・長期的な土地改良（排水整備・土壌改良・果樹植栽等）に投資しない\n・灌漑施設の維持管理費を負担しようとしない\n→ 土地保有の安定化は農業投資・持続的水管理の基盤\n\nアフリカの土地保有問題：\n・多くのアフリカ諸国で土地登記制度が未整備または機能不全\n・女性の土地権は慣習的に制限されている地域が多い（相続・離婚後の土地喪失）\n・大規模土地収奪（Land Grabbing）：外国投資家・国内エリートによる農地の大規模取得\n\n解決の方向性：\n土地保有証明書（Land Certificate）の発行が、エチオピア・ルワンダ等で農業投資を促進した成功例として評価されています。","nameEn":"Land tenure system","summaryEn":"It is a system of rights and obligations regarding land ownership, use, sale, inheritance, collateral, and other matters. Farmers having secure rights to land is a prerequisite for agricultural investment, irrigation facility maintenance and management, and long-term agricultural management.","detailEn":"Types of Land Tenure Systems:\n1. Private Land Ownership: Individuals and corporations own land (basic form in Western countries and Japan)\n2. State Land Lease/Use Rights: Land is state-owned, and farmers acquire use rights (Ethiopia, etc.)\n3. Customary Tenure: Land use rights based on tribal/community customary rules (common in rural Africa)\n4. Common Land (Commons): Communally used pastures and forests\n\nLand Tenure Security and Agricultural Investment:\nFarmers with insecure land tenure (uncertain when land may be taken away):\n・Do not invest in long-term land improvements (drainage systems, soil improvement, fruit tree planting, etc.)\n・Are reluctant to bear maintenance costs for irrigation facilities\n→ Land tenure security is the foundation for agricultural investment and sustainable water management\n\nLand Tenure Issues in Africa:\n・Many African countries have inadequate or dysfunctional land registration systems\n・Women's land rights are customarily restricted in many regions (loss of land after inheritance/divorce)\n・Large-scale Land Grabbing: Large-scale acquisition of agricultural land by foreign investors and domestic elites\n\nSolutions:\nThe issuance of Land Certificates has been evaluated as a successful example that promoted agricultural investment in Ethiopia, Rwanda, and other countries.","image":"","captionJa":"","captionEn":"","published":"","name3":"Régime foncier","summary3":"Il s'agit d'un système de droits et d'obligations concernant la propriété, l'utilisation, la vente, l'héritage et la garantie foncière. Le fait que les agriculteurs détiennent des droits sécurisés sur leurs terres constitue une condition préalable aux investissements agricoles, à la maintenance des installations d'irrigation et à la gestion agricole à long terme.","detail3":"Types de régimes fonciers :\n1. Propriété privée foncière : propriété de la terre par des individus et des personnes morales (forme de base en Occident et au Japon)\n2. Location et droits d'usage de terres domaniales : la terre appartient à l'État, les agriculteurs acquièrent des droits d'usage (Éthiopie, etc.)\n3. Tenure foncière coutumière (Customary tenure) : droits d'usage foncier basés sur les règles coutumières tribales et communautaires (fréquent dans les zones rurales africaines)\n4. Terres communes (biens communs) : pâturages et forêts à usage collectif\n\nStabilité de la tenure foncière et investissement agricole :\nLes agriculteurs dont la tenure foncière est instable (ne sachant pas quand elle pourrait leur être retirée) :\n・n'investissent pas dans l'amélioration foncière à long terme (aménagement du drainage, amélioration des sols, plantation d'arbres fruitiers, etc.)\n・ne souhaitent pas supporter les coûts de maintenance des installations d'irrigation\n→ La stabilisation de la tenure foncière constitue la base de l'investissement agricole et de la gestion durable de l'eau\n\nProblèmes fonciers en Afrique :\n・Dans de nombreux pays africains, le système d'enregistrement foncier est insuffisamment développé ou dysfonctionnel\n・Les droits fonciers des femmes sont coutumièrement limités dans de nombreuses régions (perte de terres après héritage ou divorce)\n・Accaparement massif des terres (Land Grabbing) : acquisition à grande échelle de terres agricoles par des investisseurs étrangers et des élites nationales\n\nOrientations pour les solutions :\nL'émission de certificats de tenure foncière (Land Certificate) est évaluée comme un exemple de réussite ayant favorisé l'investissement agricole en Éthiopie, au Rwanda, etc.","caption3":"","images":[]},{"rowNum":106,"id":"105","catCode":"CAT07","nameJa":"能力開発","readingJa":"のうりょくかいはつ","summaryJa":"個人・組織・社会が農業水管理に関する知識・技術・態度・能力を高め、自律的に課題を解決できる力を育成するプロセスです。英語ではCapacity Development（CD）と表記されます。","detailJa":"能力開発の3つのレベル：\n1. 個人レベル：個々の農家・技術者・行政官の知識・技術・態度の向上\n2. 組織レベル：水利用者組合・灌漑管理機関の組織力・管理能力の向上\n3. 制度・社会レベル：法律・政策・慣習・ネットワーク等の制度的環境の整備\n\n農業水管理分野での能力開発の内容：\n・農家向け：灌漑操作・施肥・病害虫管理・水管理組合の運営\n・技術者向け：水路設計・測量・施工管理・監視測定\n・行政官向け：政策立案・予算管理・農家支援・データ分析\n\nJICAの能力開発アプローチ：\nJICAは「技術協力プロジェクト」「研修員受け入れ」「専門家派遣」の3手法を組み合わせて、アフリカ各国の農業水管理の能力開発を支援しています。日本での研修（本研修・国別研修）を通じた知識・技術の移転と、現地OJT（実地訓練）の組み合わせが特徴です。\n\n持続性のための内在化：\n能力開発の成果を持続させるためには、習得した知識・技術が「外部専門家なしでも実施できる」レベルまで内在化（インスティテューショナライズ）することが重要です。","nameEn":"Capacity development","summaryEn":"This is a process of enhancing the knowledge, skills, attitudes, and capabilities of individuals, organizations, and society regarding agricultural water management, and fostering the ability to autonomously solve challenges. It is expressed as Capacity Development (CD) in English.","detailEn":"Three Levels of Capacity Development:\n1. Individual Level: Improvement of knowledge, skills, and attitudes of individual farmers, engineers, and government officials\n2. Organizational Level: Enhancement of organizational capacity and management capabilities of water users' associations and irrigation management agencies\n3. Institutional/Social Level: Development of institutional environment including laws, policies, customs, networks, etc.\n\nContent of Capacity Development in Agricultural Water Management:\n・For farmers: Irrigation operation, fertilization, pest and disease management, management of water management associations\n・For engineers: Canal design, surveying, construction management, monitoring and measurement\n・For government officials: Policy formulation, budget management, farmer support, data analysis\n\nJICA's Capacity Development Approach:\nJICA supports capacity development in agricultural water management in African countries by combining three methods: \"Technical Cooperation Projects,\" \"Training Program Participants,\" and \"Expert Dispatch.\" The approach is characterized by combining knowledge and technology transfer through training in Japan (group training and country-focused training) with on-site OJT (on-the-job training).\n\nInternalization for Sustainability:\nTo sustain the outcomes of capacity development, it is important that the acquired knowledge and skills be internalized (institutionalized) to a level where they can be \"implemented without external experts.\"","image":"","captionJa":"","captionEn":"","published":"","name3":"Développement des compétences","summary3":"C'est un processus qui permet aux individus, organisations et sociétés de développer leurs connaissances, techniques, attitudes et capacités en matière de gestion de l'eau agricole, et de cultiver leur aptitude à résoudre les problèmes de manière autonome. En anglais, cela s'écrit Capacity Development (CD).","detail3":"Les trois niveaux de développement des capacités :\n1. Niveau individuel : amélioration des connaissances, techniques et attitudes des agriculteurs, techniciens et fonctionnaires individuels\n2. Niveau organisationnel : renforcement de la capacité organisationnelle et de gestion des associations d'usagers de l'eau et des organismes de gestion de l'irrigation\n3. Niveau institutionnel et social : développement de l'environnement institutionnel incluant les lois, politiques, coutumes et réseaux\n\nContenu du développement des capacités dans le domaine de la gestion de l'eau agricole :\n・Pour les agriculteurs : opérations d'irrigation, fertilisation, gestion des maladies et ravageurs, gestion des associations de gestion de l'eau\n・Pour les techniciens : conception de canaux, topographie, gestion de construction, surveillance et mesure\n・Pour les fonctionnaires : élaboration de politiques, gestion budgétaire, soutien aux agriculteurs, analyse de données\n\nApproche de développement des capacités de la JICA :\nLa JICA soutient le développement des capacités de gestion de l'eau agricole dans les pays africains en combinant trois méthodes : « projets de coopération technique », « accueil de stagiaires » et « envoi d'experts ». Elle se caractérise par la combinaison du transfert de connaissances et de techniques à travers les formations au Japon (formation principale et formation par pays) et la formation pratique sur site (OJT).\n\nInternalisation pour la durabilité :\nPour maintenir les résultats du développement des capacités, il est important d'internaliser (institutionnaliser) les connaissances et techniques acquises jusqu'au niveau où elles peuvent être « mises en œuvre sans experts externes ».","caption3":"","images":[]},{"rowNum":107,"id":"106","catCode":"CAT07","nameJa":"普及サービス","readingJa":"ふきゅうさーびす","summaryJa":"農業技術・知識・情報を研究機関や行政から農家に届けるための教育・訓練・相談の仕組みです。農業普及員（Extension Worker）が農家を訪問・指導し、新技術の導入を支援します。","detailJa":"農業普及サービスの方法：\n1. 農家個別訪問：普及員が農家圃場を定期訪問して技術指導\n2. 農民学校（Farmer Field School, FFS）：農家グループが圃場での実地学習・実験\n3. 技術デモンストレーション：先進農家圃場での見学・体験学習\n4. デジタル普及：スマートフォン・ラジオ・テレビを活用した情報提供\n5. 農家から農家への普及（Farmer-to-Farmer）：先進農家が近隣農家を指導\n\n農民学校（FFS）：\n1990年代にFAOが開発した参加型農業普及手法。農家グループが生育期間を通じて圃場で実験・観察・議論を繰り返し、自ら技術を習得します。アフリカで広く普及しており、灌漑技術・病害虫防除・土壌管理に活用されています。\n\nアフリカの普及サービスの課題：\n・農業普及員1人あたりの担当農家数が多すぎる（1:1,000以上の地域も）\n・普及員の専門知識・現場経験の不足\n・女性農家への普及員アクセスが困難な文化的障壁\n・国際機関・NGOの支援終了後の持続性\n\nデジタル農業普及の台頭：\nケニア・タンザニア等ではスマートフォンを活用した農業情報提供サービス（iShamba, Farmerline等）が急成長しており、伝統的な普及サービスを補完しています。","nameEn":"Extension Services","summaryEn":"It is a system of education, training, and consultation designed to deliver agricultural technology, knowledge, and information from research institutions and government agencies to farmers. Extension workers visit and provide guidance to farmers, supporting the introduction of new technologies.","detailEn":"Agricultural Extension Service Methods:\n1. Individual farm visits: Extension agents conduct regular visits to farmers' fields for technical guidance\n2. Farmer Field School (FFS): Farmer groups engage in practical learning and experimentation in the field\n3. Technical demonstrations: Observation and experiential learning at progressive farmers' fields\n4. Digital extension: Information provision utilizing smartphones, radio, and television\n5. Farmer-to-Farmer extension: Progressive farmers provide guidance to neighboring farmers\n\nFarmer Field School (FFS):\nA participatory agricultural extension approach developed by FAO in the 1990s. Farmer groups repeatedly conduct experiments, observations, and discussions in the field throughout the growing season to acquire techniques independently. It is widely adopted in Africa and utilized for irrigation technology, pest and disease control, and soil management.\n\nChallenges of Extension Services in Africa:\n・Too many farmers assigned per agricultural extension agent (some areas exceed 1:1,000 ratio)\n・Lack of specialized knowledge and field experience among extension agents\n・Cultural barriers that make it difficult for extension agents to access female farmers\n・Sustainability issues after support from international organizations and NGOs ends\n\nRise of Digital Agricultural Extension:\nIn Kenya, Tanzania, and other countries, agricultural information services utilizing smartphones (iShamba, Farmerline, etc.) are experiencing rapid growth and complementing traditional extension services.","image":"","captionJa":"","captionEn":"","published":"","name3":"Services de vulgarisation","summary3":"Il s'agit d'un système d'éducation, de formation et de conseil destiné à transmettre les techniques, connaissances et informations agricoles des instituts de recherche et des administrations aux agriculteurs. Les agents de vulgarisation agricole (Extension Worker) visitent et conseillent les exploitants agricoles pour soutenir l'introduction de nouvelles technologies.","detail3":"Méthodes des services de vulgarisation agricole :\n1. Visites individuelles aux exploitations : les agents de vulgarisation visitent régulièrement les parcelles agricoles pour fournir des conseils techniques\n2. École paysanne (Farmer Field School, FFS) : groupes d'agriculteurs pratiquant l'apprentissage et l'expérimentation pratiques sur le terrain\n3. Démonstrations techniques : visites d'étude et apprentissage expérientiel dans les parcelles d'agriculteurs avancés\n4. Vulgarisation numérique : fourniture d'informations utilisant smartphones, radio et télévision\n5. Vulgarisation d'agriculteur à agriculteur (Farmer-to-Farmer) : agriculteurs avancés formant les agriculteurs voisins\n\nÉcole paysanne (FFS) :\nMéthode de vulgarisation agricole participative développée par la FAO dans les années 1990. Les groupes d'agriculteurs répètent expérimentations, observations et discussions sur le terrain tout au long de la période de croissance, acquérant ainsi les techniques par eux-mêmes. Largement répandue en Afrique, elle est utilisée pour les techniques d'irrigation, la lutte antiparasitaire et la gestion des sols.\n\nDéfis des services de vulgarisation en Afrique :\n• Nombre d'exploitations agricoles par agent de vulgarisation trop élevé (plus de 1:1 000 dans certaines régions)\n• Manque de connaissances spécialisées et d'expérience pratique des agents de vulgarisation\n• Barrières culturelles rendant difficile l'accès des agents de vulgarisation aux femmes agricultrices\n• Durabilité après la fin du soutien des organisations internationales et des ONG\n\nÉmergence de la vulgarisation agricole numérique :\nAu Kenya, en Tanzanie et ailleurs, les services de fourniture d'informations agricoles utilisant les smartphones (iShamba, Farmerline, etc.) connaissent une croissance rapide et complètent les services de vulgarisation traditionnels.","caption3":"","images":[]},{"rowNum":108,"id":"107","catCode":"CAT07","nameJa":"補助金","readingJa":"ほじょきん","summaryJa":"政府・援助機関が農業者・農業組合・農業企業に対して提供する資金援助・税制優遇・現物供与の総称です。農業開発の初期費用を軽減し、技術普及・投資促進を目的とします。","detailJa":"農業用水関連の補助金の種類：\n・灌漑施設整備費補助：頭首工・用水路・ポンプ場の建設費用の一部を政府が負担\n・機材購入補助：小型ポンプ・太陽光パネル・点滴灌漑キットの購入費補助\n・電力料金補助：灌漑ポンプの電力費の低減（エジプト・インドで実施）\n・農業投入財補助：種子・肥料・農薬の補助（水稲栽培振興と関連）\n\n補助金の効果と課題：\n【効果】\n・初期投資コストの低減により普及が加速\n・小農・低所得農家への技術アクセス改善\n・公共財的性格の施設整備を促進\n\n【課題・弊害】\n・財政負担の増大と持続性への疑問\n・市場歪曲（補助なしでは経営できない「補助金依存」農業の発生）\n・対象選定の不公平（大農場・コネのある農家が恩恵を受けやすい）\n・補助金打ち切り時の急激な農業経営悪化\n\n持続的な補助金政策：\n農業の自立性を高めるため、初期段階の投資補助→段階的に市場原理に移行するという「スマート補助金」アプローチが国際的に推奨されています。","nameEn":"Subsidy","summaryEn":"This is a general term for financial assistance, tax incentives, and in-kind contributions provided by governments and aid agencies to farmers, agricultural cooperatives, and agricultural enterprises. The purpose is to reduce initial costs of agricultural development and promote technology dissemination and investment.","detailEn":"Types of agricultural water-related subsidies:\n・Irrigation facility construction subsidy: Government bears part of the construction costs for headworks, irrigation channels, and pumping stations\n・Equipment purchase subsidy: Subsidies for purchasing small pumps, solar panels, and drip irrigation kits\n・Electricity rate subsidy: Reduction of power costs for irrigation pumps (implemented in Egypt and India)\n・Agricultural input subsidy: Subsidies for seeds, fertilizers, and pesticides (related to rice cultivation promotion)\n\nEffects and challenges of subsidies:\n【Effects】\n・Accelerated adoption through reduced initial investment costs\n・Improved technology access for smallholder and low-income farmers\n・Promotion of infrastructure development with public goods characteristics\n\n【Challenges and adverse effects】\n・Increased fiscal burden and questions about sustainability\n・Market distortion (emergence of \"subsidy-dependent\" agriculture that cannot operate without subsidies)\n・Unfair target selection (large farms and well-connected farmers tend to benefit more)\n・Severe deterioration of agricultural management when subsidies are discontinued\n\nSustainable subsidy policy:\nTo enhance agricultural self-reliance, a \"smart subsidy\" approach is internationally recommended, which involves initial investment subsidies followed by a gradual transition to market principles.","image":"","captionJa":"","captionEn":"","published":"","name3":"subvention","summary3":"Il s'agit de la dénomination générale des aides financières, avantages fiscaux et prestations en nature que les gouvernements et organismes d'aide fournissent aux agriculteurs, coopératives agricoles et entreprises agricoles. L'objectif est de réduire les coûts initiaux du développement agricole et de promouvoir la diffusion des technologies et les investissements.","detail3":"Types de subventions liées à l'eau agricole :\n• Subvention pour l'aménagement des installations d'irrigation : prise en charge partielle par le gouvernement des coûts de construction des ouvrages de prise d'eau, canaux d'irrigation et stations de pompage\n• Subvention pour l'achat d'équipements : aide à l'achat de petites pompes, panneaux solaires et kits d'irrigation goutte-à-goutte\n• Subvention des tarifs électriques : réduction des coûts énergétiques des pompes d'irrigation (mise en œuvre en Égypte et en Inde)\n• Subvention des intrants agricoles : aide pour les semences, engrais et pesticides (en lien avec la promotion de la riziculture)\n\nEffets et défis des subventions :\n【Effets】\n• Accélération de la diffusion grâce à la réduction des coûts d'investissement initial\n• Amélioration de l'accès aux technologies pour les petits exploitants et agriculteurs à faibles revenus\n• Promotion de l'aménagement d'installations à caractère de biens publics\n\n【Défis et effets pervers】\n• Augmentation de la charge budgétaire et questionnements sur la durabilité\n• Distorsion du marché (émergence d'une agriculture « dépendante des subventions » qui ne peut fonctionner sans aide)\n• Inéquité dans la sélection des bénéficiaires (grandes exploitations et agriculteurs ayant des relations privilégiées bénéficient plus facilement)\n• Détérioration brutale de la gestion agricole lors de l'arrêt des subventions\n\nPolitique de subventions durables :\nPour renforcer l'autonomie de l'agriculture, l'approche « subventions intelligentes » consistant à passer de subventions d'investissement initiales à une transition progressive vers les mécanismes de marché est recommandée au niveau international.","caption3":"","images":[]},{"rowNum":109,"id":"108","catCode":"CAT07","nameJa":"慣行水利","readingJa":"かんこうすいり","summaryJa":"法的な許可・権利ではなく、地域の長年の慣習・合意・慣例に基づいて実施されてきた農業用水の利用と管理の仕組みです。アフリカ農村の多くでは正式な法制度より慣行水利が現実の水管理を担っています。","detailJa":"慣行水利の特性：\n・地域コミュニティが長年かけて発展させた水管理ルール\n・文書化されていないことが多く、長老・有力者が知識を保持\n・地域固有の農業サイクル・作物・水源特性に適合している\n・法的認知はされないが農家間で広く尊重される\n\n慣行水利の例（アフリカ）：\n・エチオピアのYimaro（イマロ）：伝統的な灌漑用水のローテーション配分ルール\n・ケニアのMiriamiri：マウント・ケニア麓の伝統的灌漑組合\n・タンザニアのMfumo wa Maji：コミュニティ水管理の伝統的規則\n・マダガスカルのTompontany：灌漑水の伝統的所有者制度\n\n慣行水利と法制度の調和：\n慣行水利を無視して近代的法制度だけを押しつけると、農家の反発・混乱を招きます。現地の慣行水利ルールと近代的制度の折衷・統合が持続可能な水管理制度の設計に重要です。\n\n研究の重要性：\n慣行水利の詳細な理解（社会調査・農家インタビュー）は、灌漑プロジェクト設計の初期段階に必須の社会分析です。","nameEn":"Customary water rights","summaryEn":"This is a system of agricultural water use and management that has been implemented based on long-standing local customs, agreements, and practices rather than legal permits or rights. In many African rural areas, customary water rights play a more significant role in actual water management than formal legal systems.","detailEn":"Characteristics of Customary Water Rights:\n・Water management rules developed by local communities over many years\n・Often undocumented, with knowledge held by elders and influential figures\n・Adapted to region-specific agricultural cycles, crops, and water source characteristics\n・Not legally recognized but widely respected among farmers\n\nExamples of Customary Water Rights (Africa):\n・Ethiopia's Yimaro: Traditional rotational allocation rules for irrigation water\n・Kenya's Miriamiri: Traditional irrigation associations at the foot of Mount Kenya\n・Tanzania's Mfumo wa Maji: Traditional rules for community water management\n・Madagascar's Tompontany: Traditional ownership system for irrigation water\n\nHarmonization of Customary Water Rights and Legal Systems:\nImposing only modern legal systems while ignoring customary water rights leads to farmer resistance and confusion. The compromise and integration of local customary water rights rules with modern systems is crucial for designing sustainable water management institutions.\n\nImportance of Research:\nDetailed understanding of customary water rights (social surveys and farmer interviews) is essential social analysis in the initial stages of irrigation project design.","image":"","captionJa":"","captionEn":"","published":"","name3":"Droit d'eau coutumier","summary3":"Il s'agit d'un système d'utilisation et de gestion de l'eau agricole qui s'appuie non pas sur des autorisations légales ou des droits formels, mais sur des coutumes, des accords et des pratiques locales établis de longue date. Dans de nombreuses zones rurales d'Afrique, les droits d'eau coutumiers assurent la gestion effective de l'eau plutôt que les systèmes juridiques formels.","detail3":"Caractéristiques des droits d'eau coutumiers :\n・Règles de gestion de l'eau développées par les communautés locales au fil des années\n・Souvent non documentées, les connaissances sont détenues par les anciens et les notables\n・Adaptées aux cycles agricoles, aux cultures et aux caractéristiques des sources d'eau spécifiques à la région\n・Non reconnues légalement mais largement respectées entre agriculteurs\n\nExemples de droits d'eau coutumiers (Afrique) :\n・Yimaro d'Éthiopie : règles traditionnelles de rotation et de répartition de l'eau d'irrigation\n・Miriamiri du Kenya : associations d'irrigation traditionnelles au pied du mont Kenya\n・Mfumo wa Maji de Tanzanie : règles traditionnelles de gestion communautaire de l'eau\n・Tompontany de Madagascar : système traditionnel de propriétaires de l'eau d'irrigation\n\nHarmonisation entre droits d'eau coutumiers et système juridique :\nIgnorer les droits d'eau coutumiers et imposer uniquement un système juridique moderne provoque la résistance et la confusion des agriculteurs. Le compromis et l'intégration entre les règles coutumières locales et les institutions modernes sont essentiels pour concevoir un système de gestion de l'eau durable.\n\nImportance de la recherche :\nUne compréhension détaillée des droits d'eau coutumiers (enquêtes sociales, entretiens avec les agriculteurs) constitue une analyse sociale indispensable dans les phases initiales de conception des projets d'irrigation.","caption3":"","images":[]},{"rowNum":110,"id":"109","catCode":"CAT08","nameJa":"実現可能性調査","readingJa":"じつげんかのうせいちょうさ","summaryJa":"灌漑プロジェクト等の事業を本格的に実施する前に、技術的・経済的・社会的・環境的側面から事業の実現性を評価する調査です。英語ではF/S（Feasibility Study）と呼ばれます。","detailJa":"実現可能性調査の主な内容：\n1.  技術的実現可能性：\n・水源調査（水量・水質・信頼性）\n・地形・土壌・地質調査\n・施設設計の概念設計（Preliminary Design）\n・技術的課題と解決策の検討\n\n2.  経済的実現可能性：\n・事業コスト（建設費・運営費）の算定\n・便益（農業生産増加・農家収益向上）の推計\n・費用便益分析（B/C比、NPV、IRR等）\n・農家の支払い能力評価\n\n3.  社会的実現可能性：\n・受益農家の意向・参加意欲の確認\n・土地権利・水利権の状況\n・社会影響（雇用・移住・文化的影響）\n\n4.  環境的実現可能性：\n・環境影響評価（EIA）の実施\n・生態系・下流への影響\n・水質への影響\n\n意思決定における役割：\nF/S報告書は、プロジェクトを「進める・改変する・中止する」の意思決定の根拠となります。国際援助機関（JICA・世界銀行等）では詳細なF/Sが融資・支援決定の前提条件です。","nameEn":"Feasibility Study","summaryEn":"This is a study that evaluates the feasibility of projects such as irrigation projects from technical, economic, social, and environmental perspectives before full-scale implementation. It is called F/S (Feasibility Study) in English.","detailEn":"Main Contents of Feasibility Study:\n\n1. Technical Feasibility:\n・Water source survey (water volume, water quality, reliability)\n・Topographical, soil, and geological survey\n・Preliminary design of facilities\n・Examination of technical challenges and solutions\n\n2. Economic Feasibility:\n・Calculation of project costs (construction costs, operating costs)\n・Estimation of benefits (increased agricultural production, improved farm income)\n・Cost-benefit analysis (B/C ratio, NPV, IRR, etc.)\n・Assessment of farmers' ability to pay\n\n3. Social Feasibility:\n・Confirmation of beneficiary farmers' intentions and willingness to participate\n・Status of land rights and water rights\n・Social impacts (employment, relocation, cultural impacts)\n\n4. Environmental Feasibility:\n・Implementation of Environmental Impact Assessment (EIA)\n・Impacts on ecosystems and downstream areas\n・Impacts on water quality\n\nRole in Decision-Making:\nThe F/S report serves as the basis for decision-making to \"proceed with, modify, or cancel\" the project. International aid agencies (JICA, World Bank, etc.) require detailed F/S as a prerequisite for financing and support decisions.","image":"","captionJa":"","captionEn":"","published":"","name3":"Étude de faisabilité","summary3":"Il s'agit d'une étude qui évalue la faisabilité d'un projet sous les aspects techniques, économiques, sociaux et environnementaux avant la mise en œuvre à grande échelle d'activités telles que les projets d'irrigation. Elle est appelée en anglais F/S (Feasibility Study).","detail3":"Contenu principal de l'étude de faisabilité :\n\n1. Faisabilité technique :\n・Étude des ressources hydriques (quantité, qualité, fiabilité)\n・Enquête topographique, pédologique et géologique\n・Conception préliminaire des installations (Preliminary Design)\n・Examen des défis techniques et des solutions\n\n2. Faisabilité économique :\n・Calcul des coûts du projet (coûts de construction et d'exploitation)\n・Estimation des bénéfices (augmentation de la production agricole, amélioration des revenus des agriculteurs)\n・Analyse coûts-bénéfices (ratio B/C, VAN, TRI, etc.)\n・Évaluation de la capacité de paiement des agriculteurs\n\n3. Faisabilité sociale :\n・Confirmation des intentions et de la motivation de participation des agriculteurs bénéficiaires\n・Situation des droits fonciers et des droits d'eau\n・Impact social (emploi, migration, impact culturel)\n\n4. Faisabilité environnementale :\n・Réalisation de l'évaluation d'impact environnemental (EIE)\n・Impact sur l'écosystème et les zones en aval\n・Impact sur la qualité de l'eau\n\nRôle dans la prise de décision :\nLe rapport d'étude de faisabilité sert de base pour la prise de décision de « poursuivre, modifier ou arrêter » le projet. Dans les organismes internationaux d'aide (JICA, Banque mondiale, etc.), une étude de faisabilité détaillée constitue une condition préalable à la décision de financement et de soutien.","caption3":"","images":[]},{"rowNum":111,"id":"110","catCode":"CAT08","nameJa":"プロジェクト評価","readingJa":"ぷろじぇくとひょうか","summaryJa":"灌漑・農業開発プロジェクトの計画・実施・完了・事後の各段階で、プロジェクトの効果・効率・relevance等を系統的に評価するプロセスです。OECDのDAC評価基準が国際的な標準です。","detailJa":"DAC評価5基準（OECD/DAC）：\n1. 妥当性（Relevance）：プロジェクトが受益者・政府・援助機関のニーズ・優先事項と合致しているか\n2. 有効性（Effectiveness）：目標（アウトカム）がどの程度達成されたか\n3. 効率性（Efficiency）：投入したコスト・時間に対して産出・成果は適切か\n4. インパクト（Impact）：より広範な長期的変化（食料安全保障・貧困削減等）は生じているか\n5. 持続性（Sustainability）：支援終了後も効果が継続するか\n\n評価のタイミング：\n・事前評価（Ex-ante）：実施前の実現可能性・影響予測\n・中間評価（Mid-term）：実施途中の軌道修正のための評価\n・完了時評価（Terminal）：プロジェクト完了時の成果確認\n・事後評価（Ex-post）：完了後3〜5年での持続性・インパクト確認\n\nアフリカの灌漑プロジェクト評価の課題：\n多くの灌漑プロジェクトで「建設は完了したが持続性に課題がある」という評価結果が繰り返されています。持続性を高めるための事業設計（農家参加・O&M計画・費用回収）が評価結果から得られた最重要の教訓です。","nameEn":"Project Evaluation","summaryEn":"This is a process that systematically evaluates the effectiveness, efficiency, relevance, and other aspects of irrigation and agricultural development projects at each stage: planning, implementation, completion, and post-completion. The OECD DAC evaluation criteria serve as the international standard.","detailEn":"DAC Five Evaluation Criteria (OECD/DAC):\n1. Relevance: Whether the project aligns with the needs and priorities of beneficiaries, government, and donor agencies\n2. Effectiveness: The extent to which objectives (outcomes) have been achieved\n3. Efficiency: Whether outputs and results are appropriate for the costs and time invested\n4. Impact: Whether broader long-term changes (food security, poverty reduction, etc.) are occurring\n5. Sustainability: Whether effects continue after assistance ends\n\nEvaluation Timing:\n・Ex-ante evaluation: Feasibility and impact prediction before implementation\n・Mid-term evaluation: Evaluation during implementation for course correction\n・Terminal evaluation: Confirmation of results at project completion\n・Ex-post evaluation: Confirmation of sustainability and impact 3-5 years after completion\n\nChallenges in Evaluating Irrigation Projects in Africa:\nMany irrigation projects repeatedly show evaluation results stating \"construction is completed but there are sustainability challenges.\" Project design to enhance sustainability (farmer participation, O&M planning, cost recovery) is the most important lesson learned from evaluation results.","image":"","captionJa":"","captionEn":"","published":"","name3":"Évaluation de projet","summary3":"C'est un processus d'évaluation systématique de l'efficacité, de l'efficience, de la pertinence, etc. des projets de développement de l'irrigation et de l'agriculture à chaque étape : planification, mise en œuvre, achèvement et post-projet. Les critères d'évaluation du CAD de l'OCDE constituent la norme internationale.","detail3":"Les 5 critères d'évaluation du CAD (OCDE/CAD) :\n1. Pertinence (Relevance) : Le projet correspond-il aux besoins et priorités des bénéficiaires, du gouvernement et de l'organisme d'aide ?\n2. Efficacité (Effectiveness) : Dans quelle mesure les objectifs (résultats) ont-ils été atteints ?\n3. Efficience (Efficiency) : Les extrants et résultats sont-ils appropriés par rapport aux coûts et au temps investis ?\n4. Impact (Impact) : Des changements à long terme plus larges (sécurité alimentaire, réduction de la pauvreté, etc.) se produisent-ils ?\n5. Durabilité (Sustainability) : Les effets se poursuivent-ils après la fin de l'assistance ?\n\nCalendrier des évaluations :\n・Évaluation ex-ante : Faisabilité et prévision d'impact avant la mise en œuvre\n・Évaluation à mi-parcours (Mid-term) : Évaluation pour ajustement de trajectoire en cours de mise en œuvre\n・Évaluation finale (Terminal) : Confirmation des résultats à l'achèvement du projet\n・Évaluation ex-post : Confirmation de la durabilité et de l'impact 3 à 5 ans après l'achèvement\n\nDéfis de l'évaluation des projets d'irrigation en Afrique :\nDe nombreux projets d'irrigation répètent le même résultat d'évaluation : « la construction est achevée mais la durabilité pose problème ». La conception de projets visant à améliorer la durabilité (participation des agriculteurs, plan d'exploitation et maintenance, recouvrement des coûts) constitue l'enseignement le plus important tiré des résultats d'évaluation.","caption3":"","images":[]},{"rowNum":112,"id":"111","catCode":"CAT08","nameJa":"適応能力","readingJa":"てきおうのうりょく","summaryJa":"気候変動・水資源の変動・市場変化等の外部環境の変化に対応して、農業システム・農家・組織が適切に調整・対応できる能力です。英語ではAdaptive Capacity と呼ばれます。","detailJa":"適応能力の構成要素：\n・技術的適応能力：新技術（節水灌漑・耐乾性品種等）の採用能力\n・経済的適応能力：資産・貯蓄・信用へのアクセスによる衝撃吸収力\n・社会的適応能力：組合・コミュニティ・ネットワークによる相互支援\n・制度的適応能力：政府・機関が柔軟に政策・管理を変更できる能力\n・情報・知識：気候情報・農業技術・市場情報へのアクセス\n\n適応能力と脆弱性：\n脆弱性（Vulnerability）= 暴露（Exposure）+ 感受性（Sensitivity）− 適応能力\n→ 適応能力を高めることが気候変動への脆弱性低減の核心\n\nアフリカの農家の適応能力の現状：\n多くのアフリカの小農は適応能力が低く、気候変動による降雨パターンの変化に対して脆弱です。特に：\n・資産が少なく（低適応）\n・情報へのアクセスが限られ（低情報）\n・市場から孤立している（低経済力）\n\n灌漑の役割：\n安定した灌漑水源へのアクセスは農家の適応能力を大幅に高め、干ばつ時でも農業生産を継続できる基盤を提供します。","nameEn":"Adaptability","summaryEn":"This is the ability of agricultural systems, farmers, and organizations to appropriately adjust and respond to changes in external environments such as climate change, water resource fluctuations, and market changes. It is called Adaptive Capacity in English.","detailEn":"Components of Adaptive Capacity:\n・Technological adaptive capacity: Ability to adopt new technologies (water-saving irrigation, drought-resistant varieties, etc.)\n・Economic adaptive capacity: Shock absorption capacity through access to assets, savings, and credit\n・Social adaptive capacity: Mutual support through cooperatives, communities, and networks\n・Institutional adaptive capacity: Ability of governments and institutions to flexibly modify policies and management\n・Information and knowledge: Access to climate information, agricultural technology, and market information\n\nAdaptive Capacity and Vulnerability:\nVulnerability = Exposure + Sensitivity − Adaptive Capacity\n→ Enhancing adaptive capacity is the core of reducing vulnerability to climate change\n\nCurrent Status of Adaptive Capacity among African Farmers:\nMany smallholder farmers in Africa have low adaptive capacity and are vulnerable to changes in rainfall patterns caused by climate change. In particular:\n・Limited assets (low adaptation)\n・Limited access to information (low information)\n・Isolated from markets (low economic capacity)\n\nRole of Irrigation:\nAccess to stable irrigation water sources significantly enhances farmers' adaptive capacity and provides a foundation for continuing agricultural production even during droughts.","image":"","captionJa":"","captionEn":"","published":"","name3":"Capacité d'adaptation","summary3":"C'est la capacité des systèmes agricoles, des agriculteurs et des organisations à s'ajuster et à répondre de manière appropriée aux changements de l'environnement externe tels que le changement climatique, les variations des ressources en eau et les évolutions du marché. En anglais, cela s'appelle Adaptive Capacity.","detail3":"Composantes de la capacité d'adaptation :\n• Capacité d'adaptation technique : capacité d'adoption de nouvelles technologies (irrigation économe en eau, variétés résistantes à la sécheresse, etc.)\n• Capacité d'adaptation économique : capacité d'absorption des chocs grâce à l'accès aux actifs, à l'épargne et au crédit\n• Capacité d'adaptation sociale : soutien mutuel par les coopératives, communautés et réseaux\n• Capacité d'adaptation institutionnelle : capacité des gouvernements et institutions à modifier de manière flexible les politiques et la gestion\n• Information et connaissances : accès aux informations climatiques, aux techniques agricoles et aux informations de marché\n\nCapacité d'adaptation et vulnérabilité :\nVulnérabilité = Exposition + Sensibilité − Capacité d'adaptation\n→ Renforcer la capacité d'adaptation constitue le cœur de la réduction de la vulnérabilité au changement climatique\n\nÉtat actuel de la capacité d'adaptation des agriculteurs africains :\nDe nombreux petits agriculteurs africains ont une faible capacité d'adaptation et sont vulnérables aux changements des modèles de précipitations dus au changement climatique. En particulier :\n• Ils possèdent peu d'actifs (faible adaptation)\n• Leur accès à l'information est limité (faible information)\n• Ils sont isolés des marchés (faible pouvoir économique)\n\nRôle de l'irrigation :\nL'accès à des sources d'eau d'irrigation stables améliore considérablement la capacité d'adaptation des agriculteurs et fournit une base permettant de maintenir la production agricole même en période de sécheresse.","caption3":"","images":[]},{"rowNum":113,"id":"112","catCode":"CAT08","nameJa":"事業構想","readingJa":"じぎょうこうそう","summaryJa":"灌漑・農業開発事業を実施するための初期段階のアイデア・計画案の総称です。事業の目的・規模・場所・主要手法・期待される効果の大枠を示す概念設計段階の文書です。","detailJa":"事業構想の主な内容：\n・事業の目的・必要性（なぜこの事業が必要か）\n・対象地域・受益者の概要\n・想定する主要な介入・施設の概要\n・期待される成果・効果\n・概算事業費と財源見込み\n・実施体制の想定\n・主要なリスクと課題\n\nプロジェクトサイクルにおける位置づけ：\n事業構想 → 実現可能性調査（F/S）→ 詳細設計 → 実施 → 評価\n　（概念段階）　　（評価・判断）　　（設計）　　（建設）\n\n事業構想の策定プロセス：\n1. 問題の特定（現状・課題の把握）\n2. ステークホルダー分析（関係者の特定・ニーズ把握）\n3. 目標分析（問題から目標への変換）\n4. 戦略分析（複数の介入策の比較検討）\n5. プロジェクト設計の枠組み（PCM・ロジカルフレームワーク等）\n\nJICA PCMアプローチ：\nJICAはプロジェクトサイクルマネジメント（PCM）手法を使って事業構想を参加型で策定するアプローチを推進しており、アフリカのパートナー機関への研修でも活用されています。","nameEn":"Business Concept","summaryEn":"This is a general term for initial ideas and planning proposals for implementing irrigation and agricultural development projects. It refers to documents at the conceptual design stage that outline the project's purpose, scale, location, main methods, and expected effects.","detailEn":"Main Contents of Business Concept:\n・Purpose and necessity of the business (why this business is needed)\n・Overview of target areas and beneficiaries\n・Overview of anticipated major interventions and facilities\n・Expected outcomes and effects\n・Estimated project costs and funding prospects\n・Assumed implementation structure\n・Major risks and challenges\n\nPosition in the Project Cycle:\nBusiness Concept → Feasibility Study (F/S) → Detailed Design → Implementation → Evaluation\n(Conceptual Stage)    (Assessment/Judgment)    (Design)    (Construction)\n\nBusiness Concept Development Process:\n1. Problem identification (understanding current situation and challenges)\n2. Stakeholder analysis (identification of relevant parties and understanding needs)\n3. Objective analysis (conversion from problems to objectives)\n4. Strategy analysis (comparative examination of multiple intervention measures)\n5. Project design framework (PCM, Logical Framework, etc.)\n\nJICA PCM Approach:\nJICA promotes an approach to develop business concepts in a participatory manner using the Project Cycle Management (PCM) methodology, which is also utilized in training programs for partner institutions in Africa.","image":"","captionJa":"","captionEn":"","published":"","name3":"Conception d'entreprise","summary3":"Il s'agit d'un terme générique désignant les idées et projets de plans à la phase initiale pour la mise en œuvre de projets de développement agricole et d'irrigation. Il s'agit d'un document de la phase de conception conceptuelle qui présente le cadre général des objectifs, de l'échelle, de l'emplacement, des méthodes principales et des effets attendus du projet.","detail3":"Contenu principal de la conception de projet :\n・Objectif et nécessité du projet (pourquoi ce projet est-il nécessaire)\n・Aperçu de la zone cible et des bénéficiaires\n・Aperçu des principales interventions et installations envisagées\n・Résultats et effets attendus\n・Coût estimatif du projet et sources de financement prévues\n・Organisation de mise en œuvre envisagée\n・Principaux risques et défis\n\nPositionnement dans le cycle de projet :\nConception de projet → Étude de faisabilité (F/S) → Conception détaillée → Mise en œuvre → Évaluation\n　(Phase conceptuelle)　　(Évaluation・Jugement)　　(Conception)　　(Construction)\n\nProcessus d'élaboration de la conception de projet :\n1. Identification des problèmes (compréhension de la situation actuelle et des défis)\n2. Analyse des parties prenantes (identification des acteurs concernés et compréhension des besoins)\n3. Analyse des objectifs (conversion des problèmes en objectifs)\n4. Analyse stratégique (comparaison et examen de multiples stratégies d'intervention)\n5. Cadre de conception de projet (PCM, Cadre logique, etc.)\n\nApproche PCM de la JICA :\nLa JICA promeut une approche participative pour élaborer la conception de projet en utilisant la méthode de Gestion du Cycle de Projet (PCM), qui est également utilisée dans les formations destinées aux institutions partenaires en Afrique.","caption3":"","images":[]},{"rowNum":114,"id":"113","catCode":"CAT08","nameJa":"財政持続可能性","readingJa":"ざいせいいじかのうせい","summaryJa":"灌漑施設・農業インフラの整備・管理に必要な費用を、外部援助に頼らず自国・農家の財政で継続的に賄える能力を指します。援助依存からの脱却と自立的な農業発展の前提条件です。","detailJa":"財政持続可能性の評価指標：\n・O&M費用回収率：徴収した水利費÷必要なO&M費用（100%以上が理想）\n・農家の水利費負担率：農家収入に対する水利費の割合（通常5%以内が目安）\n・施設更新準備金：将来の大規模補修・更新に備えた積立制度\n\n財政持続可能性に関わる要因：\n・農業収益性：農家が農業で十分な収益を得られること（水利費支払いの前提）\n・水利費の適正設定と徴収：O&M費を賄える水利費レベルの設定と確実な徴収\n・国・地方政府の予算配分：農業水利インフラへの継続的な財政投資\n・補助金の段階的削減：過度な依存からの脱却\n\nアフリカの財政持続可能性の課題：\n多くのアフリカのドナー支援灌漑施設で、援助終了後の財政基盤が確立されておらず、O&Mが機能しない状態に陥っています。財政持続可能性の確保は、灌漑プロジェクト設計の初期段階から組み込まれるべき要件です。\n\n天候インデックス保険との連携：\n農家の農業リスク（干ばつ・洪水）を保険でカバーすることが、農家の水利費支払い能力の安定化につながります。ケニア・エチオピアでの天候指数保険の普及が財政持続性向上に寄与しています。","nameEn":"Fiscal sustainability","summaryEn":"This refers to the ability to continuously cover the costs necessary for the development and management of irrigation facilities and agricultural infrastructure through domestic and farm finances without relying on external assistance. It is a prerequisite for breaking away from aid dependency and achieving autonomous agricultural development.","detailEn":"Financial Sustainability Assessment Indicators:\n・O&M Cost Recovery Rate: Water fees collected ÷ Required O&M costs (100% or higher is ideal)\n・Farmers' Water Fee Burden Rate: Ratio of water fees to farmers' income (typically within 5% as a guideline)\n・Facility Renewal Reserve Fund: Accumulation system for future major repairs and renewals\n\nFactors Related to Financial Sustainability:\n・Agricultural Profitability: Farmers' ability to generate sufficient revenue from agriculture (prerequisite for water fee payment)\n・Appropriate Setting and Collection of Water Fees: Setting water fee levels that can cover O&M costs and ensuring reliable collection\n・Budget Allocation by National and Local Governments: Continuous fiscal investment in agricultural water infrastructure\n・Gradual Reduction of Subsidies: Moving away from excessive dependence\n\nChallenges of Financial Sustainability in Africa:\nMany donor-supported irrigation facilities in Africa have fallen into a state where O&M is non-functional due to the lack of established financial foundations after aid completion. Ensuring financial sustainability should be a requirement incorporated from the initial design stage of irrigation projects.\n\nIntegration with Weather Index Insurance:\nCovering farmers' agricultural risks (drought and floods) through insurance contributes to stabilizing farmers' ability to pay water fees. The spread of weather index insurance in Kenya and Ethiopia has contributed to improving financial sustainability.","image":"","captionJa":"","captionEn":"","published":"","name3":"Durabilité budgétaire","summary3":"Cela désigne la capacité à couvrir de manière continue les coûts nécessaires à l'aménagement et à la gestion des installations d'irrigation et des infrastructures agricoles par les finances nationales et des exploitants agricoles, sans dépendre de l'aide extérieure. Il s'agit d'une condition préalable au désengagement de la dépendance à l'aide et au développement agricole autonome.","detail3":"Indicateurs d'évaluation de la durabilité financière :\n• Taux de recouvrement des coûts O&M : redevances hydrauliques collectées ÷ coûts O&M nécessaires (100% ou plus est idéal)\n• Taux de charge des redevances hydrauliques pour les agriculteurs : proportion des redevances hydrauliques par rapport au revenu agricole (généralement 5% ou moins comme référence)\n• Fonds de réserve pour le renouvellement des installations : système d'épargne en prévision des réparations et rénovations majeures futures\n\nFacteurs liés à la durabilité financière :\n• Rentabilité agricole : capacité des agriculteurs à obtenir des revenus suffisants de l'agriculture (prérequis pour le paiement des redevances hydrauliques)\n• Fixation et collecte appropriées des redevances hydrauliques : établissement d'un niveau de redevances hydrauliques couvrant les coûts O&M et collecte assurée\n• Allocation budgétaire nationale et locale : investissement financier continu dans les infrastructures hydrauliques agricoles\n• Réduction progressive des subventions : sortie de la dépendance excessive\n\nDéfis de la durabilité financière en Afrique :\nDans de nombreuses installations d'irrigation soutenues par les donateurs en Afrique, les bases financières ne sont pas établies après la fin de l'aide, entraînant un dysfonctionnement de l'O&M. L'assurance de la durabilité financière est une exigence qui doit être intégrée dès les phases initiales de conception des projets d'irrigation.\n\nCollaboration avec l'assurance indicielle climatique :\nLa couverture des risques agricoles des agriculteurs (sécheresse et inondations) par l'assurance contribue à la stabilisation de leur capacité de paiement des redevances hydrauliques. La diffusion de l'assurance indicielle climatique au Kenya et en Éthiopie contribue à l'amélioration de la durabilité financière.","caption3":"","images":[]},{"rowNum":115,"id":"114","catCode":"CAT08","nameJa":"技術効率","readingJa":"ぎじゅつこうりつ","summaryJa":"投入した資源（水・肥料・労働力・資本）から最大限の産出（収量・収益）を得るための生産活動の効率性を示す概念です。技術的に最善な生産に近づいている度合いを示します。","detailJa":"技術効率の定義と測定：\n技術効率（TE）= 実際の産出量 ÷ 技術的最大産出量（フロンティア産出量）\n→ 完全効率 = 1.0（最大産出量を達成）\n→ TE = 0.7 は、最大達成可能産出量の70%しか達成できていないことを意味する\n\n技術効率に影響する要因：\n・農業技術の採用（改良品種・適切な施肥・灌漑タイミング）\n・農家の技術知識・経験\n・土地・水の質\n・資本・投入財へのアクセス\n・病害虫・天候リスク\n\n水利用技術効率：\n灌漑における技術効率は「

n・排水受益地：排水施設によって過剰な水が排除され農業生産性が向上する農地\n・圃場整備受益地：圃場整備（均平・区画整理）により生産性向上を受ける農地\n\n受益地の調査・測量：\n・地籍調査（土地の所有者・境界・面積の確認）と連動\n・現地踏査・GPSによる圃場位置の確認\n・灌漑可能地（自然条件上灌漑できる土地）と実際の受益地を区別\n\n日本の制度：\n土地改良法に基づく事業では、受益地面積が事業採択の要件（規模基準）を満たすかどうかの審査基準となります。事業費は受益農家（土地改良区）と国・都道府県が応分に負担します。\n\nアフリカでの重要性：\n受益地の正確な把握は、水利費の公平な賦課・灌漑管理移譲後の農家組合の組織づくり・将来の施設拡張計画の基礎データとなります。土地登記が不完全なアフリカ多くの国では、受益地の把握自体が課題です。","nameEn":"Benefited land","summaryEn":"This refers to the area of agricultural land (fields) that receives direct benefits from irrigation projects or agricultural water utilization projects. The scope of the beneficiary area serves as the basis for facility development planning, cost recovery, and maintenance fee assessment.","detailEn":"Definition and Identification of Beneficiary Areas:\n・Irrigation beneficiary areas: Agricultural land that receives water supply from irrigation facilities and enables stable agricultural production\n・Drainage beneficiary areas: Agricultural land where agricultural productivity is improved through the removal of excess water by drainage facilities\n・Field development beneficiary areas: Agricultural land that benefits from improved productivity through field development (land leveling and plot consolidation)\n\nSurvey and Measurement of Beneficiary Areas:\n・Coordination with cadastral surveys (confirmation of land ownership, boundaries, and area)\n・Field reconnaissance and GPS verification of field locations\n・Distinction between irrigable land (land that can be naturally irrigated) and actual beneficiary areas\n\nJapanese System:\nIn projects based on the Land Improvement Act, the beneficiary area serves as an evaluation criterion for determining whether the project meets the requirements for adoption (scale standards). Project costs are shared proportionally between beneficiary farmers (land improvement districts) and national and prefectural governments.\n\nImportance in Africa:\nAccurate identification of beneficiary areas serves as fundamental data for fair assessment of water charges, organization of farmers' associations after irrigation management transfer, and future facility expansion plans. In many African countries where land registration is incomplete, identifying beneficiary areas itself is a challenge.","image":"","captionJa":"","captionEn":"","published":"","name3":"terrain bénéficiaire","summary3":"Il s'agit de la zone des terres agricoles (parcelles) qui bénéficient directement des projets d'irrigation et des ouvrages hydrauliques agricoles. L'étendue de la zone bénéficiaire constitue la base pour la planification de l'aménagement des infrastructures, le recouvrement des coûts et l'imposition des frais d'entretien.","detail3":"Définition et identification des terres bénéficiaires :\n・Terres bénéficiaires d'irrigation : terres agricoles qui reçoivent un approvisionnement en eau des installations d'irrigation et permettent une production agricole stable\n・Terres bénéficiaires de drainage : terres agricoles dont la productivité agricole est améliorée par l'évacuation de l'eau excédentaire grâce aux installations de drainage\n・Terres bénéficiaires d'aménagement parcellaire : terres agricoles qui bénéficient d'une amélioration de la productivité grâce à l'aménagement parcellaire (nivellement et remembrement)\n\nEnquête et arpentage des terres bénéficiaires :\n・En coordination avec l'enquête cadastrale (vérification des propriétaires, limites et superficies des terres)\n・Reconnaissance sur le terrain et vérification de la position des parcelles par GPS\n・Distinction entre les terres irrigables (terres pouvant être irriguées selon les conditions naturelles) et les terres réellement bénéficiaires\n\nSystème japonais :\nDans les projets basés sur la Loi d'amélioration foncière, la superficie des terres bénéficiaires sert de critère d'examen pour déterminer si les conditions d'adoption du projet (critères d'échelle) sont remplies. Les coûts du projet sont partagés proportionnellement entre les agriculteurs bénéficiaires (associations d'amélioration foncière) et l'État et les préfectures.\n\nImportance en Afrique :\nLa compréhension précise des terres bénéficiaires constitue les données de base pour l'imposition équitable des redevances hydrauliques, l'organisation d'associations d'agriculteurs après le transfert de la gestion de l'irrigation, et les plans futurs d'extension des installations. Dans de nombreux pays africains où l'enregistrement foncier est incomplet, la compréhension même des terres bénéficiaires constitue un défi.","caption3":"","images":[]},{"rowNum":59,"id":"058","catCode":"CAT03","nameJa":"灌漑管理移譲","readingJa":"かんがいかんりいしょく","summaryJa":"政府機関が管理・運営していた灌漑施設の管理責任を、農家組合（水利用者組合等）に移転するプロセスです。英語ではIMT（Irrigation Management Transfer）と呼ばれます。","detailJa":"IMTの背景と目的：\n・1970〜80年代：多くの途上国で政府主導の灌漑施設の管理不足・財政圧迫が顕在化\n・解決策として農家への管理権限移譲（IMT）が1990年代以降に広く推進された\n・目的：①O&Mコスト削減、②農家の主体性向上、③施設の持続的維持管理\n\nIMTの類型：\n1. 完全移譲：施設の所有権と管理権を農家組合に全面移転\n2. 部分移譲：幹線は政府が維持、支線・圃場部分のみ農家へ移譲\n3. 委任管理：施設の所有権は政府保有のまま、管理運営を農家組合に委託\n\n成功のための条件：\n・農家組合（WUA）の組織力・技術力・財務管理能力\n・明確な法的地位と財産権の保証\n・政府による移行期間の継続的技術支援\n・水利費収入でO&M費が賄える経済条件\n\nアフリカでの事例：\nメキシコ・チリ・トルコでの成功事例がアフリカのモデルとなっています。アフリカではエジプト・モロッコ・南アフリカなどで部分的IMTが進んでいますが、農家組合の能力不足が課題として残っています。","nameEn":"Irrigation Management Transfer","summaryEn":"This is the process of transferring management responsibility for irrigation facilities that were previously managed and operated by government agencies to farmer associations (water user associations, etc.). In English, this is called IMT (Irrigation Management Transfer).","detailEn":"Background and Objectives of IMT:\n・1970s-1980s: Management deficiencies and financial pressures of government-led irrigation facilities became apparent in many developing countries\n・As a solution, irrigation management transfer (IMT) to farmers has been widely promoted since the 1990s\n・Objectives: ①Reduction of O&M costs, ②Enhancement of farmers' initiative, ③Sustainable facility maintenance and management\n\nTypes of IMT:\n1. Complete transfer: Full transfer of facility ownership and management rights to farmers' associations\n2. Partial transfer: Government maintains main canals, transfer only secondary canals and field-level portions to farmers\n3. Management delegation: Government retains facility ownership while delegating management and operation to farmers' associations\n\nConditions for Success:\n・Organizational capacity, technical capability, and financial management ability of Water Users Associations (WUA)\n・Clear legal status and guarantee of property rights\n・Continuous technical support from government during transition period\n・Economic conditions where O&M costs can be covered by water fee revenue\n\nCases in Africa:\nSuccessful cases in Mexico, Chile, and Turkey serve as models for Africa. In Africa, partial IMT is progressing in Egypt, Morocco, South Africa and other countries, but insufficient capacity of farmers' associations remains a challenge.","image":"","captionJa":"","captionEn":"","published":"","name3":"Transfert de gestion de l'irrigation","summary3":"C'est le processus de transfert de la responsabilité de gestion des installations d'irrigation, qui étaient gérées et exploitées par les organismes gouvernementaux, aux associations d'agriculteurs (associations d'usagers de l'eau, etc.). En anglais, cela s'appelle IMT (Irrigation Management Transfer).","detail3":"Contexte et objectifs de l'IMT :\n• Années 1970-80 : La gestion défaillante des infrastructures d'irrigation dirigées par les gouvernements et les pressions budgétaires se sont manifestées dans de nombreux pays en développement\n• En tant que solution, le transfert des responsabilités de gestion aux agriculteurs (IMT) a été largement promu à partir des années 1990\n• Objectifs : ①Réduction des coûts d'E&M, ②Amélioration de l'autonomie des agriculteurs, ③Maintenance durable des infrastructures\n\nTypologie de l'IMT :\n1. Transfert complet : Transfert total de la propriété et des droits de gestion des infrastructures aux associations d'agriculteurs\n2. Transfert partiel : Le gouvernement maintient les canaux principaux, seuls les canaux secondaires et les parcelles sont transférés aux agriculteurs\n3. Gestion déléguée : La propriété des infrastructures reste gouvernementale, tandis que la gestion et l'exploitation sont confiées aux associations d'agriculteurs\n\nConditions pour le succès :\n• Capacité organisationnelle, technique et de gestion financière des associations d'usagers de l'eau (WUA)\n• Statut juridique clair et garantie des droits de propriété\n• Soutien technique continu du gouvernement pendant la période de transition\n• Conditions économiques permettant de couvrir les coûts d'E&M par les revenus des redevances hydrauliques\n\nExemples en Afrique :\nLes cas de succès au Mexique, au Chili et en Turquie servent de modèles pour l'Afrique. En Afrique, l'IMT partielle progresse en Égypte, au Maroc et en Afrique du Sud, mais l'insuffisance des capacités des associations d'agriculteurs demeure un défi.","caption3":"","images":[]},{"rowNum":60,"id":"059","catCode":"CAT04","nameJa":"ダム","readingJa":"だむ","summaryJa":"河川を横断して設けた堰堤構造物で、上流に水を貯留し、灌漑・発電・洪水調節・水道等の目的に利用するための施設です。水資源の時間的・空間的調節機能を持ちます。","detailJa":"ダムの種類：\n1. 重力式コンクリートダム：自重で水圧に抵抗。最も一般的で信頼性が高い\n2. アーチダム：湾曲した形状で水圧を両岸の岩盤に伝える。狭いV字谷に適合\n3. フィルダム（アースダム・ロックフィルダム）：土や岩石を盛り立てた構造。基礎地盤が岩でなくても建設できる\n4. ラバーダム（ゴム堰）：ゴム製の袋を水や空気で膨らませる可動式堰。農業用小規模取水に使われる\n\nダムの機能：\n・貯水機能：雨季の余剰水を貯め、乾季に放流する（時間調節）\n・灌漑用水の安定供給\n・洪水調節（上流からの洪水を貯留して下流への流出を緩和）\n・水力発電\n\nアフリカの大型ダムと農業：\n・アスワンハイダム（エジプト）：ナイル川を調節してエジプト全土の農業水を保証\n・カリバダム（ザンビア・ジンバブエ）：ザンベジ川の発電・灌漑\n・グランドルネサンスダム（エチオピア）：ナイル川上流での大型開発（下流国との紛争問題）\n\n小規模ダムの重要性：\nアフリカの農村では小規模コンクリート固定堰・土製ため池堰が数多く建設されており、小規模灌漑と家畜用水確保に重要な役割を果たしています。","nameEn":"Dam","summaryEn":"A dam structure built across a river to impound water upstream for purposes such as irrigation, power generation, flood control, and water supply. It has the function of temporal and spatial regulation of water resources.","detailEn":"Types of Dams:\n1. Gravity concrete dam: Resists water pressure by its own weight. Most common and reliable type\n2. Arch dam: Transfers water pressure to rock foundations on both banks through its curved shape. Suitable for narrow V-shaped valleys\n3. Fill dam (earth dam/rockfill dam): Structure built by filling with soil or rock. Can be constructed even when foundation bedrock is not rock\n4. Rubber dam (rubber weir): Movable weir that inflates rubber bags with water or air. Used for small-scale agricultural water intake\n\nDam Functions:\n・Water storage function: Stores surplus water during rainy season and releases it during dry season (temporal regulation)\n・Stable supply of irrigation water\n・Flood control (stores floods from upstream to mitigate outflow to downstream areas)\n・Hydroelectric power generation\n\nLarge Dams and Agriculture in Africa:\n・Aswan High Dam (Egypt): Regulates the Nile River to guarantee agricultural water for all of Egypt\n・Kariba Dam (Zambia/Zimbabwe): Power generation and irrigation on the Zambezi River\n・Grand Ethiopian Renaissance Dam (Ethiopia): Large-scale development on the upper Nile River (conflict issues with downstream countries)\n\nImportance of Small-scale Dams:\nIn rural Africa, numerous small-scale concrete fixed weirs and earthen pond weirs have been constructed, playing important roles in small-scale irrigation and securing water for livestock.","image":"","captionJa":"","captionEn":"","published":"","name3":"Barrage","summary3":"Structure de barrage établie en travers d'une rivière, qui retient l'eau en amont et constitue une installation destinée à des fins d'irrigation, de production d'électricité, de régulation des crues, d'approvisionnement en eau, etc. Elle possède une fonction de régulation temporelle et spatiale des ressources hydriques.","detail3":"Types de barrages :\n1. Barrage-poids en béton : résiste à la pression de l'eau par son propre poids. Le plus courant et le plus fiable\n2. Barrage-voûte : forme incurvée qui transmet la pression de l'eau aux massifs rocheux des deux rives. Adapté aux vallées étroites en V\n3. Barrage en remblai (barrage en terre - barrage en enrochement) : structure constituée de terre et de roches compactées. Peut être construit même lorsque les fondations ne sont pas rocheuses\n4. Barrage gonflable (déversoir en caoutchouc) : déversoir mobile constitué d'un sac en caoutchouc gonflé à l'eau ou à l'air. Utilisé pour les petits captages agricoles\n\nFonctions des barrages :\n• Fonction de stockage : stocker l'eau excédentaire de la saison des pluies et la restituer en saison sèche (régulation temporelle)\n• Approvisionnement stable en eau d'irrigation\n• Régulation des crues (rétention des crues venant de l'amont et atténuation des écoulements vers l'aval)\n• Production d'énergie hydroélectrique\n\nGrands barrages et agriculture en Afrique :\n• Barrage d'Assouan (Égypte) : régule le Nil et garantit l'eau agricole pour tout l'Égypte\n• Barrage de Kariba (Zambie-Zimbabwe) : production d'électricité et irrigation sur le Zambèze\n• Grand barrage de la Renaissance (Éthiopie) : grand projet de développement en amont du Nil (problèmes de conflits avec les pays en aval)\n\nImportance des petits barrages :\nDans les zones rurales africaines, de nombreux petits déversoirs fixes en béton et barrages de retenue en terre ont été construits, jouant un rôle important dans la petite irrigation et l'approvisionnement en eau pour le bétail.","caption3":"","images":[]},{"rowNum":61,"id":"060","catCode":"CAT04","nameJa":"土水路","readingJa":"どすいろ","summaryJa":"コンクリートや他の材料で覆われておらず、素掘りまたは締め固めた土の地盤で構成された開水路です。建設コストが最も低い反面、漏水・土壌侵食・雑草繁茂が多い。","detailJa":"土水路の特徴：\n・建設コスト：最も低い（材料費ほぼゼロ、整形作業のみ）\n・送水効率：低い（40〜60%。大量の水が漏水・侵食で失われる）\n・維持管理：定期的な除草・泥土除去が必要\n・耐久性：低い（特に急流部・施設接続部で侵食が進みやすい）\n\n土水路の設計基準：\n・流速：0.3〜0.8 m/s（遅すぎると土砂堆積、速すぎると侵食）\n・底面幅：流量・傾斜に応じて設計\n・法勾配：崩壊防止のため1:1〜1:1.5が標準\n・水路内面に植生（バーミューダグラス等）を生やして侵食を抑制する手法もある\n\n土水路のコンクリート化（ライニング）の効果：\n土水路をコンクリート水路にライニングすると：\n・送水効率が60%→85〜90%に向上\n・漏水による水損失が大幅減\n・清掃作業が容易になり維持管理コスト削減\n\nアフリカでの現状：\n多くのアフリカの灌漑施設で幹線以外の支線・末端水路が土水路のまま放置されており、水損失の主要因となっています。土水路の計画的なコンクリート化・整備が節水と水管理改善の重要な投資です。","nameEn":"Earthen canal","summaryEn":"An open channel consisting of unlined or compacted soil ground that is not covered with concrete or other materials. While it has the lowest construction cost, it is prone to seepage, soil erosion, and weed growth.","detailEn":"Characteristics of Earth Channels:\n・Construction cost: Lowest (virtually zero material costs, only shaping work required)\n・Water conveyance efficiency: Low (40-60%. Large amounts of water are lost through seepage and erosion)\n・Maintenance: Regular weeding and sediment removal required\n・Durability: Low (erosion particularly progresses easily in steep sections and facility connection points)\n\nDesign Standards for Earth Channels:\n・Flow velocity: 0.3-0.8 m/s (too slow causes sediment deposition, too fast causes erosion)\n・Bottom width: Designed according to flow rate and gradient\n・Side slope: Standard 1:1 to 1:1.5 to prevent collapse\n・Methods also exist to suppress erosion by growing vegetation (Bermuda grass, etc.) on the inner surface of the channel\n\nEffects of Concrete Lining of Earth Channels:\nWhen earth channels are lined with concrete channels:\n・Water conveyance efficiency improves from 60% to 85-90%\n・Water loss due to seepage is significantly reduced\n・Cleaning work becomes easier, reducing maintenance costs\n\nCurrent Situation in Africa:\nIn many African irrigation facilities, secondary and tertiary channels other than main channels remain as unimproved earth channels, becoming a major cause of water loss. Systematic concrete lining and improvement of earth channels is an important investment for water conservation and improved water management.","image":"","captionJa":"","captionEn":"","published":"","name3":"Canal de terre","summary3":"Il s'agit d'un canal à ciel ouvert constitué d'un sol excavé ou compacté, non recouvert de béton ou d'autres matériaux. Bien que les coûts de construction soient les plus faibles, il présente de nombreux problèmes de fuites, d'érosion du sol et de prolifération de mauvaises herbes.","detail3":"Caractéristiques des canaux en terre :\n・Coût de construction : le plus faible (coût de matériaux quasi nul, uniquement des travaux de profilage)\n・Efficacité de transport d'eau : faible (40 à 60%. De grandes quantités d'eau sont perdues par infiltration et érosion)\n・Entretien : désherbage régulier et enlèvement des dépôts de terre nécessaires\n・Durabilité : faible (l'érosion progresse facilement, particulièrement dans les sections à écoulement rapide et aux points de raccordement des ouvrages)\n\nCritères de conception des canaux en terre :\n・Vitesse d'écoulement : 0,3 à 0,8 m/s (trop lente provoque l'accumulation de sédiments, trop rapide provoque l'érosion)\n・Largeur du radier : conçue selon le débit et la pente\n・Pente des talus : 1:1 à 1:1,5 standard pour prévenir l'effondrement\n・Il existe également des méthodes pour supprimer l'érosion en faisant pousser de la végétation (herbe des Bermudes, etc.) sur la surface interne du canal\n\nEffets du revêtement en béton des canaux en terre :\nLorsque les canaux en terre sont revêtus de béton :\n・L'efficacité de transport d'eau s'améliore de 60% à 85-90%\n・Les pertes d'eau par infiltration diminuent considérablement\n・Les travaux de nettoyage deviennent plus faciles et les coûts d'entretien sont réduits\n\nSituation actuelle en Afrique :\nDans de nombreuses installations d'irrigation africaines, les canaux secondaires et tertiaires autres que les canaux principaux restent des canaux en terre abandonnés, constituant la principale cause des pertes d'eau. Le revêtement en béton et l'aménagement planifiés des canaux en terre représentent un investissement important pour l'économie d'eau et l'amélioration de la gestion de l'eau.","caption3":"","images":[]},{"rowNum":62,"id":"061","catCode":"CAT04","nameJa":"幹線用水路","readingJa":"かんせんようすいろ","summaryJa":"取水施設（堰・ポンプ場）から直接水を受け、灌漑システムの主要骨格をなす最大規模の用水路です。全受益地への水の「大動脈」として機能します。","detailJa":"幹線用水路の特徴：\n・灌漑システムの最上位の水路で、最も大きな流量を輸送\n・コンクリートライニング・シートパイル・矢板等で保護されることが多い\n・水路沿いに管理道路（管理用道路）が設けられることが多い\n・取水口・分水工（支線への分岐点）・落差工・暗渠等の付帯施設が設置される\n\n幹線用水路の設計：\n・設計流量：受益全面積の計画用水量（ピーク月）で決定\n　例：1,000haの受益地、計画用水量2L/s/ha → 設計流量2,000L/s = 2.0 m³/s\n・流速：コンクリート水路 0.5〜2.0 m/s（最大侵食速度以下）\n・断面形状：矩形・台形・U形\n\n大規模灌漑と幹線用水路：\nアフリカの大規模国営灌漑スキーム（スーダンのゲジラ灌漑農業・エジプトのナイルデルタ）では、幹線水路の全長が数百kmにおよびます。これらの幹線水路の老朽化・補修が農業生産維持の大課題です。","nameEn":"Main irrigation canal","summaryEn":"This is the largest-scale irrigation canal that receives water directly from intake facilities (weirs and pumping stations) and forms the main framework of the irrigation system. It functions as the main artery for water distribution to all beneficiary areas.","detailEn":"Characteristics of Main Irrigation Canals:\n• Top-tier canals in the irrigation system that transport the largest flow volume\n• Often protected with concrete lining, sheet piles, steel sheet piles, etc.\n• Maintenance roads (service roads) are often constructed along the canals\n• Auxiliary facilities such as intake structures, diversion works (branch points to secondary canals), drop structures, and culverts are installed\n\nDesign of Main Irrigation Canals:\n• Design flow rate: Determined by the planned water requirement (peak month) for the total beneficiary area\n  Example: 1,000 ha beneficiary area, planned water requirement 2L/s/ha → Design flow rate 2,000L/s = 2.0 m³/s\n• Flow velocity: Concrete canals 0.5-2.0 m/s (below maximum erosion velocity)\n• Cross-sectional shape: Rectangular, trapezoidal, U-shaped\n\nLarge-scale Irrigation and Main Irrigation Canals:\nIn Africa's large-scale state-run irrigation schemes (Gezira Irrigation Scheme in Sudan and Nile Delta in Egypt), the total length of main canals extends to several hundred kilometers. The deterioration and repair of these main canals represent major challenges for maintaining agricultural production.","image":"","captionJa":"","captionEn":"","published":"","name3":"Canal d'irrigation principal","summary3":"Canal principal d'irrigation de plus grande échelle qui constitue l'ossature principale du système d'irrigation en recevant directement l'eau des installations de captage (barrages de dérivation et stations de pompage). Il fonctionne comme « l'artère principale » d'acheminement de l'eau vers l'ensemble des zones bénéficiaires.","detail3":"Caractéristiques du canal principal d'irrigation :\n• Canal de niveau supérieur du système d'irrigation, transportant le plus grand débit\n• Souvent protégé par un revêtement en béton, des palplanches, des rideaux de palplanches, etc.\n• Une route de service (route d'entretien) est souvent aménagée le long du canal\n• Des ouvrages annexes sont installés : prise d'eau, ouvrage de répartition (point de bifurcation vers les canaux secondaires), ouvrage de chute, conduites souterraines, etc.\n\nConception du canal principal d'irrigation :\n• Débit de dimensionnement : déterminé par la demande en eau planifiée (mois de pointe) pour la totalité de la superficie bénéficiaire\n　Exemple : 1 000 ha de zone bénéficiaire, demande en eau planifiée de 2 L/s/ha → débit de dimensionnement 2 000 L/s = 2,0 m³/s\n• Vitesse d'écoulement : canal en béton 0,5 à 2,0 m/s (inférieure à la vitesse maximale d'érosion)\n• Forme de la section transversale : rectangulaire, trapézoïdale, en U\n\nIrrigation à grande échelle et canaux principaux :\nDans les grands projets d'irrigation nationaux en Afrique (irrigation agricole de Gezira au Soudan, delta du Nil en Égypte), la longueur totale des canaux principaux s'étend sur plusieurs centaines de kilomètres. Le vieillissement et la réparation de ces canaux principaux constituent un défi majeur pour le maintien de la production agricole.","caption3":"","images":[]},{"rowNum":63,"id":"062","catCode":"CAT04","nameJa":"コンクリート水路","readingJa":"こんくりーとすいろ","summaryJa":"水路の内面をコンクリートで覆った（ライニングした）開水路または閉水路です。素掘り土水路に比べ、漏水損失を大幅に削減し維持管理を容易にします。","detailJa":"コンクリート水路の種類：\n1. 現場打ちコンクリート水路：現地でコンクリートを型枠に打設\n2. プレキャスト（工場製品）水路：工場製のU形・矩形ブロックを現場で組み立て\n3. HDPE管・鋼管路（閉水路）：完全密閉で蒸発損失ゼロ\n\nコンクリートライニングの効果：\n・送水効率：80〜90%（土水路比で20〜30%向上）\n・維持管理コスト削減（除草・泥土除去不要）\n・水路断面を小さくできる（流速が速くなるため）\n・管理道路兼用が容易\n\nアフリカでのコンクリート水路整備の課題：\n・建設コストが土水路の3〜10倍\n・技術者・熟練工が必要\n・セメント・骨材の農村部での入手性・輸送コスト\n・地震・膨張収縮による亀裂発生への適切な設計\n\n日本の技術協力：\nJICAの多くのアフリカ灌漑支援プロジェクトで、既存土水路のコンクリートライニングが最優先事業として実施されています。","nameEn":"Concrete channel","summaryEn":"This is an open channel or closed conduit whose interior surface is covered (lined) with concrete. Compared to unlined earth channels, it significantly reduces seepage losses and facilitates maintenance.","detailEn":"Types of Concrete Irrigation Channels:\n1. Cast-in-place concrete channels: Concrete poured into forms on-site\n2. Precast (factory-made) channels: Factory-manufactured U-shaped and rectangular blocks assembled on-site\n3. HDPE pipes and steel pipelines (closed conduits): Completely sealed with zero evaporation losses\n\nEffects of Concrete Lining:\n・Conveyance efficiency: 80-90% (20-30% improvement compared to earth channels)\n・Reduced maintenance costs (no need for weed control and sediment removal)\n・Smaller channel cross-sections possible (due to increased flow velocity)\n・Easy dual use as maintenance roads\n\nChallenges in Concrete Channel Development in Africa:\n・Construction costs 3-10 times higher than earth channels\n・Requirement for engineers and skilled workers\n・Availability and transportation costs of cement and aggregates in rural areas\n・Appropriate design for crack prevention due to earthquakes and thermal expansion/contraction\n\nJapanese Technical Cooperation:\nIn many JICA irrigation support projects in Africa, concrete lining of existing earth channels is implemented as the top priority activity.","image":"","captionJa":"","captionEn":"","published":"","name3":"Canal en béton","summary3":"Il s'agit d'un canal ouvert ou fermé dont la surface intérieure du chenal est recouverte (doublée) de béton. Comparé aux canaux en terre non revêtus, il réduit considérablement les pertes par infiltration et facilite l'entretien.","detail3":"Types de canaux en béton :\n1. Canaux en béton coulé sur place : coulage du béton dans des coffrages sur site\n2. Canaux préfabriqués (produits d'usine) : assemblage sur site de blocs en forme de U ou rectangulaires fabriqués en usine\n3. Conduites HDPE et conduites en acier (conduites fermées) : complètement étanches avec zéro perte par évaporation\n\nEffets du revêtement en béton :\n• Efficacité de transport d'eau : 80 à 90% (amélioration de 20 à 30% par rapport aux canaux en terre)\n• Réduction des coûts d'entretien (pas besoin de désherbage ni d'enlèvement de boue)\n• Possibilité de réduire la section du canal (grâce à l'augmentation de la vitesse d'écoulement)\n• Facilité d'utilisation combinée comme route de gestion\n\nDéfis de l'aménagement de canaux en béton en Afrique :\n• Coût de construction 3 à 10 fois supérieur aux canaux en terre\n• Besoin d'ingénieurs et d'ouvriers qualifiés\n• Disponibilité et coût de transport du ciment et des granulats en zones rurales\n• Conception appropriée pour les fissures dues aux séismes et à la dilatation-contraction\n\nCoopération technique japonaise :\nDans de nombreux projets de soutien à l'irrigation en Afrique de la JICA, le revêtement en béton des canaux en terre existants est mis en œuvre comme activité prioritaire.","caption3":"","images":[]},{"rowNum":64,"id":"063","catCode":"CAT04","nameJa":"二次用水路","readingJa":"にじようすいろ","summaryJa":"幹線用水路から分岐して、より小さい区域の農地へ水を配分する中位の水路です。幹線から受け取った水を末端の圃場取水口（三次水路・農家水路）に分配する中間的役割を担います。","detailJa":"水路系統の階層構造：\n水源\n→ 幹線用水路（Main Canal）：最大流量、数km〜数十km\n→ 支線用水路・二次用水路（Branch/Secondary Canal）：中流量\n→ 三次用水路（Tertiary Canal）：小流量、直接農家圃場へ\n→ 圃場水路（Farm Ditch）：最末端\n\n二次用水路の特徴：\n・流量：数十〜数百L/s程度（システムにより異なる）\n・担当面積：数十〜数百ha程度\n・管理主体：国営システムでは政府機関、移譲システムでは農家組合\n・構造：コンクリートまたは土水路\n\n三次水路の重要性：\n幹線・二次水路が整備されていても、末端の三次水路・圃場水路が整備されていないと農家への配水が機能しません。多くのアフリカの灌漑スキームでは、三次水路以下の整備が不十分で圃場への配水が問題となっています（「ラストマイル問題」）。","nameEn":"Secondary irrigation canal","summaryEn":"This is a medium-sized canal that branches off from the main irrigation canal to distribute water to smaller agricultural areas. It plays an intermediate role in distributing water received from the main canal to terminal field intake points (tertiary canals/farm channels).","detailEn":"Hierarchical Structure of Canal Systems:\nWater Source\n→ Main Canal: Maximum flow capacity, several km to several tens of km\n→ Branch/Secondary Canal: Medium flow capacity\n→ Tertiary Canal: Small flow capacity, direct distribution to farm fields\n→ Farm Ditch: Final terminus\n\nCharacteristics of Secondary Canals:\n・Flow rate: Approximately several tens to several hundreds L/s (varies by system)\n・Coverage area: Approximately several tens to several hundreds ha\n・Management entity: Government agencies in state-operated systems, farmers' associations in transferred systems\n・Structure: Concrete or earthen canals\n\nImportance of Tertiary Canals:\nEven when main and secondary canals are well-developed, water distribution to farmers cannot function properly if the terminal tertiary canals and farm ditches are not adequately developed. In many African irrigation schemes, insufficient development of tertiary canals and below creates problems with water distribution to fields (the \"last mile problem\").","image":"","captionJa":"","captionEn":"","published":"","name3":"Canal d'irrigation secondaire","summary3":"Il s'agit d'un canal d'irrigation de niveau intermédiaire qui se ramifie à partir du canal principal pour distribuer l'eau vers des zones agricoles plus petites. Il joue un rôle intermédiaire en répartissant l'eau reçue du canal principal vers les prises d'eau terminales des parcelles (canaux tertiaires et canaux d'exploitation agricole).","detail3":"Structure hiérarchique du système de canaux d'irrigation :\nSource d'eau\n→ Canal principal (Main Canal) : débit maximum, quelques km à quelques dizaines de km\n→ Canal secondaire/Canal dérivé (Branch/Secondary Canal) : débit moyen\n→ Canal tertiaire (Tertiary Canal) : faible débit, directement vers les parcelles agricoles\n→ Fossé de parcelle (Farm Ditch) : extrémité finale\n\nCaractéristiques des canaux secondaires :\n・Débit : environ quelques dizaines à quelques centaines de L/s (varie selon le système)\n・Surface desservie : environ quelques dizaines à quelques centaines d'hectares\n・Organisme de gestion : organismes gouvernementaux pour les systèmes nationaux, associations d'agriculteurs pour les systèmes transférés\n・Structure : béton ou canaux en terre\n\nImportance des canaux tertiaires :\nMême si les canaux principaux et secondaires sont aménagés, la distribution d'eau aux agriculteurs ne fonctionne pas si les canaux tertiaires et fossés de parcelle en aval ne sont pas développés. Dans de nombreux systèmes d'irrigation africains, l'aménagement des canaux tertiaires et inférieurs est insuffisant, posant des problèmes de distribution d'eau vers les parcelles (« problème du dernier kilomètre »).","caption3":"","images":[]},{"rowNum":65,"id":"064","catCode":"CAT04","nameJa":"管理施設","readingJa":"かんりしせつ","summaryJa":"灌漑用水の流量・水位・水門等を適切に制御・監視するために設置された構造物・機器の総称です。水門・流量計・水位計・分水工など灌漑管理に必要な設備を含みます。","detailJa":"管理施設の種類：\n1. 分水工（Division Structure）：水を複数の水路に分配\n2. 落差工（Drop Structure）：水路の急勾配部での侵食防止\n3. 逆サイフォン・アクアダクト：障害物（道路・河川）をくぐる・またぐ施設\n4. 量水施設（流量計）：三角堰・矩形堰・電磁流量計など\n5. 排砂施設：取水された砂・泥を除去するための沈砂池・フラッシングゲート\n\n管理施設の重要性：\n管理施設が正常に機能しないと、水の適正な配分・制御ができず：\n・上流農家が過剰取水、下流農家に水が届かない\n・水路の決壊・侵食リスク増大\n・水損失の増加\n\nアフリカでの課題：\n老朽化・設計不良・管理不足により、ゲート・水門が正常に機能しない施設が多い。金属製ゲートの腐食・盗難、コンクリートの亀裂等が課題です。適切な素材選択と定期点検が重要です。","nameEn":"Management facility","summaryEn":"A general term for structures and equipment installed to properly control and monitor the flow rate, water level, gates, and other aspects of irrigation water. This includes facilities necessary for irrigation management such as gates, flow meters, water level gauges, and water distribution works.","detailEn":"Types of Management Facilities:\n1. Division Structure: Distributes water to multiple channels\n2. Drop Structure: Prevents erosion in steep gradient sections of channels\n3. Inverted Siphon/Aqueduct: Facilities that pass under or over obstacles (roads/rivers)\n4. Flow Measurement Facilities (Flow Meters): Triangular weirs, rectangular weirs, electromagnetic flow meters, etc.\n5. Desanding Facilities: Settling basins and flushing gates for removing sand and mud from intake water\n\nImportance of Management Facilities:\nWhen management facilities do not function properly, appropriate water distribution and control cannot be achieved:\n・Upstream farmers take excessive water, preventing water from reaching downstream farmers\n・Increased risk of channel collapse and erosion\n・Increased water loss\n\nChallenges in Africa:\nMany facilities have gates and sluices that do not function properly due to deterioration, poor design, and inadequate management. Issues include corrosion and theft of metal gates, concrete cracks, etc. Appropriate material selection and regular inspection are crucial.","image":"","captionJa":"","captionEn":"","published":"","name3":"Installation de gestion","summary3":"Il s'agit de l'appellation générale des structures et équipements installés pour contrôler et surveiller de manière appropriée le débit, le niveau d'eau et les vannes de l'eau d'irrigation. Cela inclut les équipements nécessaires à la gestion de l'irrigation tels que les vannes, les débitmètres, les limnimètres et les ouvrages de répartition d'eau.","detail3":"Types d'ouvrages de gestion :\n1. Ouvrage de répartition (Division Structure) : distribution de l'eau vers plusieurs canaux\n2. Ouvrage de chute (Drop Structure) : prévention de l'érosion dans les sections à forte pente des canaux\n3. Siphon inversé et aqueduc : ouvrages passant sous ou au-dessus d'obstacles (routes, rivières)\n4. Installations de mesure (débitmètres) : déversoirs triangulaires, déversoirs rectangulaires, débitmètres électromagnétiques, etc.\n5. Installations de déssablage : bassins de décantation et vannes de chasse pour éliminer le sable et la boue captés\n\nImportance des ouvrages de gestion :\nLorsque les ouvrages de gestion ne fonctionnent pas correctement, la répartition et le contrôle appropriés de l'eau deviennent impossibles :\n• Les agriculteurs en amont prélèvent excessivement, l'eau n'atteint pas les agriculteurs en aval\n• Augmentation du risque de rupture et d'érosion des canaux\n• Augmentation des pertes d'eau\n\nDéfis en Afrique :\nDe nombreux ouvrages présentent des vannes et des portes d'eau qui ne fonctionnent pas correctement en raison de la vétusté, de défauts de conception et d'un manque de gestion. Les problèmes incluent la corrosion et le vol des vannes métalliques, les fissures dans le béton, etc. Le choix approprié des matériaux et les inspections périodiques sont essentiels.","caption3":"","images":[]},{"rowNum":66,"id":"065","catCode":"CAT04","nameJa":"取水施設","readingJa":"しゅすいしせつ","summaryJa":"河川・ダム・井戸・ため池などの水源から農業用水を取り込み、用水路・管路へ導くための構造物・設備です。固定堰・可動堰・ポンプ場・井戸頭工などが含まれます。","detailJa":"取水施設の種類：\n1. 固定堰（固定ダム）：コンクリートの固定堰で河川水位を上げ、重力で取水\n2. 可動堰（フラッシュボード・ゲート付き）：水位調節が可能な堰\n3. ポンプ取水施設：河川・ため池からポンプで揚水して用水路へ送る\n4. 地下水取水施設：掘削井・管井戸から揚水\n5. ため池・貯水池取水施設：貯水池の底水門から放流して取水\n\n取水設計の基本要素：\n・設計取水流量：計画用水量のピーク時に対応できる容量\n・洪水時の安全：洪水時に施設が被害を受けない設計\n・土砂・ゴミの流入防止：除塵設備・沈砂池の設置\n\nアフリカの取水施設の課題：\n多くのアフリカの小規模灌漑では、河川をせき止める簡易堰（土嚢・石積み・木製）が取水施設として使われており、毎年の洪水で破壊→再建が繰り返されています。恒久的コンクリート頭首工への整備が生産安定化の重要な投資です。","nameEn":"Water intake facility","summaryEn":"These are structures and facilities for taking in agricultural water from water sources such as rivers, dams, wells, and reservoirs, and directing it to irrigation channels and pipelines. They include fixed weirs, movable weirs, pumping stations, and wellhead works.","detailEn":"Types of Water Intake Facilities:\n1. Fixed weir (fixed dam): Raises river water level with concrete fixed weir and draws water by gravity\n2. Movable weir (with flashboards and gates): Weir capable of water level adjustment\n3. Pump intake facility: Pumps water from rivers and reservoirs to convey to irrigation channels\n4. Groundwater intake facility: Pumps water from excavated wells and tube wells\n5. Reservoir/pond intake facility: Draws water by releasing from bottom outlets of reservoirs\n\nBasic Elements of Intake Design:\n• Design intake discharge: Capacity to handle peak planned water demand\n• Flood safety: Design to prevent facility damage during floods\n• Prevention of sediment and debris inflow: Installation of trash racks and settling basins\n\nChallenges of Water Intake Facilities in Africa:\nIn many small-scale irrigation systems in Africa, simple weirs (sandbags, stone masonry, wooden structures) that block rivers are used as water intake facilities, and the cycle of destruction by annual floods followed by reconstruction is repeated. Development of permanent concrete headworks is an important investment for stabilizing production.","image":"","captionJa":"","captionEn":"","published":"","name3":"Installation de captage d'eau","summary3":"Il s'agit de structures et d'équipements destinés à capter l'eau agricole depuis des sources d'eau telles que les rivières, barrages, puits et étangs de retenue, et à l'acheminer vers les canaux d'irrigation et les conduites. Cela comprend les déversoirs fixes, les déversoirs mobiles, les stations de pompage et les ouvrages de tête de puits.","detail3":"Types d'ouvrages de prise d'eau :\n1. Seuil fixe (barrage fixe) : Seuil fixe en béton qui élève le niveau d'eau de la rivière et permet la prise d'eau par gravité\n2. Seuil mobile (avec batardeaux et vannes) : Seuil permettant la régulation du niveau d'eau\n3. Installation de prise d'eau par pompage : Pompage de l'eau depuis les rivières et étangs pour l'envoyer vers les canaux d'irrigation\n4. Installation de prise d'eau souterraine : Pompage depuis des puits forés et des puits tubés\n5. Installation de prise d'eau d'étang et de réservoir : Prise d'eau par évacuation depuis les vannes de fond du réservoir\n\nÉléments de base de la conception de prise d'eau :\n・Débit de conception de prise d'eau : Capacité pouvant répondre aux heures de pointe de la demande en eau planifiée\n・Sécurité en période de crue : Conception empêchant les dommages aux installations lors des crues\n・Prévention de l'infiltration de sédiments et de débris : Installation d'équipements de dégrillage et de bassins de dessablage\n\nDéfis des installations de prise d'eau en Afrique :\nDans de nombreux systèmes d'irrigation à petite échelle en Afrique, des seuils rudimentaires (sacs de sable, enrochements, structures en bois) barrant les rivières sont utilisés comme installations de prise d'eau, subissant un cycle annuel de destruction par les crues puis de reconstruction. L'aménagement d'ouvrages de tête permanents en béton constitue un investissement important pour la stabilisation de la production.","caption3":"","images":[]},{"rowNum":67,"id":"066","catCode":"CAT04","nameJa":"調整構造物","readingJa":"ちょうせいこうぞうぶつ","summaryJa":"用水路内の流量・水位・流速を調整・制御するために設置される構造物の総称です。水を適切な量と速さで配分し、水路の損傷を防ぐ機能を持ちます。","detailJa":"調整構造物の種類と機能：\n1. 水門（Sluice gate）：スライドゲートで水を止める・開ける\n2. チェックゲート（水位調節堰）：水路内水位を一定に保つ\n3. バイパス（余水吐）：水路容量を超えた余剰水を安全に放流\n4. 落差工（Chute/Drop）：水路の急勾配箇所でエネルギーを消散させ侵食を防ぐ\n5. 消力工：落差工の下流で乱流を抑制するコンクリート構造物\n6. スピルウェイ：ダム・貯水池の余水を安全に放流\n\n調整構造物の材料：\n・コンクリート（最も一般的）、鉄筋コンクリート\n・金属製ゲート（腐食対策が必要）\n・木製（低コストだが耐久性低く短期補修が必要）\n\nアフリカの課題：\n老朽化した金属製水門の腐食・変形による機能不全が多く、コンクリート製または繊維強化プラスチック（FRP）製への更新が課題です。金属部品の盗難も問題となっています。","nameEn":"Regulation structures","summaryEn":"This is a general term for structures installed to adjust and control the flow rate, water level, and flow velocity within irrigation channels. They have the function of distributing water at appropriate quantities and speeds while preventing damage to the waterways.","detailEn":"Types and Functions of Control Structures:\n1. Sluice gate: Stops and opens water flow using slide gates\n2. Check gate (water level control weir): Maintains constant water level in channels\n3. Bypass (spillway): Safely discharges surplus water exceeding channel capacity\n4. Drop structure (Chute/Drop): Dissipates energy and prevents erosion at steep channel sections\n5. Energy dissipator: Concrete structure that suppresses turbulent flow downstream of drop structures\n6. Spillway: Safely discharges excess water from dams and reservoirs\n\nMaterials for Control Structures:\n・Concrete (most common), reinforced concrete\n・Metal gates (require corrosion protection)\n・Wood (low cost but low durability requiring frequent repairs)\n\nChallenges in Africa:\nFunctional failure due to corrosion and deformation of aging metal sluice gates is common, and replacement with concrete or fiber-reinforced plastic (FRP) structures is a challenge. Theft of metal components is also a problem.","image":"","captionJa":"","captionEn":"","published":"","name3":"Ouvrages de régulation","summary3":"Il s'agit d'un terme générique désignant les ouvrages installés pour ajuster et contrôler le débit, le niveau d'eau et la vitesse d'écoulement dans les canaux d'irrigation. Ces structures ont pour fonction de répartir l'eau en quantité et vitesse appropriées et de prévenir les dommages aux canaux.","detail3":"Types et fonctions des ouvrages de régulation :\n1. Vanne de prise (Sluice gate) : arrêter/ouvrir l'eau par vanne à glissière\n2. Vanne de contrôle (déversoir de régulation du niveau d'eau) : maintenir constant le niveau d'eau dans le canal\n3. Dérivation (évacuateur de crues) : évacuer en sécurité l'eau excédentaire dépassant la capacité du canal\n4. Ouvrage de chute (Chute/Drop) : dissiper l'énergie et prévenir l'érosion dans les sections à forte pente du canal\n5. Bassin de dissipation : ouvrage en béton supprimant la turbulence en aval de l'ouvrage de chute\n6. Déversoir : évacuer en sécurité l'eau excédentaire du barrage/réservoir\n\nMatériaux des ouvrages de régulation :\n• Béton (le plus courant), béton armé\n• Vannes métalliques (mesures anticorrosion nécessaires)\n• Bois (faible coût mais faible durabilité nécessitant des réparations fréquentes)\n\nDéfis en Afrique :\nLes dysfonctionnements dus à la corrosion et à la déformation des vannes métalliques vieillissantes sont fréquents, et leur remplacement par des ouvrages en béton ou en plastique renforcé de fibres (PRF) constitue un enjeu. Le vol de pièces métalliques pose également problème.","caption3":"","images":[]},{"rowNum":68,"id":"067","catCode":"CAT04","nameJa":"灌漑システム","readingJa":"かんがいしすてむ","summaryJa":"水源から農地まで水を導き、農作物に必要な水を供給するための一連の施設・設備・管理運営の総体です。取水施設・用水路・配水システム・排水施設・管理施設を含む総合的なインフラです。","detailJa":"灌漑システムの構成要素：\n1. 水源（河川・ダム・地下水・雨水）\n2. 取水施設（頭首工・ポンプ場・井戸）\n3. 用水路システム（幹線→支線→三次水路）\n4. 調整構造物（水門・分水工・落差工）\n5. 圃場灌漑施設（圃場取水口・農家水路）\n6. 排水システム（圃場排水路→幹線排水路→放流先）\n7. 管理施設（量水設備・通信設備・管理事務所）\n\n灌漑システムの規模分類：\n・小規模：100ha未満（農家個人・小グループ）\n・中規模：100〜1,000ha（農家組合主導）\n・大規模：1,000ha以上（国営または大型企業農場）\n\n灌漑システムの評価指標：\n・水利用効率（全体効率）\n・作付け率（整備面積に対する実作付け面積）\n・収量・収入（農家レベルの成果）\n・施設稼働率（設計能力に対する実際の機能状態）\n\nアフリカの灌漑システムの現状：\nFAO（2022）によると、アフリカのポテンシャル灌漑可能面積（約2億ha）のうち、実際に灌漑されているのは約1,400万ha（約7%）にすぎません。しかもその多くで施設が老朽化・機能不全の状態です。","nameEn":"Irrigation System","summaryEn":"It is the totality of a series of facilities, equipment, and management operations for conveying water from water sources to agricultural land and supplying the necessary water to crops. It is a comprehensive infrastructure that includes water intake facilities, irrigation channels, water distribution systems, drainage facilities, and management facilities.","detailEn":"Components of Irrigation Systems:\n1. Water sources (rivers, dams, groundwater, rainwater)\n2. Water intake facilities (weirs, pump stations, wells)\n3. Canal system (main canals → secondary canals → tertiary canals)\n4. Control structures (gates, distributors, drop structures)\n5. On-farm irrigation facilities (field inlets, farm channels)\n6. Drainage system (field drains → main drains → discharge points)\n7. Management facilities (flow measurement equipment, communication equipment, management offices)\n\nClassification of Irrigation System Scale:\n• Small-scale: Less than 100ha (individual farmers/small groups)\n• Medium-scale: 100-1,000ha (farmer association-led)\n• Large-scale: Over 1,000ha (government-operated or large commercial farms)\n\nEvaluation Indicators for Irrigation Systems:\n• Water use efficiency (overall efficiency)\n• Cropping intensity (actual cropped area relative to equipped area)\n• Yield and income (farm-level outcomes)\n• Facility operation rate (actual functional status relative to design capacity)\n\nCurrent Status of Irrigation Systems in Africa:\nAccording to FAO (2022), only about 14 million hectares (approximately 7%) of Africa's potential irrigable area (approximately 200 million hectares) is actually under irrigation. Moreover, many of these systems suffer from aging infrastructure and functional deterioration.","image":"","captionJa":"","captionEn":"","published":"","name3":"Système d'irrigation","summary3":"C'est un ensemble global d'installations, d'équipements et de gestion opérationnelle destiné à acheminer l'eau depuis les sources d'eau jusqu'aux terres agricoles et à fournir l'eau nécessaire aux cultures. Il s'agit d'une infrastructure intégrée comprenant les installations de captage d'eau, les canaux d'irrigation, les systèmes de distribution d'eau, les installations de drainage et les installations de gestion.","detail3":"Composants du système d'irrigation :\n1. Sources d'eau (rivières, barrages, eaux souterraines, eaux pluviales)\n2. Installations de captage (ouvrages de prise, stations de pompage, puits)\n3. Système de canaux d'irrigation (canaux principaux → canaux secondaires → canaux tertiaires)\n4. Ouvrages de régulation (vannes, ouvrages de répartition, ouvrages de chute)\n5. Installations d'irrigation parcellaire (prises d'eau parcellaires, canaux agricoles)\n6. Système de drainage (canaux de drainage parcellaires → canaux de drainage principaux → exutoire)\n7. Installations de gestion (équipements de mesure des débits, équipements de communication, bureaux de gestion)\n\nClassification des systèmes d'irrigation par échelle :\n• Petite échelle : moins de 100 ha (agriculteurs individuels, petits groupes)\n• Échelle moyenne : 100 à 1 000 ha (dirigé par des associations d'agriculteurs)\n• Grande échelle : plus de 1 000 ha (exploitations nationales ou grandes entreprises agricoles)\n\nIndicateurs d'évaluation des systèmes d'irrigation :\n• Efficience d'utilisation de l'eau (efficience globale)\n• Taux de mise en culture (superficie réellement cultivée par rapport à la superficie aménagée)\n• Rendement et revenus (résultats au niveau des exploitations agricoles)\n• Taux de fonctionnement des installations (état de fonctionnement réel par rapport à la capacité de conception)\n\nÉtat actuel des systèmes d'irrigation en Afrique :\nSelon la FAO (2022), sur la superficie potentiellement irrigable en Afrique (environ 200 millions d'hectares), seulement environ 14 millions d'hectares (environ 7 %) sont effectivement irrigués. De plus, la plupart de ces installations sont dans un état de vétusté et de dysfonctionnement.","caption3":"","images":[]},{"rowNum":69,"id":"068","catCode":"CAT04","nameJa":"用水路システム","readingJa":"ようすいろしすてむ","summaryJa":"取水施設から受け取った灌漑用水を農地に配分するための、幹線・支線・三次水路等の水路網全体を指します。灌漑システムの中核的なインフラです。","detailJa":"用水路システムの階層構造：\n幹線水路（Main Canal）\n　↓ 分水工\n支線水路（Branch Canal）\n　↓ 分水工\n三次水路（Tertiary Canal）\n　↓ 圃場取水口\n農家圃場\n\n各段階の管理分担（参加型管理の場合）：\n・幹線・支線：政府機関または灌漑管理委員会が管理\n・三次水路以下：水利用者組合（WUA）が管理\n・農家水路・圃場：農家個人が管理\n\n設計原則：\n・各分岐点（分水工）での流量比例分配\n・水路の勾配は自然流下に必要な最小傾斜を確保\n・施設のシンプルさ：複雑な機械設備は維持管理能力の低い地域では避ける\n\nアフリカの用水路システムの課題：\n末端水路（三次水路〜農家水路）の整備が不完全な「ラストマイル問題」により、幹線が整備されていても圃場に水が届かないケースが多いです。三次水路の整備・補修が灌漑機能の実質的向上に直結します。","nameEn":"Irrigation canal system","summaryEn":"This refers to the entire network of waterways, including main canals, branch canals, tertiary canals, and other channels, used to distribute irrigation water received from intake facilities to agricultural land. It is the core infrastructure of the irrigation system.","detailEn":"Hierarchical Structure of Irrigation Canal System:\nMain Canal\n　↓ Diversion Structure\nBranch Canal\n　↓ Diversion Structure\nTertiary Canal\n　↓ Farm Intake\nFarm Field\n\nManagement Responsibilities at Each Level (in case of participatory management):\n・Main and Branch Canals: Managed by government agencies or irrigation management committees\n・Tertiary canals and below: Managed by Water Users' Associations (WUA)\n・Farm canals and fields: Managed by individual farmers\n\nDesign Principles:\n・Proportional flow distribution at each branching point (diversion structure)\n・Canal gradient ensures minimum slope necessary for gravity flow\n・Simplicity of facilities: Complex mechanical equipment should be avoided in areas with low maintenance capacity\n\nChallenges of Irrigation Canal Systems in Africa:\nDue to the \"last mile problem\" where terminal canals (tertiary canals to farm canals) are incompletely developed, there are many cases where water does not reach the fields even though main canals are constructed. The development and repair of tertiary canals directly leads to substantial improvement of irrigation functions.","image":"","captionJa":"","captionEn":"","published":"","name3":"Système de canaux d'irrigation","summary3":"Il s'agit de l'ensemble du réseau de canaux comprenant les canaux principaux, les canaux secondaires, les canaux tertiaires, etc., destinés à distribuer l'eau d'irrigation reçue des installations de captage vers les terres agricoles. Il constitue l'infrastructure centrale du système d'irrigation.","detail3":"Structure hiérarchique du système de canaux d'irrigation :\nCanal principal (Main Canal)\n　↓ Ouvrage de prise d'eau\nCanal secondaire (Branch Canal)\n　↓ Ouvrage de prise d'eau\nCanal tertiaire (Tertiary Canal)\n　↓ Prise d'eau parcellaire\nParcelles agricoles\n\nRépartition de la gestion à chaque niveau (dans le cas de la gestion participative) :\n・Canaux principal et secondaire : gérés par les organismes gouvernementaux ou le comité de gestion de l'irrigation\n・Canal tertiaire et en aval : gérés par l'association des usagers de l'eau (WUA)\n・Canaux agricoles et parcelles : gérés individuellement par les agriculteurs\n\nPrincipes de conception :\n・Distribution proportionnelle du débit à chaque point de bifurcation (ouvrage de prise d'eau)\n・La pente des canaux assure l'inclinaison minimale nécessaire à l'écoulement gravitaire\n・Simplicité des installations : éviter les équipements mécaniques complexes dans les régions aux capacités de maintenance limitées\n\nDéfis des systèmes de canaux d'irrigation en Afrique :\nEn raison du « problème du dernier kilomètre » où l'aménagement des canaux terminaux (du canal tertiaire aux canaux agricoles) est incomplet, il existe de nombreux cas où l'eau n'atteint pas les parcelles malgré l'aménagement du canal principal. L'aménagement et la réparation des canaux tertiaires sont directement liés à l'amélioration substantielle de la fonction d'irrigation.","caption3":"","images":[]},{"rowNum":70,"id":"069","catCode":"CAT04","nameJa":"管路網","readingJa":"かんろもう","summaryJa":"開水路ではなく、閉鎖した管（パイプ）で構成された灌漑用水の輸送・配分ネットワークです。漏水・蒸発損失がなく、加圧によって高所への配水も可能です。","detailJa":"管路網の特徴と種類：\n1. 重力加圧式：高台の水源・貯水池の水位差を利用して自然流下\n2. ポンプ加圧式：電動・ソーラーポンプで圧力をかけて配水\n3. 組み合わせ式：重力と加圧の組み合わせ\n\n使用される管の種類：\n・HDPE管（高密度ポリエチレン）：軽量・耐食性・接合が容易（最も普及）\n・PVC管：低コスト（直射日光による劣化に注意）\n・鋳鉄・鋼管：高圧・大口径用\n・石綿セメント管（旧型）：現在は新規使用禁止（健康被害）\n\n管路網の長所：\n・蒸発・漏水損失がほぼゼロ（効率95〜99%）\n・土地利用の制約なし（道路下・農地下を通過可能）\n・水量の精密な制御が可能（メーター・バルブ）\n\n短所：\n・初期建設コストが開水路より高い\n・目詰まり・腐食・破裂等のトラブルへの対応が必要\n・加圧式はエネルギーコストが発生\n\nアフリカでの普及：\nスプリンクラー・点滴灌漑の普及に伴い管路網の需要が増加。HDPEパイプの輸入コスト低下が普及を後押ししています。","nameEn":"Pipeline network","summaryEn":"This is a transportation and distribution network for irrigation water consisting of closed pipes rather than open channels. There are no seepage or evaporation losses, and water distribution to elevated areas is possible through pressurization.","detailEn":"Characteristics and Types of Pipeline Networks:\n1. Gravity-fed system: Utilizes natural flow using water level difference from elevated water sources and reservoirs\n2. Pump-pressurized system: Applies pressure using electric or solar pumps for water distribution\n3. Combined system: Combination of gravity and pressurized systems\n\nTypes of Pipes Used:\n・HDPE pipes (High-Density Polyethylene): Lightweight, corrosion-resistant, easy to join (most widely used)\n・PVC pipes: Low cost (attention required for deterioration due to direct sunlight)\n・Cast iron and steel pipes: For high pressure and large diameter applications\n・Asbestos cement pipes (obsolete type): Currently prohibited for new installations (health hazards)\n\nAdvantages of Pipeline Networks:\n・Nearly zero evaporation and leakage losses (efficiency 95-99%)\n・No land use constraints (can pass under roads and farmland)\n・Precise water flow control possible (meters and valves)\n\nDisadvantages:\n・Higher initial construction costs compared to open channels\n・Need to address troubles such as clogging, corrosion, and ruptures\n・Pressurized systems incur energy costs\n\nExpansion in Africa:\nWith the spread of sprinkler and drip irrigation systems, demand for pipeline networks is increasing. The declining import costs of HDPE pipes are supporting this expansion.","image":"","captionJa":"","captionEn":"","published":"","name3":"Réseau de canalisations","summary3":"Il s'agit d'un réseau de transport et de distribution d'eau d'irrigation composé de conduites fermées (tuyaux) plutôt que de canaux à ciel ouvert. Il n'y a pas de pertes par fuites ou évaporation, et la distribution vers les zones élevées est possible grâce à la mise sous pression.","detail3":"Caractéristiques et types de réseaux de canalisations :\n1. Système gravitaire sous pression : écoulement naturel utilisant la différence de niveau d'eau entre la source d'eau et le réservoir situés en hauteur\n2. Système de pressurisation par pompe : distribution d'eau sous pression par pompes électriques ou solaires\n3. Système combiné : combinaison de la gravité et de la pressurisation\n\nTypes de canalisations utilisées :\n• Tubes PEHD (polyéthylène haute densité) : légers, résistants à la corrosion, assemblage facile (les plus répandus)\n• Tubes PVC : faible coût (attention à la dégradation due aux rayons directs du soleil)\n• Fonte et tubes en acier : pour haute pression et gros diamètres\n• Tubes en ciment-amiante (ancien type) : actuellement interdits pour les nouvelles installations (risques sanitaires)\n\nAvantages des réseaux de canalisations :\n• Pertes par évaporation et fuites pratiquement nulles (efficacité 95-99%)\n• Aucune contrainte d'utilisation du sol (passage possible sous les routes et terres agricoles)\n• Contrôle précis du débit d'eau possible (compteurs et vannes)\n\nInconvénients :\n• Coût de construction initial plus élevé que les canaux à ciel ouvert\n• Nécessité de faire face aux problèmes de colmatage, corrosion, rupture, etc.\n• Les systèmes pressurisés génèrent des coûts énergétiques\n\nExpansion en Afrique :\nAvec la diffusion des systèmes d'arrosage par aspersion et goutte-à-goutte, la demande de réseaux de canalisations augmente. La baisse des coûts d'importation des tubes PEHD favorise cette expansion.","caption3":"","images":[]},{"rowNum":71,"id":"070","catCode":"CAT04","nameJa":"貯水池","readingJa":"ちょすいち","summaryJa":"灌漑・発電・洪水調節等の目的のために水を蓄える人工または自然の水の集積施設です。ダムによって形成されるダム湖から、農村の小規模ため池まで多様な規模があります。","detailJa":"貯水池の種類と機能：\n1. ダム貯水池：大規模。季節調節・複数年調節が可能\n2. 農業用ため池（Farm Pond / Check Dam Reservoir）：小〜中規模。農村の灌漑・家畜用水に利用\n3. 農家個人ため池（Water Harvesting Pond）：農家敷地内の小規模貯水、家庭菜園・家畜向け\n\n貯水池の有効貯水量：\n・有効貯水容量 = 満水容量 − 死水容量（底泥・不使用容量）\n・計画乾季灌漑水量を賄えるだけの有効貯水容量が必要\n\n堆砂（シルテーション）問題：\n流域からの土砂が貯水池に堆積し（シルトアップ）、有効容量が減少していくことが大きな課題です。流域の植生保護・上流の土砂流出対策（等高線耕起・植林）が長期的な貯水池保全の鍵です。\n\nアフリカの小規模ため池（スモールリザーバー）：\nサブサハラアフリカには数十万カ所の小規模ため池（small reservoir）が存在し、農村の農業・家畜・生活用水の基盤となっています。JICAもブルキナファソ・マリ等で小規模ため池の整備を支援しています。","nameEn":"Reservoir","summaryEn":"It is an artificial or natural water storage facility that accumulates water for purposes such as irrigation, power generation, and flood control. There are various scales ranging from dam reservoirs formed by dams to small-scale farm ponds in rural areas.","detailEn":"Types and Functions of Reservoirs:\n1. Dam Reservoir: Large-scale. Capable of seasonal regulation and multi-year regulation\n2. Farm Pond / Check Dam Reservoir: Small to medium-scale. Used for rural irrigation and livestock water supply\n3. Water Harvesting Pond: Small-scale water storage within farmhouse premises for home gardens and livestock\n\nEffective Storage Capacity of Reservoirs:\n・Effective storage capacity = Full capacity − Dead storage capacity (bottom sediment and unusable capacity)\n・Effective storage capacity sufficient to cover planned dry season irrigation water demand is required\n\nSedimentation (Siltation) Problems:\nSediment from the watershed accumulates in reservoirs (silting up), causing a reduction in effective capacity, which is a major challenge. Watershed vegetation protection and upstream sediment runoff control measures (contour plowing and afforestation) are key to long-term reservoir conservation.\n\nSmall Reservoirs in Africa:\nHundreds of thousands of small reservoirs exist in sub-Saharan Africa, serving as the foundation for rural agriculture, livestock, and domestic water supply. JICA also supports the development of small reservoirs in Burkina Faso, Mali, and other countries.","image":"","captionJa":"","captionEn":"","published":"","name3":"réservoir","summary3":"C'est une installation de stockage d'eau artificielle ou naturelle destinée à retenir l'eau à des fins d'irrigation, de production d'électricité, de régulation des crues, etc. Il existe diverses échelles, des lacs de barrage formés par des barrages aux petits bassins de retenue ruraux.","detail3":"Types et fonctions des réservoirs :\n1. Réservoir de barrage : Grande échelle. Régulation saisonnière et pluriannuelle possible\n2. Bassin agricole (Farm Pond / Check Dam Reservoir) : Petite à moyenne échelle. Utilisé pour l'irrigation rurale et l'abreuvement du bétail\n3. Bassin individuel d'exploitation agricole (Water Harvesting Pond) : Stockage d'eau à petite échelle dans l'enceinte de l'exploitation, destiné au jardinage domestique et au bétail\n\nCapacité utile des réservoirs :\n・Capacité utile = Capacité à plein bord − Capacité morte (vase de fond et volume inutilisable)\n・Une capacité utile suffisante pour couvrir le volume d'eau d'irrigation prévu en saison sèche est nécessaire\n\nProblème d'envasement (sédimentation) :\nL'accumulation de sédiments provenant du bassin versant dans le réservoir (envasement) et la diminution consécutive de la capacité utile constituent un défi majeur. La protection de la végétation du bassin versant et les mesures de contrôle de l'érosion en amont (labour en courbes de niveau, reboisement) sont la clé de la conservation à long terme des réservoirs.\n\nPetits bassins d'Afrique (petits réservoirs) :\nL'Afrique subsaharienne compte plusieurs centaines de milliers de petits bassins (small reservoir) qui constituent la base de l'approvisionnement en eau agricole, d'abreuvement du bétail et domestique en milieu rural. La JICA soutient également l'aménagement de petits bassins au Burkina Faso, au Mali et dans d'autres pays.","caption3":"","images":[]},{"rowNum":72,"id":"071","catCode":"CAT04","nameJa":"堰","readingJa":"せき","summaryJa":"河川・用水路を横断して設けられた構造物で、水位を上昇させて取水・水位調節を行うための施設です。完全に流れを止めるダムと異なり、余水は越流・放流されます。","detailJa":"堰の種類：\n1. 固定堰（コンクリート越流堰）：高さが固定。安定しているが流量調節が不可\n2. 可動堰（ゲート付き）：ゲートの開閉で水位・流量を調節可能\n3. ラバーダム（ゴム堰）：ゴム製袋に水・空気を注入して膨らませる可動式。低コスト・軽量\n4. 取水堰（頭首工）：河川水位を上げて重力で用水路に取水する施設\n\n設計上の重要点：\n・洪水時の安全性：設計洪水を安全に越流・放流できる余水吐の確保\n・土砂管理：堆砂対策（スルースゲートによるフラッシング）\n・魚道設置：生態系保全への配慮（国際基準では魚道設置が求められることが増加）\n・基礎処理：河床侵食（洗掘）を防ぐための根固め工\n\nアフリカの小規模取水堰：\n多くのアフリカの農村では、簡易な石積み・土嚢・木材の堰が洪水のたびに流される問題があります。恒久的コンクリート固定堰への整備が農業水利の安定化に直結します。","nameEn":"Weir","summaryEn":"This is a structure built across rivers and irrigation channels to raise water levels for water intake and water level regulation. Unlike dams that completely block the flow, excess water overflows or is discharged through the weir.","detailEn":"Types of Weirs:\n1. Fixed weir (concrete overflow weir): Fixed height. Stable but unable to regulate flow rate\n2. Movable weir (with gates): Can regulate water level and flow rate through gate operation\n3. Rubber dam (rubber weir): Inflatable type using water or air injection into rubber bags. Low cost and lightweight\n4. Diversion weir (intake headworks): Facility that raises river water level for gravity-fed water intake into irrigation channels\n\nImportant Design Considerations:\n• Flood safety: Ensuring spillways that can safely overflow and discharge design floods\n• Sediment management: Sedimentation countermeasures (flushing through sluice gates)\n• Fish ladder installation: Consideration for ecosystem conservation (international standards increasingly require fish ladder installation)\n• Foundation treatment: Bed protection works to prevent riverbed erosion (scouring)\n\nSmall-scale Diversion Weirs in Africa:\nIn many African rural areas, there is a problem of simple stone, sandbag, and timber weirs being washed away by floods. Development of permanent concrete fixed weirs directly contributes to stabilizing agricultural water management.","image":"","captionJa":"","captionEn":"","published":"","name3":"Barrage","summary3":"Structure établie en travers des rivières et canaux d'irrigation, cette installation sert à élever le niveau d'eau pour effectuer la prise d'eau et la régulation du niveau d'eau. Contrairement aux barrages qui arrêtent complètement l'écoulement, les eaux excédentaires sont évacuées par déversement et évacuation.","detail3":"Types de barrages :\n1. Barrage fixe (déversoir en béton) : hauteur fixe. Stable mais impossible de réguler le débit\n2. Barrage mobile (avec vannes) : possibilité de régler le niveau d'eau et le débit par ouverture/fermeture des vannes\n3. Barrage gonflable (barrage en caoutchouc) : type mobile gonflé par injection d'eau ou d'air dans un sac en caoutchouc. Faible coût et léger\n4. Barrage de prise d'eau (ouvrage de tête) : installation qui élève le niveau d'eau de la rivière pour capter l'eau par gravité vers les canaux d'irrigation\n\nPoints importants de conception :\n・Sécurité en cas de crue : assurer un évacuateur de crues permettant le déversement et l'évacuation sécurisés de la crue de projet\n・Gestion des sédiments : mesures anti-envasement (chasse par vannes de fond)\n・Installation de passes à poissons : considération pour la préservation de l'écosystème (les normes internationales exigent de plus en plus l'installation de passes à poissons)\n・Traitement des fondations : protection du lit par enrochements pour prévenir l'érosion du fond (affouillement)\n\nPetits barrages de prise d'eau en Afrique :\nDans de nombreux villages africains, il existe un problème de barrages rudimentaires en pierres empilées, sacs de sable et bois qui sont emportés à chaque crue. L'aménagement en barrages fixes permanents en béton est directement lié à la stabilisation de l'irrigation agricole.","caption3":"","images":[]},{"rowNum":73,"id":"072","catCode":"CAT04","nameJa":"ポンプ場","readingJa":"ぽんぷじょう","summaryJa":"ポンプ・電動機・配管・制御装置等を集約した施設で、水を揚水・加圧・送水するために設置された建屋・設備一式を指します。動力源の確保と設備の維持管理が運営の鍵です。","detailJa":"ポンプ場の構成：\n・ポンプ本体（遠心ポンプ・軸流ポンプ等）\n・電動機（または内燃機関）\n・吸水管・吐出管・逆止弁\n・フィルター・除塵設備\n・制御盤（自動・手動）\n・発電機（停電バックアップ）\n・建屋（ポンプハウス）\n\nポンプ場の種類：\n1. 固定式ポンプ場：コンクリート基礎に固定設置。大規模・恒久施設\n2. 移動式ポンプ：エンジン付きポンプをトラクター・台車で移動。小規模農家向け\n3. ソーラーポンプ場：太陽光パネル＋インバーター＋ポンプ。電力インフラ不要\n\nエネルギーコストの管理：\nポンプ場の運営コストの大部分はエネルギー費（電力・燃料）です。ポンプ効率（設計効率に対する実際の効率）の管理と、オフピーク時間帯の稼働によるコスト削減が重要です。\n\nアフリカでのソーラーポンプ普及：\n2010年以降ソーラーパネルコストが1/10以下に低下し、サブサハラアフリカでソーラーポンプ場の普及が急速に進んでいます。ケニア・エチオピア・マリなどで数万台規模の導入実績があります。","nameEn":"Pumping station","summaryEn":"A facility that integrates pumps, electric motors, piping, control devices, and other components, referring to a complete set of buildings and equipment installed for water lifting, pressurization, and transmission. Securing power sources and maintaining equipment are key to operations.","detailEn":"Pump Station Configuration:\n- Pump main body (centrifugal pump, axial flow pump, etc.)\n- Electric motor (or internal combustion engine)\n- Suction pipe, discharge pipe, check valve\n- Filter and debris removal equipment\n- Control panel (automatic/manual)\n- Generator (power outage backup)\n- Building (pump house)\n\nTypes of Pump Stations:\n1. Fixed pump station: Permanently installed on concrete foundation. Large-scale, permanent facility\n2. Mobile pump: Engine-driven pump moved by tractor or cart. For small-scale farmers\n3. Solar pump station: Solar panel + inverter + pump. No power infrastructure required\n\nEnergy Cost Management:\nThe majority of pump station operating costs are energy expenses (electricity and fuel). Management of pump efficiency (actual efficiency relative to design efficiency) and cost reduction through operation during off-peak hours are important.\n\nSolar Pump Proliferation in Africa:\nSince 2010, solar panel costs have decreased to less than 1/10, and solar pump stations are rapidly proliferating in Sub-Saharan Africa. There are installation records of tens of thousands of units in countries such as Kenya, Ethiopia, and Mali.","image":"","captionJa":"","captionEn":"","published":"","name3":"Station de pompage","summary3":"Installation qui regroupe pompes, moteurs électriques, canalisations, dispositifs de commande, etc., désignant l'ensemble du bâtiment et des équipements installés pour le pompage, la mise sous pression et l'adduction d'eau. L'approvisionnement en énergie motrice et la maintenance des équipements constituent les clés de l'exploitation.","detail3":"Configuration de la station de pompage :\n• Corps de pompe (pompe centrifuge, pompe axiale, etc.)\n• Moteur électrique (ou moteur à combustion interne)\n• Conduite d'aspiration, conduite de refoulement, clapet anti-retour\n• Filtre, équipement de dégrillage\n• Armoire de commande (automatique/manuelle)\n• Groupe électrogène (secours en cas de panne de courant)\n• Bâtiment (station de pompage)\n\nTypes de stations de pompage :\n1. Station de pompage fixe : Installation fixe sur fondation en béton. Installation permanente de grande envergure\n2. Pompe mobile : Pompe avec moteur déplacée par tracteur ou chariot. Destinée aux petits exploitants agricoles\n3. Station de pompage solaire : Panneau solaire + onduleur + pompe. Aucune infrastructure électrique requise\n\nGestion des coûts énergétiques :\nLa majeure partie des coûts d'exploitation d'une station de pompage correspond aux frais énergétiques (électricité/carburant). La gestion du rendement de pompe (rendement réel par rapport au rendement de conception) et la réduction des coûts par fonctionnement pendant les heures creuses sont importantes.\n\nDiffusion des pompes solaires en Afrique :\nDepuis 2010, le coût des panneaux solaires a chuté de plus de 1/10, et la diffusion des stations de pompage solaires progresse rapidement en Afrique subsaharienne. Des résultats d'introduction à l'échelle de dizaines de milliers d'unités sont observés au Kenya, en Éthiopie, au Mali, etc.","caption3":"","images":[]},{"rowNum":74,"id":"073","catCode":"CAT04","nameJa":"配水システム","readingJa":"はいすいしすてむ","summaryJa":"灌漑水を農地・各農家圃場に公平・効率的・安定的に配分するための施設・手順・管理方法の総体です。用水路システムの末端部を含む、農家の手元に水を届けるための仕組み全体を指します。","detailJa":"配水システムの種類：\n1. 連続配水（Continuous flow）：常時一定流量を流す。簡単だが農家の需要変動に対応しにくい\n2. ローテーション配水（Rotational distribution）：農家・地区ごとに順番に送水する輪番制。最も普及\n3. オンデマンド配水（Demand-based）：農家の要求に応じていつでも取水できる。管理コストが高い\n\n配水の公平性指標：\n・相対給水量（Relative water supply, RWS）：灌漑必要水量に対する実際の給水量の比\n・圃場水位変動係数（Coefficient of Variation, CV）：農家間の受水量の均一性\n\n配水管理の改善技術：\n・遠隔水位・流量監視（IoTセンサー）\n・GISを活用した水配分マップ\n・スマートフォンを使った水管理アプリ\n\nアフリカでの課題：\nアフリカの多くのスキームで「上流優遇・下流農家への水不足」が慢性化しています。配水システムの透明化・ICT活用・農家の監視参加により公平性を向上させる取り組みが進んでいます。","nameEn":"Water Distribution System","summaryEn":"It is the totality of facilities, procedures, and management methods for distributing irrigation water fairly, efficiently, and stably to farmland and individual farm fields. It refers to the entire system for delivering water to farmers, including the terminal sections of the irrigation canal system.","detailEn":"Types of water distribution systems:\n1. Continuous flow: Maintains constant flow rate at all times. Simple but difficult to respond to fluctuating farmer demand\n2. Rotational distribution: A rotation system that supplies water to farmers and districts in turn. Most widely adopted\n3. Demand-based: Allows farmers to draw water anytime according to their requirements. High management costs\n\nWater distribution equity indicators:\n・Relative water supply (RWS): Ratio of actual water supply to irrigation water requirement\n・Coefficient of Variation (CV): Uniformity of water received among farmers\n\nWater distribution management improvement technologies:\n・Remote water level and flow monitoring (IoT sensors)\n・GIS-based water allocation mapping\n・Smartphone-based water management applications\n\nChallenges in Africa:\nMany schemes in Africa face chronic \"upstream favoritism and water shortage for downstream farmers.\" Efforts are underway to improve equity through transparency of distribution systems, ICT utilization, and farmer participation in monitoring.","image":"","captionJa":"","captionEn":"","published":"","name3":"Système de distribution d'eau","summary3":"Il s'agit de l'ensemble des installations, procédures et méthodes de gestion destinées à répartir l'eau d'irrigation de manière équitable, efficace et stable vers les terres agricoles et les parcelles de chaque exploitation. Cela désigne l'ensemble du système permettant d'acheminer l'eau jusqu'aux agriculteurs, y compris les parties terminales du réseau de canaux d'irrigation.","detail3":"Types de systèmes de distribution d'eau :\n1. Distribution continue (Continuous flow) : maintient un débit constant en permanence. Simple mais difficile de répondre aux variations de demande des agriculteurs\n2. Distribution par rotation (Rotational distribution) : système de tour de rôle envoyant l'eau aux agriculteurs et districts successivement. Le plus répandu\n3. Distribution à la demande (Demand-based) : permet aux agriculteurs de puiser l'eau à tout moment selon leurs besoins. Coûts de gestion élevés\n\nIndicateurs d'équité de distribution :\n• Approvisionnement relatif en eau (Relative water supply, RWS) : ratio entre l'approvisionnement réel et les besoins en eau d'irrigation\n• Coefficient de variation des niveaux d'eau des parcelles (Coefficient of Variation, CV) : uniformité de la réception d'eau entre agriculteurs\n\nTechnologies d'amélioration de la gestion de distribution :\n• Surveillance à distance des niveaux d'eau et débits (capteurs IoT)\n• Cartes de répartition d'eau utilisant les SIG\n• Applications de gestion de l'eau via smartphone\n\nDéfis en Afrique :\nDans de nombreux systèmes en Afrique, le « favoritisme en amont et la pénurie d'eau pour les agriculteurs en aval » est devenu chronique. Des initiatives visant à améliorer l'équité par la transparence des systèmes de distribution, l'utilisation des TIC et la participation des agriculteurs à la surveillance sont en cours.","caption3":"","images":[]},{"rowNum":75,"id":"074","catCode":"CAT04","nameJa":"水門","readingJa":"すいもん","summaryJa":"用水路・水路・ダム・堤防等に設けられた、水の流れを止める・調節する・開放するためのゲート状の構造物です。スライド式・ローリング式・ラジアルゲート等の種類があります。","detailJa":"水門の種類と特徴：\n1. スライドゲート（スルースゲート）：鉄製または鋼鉄製の板を上下にスライドして開閉。最も一般的\n2. ラジアルゲート（テインターゲート）：扇形の回転ゲート。大型ダムの放流ゲートに多用\n3. バタフライバルブ：円盤が回転して開閉する管路用バルブ\n4. ゴム製フラップゲート：水圧差で自動的に開閉する（排水路の潮止めに使用）\n5. 木製水門：低コスト（腐食・変形しやすく耐久性低）\n\n水門の材質：\n・鋼材（Steel）：強度高いが腐食対策が必要（塗装・亜鉛メッキ）\n・ステンレス鋼：耐食性高いがコスト高\n・FRP（繊維強化プラスチック）：軽量・耐食性・近年普及\n・コンクリート：固定構造に使用（可動部には不適）\n\nアフリカでの管理課題：\n金属製水門の腐食・変形・スピンドルの固着により操作不能になるケースが多いです。潤滑剤の定期塗布・さびの除去・塗装の更新が必要ですが、技術者・資材不足が課題となっています。","nameEn":"Floodgate","summaryEn":"These are gate-like structures installed in irrigation channels, waterways, dams, embankments, and other water infrastructure to stop, regulate, or release the flow of water. Types include slide gates, rolling gates, radial gates, and others.","detailEn":"Types and Characteristics of Sluice Gates:\n1. Slide Gate (Sluice Gate): Iron or steel plates that slide up and down to open and close. Most common type\n2. Radial Gate (Tainter Gate): Fan-shaped rotating gate. Widely used for spillway gates in large dams\n3. Butterfly Valve: Disc rotates to open and close in pipeline applications\n4. Rubber Flap Gate: Automatically opens and closes based on water pressure differential (used for tidal barriers in drainage channels)\n5. Wooden Gate: Low cost (prone to corrosion and deformation with low durability)\n\nSluice Gate Materials:\n・Steel: High strength but requires corrosion protection (painting, galvanizing)\n・Stainless Steel: High corrosion resistance but high cost\n・FRP (Fiber Reinforced Plastic): Lightweight, corrosion-resistant, increasingly popular in recent years\n・Concrete: Used for fixed structures (unsuitable for moving parts)\n\nManagement Challenges in Africa:\nMetal sluice gates frequently become inoperable due to corrosion, deformation, and spindle seizure. Regular application of lubricants, rust removal, and paint renewal are necessary, but shortage of technicians and materials remains a challenge.","image":"","captionJa":"","captionEn":"","published":"","name3":"Écluse","summary3":"Il s'agit d'une structure en forme de porte installée dans les canaux d'irrigation, les voies d'eau, les barrages, les digues, etc., destinée à arrêter, réguler ou libérer le débit de l'eau. Il existe différents types tels que les vannes à glissière, les vannes roulantes, les vannes radiales, etc.","detail3":"Types et caractéristiques des vannes :\n1. Vanne à glissière (vanne à guillotine) : ouverture et fermeture par glissement vertical d'une plaque en fer ou en acier. La plus courante\n2. Vanne radiale (vanne secteur) : vanne rotative en forme d'éventail. Largement utilisée pour les vannes d'évacuation des grands barrages\n3. Vanne papillon : vanne de conduite où un disque tourne pour s'ouvrir et se fermer\n4. Vanne à clapet en caoutchouc : s'ouvre et se ferme automatiquement selon la différence de pression hydraulique (utilisée pour l'anti-marée des canaux d'évacuation)\n5. Vanne en bois : faible coût (faible durabilité due à la corrosion et à la déformation)\n\nMatériaux des vannes :\n• Acier : résistance élevée mais nécessite des mesures anticorrosion (peinture, galvanisation)\n• Acier inoxydable : résistance à la corrosion élevée mais coût élevé\n• PRV (plastique renforcé de fibres) : léger, résistant à la corrosion, popularité croissante ces dernières années\n• Béton : utilisé pour les structures fixes (inadapté aux parties mobiles)\n\nDéfis de gestion en Afrique :\nDe nombreux cas de vannes métalliques deviennent inutilisables en raison de la corrosion, de la déformation et du grippage des broches. L'application régulière de lubrifiants, l'élimination de la rouille et le renouvellement de la peinture sont nécessaires, mais le manque de techniciens et de matériaux constitue un défi.","caption3":"","images":[]},{"rowNum":76,"id":"075","catCode":"CAT05","nameJa":"商業農業","readingJa":"しょうぎょうのうぎょう","summaryJa":"市場販売を主目的として行う農業形態です。自家消費ではなく収益獲得を目標とし、投入資材（肥料・農薬・種子）と灌漑水を積極的に利用して生産性と品質を高めます。","detailJa":"商業農業の特徴：\n・市場ニーズ（品種・品質・出荷時期）に合わせた作付け計画\n・高投入・高収量型農業（肥料・農薬・良質種子・灌漑の積極利用）\n・市場情報・価格変動への対応\n・農産物の選別・包装・輸送・保管の重視\n\n商業農業の種類（規模別）：\n・大企業農場：数百ha〜数千ha、企業または政府が経営\n・中規模商業農家：2〜50ha、家族または雇用労働\n・小規模商業農家：0.5〜2ha、乾季野菜等の換金作物栽培\n\n灌漑と商業農業の関係：\n乾季の灌漑栽培は商業農業の中核です。降雨に依存する雨季農業と異なり、灌漑を利用した乾季栽培では：\n・収穫時期が人為的にコントロールでき、需要の高い時期に出荷できる\n・品質が安定し高値で売れる\n・年2〜3作が可能で土地生産性が大幅に向上\n\nアフリカの小規模商業農業の可能性：\nペダルポンプ・小型ソーラーポンプを活用した乾季野菜栽培が、アフリカ農村の貧困削減に大きな効果をあげています（KickStart International等の事例）。都市人口増加に伴う食料需要拡大が市場機会を提供しています。","nameEn":"Commercial agriculture","summaryEn":"This is a form of agriculture conducted primarily for market sales. Rather than for household consumption, it aims for profit generation and actively utilizes input materials (fertilizers, pesticides, seeds) and irrigation water to enhance productivity and quality.","detailEn":"Characteristics of Commercial Agriculture:\n・Cropping plans aligned with market needs (varieties, quality, shipping schedules)\n・High-input, high-yield agriculture (active use of fertilizers, pesticides, quality seeds, and irrigation)\n・Response to market information and price fluctuations\n・Emphasis on sorting, packaging, transportation, and storage of agricultural products\n\nTypes of Commercial Agriculture (by scale):\n・Large corporate farms: hundreds to thousands of hectares, operated by corporations or governments\n・Medium-scale commercial farmers: 2-50 hectares, family or hired labor\n・Small-scale commercial farmers: 0.5-2 hectares, cultivation of cash crops such as dry season vegetables\n\nRelationship between Irrigation and Commercial Agriculture:\nDry season irrigation cultivation is the core of commercial agriculture. Unlike rainy season agriculture that depends on rainfall, dry season cultivation using irrigation allows:\n・Artificial control of harvest timing, enabling shipment during periods of high demand\n・Stable quality that sells at high prices\n・Possibility of 2-3 crops per year with significant improvement in land productivity\n\nPotential of Small-scale Commercial Agriculture in Africa:\nDry season vegetable cultivation utilizing pedal pumps and small solar pumps has shown significant effects in reducing rural poverty in Africa (cases from KickStart International and others). Urban population growth accompanied by expanding food demand provides market opportunities.","image":"","captionJa":"","captionEn":"","published":"","name3":"Agriculture commerciale","summary3":"Il s'agit d'une forme d'agriculture pratiquée principalement dans le but de commercialiser sur le marché. Elle vise l'acquisition de revenus plutôt que l'autoconsommation, et utilise activement les intrants (engrais, pesticides, semences) et l'eau d'irrigation pour améliorer la productivité et la qualité.","detail3":"Caractéristiques de l'agriculture commerciale :\n• Plan de culture adapté aux besoins du marché (variétés, qualité, période d'expédition)\n• Agriculture à forte intensité d'intrants et à haut rendement (utilisation active d'engrais, pesticides, semences de qualité et irrigation)\n• Adaptation aux informations du marché et aux fluctuations des prix\n• Importance accordée au tri, conditionnement, transport et stockage des produits agricoles\n\nTypes d'agriculture commerciale (par échelle) :\n• Grandes exploitations d'entreprise : plusieurs centaines à plusieurs milliers d'hectares, gérées par des entreprises ou le gouvernement\n• Exploitants commerciaux de taille moyenne : 2 à 50 ha, main-d'œuvre familiale ou salariée\n• Petits exploitants commerciaux : 0,5 à 2 ha, culture de plantes commerciales comme les légumes de saison sèche\n\nRelation entre irrigation et agriculture commerciale :\nLa culture irriguée en saison sèche constitue le cœur de l'agriculture commerciale. Contrairement à l'agriculture de saison des pluies dépendante des précipitations, la culture de saison sèche utilisant l'irrigation permet :\n• Un contrôle artificiel de la période de récolte, permettant l'expédition pendant les périodes de forte demande\n• Une qualité stable et des prix de vente élevés\n• 2 à 3 récoltes par an avec une amélioration considérable de la productivité des terres\n\nPotentiel de la petite agriculture commerciale en Afrique :\nLa culture de légumes de saison sèche utilisant des pompes à pédale et de petites pompes solaires produit des effets considérables sur la réduction de la pauvreté dans les zones rurales africaines (exemples de KickStart International et autres). L'expansion de la demande alimentaire accompagnant la croissance de la population urbaine offre des opportunités de marché.","caption3":"","images":[]},{"rowNum":77,"id":"076","catCode":"CAT05","nameJa":"自給農業","readingJa":"じきゅうのうぎょう","summaryJa":"生産した農産物の大部分を自家消費（食料・飼料）に充てる農業形態です。市場への販売は余剰分のみで、収入よりも家族の食料確保を主目的とします。アフリカのほとんどの小農はここから出発しています。","detailJa":"自給農業の特徴：\n・作物選択：主食作物（トウモロコシ・ソルガム・キャッサバ・米）が中心\n・投入資材：低投入（化学肥料・農薬の使用が少ない）\n・技術：伝統的農法・在来知識を活用\n・リスク：食料不安と市場リスクの両方にさらされている\n\n自給農業の限界と課題：\n・農業気象リスク（干ばつ・洪水）に脆弱\n・低生産性：単位面積・単位水量あたりの収量・収入が低い\n・市場からの孤立：価格情報・投入資材・信用へのアクセスが限られる\n\n自給農業から商業農業への移行：\n灌漑の導入は自給農業から商業農業への重要な移行手段です。乾季に余剰水で野菜等の換金作物を栽培し、農家収入を補完する「半商業農業」が多くのアフリカ農村で見られます。\n\n政策的含意：\n自給農業農家への支援では、食料安全保障の確保を最優先としつつ、市場へのつながりを徐々に強化するアプローチが重要です。急激な商業化への移行はリスクを伴う場合があります。","nameEn":"Subsistence agriculture","summaryEn":"This is an agricultural system where the majority of agricultural products produced are used for household consumption (food and feed). Only surplus production is sold to markets, with the primary objective being securing food for the family rather than generating income. Most smallholder farmers in Africa start from this point.","detailEn":"Characteristics of Subsistence Agriculture:\n・Crop selection: Centered on staple crops (maize, sorghum, cassava, rice)\n・Input materials: Low input (limited use of chemical fertilizers and pesticides)\n・Technology: Utilization of traditional farming methods and indigenous knowledge\n・Risk: Exposed to both food insecurity and market risks\n\nLimitations and Challenges of Subsistence Agriculture:\n・Vulnerable to agrometeorological risks (drought and flooding)\n・Low productivity: Low yield and income per unit area and per unit water\n・Isolation from markets: Limited access to price information, input materials, and credit\n\nTransition from Subsistence to Commercial Agriculture:\nThe introduction of irrigation is an important means of transition

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multilingual Glossary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a56db;
      --bg: #f3f4f6;
      --card: #fff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --radius: 10px;
    }
    body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP','Meiryo',sans-serif; font-size: 16px; line-height: 1.6; color: var(--text); background: var(--bg); }

    /* Sticky header wrapper */
    .site-header { position: sticky; top: 0; z-index: 100; }

    /* Header */
    header { background: var(--primary); color: white; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .header-inner { max-width: 720px; margin: 0 auto; }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    .lang-bar { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .lang-btn { padding: 6px 18px; border-radius: 999px; border: 2px solid rgba(255,255,255,0.5); background: transparent; color: white; font-size: 0.9rem; font-weight: 600; cursor: pointer; min-height: 44px; transition: background 0.2s; }
    .lang-btn.active { background: white; color: var(--primary); border-color: white; }
    .lang-btn:hover:not(.active) { background: rgba(255,255,255,0.15); }

    /* Controls bar */
    .controls-bar { background: white; border-bottom: 1px solid var(--border); padding: 8px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .controls-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; align-items: center; }
    .filter-group { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .filter-all-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: white; font-size: 0.9rem; cursor: pointer; min-height: 44px; white-space: nowrap; font-weight: 600; transition: all 0.15s; }
    .filter-all-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .filter-all-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
    #categorySelect { display: inline-block; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: white; font-size: 0.9rem; cursor: pointer; min-height: 44px; min-width: 120px; color: var(--text); }
    #categorySelect:focus { outline: 2px solid var(--primary); outline-offset: 0; }
    .search-box { position: relative; flex: 1; min-width: 0; }
    .search-box input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; min-height: 44px; background: white; }
    .search-box input:focus { border-color: var(--primary); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }

    /* Main */
    main { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; }

    /* Result count */
    .result-count { font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; }

    /* Term list */
    .term-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: white; }

    /* Term item */
    .term-item { border-bottom: 1px solid var(--border); }
    .term-item:last-child { border-bottom: none; }

    /* Term name button */
    .term-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 16px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      min-height: 44px;
      gap: 12px;
      transition: background 0.15s;
    }
    .term-toggle:hover { background: #f9fafb; }
    .term-toggle.open { background: #eff6ff; color: var(--primary); }
    .term-toggle-text { flex: 1; display: flex; flex-direction: column; align-items: flex-start; }
    .term-reading { font-size: 0.8rem; font-weight: 400; color: var(--muted); margin-left: 6px; }
    .term-romaji { font-size: 12px; color: #888; font-weight: 400; }
    .term-arrow { font-size: 0.75rem; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; }
    .term-toggle.open .term-arrow { transform: rotate(180deg); color: var(--primary); }

    /* Summary panel */
    .term-summary-panel { display: none; padding: 0 16px 16px; border-top: 1px solid #dbeafe; background: #f8faff; }
    .term-summary-panel.open { display: block; }
    .term-summary-text { font-size: 0.97rem; line-height: 1.75; color: #374151; padding-top: 14px; }

    /* Detail toggle button */
    .detail-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 10px 18px;
      border: 2px solid var(--primary);
      border-radius: 999px;
      background: white;
      color: var(--primary);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: background 0.15s;
    }
    .detail-toggle:hover { background: #eff6ff; }
    .detail-arrow { font-size: 0.7rem; transition: transform 0.2s; }
    .detail-toggle.open .detail-arrow { transform: rotate(180deg); }

    /* Detail panel */
    .term-detail-panel { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .term-detail-panel.open { display: block; }
    .term-detail-text { font-size: 0.95rem; line-height: 1.8; color: #374151; white-space: pre-wrap; }
    .term-detail-image { width: 100%; border-radius: 8px; margin-top: 16px; display: block; }
    .term-detail-caption { font-size: 0.82rem; color: var(--muted); text-align: center; margin-top: 6px; }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); background: white; border: 1px solid var(--border); border-radius: var(--radius); }
    .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* Images in detail panel */
    .term-images-section { margin-top: 16px; }
    .term-images-title { font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .term-image-item { margin-bottom: 16px; }
    .term-image-item:last-child { margin-bottom: 0; }
    .term-detail-caption { font-size: 14px; color: var(--muted); text-align: center; margin-top: 6px; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.1rem; }
      main { padding: 16px 12px 60px; }
      .term-toggle { padding: 13px 14px; }
      .term-summary-panel { padding: 0 14px 14px; }
    }
  </style>
</head>
<body>

<div class="site-header">
  <header>
    <div class="header-inner">
      <h1>Multilingual Glossary</h1>
      <div class="lang-bar">
        <button class="lang-btn active" onclick="setLang('ja', this)">JPN</button>
        <button class="lang-btn" onclick="setLang('en', this)">ENG</button>
        <button class="lang-btn" onclick="setLang('lang3', this)">NEP</button>
      </div>
    </div>
  </header>
  <div class="controls-bar">
    <div class="controls-inner">
      <div class="filter-group">
        <button class="filter-all-btn active" id="btn-all" onclick="setCat('all')">All</button>
        <select id="categorySelect" onchange="setCatFromSelect(this)">
          <option value="">分野を選ぶ</option>
        </select>
      </div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="search" id="search-input" placeholder="キーワードで検索..." oninput="renderTerms()" autocomplete="off">
      </div>
    </div>
  </div>
</div>

<main>
  <div class="result-count" id="result-count"></div>
  <div id="term-list-wrap"></div>
</main>

<script>
const TERMS = [{"rowNum":2,"id":"001","catCode":"CAT01","nameJa":"雨水集水","readingJa":"うすいしゅうすい","summaryJa":"降雨を収集・貯蔵して生活や農業に利用する技術のこと。","detailJa":"屋根集水、地表集水、流域集水など小さな範囲から大きな範囲までの方法があり、降雨が限られた乾燥地域で重要である。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Rainwater collection","summaryEn":"Technology for collecting and storing rainwater for use in daily life and agriculture.","detailEn":"There are methods ranging from small to large scales, including roof catchment, surface catchment, and watershed catchment, which are important in arid regions with limited rainfall.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"वर्षाको पानी सङ्कलन","summary3":"वर्षाको पानी सङ्कलन र भण्डारण गरेर दैनिक जीवन र कृषिमा प्रयोग गर्ने प्रविधि।","detail3":"छानाबाट पानी सङ्कलन, भूसतहबाट पानी सङ्कलन, जलसम्भरण क्षेत्रबाट पानी सङ्कलन जस्ता साना क्षेत्रदेखि ठूला क्षेत्रसम्मका विधिहरू छन्, जुन सीमित वर्षा भएका सुक्खा क्षेत्रहरूमा महत्वपूर्ण छ।","caption3":"","images":[]},{"rowNum":3,"id":"002","catCode":"CAT01","nameJa":"農業用水管理","readingJa":"のうぎょうようすいかんり","summaryJa":"農業目的で表流水・地下水を制御・配分するための計画的な人為的な介入措置のこと。","detailJa":"地域の目標達成のため、灌漑設備を含む施設の整備から運営管理（人、規則）までを含めた包括的な概念である。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Agricultural water management","summaryEn":"Planned artificial intervention measures for controlling and distributing surface water and groundwater for agricultural purposes.","detailEn":"It is a comprehensive concept that encompasses everything from the development of facilities, including irrigation equipment, to operational management (people and regulations) for achieving regional objectives.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"कृषि पानी व्यवस्थापन","summary3":"कृषि उद्देश्यका लागि सतही पानी र भूमिगत पानीलाई नियन्त्रण र वितरण गर्नका लागि योजनाबद्ध मानवीय हस्तक्षेप उपायहरूको बारेमा हो।","detail3":"क्षेत्रीय लक्ष्य प्राप्तिका लागि सिँचाइ सुविधा सहितका संरचनाहरूको विकासदेखि सञ्चालन व्यवस्थापन (मानव, नियम) सम्मलाई समेटेको बृहत् अवधारणा हो।","caption3":"","images":[]},{"rowNum":4,"id":"003","catCode":"CAT01","nameJa":"洪水利用灌漑","readingJa":"こうずいりようかんがい","summaryJa":"季節的な洪水流や高水位を堰や導水路で農地に導く灌漑方法である。","detailJa":"中東・アフリカの乾燥地域で伝統的に実施される。自然環境に依存するため、制御が困難な灌漑方式でもある。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Flood irrigation","summaryEn":"It is an irrigation method that directs seasonal flood flows or high water levels to agricultural land using weirs and channels.","detailEn":"It is traditionally practiced in arid regions of the Middle East and Africa. It is also an irrigation method that is difficult to control due to its dependence on the natural environment.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"बाढी उपयोग सिंचाई","summary3":"मौसमी बाढी प्रवाह वा उच्च जलस्तरलाई बाँध र नहरहरूद्वारा कृषि भूमिमा पुर्याउने सिंचाइ विधि हो।","detail3":"मध्यपूर्व र अफ्रिकाका सुक्खा क्षेत्रहरूमा परम्परागत रूपमा सञ्चालन गरिन्छ। प्राकृतिक वातावरणमा निर्भर भएकाले, नियन्त्रण गर्न कठिन सिँचाइ प्रणाली पनि हो।","caption3":"","images":[]},{"rowNum":5,"id":"004","catCode":"CAT01","nameJa":"氾濫原灌漑","readingJa":"はんらんげんかんがい","summaryJa":"河川の氾濫原で季節的な洪水と浅層地下水を利用する灌漑方法である。","detailJa":"湿潤と乾燥のサイクルを活用した持続可能な農業システムであるが、洪水時などの災害への危険もある。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Floodplain irrigation","summaryEn":"It is an irrigation method that utilizes seasonal flooding and shallow groundwater in river floodplains.","detailEn":"This is a sustainable agricultural system that utilizes cycles of wet and dry conditions, but it also poses risks during disasters such as floods.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"बाढी क्षेत्र सिंचाइ","summary3":"नदीको बाढी मैदानमा मौसमी बाढी र उथले भूमिगत पानीको उपयोग गर्ने सिँचाइ विधि हो।","detail3":"आर्द्रता र सुख्खाको चक्रलाई उपयोग गर्ने दिगो कृषि प्रणाली हो, तर बाढीजस्ता प्राकृतिक प्रकोपको जोखिम पनि हुन्छ।","caption3":"","images":[]},{"rowNum":6,"id":"005","catCode":"CAT01","nameJa":"表面灌漑","readingJa":"ひょうめんかんがい","summaryJa":"重力を利用して水を農地表面に流し、土壌への浸透により作物に水を供給する灌漑方法である。","detailJa":"畝間灌漑、圃場灌漑、畦畔灌漑を含む。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Surface irrigation","summaryEn":"This is an irrigation method that utilizes gravity to flow water over the surface of agricultural land, supplying water to crops through infiltration into the soil.","detailEn":"Including furrow irrigation, field irrigation, and ridge irrigation.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"सतही सिँचाइ","summary3":"गुरुत्वाकर्षणको उपयोग गरेर पानीलाई कृषि भूमिको सतहमा बगाउने र माटोमा प्रवेश गराएर बालीहरूलाई पानी आपूर्ति गर्ने सिंचाइ विधि हो।","detail3":"खरो सिंचाई, खेत सिंचाई, र मेड सिंचाईलाई समावेश गर्दछ।","caption3":"","images":[]},{"rowNum":7,"id":"006","catCode":"CAT01","nameJa":"点滴灌漑","readingJa":"てんてきかんがい","summaryJa":"エミッター（滴下装置）を通じて作物の根元に低圧で水を滴下する高効率灌漑システムである。","detailJa":"水と肥料の利用効率が高く、塩分土壌でも使用が可能である。イスラエルで発展した灌漑方式であり、様々な方式や資材がある。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Drip irrigation","summaryEn":"This is a highly efficient irrigation system that drips water at low pressure to the base of crops through emitters (drip devices).","detailEn":"It has high water and fertilizer use efficiency and can be used even in saline soils. This irrigation method was developed in Israel, and there are various systems and materials available.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"थोपा सिंचाइ","summary3":"एमिटर (थोपा उपकरण) मार्फत बालीको जरामा कम दबाबमा पानी थोप्ने उच्च दक्षता सिंचाई प्रणाली हो।","detail3":"पानी र मलको उपयोग दक्षता उच्च छ र नुनिलो माटोमा पनि प्रयोग गर्न सकिन्छ। इजरायलमा विकसित सिँचाइ प्रणाली हो र विभिन्न प्रकारका विधि र सामग्रीहरू छन्।","caption3":"","images":[]},{"rowNum":8,"id":"007","catCode":"CAT01","nameJa":"スプリンクラー灌漑","readingJa":"すぷりんくらーかんがい","summaryJa":"加圧された水をスプリンクラーヘッドから散水し、人工的な降雨を作り出す灌漑方法である。","detailJa":"均一な散水が可能だが、風の影響を受けやすい。半径１kmのセンターピポッド方式、延長300mのリールマシン方式、定置式などの各種方式がある。スプリンクラーヘッドからの水滴が土粒子を弾くこともあり、作物の生育に合わせた選定が必要である。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Sprinkler irrigation","summaryEn":"This is an irrigation method that creates artificial rainfall by spraying pressurized water from sprinkler heads.","detailEn":"While uniform irrigation is possible, it is susceptible to wind effects. Various systems are available including center pivot systems with a radius of 1 km, reel machine systems with an extension of 300 m, and stationary systems. Water droplets from sprinkler heads may dislodge soil particles, requiring selection appropriate to crop growth stages.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"स्प्रिंकलर सिँचाइ","summary3":"दबाबयुक्त पानीलाई स्प्रिंकलर हेडबाट छर्केर कृत्रिम वर्षा सिर्जना गर्ने सिंचाइ विधि हो।","detail3":"समान सिंचाई सम्भव छ तर हावाको प्रभावमा पर्न सक्छ। १ किमी अर्धव्यासको केन्द्र पिभोट प्रणाली, ३०० मिटर विस्तारको रील मेसिन प्रणाली, स्थिर प्रणाली जस्ता विभिन्न प्रणालीहरू छन्। स्प्रिंकलर हेडबाट निस्कने पानीका थोपाहरूले माटोका कणहरूलाई उडाउन सक्छन्, त्यसैले बालीको बृद्धि अनुसार छनोट गर्नु आवश्यक छ।","caption3":"","images":[]},{"rowNum":9,"id":"008","catCode":"CAT01","nameJa":"圃場灌漑","readingJa":"ほじょうかんがい","summaryJa":"完全に水平な農地を土手で囲み、全面に湛水する灌漑方法である。","detailJa":"粘土質土壌で適切に管理すれば高い効率を達成することができる。平地の水田灌漑は圃場灌漑である。水田面積によっては大量の用水を必要とする。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Field irrigation","summaryEn":"This is an irrigation method in which completely level agricultural land is surrounded by embankments and the entire surface is flooded with water.","detailEn":"High efficiency can be achieved with proper management in clay soil. Paddy field irrigation on flat land is field irrigation. Depending on the paddy field area, large amounts of irrigation water may be required.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"खेत सिंचाइ","summary3":"पूर्ण रूपमा समतल कृषि भूमिलाई बाँधले घेरेर सम्पूर्ण क्षेत्रमा पानी भर्ने सिँचाइ विधि हो।","detail3":"माटोको माटोमा उचित व्यवस्थापन गरेमा उच्च दक्षता हासिल गर्न सकिन्छ। समतल भूमिको धान बालीको सिँचाइ खेत सिँचाइ हो। धान बालीको क्षेत्रफल अनुसार ठूलो मात्रामा सिँचाइको पानी आवश्यक पर्छ।","caption3":"","images":[]},{"rowNum":10,"id":"009","catCode":"CAT01","nameJa":"畦畔灌漑","readingJa":"けいはんかんがい","summaryJa":"平行な土手（畦畔）で区切られた帯状農地の上端から水を供給し、重力により下方に流下させる灌漑方法である。","detailJa":"傾斜地の水田灌漑で採用される。上流部から灌漑され、下流部へと灌漑水は流下する。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Ridge and furrow irrigation","summaryEn":"This is an irrigation method where water is supplied from the upper end of strip-shaped farmland divided by parallel embankments (ridges) and allowed to flow downward by gravity.","detailEn":"This method is adopted for paddy field irrigation on sloped terrain. Irrigation begins from the upstream area, and the irrigation water flows down to the downstream areas.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"मेडबन्दी सिँचाइ","summary3":"समानान्तर बाँधहरू (खेतका छेउछाउका माटोका पर्खालहरू) द्वारा छुट्याइएको पट्टी आकारको कृषि भूमिको माथिल्लो भागबाट पानी आपूर्ति गरी गुरुत्वाकर्षणको सहायताले तलतिर बगाउने सिँचाइ विधि हो।","detail3":"ढलानका क्षेत्रको धान बालीको सिँचाइमा अपनाइन्छ। माथिल्लो भागबाट सिँचाइ गरिन्छ र सिँचाइको पानी तलतिर बग्दै जान्छ।","caption3":"","images":[]},{"rowNum":11,"id":"010","catCode":"CAT01","nameJa":"畝間灌漑","readingJa":"うねまかんがい","summaryJa":"作物の畝間に作った溝に水を流し、側方浸透により作物に水を供給する表面灌漑の一種である。","detailJa":"傾斜地での水の制御が可能である。平坦な畑地帯で採用されるが損失水量も多い。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Furrow irrigation","summaryEn":"This is a type of surface irrigation that supplies water to crops through lateral infiltration by flowing water through furrows created between crop rows.","detailEn":"Water control on sloped terrain is possible. This method is adopted in flat farmland areas, but water loss is also significant.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"मेड बिचको सिँचाइ","summary3":"बालीका फारहरूबीच बनाइएका नालीहरूमा पानी बगाएर पार्श्व रिसावद्वारा बालीलाई पानी आपूर्ति गर्ने सतही सिंचाइको एक प्रकार हो।","detail3":"ढलानमा पानीको नियन्त्रण सम्भव छ। समतल खेतबारी क्षेत्रमा अपनाइन्छ तर पानीको हानि पनि धेरै हुन्छ।","caption3":"","images":[]},{"rowNum":12,"id":"011","catCode":"CAT01","nameJa":"地下灌漑","readingJa":"ちかかんがい","summaryJa":"水田や畑に必要な暗渠排水施設を利用した灌漑方式である。","detailJa":"水口の水位を制御することで管内の圧力（送水量）を制御することができる。資材費、施工費（自動布設機が開発されている）が高い。灌漑時は暗渠の出口を塞ぐ。暗渠の被覆材の選定に注意する必要がある。管内の排泥砂を目的とした管理作業がある。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Underground irrigation","summaryEn":"This is an irrigation system that utilizes subsurface drainage facilities necessary for paddy fields and upland fields.","detailEn":"Water pressure (water supply volume) within the pipes can be controlled by controlling the water level at the water outlet. Material costs and construction costs are high (automatic installation machines have been developed). During irrigation, the outlet of the subsurface drain is blocked. Careful attention must be paid to the selection of covering materials for the subsurface drain. There are maintenance operations aimed at removing sediment and sand from within the pipes.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"भूमिगत सिंचाइ","summary3":"धान बाली र खेतमा आवश्यक भूमिगत निकास सुविधाको प्रयोग गरिने सिंचाइ प्रणाली हो।","detail3":"पानीको मुखको पानीको तहलाई नियन्त्रण गरेर पाइप भित्रको दबाब (पानी आपूर्ति मात्रा) नियन्त्रण गर्न सकिन्छ। सामग्री लागत, निर्माण लागत (स्वचालित बिछ्याउने मेसिन विकसित गरिएको छ) उच्च छ। सिँचाइको समयमा भूमिगत नालीको निकासलाई बन्द गर्नुपर्छ। भूमिगत नालीको ढाक्ने सामग्रीको छनोटमा ध्यान दिनु आवश्यक छ। पाइप भित्रको माटो र बालुवा निकाल्ने उद्देश्यले व्यवस्थापन कार्य छ।","caption3":"","images":[]},{"rowNum":13,"id":"012","catCode":"CAT01","nameJa":"マイクロ灌漑","readingJa":"まいくろかんがい","summaryJa":"少量の水を低圧で作物の根域に直接供給する精密灌漑システムである。","detailJa":"点滴灌漑やマイクロスプリンクラーを含む。ハウス栽培で採用される。肥料を溶かした用水が使われる。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Micro-irrigation","summaryEn":"It is a precision irrigation system that directly supplies small amounts of water to the root zone of crops under low pressure.","detailEn":"This includes drip irrigation and micro-sprinklers. It is adopted in greenhouse cultivation. Irrigation water with dissolved fertilizer is used.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"सूक्ष्म सिँचाइ","summary3":"अल्प मात्रामा पानीलाई कम दबाबमा बालीको जरा क्षेत्रमा प्रत्यक्ष रूपमा आपूर्ति गर्ने सटीक सिंचाइ प्रणाली हो।","detail3":"टपकाउने सिँचाइ र माइक्रो स्प्रिंकलर समावेश गर्दछ। हाउस खेतीमा अपनाइन्छ। मल घोलिएको पानी प्रयोग गरिन्छ।","caption3":"","images":[]},{"rowNum":14,"id":"013","catCode":"CAT01","nameJa":"ポンプ灌漑","readingJa":"ぽんぷかんがい","summaryJa":"ディーゼルまたはガソリンエンジンで駆動するポンプによる灌漑方式である。","detailJa":"深井戸や河川からの取水に使用されたり、管路の送水、散水加圧にも使われる。施設費（維持費や更新費用も必要）、電気や燃料等の運転コストは高いが大量の水を汲み上げたり送水が可能となるため、地域の営農を一変させることができる。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Pump irrigation","summaryEn":"It is an irrigation system using pumps driven by diesel or gasoline engines.","detailEn":"It is used for water intake from deep wells or rivers, as well as for water transmission through pipelines and pressurized irrigation. Although facility costs (including maintenance and renewal expenses) and operating costs for electricity and fuel are high, it enables pumping and transporting large volumes of water, which can completely transform regional farming practices.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"पम्प सिँचाइ","summary3":"डिजेल वा पेट्रोल इन्जिनले चलाइने पम्पद्वारा सिंचाइ गर्ने प्रणाली हो।","detail3":"गहिरो इनार र नदीबाट पानी उठाउन प्रयोग गरिन्छ, र पाइपलाइनको पानी ढुवानी, छर्काव दबावमा पनि प्रयोग गरिन्छ। सुविधा लागत (मर्मत र नवीकरण लागत पनि आवश्यक), बिजुली र इन्धन जस्ता सञ्चालन लागत उच्च छ तर ठूलो मात्रामा पानी उठाउन र ढुवानी गर्न सम्भव भएकोले, यसले क्षेत्रको कृषि कार्यलाई पूर्ण रूपमा परिवर्तन गर्न सक्छ।","caption3":"","images":[]},{"rowNum":15,"id":"014","catCode":"CAT01","nameJa":"小規模農家灌漑スキーム","readingJa":"しょうきぼのうかかんがいすきーむ","summaryJa":"複数の小規模農家（通常ha未満）が共有配水システムに依存して灌漑水にアクセスする農業プロジェクトのこと。","detailJa":"農家の自給生産と商業生産を目的とすることで投資に見合う生産が可能となる。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Small-scale Farmer Irrigation Scheme","summaryEn":"An agricultural project where multiple smallholder farmers (typically less than one hectare) rely on a shared water distribution system to access irrigation water.","detailEn":"By aiming for both subsistence production and commercial production by farmers, it becomes possible to achieve production that justifies the investment.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"साना किसान सिँचाइ योजना","summary3":"धेरै साना किसानहरू (सामान्यतया एक हेक्टेयर भन्दा कम) साझा पानी वितरण प्रणालीमा निर्भर भएर सिँचाइको पानीमा पहुँच प्राप्त गर्ने कृषि परियोजनाको कुरा हो।","detail3":"किसानहरूको आत्मनिर्भर उत्पादन र व्यावसायिक उत्पादनलाई उद्देश्य बनाउँदा लगानीसँग मेल खाने उत्पादन सम्भव हुन्छ।","caption3":"","images":[]},{"rowNum":16,"id":"015","catCode":"CAT01","nameJa":"ペダル式ポンプ","readingJa":"ぺだるしきぽんぷ","summaryJa":"足踏み式の揚水ポンプのこと。","detailJa":"小規模農家向けに開発された低コスト技術で、1-7mの深度から水を汲み上げ可能である。人力による持続可能な灌漑であるが、複数者による運営が必要である。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Pedal-operated pump","summaryEn":"A foot-operated water pump.","detailEn":"This is a low-cost technology developed for small-scale farmers that can pump water from depths of 1-7 meters. It is human-powered sustainable irrigation, but requires operation by multiple people.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"पेडल शैलीको पम्प","summary3":"खुट्टाले चलाइने पानी तान्ने पम्पको बारेमा।","detail3":"साना किसानहरूका लागि विकसित गरिएको कम लागतको प्रविधि हो, जसले १-७ मिटरको गहिराइबाट पानी उठाउन सक्छ। यो मानव शक्तिमा आधारित दिगो सिँचाइ हो, तर यसलाई सञ्चालन गर्न धेरै व्यक्तिहरूको आवश्यकता पर्छ।","caption3":"","images":[]},{"rowNum":17,"id":"016","catCode":"CAT02","nameJa":"計画基準年","readingJa":"けいかくきじゅんねん","summaryJa":"用水計画で適切な施設規模を決めるための考え方","detailJa":"観測した気象、水文資料から代表的な条件を1/10確率年などで設定する。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Plan base year","summaryEn":"Approach for determining appropriate facility scale in irrigation planning","detailEn":"Representative conditions are established from observed meteorological and hydrological data using probabilities such as 1/10 annual probability.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"योजना आधार वर्ष","summary3":"सिँचाइ योजनामा उपयुक्त सुविधा आकार निर्धारण गर्नका लागि विचारधारा","detail3":"अवलोकन गरिएको मौसमी, जल विज्ञान सामग्रीबाट प्रतिनिधि अवस्थाहरू १/१० सम्भाव्यता वर्ष आदिद्वारा स्थापना गर्ने।","caption3":"","images":[]},{"rowNum":18,"id":"017","catCode":"CAT02","nameJa":"地域用水","readingJa":"ちいきようすい","summaryJa":"農村では生活用水と農業用水は一体的に利用されてきた。日本において農業用水に付帯し、地域の生活利用（環境、洗浄、景観）に利用される水に改めて着目した考え方から生まれた概念用語である。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Regional water supply","summaryEn":"In rural areas, domestic water and agricultural water have been used in an integrated manner. This is a conceptual term that emerged from a renewed focus on water that is ancillary to agricultural water and used for community living purposes (environment, washing, landscape) in Japan.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"क्षेत्रीय सिंचाई पानी","summary3":"ग्रामीण क्षेत्रमा घरायसी प्रयोजनका लागि पानी र कृषि प्रयोजनका लागि पानी एकीकृत रूपमा प्रयोग गरिँदै आएको छ। जापानमा कृषि सिँचाइको पानीसँग जोडिएर, स्थानीय जीवनयापन प्रयोजनहरू (वातावरण, सफाइ, परिदृश्य) मा प्रयोग हुने पानीलाई पुनः केन्द्रमा राखेर सोच्ने दृष्टिकोणबाट जन्मेको अवधारणागत शब्दावली हो।","detail3":"","caption3":"","images":[]},{"rowNum":19,"id":"018","catCode":"CAT02","nameJa":"灌漑必要水量","readingJa":"かんがいひつようすいりょう","summaryJa":"作物必要水量に灌漑方式や取水、送水に必要な水量のこと。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Irrigation water requirement","summaryEn":"The amount of water required for crop water requirements, including irrigation methods, water intake, and water conveyance.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"सिंचाई आवश्यक पानीको मात्रा","summary3":"फसलको आवश्यक पानीको मात्रामा सिँचाइ प्रणाली वा पानी उठाउने, पानी पुर्याउनका लागि आवश्यक पानीको मात्राको कुरा।","detail3":"","caption3":"","images":[]},{"rowNum":20,"id":"019","catCode":"CAT02","nameJa":"作物必要水量","readingJa":"さくもつひつようすいりょう","summaryJa":"作物が最適な収量を得るために必要とする総水量のこと。","detailJa":"作物品種、生育段階、気象条件により決定される。作物と土壌からの蒸発散量から有効雨量を差し引いて算出される。実測として作物と土壌全体の計量を行う方式がある。（ライシメーター）","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Crop water requirement","summaryEn":"The total amount of water that crops require to achieve optimal yield.","detailEn":"It is determined by crop variety, growth stage, and weather conditions. It is calculated by subtracting effective rainfall from the evapotranspiration amount from crops and soil. There is a method that involves weighing the entire crop and soil system as an actual measurement. (Lysimeter)","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"बाली आवश्यक पानीको मात्रा","summary3":"बालीले इष्टतम उत्पादन प्राप्त गर्नका लागि आवश्यक पर्ने कुल पानीको मात्रा।","detail3":"बालीका किस्म, बृद्धिको चरण, मौसमी अवस्थाहरूद्वारा निर्धारण गरिन्छ। बाली र माटोबाट हुने वाष्पीकरणबाट प्रभावकारी वर्षाको मात्रा घटाएर गणना गरिन्छ। वास्तविक मापनको रूपमा बाली र सम्पूर्ण माटोको तौल मापन गर्ने विधि छ। (लाइसिमिटर)","caption3":"","images":[]},{"rowNum":21,"id":"020","catCode":"CAT02","nameJa":"計画用水量","readingJa":"けいかくようすいりょう","summaryJa":"計画基準年における必要とする用水量のこと。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Planned water demand","summaryEn":"The amount of water required in the planning base year.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"योजनाबद्ध पानी मात्रा","summary3":"योजना आधार वर्षमा आवश्यक पानीको मात्रालाई भनिन्छ।","detail3":"","caption3":"","images":[]},{"rowNum":22,"id":"021","catCode":"CAT02","nameJa":"水収支","readingJa":"みずしゅうし","summaryJa":"特定期間・地域での水の収入（降雨、灌漑）と支出（蒸発散、流出、深層浸透）の収支のこと。","detailJa":"灌漑計画の基礎データとなる。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Water balance","summaryEn":"The water balance of income (precipitation, irrigation) and expenditure (evapotranspiration, runoff, deep percolation) for a specific period and region.","detailEn":"This serves as fundamental data for irrigation planning.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"जल सन्तुलन","summary3":"विशिष्ट अवधि र क्षेत्रमा पानीको आम्दानी (वर्षा, सिँचाइ) र खर्च (वाष्पोत्सर्जन, बहाव, गहिरो रिसाव) को सन्तुलन।","detail3":"सिंचाई योजनाको आधारभूत डाटा बन्छ।","caption3":"","images":[]},{"rowNum":23,"id":"022","catCode":"CAT02","nameJa":"圃場容水量","readingJa":"ほじょうようすいりょう","summaryJa":"土壌が重力に逆らって保持できる最大水分量のこと。灌漑するタイミングを決定する重要な指標である。","detailJa":"土壌深度別に計測（土質、作物根の生育）し、期間毎に一番不足する土層を対象とした用水供給量を計算する。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Field capacity","summaryEn":"The maximum amount of water that soil can retain against gravity. This is an important indicator for determining the timing of irrigation.","detailEn":"Measurements are taken by soil depth (soil properties, crop root development), and the water supply amount is calculated for the soil layer with the greatest deficiency during each period.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"खेतको पानी धारण क्षमता","summary3":"माटोले गुरुत्वाकर्षणको विपरीत राख्न सक्ने अधिकतम पानीको मात्रालाई भनिन्छ। सिँचाइको समय निर्धारण गर्ने महत्वपूर्ण सूचक हो।","detail3":"माटोको गहिराई अनुसार मापन (माटोको गुणस्तर, बालीको जराको वृद्धि) गरी, अवधि अनुसार सबैभन्दा कमी भएको माटो तहलाई लक्षित गरेर सिँचाइ पानीको आपूर्ति मात्रा गणना गर्ने।","caption3":"","images":[]},{"rowNum":24,"id":"023","catCode":"CAT02","nameJa":"初期用水","readingJa":"しょきようすい","summaryJa":"栽培初期に地下浸透を安定させるために必要となる用水量のこと。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Initial irrigation water","summaryEn":"The amount of irrigation water required to stabilize underground infiltration during the early stages of cultivation.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"प्रारम्भिक सिंचाइ पानी","summary3":"बालीको प्रारम्भिक अवस्थामा भूमिगत रिसाउने प्रक्रियालाई स्थिर बनाउनका लागि आवश्यक हुने सिँचाइ पानीको मात्रा।","detail3":"","caption3":"","images":[]},{"rowNum":25,"id":"024","catCode":"CAT02","nameJa":"表流水","readingJa":"ひょうりゅうすい","summaryJa":"河川、湖沼、貯水池など地表にある水資源のこと。灌漑の主要な水源の一つで、季節変動や気候変動の影響を受けやすい。","detailJa":"河口付近では塩水遡上により表層は真水でも深部が塩水となっていることがあるため、注意が必要である。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Surface water","summaryEn":"Water resources located on the surface such as rivers, lakes, and reservoirs. This is one of the major water sources for irrigation and is susceptible to seasonal variations and climate change impacts.","detailEn":"Near river mouths, caution is required as saltwater intrusion can cause the surface layer to be freshwater while the deeper layers contain saltwater.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"सतही पानी","summary3":"नदी, ताल, जलाशय आदि भूसतहमा रहेका जल स्रोतहरूको कुरा। सिँचाइको मुख्य जल स्रोत मध्ये एक हो, जुन मौसमी परिवर्तन र जलवायु परिवर्तनको प्रभावमा सजिलै पर्छ।","detail3":"नदीको मुखमा नुनिलो पानीको उल्टो प्रवाहका कारण सतहमा मिठो पानी भए तापनि गहिराइमा नुनिलो पानी भएको हुन सक्छ, त्यसैले सावधानी अपनाउनु आवश्यक छ।","caption3":"","images":[]},{"rowNum":26,"id":"025","catCode":"CAT02","nameJa":"地下水","readingJa":"ちかすい","summaryJa":"地下の飽和帯に存在する水である。井戸やボーリングにより取水される。","detailJa":"表流水より水質・水温が安定しているが、過剰揚水により水位低下の問題が生じる。地下水に含まれる塩分等が作物被害をもたらすことがある。特に大量の揚水により地下水の低下は水質に変化をもたらすので事前の調査と水質モニタリングが必要である。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Groundwater","summaryEn":"Water that exists in the saturated zone underground. It is extracted through wells or boreholes.","detailEn":"Although groundwater is more stable in quality and temperature than surface water, excessive pumping causes problems of water level decline. Salts and other substances contained in groundwater can sometimes cause crop damage. Since large-scale pumping causes groundwater level decline that brings about changes in water quality, preliminary surveys and water quality monitoring are necessary.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"भूमिगत पानी","summary3":"भूमिगत संतृप्त क्षेत्रमा अवस्थित पानी हो। इनार र बोरिङद्वारा पानी निकालिन्छ।","detail3":"सतहको पानीको तुलनामा पानीको गुणस्तर र तापक्रम स्थिर हुन्छ तर अत्यधिक उत्खननका कारण पानीको सतहमा कमीको समस्या उत्पन्न हुन्छ। भूमिगत पानीमा रहेको नुन आदिले बालीनालीमा नोकसान पुर्याउन सक्छ। विशेषगरी ठूलो मात्रामा पानी उत्खननका कारण भूमिगत पानीको कमीले पानीको गुणस्तरमा परिवर्तन ल्याउँछ त्यसैले पूर्व अध्ययन र पानीको गुणस्तर अनुगमन आवश्यक छ।","caption3":"","images":[]},{"rowNum":27,"id":"026","catCode":"CAT02","nameJa":"散水効率","readingJa":"さんすいこうりつ","summaryJa":"農地に供給された水量のうち、作物の根域に貯留される水量の割合のこと。","detailJa":"灌漑方法や土壌条件により大きく異なる。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Irrigation efficiency","summaryEn":"The proportion of water supplied to farmland that is stored in the root zone of crops.","detailEn":"It varies greatly depending on irrigation methods and soil conditions.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"सिंचाइ दक्षता","summary3":"कृषि भूमिमा आपूर्ति गरिएको पानीको मात्रा मध्ये, बालीको जरा क्षेत्रमा भण्डारण हुने पानीको मात्राको अनुपात।","detail3":"सिँचाइ विधि र माटोको अवस्थाअनुसार धेरै फरक हुन्छ।","caption3":"","images":[]},{"rowNum":28,"id":"027","catCode":"CAT02","nameJa":"送水効率","readingJa":"そうすいこうりつ","summaryJa":"水源から農地までの送水過程での水量損失を考慮した効率のこと。。","detailJa":"漏水や蒸発による損失を最小化することが重要である。土水路の損失が一番大きく、コンクリート水路では小さくなる。蒸発散を防ぐための水路沿いの林帯は温度上昇を抑える効果がある。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Water supply efficiency","summaryEn":"The efficiency that takes into account water loss during the conveyance process from water sources to farmland.","detailEn":"It is important to minimize losses due to water leakage and evaporation. Earth channels have the greatest losses, while concrete channels have smaller losses. Forest belts along waterways to prevent evapotranspiration have the effect of suppressing temperature rise.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"पानी आपूर्ति दक्षता","summary3":"पानीको स्रोतबाट कृषि भूमिसम्म पानी पुर्याउने प्रक्रियामा पानीको मात्रामा हुने नोक्सानलाई ध्यानमा राखेर निकालिएको दक्षता।","detail3":"पानीको चुहावट र वाष्पीकरणबाट हुने नोक्सानलाई न्यूनतम बनाउनु महत्वपूर्ण छ। माटोको नहरमा नोक्सान सबैभन्दा बढी हुन्छ, कंक्रिट नहरमा यो कम हुन्छ। वाष्पोत्सर्जन रोक्नका लागि नहरको छेउमा बनाइने वन पट्टीले तापक्रम वृद्धिलाई नियन्त्रण गर्ने प्रभाव राख्छ।","caption3":"","images":[]},{"rowNum":29,"id":"028","catCode":"CAT02","nameJa":"水利用効率","readingJa":"みずりようこうりつ","summaryJa":"投入水量に対する作物による実際の水利用量の比率のこと。","detailJa":"技術改善や管理向上により向上可能な指標である。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Water use efficiency","summaryEn":"The ratio of actual water utilization by crops to the amount of water input.","detailEn":"This is an indicator that can be improved through technical improvements and management enhancements.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"पानी उपयोग दक्षता","summary3":"सिँचाइ पानीको मात्राको तुलनामा बालीले वास्तवमा प्रयोग गर्ने पानीको अनुपात।","detail3":"प्राविधिक सुधार र व्यवस्थापन उन्नतिद्वारा सुधार गर्न सकिने सूचक हो।","caption3":"","images":[]},{"rowNum":30,"id":"029","catCode":"CAT02","nameJa":"気象調査","readingJa":"きしょうちょうさ","summaryJa":"地域の一般気象及び特殊気象は、地区内または近傍の気象観測所の資料を収集整理する。","detailJa":"計画基準量を決定するための確率処理を行う場合は原則として1 ","images":[]},{"rowNum":47,"id":"046","catCode":"CAT03","nameJa":"支線組合","readingJa":"しせんくみあい","summaryJa":"幹線から分岐した支線部分を管理、使用するため設立した農家組織のこと。","detailJa":"日本の土地改良区では一般的な仕組みである。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Branch union","summaryEn":"A farmers' organization established to manage and use branch line sections that diverge from main irrigation channels.","detailEn":"This is a common mechanism in Japan's land improvement districts.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"शाखा सहकारी समिति","summary3":"मुख्य नहरबाट शाखा भएको सहायक नहर भागको व्यवस्थापन र प्रयोगका लागि स्थापना गरिएको किसान संगठन।","detail3":"जापानका भूमि सुधार क्षेत्रहरूमा यो सामान्य प्रणाली हो।","caption3":"","images":[]},{"rowNum":48,"id":"047","catCode":"CAT03","nameJa":"水利用者組合","readingJa":"みずりようしゃくみあい","summaryJa":"共有灌漑システムの管理を目的として農家が組織する正式な団体のこと。","detailJa":"水配分、維持管理、紛争解決を農家主導で行う。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Water Users' Association","summaryEn":"A formal organization established by farmers for the purpose of managing shared irrigation systems.","detailEn":"Water distribution, maintenance, and conflict resolution are conducted under farmer leadership.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"पानी उपयोगकर्ता संघ","summary3":"किसानहरूले साझा सिँचाइ प्रणालीको व्यवस्थापनका उद्देश्यले गठन गर्ने औपचारिक संस्था।","detail3":"पानीको बाँडफाँड, मर्मतसम्भार र द्वन्द्व समाधान किसानको नेतृत्वमा गर्ने।","caption3":"","images":[]},{"rowNum":49,"id":"048","catCode":"CAT03","nameJa":"灌漑管理委員会","readingJa":"かんがいかんりいいんかい","summaryJa":"灌漑システムの運営管理を担う農家代表による委員会のこと。","detailJa":"WUAの執行機関として具体的な管理業務を実施する。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Irrigation Management Committee","summaryEn":"A committee composed of farmer representatives responsible for the operation and management of irrigation systems.","detailEn":"Implement specific management operations as the executive body of the WUA.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"सिँचाइ व्यवस्थापन समिति","summary3":"सिँचाइ प्रणालीको सञ्चालन र व्यवस्थापनको जिम्मेवारी लिने किसान प्रतिनिधिहरूको समिति।","detail3":"WUA को कार्यकारी निकायको रूपमा ठोस व्यवस्थापकीय कार्यहरू सम्पादन गर्नुहोस्।","caption3":"","images":[]},{"rowNum":50,"id":"049","catCode":"CAT03","nameJa":"土地改良区","readingJa":"とちかいりょうく","summaryJa":"日本の土地改良法により設立が制定された農家が一定区域の土地改良事業を運営する組織の名称。略称としてLEDが使われる。","detailJa":"組合員は選挙権を持ち、代表者を選出する。農家が技術者、事務員を雇用するが、小規模組織では行政機関が支援している。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Land Improvement District","summaryEn":"The name of an organization where farmers operate land improvement projects in a designated area, established under Japan's Land Improvement Act. LED is used as an abbreviation.","detailEn":"Union members have the right to vote and elect representatives. Farmers employ technicians and clerical staff, but in small-scale organizations, administrative agencies provide support.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"भूमि सुधार क्षेत्र","summary3":"जापानको भूमि सुधार ऐनद्वारा स्थापना निर्धारण गरिएको किसानहरूले निश्चित क्षेत्रको भूमि सुधार व्यवसाय सञ्चालन गर्ने संस्थाको नाम। संक्षिप्त नामको रूपमा LED प्रयोग गरिन्छ।","detail3":"सदस्यहरूसँग मतदानको अधिकार छ र तिनीहरूले प्रतिनिधिहरू छान्छन्। किसानहरूले प्राविधिक र कार्यालयका कर्मचारीहरूलाई रोजगार दिन्छन्, तर साना संस्थाहरूमा प्रशासनिक निकायहरूले सहायता गर्छन्।","caption3":"","images":[]},{"rowNum":51,"id":"050","catCode":"CAT03","nameJa":"運営維持管理","readingJa":"うんえいいじかんり","summaryJa":"灌漑システムの日常的な運転と施設の維持修繕のこと。持続可能な灌漑のための継続的な活動が行わる。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Operation and Maintenance","summaryEn":"Daily operation of irrigation systems and maintenance and repair of facilities. Continuous activities are carried out for sustainable irrigation.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"सञ्चालन र रखरखाव व्यवस्थापन","summary3":"सिंचाई प्रणालीको दैनिक सञ्चालन र सुविधाहरूको मर्मतसम्भार। दिगो सिंचाईका लागि निरन्तर गतिविधिहरू सञ्चालन गरिन्छ।","detail3":"","caption3":"","images":[]},{"rowNum":52,"id":"051","catCode":"CAT03","nameJa":"参加型灌漑管理","readingJa":"さんかがたかんかいかんり","summaryJa":"灌漑利用者が管理のあらゆる側面に参加することにより、自主的な用水利用により水資源の最適利用を目指す管理方式のこと。","detailJa":"農家の意思決定への参加を通じて持続可能な水利用を実現する。話し合いによる信頼醸成と情報共有、実践により可能となる。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Participatory Irrigation Management","summaryEn":"A management approach that aims for optimal utilization of water resources through voluntary water use by having irrigation users participate in all aspects of management.","detailEn":"Achieve sustainable water use through farmers' participation in decision-making. This is made possible through trust building and information sharing via discussions, and through practice.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"सहभागितामूलक सिंचाई व्यवस्थापन","summary3":"सिँचाई प्रयोगकर्ताहरूले व्यवस्थापनका सबै पक्षहरूमा सहभागिता गरेर, स्वैच्छिक पानी प्रयोगमार्फत जलस्रोतको अधिकतम उपयोगलाई लक्ष्य राख्ने व्यवस्थापन प्रणाली।","detail3":"किसानहरूको निर्णय प्रक्रियामा सहभागिताको माध्यमबाट दिगो जल उपयोग प्राप्त गर्ने। छलफलद्वारा विश्वास निर्माण र सूचना साझेदारी, अभ्यासद्वारा सम्भव हुन्छ।","caption3":"","images":[]},{"rowNum":53,"id":"052","catCode":"CAT03","nameJa":"農家主導灌漑","readingJa":"のうかしゅどうかんがい","summaryJa":"農家が自らの判断と資源で開始・管理する灌漑のこと。","detailJa":"政府支援に依存しない自立的な灌漑開発形態で、小規模な灌漑から始まる。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Farmer-led irrigation","summaryEn":"Irrigation that is initiated and managed by farmers using their own judgment and resources.","detailEn":"An autonomous irrigation development model that does not depend on government support, starting with small-scale irrigation.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"कृषक नेतृत्वमा सिंचाइ","summary3":"किसानहरूले आफ्नै निर्णय र स्रोतसाधनबाट सुरु गरी व्यवस्थापन गर्ने सिंचाइ।","detail3":"सरकारी सहायतामा निर्भर नरहने स्वावलम्बी सिंचाइ विकास ढाँचा हो, जुन साना सिंचाइबाट सुरु हुन्छ।","caption3":"","images":[]},{"rowNum":54,"id":"053","catCode":"CAT03","nameJa":"農業イノベーションプラットフォーム","readingJa":"のうぎょうイノベーションプラットホーム","summaryJa":"農家、研究者、普及員、政策担当者が協働して農業技術革新を推進する参加型の機構のこと。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Agricultural Innovation Platform","summaryEn":"A participatory mechanism where farmers, researchers, extension agents, and policymakers collaborate to promote agricultural technology innovation.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"कृषि नवाचार प्लेटफर्म","summary3":"किसान, अनुसन्धानकर्ता, विस्तार कर्मचारी र नीति निर्माताहरूले सहकार्य गरेर कृषि प्रविधि नवाचारलाई प्रवर्द्धन गर्ने सहभागितामूलक संयन्त्रको कुरा हो।","detail3":"","caption3":"","images":[]},{"rowNum":55,"id":"054","catCode":"CAT03","nameJa":"用水配分計画","readingJa":"ようすいはいぶんけいかく","summaryJa":"灌漑システム内での水の時間的・空間的配分を決定する計画のこと。","detailJa":"公平性と効率性を両立させる制度設計が重要である。そのための情報収集と情報共有は重要な要素となる。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Water Allocation Plan","summaryEn":"A plan that determines the temporal and spatial distribution of water within an irrigation system.","detailEn":"Institutional design that balances both fairness and efficiency is important. Information gathering and information sharing are crucial elements for achieving this.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"पानी वितरण योजना","summary3":"सिँचाइ प्रणाली भित्र पानीको समयिक र स्थानिक वितरण निर्धारण गर्ने योजनाको बारेमा।","detail3":"निष्पक्षता र दक्षता दुवैलाई सन्तुलनमा राख्ने संस्थागत डिजाइन महत्वपूर्ण छ। त्यसका लागि सूचना संकलन र सूचना साझेदारी महत्वपूर्ण तत्वहरू हुन्।","caption3":"","images":[]},{"rowNum":56,"id":"055","catCode":"CAT03","nameJa":"費用回収","readingJa":"ひようかいしゅう","summaryJa":"灌漑システムの建設・運営費用を水利用料金で回収すること。","detailJa":"財政的持続可能性確保の重要な要素。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Cost recovery","summaryEn":"Recovering the construction and operation costs of irrigation systems through water usage fees.","detailEn":"An important element in ensuring fiscal sustainability.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"लागत रिकभरी","summary3":"सिँचाइ प्रणालीको निर्माण र सञ्चालन लागतलाई पानी उपयोग शुल्कबाट फिर्ता गर्ने।","detail3":"वित्तीय दिगोपनको सुनिश्चितताका महत्वपूर्ण तत्वहरू।","caption3":"","images":[]},{"rowNum":57,"id":"056","catCode":"CAT03","nameJa":"水価格設定","readingJa":"みずかかくせってい","summaryJa":"灌漑用水の料金を設定すること。","detailJa":"コスト回収、節水インセンティブ、社会的公平性を考慮して決定される。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Water pricing","summaryEn":"To establish fees for irrigation water.","detailEn":"It is determined taking into consideration cost recovery, water conservation incentives, and social equity.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"पानीको मूल्य निर्धारण","summary3":"सिँचाइ पानीको दर निर्धारण गर्ने।","detail3":"लागत रिकभरी, पानी बचत प्रोत्साहन र सामाजिक न्यायसंगततालाई विचार गरी निर्णय गरिन्छ।","caption3":"","images":[]},{"rowNum":58,"id":"057","catCode":"CAT03","nameJa":"受益地","readingJa":"じゅえきち","summaryJa":"事業計画を定めるために設定した一定の区域、用水供給や排水施設の支配域と整合させる必要がある。","detailJa":"住民、生活文化、行政組織、地形など様々な支配要素があり、細かく分析して設定する必要がある。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Benefited land","summaryEn":"A certain area established for determining the business plan must be consistent with the service area of water supply and drainage facilities.","detailEn":"There are various controlling factors such as residents, living culture, administrative organizations, and topography, which need to be analyzed in detail and configured accordingly.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"फाइदा पाउने क्षेत्र","summary3":"व्यवसायिक योजना निर्धारण गर्नका लागि स्थापना गरिएको निश्चित क्षेत्रलाई पानी आपूर्ति र ढल निकास सुविधाहरूको नियन्त्रण क्षेत्रसँग मेल खुवाउनु आवश्यक छ।","detail3":"बासिन्दाहरू, जीवनशैली संस्कृति, प्रशासनिक संगठन, भौगोलिक संरचना जस्ता विभिन्न नियन्त्रणकारी तत्वहरू छन्, र विस्तृत विश्लेषण गरेर सेट गर्न आवश्यक छ।","caption3":"","images":[]},{"rowNum":59,"id":"058","catCode":"CAT03","nameJa":"灌漑管理移譲","readingJa":"かんがいかんりいしょく","summaryJa":"政府機関から農家組織への灌漑管理責任を移譲すること。","detailJa":"運営コスト削減と農家主体性向上による施設管理を目的とする政策であるが、建設時に農家との調整が希薄だったため、農家側は困惑する場面が多い。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Irrigation Management Transfer","summaryEn":"The transfer of irrigation management responsibility from government agencies to farmer organizations.","detailEn":"This is a policy aimed at reducing operational costs and improving facility management through enhanced farmer autonomy, but due to insufficient coordination with farmers during the construction phase, farmers often find themselves in confusing situations.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"सिँचाइ व्यवस्थापन हस्तान्तरण","summary3":"सरकारी निकायबाट कृषक संगठनहरूमा सिंचाइ व्यवस्थापन जिम्मेवारी हस्तान्तरण गर्नु।","detail3":"यो नीति सञ्चालन लागत घटाउने र कृषकको मुख्य भूमिका बढाएर सुविधा व्यवस्थापन गर्ने उद्देश्यले बनाइएको हो, तर निर्माणको समयमा कृषकहरूसँग समन्वय कमजोर भएकोले कृषकहरू प्रायः अलमलमा पर्ने अवस्था छ।","caption3":"","images":[]},{"rowNum":60,"id":"059","catCode":"CAT04","nameJa":"ダム","readingJa":"だむ","summaryJa":"河川を堰き止めて貯水池を形成する大規模構造物のこと。地形・地質的な地点選定が重要である。","detailJa":"規模的には基盤から堤頂まで15m以上をダムと称している。（大ダム会議）洪水調節、水力発電、水道、工業、灌漑用水確保などの多目的な利用がある。岩石、土砂、コンクリート、アスファルトなど様々な材料、形式がある。基礎の透水性を改良する作業が重要である。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Dam","summaryEn":"A large-scale structure that dams a river to form a reservoir. The selection of topographical and geological sites is important.","detailEn":"In terms of scale, structures with a height of 15 meters or more from foundation to crest are called dams (International Commission on Large Dams). They serve multiple purposes including flood control, hydroelectric power generation, water supply, industrial use, and irrigation water storage. Various materials and types are used, such as rock, earth, concrete, and asphalt. Work to improve the permeability of the foundation is important.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"बाँध","summary3":"ठूला संरचना जसले नदीलाई रोकेर जलाशय बनाउँछ। भौगोलिक र भूवैज्ञानिक स्थान छनोट महत्वपूर्ण हुन्छ।","detail3":"मापदण्डका हिसाबले आधारदेखि बाँधको शिखरसम्म १५ मिटर वा सोभन्दा माथिलाई बाँध भनिन्छ। (ठूला बाँधहरूको सम्मेलन) बाढी नियन्त्रण, जलविद्युत्, खानेपानी, औद्योगिक, सिँचाइका लागि पानीको आपूर्ति जस्ता बहुउद्देश्यीय प्रयोगहरू छन्। ढुङ्गा, माटो, कंक्रिट, डामर जस्ता विभिन्न सामग्री र प्रकारहरू छन्। जगको पारगम्यतालाई सुधार गर्ने काम महत्त्वपूर्ण हुन्छ।","caption3":"","images":[]},{"rowNum":61,"id":"060","catCode":"CAT04","nameJa":"土水路","readingJa":"どすいろ","summaryJa":"自然の土壌で構成された用水路で堀込式と築堤式がある。","detailJa":"掘削、盛土だけなので建設費は安い（主に人件費）が、漏水や堆砂、雑草繁茂、洗掘の課題がある。盗水を目的とした人為的な破損も多い。\n内面をゴムシートやアスファルト材料を配置して保護、粗度を低下させたり、内部にベントナイトシート（膨潤粘土を挟んだシート）により漏水を低減する改良方法もある。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Earth channel","summaryEn":"There are excavated and embankment types of irrigation channels composed of natural soil.","detailEn":"Since it involves only excavation and embankment work, construction costs are low (mainly labor costs), but there are issues with water leakage, sediment deposition, weed growth, and scouring. Intentional damage for water theft is also common.\nImprovement methods include protecting the inner surface with rubber sheets or asphalt materials to reduce roughness, or reducing water leakage by installing bentonite sheets (sheets containing swelling clay) inside.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"माटोको नहर","summary3":"प्राकृतिक माटोले बनेको सिंचाई नहरमा खन्ने प्रकार र बाँध बनाउने प्रकार हुन्छ।","detail3":"खन्ने र माटो भर्ने मात्र कार्य भएकोले निर्माण लागत सस्तो हुन्छ (मुख्यतया श्रमिक लागत) तर पानी चुहावट, बालुवा जम्ने, झार-फूस बढ्ने र भत्काउने समस्याहरू छन्। पानी चोरी गर्ने उद्देश्यले मानवीय क्षति पनि धेरै हुन्छ।\nभित्री सतहमा रबर सिट वा डामर सामग्री राखेर संरक्षण गर्ने, रफनेस घटाउने वा भित्र बेन्टोनाइट सिट (फुल्ने माटो राखिएको सिट) द्वारा पानी चुहावट कम गर्ने सुधार विधिहरू पनि छन्।","caption3":"","images":[]},{"rowNum":62,"id":"061","catCode":"CAT04","nameJa":"幹線用水路","readingJa":"かんせんようすいろ","summaryJa":"水源から一次配水地点まで水を輸送する最大規模の用水路のこと。","detailJa":"一次用水路とも呼ぶ。灌漑システムの基幹インフラである。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Main irrigation canal","summaryEn":"The largest-scale waterway that transports water from the water source to the primary distribution point.","detailEn":"Also called primary irrigation canal. It is the backbone infrastructure of irrigation systems.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"मुख्य सिँचाइ नहर","summary3":"पानीको स्रोतदेखि प्राथमिक वितरण बिन्दुसम्म पानी ढुवानी गर्ने सबैभन्दा ठूलो नहरको बारेमा।","detail3":"प्राथमिक सिँचाइ नहर पनि भनिन्छ। सिँचाइ प्रणालीको आधारभूत पूर्वाधार हो।","caption3":"","images":[]},{"rowNum":63,"id":"062","catCode":"CAT04","nameJa":"コンクリート水路","readingJa":"こんくりーとすいろ","summaryJa":"コンクリート材料（現場打設、工場製品）で建設した用水路施設のこと。","detailJa":"耐用年数が長く、漏水防止と流下能力向上（粗度が小さい）が期待できるが建設費用が高い。気温が高い場合の現場施工ではコンクリートの乾燥に対する養生作業が重要である。利用する細骨材によりコンクリートに影響を与えるので注意が必要である。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Concrete channel","summaryEn":"Irrigation channel facilities constructed with concrete materials (cast-in-place concrete, precast products).","detailEn":"It has a long service life and can be expected to prevent water leakage and improve flow capacity (low roughness coefficient), but construction costs are high. In field construction under high temperature conditions, curing work for concrete drying is important. Care must be taken as the fine aggregate used affects the concrete.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"कंक्रीट नहर","summary3":"कंक्रीट सामग्री (साइटमा खन्याइएको, कारखाना उत्पादन) बाट निर्माण गरिएको सिंचाइ नहर सुविधा।","detail3":"सेवा जीवन लामो हुन्छ, पानी चुहावट रोकथाम र बग्ने क्षमतामा सुधार (रफनेस कम हुन्छ) को अपेक्षा गर्न सकिन्छ तर निर्माण लागत उच्च हुन्छ। तापक्रम बढी भएको अवस्थामा फिल्डमा निर्माण गर्दा कंक्रीटको सुकाउने प्रक्रियाको लागि क्युरिङ कार्य महत्वपूर्ण हुन्छ। प्रयोग गरिने बालुवा (फाइन एग्रिगेट) ले कंक्रीटमा प्रभाव पार्छ त्यसैले सावधानी अपनाउनु आवश्यक छ।","caption3":"","images":[]},{"rowNum":64,"id":"063","catCode":"CAT04","nameJa":"二次用水路","readingJa":"にじようすいろ","summaryJa":"幹線用水路（一次水路）から分岐し、より小さな区域に水を配分する中規模の用水路のこと。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Secondary water channel","summaryEn":"A medium-scale irrigation canal that branches off from a main irrigation canal (primary canal) to distribute water to smaller areas.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"द्वितीयक सिंचाई नहर","summary3":"मुख्य नहर (प्राथमिक नहर) बाट शाखा भएर साना क्षेत्रहरूमा पानी वितरण गर्ने मध्यम आकारका सिंचाई नहरहरूलाई भनिन्छ।","detail3":"","caption3":"","images":[]},{"rowNum":65,"id":"064","catCode":"CAT04","nameJa":"管理施設","readingJa":"かんりしせつ","summaryJa":"水門などの取水量を制御する施設と水位、流量などを計測、情報送信を行う一連の施設のこと。集約した資料の蓄積、分析も必要である。","detailJa":"管理に必要な一般的施設の他、雨量計などの気象観測装置の他、水位計や流量計、ゲートの開度計などの計測装置、データの送受信、蓄積分析装置を含む。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Management facility","summaryEn":"A series of facilities that control water intake volume through structures such as water gates and measure water levels, flow rates, and other parameters while transmitting information. The accumulation and analysis of consolidated data are also necessary.","detailEn":"In addition to general facilities required for management, this includes meteorological observation equipment such as rain gauges, measuring instruments such as water level gauges, flow meters, and gate opening meters, as well as data transmission/reception and storage analysis equipment.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"व्यवस्थापन सुविधा","summary3":"पानीको गेट जस्ता पानी लिने मात्रा नियन्त्रण गर्ने सुविधा र पानीको सतह, बहावको मात्रा आदि नाप्ने, सूचना पठाउने एक श्रृंखलाका सुविधाहरूको कुरा हो। संकलित सामग्रीको भण्डारण र विश्लेषण पनि आवश्यक छ।","detail3":"प्रबन्धनका लागि आवश्यक सामान्य सुविधाहरूका अतिरिक्त, वर्षा नाप्ने यन्त्र जस्ता मौसम अवलोकन उपकरणहरू, जल स्तर मापक र प्रवाह मापक, गेटको खुला नाप्ने यन्त्र जस्ता मापन उपकरणहरू, डाटाको प्रसारण र प्राप्ति, भण्डारण विश्लेषण उपकरणहरू समावेश छन्।","caption3":"","images":[]},{"rowNum":66,"id":"065","catCode":"CAT04","nameJa":"取水施設","readingJa":"しゅすいしせつ","summaryJa":"河川や貯水池から灌漑用水を取水するための施設のこと。","detailJa":"堰、取水門、沈砂池などを含む。材料は粗朶、土砂、石などの自然物からコンクリート、鋼材が使われる。河川では洪水が発生することから洪水吐や土砂吐の配置が重要である。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Water intake facility","summaryEn":"Facilities for drawing irrigation water from rivers or reservoirs.","detailEn":"This includes weirs, intake gates, sedimentation basins, and others. Materials range from natural materials such as brushwood, earth and sand, and stone to concrete and steel. Since floods occur in rivers, the arrangement of spillways and sediment outlets is important.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"पानी लिने सुविधा","summary3":"नदी र जलाशयहरूबाट सिँचाइको पानी लिनको लागि बनाइने संरचना।","detail3":"बाँध, पानी सेवन गेट, बालुवा निकासी पोखरी आदि समावेश गर्दछ। सामग्रीमा हाँगाका टुक्रा, माटो, ढुङ्गा जस्ता प्राकृतिक वस्तुहरूदेखि कंक्रिट, फलामका सामग्रीहरू प्रयोग गरिन्छ। नदीहरूमा बाढी आउने भएकाले बाढी निकास र माटो निकासको व्यवस्था महत्वपूर्ण हुन्छ।","caption3":"","images":[]},{"rowNum":67,"id":"066","catCode":"CAT04","nameJa":"調整構造物","readingJa":"ちょうせいこうぞうぶつ","summaryJa":"適切な水配分と水路保護のため、用水路内の水位・流速を制御する施設のこと。","detailJa":"調整池、調圧タンクなどがある。用水路の規模自体が調整を果たすこともある。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Regulatory structures","summaryEn":"A facility that controls water level and flow velocity within irrigation channels for proper water distribution and waterway protection.","detailEn":"There are regulating reservoirs, surge tanks, and similar facilities. The scale of the irrigation canal itself may also serve a regulating function.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"समायोजन संरचना","summary3":"उचित पानी बाँडफाँड र नहर संरक्षणको लागि, सिँचाइ नहर भित्रको पानीको तह र बहावको गति नियन्त्रण गर्ने सुविधाको बारेमा।","detail3":"समायोजन पोखरी, दबाब समायोजन ट्याङ्की आदि छन्। सिँचाइ नहरको आकार आफैंमा समायोजनको काम गर्न सक्छ।","caption3":"","images":[]},{"rowNum":68,"id":"067","catCode":"CAT04","nameJa":"灌漑システム","readingJa":"かんがいしすてむ","summaryJa":"統一的に計画・建設された灌漑システム全体のこと。取水施設、送配水施設、農地、管理組織を含む総合的な概念である。","detailJa":"施設だけでなく、それを利用、運転する人々・組織、これらを公平・効率的に機能させるための規則類を含む。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Irrigation System","summaryEn":"A comprehensive irrigation system that is planned and constructed in a unified manner. This is an integrated concept that includes water intake facilities, water conveyance and distribution facilities, agricultural land, and management organizations.","detailEn":"It includes not only facilities, but also the people and organizations that use and operate them, as well as the rules and regulations necessary to ensure their fair and efficient functioning.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"सिँचाइ प्रणाली","summary3":"एकीकृत रूपमा योजना र निर्माण गरिएको सिँचाइ प्रणालीको सम्पूर्णतालाई जनाउँछ। यो पानी उठाउने सुविधा, पानी ढुवानी र वितरण सुविधा, कृषि भूमि, र व्यवस्थापन संस्था समावेश गर्ने व्यापक अवधारणा हो।","detail3":"सुविधाहरू मात्र नभएर, ती प्रयोग गर्ने र सञ्चालन गर्ने व्यक्तिहरू र संस्थाहरू, र यिनीहरूलाई निष्पक्ष र प्रभावकारी रूपमा कार्य गराउनका लागि आवश्यक नियमावलीहरू समावेश गर्दछ।","caption3":"","images":[]},{"rowNum":69,"id":"068","catCode":"CAT04","nameJa":"用水路システム","readingJa":"ようすいろしすてむ","summaryJa":"水源から農地まで水を輸送する人工の水路網のこと。","detailJa":"幹線、支線、末端水路の階層構造に各種の付帯付帯施設から構成される。","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Irrigation channel system","summaryEn":"An artificial waterway network that transports water from water sources to agricultural land.","detailEn":"It consists of a hierarchical structure of main canals, branch canals, and terminal waterways with various auxiliary facilities.","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"सिंचाई नहर प्रणाली","summary3":"पानीको स्रोतदेखि कृषि भूमिसम्म पानी ढुवानी गर्ने कृत्रिम नहर प्रणाली।","detail3":"मुख्य नहर, शाखा नहर र अन्तिम नहरहरूको श्रेणीबद्ध संरचनामा विभिन्न प्रकारका सहायक सुविधाहरूबाट निर्मित हुन्छ।","caption3":"","images":[]},{"rowNum":70,"id":"069","catCode":"CAT04","nameJa":"管路網","readingJa":"かんろもう","summaryJa":"パイプで構成された送配水システム。密閉式で漏水が少なく、加圧送水が可能。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Pipeline network","summaryEn":"A water supply and distribution system composed of pipes. It is a closed system with minimal water leakage and enables pressurized water delivery.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"पाइप नेटवर्क","summary3":"पाइपहरूले निर्मित आपूर्ति र वितरण पानी प्रणाली। बन्द प्रकारको र कम चुहावट भएको, दबाबयुक्त पानी आपूर्ति सम्भव।","detail3":"","caption3":"","images":[]},{"rowNum":71,"id":"070","catCode":"CAT04","nameJa":"貯水池","readingJa":"ちょすいち","summaryJa":"ダムや堤防により人工的に作られた水の貯蔵施設。季節的な水需給調整機能を持つ。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Reservoir","summaryEn":"An artificial water storage facility created by dams or embankments. It has the function of seasonal water supply and demand adjustment.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"जलाशय","summary3":"बाँध वा तटबन्धद्वारा कृत्रिम रूपमा निर्मित पानी भण्डारण सुविधा। मौसमी पानी आपूर्ति र माग समायोजन कार्य गर्छ।","detail3":"","caption3":"","images":[]},{"rowNum":72,"id":"071","catCode":"CAT04","nameJa":"堰","readingJa":"せき","summaryJa":"河川を横断して水位を上げ、取水を可能にする低い構造物。可動堰と固定堰がある。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Weir","summaryEn":"A low structure that crosses a river to raise the water level and enable water intake. There are movable weirs and fixed weirs.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"बाँध","summary3":"नदीलाई पार गरेर पानीको सतह उचाल्न र पानी निकाल्न सम्भव बनाउने नीचो संरचना। चल बाँध र स्थिर बाँध हुन्छन्।","detail3":"","caption3":"","images":[]},{"rowNum":73,"id":"072","catCode":"CAT04","nameJa":"ポンプ場","readingJa":"ぽんぷじょう","summaryJa":"機械力により水を汲み上げ・送水する施設。低地から高地への送水や地下水利用に必要。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Pumping station","summaryEn":"A facility that pumps and delivers water using mechanical force. Essential for water transmission from low-lying areas to elevated areas and for utilizing groundwater.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"पम्प स्टेशन","summary3":"यान्त्रिक शक्तिद्वारा पानी तान्ने र पठाउने सुविधा। तल्लो ठाउँबाट माथिल्लो ठाउँमा पानी पठाउन र भूमिगत पानी प्रयोग गर्न आवश्यक।","detail3":"","caption3":"","images":[]},{"rowNum":74,"id":"073","catCode":"CAT04","nameJa":"配水システム","readingJa":"はいすいしすてむ","summaryJa":"農地レベルでの水配分を行う施設群。末端水路、分水工、計測施設を含む。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Water Distribution System","summaryEn":"Facilities that perform water distribution at the farmland level. Includes terminal canals, diversion works, and measurement facilities.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"वितरण प्रणाली","summary3":"खेतीयोग्य जमिनको स्तरमा पानीको बाँडफाँड गर्ने सुविधाहरूको समूह। अन्तिम सिँचाइ नहर, पानी बाँड्ने संरचना, र मापन सुविधाहरू समावेश।","detail3":"","caption3":"","images":[]},{"rowNum":75,"id":"074","catCode":"CAT04","nameJa":"水門","readingJa":"すいもん","summaryJa":"用水路の水位や流量を調整する可動式の制御装置。手動式と自動式がある。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Sluice gate","summaryEn":"A movable control device that regulates the water level and flow rate in irrigation channels. There are manual and automatic types.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"पानीको ढोका","summary3":"सिँचाइ नहरको पानीको सतह र प्रवाहलाई समायोजन गर्ने चल नियन्त्रण उपकरण। म्यानुअल र स्वचालित प्रकार छन्।","detail3":"","caption3":"","images":[]},{"rowNum":76,"id":"075","catCode":"CAT05","nameJa":"商業農業","readingJa":"しょうぎょうのうぎょう","summaryJa":"市場販売を主目的とする農業。規模の経済と専門化により高い収益性を追求。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Commercial agriculture","summaryEn":"Agriculture whose primary purpose is market sales. Pursues high profitability through economies of scale and specialization.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"व्यावसायिक कृषि","summary3":"बजार बिक्रीलाई मुख्य उद्देश्य बनाउने कृषि। मापदण्डको अर्थशास्त्र र विशेषीकरणद्वारा उच्च लाभदायकता खोज्ने।","detail3":"","caption3":"","images":[]},{"rowNum":77,"id":"076","catCode":"CAT05","nameJa":"自給農業","readingJa":"じきゅうのうぎょう","summaryJa":"家族の食料需要を満たすことを主目的とする農業。リスク回避を重視し、多様な作物を栽培。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Subsistence agriculture","summaryEn":"Agriculture whose primary purpose is to meet the food demand of the family. Emphasizes risk avoidance and cultivates diverse crops.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"आत्मनिर्भर कृषि","summary3":"पारिवारिक खाद्य आवश्यकता पूरा गर्नुलाई मुख्य उद्देश्य बनाउने कृषि। जोखिम न्यूनीकरणलाई महत्त्व दिँदै विविध बालीहरूको खेती।","detail3":"","caption3":"","images":[]},{"rowNum":78,"id":"077","catCode":"CAT05","nameJa":"作付パターン","readingJa":"さくつけぱたーん","summaryJa":"特定地域・期間における作物の種類、面積、作付時期の組み合わせ。水利用計画の基礎データ。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Cropping pattern","summaryEn":"The combination of crop types, area, and planting schedules in specific regions and periods. Basic data for water use planning.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"बिरुवा रोप्ने ढाँचा","summary3":"विशिष्ट क्षेत्र र अवधिमा बालीका प्रकार, क्षेत्रफल र रोप्ने समयको संयोजन। पानी उपयोग योजनाको आधारभूत डाटा।","detail3":"","caption3":"","images":[]},{"rowNum":79,"id":"078","catCode":"CAT05","nameJa":"雨季栽培","readingJa":"うきさいばい","summaryJa":"降雨期における作物栽培。天水農業と補完灌漑の組み合わせが一般的。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Wet season cultivation","summaryEn":"Crop cultivation during the rainy season. A combination of rainfed agriculture and supplementary irrigation is common.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"वर्षाकालीन खेती","summary3":"वर्षाकालमा बाली खेती। प्राकृतिक वर्षामा निर्भर कृषि र पूरक सिँचाइको संयोजन सामान्य छ।","detail3":"","caption3":"","images":[]},{"rowNum":80,"id":"079","catCode":"CAT05","nameJa":"乾季栽培","readingJa":"かんきさいばい","summaryJa":"降雨の少ない乾燥期における灌漑による作物栽培。収入機会の拡大と食料安全保障に寄与。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Dry season cultivation","summaryEn":"Crop cultivation through irrigation during dry seasons with limited rainfall. Contributes to expanding income opportunities and food security.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"शुष्क मौसम खेती","summary3":"सुख्खा अवधिमा कम वर्षाको समयमा सिँचाइद्वारा बाली खेती। आम्दानीका अवसरहरूको विस्तार र खाद्य सुरक्षामा योगदान।","detail3":"","caption3":"","images":[]},{"rowNum":81,"id":"080","catCode":"CAT05","nameJa":"高価値作物","readingJa":"こうかちさくもつ","summaryJa":"単位面積あたりの経済価値が高い作物。野菜、果樹、花卉など。灌漑投資の経済的正当化に重要。","detailJa":"","nam g intensity","summaryEn":"The value obtained by dividing the total annual cultivated area by the agricultural land area. This can be improved through irrigation and serves as an indicator of land productivity.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"बाली गहनता","summary3":"वार्षिक कुल खेती क्षेत्रफललाई कृषि भूमि क्षेत्रफलले भाग गरेको मान। सिंचाइद्वारा सुधार सम्भव छ र यो भूमि उत्पादकताको सूचक हो।","detail3":"","caption3":"","images":[]},{"rowNum":85,"id":"084","catCode":"CAT05","nameJa":"作物収量","readingJa":"さくもつしゅうりょう","summaryJa":"単位面積あたりの作物生産量。灌漑による増収効果の評価指標。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Crop yield","summaryEn":"Crop yield per unit area. An evaluation indicator for the yield-increasing effect of irrigation.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"बाली उत्पादन","summary3":"प्रति एकाइ क्षेत्रफलमा बालीको उत्पादन। सिंचाइबाट हुने उत्पादन वृद्धिको प्रभावकारिताको मूल्याङ्कन सूचक।","detail3":"","caption3":"","images":[]},{"rowNum":86,"id":"085","catCode":"CAT06","nameJa":"アルカリ性","readingJa":"あるかりせい","summaryJa":"水のpHが7以上の状態。高アルカリ性は作物生育と土壌に悪影響を与える。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Alkaline","summaryEn":"A condition where the pH of water is 7 or higher. High alkalinity has adverse effects on crop growth and soil.","detailEn":"","image":"","captionJa":"","captionFr":"","captionEn":"","published":"","name3":"क्षारीय","summary3":"पानीको pH ७ भन्दा माथिको अवस्था। उच्च क्षारीयताले बालीको वृद्धि र माटोमा नकारात्मक प्रभाव पार्छ।","detail3":"","caption3":"","images":[]},{"rowNum":87,"id":"086","catCode":"CAT06","nameJa":"排水","readingJa":"はいすい","summaryJa":"過剰な土壌水分や塩分を除去するシステム。湛水害や塩害防止に不可欠。","detailJa":"","nameFr":"","summaryFr":"","detailFr":"","nameEn":"Drainage","summaryEn":"A system that removes excess soil moisture and salt. Essential for preventing waterlogging damage and salt damage.","detailEn":"","i }
function termCaption(t) {
  if (currentLang === 'lang3') return t.caption3 || t.captionEn || t.captionJa;
  if (currentLang === 'en') return t.captionEn || t.captionJa;
  return t.captionJa;
}

function kanaToRomaji(str) {
  if (!str) return '';
  const pairs = [
    ['きゃ','kya'],['きゅ','kyu'],['きょ','kyo'],
    ['しゃ','sha'],['しゅ','shu'],['しょ','sho'],
    ['ちゃ','cha'],['ちゅ','chu'],['ちょ','cho'],
    ['にゃ','nya'],['にゅ','nyu'],['にょ','nyo'],
    ['ひゃ','hya'],['ひゅ','hyu'],['ひょ','hyo'],
    ['みゃ','mya'],['みゅ','myu'],['みょ','myo'],
    ['りゃ','rya'],['りゅ','ryu'],['りょ','ryo'],
    ['ぎゃ','gya'],['ぎゅ','gyu'],['ぎょ','gyo'],
    ['じゃ','ja'],['じゅ','ju'],['じょ','jo'],
    ['あ','a'],['い','i'],['う','u'],['え','e'],['お','o'],
    ['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko'],
    ['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so'],
    ['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to'],
    ['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no'],
    ['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho'],
    ['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo'],
    ['や','ya'],['ゆ','yu'],['よ','yo'],
    ['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro'],
    ['わ','wa'],['を','wo'],['ん','n'],
    ['が','ga'],['ぎ','gi'],['ぐ','gu'],['げ','ge'],['ご','go'],
    ['ざ','za'],['じ','ji'],['ず','zu'],['ぜ','ze'],['ぞ','zo'],
    ['だ','da'],['ぢ','di'],['づ','du'],['で','de'],['ど','do'],
    ['ば','ba'],['び','bi'],['ぶ','bu'],['べ','be'],['ぼ','bo'],
    ['ぱ','pa'],['ぴ','pi'],['ぷ','pu'],['ぺ','pe'],['ぽ','po'],
    ['ぁ','a'],['ぃ','i'],['ぅ','u'],['ぇ','e'],['ぉ','o'],
    ['ー','-'],
  ];
  let result = '';
  let i = 0;
  while (i < str.length) {
    if (str[i] === 'っ') {
      const rest = str.slice(i + 1);
      let nextRomaji = '';
      for (const [k, v] of pairs) {
        if (rest.startsWith(k)) { nextRomaji = v; break; }
      }
      result += nextRomaji ? nextRomaji[0] : 't';
      i++;
      continue;
    }
    let matched = false;
    for (const [k, v] of pairs) {
      if (str.startsWith(k, i)) {
        result += v;
        i += k.length;
        matched = true;
        break;
      }
    }
    if (!matched) { result += str[i]; i++; }
  }
  return result;
}

function sortTerms(arr) {
  return [...arr].sort((a, b) => {
    if (currentLang === 'ja') {
      const ra = a.readingJa || termName(a), rb = b.readingJa || termName(b);
      return ra.localeCompare(rb, 'ja');
    }
    return termName(a).localeCompare(termName(b));
  });
}

function renderCatFilter() {
  const btnAll = document.getElementById('btn-all');
  if (btnAll) btnAll.classList.toggle('active', currentCat === 'all');
  const sel = document.getElementById('categorySelect');
  if (sel) {
    const placeholder = currentLang === 'ja' ? '分野を選ぶ' : 'Choose category';
    let html = '<option value="">' + placeholder + '</option>';
    CATEGORIES.forEach(function(c) {
      html += '<option value="' + esc2(c.code) + '"' + (currentCat === c.code ? ' selected' : '') + '>' + esc2(catName(c)) + '</option>';
    });
    sel.innerHTML = html;
    console.log('ドロップダウン選択肢数:', sel.options.length);
  }
}

function setCat(code) {
  currentCat = code;
  openTermId = null;
  openDetailOpen = false;
  renderCatFilter();
  renderTerms();
}

function setCatFromSelect(sel) {
  setCat(sel.value || 'all');
}

function renderTerms() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = TERMS.filter(t => {
    if (currentCat !== 'all' && t.catCode !== currentCat) return false;
    if (!q) return true;
    return (termName(t) + termSummary(t) + (t.readingJa || '') + (t.name3 || '') + (t.nameEn || '')).toLowerCase().includes(q);
  });
  const sorted = sortTerms(filtered);
  const wrap = document.getElementById('term-list-wrap');
  const countEl = document.getElementById('result-count');

  const labels = { ja: '件の用語', en: ' term(s)', lang3: ' term(s)' };
  countEl.textContent = sorted.length + (labels[currentLang] || '件');

  if (sorted.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="icon">🔍</div><div>${currentLang === 'ja' ? '該当する用語が見つかりません' : 'No terms found'}</div></div>`;
    return;
  }

  const detailLabel = currentLang === 'ja' ? '詳細を見る' : 'Show details';
  const detailCloseLabel = currentLang === 'ja' ? '閉じる' : 'Close';

  _termIdByItemId = {};
  const items = sorted.map((t, i) => {
    const itemId = 'item-' + i;
    _termIdByItemId[itemId] = t.id;
    const name = esc2(termName(t));
    const romajiHtml = (currentLang === 'ja' && t.readingJa) ? `<span class="term-romaji">${esc2(kanaToRomaji(t.readingJa))}</span>` : '';
    const summary = esc2(termSummary(t));
    const detail = termDetail(t);
    const caption = termCaption(t);

    let detailHtml = '';
    const hasImages = t.images && t.images.length > 0;
    if (detail || hasImages || t.image) {
      const detailText = detail ? '<div class="term-detail-text">' + esc2(detail) + '</div>' : '';
      const cap = esc2(caption);
      let imgHtml = '';
      if (hasImages) {
        const imgTitle = currentLang === 'ja' ? '図・写真' : 'Figures and Photos';
        imgHtml = '<div class="term-images-section"><div class="term-images-title">' + esc2(imgTitle) + '</div>';
        t.images.forEach(function(img) {
          imgHtml += '<div class="term-image-item"><img class="term-detail-image" src="' + img.dataUrl + '" alt="' + cap + '">';
          if (cap) imgHtml += '<div class="term-detail-caption">' + cap + '</div>';
          imgHtml += '</div>';
        });
        imgHtml += '</div>';
      } else if (t.image) {
        imgHtml = '<div class="term-image-item"><img class="term-detail-image" src="images/' + esc2(t.image) + '" alt="' + cap + '" loading="lazy">';
        if (cap) imgHtml += '<div class="term-detail-caption">' + cap + '</div>';
        imgHtml += '</div>';
      }
      detailHtml = `
        <button class="detail-toggle" id="dtbtn-${itemId}" onclick="toggleDetail('${itemId}')">
          <span id="dtlabel-${itemId}">${detailLabel}</span>
          <span class="detail-arrow">▼</span>
        </button>
        <div class="term-detail-panel" id="detail-${itemId}">
          ${detailText}
          ${imgHtml}
        </div>`;
    }

    return `<div class="term-item" id="${itemId}">
      <button class="term-toggle" id="toggle-${itemId}" onclick="toggleSummary('${itemId}')">
        <span class="term-toggle-text">${name}${romajiHtml}</span>
        <span class="term-arrow">▼</span>
      </button>
      <div class="term-summary-panel" id="summary-${itemId}">
        <div class="term-summary-text">${summary}</div>
        ${detailHtml}
      </div>
    </div>`;
  });

  wrap.innerHTML = `<div class="term-list">${items.join('')}</div>`;

  // Restore open state after re-render (e.g. after language switch)
  if (openTermId !== null) {
    const restoredItemId = Object.keys(_termIdByItemId).find(k => _termIdByItemId[k] === openTermId);
    if (restoredItemId) {
      _applyOpenState(restoredItemId);
    } else {
      openTermId = null;
      openDetailOpen = false;
    }
  }
}

function _applyOpenState(itemId) {
  const toggleBtn = document.getElementById('toggle-' + itemId);
  const summaryPanel = document.getElementById('summary-' + itemId);
  if (!toggleBtn || !summaryPanel) return;
  toggleBtn.classList.add('open');
  summaryPanel.classList.add('open');
  if (openDetailOpen) {
    const btn = document.getElementById('dtbtn-' + itemId);
    const panel = document.getElementById('detail-' + itemId);
    const labelEl = document.getElementById('dtlabel-' + itemId);
    const closeLabel = currentLang === 'ja' ? '閉じる' : 'Close';
    if (btn && panel) {
      btn.classList.add('open');
      panel.classList.add('open');
      if (labelEl) labelEl.textContent = closeLabel;
    }
  }
  const el = document.getElementById(itemId);
  if (el) el.scrollIntoView({ behavior: 'instant', block: 'center' });
}

function toggleSummary(itemId) {
  const toggleBtn = document.getElementById('toggle-' + itemId);
  const summaryPanel = document.getElementById('summary-' + itemId);

  // Close previously open summary (and its detail) if a different term
  if (openTermId !== null && _termIdByItemId[itemId] !== openTermId) {
    const prevItemId = Object.keys(_termIdByItemId).find(k => _termIdByItemId[k] === openTermId);
    if (prevItemId) {
      const prevToggle = document.getElementById('toggle-' + prevItemId);
      const prevPanel = document.getElementById('summary-' + prevItemId);
      if (prevToggle) prevToggle.classList.remove('open');
      if (prevPanel) prevPanel.classList.remove('open');
      if (openDetailOpen) {
        const prevDetailBtn = document.getElementById('dtbtn-' + prevItemId);
        const prevDetail = document.getElementById('detail-' + prevItemId);
        if (prevDetailBtn) prevDetailBtn.classList.remove('open');
        if (prevDetail) prevDetail.classList.remove('open');
      }
    }
    openDetailOpen = false;
  }

  const isOpen = summaryPanel.classList.toggle('open');
  toggleBtn.classList.toggle('open', isOpen);
  openTermId = isOpen ? _termIdByItemId[itemId] : null;

  // If closing summary, also close detail
  if (!isOpen && openDetailOpen) {
    const detailBtn = document.getElementById('dtbtn-' + itemId);
    const detailPanel = document.getElementById('detail-' + itemId);
    if (detailBtn) detailBtn.classList.remove('open');
    if (detailPanel) detailPanel.classList.remove('open');
    openDetailOpen = false;
  }

  if (isOpen) {
    setTimeout(() => toggleBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 10);
  }
}

function toggleDetail(itemId) {
  const btn = document.getElementById('dtbtn-' + itemId);
  const panel = document.getElementById('detail-' + itemId);
  const labelEl = document.getElementById('dtlabel-' + itemId);
  const detailLabel = currentLang === 'ja' ? '詳細を見る' : 'Show details';
  const detailCloseLabel = currentLang === 'ja' ? '閉じる' : 'Close';

  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  if (labelEl) labelEl.textContent = isOpen ? detailCloseLabel : detailLabel;
  openDetailOpen = isOpen;
}

function esc2(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
console.log('分類データ:', CATEGORIES);
renderCatFilter();
renderTerms();
</script>
</body>

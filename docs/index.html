lture:\n・When groundwater level is too high (near surface): Root zone becomes anaerobic leading to root rot and yield reduction. Drainage improvement is necessary\n・When groundwater level is moderate (0.5-2.0m): Can supply water to crop root zone through capillary action\n・When groundwater level is too low: Pump head increases leading to higher energy costs. Sign of excessive pumping\n\nSeasonal Variation of Groundwater Level:\n・Rainy season: Groundwater level rises due to recharge from precipitation\n・Dry season: Decreases due to evapotranspiration and pumping\n・Monitoring multi-year variation trends enables early detection of overdraft\n\nGroundwater Level Monitoring in Africa:\nIn many African rural areas, observation well networks are not established, and groundwater resource management is conducted \"invisibly.\" The challenge is to promote remote monitoring systems utilizing low-cost automatic water level loggers and mobile phone networks.","image":"","captionJa":"","captionEn":"","published":"","name3":"Niveau de la nappe phréatique","summary3":"Dans un aquifère non confiné (aquifère à nappe libre), cela désigne la profondeur par rapport à la surface du sol (ou l'altitude) de la surface supérieure de la zone où les pores du sol sont saturés d'eau (surface de la nappe phréatique). Il s'agit d'un indicateur important pour l'évaluation de la disponibilité et de la capacité de drainage des eaux souterraines agricoles.","detail3":"Mesure et surveillance du niveau des eaux souterraines :\n・Méthodes de mesure : introduction d'une sonde piézométrique dans des puits d'observation (puits de monitoring), ou enregistreur automatique de niveau d'eau (diver)\n・Fréquence d'observation : au minimum une fois par mois, enregistrement automatique continu dans les zones importantes\n\nRelation entre le niveau des eaux souterraines et l'agriculture :\n・Niveau des eaux souterraines trop élevé (proche de la surface) : la zone racinaire devient anaérobie, causant la pourriture des racines et une baisse de rendement. Une amélioration du drainage est nécessaire\n・Niveau des eaux souterraines modéré (0,5 à 2,0 m) : l'eau peut alimenter la zone racinaire des cultures par action capillaire\n・Niveau des eaux souterraines trop bas : la hauteur de refoulement des pompes augmente, entraînant une hausse des coûts énergétiques. Signe de surpompage\n\nVariations saisonnières du niveau des eaux souterraines :\n・Saison des pluies : le niveau des eaux souterraines s'élève par la recharge due aux précipitations\n・Saison sèche : baisse due à l'évapotranspiration et au pompage\n・La surveillance des tendances de variation sur plusieurs années permet la détection précoce du surdéveloppement\n\nSurveillance du niveau des eaux souterraines en Afrique :\nDans de nombreuses zones rurales africaines, les réseaux de puits d'observation ne sont pas développés, et la gestion des ressources en eaux souterraines s'effectue « à l'aveugle ». La diffusion de systèmes de surveillance à distance utilisant des enregistreurs automatiques de niveau d'eau peu coûteux et les réseaux de téléphonie mobile constitue un défi.","caption3":"","images":[]},{"rowNum":40,"id":"039","catCode":"CAT02","nameJa":"減水深","readingJa":"げんすいしん","summaryJa":"水田（湛水圃場）の水位が単位時間（通常1日）に低下する深さ（mm/日）です。浸透（下方への水の流れ）と蒸発散の合計を反映しており、水稲栽培に必要な水量計算の基本指標です。","detailJa":"減水深の構成：\n減水深 = 浸透量（mm/日）＋ 蒸発散量（mm/日）\n・浸透量：土壌の透水係数と地下水位差によって決まる\n・蒸発散量：気温・日射・風速等の気象条件による\n\n減水深の標準値：\n・日本の水田：3〜15 mm/日（砂質土壌で大きく、粘土質土壌で小さい）\n・東南アジアの水田：5〜20 mm/日\n・乾燥地帯のアフリカ水田：10〜30 mm/日（高蒸発散・砂質土壌のため大きくなりやすい）\n\n灌漑計画での活用：\n・水稲の灌漑必要水量計算の基本式：\n　I = ET_c ＋ P（浸透）－ Pe（有効雨量）＋ ΔS（湛水深変化）\n　（P = 減水深 − 蒸発散量の浸透成分）\n\n減水深を抑制する方法：\n・代かき（土壌の空隙を潰す）による浸透低下\n・ポリエチレンシートや粘土層による難透水層の形成\n・有機物施用による土壌改良\n\nアフリカの水稲灌漑設計での減水深：\n砂質の圃場が多いアフリカでは減水深が大きく、水稲の灌漑必要水量が東南アジアの1.5〜2倍になるケースがあります。事前の減水深測定が設計精度向上に不可欠です。","nameEn":"Depth of drawdown","summaryEn":"It is the depth (mm/day) by which the water level in a paddy field (flooded field) decreases per unit time (usually one day). It reflects the sum of percolation (downward water flow) and evapotranspiration, and serves as a fundamental indicator for calculating the water requirements in rice cultivation.","detailEn":"Composition of percolation rate:\nPercolation rate = Percolation (mm/day) + Evapotranspiration (mm/day)\n• Percolation: Determined by soil permeability coefficient and groundwater level difference\n• Evapotranspiration: Depends on meteorological conditions such as temperature, solar radiation, wind speed, etc.\n\nStandard values of percolation rate:\n• Japanese paddy fields: 3-15 mm/day (higher in sandy soils, lower in clayey soils)\n• Southeast Asian paddy fields: 5-20 mm/day\n• African paddy fields in arid zones: 10-30 mm/day (tends to be high due to high evapotranspiration and sandy soils)\n\nApplication in irrigation planning:\n• Basic formula for calculating irrigation water requirements for rice:\n  I = ETc + P(percolation) - Pe(effective rainfall) + ΔS(change in ponding depth)\n  (P = percolation component of percolation rate - evapotranspiration)\n\nMethods to reduce percolation rate:\n• Puddling (crushing soil pores) to reduce percolation\n• Formation of impermeable layers using polyethylene sheets or clay layers\n• Soil improvement through organic matter application\n\nPercolation rate in African rice irrigation design:\nIn Africa, where sandy fields are common, percolation rates are high, and rice irrigation water requirements can be 1.5-2 times higher than in Southeast Asia. Prior measurement of percolation rate is essential for improving design accuracy.","image":"","captionJa":"","captionEn":"","published":"","name3":"profondeur de décrue","summary3":"C'est la profondeur (mm/jour) de baisse du niveau d'eau dans une rizière (parcelle inondée) par unité de temps (généralement 1 jour). Elle reflète la somme de l'infiltration (écoulement d'eau vers le bas) et de l'évapotranspiration, et constitue un indicateur de base pour le calcul de la quantité d'eau nécessaire à la culture du riz.","detail3":"Composition de la profondeur de décrue :\nProfondeur de décrue = Infiltration (mm/jour) + Évapotranspiration (mm/jour)\n• Infiltration : déterminée par le coefficient de perméabilité du sol et la différence de niveau des eaux souterraines\n• Évapotranspiration : dépendante des conditions météorologiques telles que la température, l'irradiation solaire, la vitesse du vent, etc.\n\nValeurs standard de la profondeur de décrue :\n• Rizières du Japon : 3-15 mm/jour (élevée pour les sols sableux, faible pour les sols argileux)\n• Rizières d'Asie du Sud-Est : 5-20 mm/jour\n• Rizières africaines en zone aride : 10-30 mm/jour (tendance à être élevée en raison de la forte évapotranspiration et des sols sableux)\n\nUtilisation dans la planification de l'irrigation :\n• Formule de base pour le calcul des besoins en eau d'irrigation du riz :\n  I = ETc + P (infiltration) - Pe (précipitations effectives) + ΔS (variation de la profondeur d'submersion)\n  (P = composante d'infiltration de la profondeur de décrue - évapotranspiration)\n\nMéthodes pour réduire la profondeur de décrue :\n• Réduction de l'infiltration par le puddlage (écrasement des pores du sol)\n• Formation de couches imperméables avec des films de polyéthylène ou des couches d'argile\n• Amélioration du sol par apport de matière organique\n\nProfondeur de décrue dans la conception de l'irrigation rizicole en Afrique :\nEn Afrique, où les parcelles sableuses sont nombreuses, la profondeur de décrue est importante, et les besoins en eau d'irrigation du riz peuvent être 1,5 à 2 fois supérieurs à ceux de l'Asie du Sud-Est. La mesure préalable de la profondeur de décrue est indispensable pour améliorer la précision de la conception.","caption3":"","images":[]},{"rowNum":41,"id":"040","catCode":"CAT02","nameJa":"代かき用水","readingJa":"しろかきようすい","summaryJa":"水稲栽培において、田起こし後の圃場に水を入れて土壌を砕き・こね・均平化する「代かき（しろかき）」作業に使用される灌漑用水です。作付け前の最大水需要期に集中します。","detailJa":"代かき用水の必要量と特性：\n・必要水量：200〜500 mm（圃場の土性・地下水位・乾燥期間の長さによる）\n・代かき期間：通常5〜14日間\n・この期間のピーク日需要量は通常期の3〜5倍に達する\n\n代かきの農業的意義：\n1. 土壌の均平化：水が均一に広がるための圃場面の整地\n2. 土壌の粘土化（泥化）：透水係数を下げて浸透損失を減らす\n3. 雑草種子の埋没：雑草の発芽を抑制\n4. 害虫・病原菌の低減：土壌をかき混ぜることで一部の病害虫を抑制\n\nシステム設計への影響：\n代かき用水のピーク需要が、幹線水路・取水施設の設計容量を決定することが多いです。全受益地が同時に代かきを行うと系統容量を超えるため、地区分け・時期差（ローテーション）による平準化が重要です。\n\nアフリカの水稲作付け：\nマリ・ギニア・セネガルなど西アフリカの水稲栽培地帯では代かき用水の適切な計画が重要です。ロータリー耕うん機の普及により代かき効率が向上し、水利用効率が改善された事例が報告されています。","nameEn":"Pudding water","summaryEn":"This is irrigation water used for \"puddling\" operations in rice cultivation, where water is introduced to the field after plowing to break up, knead, and level the soil. The demand is concentrated during the peak water requirement period before planting.","detailEn":"Water Requirements and Characteristics for Puddling:\n• Required water volume: 200-500 mm (depending on soil texture, groundwater level, and duration of dry period)\n• Puddling period: typically 5-14 days\n• Peak daily demand during this period reaches 3-5 times that of normal periods\n\nAgricultural Significance of Puddling:\n1. Soil leveling: land preparation to ensure uniform water distribution across the field\n2. Soil puddling (mudding): reducing permeability coefficient to minimize seepage losses\n3. Burial of weed seeds: suppressing weed germination\n4. Reduction of pests and pathogens: controlling certain pests and diseases through soil mixing\n\nImpact on System Design:\nPeak demand for puddling water often determines the design capacity of main canals and intake facilities. Since simultaneous puddling across all beneficiary areas would exceed system capacity, load leveling through area division and staggered timing (rotation) is crucial.\n\nRice Cultivation in Africa:\nIn West African rice-growing regions such as Mali, Guinea, and Senegal, appropriate planning of puddling water is important. Cases have been reported where the spread of rotary tillers improved puddling efficiency and enhanced water use efficiency.","image":"","captionJa":"","captionEn":"","published":"","name3":"Eau d'ameublissement du sol","summary3":"Il s'agit de l'eau d'irrigation utilisée pour le \"shirokaki\" (préparation du sol inondé), opération qui consiste à remplir d'eau les parcelles après le labour pour briser, malaxer et niveler le sol dans la culture du riz paddy. Cette utilisation se concentre durant la période de demande maximale en eau avant les semis.","detail3":"Quantité nécessaire et caractéristiques de l'eau pour le labour en boue :\n・Quantité d'eau nécessaire : 200 à 500 mm (selon la texture du sol de la parcelle, le niveau des eaux souterraines et la durée de la période de sécheresse)\n・Période de labour en boue : généralement 5 à 14 jours\n・La demande de pointe quotidienne pendant cette période atteint 3 à 5 fois celle de la période normale\n\nSignification agricole du labour en boue :\n1. Nivellement du sol : aplanissement de la surface de la parcelle pour une répartition uniforme de l'eau\n2. Transformation argileuse du sol (formation de boue) : réduction du coefficient de perméabilité pour diminuer les pertes par infiltration\n3. Enfouissement des graines d'adventices : suppression de la germination des mauvaises herbes\n4. Réduction des insectes nuisibles et agents pathogènes : suppression partielle des ravageurs et maladies par le brassage du sol\n\nImpact sur la conception du système :\nLa demande de pointe en eau pour le labour en boue détermine souvent la capacité de conception des canaux principaux et des installations de prise d'eau. Comme l'exécution simultanée du labour en boue sur toute la zone bénéficiaire dépasse la capacité du système, la standardisation par zonage et décalage temporel (rotation) est importante.\n\nCulture du riz irrigué en Afrique :\nDans les zones de riziculture d'Afrique de l'Ouest comme le Mali, la Guinée et le Sénégal, une planification appropriée de l'eau pour le labour en boue est importante. Des cas d'amélioration de l'efficacité d'utilisation de l'eau grâce à l'amélioration de l'efficacité du labour en boue par la diffusion des cultivateurs rotatifs ont été rapportés.","caption3":"","images":[]},{"rowNum":42,"id":"041","catCode":"CAT02","nameJa":"有効雨量","readingJa":"ゆうこううりょう","summaryJa":"降雨量のうち、作物の蒸発散に利用される（土壌中に保持される）部分の量です。地表流去・深部浸透・圃場外流出として失われる水を除いた、農業に実際に役立つ雨量です。","detailJa":"有効雨量の算定方法：\nFAO推奨の主要な算定式：\n1. FAO/USDA法：土壌水分貯留量に基づく経験式\n   Pe = 月降水量 × (125 − 0.2×P) / 125 （P ≦ 250mm の場合）\n2. 固定割合法：降水量の一定割合（通常60〜80%）を有効とみなす簡易法\n3. 直接測定（土壌水分変化量）：最も正確だが現場観測が必要\n\n有効雨量と灌漑必要水量の関係：\n灌漑必要水量（NIR）= 作物必要水量（ET_c）− 有効雨量（Pe）\n→ 有効雨量が大きいほど灌漑量を削減できる\n\n有効雨量の変動要因：\n・土壌の透水性・保水性（砂土は流去・深部浸透が大きく有効率低い）\n・圃場の傾斜（急傾斜は流去が多い）\n・降雨強度（短時間強雨は流去が多い）\n・降雨前の土壌水分状態\n\nアフリカの雨季農業での重要性：\n雨季の降水量が作物必要水量を満たせるかどうかの評価には有効雨量の推定が必要です。補足灌漑（Supplemental Irrigation）の必要量の算定にも活用されます。","nameEn":"Effective rainfall","summaryEn":"This is the amount of rainfall that is utilized for crop evapotranspiration (retained in the soil). It represents the precipitation that is actually useful for agriculture, excluding water lost through surface runoff, deep percolation, and field drainage.","detailEn":"Effective Rainfall Calculation Methods:\nMain calculation formulas recommended by FAO:\n1. FAO/USDA Method: Empirical formula based on soil water storage capacity\n   Pe = Monthly precipitation × (125 − 0.2×P) / 125 (when P ≦ 250mm)\n2. Fixed Percentage Method: Simple method considering a fixed percentage (usually 60-80%) of precipitation as effective\n3. Direct Measurement (soil moisture change): Most accurate but requires field observation\n\nRelationship between Effective Rainfall and Net Irrigation Requirements:\nNet Irrigation Requirements (NIR) = Crop Water Requirements (ET_c) − Effective Rainfall (Pe)\n→ The greater the effective rainfall, the more irrigation can be reduced\n\nFactors Affecting Effective Rainfall Variation:\n・Soil permeability and water retention capacity (sandy soils have low effectiveness due to high runoff and deep percolation)\n・Field slope (steep slopes have high runoff)\n・Rainfall intensity (short-duration intense rainfall has high runoff)\n・Soil moisture conditions before rainfall\n\nImportance in African Rainy Season Agriculture:\nEstimation of effective rainfall is necessary to evaluate whether rainy season precipitation can meet crop water requirements. It is also utilized in calculating the required amount of supplemental irrigation.","image":"","captionJa":"","captionEn":"","published":"","name3":"Pluviométrie efficace","summary3":"Il s'agit de la quantité de précipitations qui est utilisée pour l'évapotranspiration des cultures (retenue dans le sol). C'est la quantité de pluie réellement utile à l'agriculture, excluant l'eau perdue par ruissellement de surface, infiltration profonde et écoulement hors parcelle.","detail3":"Méthode de calcul de la précipitation efficace :\n\nPrincipales formules de calcul recommandées par la FAO :\n1. Méthode FAO/USDA : formule empirique basée sur la capacité de rétention d'eau du sol\n   Pe = précipitation mensuelle × (125 − 0,2×P) / 125 (pour P ≦ 250mm)\n2. Méthode du pourcentage fixe : méthode simplifiée considérant un pourcentage constant (généralement 60 à 80%) de la précipitation comme efficace\n3. Mesure directe (variation de l'humidité du sol) : la plus précise mais nécessite des observations de terrain\n\nRelation entre précipitation efficace et besoins en irrigation :\nBesoins nets d'irrigation (NIR) = Besoins en eau des cultures (ETc) − Précipitation efficace (Pe)\n→ Plus la précipitation efficace est importante, plus la quantité d'irrigation peut être réduite\n\nFacteurs de variation de la précipitation efficace :\n・ Perméabilité et capacité de rétention du sol (les sols sableux ont un faible taux d'efficacité en raison du ruissellement et de la percolation profonde importants)\n・ Pente de la parcelle (les pentes raides génèrent davantage de ruissellement)\n・ Intensité des précipitations (les pluies intenses de courte durée génèrent davantage de ruissellement)\n・ État d'humidité du sol avant les précipitations\n\nImportance pour l'agriculture de saison des pluies en Afrique :\nL'estimation de la précipitation efficace est nécessaire pour évaluer si les précipitations de la saison des pluies peuvent satisfaire les besoins en eau des cultures. Elle est également utilisée pour calculer les besoins d'irrigation d'appoint (Supplemental Irrigation).","caption3":"","images":[]},{"rowNum":43,"id":"042","catCode":"CAT02","nameJa":"水生産性","readingJa":"みずせいさんせい","summaryJa":"単位水量あたりの農業産出量（作物収量または農業所得）を表す指標です。限られた水資源から最大の農業生産を得るための効率性評価に使います。","detailJa":"水生産性の定義と単位：\n水生産性（WP）= 作物収量（kg）÷ 蒸発散量（m³ または mm）\n　単位：kg/m³（最も一般的）または kg/mm\n\n主要作物の水生産性（FAO参照値）：\n・小麦：0.6〜1.7 kg/m³\n・トウモロコシ：1.1〜2.7 kg/m³\n・水稲：0.6〜1.6 kg/m³\n・サトウキビ（糖分量）：5〜8 kg/m³\n・野菜（トマト）：4〜16 kg/m³（高付加価値）\n\n水生産性の向上戦略：\n・品種改良（同じ水で多収量の品種選択）\n・施肥管理の適正化（水分を有効活用させる土壌肥沃度向上）\n・精密灌漑（土壌水分センサー活用で水ストレスを最小化）\n・高付加価値作物への転換（同じ水量でより高い経済的リターン）\n\nアフリカでの位置づけ：\nIWMIの研究では、アフリカの多くの灌漑農地で水生産性がアジア・中東の先進農業地域の1/3〜1/2程度にとどまっており、品種・施肥・灌漑管理の改善により大幅な向上余地があるとされています。","nameEn":"Water productivity","summaryEn":"This is an indicator that represents agricultural output (crop yield or agricultural income) per unit of water. It is used to evaluate efficiency in obtaining maximum agricultural production from limited water resources.","detailEn":"Definition and Units of Water Productivity:\nWater Productivity (WP) = Crop Yield (kg) ÷ Evapotranspiration (m³ or mm)\nUnits: kg/m³ (most common) or kg/mm\n\nWater Productivity of Major Crops (FAO Reference Values):\n・Wheat: 0.6-1.7 kg/m³\n・Maize: 1.1-2.7 kg/m³\n・Rice: 0.6-1.6 kg/m³\n・Sugarcane (sugar content): 5-8 kg/m³\n・Vegetables (tomato): 4-16 kg/m³ (high value-added)\n\nStrategies for Improving Water Productivity:\n・Crop breeding (selection of high-yield varieties with same water use)\n・Optimization of fertilizer management (improving soil fertility for effective water utilization)\n・Precision irrigation (minimizing water stress through soil moisture sensor utilization)\n・Conversion to high value-added crops (higher economic returns with same water quantity)\n\nStatus in Africa:\nAccording to IWMI research, water productivity in many irrigated farmlands in Africa remains at about 1/3 to 1/2 of that in advanced agricultural regions of Asia and the Middle East, and it is indicated that there is significant potential for improvement through enhancement of crop varieties, fertilization, and irrigation management.","image":"","captionJa":"","captionEn":"","published":"","name3":"Productivité de l'eau","summary3":"Il s'agit d'un indicateur qui exprime la production agricole (rendement des cultures ou revenus agricoles) par unité de quantité d'eau. Il est utilisé pour évaluer l'efficacité dans l'obtention d'une production agricole maximale à partir de ressources hydriques limitées.","detail3":"Définition et unité de la productivité de l'eau :\nProductivité de l'eau (WP) = Rendement des cultures (kg) ÷ Évapotranspiration (m³ ou mm)\nUnité : kg/m³ (la plus courante) ou kg/mm\n\nProductivité de l'eau des principales cultures (valeurs de référence FAO) :\n・Blé : 0,6~1,7 kg/m³\n・Maïs : 1,1~2,7 kg/m³\n・Riz irrigué : 0,6~1,6 kg/m³\n・Canne à sucre (teneur en sucre) : 5~8 kg/m³\n・Légumes (tomate) : 4~16 kg/m³ (haute valeur ajoutée)\n\nStratégies d'amélioration de la productivité de l'eau :\n・Amélioration variétale (sélection de variétés à haut rendement avec la même quantité d'eau)\n・Optimisation de la gestion de la fertilisation (amélioration de la fertilité du sol pour une utilisation efficace de l'eau)\n・Irrigation de précision (utilisation de capteurs d'humidité du sol pour minimiser le stress hydrique)\n・Conversion vers des cultures à haute valeur ajoutée (retour économique plus élevé avec la même quantité d'eau)\n\nPosition en Afrique :\nSelon les recherches de l'IWMI, la productivité de l'eau dans de nombreuses terres agricoles irriguées d'Afrique reste à 1/3~1/2 de celle des régions agricoles avancées d'Asie et du Moyen-Orient, et il existe un potentiel d'amélioration substantiel grâce à l'amélioration des variétés, de la fertilisation et de la gestion de l'irrigation.","caption3":"","images":[]},{"rowNum":44,"id":"043","catCode":"CAT02","nameJa":"流出","readingJa":"りゅうしゅつ","summaryJa":"降雨のうち、土壌に浸透せず地表面を流れて河川・水路に流れ込む水の流れを指します。洪水設計・排水計画・水資源量の推定に欠かせない概念です。","detailJa":"流出の分類：\n1. 地表流去（表面流出）：土壌浸透速度を超えた雨が地表を流れる（ホートン流）\n2. 飽和地表流出：土壌が飽和して余分な降水が流れ出る（飽和面流出）\n3. 中間流（浅層地下水流出）：浸透した水が比較的浅い層を側方に流れる\n4. 基底流出（深層地下水流出）：地下水が徐々に河川に流れ出る\n\n流出量の算定手法：\n・合理式：Q = C × I × A（C：流出係数、I：降雨強度、A：集水面積）\n　→ 小規模排水路・農地排水設計に使用\n・SCS-CN法（米国土壌保全局）：土壌・土地利用条件から流出量を算定\n　→ 農業流域の洪水推定に広く利用\n\n農業への影響：\n・土壌侵食：地表流出により表土が失われる\n・肥料・農薬の流出：水質汚染の原因\n・洪水：排水路規模の設計基準\n\nアフリカでの流出管理：\n急勾配・表土が薄い・スコール型降雨という条件が重なるサブサハラアフリカでは地表流出が大きく、土壌侵食と水の損失が深刻です。等高線耕起・グラスウォーターウェイ・チェックダムによる流出制御が重要な対策です。","nameEn":"Outflow","summaryEn":"Surface runoff refers to the flow of water from rainfall that does not infiltrate into the soil but flows over the ground surface into rivers and waterways. It is an essential concept for flood design, drainage planning, and water resource estimation.","detailEn":"Classification of runoff:\n1. Surface runoff (overland flow): Rainfall exceeding soil infiltration rate flows over the ground surface (Hortonian flow)\n2. Saturation overland flow: Excess precipitation flows out when soil becomes saturated (saturation surface flow)\n3. Interflow (shallow subsurface flow): Infiltrated water flows laterally through relatively shallow layers\n4. Baseflow (deep groundwater flow): Groundwater gradually flows out to rivers\n\nRunoff calculation methods:\n・Rational method: Q = C × I × A (C: runoff coefficient, I: rainfall intensity, A: catchment area)\n　→ Used for small-scale drainage channels and agricultural drainage design\n・SCS-CN method (USDA Soil Conservation Service): Calculates runoff from soil and land use conditions\n　→ Widely used for flood estimation in agricultural watersheds\n\nAgricultural impacts:\n・Soil erosion: Topsoil is lost due to surface runoff\n・Fertilizer and pesticide runoff: Causes water pollution\n・Flooding: Design criteria for drainage channel capacity\n\nRunoff management in Africa:\nIn Sub-Saharan Africa, where steep slopes, thin topsoil, and squall-type rainfall conditions converge, surface runoff is significant, causing serious soil erosion and water loss. Runoff control through contour farming, grass waterways, and check dams are important countermeasures.","image":"","captionJa":"","captionEn":"","published":"","name3":"Fuite","summary3":"Il s'agit du flux d'eau provenant des précipitations qui ne s'infiltre pas dans le sol et s'écoule à la surface pour se déverser dans les cours d'eau et les canaux. C'est un concept indispensable pour la conception anti-inondation, la planification du drainage et l'estimation des ressources en eau.","detail3":"Classification du ruissellement :\n1. Ruissellement de surface (écoulement superficiel) : l'eau de pluie qui dépasse la vitesse d'infiltration du sol s'écoule à la surface (écoulement hortonien)\n2. Ruissellement de surface saturée : l'excès de précipitation s'écoule lorsque le sol est saturé (écoulement de surface saturée)\n3. Écoulement hypodermique (écoulement souterrain peu profond) : l'eau infiltrée s'écoule latéralement dans des couches relativement superficielles\n4. Écoulement de base (écoulement souterrain profond) : les eaux souterraines s'écoulent progressivement vers les cours d'eau\n\nMéthodes de calcul du débit de ruissellement :\n• Méthode rationnelle : Q = C × I × A (C : coefficient de ruissellement, I : intensité pluviométrique, A : surface du bassin versant)\n　→ Utilisée pour la conception de petits canaux de drainage et de drainage agricole\n• Méthode SCS-CN (Service de Conservation des Sols américain) : calcul du ruissellement basé sur les conditions de sol et d'utilisation des terres\n　→ Largement utilisée pour l'estimation des crues dans les bassins agricoles\n\nImpact sur l'agriculture :\n• Érosion du sol : perte de la couche arable due au ruissellement de surface\n• Ruissellement d'engrais et de pesticides : cause de pollution de l'eau\n• Inondations : critères de conception pour la taille des canaux de drainage\n\nGestion du ruissellement en Afrique :\nEn Afrique subsaharienne, où se combinent des conditions de pentes raides, de couches arables minces et de précipitations de type grain, le ruissellement de surface est important, et l'érosion du sol ainsi que la perte d'eau sont graves. Le contrôle du ruissellement par le labour en courbes de niveau, les voies d'eau enherbées et les barrages de retenue constitue des mesures importantes.","caption3":"","images":[]},{"rowNum":45,"id":"044","catCode":"CAT02","nameJa":"反復利用","readingJa":"はんぷくりよう","summaryJa":"灌漑用水として使用された後に回収・収集された水（排水・浸透水・余剰水）を再び農業に活用することです。水資源の有効利用と節水に貢献します。","detailJa":"反復利用の種類：\n1. 圃場排水の回収：圃場から排水された余剰水を集めて再灌漑\n2. 用水路浸透水の回収：水路から浸透した水が地下水として下流で利用\n3. 処理排水の農業利用：都市排水・農業排水を処理後に農業に再利用（WHOガイドライン準拠）\n4. 下流農家による上流排水の利用：自然流下で下流域の農家が上流の排水を利用\n\n水利用効率との関係：\n・圃場レベルの水利用効率は60〜70%でも、排水が再利用されればシステム全体の効率は高くなる\n・「見かけの損失」（浸透・流出）の多くが実は別の場所で利用されている\n\nアフリカでの事例：\nエジプトのナイルデルタでは、灌漑排水が繰り返し反復利用されており、実質的な用水利用効率がどこよりも高い地域のひとつです。ただし反復利用が進むほど塩分・栄養塩が蓄積するため、末端の水質管理が課題となります。\n\n処理排水の農業利用（水リサイクル）：\n都市周辺では処理済み下水を農業に再利用する取り組みが広がっています。WHOの2006年ガイドラインは安全な農業利用の基準を定めており、食の安全確保に向けたリスク管理の枠組みを提供しています。","nameEn":"Iterative use","summaryEn":"It is the practice of reusing water (drainage water, infiltration water, and surplus water) that has been recovered and collected after being used for irrigation purposes, applying it again for agricultural use. This contributes to the effective utilization of water resources and water conservation.","detailEn":"Types of Reuse:\n1. Recovery of field drainage: Collection and re-irrigation of surplus water drained from fields\n2. Recovery of canal seepage water: Water that has seeped from canals is utilized downstream as groundwater\n3. Agricultural use of treated wastewater: Reuse of treated urban and agricultural wastewater for agriculture (compliant with WHO guidelines)\n4. Use of upstream drainage by downstream farmers: Downstream farmers utilize upstream drainage through natural flow\n\nRelationship with Water Use Efficiency:\n・Even when field-level water use efficiency is 60-70%, overall system efficiency increases if drainage water is reused\n・Much of the \"apparent losses\" (seepage and runoff) are actually utilized elsewhere\n\nCase Study in Africa:\nIn Egypt's Nile Delta, irrigation drainage is repeatedly reused, making it one of the regions with the highest effective water use efficiency. However, as reuse progresses, salts and nutrients accumulate, making water quality management at the terminal ends a challenge.\n\nAgricultural Use of Treated Wastewater (Water Recycling):\nIn urban peripheries, initiatives to reuse treated sewage for agriculture are expanding. WHO's 2006 guidelines establish standards for safe agricultural use and provide a risk management framework for ensuring food safety.","image":"","captionJa":"","captionEn":"","published":"","name3":"Utilisation répétée","summary3":"Il s'agit de réutiliser en agriculture l'eau récupérée et collectée (eaux usées, eaux d'infiltration, eaux excédentaires) après son utilisation comme eau d'irrigation. Cela contribue à l'utilisation efficace des ressources en eau et aux économies d'eau.","detail3":"Types de réutilisation répétée :\n1. Récupération du drainage de parcelles : collecte des eaux excédentaires drainées des parcelles pour la réirrigation\n2. Récupération des eaux d'infiltration des canaux d'irrigation : les eaux infiltrées des canaux sont utilisées en aval comme eaux souterraines\n3. Utilisation agricole des eaux usées traitées : réutilisation en agriculture des eaux usées urbaines et agricoles après traitement (conforme aux directives de l'OMS)\n4. Utilisation par les agriculteurs en aval du drainage en amont : les agriculteurs des zones en aval utilisent le drainage en amont par écoulement gravitaire naturel\n\nRelation avec l'efficacité de l'utilisation de l'eau :\n・Même si l'efficacité de l'utilisation de l'eau au niveau des parcelles est de 60 à 70%, l'efficacité globale du système augmente si les eaux de drainage sont réutilisées\n・La plupart des « pertes apparentes » (infiltration et ruissellement) sont en réalité utilisées ailleurs\n\nExemple en Afrique :\nDans le delta du Nil en Égypte, les eaux de drainage d'irrigation sont réutilisées de manière répétée, ce qui en fait l'une des régions ayant la plus haute efficacité réelle d'utilisation de l'eau d'irrigation au monde. Cependant, plus la réutilisation répétée progresse, plus les sels et les nutriments s'accumulent, ce qui pose des défis pour la gestion de la qualité de l'eau en bout de système.\n\nUtilisation agricole des eaux usées traitées (recyclage de l'eau) :\nDans les zones périurbaines, les initiatives de réutilisation des eaux usées traitées pour l'agriculture se développent. Les directives de l'OMS de 2006 établissent des critères pour une utilisation agricole sûre et fournissent un cadre de gestion des risques pour assurer la sécurité alimentaire.","caption3":"","images":[]},{"rowNum":46,"id":"045","catCode":"CAT02","nameJa":"仮想用水量","readingJa":"かそうようすいりょう","summaryJa":"食料・製品の生産過程で消費された水の総量を「その食料・製品に内在する（仮想的に含まれる）水」として換算した概念です。バーチャルウォーター（Virtual Water）とも呼ばれます。","detailJa":"仮想用水量の算定：\n例：小麦1kgの生産に必要な水 ≈ 1,000〜2,000L\n　トウモロコシ1kg ≈ 900〜1,800L\n　牛肉1kg ≈ 10,000〜16,000L（飼料の水も含む）\n\n仮想用水と食料貿易：\n・水不足の国が水集約的な食料を輸入することは、実質的に他国の水を輸入していることになる（仮想水貿易）\n・例：エジプトが小麦を輸入することで、ナイル川水の節約に相当する水を「節水」できる\n・世界の農業用水の約26%が輸出食料の生産に使われているとされる（Hoekstra, 2011）\n\n水フットプリント：\n仮想用水量を消費者・企業・国家レベルで集計したものが「水フットプリント（Water Footprint）」。\n・ブルーウォーターフットプリント：地表水・地下水の消費量\n・グリーンウォーターフットプリント：降水・土壌水分の消費量\n・グレーウォーターフットプリント：汚染を中和するために必要な淡水量\n\nアフリカへの示唆：\n水資源の制約が大きいアフリカの国々が水集約的な作物（小麦・砂糖等）の輸出農業を推進することは、水安全保障のリスクになる可能性があります。水フットプリントの視点からの農業政策・貿易政策の再考が重要です。","nameEn":"Virtual water content","summaryEn":"This is a concept that calculates the total amount of water consumed in the production process of food and products as \"water inherent in (virtually contained in) that food and product.\" It is also called Virtual Water.","detailEn":"Calculation of Virtual Water Content:\nExamples: Water required to produce 1kg of wheat ≈ 1,000-2,000L\nCorn 1kg ≈ 900-1,800L\nBeef 1kg ≈ 10,000-16,000L (including water for feed)\n\nVirtual Water and Food Trade:\n・Water-scarce countries importing water-intensive food products effectively import water from other countries (virtual water trade)\n・Example: Egypt can \"save\" water equivalent to Nile River water conservation by importing wheat\n・Approximately 26% of global agricultural water is used for export food production (Hoekstra, 2011)\n\nWater Footprint:\nThe aggregation of virtual water content at consumer, corporate, and national levels is called the \"Water Footprint.\"\n・Blue Water Footprint: consumption of surface water and groundwater\n・Green Water Footprint: consumption of precipitation and soil moisture\n・Grey Water Footprint: volume of freshwater required to neutralize pollution\n\nImplications for Africa:\nAfrican countries with significant water resource constraints promoting export agriculture of water-intensive crops (wheat, sugar, etc.) may pose risks to water security. Reconsidering agricultural and trade policies from a water footprint perspective is crucial.","image":"","captionJa":"","captionEn":"","published":"","name3":"Volume d'eau virtuelle","summary3":"C'est un concept qui consiste à calculer la quantité totale d'eau consommée lors du processus de production d'aliments et de produits comme « l'eau intrinsèque (virtuellement contenue) dans ces aliments et produits ». On l'appelle également eau virtuelle (Virtual Water).","detail3":"Calcul de l'eau virtuelle :\nExemple : Eau nécessaire pour produire 1 kg de blé ≈ 1 000 à 2 000 L\n　1 kg de maïs ≈ 900 à 1 800 L\n　1 kg de bœuf ≈ 10 000 à 16 000 L (eau pour l'alimentation du bétail incluse)\n\nEau virtuelle et commerce alimentaire :\n• L'importation d'aliments à forte intensité hydrique par des pays en pénurie d'eau équivaut essentiellement à importer l'eau d'autres pays (commerce d'eau virtuelle)\n• Exemple : En important du blé, l'Égypte peut « économiser » une quantité d'eau équivalente à celle du Nil\n• Environ 26 % de l'eau agricole mondiale est utilisée pour la production d'aliments destinés à l'exportation (Hoekstra, 2011)\n\nEmpreinte hydrique :\nL'agrégation de l'eau virtuelle au niveau des consommateurs, des entreprises et des États constitue « l'empreinte hydrique (Water Footprint) ».\n• Empreinte hydrique bleue : consommation d'eaux de surface et souterraines\n• Empreinte hydrique verte : consommation des précipitations et de l'humidité du sol\n• Empreinte hydrique grise : quantité d'eau douce nécessaire pour neutraliser la pollution\n\nImplications pour l'Afrique :\nLa promotion de l'agriculture d'exportation de cultures à forte intensité hydrique (blé, sucre, etc.) par des pays africains confrontés à d'importantes contraintes en ressources hydriques pourrait constituer un risque pour la sécurité hydrique. Il est important de repenser les politiques agricoles et commerciales du point de vue de l'empreinte hydrique.","caption3":"","images":[]},{"rowNum":47,"id":"046","catCode":"CAT03","nameJa":"支線組合","readingJa":"しせんくみあい","summaryJa":"幹線水路から分岐した支線水路を利用する農家が組織する水利組合の単位です。支線水路の配水管理・維持管理を担う基本的な農家組織です。","detailJa":"支線組合の役割：\n・支線水路からの取水量・時間の調整と管理\n・支線水路の定期的な維持管理（清掃・補修）\n・会員農家への水配分ルールの決定・実施\n・水利費の徴収と維持管理費への充当\n\n日本における支線組合：\n日本では「土地改良区」の下部組織として支線組合・小組合が機能し、幹線管理（土地改良区）と圃場管理（農家個人）の中間的な機能を担います。\n\nアフリカの文脈：\nアフリカの灌漑スキームでは、水利用者組合（WUA）の中に支線別の小委員会（Tertiary Canal Committee等）が設けられることがあります。支線単位での意思決定と維持管理責任の明確化が、灌漑管理移譲の成功要因の一つとされています。支線組合の自律的な管理能力が、系統全体の持続的機能の鍵を握ります。","nameEn":"Branch line association","summaryEn":"This is the unit of water user associations organized by farmers who utilize branch canals that diverge from main canals. It is the basic farmer organization responsible for water distribution management and maintenance of branch canals.","detailEn":"Role of Branch Canal Associations:\n・Adjustment and management of water intake volume and timing from branch canals\n・Regular maintenance of branch canals (cleaning and repair)\n・Determination and implementation of water distribution rules for member farmers\n・Collection of water charges and allocation to maintenance costs\n\nBranch Canal Associations in Japan:\nIn Japan, branch canal associations and small associations function as subordinate organizations under \"Land Improvement Districts,\" serving intermediate functions between main canal management (Land Improvement Districts) and field management (individual farmers).\n\nAfrican Context:\nIn African irrigation schemes, tertiary-level subcommittees (such as Tertiary Canal Committee) may be established within Water Users' Associations (WUA). Clarification of decision-making and maintenance responsibilities at the branch canal level is considered one of the success factors for irrigation management transfer. The autonomous management capacity of branch canal associations holds the key to the sustainable functioning of the entire system.","image":"","captionJa":"","captionEn":"","published":"","name3":"Union des lignes secondaires","summary3":"Il s'agit de l'unité d'association d'irrigation organisée par les exploitants agricoles qui utilisent les canaux secondaires dérivés du canal principal. C'est l'organisation agricole de base chargée de la gestion de la distribution d'eau et de l'entretien des canaux secondaires.","detail3":"Rôle des associations de canaux secondaires :\n・ Ajustement et gestion du volume et du temps de prélèvement d'eau depuis les canaux secondaires\n・ Maintenance périodique des canaux secondaires (nettoyage et réparations)\n・ Détermination et mise en œuvre des règles de distribution d'eau aux exploitations agricoles membres\n・ Collecte des redevances hydrauliques et affectation aux frais de maintenance\n\nAssociations de canaux secondaires au Japon :\nAu Japon, les associations de canaux secondaires et les petites associations fonctionnent comme organisations subordonnées aux « districts d'amélioration foncière » et assurent une fonction intermédiaire entre la gestion des canaux principaux (districts d'amélioration foncière) et la gestion parcellaire (exploitants agricoles individuels).\n\nContexte africain :\nDans les schémas d'irrigation africains, des sous-comités par canal secondaire (Comité de Canal Tertiaire, etc.) peuvent être établis au sein des associations d'usagers de l'eau (WUA). La clarification de la prise de décision et des responsabilités de maintenance au niveau des canaux secondaires est considérée comme l'un des facteurs de succès du transfert de gestion de l'irrigation. La capacité de gestion autonome des associations de canaux secondaires détient la clé du fonctionnement durable de l'ensemble du système.","caption3":"","images":[]},{"rowNum":48,"id":"047","catCode":"CAT03","nameJa":"水利用者組合","readingJa":"みずりようしゃくみあい","summaryJa":"灌漑施設を利用する農家が自主的に組織する団体で、水の配分・維持管理・費用回収等を行う農家主体の管理組織です。参加型灌漑管理の中核として世界各地で普及しています。","detailJa":"水利用者組合（WUA：Water Users Association）の機能：\n・灌漑用水の配分計画の策定と実施\n・水路・施設の維持管理（清掃・補修）の組織化\n・水利費（維持管理費・運営費）の徴収と管理\n・農家間の紛争調停\n・政府機関・NGOとの交渉・連携\n\n効果的なWUAの条件：\n・明確な会員資格・意思決定ルール・財務管理\n・全農家の参加（ジェンダー含む女性農家の参加）\n・維持管理費用が適切に回収・使用される仕組み\n・政府からの法的認定・支援\n\nアフリカでのWUA設立の課題と成功事例：\n多くのアフリカ諸国でWUAの設立が推進されていますが、「名目上の組合」にとどまり実質的な機能を果たしていない事例も多いです。エチオピアのアワッシュ川流域、マリのオフィス・デュ・ニジェール、タンザニアのキリマンジャロ地方などで機能的なWUAの成功事例が報告されています。JICA・世界銀行がWUA強化を支援しています。","nameEn":"Water Users' Association","summaryEn":"This is a farmer-led management organization voluntarily formed by farmers who use irrigation facilities, responsible for water distribution, maintenance and management, and cost recovery. It has spread worldwide as the core of participatory irrigation management.","detailEn":"Functions of Water Users Association (WUA):\n- Development and implementation of irrigation water allocation plans\n- Organization of maintenance and management of canals and facilities (cleaning and repair)\n- Collection and management of water fees (maintenance and operating costs)\n- Mediation of disputes among farmers\n- Negotiation and cooperation with government agencies and NGOs\n\nConditions for effective WUAs:\n- Clear membership qualifications, decision-making rules, and financial management\n- Participation of all farmers (including participation of female farmers with gender considerations)\n- Mechanisms for appropriate collection and utilization of maintenance costs\n- Legal recognition and support from the government\n\nChallenges and Success Cases of WUA Establishment in Africa:\nAlthough the establishment of WUAs is being promoted in many African countries, there are numerous cases where they remain \"nominal associations\" without fulfilling substantial functions. Successful cases of functional WUAs have been reported in Ethiopia's Awash River Basin, Mali's Office du Niger, and Tanzania's Kilimanjaro region. JICA and the World Bank are supporting WUA strengthening initiatives.","image":"","captionJa":"","captionEn":"","published":"","name3":"Association des usagers de l'eau","summary3":"Il s'agit d'une organisation de gestion dirigée par les agriculteurs, formée volontairement par les exploitants agricoles utilisant les infrastructures d'irrigation, qui se charge de la répartition de l'eau, de la maintenance et du recouvrement des coûts. Elle se répand dans le monde entier en tant que pilier de la gestion participative de l'irrigation.","detail3":"Fonctions de l'Association des Usagers de l'Eau (WUA : Water Users Association) :\n• Élaboration et mise en œuvre des plans de répartition de l'eau d'irrigation\n• Organisation de la maintenance des canaux et installations (nettoyage, réparations)\n• Collecte et gestion des redevances hydrauliques (frais de maintenance et d'exploitation)\n• Médiation des conflits entre agriculteurs\n• Négociation et coopération avec les organismes gouvernementaux et les ONG\n\nConditions d'efficacité d'une WUA :\n• Règles claires concernant l'adhésion, la prise de décision et la gestion financière\n• Participation de tous les agriculteurs (y compris les femmes agricultrices dans une perspective de genre)\n• Mécanisme permettant une collecte et une utilisation appropriées des coûts de maintenance\n• Reconnaissance légale et soutien du gouvernement\n\nDéfis et cas de succès de l'établissement de WUA en Afrique :\nBien que l'établissement de WUA soit promu dans de nombreux pays africains, de nombreux cas restent des « associations nominales » sans remplir de fonctions substantielles. Des cas de succès de WUA fonctionnelles ont été rapportés dans le bassin de l'Awash en Éthiopie, à l'Office du Niger au Mali, et dans la région du Kilimandjaro en Tanzanie. La JICA et la Banque mondiale soutiennent le renforcement des WUA.","caption3":"","images":[]},{"rowNum":49,"id":"048","catCode":"CAT03","nameJa":"灌漑管理委員会","readingJa":"かんがいかんりいいんかい","summaryJa":"灌漑スキーム全体の管理・意思決定を担う組織で、行政機関・農家代表・関係者が参加して灌漑水の配分・施設管理・運営方針を決定します。","detailJa":"灌漑管理委員会の構成と機能：\n・構成：政府灌漑機関代表、水利用者組合代表、地方行政代表、その他関係者\n・主要機能：\n　- 年間・季節別の水配分計画の承認\n　- 維持管理予算の審議・承認\n　- 灌漑管理上の紛争解決\n　- 水利費の設定・改定\n　- 灌漑システムの長期整備・改良計画の策定\n\n日本の管理体制との比較：\n日本では「土地改良区」が法人として施設管理の主体を担い、農林水産省・都道府県の指導のもとで運営されます。\n\nアフリカでの意義：\n農家代表と政府が共同で意思決定する参加型の灌漑管理委員会は、灌漑管理移譲の重要なステップです。意思決定の透明性・説明責任の確保が信頼構築の前提であり、JICAなどの技術支援ではこの組織強化が優先課題のひとつとされています。","nameEn":"Irrigation Management Committee","summaryEn":"An organization responsible for the management and decision-making of the entire irrigation scheme, where government agencies, farmer representatives, and stakeholders participate to determine irrigation water allocation, facility management, and operational policies.","detailEn":"Composition and Functions of Irrigation Management Committee:\n• Composition: Government irrigation agency representatives, water user association representatives, local government representatives, and other stakeholders\n• Main Functions:\n  - Approval of annual and seasonal water allocation plans\n  - Review and approval of maintenance and management budgets\n  - Resolution of irrigation management disputes\n  - Setting and revision of irrigation fees\n  - Formulation of long-term development and improvement plans for irrigation systems\n\nComparison with Japan's Management System:\nIn Japan, \"Land Improvement Districts\" serve as legal entities responsible for facility management, operating under the guidance of the Ministry of Agriculture, Forestry and Fisheries and prefectural governments.\n\nSignificance in Africa:\nParticipatory irrigation management committees where farmer representatives and government jointly make decisions represent an important step in irrigation management transfer. Ensuring transparency and accountability in decision-making is a prerequisite for building trust, and strengthening these organizations is considered one of the priority issues in technical assistance programs such as those provided by JICA.","image":"","captionJa":"","captionEn":"","published":"","name3":"Comité de gestion de l'irrigation","summary3":"L'organisation responsable de la gestion et de la prise de décision pour l'ensemble du système d'irrigation, où participent les organismes administratifs, les représentants des agriculteurs et les parties prenantes concernées pour décider de la répartition de l'eau d'irrigation, de la gestion des installations et des politiques opérationnelles.","detail3":"Composition et fonctions du comité de gestion de l'irrigation :\n・Composition : représentants des organismes gouvernementaux d'irrigation, représentants des associations d'usagers de l'eau, représentants de l'administration locale, autres parties prenantes\n・Fonctions principales :\n　- Approbation des plans de distribution d'eau annuels et saisonniers\n　- Examen et approbation du budget de maintenance\n　- Résolution des conflits liés à la gestion de l'irrigation\n　- Fixation et révision des redevances hydrauliques\n　- Élaboration des plans d'aménagement et d'amélioration à long terme du système d'irrigation\n\nComparaison avec le système de gestion japonais :\nAu Japon, les « associations d'amélioration foncière » assument en tant que personnes morales la responsabilité principale de la gestion des installations, et fonctionnent sous la supervision du ministère de l'Agriculture, des Forêts et de la Pêche et des préfectures.\n\nSignification en Afrique :\nLes comités de gestion de l'irrigation participatifs où les représentants des agriculteurs et le gouvernement prennent des décisions conjointement constituent une étape importante du transfert de gestion de l'irrigation. La garantie de la transparence et de la responsabilité dans la prise de décision est un prérequis pour l'établissement de la confiance, et le renforcement de cette organisation est considéré comme l'une des priorités dans le soutien technique de la JICA et d'autres organismes.","caption3":"","images":[]},{"rowNum":50,"id":"049","catCode":"CAT03","nameJa":"土地改良区（LID)","readingJa":"とちかいりょうく","summaryJa":"日本の農業農村整備事業の実施・管理を行う特殊法人で、農地・農業用水施設の整備・維持管理を担う組合組織です。土地改良法（1949年）に基づき設立されます。","detailJa":"土地改良区の役割：\n・農業用水の取水・配分・維持管理\n・農業水利施設（水路・ダム・ポンプ場等）の管理\n・農地整備（圃場整備・土地改良）の計画・実施\n・水利費（維持管理費）の賦課・徴収\n\n組織の特徴：\n・受益農家が強制加入する組合組織（一定の賛成票で設立）\n・理事会・総代会による民主的意思決定\n・国・都道府県から補助金を受けて事業を実施\n・現在の全国土地改良区数：約4,200区（農林水産省, 2023）\n\nアフリカへの示唆：\nアフリカ各国では「土地改良区」に相当する農家自主管理組織の確立が課題です。日本の土地改良区制度は、農家が主体的に施設を管理し水利費を負担する持続的モデルとして、アジア・アフリカの農業開発支援の参考として紹介されています。ただし日本の制度をそのまま適用するのではなく、現地の慣習・法制度に適合した形への適応が重要です。","nameEn":"Land Improvement District (LID)","summaryEn":"This is a special corporation that implements and manages Japan's agricultural and rural development projects, and is a cooperative organization responsible for the development and maintenance of farmland and agricultural water facilities. It is established based on the Land Improvement Act (1949).","detailEn":"Roles of Land Improvement Districts:\n・Water intake, distribution, and maintenance management for agricultural use\n・Management of agricultural water facilities (irrigation channels, dams, pumping stations, etc.)\n・Planning and implementation of farmland development (field consolidation, land improvement)\n・Assessment and collection of water charges (maintenance and management fees)\n\nOrganizational Characteristics:\n・Cooperative organization with mandatory membership for beneficiary farmers (established with a certain number of affirmative votes)\n・Democratic decision-making through board of directors and general assembly\n・Implementation of projects with subsidies from national and prefectural governments\n・Current number of land improvement districts nationwide: approximately 4,200 districts (Ministry of Agriculture, Forestry and Fisheries, 2023)\n\nImplications for Africa:\nEstablishing farmer self-management organizations equivalent to \"land improvement districts\" is a challenge in African countries. Japan's land improvement district system is introduced as a reference for agricultural development assistance in Asia and Africa, serving as a sustainable model where farmers take initiative in facility management and bear water charges. However, it is important to adapt the system to local customs and legal frameworks rather than directly applying the Japanese system as is.","image":"","captionJa":"","captionEn":"","published":"","name3":"District d'amélioration foncière (LID)","summary3":"Il s'agit d'une organisation corporative de type société publique spécialisée qui met en œuvre et gère les projets d'aménagement agricole et rural au Japon, et qui est chargée de l'aménagement et de la maintenance des terres agricoles et des installations d'irrigation. Elle est établie conformément à la Loi sur l'amélioration foncière (1949).","detail3":"Rôle des associations d'amélioration foncière :\n• Captage, répartition et maintenance des eaux agricoles\n• Gestion des infrastructures hydrauliques agricoles (canaux, barrages, stations de pompage, etc.)\n• Planification et mise en œuvre de l'aménagement des terres agricoles (aménagement parcellaire, amélioration foncière)\n• Imposition et perception des redevances hydrauliques (frais de maintenance)\n\nCaractéristiques organisationnelles :\n• Organisation coopérative à adhésion obligatoire pour les agriculteurs bénéficiaires (création par un certain nombre de votes favorables)\n• Prise de décision démocratique par le conseil d'administration et l'assemblée des représentants\n• Mise en œuvre de projets avec des subventions de l'État et des préfectures\n• Nombre actuel d'associations d'amélioration foncière au niveau national : environ 4 200 associations (Ministère de l'Agriculture, des Forêts et de la Pêche, 2023)\n\nImplications pour l'Afrique :\nDans les pays africains, l'établissement d'organisations d'auto-gestion agricole équivalentes aux « associations d'amélioration foncière » constitue un défi. Le système japonais des associations d'amélioration foncière est présenté comme un modèle durable où les agriculteurs gèrent de manière autonome les infrastructures et supportent les coûts hydrauliques, servant de référence pour le soutien au développement agricole en Asie et en Afrique. Cependant, plutôt que d'appliquer directement le système japonais, il est important de l'adapter aux coutumes et systèmes juridiques locaux.","caption3":"","images":[]},{"rowNum":51,"id":"050","catCode":"CAT03","nameJa":"運営維持管理","readingJa":"うんえいいじかんり","summaryJa":"灌漑施設や農業水利施設が機能し続けるために行う、日常的な運転・管理操作（運営）と施設の損傷・劣化を防ぎ修復する活動（維持管理）の総称です。英語ではO&M（Operation & Maintenance）と表記されます。","detailJa":"O&Mの構成：\n1. 運営（Operation）：\n・水門・バルブ・ポンプの日常的な操作\n・灌漑スケジュールに従った配水管理\n・水量・水位の監視・記録\n\n2. 定期維持管理（Routine Maintenance）：\n・水路の除草・泥土除去（清掃）\n・小規模な補修（亀裂・漏水箇所の修繕）\n・ゲート・バルブの潤滑・点検\n\n3. 定期的大規模補修（Periodic Maintenance）：\n・水路ライニングの補修・更新\n・ポンプ・機械設備のオーバーホール\n・土木施設の大規模補修\n\nアフリカの「O&M危機」：\n多くのアフリカのドナー支援灌漑施設が、完工後5〜10年で「O&Mが機能しない」状態に陥っています。原因は：\n①O&M費用の予算確保ができていない\n②農家から水利費が十分回収できていない\n③技術者・管理者の能力不足\n④スペアパーツの調達困難\n\n持続的O&Mのための条件：\n十分な水利費回収、明確な管理責任、技術訓練された維持管理要員、スペアパーツの入手性確保が不可欠です。","nameEn":"Operations and Maintenance","summaryEn":"This is a general term for the routine operation and management activities (operation) carried out to ensure the continued functioning of irrigation facilities and agricultural water infrastructure, as well as activities to prevent and repair facility damage and deterioration (maintenance). In English, this is expressed as O&M (Operation & Maintenance).","detailEn":"Composition of O&M:\n1. Operation:\n・Daily operation of gates, valves, and pumps\n・Water distribution management according to irrigation schedules\n・Monitoring and recording of water flow and water levels\n\n2. Routine Maintenance:\n・Weeding and sediment removal (cleaning) of canals\n・Minor repairs (fixing cracks and water leakage points)\n・Lubrication and inspection of gates and valves\n\n3. Periodic Maintenance:\n・Repair and renewal of canal lining\n・Overhaul of pumps and mechanical equipment\n・Major repairs of civil engineering facilities\n\nO&M Crisis in Africa:\nMany donor-supported irrigation facilities in Africa fall into a state where \"O&M does not function\" within 5-10 years after completion. The causes are:\n①Inability to secure budget for O&M costs\n②Insufficient collection of water user fees from farmers\n③Lack of capacity among engineers and managers\n④Difficulty in procuring spare parts\n\nConditions for Sustainable O&M:\nSufficient water user fee collection, clear management responsibilities, technically trained maintenance personnel, and ensuring availability of spare parts are essential.","image":"","captionJa":"","captionEn":"","published":"","name3":"Gestion et maintenance opérationnelles","summary3":"Les opérations et la maintenance (O&M) désignent l'ensemble des activités comprenant les opérations quotidiennes de fonctionnement et de gestion pour assurer la continuité du fonctionnement des installations d'irrigation et des ouvrages hydrauliques agricoles, ainsi que les activités de prévention et de réparation des dommages et de la détérioration de ces installations. En anglais, cela s'écrit O&M (Operation & Maintenance).","detail3":"Composition de l'E&M :\n\n1. Exploitation (Operation) :\n・Manœuvre quotidienne des vannes, valves et pompes\n・Gestion de la distribution d'eau selon le calendrier d'irrigation\n・Surveillance et enregistrement du débit et du niveau d'eau\n\n2. Maintenance routinière (Routine Maintenance) :\n・Désherbage et enlèvement des sédiments des canaux (nettoyage)\n・Réparations mineures (réfection des fissures et des fuites)\n・Lubrification et inspection des vannes et valves\n\n3. Maintenance périodique majeure (Periodic Maintenance) :\n・Réparation et renouvellement du revêtement des canaux\n・Révision générale des pompes et équipements mécaniques\n・Réparations majeures des ouvrages de génie civil\n\nLa « crise E&M » en Afrique :\nDe nombreuses installations d'irrigation financées par des bailleurs de fonds en Afrique tombent dans un état de « dysfonctionnement de l'E&M » 5 à 10 ans après leur achèvement. Les causes sont :\n①Absence de budget garanti pour les coûts d'E&M\n②Recouvrement insuffisant des redevances hydrauliques auprès des agriculteurs\n③Capacités insuffisantes des techniciens et gestionnaires\n④Difficultés d'approvisionnement en pièces de rechange\n\nConditions pour un E&M durable :\nUn recouvrement suffisant des redevances hydrauliques, des responsabilités de gestion claires, un personnel de maintenance formé techniquement et la garantie de disponibilité des pièces de rechange sont indispensables.","caption3":"","images":[]},{"rowNum":52,"id":"051","catCode":"CAT03","nameJa":"参加型灌漑管理","readingJa":"さんかがたかんかいかんり","summaryJa":"灌漑施設の管理・意思決定に受益農家が主体的に参加する灌漑管理の方式です。英語ではPIM（Participatory Irrigation Management）と呼ばれ、1980〜90年代以降に世界的に普及しました。","detailJa":"PIMの背景と理念：\n・従来の「政府主導型管理」では農家の主体性が欠如し、施設維持管理が機能しない問題が多発\n・農家が管理に参加することで当事者意識が高まり、維持管理の持続性が向上するという考え方\n・農家のニーズを管理に反映することで、水配分の公平性と効率が向上\n\nPIMの段階：\n1. 情報共有：農家に施設情報・水配分情報を開示\n2. 協議：管理方針の決定に農家意見を取り入れる\n3. 管理参加：特定の管理作業を農家組合に委ねる\n4. 管理移譲（IMT）：施設管理の全責任を農家組織に移転\n\nPIMの効果（世界的な評価）：\n成功事例ではO&Mコスト削減・施設状態の改善・農家収入向上が確認されています。ただし農家組織の能力・ガバナンス次第で成否が大きく異なります。\n\nアフリカでの事例：\nJICA等の支援でマダガスカル・マリ・エチオピアなどでPIMが導入されており、水利用者組合の組織化と能力強化を通じた灌漑管理改善が進められています。","nameEn":"Participatory Irrigation Management","summaryEn":"This is an irrigation management system where beneficiary farmers proactively participate in the management and decision-making of irrigation facilities. It is called PIM (Participatory Irrigation Management) in English and has spread globally since the 1980s and 1990s.","detailEn":"Background and Philosophy of PIM:\n• Conventional \"government-led management\" often results in lack of farmer autonomy and frequent failures in facility maintenance and management\n• The concept that farmer participation in management enhances ownership consciousness and improves sustainability of maintenance and management\n• Reflecting farmers' needs in management improves fairness and efficiency of water distribution\n\nStages of PIM:\n1. Information sharing: Disclosure of facility information and water distribution information to farmers\n2. Consultation: Incorporating farmer opinions in management policy decisions\n3. Management participation: Entrusting specific management tasks to farmer associations\n4. Management transfer (IMT): Transfer of full responsibility for facility management to farmer organizations\n\nEffects of PIM (Global evaluation):\nSuccessful cases have confirmed O&M cost reduction, facility condition improvement, and farmer income enhancement. However, success varies greatly depending on the capacity and governance of farmer organizations.\n\nCases in Africa:\nPIM has been introduced in Madagascar, Mali, Ethiopia and other countries with support from JICA and others, promoting irrigation management improvement through organization and capacity building of water user associations.","image":"","captionJa":"","captionEn":"","published":"","name3":"Gestion participative de l'irrigation","summary3":"Il s'agit d'un système de gestion de l'irrigation où les agriculteurs bénéficiaires participent de manière proactive à la gestion et à la prise de décision concernant les infrastructures d'irrigation. En anglais, cela s'appelle PIM (Participatory Irrigation Management) et s'est répandu mondialement depuis les années 1980-90.","detail3":"Contexte et philosophie de la PIM :\n・La « gestion dirigée par le gouvernement » traditionnelle entraîne fréquemment des problèmes de dysfonctionnement de la maintenance des infrastructures en raison du manque d'initiative des agriculteurs\n・Conception selon laquelle la participation des agriculteurs à la gestion renforce leur sentiment d'appropriation et améliore la durabilité de la maintenance\n・L'intégration des besoins des agriculteurs dans la gestion améliore l'équité et l'efficacité de la répartition de l'eau\n\nÉtapes de la PIM :\n1. Partage d'information : divulgation aux agriculteurs des informations sur les infrastructures et la répartition de l'eau\n2. Consultation : intégration des opinions des agriculteurs dans la prise de décision concernant les politiques de gestion\n3. Participation à la gestion : confier certaines tâches de gestion spécifiques aux associations d'agriculteurs\n4. Transfert de gestion (IMT) : transfert de la responsabilité complète de la gestion des infrastructures aux organisations d'agriculteurs\n\nEffets de la PIM (évaluation mondiale) :\nDans les cas de réussite, une réduction des coûts d'exploitation et de maintenance, une amélioration de l'état des infrastructures et une augmentation des revenus des agriculteurs ont été confirmées. Cependant, le succès ou l'échec varie considérablement selon les capacités et la gouvernance des organisations d'agriculteurs.\n\nCas en Afrique :\nAvec le soutien de la JICA et d'autres organismes, la PIM a été introduite à Madagascar, au Mali, en Éthiopie et ailleurs, et l'amélioration de la gestion de l'irrigation progresse grâce à l'organisation et au renforcement des capacités des associations d'usagers de l'eau.","caption3":"","images":[]},{"rowNum":53,"id":"052","catCode":"CAT03","nameJa":"農家主導灌漑","readingJa":"のうかしゅどうかんがい","summaryJa":"農家または農家組合が独自に企画・投資・管理するインフォーマルな灌漑を指します。政府・ドナーの支援を受けない農家自身の水確保の取り組みで、アフリカで急速に拡大しています。","detailJa":"農家主導灌漑（Farmer-managed Irrigation / Private Irrigation）の特徴：\n・小規模ポンプ・点滴灌漑・雨水集水などを農家が自己資金で購入・設置\n・市場向け野菜・果物など高収益作物を栽培\n・農家が完全な意思決定権と管理責任を持つ\n・政府の計画・認可なしに展開（非公式セクター）\n\nアフリカでの急拡大の背景：\n・ソーラーポンプ・小型ポンプ・点滴灌漑の価格低下\n・市場（都市）への農産物需要の拡大\n・零細農家でも事業として成り立つ収益性\n・マイクロファイナンスによる農機・灌漑機材への融資\n\n代表的な事例：\n・ケニア：エボール平原での農家個人によるソーラーポンプ灌漑の拡大\n・ガーナ：Accra周辺のfringe agriculture（周辺農業）での農家主導野菜栽培\n・ニジェール：Maradi周辺でのペダルポンプを使った乾季野菜生産\n\n政策的課題：\n農家主導灌漑の急拡大は水資源の無計画な開発につながるリスクがあるため、水資源管理の制度整備と農家主導の柔軟性を両立する政策が必要です。","nameEn":"Farmer-led irrigation","summaryEn":"This refers to informal irrigation that is independently planned, invested in, and managed by farmers or farmer associations. It is a water security initiative by farmers themselves without government or donor support, and is rapidly expanding in Africa.","detailEn":"Characteristics of Farmer-managed Irrigation / Private Irrigation:\n・Farmers purchase and install small-scale pumps, drip irrigation, and rainwater harvesting systems with their own funds\n・Cultivation of high-value crops such as vegetables and fruits for market\n・Farmers have complete decision-making authority and management responsibility\n・Development without government planning or approval (informal sector)\n\nBackground of Rapid Expansion in Africa:\n・Price reduction of solar pumps, small pumps, and drip irrigation systems\n・Expansion of agricultural product demand in markets (urban areas)\n・Profitability that makes business viable even for smallholder farmers\n・Financing for agricultural machinery and irrigation equipment through microfinance\n\nRepresentative Examples:\n・Kenya: Expansion of solar pump irrigation by individual farmers in the Ewaso Narok Plain\n・Ghana: Farmer-led vegetable cultivation in fringe agriculture around Accra\n・Niger: Dry season vegetable production using pedal pumps around Maradi\n\nPolicy Challenges:\nThe rapid expansion of farmer-managed irrigation poses risks of unplanned water resource development, therefore policies that balance water resource management institutional development with the flexibility of farmer-led initiatives are necessary.","image":"","captionJa":"","captionEn":"","published":"","name3":"Irrigation menée par les agriculteurs","summary3":"Il s'agit d'une irrigation informelle planifiée, financée et gérée de manière autonome par les agriculteurs ou les associations d'agriculteurs. Cette initiative d'approvisionnement en eau menée par les agriculteurs eux-mêmes, sans soutien gouvernemental ni aide des bailleurs de fonds, se développe rapidement en Afrique.","detail3":"Caractéristiques de l'irrigation gérée par les agriculteurs (Farmer-managed Irrigation / Private Irrigation) :\n・ Achat et installation par les agriculteurs avec leurs propres fonds de petites pompes, irrigation goutte-à-goutte, collecte d'eau de pluie, etc.\n・ Culture de productions à haute rentabilité comme les légumes et fruits destinés au marché\n・ Les agriculteurs détiennent la complète autorité décisionnelle et la responsabilité de gestion\n・ Développement sans planification ni autorisation gouvernementale (secteur informel)\n\nContexte de l'expansion rapide en Afrique :\n・ Baisse des prix des pompes solaires, petites pompes et irrigation goutte-à-goutte\n・ Expansion de la demande de produits agricoles vers les marchés (urbains)\n・ Rentabilité permettant aux petits exploitants agricoles de constituer une activité viable\n・ Financement d'équipements agricoles et d'irrigation par la microfinance\n\nExemples représentatifs :\n・ Kenya : expansion de l'irrigation par pompes solaires menée par des agriculteurs individuels dans la plaine d'Ewaso\n・ Ghana : culture maraîchère menée par les agriculteurs dans la fringe agriculture (agriculture périphérique) autour d'Accra\n・ Niger : production de légumes de saison sèche utilisant des pompes à pédale autour de Maradi\n\nEnjeux politiques :\nL'expansion rapide de l'irrigation gérée par les agriculteurs présente le risque de conduire à un développement non planifié des ressources en eau, nécessitant donc des politiques conciliant l'aménagement institutionnel de la gestion des ressources hydriques et la flexibilité de l'approche menée par les agriculteurs.","caption3":"","images":[]},{"rowNum":54,"id":"053","catCode":"CAT03","nameJa":"農業イノベーションプラットフォーム","readingJa":"のうぎょうイノベーションプラットホーム","summaryJa":"農業に関わる多様なアクター（農家・研究機関・政府・民間企業・NGO等）が連携して農業課題を解決し、技術・知識の普及を促進するための対話・協力の場です。","detailJa":"農業イノベーションプラットフォーム（AIP）の概念：\n・英語：Agricultural Innovation Platform（AIP）\n・農業研究の成果を農家に届けるための「線形モデル（研究→普及→農家）」の限界を克服するため開発\n・複数の関係者が定期的に集まり、現場の課題解決策を共同で探索・実験・普及する\n\nAIPの主要な構成員：\n・農家・農家組合（ニーズと現場知識の提供）\n・農業研究機関（技術・知識の提供）\n・農業普及機関（情報・訓練の提供）\n・地方政府（政策・資金・インフラ）\n・民間企業（市場・資材・機材）\n・NGO・ドナー（資金・能力強化）\n\nAIPの活動例：\n・灌漑用水の新技術のテストと農家への普及\n・市場情報の収集・共有\n・農家の課題解決のための参加型研究（Participatory Action Research）\n\nアフリカでの展開：\nFAO・CTA・CGIAR傘下の国際農業研究機関がアフリカ各地でAIPを設立・支援しています。エチオピア・ウガンダ・ザンビアなどで農業水管理の改善にAIPが活用された事例があります。","nameEn":"Agricultural Innovation Platform","summaryEn":"It is a platform for dialogue and cooperation where diverse actors involved in agriculture (farmers, research institutions, government, private companies, NGOs, etc.) collaborate to solve agricultural challenges and promote the dissemination of technology and knowledge.","detailEn":"Concept of Agricultural Innovation Platform (AIP):\n・English: Agricultural Innovation Platform (AIP)\n・Developed to overcome the limitations of the \"linear model (research → extension → farmers)\" for delivering agricultural research results to farmers\n・Multiple stakeholders meet regularly to jointly explore, experiment, and disseminate solutions to field challenges\n\nKey constituents of AIP:\n・Farmers/farmer associations (providing needs and field knowledge)\n・Agricultural research institutions (providing technology and knowledge)\n・Agricultural extension agencies (providing information and training)\n・Local government (policy, funding, and infrastructure)\n・Private companies (market, materials, and equipment)\n・NGOs and donors (funding and capacity building)\n\nExamples of AIP activities:\n・Testing new irrigation technologies and disseminating them to farmers\n・Collection and sharing of market information\n・Participatory Action Research for solving farmers' challenges\n\nDevelopment in Africa:\nFAO, CTA, and international agricultural research institutions under CGIAR have established and supported AIPs across Africa. There are cases where AIPs have been utilized for improving agricultural water management in countries such as Ethiopia, Uganda, and Zambia.","image":"","captionJa":"","captionEn":"","published":"","name3":"Plateforme d'innovation agricole","summary3":"C'est un espace de dialogue et de coopération où divers acteurs impliqués dans l'agriculture (agriculteurs, institutions de recherche, gouvernement, entreprises privées, ONG, etc.) collaborent pour résoudre les défis agricoles et promouvoir la diffusion des technologies et des connaissances.","detail3":"Concept de la Plateforme d'Innovation Agricole (PIA) :\n・Anglais : Agricultural Innovation Platform (AIP)\n・Développée pour surmonter les limites du « modèle linéaire (recherche → vulgarisation → agriculteurs) » destiné à transmettre les résultats de la recherche agricole aux agriculteurs\n・Plusieurs parties prenantes se réunissent régulièrement pour explorer, expérimenter et diffuser conjointement des solutions aux défis du terrain\n\nPrincipaux membres de la PIA :\n・Agriculteurs et associations d'agriculteurs (fourniture des besoins et connaissances du terrain)\n・Institutions de recherche agricole (fourniture de technologies et connaissances)\n・Services de vulgarisation agricole (fourniture d'informations et de formation)\n・Gouvernements locaux (politiques, financement, infrastructures)\n・Entreprises privées (marchés, intrants, équipements)\n・ONG et bailleurs de fonds (financement, renforcement des capacités)\n\nExemples d'activités de la PIA :\n・Test de nouvelles technologies d'irrigation et diffusion auprès des agriculteurs\n・Collecte et partage d'informations de marché\n・Recherche-action participative pour la résolution des problèmes des agriculteurs\n\nDéploiement en Afrique :\nLa FAO, le CTA et les institutions internationales de recherche agricole sous l'égide du CGIAR établissent et soutiennent des PIA dans toute l'Afrique. Il existe des exemples d'utilisation des PIA pour l'amélioration de la gestion de l'eau agricole en Éthiopie, en Ouganda, en Zambie et ailleurs.","caption3":"","images":[]},{"rowNum":55,"id":"054","catCode":"CAT03","nameJa":"用水配分計画","readingJa":"ようすいはいぶんけいかく","summaryJa":"利用可能な灌漑用水を、季節・地区・作物ごとに公平かつ効率的に配分するための計画です。水不足時や複数農家が競合する場面での配分ルールと手順を定めます。","detailJa":"用水配分計画の内容：\n・季節別（雨季・乾季）の水源水量の把握と需要量の算定\n・地区別・支線別の配分量と配分スケジュール\n・渇水時の優先順位と削減ルール\n・配水の方法（ローテーション・ブロック配水・連続配水）\n\n主要な配水方法：\n1. ローテーション配水（輪番配水）：水路を順番に開閉し各農家に順番に送水\n　→ 配水の公平性が高く、小流量施設でも全農家に確実に供給できる\n2. 比例配水：受益面積に比例した流量を常時供給\n3. 要求配水：農家の要求に応じて配水（管理が難しく費用が高い）\n\n渇水時の配分優先順位（一般的な例）：\n①人畜用水　②永年作物（果樹等）　③成長期の一年生作物　④休閑可能な圃場\n\nアフリカでの重要性：\n乾季や旱魃年には水源の水量が不足し、農家間での水争いが発生しやすいです。事前に用水配分計画を策定し、農家全員が合意することが、公平で透明な水管理の基盤となります。","nameEn":"Water allocation plan","summaryEn":"This is a plan for fair and efficient allocation of available irrigation water by season, district, and crop type. It establishes allocation rules and procedures for water shortage situations and scenarios where multiple farmers are competing for water resources.","detailEn":"Water Distribution Planning Content:\n・Assessment of water source volumes and demand calculation by season (wet season/dry season)\n・Distribution volumes and distribution schedules by district and branch canal\n・Priority order and reduction rules during drought periods\n・Water distribution methods (rotation, block distribution, continuous distribution)\n\nMajor Water Distribution Methods:\n1. Rotation distribution (rotational distribution): Opening and closing canals sequentially to deliver water to each farm in turn\n   → High fairness in distribution, enabling reliable supply to all farms even with small flow facilities\n2. Proportional distribution: Constant supply of flow rate proportional to beneficiary area\n3. On-demand distribution: Distribution according to farmers' requests (difficult to manage and expensive)\n\nDistribution Priority Order During Drought (General Example):\n①Domestic and livestock water ②Perennial crops (fruit trees, etc.) ③Annual crops in growth stage ④Fallow-capable fields\n\nImportance in Africa:\nDuring dry seasons or drought years, water source volumes become insufficient, making water conflicts among farmers likely to occur. Establishing water distribution plans in advance and obtaining consensus from all farmers serves as the foundation for fair and transparent water management.","image":"","captionJa":"","captionEn":"","published":"","name3":"Plan de répartition des eaux d'irrigation","summary3":"Il s'agit d'un plan pour répartir de manière équitable et efficace l'eau d'irrigation disponible selon les saisons, les districts et les cultures. Il établit les règles et procédures de répartition lors de pénuries d'eau ou dans les situations où plusieurs exploitants agricoles sont en concurrence.","detail3":"Contenu du plan de répartition des eaux d'irrigation :\n・ Évaluation des volumes d'eau des sources par saison (saison des pluies et saison sèche) et calcul des volumes de demande\n・ Volumes de répartition et calendrier de répartition par zone et par canal secondaire\n・ Ordre de priorité et règles de réduction en période de sécheresse\n・ Méthodes de distribution d'eau (rotation, distribution par blocs, distribution continue)\n\nPrincipales méthodes de distribution d'eau :\n1. Distribution par rotation : ouverture et fermeture séquentielles des canaux pour alimenter chaque exploitant à tour de rôle\n　→ Grande équité de distribution, approvisionnement garanti à tous les exploitants même avec des installations à faible débit\n2. Distribution proportionnelle : approvisionnement constant d'un débit proportionnel à la superficie bénéficiaire\n3. Distribution à la demande : distribution selon les demandes des exploitants (gestion difficile et coûts élevés)\n\nOrdre de priorité de répartition en période de sécheresse (exemple général) :\n① Eau pour usage humain et animal ② Cultures pérennes (arbres fruitiers, etc.) ③ Cultures annuelles en période de croissance ④ Parcelles pouvant être mises en jachère\n\nImportance en Afrique :\nEn saison sèche ou lors d'années de sécheresse, les volumes d'eau des sources sont insuffisants et des conflits sur l'eau entre exploitants agricoles ont tendance à se produire. L'élaboration préalable d'un plan de répartition des eaux d'irrigation et l'accord de tous les exploitants constituent la base d'une gestion de l'eau équitable et transparente.","caption3":"","images":[]},{"rowNum":56,"id":"055","catCode":"CAT03","nameJa":"費用回収","readingJa":"ひようかいしゅう","summaryJa":"灌漑施設の建設・運営・維持管理にかかった費用（または一定割合）を、受益農家からの水利費・税・料金等として回収することです。施設の持続的な機能維持に不可欠な財政メカニズムです。","detailJa":"費用回収の種類：\n1. 建設費回収：施設整備にかかった投資額の全部または一部を農家から回収\n　→ 多くの開発途上国では建設費回収は政府負担・援助資金が担い、農家負担は補助的\n2. 運営維持管理費（O&M費）回収：日常的な管理・補修に要する費用を水利費として回収\n　→ 最低限O&M費は農家が負担することが持続的灌漑の原則\n\n水利費の算定方法：\n・面積比例型：受益面積（ha）に比例した定額賦課\n・水量比例型：実際の用水使用量に比例（計量が必要）\n・作物種別型：水を多く使う作物の農家により多く賦課\n\nアフリカの費用回収の課題：\n多くのアフリカの灌漑プロジェクトで費用回収率が低く、O&M費の不足が施設劣化を招く悪循環に陥っています。農家が水利費を負担するためには、灌漑農業によって十分な収益が得られることが前提条件です。作物の高付加価値化・市場アクセス改善と費用回収の強化はセットで取り組む必要があります。","nameEn":"Cost Recovery","summaryEn":"This refers to recovering the costs (or a certain percentage) of construction, operation, and maintenance of irrigation facilities through water fees, taxes, charges, and other payments from beneficiary farmers. It is a financial mechanism essential for the sustainable maintenance of facility functions.","detailEn":"Types of Cost Recovery:\n1. Construction Cost Recovery: Recovery of all or part of the investment amount for facility development from farmers\n   → In many developing countries, construction cost recovery is covered by government funding and aid funds, with farmer burden being supplementary\n2. Operation and Maintenance (O&M) Cost Recovery: Recovery of costs required for routine management and repairs as water charges\n   → The principle of sustainable irrigation is that farmers bear at least the O&M costs\n\nWater Charge Calculation Methods:\n・Area-based: Fixed levy proportional to beneficiary area (ha)\n・Volume-based: Proportional to actual water usage (requires metering)\n・Crop-based: Higher charges imposed on farmers growing crops that use more water\n\nCost Recovery Challenges in Africa:\nMany irrigation projects in Africa have low cost recovery rates, falling into a vicious cycle where insufficient O&M costs lead to facility deterioration. For farmers to bear water charges, the prerequisite is that irrigation agriculture generates sufficient profits. High value-added crop development, improved market access, and strengthened cost recovery need to be addressed as a package.","image":"","captionJa":"","captionEn":"","published":"","name3":"recouvrement des coûts","summary3":"Il s'agit de recouvrer les coûts (ou un certain pourcentage) de construction, d'exploitation et de maintenance des infrastructures d'irrigation sous forme de redevances hydrauliques, de taxes, de tarifs, etc. auprès des agriculteurs bénéficiaires. C'est un mécanisme financier indispensable au maintien durable du fonctionnement des infrastructures.","detail3":"Types de recouvrement des coûts :\n1. Recouvrement des coûts de construction : recouvrement auprès des agriculteurs de la totalité ou d'une partie du montant d'investissement consacré à l'aménagement des infrastructures\n　→ Dans de nombreux pays en développement, le recouvrement des coûts de construction est pris en charge par le gouvernement et les fonds d'aide, la contribution des agriculteurs étant complémentaire\n2. Recouvrement des coûts d'exploitation et de maintenance (coûts O&M) : recouvrement sous forme de redevances hydrauliques des coûts nécessaires à la gestion et aux réparations quotidiennes\n　→ Le principe de l'irrigation durable veut que les agriculteurs supportent au minimum les coûts O&M\n\nMéthodes de calcul des redevances hydrauliques :\n・Type proportionnel à la superficie : imposition d'un montant fixe proportionnel à la superficie bénéficiaire (ha)\n・Type proportionnel au volume d'eau : proportionnel au volume réel d'eau d'irrigation utilisé (nécessite un comptage)\n・Type par catégorie de culture : imposition plus élevée aux agriculteurs cultivant des plantes consommatrices d'eau\n\nDéfis du recouvrement des coûts en Afrique :\nDans de nombreux projets d'irrigation africains, le taux de recouvrement des coûts est faible, créant un cercle vicieux où l'insuffisance des coûts O&M entraîne la détérioration des infrastructures. Pour que les agriculteurs supportent les redevances hydrauliques, il faut comme condition préalable qu'ils puissent obtenir des revenus suffisants grâce à l'agriculture irriguée. Il est nécessaire d'aborder conjointement l'amélioration de la valeur ajoutée des cultures et de l'accès au marché avec le renforcement du recouvrement des coûts.","caption3":"","images":[]},{"rowNum":57,"id":"056","catCode":"CAT03","nameJa":"水価格設定","readingJa":"みずかかくせってい","summaryJa":"灌漑用水の利用に対して課金する料金の水準・算定方式・徴収方法を定める政策・手続きです。適正な水価格は費用回収・水の節約的利用・財政持続性を同時に達成する重要なツールです。","detailJa":"水価格設定の主な方式：\n1. 面積課金（Area-based pricing）：受益面積に応じた定額料金。簡単だが節水インセンティブは弱い\n2. 従量課金（Volume-based pricing）：使用水量に応じた料金。節水効果が高いが計量施設が必要\n3. 二部料金（Two-part tariff）：基本料金（固定）＋従量料金の組み合わせ\n4. 作物別課金：高収益作物の農家により高い料金を設定\n\n適正な水価格の水準：\n・O&M費を最低限回収できる水準が必要\n・農家の支払い能力（Willingness to pay）を超えないこと\n・農家が灌漑農業から十分な利益を得られることが前提\n\n水価格の役割：\n・財政：O&M費・建設費の回収\n・配分：水の合理的な利用への誘導\n・公平性：受益者による応分の費用負担\n\nアフリカの現状：\n多くのアフリカ諸国で水利費が低すぎてO&M費を賄えないか、または徴収されていないケースが多く、施設維持管理の財源不足が深刻です。適切な水価格設定と徴収システムの整備が持続的灌漑農業の基盤です。","nameEn":"Water pricing","summaryEn":"This refers to policies and procedures that determine the level, calculation method, and collection approach for fees charged for the use of irrigation water. Appropriate water pricing is an important tool that simultaneously achieves cost recovery, water conservation, and fiscal sustainability.","detailEn":"Main water pricing methods:\n1. Area-based pricing: Fixed charges based on benefited area. Simple but weak water conservation incentives\n2. Volume-based pricing: Charges based on water usage volume. High water conservation effect but requires metering facilities\n3. Two-part tariff: Combination of basic charge (fixed) + volume-based charge\n4. Crop-specific pricing: Setting higher rates for farmers growing high-value crops\n\nAppropriate water price levels:\n・Must be at a level that can recover at least O&M costs\n・Should not exceed farmers' willingness to pay\n・Prerequisite that farmers can obtain sufficient profits from irrigated agriculture\n\nRole of water pricing:\n・Financial: Recovery of O&M costs and construction costs\n・Allocation: Guiding rational water use\n・Equity: Proportional cost burden by beneficiaries\n\nCurrent situation in Africa:\nIn many African countries, water charges are too low to cover O&M costs or are not collected at all, resulting in serious shortage of funds for facility maintenance and management. Establishing appropriate water pricing and collection systems is the foundation for sustainable irrigated agriculture.","image":"","captionJa":"","captionEn":"","published":"","name3":"Tarification de l'eau","summary3":"Il s'agit d'une politique et d'une procédure qui définissent le niveau des tarifs, les méthodes de calcul et les modes de perception des redevances appliquées à l'utilisation de l'eau d'irrigation. Une tarification appropriée de l'eau constitue un outil essentiel permettant d'atteindre simultanément la récupération des coûts, l'utilisation économe de l'eau et la durabilité financière.","detail3":"Principales modalités de tarification de l'eau :\n1. Tarification basée sur la superficie (Area-based pricing) : tarif fixe selon la superficie bénéficiaire. Simple mais faible incitation à l'économie d'eau\n2. Tarification volumétrique (Volume-based pricing) : tarif selon le volume d'eau utilisé. Effet d'économie d'eau élevé mais nécessite des installations de mesure\n3. Tarif binôme (Two-part tariff) : combinaison d'un tarif de base (fixe) + tarif volumétrique\n4. Tarification par culture : application de tarifs plus élevés aux agriculteurs cultivant des cultures à haute rentabilité\n\nNiveau approprié du prix de l'eau :\n・Niveau nécessaire pour récupérer au minimum les coûts d'exploitation et de maintenance (O&M)\n・Ne pas dépasser la capacité de paiement des agriculteurs (Willingness to pay)\n・Prémisse que les agriculteurs puissent obtenir des bénéfices suffisants de l'agriculture irriguée\n\nRôles du prix de l'eau :\n・Financier : récupération des coûts d'O&M et de construction\n・Allocation : orientation vers une utilisation rationnelle de l'eau\n・Équité : prise en charge proportionnelle des coûts par les bénéficiaires\n\nSituation actuelle en Afrique :\nDans de nombreux pays africains, les redevances hydrauliques sont trop faibles pour couvrir les coûts d'O&M ou ne sont souvent pas perçues, causant un grave manque de ressources financières pour l'entretien des installations. La mise en place d'une tarification appropriée de l'eau et d'un système de recouvrement constitue la base d'une agriculture irriguée durable.","caption3":"","images":[]},{"rowNum":58,"id":"057","catCode":"CAT03","nameJa":"受益地","readingJa":"じゅえきち","summaryJa":"灌漑事業や農業水利事業によって直接的な便益を受ける農地（圃場）の区域です。受益地の範囲は施設整備計画・費用回収・維持管理費賦課の基準となります。","detailJa":"受益地の定義と特定：\n・灌漑受益地：灌漑施設から水の供給を受け、安定した農業生産が可能となる農地\

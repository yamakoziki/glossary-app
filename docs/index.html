・mois\n\nExemple de calcul mensuel (culture de maïs en saison sèche) :\n・ET (évapotranspiration) : 150 mm/mois\n・Pe (pluviométrie efficace) : 0 mm/mois (saison sèche)\n・NIR : 150 mm/mois = 1 500 m³/ha・mois\n\nConversion vers les besoins bruts en eau d'irrigation (GIR) :\nGIR = NIR ÷ Efficacité d'irrigation parcellaire\n　Exemple : NIR 150mm, efficacité parcellaire 60% → GIR = 150 ÷ 0,60 = 250 mm\n\nPoints importants pour la conception :\n・Les besoins en eau d'irrigation du mois de pointe (mois de besoins maximaux) constituent la base de conception des installations de captage et des canaux\n・L'ajustement des périodes de culture permet de niveler la demande de pointe\n\nOutil de calcul pour l'Afrique :\nLe logiciel CROPWAT fourni par la FAO est largement utilisé comme standard mondial et permet le calcul automatique des besoins en eau d'irrigation pour chaque culture et chaque saison par saisie de données météorologiques.","caption3":"","images":[]},{"rowNum":20,"id":"019","catCode":"CAT02","nameJa":"作物必要水量","readingJa":"さくもつひつようすいりょう","summaryJa":"特定の作物が正常に生育・成熟するために蒸発散（蒸発+気孔からの蒸散）として消費する水の総量です。気象条件・作物種・生育ステージにより異なります。","detailJa":"作物必要水量の算出：\nET_c（作物必要水量）= ET₀（基準蒸発散量）× Kc（作物係数）\n\n・ET₀（Reference Evapotranspiration）：芝生などの基準作物が最適条件下で消費する蒸発散量\n　Penman-Monteith法（FAO推奨）で気象データ（気温・湿度・日射・風速）から算出\n・Kc（Crop Coefficient）：作物の特性を反映する係数（FAO Irrigation Paper No.56参照）\n　初期→発育→中期→後期の4段階で異なる値を適用\n\n主要作物のKc例（FAO）：\n・トウモロコシ中期：Kc = 1.2、全期間平均：約0.8\n・水稲初期：Kc = 1.05〜1.2\n・トマト中期：Kc = 1.15\n・小麦中期：Kc = 1.15\n\nアフリカの気候特性と作物必要水量：\n熱帯・亜熱帯のアフリカでは日射が強く気温が高いためET₀が大きく（1日6〜10mm）、同じ作物でも日本の2〜3倍の水が必要な場合があります。CROPWATを使ったET₀とET_cの計算が灌漑計画の出発点です。","nameEn":"Crop water requirement","summaryEn":"It is the total amount of water consumed as evapotranspiration (evaporation + transpiration through stomata) for specific crops to grow and mature normally. It varies depending on meteorological conditions, crop species, and growth stage.","detailEn":"Calculation of Crop Water Requirements:\nET_c (Crop Water Requirement) = ET₀ (Reference Evapotranspiration) × Kc (Crop Coefficient)\n\n・ET₀ (Reference Evapotranspiration): Evapotranspiration consumed by reference crops such as grass under optimal conditions\n　Calculated from meteorological data (temperature, humidity, solar radiation, wind speed) using the Penman-Monteith method (FAO recommended)\n・Kc (Crop Coefficient): Coefficient reflecting crop characteristics (refer to FAO Irrigation Paper No.56)\n　Different values applied in 4 stages: initial → development → mid-season → late season\n\nExamples of Kc values for major crops (FAO):\n・Maize mid-season: Kc = 1.2, full season average: approximately 0.8\n・Rice initial stage: Kc = 1.05-1.2\n・Tomato mid-season: Kc = 1.15\n・Wheat mid-season: Kc = 1.15\n\nClimate Characteristics and Crop Water Requirements in Africa:\nIn tropical and subtropical Africa, strong solar radiation and high temperatures result in large ET₀ values (6-10 mm per day), requiring 2-3 times more water for the same crops compared to Japan. Calculation of ET₀ and ET_c using CROPWAT is the starting point for irrigation planning.","image":"","captionJa":"","captionEn":"","published":"","name3":"Besoins en eau des cultures","summary3":"Il s'agit de la quantité totale d'eau consommée par évapotranspiration (évaporation + transpiration par les stomates) pour qu'une culture spécifique puisse croître et mûrir normalement. Elle varie selon les conditions météorologiques, l'espèce cultivée et le stade de développement.","detail3":"Calcul des besoins en eau des cultures :\nET_c (besoins en eau des cultures) = ET₀ (évapotranspiration de référence) × Kc (coefficient cultural)\n\n• ET₀ (Reference Evapotranspiration) : évapotranspiration consommée par une culture de référence comme le gazon dans des conditions optimales\n　Calculée à partir des données météorologiques (température, humidité, rayonnement solaire, vitesse du vent) par la méthode de Penman-Monteith (recommandée par la FAO)\n• Kc (Crop Coefficient) : coefficient reflétant les caractéristiques de la culture (se référer au FAO Irrigation Paper No.56)\n　Application de valeurs différentes selon 4 stades : initial → développement → mi-saison → fin de saison\n\nExemples de Kc pour les principales cultures (FAO) :\n• Maïs mi-saison : Kc = 1,2, moyenne sur toute la période : environ 0,8\n• Riz stade initial : Kc = 1,05~1,2\n• Tomate mi-saison : Kc = 1,15\n• Blé mi-saison : Kc = 1,15\n\nCaractéristiques climatiques de l'Afrique et besoins en eau des cultures :\nDans l'Afrique tropicale et subtropicale, en raison du fort rayonnement solaire et des températures élevées, l'ET₀ est importante (6~10 mm par jour), et les mêmes cultures peuvent nécessiter 2 à 3 fois plus d'eau qu'au Japon. Le calcul de l'ET₀ et de l'ET_c utilisant CROPWAT constitue le point de départ de la planification de l'irrigation.","caption3":"","images":[]},{"rowNum":21,"id":"020","catCode":"CAT02","nameJa":"計画用水量","readingJa":"けいかくようすいりょう","summaryJa":"灌漑システム全体として確保・供給すべき水の量で、灌漑必要水量に輸送損失・管理用水・地域用水などを加算した設計上の総水量です。取水施設・水路の規模決定の基準となります。","detailJa":"計画用水量の構成：\n計画用水量 = 灌漑必要水量 ÷ 灌漑システム効率\n　または：\n計画用水量 = 圃場必要水量 + 水路損失 + 管理用水 + 地域用水\n\n各損失・追加量の標準的な割合：\n・水路漏水・蒸発損失：5〜20%（土水路は高く、コンクリート水路は低い）\n・管理用水（操作ロス）：5〜10%\n・地域用水：受益地の家畜・農産物処理等の需要量\n\n設計基準水量（Design Flow）：\nピーク月の計画用水量をもとに、取水施設・幹線水路の設計流量を決定します。単位はm³/s（立方メートル/秒）またはL/s（リットル/秒）。\n\nアフリカの水路効率の実態：\nFAOの調査では、アフリカの多くの既存灌漑施設で水路効率が30〜50%程度にとどまり、計画値（60〜70%）を大幅に下回っています。水路の補修・補強による損失軽減が用水量不足解消の重要な手段です。","nameEn":"Planned water demand","summaryEn":"This is the total amount of water that must be secured and supplied by the irrigation system as a whole, representing the design total water volume that includes irrigation water requirements plus conveyance losses, management water, and regional water uses. It serves as the standard for determining the scale of intake facilities and waterways.","detailEn":"Composition of Planned Water Requirement:\nPlanned Water Requirement = Irrigation Water Requirement ÷ Irrigation System Efficiency\nOr:\nPlanned Water Requirement = Field Water Requirement + Canal Losses + Management Water + Community Water\n\nStandard Percentages of Each Loss and Additional Amount:\n・Canal seepage and evaporation losses: 5-20% (higher for earth canals, lower for concrete canals)\n・Management water (operational losses): 5-10%\n・Community water: demand for livestock and agricultural product processing in beneficiary areas\n\nDesign Flow:\nThe design flow rate for intake facilities and main canals is determined based on the planned water requirement for the peak month. Units are m³/s (cubic meters per second) or L/s (liters per second).\n\nCurrent Status of Canal Efficiency in Africa:\nAccording to FAO surveys, canal efficiency at many existing irrigation facilities in Africa remains at only 30-50%, significantly below planned values (60-70%). Reducing losses through canal repair and reinforcement is an important means of resolving water shortage issues.","image":"","captionJa":"","captionEn":"","published":"","name3":"Débit de conception","summary3":"Il s'agit de la quantité totale d'eau de conception qui doit être sécurisée et fournie par l'ensemble du système d'irrigation, obtenue en ajoutant aux besoins en eau d'irrigation les pertes de transport, l'eau de gestion et l'eau à usage local. Elle constitue la référence pour déterminer l'échelle des installations de captage et des canaux d'irrigation.","detail3":"Composition du volume d'eau planifié :\nVolume d'eau planifié = Volume d'eau nécessaire pour l'irrigation ÷ Efficacité du système d'irrigation\n　ou :\nVolume d'eau planifié = Volume d'eau nécessaire aux parcelles + Pertes dans les canaux + Eau de gestion + Eau régionale\n\nProportions standard de chaque perte et quantité supplémentaire :\n・Pertes par infiltration et évaporation des canaux : 5 à 20% (élevées pour les canaux en terre, faibles pour les canaux en béton)\n・Eau de gestion (pertes opérationnelles) : 5 à 10%\n・Eau régionale : volume de demande pour le bétail et le traitement des produits agricoles dans la zone bénéficiaire\n\nDébit de conception (Design Flow) :\nLe débit de conception des installations de captage et des canaux principaux est déterminé sur la base du volume d'eau planifié du mois de pointe. L'unité est m³/s (mètres cubes par seconde) ou L/s (litres par seconde).\n\nRéalité de l'efficacité des canaux en Afrique :\nSelon les enquêtes de la FAO, l'efficacité des canaux de nombreuses installations d'irrigation existantes en Afrique reste autour de 30 à 50%, soit considérablement en dessous des valeurs planifiées (60 à 70%). La réduction des pertes par la réparation et le renforcement des canaux constitue un moyen important de résoudre la pénurie de volume d'eau d'irrigation.","caption3":"","images":[]},{"rowNum":22,"id":"021","catCode":"CAT02","nameJa":"水収支","readingJa":"みずしゅうし","summaryJa":"特定の地域・流域・圃場において、ある期間の水の入出入（収入と支出）を定量的に整理・分析したものです。水利用可能量と需要量のバランスを把握し、水資源管理計画の基礎とします。","detailJa":"水収支の基本式：\n入力（収入） − 出力（支出） = 貯留変化量\n\n・ 入力：降水量、河川流入量、地下水流入量、灌漑取水量\n・ 出力：蒸発散量、河川流出量、地下水流出量、農業・生活用水消費量\n・ 貯留変化：土壌水分変化量、地下水位変化量、ダム貯水量変化量\n\n流域水収支の重要性：\n流域全体の水収支を把握することで、上流の水利用が下流に与える影響を定量化できます。上流での過剰取水は下流での水不足を招くため、流域全体での管理が不可欠です。\n\nアフリカの主要河川の水収支課題：\n・ナイル川：エジプト・スーダン・エチオピア間での水配分が国際的な政治問題\n・ニジェール川：上流9か国での水利用と下流への影響\n・ザンベジ川：ダム建設による流況変化\n\n圃場水収支の活用：\n圃場レベルの水収支分析は、灌漑量・降雨量・蒸発散量・土壌水分変化量の関係を明確にし、最適灌漑スケジュールの策定に役立てます。","nameEn":"Water balance","summaryEn":"This is a quantitative organization and analysis of water input and output (income and expenditure) for a specific region, watershed, or field over a certain period. It provides a foundation for water resource management planning by understanding the balance between available water supply and demand.","detailEn":"Basic equation of water balance:\nInput (income) − Output (expenditure) = Change in storage\n\n• Input: Precipitation, river inflow, groundwater inflow, irrigation water intake\n• Output: Evapotranspiration, river outflow, groundwater outflow, agricultural and domestic water consumption\n• Storage change: Change in soil moisture, change in groundwater level, change in dam reservoir storage\n\nImportance of watershed water balance:\nBy understanding the water balance of the entire watershed, the impact of upstream water use on downstream areas can be quantified. Excessive water extraction upstream leads to water shortages downstream, making watershed-wide management essential.\n\nWater balance challenges of major rivers in Africa:\n• Nile River: Water allocation among Egypt, Sudan, and Ethiopia is an international political issue\n• Niger River: Water use by 9 upstream countries and impacts on downstream areas\n• Zambezi River: Flow regime changes due to dam construction\n\nApplication of field water balance:\nField-level water balance analysis clarifies the relationships among irrigation amount, rainfall, evapotranspiration, and soil moisture change, helping to develop optimal irrigation schedules.","image":"","captionJa":"","captionEn":"","published":"","name3":"Bilan hydrique","summary3":"Il s'agit d'une organisation et d'une analyse quantitatives des entrées et sorties d'eau (recettes et dépenses) sur une période donnée dans une région, un bassin versant ou une parcelle spécifique. Cela permet de saisir l'équilibre entre la quantité d'eau disponible et la demande, et sert de base aux plans de gestion des ressources hydriques.","detail3":"Équation de base du bilan hydrique :\nEntrées (recettes) − Sorties (dépenses) = Variation du stockage\n\n• Entrées : précipitations, apports fluviaux, apports souterrains, prélèvements d'irrigation\n• Sorties : évapotranspiration, écoulements fluviaux, écoulements souterrains, consommation d'eau agricole et domestique\n• Variations du stockage : variation de l'humidité du sol, variation du niveau des eaux souterraines, variation du volume de stockage des barrages\n\nImportance du bilan hydrique du bassin versant :\nEn comprenant le bilan hydrique de l'ensemble du bassin versant, il est possible de quantifier l'impact de l'utilisation de l'eau en amont sur l'aval. Les prélèvements excessifs en amont provoquant des pénuries d'eau en aval, une gestion à l'échelle de l'ensemble du bassin versant est indispensable.\n\nDéfis du bilan hydrique des principaux fleuves africains :\n• Le Nil : la répartition de l'eau entre l'Égypte, le Soudan et l'Éthiopie constitue un problème politique international\n• Le Niger : utilisation de l'eau par 9 pays en amont et impact sur l'aval\n• Le Zambèze : modifications du régime d'écoulement dues à la construction de barrages\n\nUtilisation du bilan hydrique parcellaire :\nL'analyse du bilan hydrique au niveau parcellaire clarifie les relations entre les quantités d'irrigation, les précipitations, l'évapotranspiration et les variations de l'humidité du sol, et contribue à l'élaboration de calendriers d'irrigation optimaux.","caption3":"","images":[]},{"rowNum":23,"id":"022","catCode":"CAT02","nameJa":"圃場容水量","readingJa":"ほじょうようすいりょう","summaryJa":"土壌が重力排水した後、毛管力によって保持できる最大の水分量（体積含水率）です。灌漑の上限目標値であり、これを超えた水は重力によって排水されます。","detailJa":"圃場容水量の定義と測定：\n・英語：Field Capacity（FC）\n・測定法：土壌を完全に飽和させた後、2〜3日間自由排水させた時点の含水率\n・体積含水率（θ, cm³/cm³）または質量含水率（%）で表す\n\n土性別の概算値：\n・砂土：θ = 0.10〜0.15（保水力低い）\n・砂壌土：θ = 0.15〜0.25\n・壌土：θ = 0.25〜0.35\n・粘土：θ = 0.35〜0.50（保水力高いが排水が悪い）\n\n灌漑管理との関係：\n・圃場容水量 − 萎凋点（永久萎凋点、PWP）= 有効水分（Available Water Content, AWC）\n・有効水分の50〜70%が消費された時点を灌漑開始の目安とする（管理許容消費率、MAD）\n・MAD = 50%の場合：有効水分の50%消費時に次の灌漑を実施\n\nアフリカでの土壌水分管理：\n土壌水分計（テンシオメーター、TDR等）を用いた圃場容水量の現場測定と、それに基づく灌漑タイミングの決定が、節水と収量確保を両立させる鍵です。","nameEn":"Field capacity","summaryEn":"This is the maximum amount of water (volumetric water content) that can be retained by capillary forces after the soil has undergone gravitational drainage. It serves as the upper target value for irrigation, and any water exceeding this amount will be drained away by gravity.","detailEn":"Definition and Measurement of Field Capacity:\n・English: Field Capacity (FC)\n・Measurement method: Water content when soil is allowed to drain freely for 2-3 days after complete saturation\n・Expressed as volumetric water content (θ, cm³/cm³) or gravimetric water content (%)\n\nApproximate values by soil texture:\n・Sandy soil: θ = 0.10-0.15 (low water holding capacity)\n・Sandy loam: θ = 0.15-0.25\n・Loam: θ = 0.25-0.35\n・Clay: θ = 0.35-0.50 (high water holding capacity but poor drainage)\n\nRelationship with irrigation management:\n・Field Capacity - Permanent Wilting Point (PWP) = Available Water Content (AWC)\n・Irrigation should begin when 50-70% of available water is consumed (Management Allowed Depletion, MAD)\n・When MAD = 50%: Implement next irrigation when 50% of available water is consumed\n\nSoil moisture management in Africa:\nField measurement of field capacity using soil moisture sensors (tensiometers, TDR, etc.) and irrigation timing decisions based on these measurements are key to achieving both water conservation and yield security.","image":"","captionJa":"","captionEn":"","published":"","name3":"Capacité au champ","summary3":"C'est la quantité maximale d'eau (teneur en eau volumique) que le sol peut retenir par force capillaire après drainage gravitaire. Il s'agit de la valeur cible maximale pour l'irrigation, et l'eau qui dépasse cette limite est drainée par gravité.","detail3":"Définition et mesure de la capacité au champ :\n・Anglais : Field Capacity (FC)\n・Méthode de mesure : teneur en eau du sol après saturation complète suivie d'un drainage libre pendant 2 à 3 jours\n・Exprimée en teneur en eau volumique (θ, cm³/cm³) ou en teneur en eau massique (%)\n\nValeurs approximatives selon la texture du sol :\n・Sol sableux : θ = 0,10~0,15 (faible capacité de rétention d'eau)\n・Sol sablo-limoneux : θ = 0,15~0,25\n・Sol limoneux : θ = 0,25~0,35\n・Sol argileux : θ = 0,35~0,50 (forte capacité de rétention d'eau mais mauvais drainage)\n\nRelation avec la gestion de l'irrigation :\n・Capacité au champ − Point de flétrissement permanent (PWP) = Eau disponible (Available Water Content, AWC)\n・Le déclenchement de l'irrigation est recommandé lorsque 50 à 70% de l'eau disponible a été consommée (Management Allowable Depletion, MAD)\n・MAD = 50% : mise en œuvre de l'irrigation suivante lorsque 50% de l'eau disponible est consommée\n\nGestion de l'humidité du sol en Afrique :\nLa mesure in situ de la capacité au champ à l'aide d'instruments de mesure de l'humidité du sol (tensiomètres, TDR, etc.) et la détermination du calendrier d'irrigation basée sur ces mesures constituent la clé pour concilier économie d'eau et maintien du rendement.","caption3":"","images":[]},{"rowNum":24,"id":"023","catCode":"CAT02","nameJa":"初期用水","readingJa":"しょきようすい","summaryJa":"農業用水の利用において、作付け開始前（特に水稲栽培の代かき・田植え期）に土壌準備・浸透・蒸発のために必要となる多量の用水を指します。この時期の水需要は通常期の2〜5倍に達することがあります。","detailJa":"初期用水が必要な場面：\n1. 水稲栽培（代かき用水）：田起こし後に圃場を浸水させ土壌を砕いて均平にする代かき作業に大量の水が必要（200〜400mm）\n2. 乾燥・固結した圃場の初期湿潤：長期間乾燥していた土壌への灌漑開始時\n3. 土壌洗浄（脱塩）：塩類が蓄積した土壌の初期洗浄\n\n初期用水の水量規模：\n・代かき期間（10〜15日間）の用水量：300〜600 mm相当\n・この時期に灌漑システム全体が最大負荷となる\n・取水施設・幹線水路の設計容量はこのピーク時需要で決まることが多い\n\nピーク需要の平準化策：\n・代かき時期を地区ごとにずらすことでシステムのピーク負荷を分散できる\n・作付け時期の計画的ローテーションが水路規模の縮小につながる\n\nアフリカでの水稲灌漑：\n西アフリカ（マリ・ギニア・セネガル）での水稲栽培拡大に伴い、初期用水の計画的管理が灌漑システム設計の重要課題となっています。","nameEn":"Initial irrigation water","summaryEn":"In agricultural water use, this refers to the large amount of water required for soil preparation, infiltration, and evaporation before the start of cropping (particularly during the puddling and rice transplanting period in rice cultivation). Water demand during this period can reach 2 to 5 times that of normal periods.","detailEn":"Scenarios requiring initial water supply:\n1. Rice cultivation (water for puddling): Large amounts of water are needed (200-400mm) for puddling operations that flood the field after plowing to break up and level the soil\n2. Initial wetting of dry and hardened fields: At the start of irrigation for soils that have been dry for extended periods\n3. Soil washing (desalination): Initial washing of soils with accumulated salts\n\nScale of initial water supply:\n・Water volume during puddling period (10-15 days): equivalent to 300-600 mm\n・The entire irrigation system reaches maximum load during this period\n・Design capacity of intake facilities and main canals is often determined by this peak demand\n\nPeak demand leveling measures:\n・Peak loads on the system can be distributed by staggering puddling timing by district\n・Planned rotation of planting schedules leads to reduction in canal scale\n\nRice irrigation in Africa:\nWith the expansion of rice cultivation in West Africa (Mali, Guinea, Senegal), planned management of initial water supply has become an important issue in irrigation system design.","image":"","captionJa":"","captionEn":"","published":"","name3":"Eau d'appoint initiale","summary3":"Dans l'utilisation de l'eau d'irrigation agricole, cela désigne les importantes quantités d'eau nécessaires pour la préparation du sol, l'infiltration et l'évaporation avant le début des semis (notamment lors des périodes de préparation des rizières et de repiquage du riz). La demande en eau durant cette période peut atteindre 2 à 5 fois celle des périodes normales.","detail3":"Scénarios nécessitant un approvisionnement en eau initial :\n1. Riziculture inondée (eau pour le puddlage) : après le labour, une grande quantité d'eau est nécessaire (200-400 mm) pour l'opération de puddlage qui consiste à inonder les parcelles, briser le sol et le niveler\n2. Humidification initiale des parcelles sèches et compactées : lors du début de l'irrigation de sols ayant été secs pendant une longue période\n3. Lessivage du sol (dessalement) : lessivage initial de sols ayant accumulé des sels\n\nAmpleur des volumes d'eau initiaux :\n• Volume d'eau pendant la période de puddlage (10-15 jours) : équivalent à 300-600 mm\n• Durant cette période, l'ensemble du système d'irrigation atteint sa charge maximale\n• La capacité de conception des installations de captage et des canaux principaux est souvent déterminée par cette demande de pointe\n\nStratégies de lissage de la demande de pointe :\n• En échelonnant les périodes de puddlage par district, il est possible de répartir la charge de pointe du système\n• La rotation planifiée des périodes de plantation permet de réduire la taille des canaux\n\nIrrigation rizicole en Afrique :\nAvec l'expansion de la riziculture en Afrique de l'Ouest (Mali, Guinée, Sénégal), la gestion planifiée de l'approvisionnement en eau initial devient un enjeu majeur dans la conception des systèmes d'irrigation.","caption3":"","images":[]},{"rowNum":25,"id":"024","catCode":"CAT02","nameJa":"表流水","readingJa":"ひょうりゅうすい","summaryJa":"地表面を流れる水の総称で、河川・小川・渓流・湖沼・ため池などに貯留・流下する水を指します。農業灌漑の最も一般的な水源であり、流量は降雨量・蒸発散・土壌浸透等によって変動します。","detailJa":"表流水の特徴と農業利用：\n・季節変動が大きく、雨季に豊水・乾季に少水または断流する傾向がある\n・利用しやすい反面、洪水・濁り・水質変動のリスクがある\n・取水堰・ダムによる流量調節で年間を通じた利用が可能になる\n\n表流水の量的評価：\n・流量測定：河川の断面積×流速（浮子法・電磁流速計）\n・流量データを流量継続曲線（FDC）で整理し、渇水流量・洪水流量を把握\n・流量保証：Q90（90%の期間を超えて維持される最小流量）が安定取水の指標\n\n表流水と地下水の関係（水文サイクル）：\n表流水の一部は地中に浸透して地下水となる（涵養）。逆に地下水が湧出して河川に流入する場合もある（基底流出）。この関係を把握することが流域水管理の基本です。\n\nアフリカの表流水利用：\nアフリカの大河川（ナイル・ニジェール・コンゴ・ザンベジ）は広大な農業地帯の水源です。しかし多くの支流・小河川は乾季に枯渇するため、ため池・小規模ダムによる調整が小規模灌漑に不可欠です。","nameEn":"Surface water","summaryEn":"A general term for water flowing on the earth's surface, referring to water stored and flowing in rivers, streams, mountain streams, lakes, marshes, reservoirs, and other water bodies. It is the most common water source for agricultural irrigation, and its flow rate varies depending on precipitation, evapotranspiration, soil infiltration, and other factors.","detailEn":"Characteristics and Agricultural Use of Surface Water:\n・Large seasonal variations, with a tendency toward abundant water during the rainy season and low water or cessation of flow during the dry season\n・While easily accessible, there are risks of flooding, turbidity, and water quality fluctuations\n・Flow regulation through diversion weirs and dams enables year-round utilization\n\nQuantitative Assessment of Surface Water:\n・Flow measurement: River cross-sectional area × flow velocity (float method, electromagnetic flow meter)\n・Flow data is organized using Flow Duration Curves (FDC) to understand drought flows and flood flows\n・Flow reliability: Q90 (minimum flow maintained for 90% of the time period) serves as an indicator for stable water intake\n\nRelationship between Surface Water and Groundwater (Hydrological Cycle):\nPart of surface water infiltrates into the ground to become groundwater (recharge). Conversely, groundwater may emerge and flow into rivers (baseflow). Understanding this relationship is fundamental to watershed water management.\n\nSurface Water Use in Africa:\nAfrica's major rivers (Nile, Niger, Congo, Zambezi) serve as water sources for vast agricultural regions. However, many tributaries and small rivers dry up during the dry season, making regulation through ponds and small-scale dams essential for small-scale irrigation.","image":"","captionJa":"","captionEn":"","published":"","name3":"Eaux de surface","summary3":"Terme générique désignant l'eau qui s'écoule à la surface du sol, il fait référence à l'eau stockée et s'écoulant dans les rivières, ruisseaux, torrents, lacs, étangs et bassins de retenue. Il constitue la source d'eau la plus courante pour l'irrigation agricole, et son débit varie en fonction des précipitations, de l'évapotranspiration, de l'infiltration dans le sol, etc.","detail3":"Caractéristiques et utilisation agricole des eaux de surface :\n・Les variations saisonnières sont importantes, avec une tendance à l'abondance d'eau pendant la saison des pluies et à la rareté ou à l'assèchement pendant la saison sèche\n・Bien qu'elles soient faciles à utiliser, elles présentent des risques d'inondation, de turbidité et de variation de la qualité de l'eau\n・La régulation du débit par des barrages de prise d'eau et des barrages permet une utilisation tout au long de l'année\n\nÉvaluation quantitative des eaux de surface :\n・Mesure du débit : section transversale du cours d'eau × vitesse d'écoulement (méthode du flotteur, débitmètre électromagnétique)\n・Organisation des données de débit par courbe de durée de débit (FDC) pour comprendre le débit d'étiage et le débit de crue\n・Garantie de débit : Q90 (débit minimum maintenu pendant plus de 90% de la période) est un indicateur de captage stable\n\nRelation entre les eaux de surface et les eaux souterraines (cycle hydrologique) :\nUne partie des eaux de surface s'infiltre dans le sol pour devenir des eaux souterraines (recharge). Inversement, les eaux souterraines peuvent émerger et s'écouler dans les cours d'eau (écoulement de base). La compréhension de cette relation constitue la base de la gestion de l'eau du bassin versant.\n\nUtilisation des eaux de surface en Afrique :\nLes grands fleuves africains (Nil, Niger, Congo, Zambèze) sont les sources d'eau de vastes zones agricoles. Cependant, de nombreux affluents et petits cours d'eau s'assèchent pendant la saison sèche, rendant indispensable l'ajustement par des étangs et des petits barrages pour l'irrigation à petite échelle.","caption3":"","images":[]},{"rowNum":26,"id":"025","catCode":"CAT02","nameJa":"地下水","readingJa":"ちかすい","summaryJa":"土壌の空隙・岩石の割れ目・帯水層に蓄えられた水で、地下水面（水位）以下に存在する水を指します。表流水が少ない乾季や乾燥地域で農業用水の重要な代替水源となります。","detailJa":"地下水の分類：\n1. 不圧地下水（自由地下水）：地下水面が大気圧に接している帯水層の地下水。井戸を掘れば地下水位まで水が来る\n2. 被圧地下水（深層地下水）：不透水層で覆われた帯水層の地下水。掘削すると水圧で水面が上昇する（自噴することも）\n\n地下水の農業利用方法：\n・浅井戸（10m以浅）：手掘り・ペダルポンプで揚水可能\n・深井戸（10〜100m超）：ボーリング・電動・ソーラーポンプが必要\n・地下水涵養：雨水・用水路からの浸透で地下水を補給\n\n持続可能な地下水利用：\n年間採水量が自然涵養量を超えると地下水位が低下し、枯渇・塩水化のリスクが生じます（オーバードラフト）。地下水位の定期モニタリングと採水量の管理が必須です。\n\nアフリカの地下水事情：\nサハラ以南アフリカには世界有数の大規模帯水層（ヌビア砂岩帯水層・カラハリ帯水層等）が存在しますが、多くは化石水（数万年前に涵養された）で涵養速度が極めて遅く、過剰採取は回復不能な損失につながります。","nameEn":"Groundwater","summaryEn":"It refers to water stored in soil pores, rock fractures, and aquifers that exists below the groundwater table (water level). It serves as an important alternative water source for agricultural irrigation during dry seasons or in arid regions where surface water is scarce.","detailEn":"Classification of Groundwater:\n1. Unconfined groundwater (free groundwater): Groundwater in aquifers where the water table is in contact with atmospheric pressure. When a well is drilled, water rises to the groundwater level.\n2. Confined groundwater (deep groundwater): Groundwater in aquifers covered by impermeable layers. When drilled, water pressure causes the water level to rise (may also result in artesian flow).\n\nAgricultural Utilization Methods of Groundwater:\n• Shallow wells (less than 10m depth): Water extraction possible through hand-digging and pedal pumps\n• Deep wells (10m to over 100m depth): Require boring, electric, and solar pumps\n• Groundwater recharge: Replenishing groundwater through infiltration from rainwater and irrigation channels\n\nSustainable Groundwater Use:\nWhen annual water extraction exceeds natural recharge rates, groundwater levels decline, creating risks of depletion and salinization (overdraft). Regular monitoring of groundwater levels and management of extraction volumes are essential.\n\nGroundwater Conditions in Africa:\nSub-Saharan Africa contains some of the world's largest aquifer systems (Nubian Sandstone Aquifer, Kalahari Aquifer, etc.), but many consist of fossil water (recharged tens of thousands of years ago) with extremely slow recharge rates, making over-extraction lead to irreversible losses.","image":"","captionJa":"","captionEn":"","published":"","name3":"Eau souterraine","summary3":"L'eau souterraine désigne l'eau stockée dans les pores du sol, les fissures des roches et les aquifères, qui se trouve en dessous de la surface phréatique (niveau piézométrique). Elle constitue une source d'eau alternative importante pour l'irrigation agricole pendant la saison sèche ou dans les régions arides où les eaux de surface sont rares.","detail3":"Classification des eaux souterraines :\n1. Eau souterraine libre (eau souterraine phréatique) : eau souterraine dans un aquifère dont la surface est en contact avec la pression atmosphérique. En creusant un puits, l'eau remonte jusqu'au niveau de la nappe phréatique\n2. Eau souterraine captive (eau souterraine profonde) : eau souterraine dans un aquifère recouvert par une couche imperméable. Lors du forage, le niveau d'eau remonte sous la pression hydraulique (pouvant parfois jaillir naturellement)\n\nMéthodes d'utilisation agricole des eaux souterraines :\n• Puits peu profonds (moins de 10 m) : pompage possible par creusement manuel et pompe à pédale\n• Puits profonds (de 10 m à plus de 100 m) : nécessitent forage et pompes électriques ou solaires\n• Recharge des eaux souterraines : reconstitution des eaux souterraines par infiltration des eaux de pluie et des canaux d'irrigation\n\nUtilisation durable des eaux souterraines :\nLorsque le volume annuel de prélèvement dépasse la recharge naturelle, le niveau des eaux souterraines baisse, générant des risques d'épuisement et de salinisation (surexploitation). Un monitoring régulier du niveau des eaux souterraines et une gestion des volumes de prélèvement sont indispensables.\n\nSituation des eaux souterraines en Afrique :\nL'Afrique subsaharienne possède certains des plus grands aquifères au monde (aquifère de grès nubien, aquifère du Kalahari, etc.), mais la plupart constituent des eaux fossiles (rechargées il y a plusieurs dizaines de milliers d'années) avec une vitesse de recharge extrêmement lente, et leur surexploitation entraîne des pertes irréversibles.","caption3":"","images":[]},{"rowNum":27,"id":"026","catCode":"CAT02","nameJa":"散水効率","readingJa":"さんすいこうりつ","summaryJa":"圃場に散布された水のうち、作物が実際に利用（蒸発散）できた水の割合を示す指標です。灌漑の圃場レベルでの効率を表します。","detailJa":"散水効率（Application Efficiency）の定義：\nEa = (作物が利用した水量) ÷ (圃場に散布された総水量) × 100 (%)\n\n損失の内訳：\n・表面流去：圃場から流れ出てしまう水\n・深部浸透：作物根域より深く浸透して有効に使われない水\n・蒸発：散布中や土壌表面からの直接蒸発\n\n灌漑方式別の標準的な散水効率：\n・表面灌漑（畝間）：50〜70%\n・スプリンクラー：70〜85%\n・点滴灌漑：85〜95%\n\n改善方法：\n・土地整形（均平化）による均一分布の向上\n・灌漑スケジュールの最適化（土壌水分センサー活用）\n・灌漑インフラの適正規模設計\n\n水利用効率との関係：\n散水効率は圃場レベルの効率ですが、圃場から流出した水や深部浸透水が下流・下層で回収・再利用される場合、流域全体の水利用効率は散水効率より高くなる場合があります。","nameEn":"Irrigation efficiency","summaryEn":"This is an indicator that shows the proportion of water applied to a field that crops can actually utilize (evapotranspire). It represents the efficiency of irrigation at the field level.","detailEn":"Definition of Application Efficiency:\nEa = (Water utilized by crops) ÷ (Total water applied to the field) × 100 (%)\n\nBreakdown of losses:\n• Surface runoff: Water that flows out from the field\n• Deep percolation: Water that infiltrates deeper than the crop root zone and is not effectively utilized\n• Evaporation: Direct evaporation during application and from the soil surface\n\nStandard application efficiency by irrigation method:\n• Surface irrigation (furrow): 50-70%\n• Sprinkler: 70-85%\n• Drip irrigation: 85-95%\n\nImprovement methods:\n• Enhancement of uniform distribution through land leveling\n• Optimization of irrigation scheduling (utilizing soil moisture sensors)\n• Appropriate scale design of irrigation infrastructure\n\nRelationship with water use efficiency:\nWhile application efficiency is field-level efficiency, when water that flows out from fields or deep percolation water is recovered and reused downstream or in lower layers, the overall water use efficiency of the entire basin may be higher than the application efficiency.","image":"","captionJa":"","captionEn":"","published":"","name3":"Efficacité d'irrigation","summary3":"C'est un indicateur qui montre la proportion d'eau épandue dans les champs que les cultures ont réellement pu utiliser (évapotranspiration). Il représente l'efficacité de l'irrigation au niveau parcellaire.","detail3":"Définition de l'efficacité d'application (Application Efficiency) :\nEa = (quantité d'eau utilisée par les cultures) ÷ (quantité totale d'eau appliquée au champ) × 100 (%)\n\nRépartition des pertes :\n・Ruissellement de surface : eau qui s'écoule hors du champ\n・Percolation profonde : eau qui s'infiltre plus profondément que la zone racinaire des cultures et n'est pas utilisée efficacement\n・Évaporation : évaporation directe pendant l'application et depuis la surface du sol\n\nEfficacité d'application standard selon les méthodes d'irrigation :\n・Irrigation de surface (à la raie) : 50-70%\n・Aspersion : 70-85%\n・Irrigation goutte à goutte : 85-95%\n\nMéthodes d'amélioration :\n・Amélioration de la distribution uniforme par nivellement du terrain\n・Optimisation du calendrier d'irrigation (utilisation de capteurs d'humidité du sol)\n・Conception appropriée de l'infrastructure d'irrigation\n\nRelation avec l'efficacité d'utilisation de l'eau :\nL'efficacité d'application est l'efficacité au niveau du champ, mais lorsque l'eau qui s'écoule du champ et l'eau de percolation profonde sont récupérées et réutilisées en aval et en profondeur, l'efficacité d'utilisation de l'eau à l'échelle du bassin versant peut être supérieure à l'efficacité d'application.","caption3":"","images":[]},{"rowNum":28,"id":"027","catCode":"CAT02","nameJa":"送水効率","readingJa":"そうすいこうりつ","summaryJa":"取水口から圃場取水口まで水路・管路を通じて送水する際の、損失（漏水・蒸発）を除いた有効送水量の割合を示す指標です。","detailJa":"送水効率（Conveyance Efficiency）の定義：\nEc = (圃場に届いた水量) ÷ (取水口から取水した総水量) × 100 (%)\n\n送水損失の原因：\n・水路漏水（浸透損失）：水路床・法面からの土壌中への浸透（最大の損失要因）\n・蒸発損失：開水路水面からの蒸発（乾燥・高温地域で大きい）\n・違法取水・ゲート漏れ：管理上の問題\n\n水路種類別の標準送水効率：\n・素掘り土水路（未改修）：50〜60%\n・土水路（改修済）：60〜70%\n・コンクリート水路：80〜90%\n・閉鎖管路（パイプライン）：95〜99%\n\nアフリカの現状と課題：\n多くのアフリカの老朽化した灌漑施設では送水効率が40〜60%程度にとどまり、取水した水の半分近くが水路で失われています。水路の補修・ライニング（コンクリート保護）が最も効果的な節水投資の一つです。","nameEn":"Water supply efficiency","summaryEn":"This is an indicator that shows the ratio of effective water delivery volume, excluding losses (leakage and evaporation), when water is conveyed from the intake to the field intake through channels and pipelines.","detailEn":"Definition of Conveyance Efficiency:\nEc = (Volume of water delivered to the field) ÷ (Total volume of water diverted at the intake) × 100 (%)\n\nCauses of conveyance losses:\n・Canal seepage (seepage losses): Infiltration into soil through canal bed and sides (the largest loss factor)\n・Evaporation losses: Evaporation from open canal water surface (significant in arid and high-temperature regions)\n・Illegal water diversions and gate leakage: Management issues\n\nStandard conveyance efficiency by canal type:\n・Unlined earth canals (unimproved): 50-60%\n・Earth canals (improved): 60-70%\n・Concrete-lined canals: 80-90%\n・Closed conduits (pipelines): 95-99%\n\nCurrent situation and challenges in Africa:\nIn many aging irrigation systems in Africa, conveyance efficiency remains around 40-60%, with nearly half of the diverted water lost in the canals. Canal rehabilitation and lining (concrete protection) represents one of the most effective water conservation investments.","image":"","captionJa":"","captionEn":"","published":"","name3":"Efficacité de distribution d'eau","summary3":"C'est un indicateur qui montre la proportion du débit d'eau utile, excluant les pertes (fuites et évaporation), lors du transport de l'eau depuis la prise d'eau jusqu'aux prises d'eau des parcelles agricoles par les canaux et conduites.","detail3":"Définition de l'efficience de transport (Conveyance Efficiency) :\nEc = (Volume d'eau arrivé aux parcelles) ÷ (Volume total d'eau prélevé à la prise d'eau) × 100 (%)\n\nCauses des pertes de transport :\n• Fuites des canaux (pertes par infiltration) : infiltration dans le sol par le fond et les talus des canaux (principal facteur de perte)\n• Pertes par évaporation : évaporation depuis la surface des canaux à ciel ouvert (importantes dans les régions sèches et chaudes)\n• Prélèvements illégaux et fuites de vannes : problèmes de gestion\n\nEfficience de transport standard par type de canal :\n• Canaux en terre non revêtus (non réhabilités) : 50-60%\n• Canaux en terre (réhabilités) : 60-70%\n• Canaux en béton : 80-90%\n• Conduites fermées (pipelines) : 95-99%\n\nSituation actuelle et défis en Afrique :\nDans de nombreuses installations d'irrigation vétustes en Afrique, l'efficience de transport ne dépasse que 40-60%, et près de la moitié de l'eau prélevée est perdue dans les canaux. La réparation et le revêtement des canaux (protection en béton) constituent l'un des investissements d'économie d'eau les plus efficaces.","caption3":"","images":[]},{"rowNum":29,"id":"028","catCode":"CAT02","nameJa":"水利用効率","readingJa":"みずりようこうりつ","summaryJa":"灌漑に利用された水のうち、実際に作物生産に有効活用された水の割合を示す指標です。取水から圃場利用まで全過程の効率を総合した数値で、灌漑システム全体の性能評価に使います。","detailJa":"水利用効率の構成：\n全体水利用効率（Project Efficiency）= 送水効率（Ec）× 配水効率（Ed）× 散水効率（Ea）\n\n例：Ec=0.70、Ed=0.80、Ea=0.70 → 全体効率 = 0.70×0.80×0.70 = 0.39（39%）\n\nつまり取水した水の39%だけが作物に有効利用され、残り61%が途中で失われている。\n\nFAOの推奨値と現状：\n・先進国の優良施設：45〜60%\n・アフリカの多くの施設：25〜40%（FAO, 2022推計）\n・改善目標：少なくとも50%以上\n\n水生産性との関係：\n水利用効率を高めることは、同じ水量でより多くの作物を生産することを意味します（Water Productivity向上）。アフリカの水資源の制約を考慮すると、新規水源開発より既存施設の効率化が優先課題となる場合も多いです。\n\n改善の優先事項：\n①水路整備・補修（送水効率改善）\n②合理的な水配分スケジュール（配水効率改善）\n③農家への技術普及・水管理訓練（散水効率改善）","nameEn":"Water use efficiency","summaryEn":"This is an indicator that shows the proportion of water used for irrigation that was effectively utilized for actual crop production. It is a comprehensive figure that encompasses the efficiency of the entire process from water intake to field application, and is used for performance evaluation of the overall irrigation system.","detailEn":"Composition of Water Use Efficiency:\nOverall Water Use Efficiency (Project Efficiency) = Conveyance Efficiency (Ec) × Distribution Efficiency (Ed) × Application Efficiency (Ea)\n\nExample: Ec=0.70, Ed=0.80, Ea=0.70 → Overall Efficiency = 0.70×0.80×0.70 = 0.39 (39%)\n\nThis means only 39% of the abstracted water is effectively utilized by crops, while the remaining 61% is lost in the process.\n\nFAO Recommended Values and Current Status:\n・Advanced facilities in developed countries: 45-60%\n・Many facilities in Africa: 25-40% (FAO, 2022 estimate)\n・Improvement target: At least 50% or higher\n\nRelationship with Water Productivity:\nImproving water use efficiency means producing more crops with the same amount of water (Water Productivity improvement). Considering Africa's water resource constraints, improving the efficiency of existing facilities often becomes a priority over developing new water sources.\n\nImprovement Priorities:\n①Canal development and rehabilitation (conveyance efficiency improvement)\n②Rational water distribution scheduling (distribution efficiency improvement)\n③Technology dissemination and water management training for farmers (application efficiency improvement)","image":"","captionJa":"","captionEn":"","published":"","name3":"Efficacité d'utilisation de l'eau","summary3":"Il s'agit d'un indicateur qui montre la proportion d'eau effectivement utilisée de manière efficace pour la production agricole parmi l'eau utilisée pour l'irrigation. C'est une valeur qui synthétise l'efficacité de l'ensemble du processus, du captage d'eau jusqu'à l'utilisation dans les parcelles agricoles, et elle est utilisée pour évaluer la performance globale du système d'irrigation.","detail3":"Composition de l'efficacité de l'utilisation de l'eau :\nEfficacité globale d'utilisation de l'eau (Project Efficiency) = Efficacité de transport (Ec) × Efficacité de distribution (Ed) × Efficacité d'application (Ea)\n\nExemple : Ec=0,70, Ed=0,80, Ea=0,70 → Efficacité globale = 0,70×0,80×0,70 = 0,39 (39%)\n\nCela signifie que seulement 39% de l'eau prélevée est utilisée efficacement par les cultures, tandis que les 61% restants sont perdus en cours de route.\n\nValeurs recommandées par la FAO et situation actuelle :\n・Installations excellentes des pays développés : 45~60%\n・Nombreuses installations en Afrique : 25~40% (estimation FAO, 2022)\n・Objectif d'amélioration : au moins 50% ou plus\n\nRelation avec la productivité de l'eau :\nAméliorer l'efficacité de l'utilisation de l'eau signifie produire plus de cultures avec la même quantité d'eau (amélioration de la Water Productivity). Compte tenu des contraintes des ressources hydriques en Afrique, l'amélioration de l'efficacité des installations existantes devient souvent une priorité par rapport au développement de nouvelles sources d'eau.\n\nPriorités d'amélioration :\n① Aménagement et réparation des canaux (amélioration de l'efficacité de transport)\n② Programme rationnel de répartition de l'eau (amélioration de l'efficacité de distribution)\n③ Vulgarisation technique et formation à la gestion de l'eau auprès des agriculteurs (amélioration de l'efficacité d'application)","caption3":"","images":[]},{"rowNum":30,"id":"029","catCode":"CAT02","nameJa":"気象調査","readingJa":"きしょうちょうさ","summaryJa":"灌漑計画・農業開発計画の策定に必要な気象データを収集・分析する調査です。降水量・気温・日射量・風速・湿度など、作物必要水量と水資源量の算定に不可欠な基礎データを提供します。","detailJa":"気象調査の主要項目：\n・降水量：月別・年別の降水量と変動特性（最重要）\n・気温：最高・最低・平均（Penman-Monteith法によるET₀算出に必要）\n・湿度（相対湿度）：蒸発散量の計算に必要\n・日射量（または日照時間）：太陽放射エネルギーの推定\n・風速：蒸発散量に影響\n\nデータ収集方法：\n・国の気象観測所からの既存データ収集（10〜30年間の長期データが理想）\n・現地自動気象観測装置（AWS）の設置による新規観測\n・衛星気象データ（CHIRPS, ERA5等）：観測所が少ない地域での補完\n\nアフリカでの調査上の課題：\n・農村部の気象観測密度が低く、観測所のない地域が多い\n・既存観測所のデータ欠測・品質問題が多い\n・衛星データと地上観測データの統合による精度向上が重要\n\n灌漑計画での活用：\n収集した気象データをもとにCROPWATやPENMONフロスト等のソフトウェアでET₀を算出し、作物必要水量の月別変化を把握します。","nameEn":"Weather Survey","summaryEn":"This is a survey to collect and analyze meteorological data necessary for formulating irrigation plans and agricultural development plans. It provides essential basic data indispensable for calculating crop water requirements and water resource quantities, including precipitation, temperature, solar radiation, wind speed, and humidity.","detailEn":"Key Items for Meteorological Survey:\n・Precipitation: Monthly and annual precipitation amounts and variation characteristics (most important)\n・Temperature: Maximum, minimum, and average (required for ET₀ calculation using Penman-Monteith method)\n・Humidity (relative humidity): Required for evapotranspiration calculations\n・Solar radiation (or sunshine duration): Estimation of solar radiation energy\n・Wind speed: Affects evapotranspiration\n\nData Collection Methods:\n・Collection of existing data from national meteorological stations (long-term data of 10-30 years is ideal)\n・New observations through installation of on-site Automatic Weather Stations (AWS)\n・Satellite meteorological data (CHIRPS, ERA5, etc.): Supplementation in areas with few observation stations\n\nSurvey Challenges in Africa:\n・Low meteorological observation density in rural areas with many regions lacking observation stations\n・Frequent data gaps and quality issues at existing observation stations\n・Integration of satellite data and ground observation data is important for accuracy improvement\n\nApplication in Irrigation Planning:\nBased on collected meteorological data, ET₀ is calculated using software such as CROPWAT and PENMON Frost to understand monthly variations in crop water requirements.","image":"","captionJa":"","captionEn":"","published":"","name3":"Enquête météorologique","summary3":"Il s'agit d'une étude visant à collecter et analyser les données météorologiques nécessaires à l'élaboration de plans d'irrigation et de développement agricole. Elle fournit les données de base indispensables au calcul des besoins en eau des cultures et des ressources hydriques, telles que les précipitations, la température, l'irradiation solaire, la vitesse du vent et l'humidité.","detail3":"Éléments principaux de l'étude météorologique :\n• Précipitations : précipitations mensuelles et annuelles et caractéristiques de variation (priorité absolue)\n• Température : maximale, minimale et moyenne (nécessaire pour le calcul de l'ET₀ par la méthode de Penman-Monteith)\n• Humidité (humidité relative) : nécessaire pour le calcul de l'évapotranspiration\n• Rayonnement solaire (ou durée d'insolation) : estimation de l'énergie de rayonnement solaire\n• Vitesse du vent : influence sur l'évapotranspiration\n\nMéthodes de collecte de données :\n• Collecte de données existantes des stations météorologiques nationales (idéalement des données à long terme de 10 à 30 ans)\n• Nouvelles observations par installation de stations météorologiques automatiques (AWS) sur site\n• Données météorologiques satellitaires (CHIRPS, ERA5, etc.) : complément dans les régions avec peu de stations d'observation\n\nDéfis liés aux études en Afrique :\n• Faible densité d'observation météorologique en zones rurales, avec de nombreuses régions dépourvues de stations d'observation\n• Nombreux problèmes de données manquantes et de qualité dans les stations d'observation existantes\n• L'amélioration de la précision par l'intégration des données satellitaires et des données d'observation au sol est importante\n\nUtilisation dans la planification de l'irrigation :\nSur la base des données météorologiques collectées, l'ET₀ est calculée avec des logiciels tels que CROPWAT ou PENMON Frost, permettant de comprendre les variations mensuelles des besoins en eau des cultures.","caption3":"","images":[]},{"rowNum":31,"id":"030","catCode":"CAT02","nameJa":"土壌調査","readingJa":"どじょうちょうさ","summaryJa":"農地の土壌の物理的・化学的・生物学的特性を調査し、農業生産性の評価・灌漑設計・施肥計画の基礎データを収集する調査です。","detailJa":"土壌調査の主な項目：\n1. 物理的特性：\n・土性（砂・シルト・粘土の割合）：保水性・排水性・耕作性に影響\n・土壌構造・硬度：耕起の容易さ、根の伸長に影響\n・透水係数・浸透速度：排水設計・灌漑方式選択の基準\n・有効水分量（圃場容水量−萎凋点）\n\n2. 化学的特性：\n・pH（酸性・アルカリ性）\n・電気伝導度（EC）：塩類濃度\n・有機物含量・肥沃度（窒素・リン・カリウム等）\n・交換性陽イオン（Ca・Mg・K・Na）\n・ナトリウム吸着比（SAR）：ソーダ性評価\n\n3. 生物学的特性：\n・土壌微生物・線虫・菌根菌の存在\n\n調査方法：\n・土壌断面調査（ピット掘削）：土層構造・深さの把握\n・土壌サンプリング・分析：実験室での物理・化学分析\n・浸透テスト（ダブルリング・ピット試験）：浸透速度の現場測定\n\nアフリカでの利用：\n土壌調査結果は灌漑方式の選択（点滴・スプリンクラー・表面灌漑）と排水設計の基礎となります。塩害・ソーダ性・低pH等の問題が確認された場合、改良計画が必要です。","nameEn":"Soil investigation","summaryEn":"This is a survey that investigates the physical, chemical, and biological properties of agricultural soil to collect fundamental data for evaluating agricultural productivity, irrigation design, and fertilization planning.","detailEn":"Main items of soil survey:\n\n1. Physical properties:\n・Soil texture (proportion of sand, silt, and clay): affects water retention, drainage, and tillability\n・Soil structure and hardness: affects ease of tillage and root extension\n・Permeability coefficient and infiltration rate: criteria for drainage design and irrigation method selection\n・Available water content (field capacity - wilting point)\n\n2. Chemical properties:\n・pH (acidity/alkalinity)\n・Electrical conductivity (EC): salt concentration\n・Organic matter content and fertility (nitrogen, phosphorus, potassium, etc.)\n・Exchangeable cations (Ca, Mg, K, Na)\n・Sodium adsorption ratio (SAR): sodicity assessment\n\n3. Biological properties:\n・Presence of soil microorganisms, nematodes, and mycorrhizal fungi\n\nSurvey methods:\n・Soil profile survey (pit excavation): understanding soil layer structure and depth\n・Soil sampling and analysis: physical and chemical analysis in laboratory\n・Infiltration test (double ring and pit test): field measurement of infiltration rate\n\nApplication in Africa:\nSoil survey results form the foundation for irrigation method selection (drip, sprinkler, surface irrigation) and drainage design. When problems such as salt damage, sodicity, and low pH are identified, improvement plans are necessary.","image":"","captionJa":"","captionEn":"","published":"","name3":"Étude pédologique","summary3":"Il s'agit d'une étude visant à examiner les caractéristiques physiques, chimiques et biologiques des sols agricoles, et à collecter les données de base pour l'évaluation de la productivité agricole, la conception de l'irrigation et la planification de la fertilisation.","detail3":"Principaux éléments de l'enquête pédologique :\n\n1. Caractéristiques physiques :\n・Texture du sol (proportions de sable, limon et argile) : influence sur la rétention d'eau, le drainage et la cultivabilité\n・Structure et dureté du sol : influence sur la facilité de labour et l'extension racinaire\n・Coefficient de perméabilité et vitesse d'infiltration : critères pour la conception du drainage et le choix du système d'irrigation\n・Humidité utile (capacité de rétention au champ - point de flétrissement)\n\n2. Caractéristiques chimiques :\n・pH (acidité/alcalinité)\n・Conductivité électrique (CE) : concentration en sels\n・Teneur en matière organique et fertilité (azote, phosphore, potassium, etc.)\n・Cations échangeables (Ca, Mg, K, Na)\n・Rapport d'adsorption du sodium (SAR) : évaluation de la sodicité\n\n3. Caractéristiques biologiques :\n・Présence de microorganismes du sol, nématodes et champignons mycorhiziens\n\nMéthodes d'investigation :\n・Étude de profils pédologiques (excavation de fosses) : compréhension de la structure et de la profondeur des horizons\n・Échantillonnage et analyse du sol : analyses physico-chimiques en laboratoire\n・Tests d'infiltration (essais à double anneau et en fosse) : mesure in situ de la vitesse d'infiltration\n\nUtilisation en Afrique :\nLes résultats de l'enquête pédologique constituent la base pour le choix du système d'irrigation (goutte-à-goutte, aspersion, irrigation de surface) et la conception du drainage. Lorsque des problèmes de salinité, sodicité ou pH faible sont identifiés, un plan d'amélioration est nécessaire.","caption3":"","images":[]},{"rowNum":32,"id":"031","catCode":"CAT02","nameJa":"水文調査","readingJa":"すいもんちょうさ","summaryJa":"河川・地下水・降水など水の動きに関するデータを収集・分析する調査です。灌漑水源の量と信頼性を評価し、取水計画・ダム規模・排水計画の設計根拠とします。","detailJa":"水文調査の主な内容：\n1. 河川調査：\n・流量測定（雨季・乾季の流量変化）\n・流量継続曲線（FDC）の作成\n・取水可能量（取水権を考慮した利用可能量）の評価\n\n2. 地下水調査：\n・地下水位の分布と季節変動\n・帯水層の種類・深さ・水質\n・揚水試験（Pumping test）による帯水層の透水量係数・貯留係数の測定\n\n3. 降水量解析：\n・年・月別降水量の統計処理\n・確率降水量（再現期間別）の算定\n\n4. 蒸発散量推計：\n・FAO Penman-Monteith法によるET₀の算出\n\n水収支の推算：\n水文調査データを統合して流域の水収支を推算し、「水がどこからどれだけ来て、どこへどれだけ行くか」を定量的に把握します。\n\nアフリカでの水文調査の課題：\n多くの地域で流量観測記録が短く不完全なため、衛星水文データ（NASA GRACEによる地下水変動検知、Sentinel衛星による河川水位推定等）の活用が増えています。","nameEn":"Hydrological survey","summaryEn":"This is a survey that collects and analyzes data on water movement including rivers, groundwater, and precipitation. It evaluates the quantity and reliability of irrigation water sources and serves as the design basis for water intake plans, dam scale, and drainage plans.","detailEn":"Main contents of hydrological survey:\n\n1. River survey:\n・Flow measurement (flow variation during rainy and dry seasons)\n・Development of Flow Duration Curve (FDC)\n・Assessment of available water intake volume (available volume considering water rights)\n\n2. Groundwater survey:\n・Distribution and seasonal variation of groundwater levels\n・Types, depths, and water quality of aquifers\n・Measurement of transmissivity and storage coefficient of aquifers through pumping tests\n\n3. Precipitation analysis:\n・Statistical processing of annual and monthly precipitation data\n・Calculation of probability rainfall (by return period)\n\n4. Evapotranspiration estimation:\n・Calculation of ET₀ using the FAO Penman-Monteith method\n\nWater balance estimation:\nBy integrating hydrological survey data, the water balance of the watershed is estimated to quantitatively understand \"where water comes from and how much, and where it goes and how much.\"\n\nChallenges in hydrological surveys in Africa:\nDue to short and incomplete flow observation records in many regions, the use of satellite hydrological data (groundwater variation detection by NASA GRACE, river water level estimation by Sentinel satellites, etc.) is increasing.","image":"","captionJa":"","captionEn":"","published":"","name3":"Étude hydrologique","summary3":"Il s'agit d'une enquête qui collecte et analyse les données relatives au mouvement de l'eau, notamment les rivières, les eaux souterraines et les précipitations. Elle évalue la quantité et la fiabilité des sources d'eau d'irrigation et sert de base de conception pour les plans de captage d'eau, la taille des barrages et les plans de drainage.","detail3":"Contenu principal des études hydrologiques :\n1. Étude des cours d'eau :\n・Mesure des débits (variations des débits en saison des pluies et en saison sèche)\n・Établissement des courbes de débits classés (FDC)\n・Évaluation de la quantité d'eau prélevable (quantité disponible en tenant compte des droits de prélèvement)\n\n2. Étude des eaux souterraines :\n・Distribution des niveaux piézométriques et variations saisonnières\n・Type, profondeur et qualité des aquifères\n・Mesure du coefficient de transmissivité et du coefficient d'emmagasinement des aquifères par essais de pompage (Pumping test)\n\n3. Analyse des précipitations :\n・Traitement statistique des précipitations annuelles et mensuelles\n・Calcul des précipitations de probabilité (par période de retour)\n\n4. Estimation de l'évapotranspiration :\n・Calcul de l'ET₀ par la méthode FAO Penman-Monteith\n\nEstimation du bilan hydrique :\nEn intégrant les données d'études hydrologiques, nous estimons le bilan hydrique du bassin versant et saisissons quantitativement « d'où vient l'eau et en quelle quantité, où va-t-elle et en quelle quantité ».\n\nDéfis des études hydrologiques en Afrique :\nDans de nombreuses régions, les enregistrements d'observation des débits sont courts et incomplets, c'est pourquoi l'utilisation de données hydrologiques satellitaires (détection des variations des eaux souterraines par NASA GRACE, estimation des niveaux d'eau des rivières par satellite Sentinel, etc.) s'accroît.","caption3":"","images":[]},{"rowNum":33,"id":"032","catCode":"CAT02","nameJa":"蒸発散","readingJa":"じょうはっさん","summaryJa":"土壌・水面・植物体から水が大気へ蒸発する「蒸発（Evaporation）」と、植物の葉の気孔から水蒸気が放出される「蒸散（Transpiration）」を合わせた概念です。農業水文学の最重要パラメータの一つです。","detailJa":"蒸発散の種類と計算：\n1. 基準蒸発散量（ET₀）：健全な芝生が十分な水分下で消費する蒸発散量の基準値\n　→ Penman-Monteith法（FAO推奨）で気象データから算出\n　→ 単位：mm/日または mm/月\n\n2. 作物蒸発散量（ET_c）：実際の作物が消費する蒸発散量\n　ET_c = ET₀ × Kc（作物係数）\n\n3. 実際蒸発散量（ET_a）：水分ストレス下での実際の蒸発散量（ET_c以下）\n\nアフリカの蒸発散量：\n・熱帯・サバンナ気候帯では年間ET₀が1,500〜2,500mmに達することも（日本は700〜900mm）\n・サヘル地帯では降水量より蒸発散能が大きいため（乾燥気候）、降雨の多くが農業に利用されず蒸発する\n・この「水の浪費」を減らすマルチング（土壌表面被覆）が節水に有効\n\nリモートセンシングによる蒸発散推計：\n衛星データ（MODISやSentinel）からSEBAL・SSEBモデルを用いて広域の蒸発散量を推計する技術が、データが少ないアフリカ農村でも活用されています。","nameEn":"Evapotranspiration","summaryEn":"This is a concept that combines \"Evaporation,\" where water evaporates from soil, water surfaces, and plant bodies into the atmosphere, and \"Transpiration,\" where water vapor is released from the stomata of plant leaves. It is one of the most important parameters in agricultural hydrology.","detailEn":"Types and Calculation of Evapotranspiration:\n1. Reference Evapotranspiration (ET₀): Reference value of evapotranspiration consumed by healthy grass under sufficient moisture conditions\n   → Calculated from meteorological data using the Penman-Monteith method (FAO recommended)\n   → Units: mm/day or mm/month\n\n2. Crop Evapotranspiration (ET_c): Actual evapotranspiration consumed by crops\n   ET_c = ET₀ × Kc (crop coefficient)\n\n3. Actual Evapotranspiration (ET_a): Actual evapotranspiration under water stress conditions (below ET_c)\n\nEvapotranspiration in Africa:\n• In tropical and savanna climate zones, annual ET₀ can reach 1,500-2,500mm (Japan: 700-900mm)\n• In the Sahel region, potential evapotranspiration exceeds precipitation (arid climate), causing much of the rainfall to evaporate rather than being utilized for agriculture\n• Mulching (soil surface covering) is effective for water conservation by reducing this \"water waste\"\n\nEvapotranspiration Estimation by Remote Sensing:\nTechnologies for estimating regional evapotranspiration using SEBAL and SSEB models from satellite data (MODIS and Sentinel) are being utilized even in African rural areas with limited data availability.","image":"","captionJa":"","captionEn":"","published":"","name3":"Évapotranspiration","summary3":"C'est un concept qui combine « l'évaporation » de l'eau du sol, des surfaces d'eau et des corps végétaux vers l'atmosphère, et la « transpiration » qui est l'émission de vapeur d'eau par les stomates des feuilles des plantes. C'est l'un des paramètres les plus importants de l'hydrologie agricole.","detail3":"Types et calcul de l'évapotranspiration :\n1. Évapotranspiration de référence (ET₀) : valeur de référence de l'évapotranspiration consommée par un gazon en bonne santé sous conditions hydriques suffisantes\n　→ Calculée à partir de données météorologiques par la méthode Penman-Monteith (recommandée par la FAO)\n　→ Unité : mm/jour ou mm/mois\n\n2. Évapotranspiration culturale (ET_c) : évapotranspiration consommée par la culture réelle\n　ET_c = ET₀ × Kc (coefficient cultural)\n\n3. Évapotranspiration réelle (ET_a) : évapotranspiration réelle sous stress hydrique (inférieure ou égale à ET_c)\n\nÉvapotranspiration en Afrique :\n・Dans les zones climatiques tropicales et de savane, l'ET₀ annuelle peut atteindre 1 500 à 2 500 mm (700 à 900 mm au Japon)\n・Dans la zone sahélienne, l'évapotranspiration potentielle étant supérieure aux précipitations (climat aride), une grande partie des pluies s'évapore sans être utilisée pour l'agriculture\n・Le paillage (couverture de la surface du sol) est efficace pour économiser l'eau en réduisant ce « gaspillage d'eau »\n\nEstimation de l'évapotranspiration par télédétection :\nLes techniques d'estimation de l'évapotranspiration sur de vastes zones à partir de données satellitaires (MODIS ou Sentinel) utilisant les modèles SEBAL et SSEB sont également exploitées dans les zones rurales africaines où les données sont rares.","caption3":"","images":[]},{"rowNum":34,"id":"033","catCode":"CAT02","nameJa":"栽培管理用水","readingJa":"さいばいかんりようすい","summaryJa":"作物の生育管理のために、主たる灌漑（ET補給）以外の目的で供給される水です。発芽促進・霜害防止・農薬散布・施肥（液肥灌漑）など農業管理作業に伴う用水を含みます。","detailJa":"栽培管理用水の主な用途：\n・発芽用水：播種後の土壌表面を湿らせて均一な発芽を促す\n・霜害防止用水：低温時にスプリンクラーで散水して凍霜害を防ぐ（水の凝固熱を利用）\n・追肥・農薬混合：灌漑水に肥料・農薬を溶かして散布（フェルティゲーション）\n・土壌冷却：高温時の地温低下を目的とした散水\n・収穫後処理：収穫した野菜・果物の洗浄・予冷\n\n日本の農業用水計画での位置づけ：\n農業用水の計画用水量には、この栽培管理用水も含めて計上されます。水稲の場合、間断灌漑の管理や活水（生育回復灌漑）なども含まれます。\n\nアフリカでの適用：\n高温多照の熱帯アフリカでは土壌冷却・蒸発散抑制目的の管理灌漑の需要があります。施設園芸（ビニールハウス）での高付加価値野菜栽培では、液肥灌漑（フェルティゲーション）が品質・収量向上の鍵となっています。","nameEn":"Irrigation water for cultivation management","summaryEn":"This is water supplied for purposes other than primary irrigation (ET replenishment) for crop growth management. It includes water used for agricultural management operations such as germination promotion, frost protection, pesticide application, and fertilization (fertigation).","detailEn":"Main uses of cultivation management water:\n・Germination water: Moistening soil surface after seeding to promote uniform germination\n・Frost protection water: Sprinkler irrigation during low temperatures to prevent frost damage (utilizing latent heat of water solidification)\n・Fertilizer and pesticide mixing: Dissolving fertilizers and pesticides in irrigation water for application (fertigation)\n・Soil cooling: Irrigation aimed at reducing soil temperature during high temperatures\n・Post-harvest treatment: Washing and pre-cooling of harvested vegetables and fruits\n\nPosition in Japan's agricultural water planning:\nThis cultivation management water is included in the planned water volume for agricultural use. For paddy rice, this includes intermittent irrigation management and active water (growth recovery irrigation).\n\nApplication in Africa:\nIn tropical Africa with high temperatures and intense solar radiation, there is demand for management irrigation aimed at soil cooling and evapotranspiration suppression. In protected horticulture (greenhouse cultivation) for high-value vegetable production, liquid fertilizer irrigation (fertigation) is key to improving quality and yield.","image":"","captionJa":"","captionEn":"","published":"","name3":"Eau de gestion culturale","summary3":"Il s'agit de l'eau fournie à des fins autres que l'irrigation principale (compensation de l'évapotranspiration) pour la gestion de la croissance des cultures. Cela inclut l'eau utilisée pour les opérations de gestion agricole telles que la promotion de la germination, la prévention des dommages causés par le gel, l'application de pesticides et la fertilisation (irrigation avec engrais liquides).","detail3":"Principales utilisations de l'eau de gestion culturale :\n・Eau de germination : humidifier la surface du sol après le semis pour favoriser une germination uniforme\n・Eau de protection contre le gel : arrosage par aspersion lors des basses températures pour prévenir les dommages de gel (utilisation de la chaleur de solidification de l'eau)\n・Mélange d'engrais de couverture et de pesticides : dissolution et épandage d'engrais et de pesticides dans l'eau d'irrigation (fertigation)\n・Refroidissement du sol : arrosage visant à réduire la température du sol lors des hautes températures\n・Traitement post-récolte : lavage et pré-refroidissement des légumes et fruits récoltés\n\nPosition dans la planification de l'eau agricole au Japon :\nDans le volume d'eau planifié pour l'usage agricole, cette eau de gestion culturale est également comptabilisée. Pour le riz, cela inclut aussi la gestion de l'irrigation intermittente et l'irrigation active (irrigation de récupération de croissance).\n\nApplication en Afrique :\nDans l'Afrique tropicale à hautes températures et fort ensoleillement, il existe une demande d'irrigation de gestion à des fins de refroidissement du sol et de suppression de l'évapotranspiration. En horticulture sous abri (serres), l'irrigation liquide d'engrais (fertigation) est la clé de l'amélioration de la qualité et du rendement dans la culture de légumes à haute valeur ajoutée.","caption3":"","images":[]},{"rowNum":35,"id":"034","catCode":"CAT02","nameJa":"施設管理用水","readingJa":"しせつかんりようすい","summaryJa":"灌漑施設（水路・ダム・取水施設等）の運営・維持管理のために使用される水を指します。施設の洗浄・試験通水・緊急放流などの目的で必要な水量として計画用水量に算入されます。","detailJa":"施設管理用水の用途：\n・通水テスト：新設・改修後の施設の動作確認\n・フラッシング（洗浄）：水路・管路に堆積した泥・ゴミを流し出す作業\n・ゲート・バルブの試験操作：定期的な動作確認\n・緊急放流：洪水時・緊急時の水路水位調整\n\n施設管理用水の水量：\n灌漑必要水量全体の数%程度（通常1〜5%）を見込んで計上します。量的には小さいですが、適切なフラッシングを怠ると水路の目詰まり・腐食が進行します。\n\n維持管理の重要性（アフリカの文脈）：\nアフリカの多くの灌漑施設で「建設は行われたが維持管理が不十分で施設が劣化」というパターンが繰り返されてきました。施設管理用水の確保を含む運営維持管理計画（O&M Plan）の策定と、その実施のための費用・人員の確保が持続的な灌漑農業の前提条件です。","nameEn":"Facility management water","summaryEn":"This refers to water used for the operation and maintenance of irrigation facilities (waterways, dams, intake facilities, etc.). It is included in the planned water demand as the necessary water volume for purposes such as facility cleaning, test water flow, and emergency discharge.","detailEn":"Uses of facility management water:\n・Commissioning test: Operational verification of facilities after new construction or renovation\n・Flushing: Work to flush out mud and debris accumulated in channels and pipelines\n・Gate and valve test operation: Regular operational verification\n・Emergency discharge: Water level adjustment in channels during floods and emergencies\n\nVolume of facility management water:\nSeveral percent of the total irrigation water requirement (typically 1-5%) is estimated and allocated. Although the quantity is small, neglecting proper flushing leads to channel clogging and corrosion.\n\nImportance of maintenance (African context):\nMany irrigation facilities in Africa have repeated the pattern of \"construction was carried out but facilities deteriorated due to inadequate maintenance.\" The development of an Operation and Maintenance Plan (O&M Plan) including the securing of facility management water, and the securing of costs and personnel for its implementation are prerequisites for sustainable irrigated agriculture.","image":"","captionJa":"","captionEn":"","published":"","name3":"eau de gestion des installations","summary3":"Cela désigne l'eau utilisée pour l'exploitation et la maintenance des installations d'irrigation (canaux, barrages, ouvrages de prise d'eau, etc.). Elle est incluse dans le volume d'eau planifié comme quantité nécessaire aux fins de nettoyage des installations, d'essais de mise en eau et d'évacuation d'urgence.","detail3":"Usages de l'eau de gestion des installations :\n・Test de mise en eau : vérification du fonctionnement des installations après construction neuve ou rénovation\n・Rinçage (nettoyage) : opération d'évacuation de la boue et des détritus accumulés dans les canaux et conduites\n・Test de fonctionnement des vannes et robinets : vérification périodique du fonctionnement\n・Évacuation d'urgence : ajustement du niveau d'eau des canaux en cas d'inondation et de situation d'urgence\n\nVolume d'eau de gestion des installations :\nIl convient de prévoir quelques % de la totalité des besoins en eau d'irrigation (généralement 1 à 5 %). Bien que quantitativement faible, l'absence de rinçage approprié entraîne la progression du colmatage et de la corrosion des canaux.\n\nImportance de la maintenance (contexte africain) :\nDans de nombreuses installations d'irrigation en Afrique, le schéma « construction réalisée mais maintenance insuffisante entraînant la détérioration des installations » s'est répété. L'élaboration d'un plan d'exploitation et de maintenance (Plan O&M) incluant la sécurisation de l'eau de gestion des installations, ainsi que la sécurisation des coûts et du personnel pour sa mise en œuvre, constituent les conditions préalables à une agriculture irriguée durable.","caption3":"","images":[]},{"rowNum":36,"id":"035","catCode":"CAT02","nameJa":"土壌水分","readingJa":"どじょうすいぶん","summaryJa":"土壌の空隙に保持されている水の量を指します。作物の生育は土壌水分量に直接左右され、農業用水管理の中心的な管理対象です。","detailJa":"土壌水分の測定と表現：\n・体積含水率（θv）：単位土壌体積中の水の体積比率（cm³/cm³ または %）\n・質量含水率（θm）：乾燥土壌質量に対する水の質量比率\n・水分張力（マトリックポテンシャル）：土壌が水を保持する力（kPa または hPa）\n\n土壌水分の状態：\n・飽和状態（空隙すべてが水で満たされた状態）\n→ 圃場容水量（FC）：重力排水後の保水上限\n→ 有効水分範囲：FC〜萎凋点（PWP）の間\n→ 永久萎凋点（PWP）：作物が吸水できなくなる下限（約−1500 kPa）\n\n土壌水分の測定器具：\n・テンシオメーター：水分張力を測定、設置が簡単・低コスト\n・TDR（時間領域反射法）センサー：高精度・広範囲測定\n・FDRセンサー（容量式）：低コスト・多点観測に適合\n\n灌漑管理への応用：\n土壌水分センサーをもとにした「土壌水分管理灌漑」は、過剰灌漑と水ストレスの両方を防ぎ、節水・増収を同時に実現します。IoT対応センサーとスマートフォンを組み合わせた低コストシステムが、アフリカの農家にも普及し始めています。","nameEn":"Soil moisture","summaryEn":"This refers to the amount of water retained in soil pores. Crop growth is directly influenced by soil moisture content, making it a central management target in agricultural water management.","detailEn":"Soil Moisture Measurement and Expression:\n・Volumetric water content (θv): Volume ratio of water in unit soil volume (cm³/cm³ or %)\n・Gravimetric water content (θm): Mass ratio of water to dry soil mass\n・Soil water tension (matric potential): Force by which soil holds water (kPa or hPa)\n\nSoil Moisture States:\n・Saturated state (condition where all pores are filled with water)\n→ Field capacity (FC): Upper limit of water retention after gravitational drainage\n→ Available water range: Between FC and wilting point (PWP)\n→ Permanent wilting point (PWP): Lower limit where crops can no longer absorb water (approximately −1500 kPa)\n\nSoil Moisture Measurement Instruments:\n・Tensiometer: Measures soil water tension, easy installation and low cost\n・TDR (Time Domain Reflectometry) sensor: High precision and wide-range measurement\n・FDR sensor (capacitive type): Low cost and suitable for multi-point monitoring\n\nApplication to Irrigation Management:\n\"Soil moisture-based irrigation management\" using soil moisture sensors prevents both over-irrigation and water stress, simultaneously achieving water conservation and yield increase. Low-cost systems combining IoT-compatible sensors with smartphones are beginning to spread among farmers in Africa.","image":"","captionJa":"","captionEn":"","published":"","name3":"Humidité du sol","summary3":"Il s'agit de la quantité d'eau retenue dans les pores du sol. La croissance des cultures dépend directement de la teneur en eau du sol, ce qui en fait l'objet central de la gestion de l'eau agricole.","detail3":"Mesure et expression de l'humidité du sol :\n• Teneur en eau volumique (θv) : rapport volumique de l'eau dans le volume unitaire de sol (cm³/cm³ ou %)\n• Teneur en eau massique (θm) : rapport massique de l'eau par rapport à la masse de sol sec\n• Tension hydrique (potentiel matriciel) : force de rétention de l'eau par le sol (kPa ou hPa)\n\nÉtats de l'humidité du sol :\n• État de saturation (état où tous les pores sont remplis d'eau)\n→ Capacité au champ (CC) : limite supérieure de rétention d'eau après drainage gravitaire\n→ Plage d'eau disponible : entre CC et point de flétrissement permanent (PFP)\n→ Point de flétrissement permanent (PFP) : limite inférieure où les cultures ne peuvent plus absorber l'eau (environ −1500 kPa)\n\nInstruments de mesure de l'humidité du sol :\n• Tensiomètre : mesure la tension hydrique, installation simple et faible coût\n• Capteur TDR (réflectométrie temporelle) : haute précision et mesure sur large gamme\n• Capteur FDR (capacitif) : faible coût et adapté à l'observation multipoint\n\nApplication à la gestion de l'irrigation :\nL'« irrigation par gestion de l'humidité du sol » basée sur les capteurs d'humidité du sol prévient à la fois la sur-irrigation et le stress hydrique, réalisant simultanément économies d'eau et augmentation des rendements. Des systèmes à faible coût combinant capteurs compatibles IoT et smartphones commencent à se répandre chez les agriculteurs africains.","caption3":"","images":[]},{"rowNum":37,"id":"036","catCode":"CAT02","nameJa":"地形調査","readingJa":"ちけいちょうさ","summaryJa":"農地や灌漑施設の設計・計画のために、土地の形状（標高・傾斜・起伏・地物の位置等）を測量・把握する調査です。灌漑設計における重力利用の可否・圃場整形の必要性・排水経路の設計に不可欠です。","detailJa":"地形調査の方法：\n1. 水準測量（レベリング）：標高差の精密測定、圃場の均平度確認\n2. トータルステーション測量：3次元座標の精密取得\n3. GPS/GNSSによる測量：移動しながら広範囲を迅速に測量\n4. ドローン（UAV）測量：空撮と写真測量（SfM）により短時間で高密度の地形データ取得\n5. 衛星DEM（数値標高モデル）：SRTM・ALOS DEMなどの衛星データ（精度は低いが広域をカバー）\n\n地形調査の成果物：\n・地形図（等高線図）：灌漑設計・排水路計画の基図\n・縦横断面図：用水路・排水路の設計に使用\n・土量計算：圃場整形（均平）に必要な切土・盛土量の算定\n\n灌漑設計での活用：\n・重力灌漑が可能かどうか（水源と農地の標高差）の確認\n・用水路・排水路のルートと勾配の設計\n・圃場均平化の必要性と工事量の算定\n\nアフリカでのドローン測量活用：\n近年、低コスト民生用ドローンの普及により、農村部の地形調査コストが大幅に低下。JICAのアフリカ支援プロジェクトでもドローン測量の活用が増えています。","nameEn":"Topographic Survey","summaryEn":"This is a survey to measure and understand the topography of land (elevation, slope, terrain, and positions of features) for the design and planning of agricultural land and irrigation facilities. It is essential for determining the feasibility of gravity utilization in irrigation design, the necessity of field leveling, and the design of drainage routes.","detailEn":"Methods of Topographic Survey:\n1. Level surveying (Leveling): Precise measurement of elevation differences, confirmation of field leveling accuracy\n2. Total station surveying: Precise acquisition of three-dimensional coordinates\n3. GPS/GNSS surveying: Rapid surveying of wide areas while moving\n4. Drone (UAV) surveying: Acquisition of high-density topographic data in short time through aerial photography and photogrammetry (SfM)\n5. Satellite DEM (Digital Elevation Model): Satellite data such as SRTM and ALOS DEM (low accuracy but covers wide areas)\n\nProducts of Topographic Survey:\n・Topographic maps (contour maps): Base maps for irrigation design and drainage channel planning\n・Longitudinal and cross-sectional profiles: Used for design of irrigation and drainage channels\n・Earthwork calculation: Estimation of cut and fill volumes required for field shaping (leveling)\n\nApplication in Irrigation Design:\n・Confirmation of feasibility of gravity irrigation (elevation difference between water source and farmland)\n・Design of routes and gradients for irrigation and drainage channels\n・Assessment of necessity for field leveling and estimation of construction volume\n\nApplication of Drone Surveying in Africa:\nIn recent years, the widespread adoption of low-cost consumer drones has significantly reduced the cost of topographic surveys in rural areas. The use of drone surveying is also increasing in JICA's African support projects.","image":"","captionJa":"","captionEn":"","published":"","name3":"Levé topographique","summary3":"Il s'agit d'une étude de levé topographique visant à mesurer et comprendre la configuration du terrain (altitude, pente, relief, position des éléments topographiques, etc.) pour la conception et la planification des terres agricoles et des installations d'irrigation. Cette étude est indispensable pour déterminer la faisabilité de l'utilisation de la gravité dans la conception de l'irrigation, la nécessité du nivellement des parcelles et la conception des voies de drainage.","detail3":"Méthodes de levé topographique :\n1. Nivellement : mesure précise des différences d'altitude, vérification du nivellement des parcelles\n2. Levé au théodolite électronique (station totale) : acquisition précise de coordonnées tridimensionnelles\n3. Levé par GPS/GNSS : levé rapide de vastes zones en se déplaçant\n4. Levé par drone (UAV) : acquisition de données topographiques haute densité en peu de temps par photographies aériennes et photogrammétrie (SfM)\n5. MNE satellite (Modèle Numérique d'Élévation) : données satellitaires telles que SRTM・ALOS DEM (précision faible mais couverture de vastes zones)\n\nProduits du levé topographique :\n・Carte topographique (carte avec courbes de niveau) : carte de base pour la conception d'irrigation et la planification des canaux de drainage\n・Profils longitudinaux et transversaux : utilisés pour la conception des canaux d'irrigation et de drainage\n・Calcul des volumes de terrassement : estimation des volumes de déblai et de remblai nécessaires au nivellement des parcelles\n\nUtilisation dans la conception d'irrigation :\n・Vérification de la faisabilité de l'irrigation gravitaire (différence d'altitude entre la source d'eau et les terres agricoles)\n・Conception des tracés et des pentes des canaux d'irrigation et de drainage\n・Évaluation de la nécessité du nivellement des parcelles et estimation du volume des travaux\n\nUtilisation du levé par drone en Afrique :\nCes dernières années, la diffusion des drones civils à bas coût a considérablement réduit les coûts des levés topographiques en milieu rural. L'utilisation du levé par drone augmente également dans les projets d'aide à l'Afrique de la JICA.","caption3":"","images":[]},{"rowNum":38,"id":"037","catCode":"CAT02","nameJa":"浅層帯水層","readingJa":"せんそうたいすいそう","summaryJa":"地表から比較的浅い深さ（一般に30m以内）に存在し、人力・小型ポンプで揚水可能な帯水層（地下水を蓄える地層）です。アフリカ農村の小規模灌漑における最も重要な地下水資源です。","detailJa":"浅層帯水層の特徴：\n・主に沖積層（砂・砂礫）や風化岩盤に形成される\n・降水や河川水による涵養が比較的早く、季節変動がある\n・不圧帯水層（Unconfined aquifer）が多く、水位は季節によって変化\n\n農業利用の方法：\n・手掘り井戸：深さ5〜15m程度まで人力で掘削可能\n・掘削井戸（小径ボーリング）：25〜50mmの小径パイプ、人力ドリルや簡易掘削機で設置\n・ペダルポンプ・小型電動ポンプで揚水\n\nアフリカの浅層帯水層の分布：\n・西アフリカの沖積平野・河川デルタ地帯：厚い沖積帯水層が広く分布\n・東アフリカの沿岸低地：浅い砂礫帯水層\n・サヘル地帯：乾燥期でも帯水層が維持される地域では小規模灌漑が可能\n\n管理上の課題：\n・涵養速度を超えた揚水による地下水位低下（オーバードラフト）\n・農業排水・トイレ・廃棄物による微生物・化学汚染\n・塩分侵入（沿岸地域では海水浸入も問題）\n\nJICA等の支援での活用：\nマリ・ブルキナファソなどでJICAが浅層地下水を活用した小規模灌漑開発を支援し、乾季野菜生産の拡大に貢献しています。","nameEn":"Shallow aquifer","summaryEn":"It is an aquifer (geological formation that stores groundwater) that exists at a relatively shallow depth from the ground surface (generally within 30m) and can be pumped by manual labor or small pumps. It is the most important groundwater resource for small-scale irrigation in rural Africa.","detailEn":"Characteristics of Shallow Aquifers:\n・Mainly formed in alluvial layers (sand and sand gravel) or weathered bedrock\n・Relatively rapid recharge from precipitation and river water, with seasonal variations\n・Mostly unconfined aquifers, with water levels that change seasonally\n\nMethods of Agricultural Utilization:\n・Hand-dug wells: Can be excavated manually to depths of approximately 5-15m\n・Drilled wells (small-diameter boring): 25-50mm small-diameter pipes, installed using manual drills or simple drilling equipment\n・Water lifting using pedal pumps and small electric pumps\n\nDistribution of Shallow Aquifers in Africa:\n・West African alluvial plains and river delta regions: Thick alluvial aquifers are widely distributed\n・East African coastal lowlands: Shallow sand and gravel aquifers\n・Sahel region: Small-scale irrigation is possible in areas where aquifers are maintained even during dry seasons\n\nManagement Challenges:\n・Groundwater level decline (overdraft) due to pumping exceeding recharge rates\n・Microbial and chemical contamination from agricultural drainage, toilets, and waste\n・Saltwater intrusion (seawater intrusion is also problematic in coastal areas)\n\nUtilization in JICA and Other Support Programs:\nJICA has supported small-scale irrigation development utilizing shallow groundwater in Mali, Burkina Faso, and other countries, contributing to the expansion of dry season vegetable production.","image":"","captionJa":"","captionEn":"","published":"","name3":"Aquifère superficiel","summary3":"Il s'agit d'une couche aquifère (formation géologique stockant les eaux souterraines) située à une profondeur relativement faible par rapport à la surface du sol (généralement moins de 30 m) et dont l'eau peut être extraite par la force humaine ou des pompes de petite taille. C'est la ressource en eaux souterraines la plus importante pour l'irrigation à petite échelle dans les zones rurales africaines.","detail3":"Caractéristiques des aquifères superficiels :\n• Principalement formés dans les formations alluviales (sable, sable et gravier) et les roches altérées\n• Recharge relativement rapide par les précipitations et les eaux fluviales, avec des variations saisonnières\n• Nombreux aquifères libres (Unconfined aquifer), dont le niveau varie selon les saisons\n\nMéthodes d'utilisation agricole :\n• Puits creusés à la main : excavation manuelle possible jusqu'à une profondeur d'environ 5 à 15 m\n• Puits forés (forage de petit diamètre) : tuyaux de petit diamètre de 25 à 50 mm, installation avec perceuses manuelles ou équipements de forage simples\n• Pompage avec pompes à pédale et petites pompes électriques\n\nRépartition des aquifères superficiels en Afrique :\n• Plaines alluviales et deltas fluviaux de l'Afrique de l'Ouest : distribution étendue d'aquifères alluviaux épais\n• Basses terres côtières de l'Afrique de l'Est : aquifères sablo-graveleux peu profonds\n• Zone sahélienne : irrigation à petite échelle possible dans les régions où les aquifères sont maintenus même pendant la saison sèche\n\nDéfis de gestion :\n• Baisse du niveau des eaux souterraines (overdraft) due au pompage dépassant la vitesse de recharge\n• Contamination microbienne et chimique par les eaux de drainage agricole, les toilettes et les déchets\n• Intrusion saline (intrusion d'eau de mer également problématique dans les régions côtières)\n\nUtilisation dans le cadre du soutien de la JICA et autres :\nLa JICA soutient le développement de l'irrigation à petite échelle utilisant les eaux souterraines superficielles au Mali, au Burkina Faso et ailleurs, contribuant à l'expansion de la production maraîchère en saison sèche.","caption3":"","images":[]},{"rowNum":39,"id":"038","catCode":"CAT02","nameJa":"地下水位","readingJa":"ちかすいい","summaryJa":"不圧帯水層（自由面帯水層）において、土壌空隙が水で飽和されている部分の上限面（地下水面）の地表からの深さ（または標高）を指します。農業用地下水の利用可能性と排水性の評価に重要な指標です。","detailJa":"地下水位の測定と監視：\n・測定方法：観測井（モニタリングウェル）への測水器投入、または自動記録水位計（ダイバー）\n・観測頻度：月1回以上が基本、重要地域では自動連続記録\n\n地下水位と農業の関係：\n・地下水位が高すぎる（地表近く）：根域が嫌気性状態になり根腐れ・収量低下。排水改善が必要\n・地下水位が適度（0.5〜2.0m）：毛管作用で作物根域に水を補給できる\n・地下水位が低すぎる：ポンプ揚程が大きくなりエネルギーコスト増加。過剰揚水のサイン\n\n地下水位の季節変動：\n・雨季：降水による涵養で地下水位が上昇\n・乾季：蒸発散・揚水により低下\n・複数年の変動トレンドを監視することで、オーバードラフトを早期発見できる\n\nアフリカでの地下水位モニタリング：\n多くのアフリカ農村では観測井網が整備されておらず、地下水資源の管理が「見えないまま」行われています。安価な自動水位記録計と携帯電話ネットワークを活用した遠隔モニタリングシステムの普及が課題です。","nameEn":"Groundwater level","summaryEn":"This refers to the depth from the ground surface (or elevation) of the upper boundary (water table) of the zone where soil pores are saturated with water in an unconfined aquifer (phreatic aquifer). It is an important indicator for evaluating the availability and drainage of agricultural groundwater.","detailEn":"Groundwater Level Measurement and Monitoring:\n・Measurement methods: Water level meter deployment in observation wells (monitoring wells), or automatic water level loggers (divers)\n・Observation frequency: At least once per month as standard, with automatic continuous recording in critical areas\n\nRelationship between Groundwater Level and Agricu

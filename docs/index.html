d'enregistrements","caption3":"","images":[]},{"rowNum":143,"id":"142","catCode":"CAT03","nameJa":"流域土砂管理","readingJa":"りゅういきどしゃかんり","summaryJa":"流域内での土壌侵食・土砂移動・土砂堆積を総合的に把握・制御し、灌漑施設の機能維持と農地生産性の持続を図る取り組みの総称です。個別施設の堆砂対策にとどまらず、侵食の発生源となる上流域の土地利用・植生管理から、河道・施設内の土砂堆積対策までを一体的に計画・実施します。アフリカでは人口増加による過耕作・過放牧・森林伐採が土壌侵食を加速させており、流域全体を視野に入れた総合的な土砂管理が灌漑開発の持続性に直結する重要課題となっています。","detailJa":"1. 土砂管理の基本的な考え方\n土砂は「発生（侵食）→ 移動（運搬）→ 堆積」という一連のプロセスをたどります。流域土砂管理はこの各段階に介入することで、下流の灌漑施設への土砂流入を抑制します。\n\n【上流域】侵食抑制　→　【河道】土砂捕捉　→　【施設】堆積対策・排砂\n　植林・農法改善　　　　砂防堰堤・沈砂池　　　排砂ゲート・浚渫\n\n 2. 流域上流域での対策（侵食抑制）\n・ 植林、草地造成：裸地、劣化地への植生回復により雨滴侵食、表面流出を抑制。根系による土壌固定効果も大きい\n・ 等高線耕作（Contour Farming）：傾斜地の農地を等高線に沿って耕作し、表面流出速度を低下させる\n・ テラス農法（Terracing）：斜面を段状に整形して流出経路を分断。エチオピア高原・東アフリカ高地で広く普及\n・ グラスウォーターウェイ：集中流下する箇所に草で覆われた排水路を設け、ガリー侵食を防止\n・ アグロフォレストリー：農地内に樹木を組み合わせることで被覆率を高め、侵食を抑制しながら農業生産も維持  \n\n 3. 河道・中流域での対策（土砂捕捉）\n・ 砂防堰堤（Check Dam）：河道を横断する小規模な堰で土砂を捕捉。連続して設置することで河床勾配を緩め侵食を抑制。石積み・コンクリート・ガビオン（じゃかご）など多様な材料で建設\n・ 沈砂池（Silt Trap / Settling Basin）：取水施設の上流や水路途中に設ける静水域。流速を落として土砂を沈殿・捕捉させる。定期的な浚渫が必要\n・ ガビオン工（Gabion Work）：金属網に石を詰めた構造物で河岸侵食を防止。柔軟性があり不等沈下に強く、アフリカの農村部で広く採用\n\n 4. 施設内での対策（排砂・浚渫）\n・ 排砂ゲート（Flushing Gate）：貯水池底部のゲートを開放して土砂を強制排出。堆積が進む前に定期的に実施\n・ 排砂バイパス（Sediment Bypass Tunnel）：出水時の高濃度土砂流を貯水池を迂回させて下流へ流すトンネル。大規模施設向け\n・ 浚渫（Dredging）：機械または人力で堆積土砂を除去。小規模施設では農家参加による人力浚渫が現実的\n\n5. モニタリングと評価\n・ 堆砂測量（Bathymetric Survey）：貯水池・沈砂池の堆積状況を定期測量し、堆砂速度と残余容量を把握\n・ 流砂量観測：河川の浮遊砂、掃流砂の観測により流域からの土砂流出量を定量化\n・ 衛星・UAV活用：近年は衛星画像やドローン（UAV）による流域の侵食状況モニタリングが普及しつつある\n\n6. アフリカにおける課題\n・ 侵食の深刻さ：エチオピア、マダガスカル、サヘル地帯では世界的に見ても土壌侵食が最も激しい地域に属し、年間数センチの表土が失われる地域もある\n・ 土地利用圧力：人口増加、過放牧、薪炭材採取による植生破壊が侵食を加速させており、技術対策だけでなく社会・経済的アプローチが不可欠\n・ 流域ガバナンス：上流の侵食対策の便益が下流の灌漑農家に及ぶため、流域全体での利害調整と費用負担の仕組みづくりが課題\n・ データ不足：流砂観測網が脆弱で、設計・評価に必要な土砂流出データが不足している\n\n7. 留意点\n流域土砂管理は単独の技術対策では効果が限定的であり、上流域の農家・牧畜民・行政・灌漑受益者が連携した流域一体型の参加型管理が持続的な効果発現の鍵となります。また、対策の効果発現には数年～数十年の長期を要するため、継続的なモニタリングと柔軟な計画修正が重要です。","nameEn":"Watershed sediment management","summaryEn":"This is a comprehensive term for efforts to holistically understand and control soil erosion, sediment transport, and sediment deposition within a watershed to maintain the functionality of irrigation facilities and ensure sustainable agricultural land productivity. Rather than limiting measures to sedimentation control for individual facilities, it involves integrated planning and implementation from land use and vegetation management in upstream areas that serve as sources of erosion to sediment deposition countermeasures in river channels and facilities. In Africa, overcultivation, overgrazing, and deforestation due to population growth have accelerated soil erosion, making comprehensive sediment management with a watershed-wide perspective a critical issue directly linked to the sustainability of irrigation development.","detailEn":"1. Basic Concepts of Sediment Management\nSediment follows a series of processes: \"generation (erosion) → transport → deposition.\" Watershed sediment management intervenes at each stage to suppress sediment inflow into downstream irrigation facilities.\n\n【Upstream Area】Erosion Control → 【River Channel】Sediment Capture → 【Facilities】Deposition Countermeasures・Sediment Discharge\nAfforestation・Agricultural Improvement    Check Dams・Silt Traps    Flushing Gates・Dredging\n\n2. Countermeasures in Upstream Watershed Areas (Erosion Control)\n・ Afforestation and grassland development: Vegetation recovery on bare and degraded land suppresses raindrop erosion and surface runoff. Root systems also provide significant soil stabilization effects\n・ Contour Farming: Cultivating agricultural land on slopes along contour lines to reduce surface runoff velocity\n・ Terracing: Forming slopes into stepped terraces to interrupt runoff pathways. Widely adopted in the Ethiopian Plateau and East African highlands\n・ Grass Waterways: Installing grass-covered drainage channels at concentrated flow areas to prevent gully erosion\n・ Agroforestry: Combining trees within agricultural land to increase coverage rate, suppressing erosion while maintaining agricultural production\n\n3. Countermeasures in River Channels and Midstream Areas (Sediment Capture)\n・ Check Dams: Small-scale weirs across river channels to capture sediment. When installed consecutively, they moderate riverbed gradient and suppress erosion. Built with various materials including stone masonry, concrete, and gabions\n・ Silt Traps/Settling Basins: Still water areas installed upstream of intake facilities or along waterways. Reduce flow velocity to settle and capture sediment. Require periodic dredging\n・ Gabion Work: Structures made of stone-filled wire mesh to prevent riverbank erosion. Flexible and resistant to differential settlement, widely adopted in rural Africa\n\n4. Countermeasures within Facilities (Sediment Discharge・Dredging)\n・ Flushing Gates: Opening gates at the bottom of reservoirs to forcibly discharge sediment. Implemented periodically before significant deposition occurs\n・ Sediment Bypass Tunnels: Tunnels that divert high-concentration sediment flows around reservoirs to downstream during floods. Suitable for large-scale facilities\n・ Dredging: Mechanical or manual removal of deposited sediment. Manual dredging with farmer participation is practical for small-scale facilities\n\n5. Monitoring and Evaluation\n・ Bathymetric Survey: Regular surveying of deposition conditions in reservoirs and silt traps to determine sedimentation rates and remaining capacity\n・ Sediment Load Observation: Quantifying sediment outflow from watersheds through observation of suspended sediment and bedload in rivers\n・ Satellite and UAV Utilization: Satellite imagery and drone (UAV) monitoring of watershed erosion conditions is becoming increasingly widespread\n\n6. Challenges in Africa\n・ Severity of erosion: Ethiopia, Madagascar, and the Sahel region are among the world's most severely soil-eroded areas, with some regions losing several centimeters of topsoil annually\n・ Land use pressure: Population growth, overgrazing, and vegetation destruction from fuelwood collection accelerate erosion, making social and economic approaches essential beyond technical countermeasures\n・ Watershed governance: Since benefits of upstream erosion control extend to downstream irrigation farmers, establishing mechanisms for interest coordination and cost-sharing across entire watersheds remains a challenge\n・ Data shortage: Sediment observation networks are weak, with insufficient sediment discharge data needed for design and evaluation\n\n7. Important Considerations\nWatershed sediment management has limited effectiveness with single technical countermeasures alone. Integrated participatory management involving upstream farmers, pastoralists, administrators, and irrigation beneficiaries is key to sustainable effectiveness. Since countermeasure effects require long periods of several years to decades to manifest, continuous monitoring and flexible plan modifications are crucial.","image":"","captionJa":"","captionEn":"","published":"","name3":"Gestion des sédiments du bassin versant","summary3":"Il s'agit de l'appellation générale des initiatives visant à comprendre et contrôler de manière intégrée l'érosion des sols, le transport et la sédimentation dans un bassin versant, afin de maintenir le fonctionnement des installations d'irrigation et d'assurer la durabilité de la productivité agricole. Au-delà des simples mesures de lutte contre l'envasement des installations individuelles, ces initiatives planifient et mettent en œuvre de manière intégrée tout un ensemble d'actions, depuis la gestion de l'utilisation des terres et de la végétation dans les zones amont qui constituent la source d'érosion, jusqu'aux mesures contre la sédimentation dans les cours d'eau et les installations. En Afrique, la surexploitation agricole, le surpâturage et la déforestation dus à la croissance démographique accélèrent l'érosion des sols, et la gestion intégrée des sédiments à l'échelle du bassin versant constitue un enjeu majeur directement lié à la durabilité du développement de l'irrigation.","detail3":"1. Conception de base de la gestion des sédiments\nLes sédiments suivent un processus continu : « génération (érosion) → transport → sédimentation ». La gestion des sédiments de bassin versant intervient à chaque étape pour supprimer l'apport de sédiments vers les installations d'irrigation en aval.\n\n【Bassin amont】Suppression de l'érosion → 【Lit du cours d'eau】Capture des sédiments → 【Installations】Mesures contre la sédimentation・Évacuation des sédiments\nReboisement・Amélioration des méthodes agricoles　　Barrages de correction torrentielle・Bassins de décantation　　Vannes de chasse・Dragage\n\n2. Mesures dans le bassin amont (suppression de l'érosion)\n• Reboisement, création de prairies : Restauration de la végétation sur les sols nus et dégradés pour supprimer l'érosion par les gouttes de pluie et le ruissellement de surface. L'effet de fixation du sol par le système racinaire est également important\n• Culture en courbes de niveau (Contour Farming) : Cultiver les terres agricoles en pente le long des courbes de niveau pour réduire la vitesse du ruissellement de surface\n• Agriculture en terrasses (Terracing) : Aménagement des pentes en gradins pour interrompre les voies d'écoulement. Largement répandu sur le plateau éthiopien et les hautes terres d'Afrique de l'Est\n• Voies d'eau enherbées : Installation de canaux de drainage couverts d'herbe dans les zones de ruissellement concentré pour prévenir l'érosion en ravines\n• Agroforesterie : Intégration d'arbres dans les terres agricoles pour augmenter le taux de couverture et supprimer l'érosion tout en maintenant la production agricole\n\n3. Mesures dans le lit du cours d'eau et le bassin moyen (capture des sédiments)\n• Barrages de correction (Check Dam) : Petits barrages transversaux au cours d'eau pour capturer les sédiments. L'installation en série permet d'adoucir la pente du lit et de supprimer l'érosion. Construction avec divers matériaux : pierre maçonnée, béton, gabions\n• Bassins de décantation (Silt Trap / Settling Basin) : Zones d'eau calme aménagées en amont des installations de prise d'eau ou en cours de canal. Réduction de la vitesse d'écoulement pour faire sédimenter et capturer les sédiments. Dragage périodique nécessaire\n• Ouvrages en gabions (Gabion Work) : Structures constituées de grillages métalliques remplis de pierres pour prévenir l'érosion des berges. Flexibles et résistants aux tassements différentiels, largement adoptés dans les zones rurales africaines\n\n4. Mesures à l'intérieur des installations (évacuation des sédiments・dragage)\n• Vannes de chasse (Flushing Gate) : Ouverture des vannes au fond du réservoir pour évacuer les sédiments par force. Mise en œuvre périodique avant progression de la sédimentation\n• Tunnel de dérivation des sédiments (Sediment Bypass Tunnel) : Tunnel pour dévier les écoulements de sédiments à haute concentration lors des crues, contournant le réservoir vers l'aval. Pour les installations à grande échelle\n• Dragage (Dredging) : Élimination mécanique ou manuelle des sédiments accumulés. Pour les petites installations, le dragage manuel avec participation des agriculteurs est réaliste\n\n5. Surveillance et évaluation\n• Levé bathyméétrique (Bathymetric Survey) : Levé périodique de l'état de sédimentation des réservoirs et bassins de décantation pour s","caption3":"","images":[]},{"rowNum":144,"id":"143","catCode":"CAT04","nameJa":"設計洪水量","readingJa":"せっけいこうずいりょう","summaryJa":"灌漑施設（取水堰・排水路・水路橋・ため池余水吐など）の設計において、施設が安全に機能するための基準となる洪水流量です。過去の水文データや統計的手法により算定され、施設の規模・重要度に応じた再現期間（例：10年・50年・100年確率）をもとに設定します。過小評価すると施設の破壊・流失につながり、過大評価すると建設コストが不必要に増大します。","detailJa":"1. 設計洪水量の算定方法\n・ 合理式（Rational Method）：流域面積・降雨強度・流出係数から洪水ピーク流量を算定。小規模流域（数km²以下）に適用される最も簡便な方法\n・単位図法（Unit Hydrograph Method）：標準的な降雨に対する流出応答パターン（単位図）を用いてハイドログラフ（流量の時間変化）を推定。中規模流域に適用\n・ 統計的頻度解析（Frequency Analysis）：過去の流量観測記録に確率分布を当てはめ、再現期間ごとの洪水流量を推定。観測記録が十分にある流域で有効\n\n2. 再現期間と施設種別\n末端水路・農道橋　　10～25年\n支線・幹線水路　　25～50年\n取水堰・頭首工　　50～100年\nため池余水吐　　100～200年（または最大可能洪水）\n\n3. 現場調査の方法\n・ 流量観測：流速計・超音波流量計による実測。観測期間が長いほど精度が向上\n・ 痕跡調査：洪水痕跡（水位跡・堆積物）から過去の最大洪水を推定。観測記録がない流域で有効\n・ 流域特性調査：地形図・衛星画像から流域面積・河道勾配・植生被覆を把握\n\n4. ア フリカにおける課題\n・ 観測データの不足：流量観測所が少なく、記録期間も短いため統計解析の精度が低下しやすい\n・ 気候変動の影響：降雨パターンの変化により過去データに基づく推定値が実態と乖離するリスクが高まっている\n・ 乾燥地の間欠河川：普段は水が流れない枯れ川（ワジ・ドライリバー）が降雨時に突発的な鉄砲水（フラッシュフラッド）を発生させる。流量の変動幅が極めて大きく設計洪水量の設定が難しい\n\n5. 留意点\n観測データが不足する場合は、近隣流域のデータ転用（地域化手法）や衛星降雨データ（GPM・TRMMなど）の活用が有効です。また、施設完成後も定期的な洪水観測を継続し、設計洪水量の妥当性を検証することが重要です。","nameEn":"Design flood discharge","summaryEn":"This is the flood discharge that serves as the standard for ensuring the safe functioning of irrigation facilities (intake weirs, drainage channels, aqueducts, reservoir spillways, etc.) in their design. It is calculated using past hydrological data and statistical methods, and is established based on return periods (e.g., 10-year, 50-year, 100-year probability) corresponding to the scale and importance of the facilities. Underestimation leads to facility destruction and loss, while overestimation results in unnecessary increases in construction costs.","detailEn":"1. Methods for Calculating Design Flood Discharge\n・ Rational Method: Calculates flood peak discharge from catchment area, rainfall intensity, and runoff coefficient. The simplest method applied to small-scale watersheds (several km² or less)\n・ Unit Hydrograph Method: Estimates hydrograph (temporal variation of discharge) using runoff response patterns (unit hydrograph) for standard rainfall. Applied to medium-scale watersheds\n・ Statistical Frequency Analysis: Estimates flood discharge for each return period by fitting probability distributions to past discharge observation records. Effective for watersheds with sufficient observation records\n\n2. Return Periods and Facility Types\nTerminal channels and farm road bridges: 10-25 years\nBranch and main channels: 25-50 years\nIntake weirs and headworks: 50-100 years\nPond spillways: 100-200 years (or Probable Maximum Flood)\n\n3. Field Survey Methods\n・ Discharge observation: Direct measurement using current meters and ultrasonic flow meters. Accuracy improves with longer observation periods\n・ Trace investigation: Estimates past maximum floods from flood traces (water level marks and deposits). Effective for watersheds without observation records\n・ Watershed characteristic survey: Identifies watershed area, channel gradient, and vegetation cover from topographic maps and satellite images\n\n4. Challenges in Africa\n・ Lack of observation data: Few discharge observation stations and short record periods tend to reduce the accuracy of statistical analysis\n・ Impact of climate change: Changes in rainfall patterns increase the risk of estimates based on past data deviating from actual conditions\n・ Intermittent rivers in arid regions: Normally dry riverbeds (wadis/dry rivers) that generate sudden flash floods during rainfall events. Extremely large discharge variation ranges make it difficult to set design flood discharge\n\n5. Considerations\nWhen observation data is insufficient, utilizing data from neighboring watersheds (regionalization methods) and satellite rainfall data (GPM, TRMM, etc.) is effective. Additionally, it is important to continue regular flood observations after facility completion to verify the validity of design flood discharge.","image":"","captionJa":"","captionEn":"","published":"","name3":"Débit de crue de projet","summary3":"Il s'agit du débit de crue de référence pour la conception des ouvrages d'irrigation (barrages de prise d'eau, canaux de drainage, ponts-canaux, déversoirs d'étangs de retenue, etc.) afin que ces installations fonctionnent en toute sécurité. Ce débit est calculé à partir de données hydrologiques historiques et de méthodes statistiques, et est établi en fonction de la période de retour (par exemple : probabilité décennale, cinquantennale, centennale) correspondant à l'échelle et à l'importance de l'ouvrage. Une sous-estimation peut entraîner la destruction ou l'emportement des installations, tandis qu'une surestimation provoque une augmentation inutile des coûts de construction.","detail3":"1. Méthodes de calcul du débit de crue de projet\n・ Méthode rationnelle (Rational Method) : calcul du débit de pointe de crue à partir de la superficie du bassin versant, de l'intensité pluviométrique et du coefficient d'écoulement. Méthode la plus simple appliquée aux petits bassins versants (quelques km² ou moins)\n・ Méthode de l'hydrogramme unitaire (Unit Hydrograph Method) : estimation de l'hydrogramme (variation temporelle du débit) en utilisant le modèle de réponse d'écoulement (hydrogramme unitaire) pour une précipitation standard. Appliquée aux bassins versants de taille moyenne\n・ Analyse statistique des fréquences (Frequency Analysis) : estimation des débits de crue par période de retour en ajustant une distribution de probabilité aux données d'observation de débit passées. Efficace pour les bassins versants disposant d'enregistrements d'observation suffisants\n\n2. Période de retour et types d'ouvrages\nCanaux terminaux et ponts de chemins agricoles : 10 à 25 ans\nCanaux d'embranchement et canaux principaux : 25 à 50 ans\nBarrages de prise d'eau et ouvrages de tête : 50 à 100 ans\nDéversoirs d'étangs : 100 à 200 ans (ou crue maximale possible)\n\n3. Méthodes d'investigation sur le terrain\n・ Observation des débits : mesure directe par débitmètre et débitmètre ultrasonique. La précision s'améliore avec l'allongement de la période d'observation\n・ Investigation des traces : estimation des crues maximales passées à partir des traces de crue (traces de niveau d'eau, dépôts sédimentaires). Efficace pour les bassins versants sans données d'observation\n・ Investigation des caractéristiques du bassin versant : compréhension de la superficie du bassin versant, de la pente du lit et de la couverture végétale à partir de cartes topographiques et d'images satellites\n\n4. Défis en Afrique\n・ Insuffisance des données d'observation : la faible densité de stations d'observation de débit et les courtes périodes d'enregistrement tendent à réduire la précision des analyses statistiques\n・ Impact du changement climatique : les modifications des modèles pluviométriques augmentent le risque de divergence entre les valeurs estimées basées sur les données passées et la réalité\n・ Cours d'eau intermittents des zones arides : les lits de rivières asséchés (oueds, rivières sèches) qui ne coulent pas habituellement génèrent des crues éclair (flash floods) soudaines lors des précipitations. L'amplitude de variation des débits est extrêmement importante, rendant difficile la définition du débit de crue de projet\n\n5. Points d'attention\nEn cas d'insuffisance de données d'observation, l'utilisation de données de bassins voisins (méthodes de régionalisation) ou l'exploitation de données pluviométriques satellitaires (GPM, TRMM, etc.) sont efficaces. Il est également important de poursuivre régulièrement l'observation des crues après achèvement des ouvrages et de vérifier la validité du débit de crue de projet.","caption3":"","images":[]},{"rowNum":145,"id":"144","catCode":"CAT02","nameJa":"水は誰のもの","readingJa":"みずはだれのもの","summaryJa":"水は、空から降り、大地に染み込み、川を流れ、海へと戻る。その循環の中で、人は水を飲み、田畑を潤し、命をつなぐ。\n「この水は誰のものか」そう問われれば、多くの人は戸惑うだろう。水の所有をめぐる問いは、単なる法律の話ではなく、人と人との関係、権力と市民との関係、今を生きる世代と未来の世代との関係を問う、根本的な問いである。身の回りの水を所有の観点から考察することで、水を共に使う者たちの間に対話の共通基盤を築くことを目的とする問いかけの言葉である。","detailJa":"正解は無い。水の量、季節性、生活習慣、宗教的概念がその背景にある。ある地域では水は神の所有物であり、別の地域では部族の財産であり、さらに別の地域では国家が管理する公共資源である。\n水は地球環境を循環しており、耕地で利用されるのみならず、人体をも巡っている。上流の農家が使った水は下流の村へ流れ、海へ至る。水に境界を引くことは、自然の摂理に反する行為でもある。水を支配することは古今東西、権力者の統治手段であり、利用者にとっては生死に直結する問題でもある。水の権利をどう定めるかは、社会の公正さそのものを映す鏡となる。水は誰も作り出せない地球の共通資源である。それを「所有」できるのか、この問いへの答えを、世界各地の社会はそれぞれの歴史と知恵の中で模索してきた。\n日本では水の所有を認めず、河川法で期限付きの使用権を設定している。1964年の新河川法を経て公権的な性格が強い制度となり、水は皆のものとの基本がある。\nヨーロッパはローマ法を起源とする「公共のもの」としての伝統が強く、たとえ水源を民間資本が取得しても、水を自由に支配することはできない。水の利用には常に公共の利益が優先される。\nアメリカは地域差が大きく、東部は土地隣接者が利用できる「沿岸権」、乾燥した西部は「先着順」の先占権が主流だ。コロラド川流域のように需要が供給を上回り、州をまたぐ法的争いが絶えない地域も生まれている。\n中国では土地も水も国家管理だが、北部の慢性的な水不足、地下水汚染など、制度と現実の間には大きな乖離がある。\nアジアの多くの国は植民地時代の法制度を受け継ぎ、独立後に許可制度へ移行した。一方、農村・山岳地帯の先住民社会では、水は共同体・集落・一族が共有するという慣習的水利用が今も息づいている。\nアフリカは植民地の遺産と慣習法が交差する。英語圏・フランス語圏ともに独立後は国家管理へ移行したが、制度が現実に追いつかない地域も多い。また、ナイル川をめぐるエジプトとエチオピアの緊張が示すように、「水は誰のもの」という問いは国家間の安全保障問題でもある。","nameEn":"Who Does Water Belong To?","summaryEn":"Water falls from the sky, seeps into the earth, flows through rivers, and returns to the sea. Within this cycle, people drink water, irrigate fields and paddies, and sustain life.\n\nWhen asked \"Who does this water belong to?\" many people would be perplexed. The question of water ownership is not merely a legal matter, but a fundamental inquiry that examines relationships between people, the relationship between power and citizens, and the relationship between current and future generations. By examining the water around us from the perspective of ownership, this is a provocative question aimed at establishing a common foundation for dialogue among those who share water resources.","detailEn":"There is no correct answer. The quantity of water, seasonality, lifestyle, and religious concepts form the background. In some regions, water is God's property; in others, it is tribal property; and in still other regions, it is a public resource managed by the state.\n\nWater circulates through the Earth's environment, not only being used in agricultural fields but also flowing through the human body. Water used by upstream farmers flows to downstream villages and reaches the sea. Drawing boundaries around water is also an act that goes against the natural order. Controlling water has been a means of governance for rulers throughout history and across cultures, and for users, it is a matter of life and death. How water rights are defined becomes a mirror reflecting the very fairness of society. Water is a common resource of the Earth that no one can create. Whether it can be \"owned\" is a question that societies around the world have been exploring within their respective histories and wisdom.\n\nIn Japan, water ownership is not recognized, and the River Act establishes time-limited usage rights. Through the New River Act of 1964, it became a system with strong public authority characteristics, based on the principle that water belongs to everyone.\n\nEurope has a strong tradition of water as \"public property\" originating from Roman law, and even if private capital acquires water sources, it cannot freely control the water. Public interest always takes priority in water usage.\n\nThe United States shows significant regional differences, with the eastern part following \"riparian rights\" where land adjacent owners can use water, while the arid western part mainly follows \"first come, first served\" prior appropriation rights. Regions like the Colorado River basin, where demand exceeds supply, have created areas of constant interstate legal disputes.\n\nIn China, both land and water are under state management, but there is a large gap between the system and reality, including chronic water shortages in the north and groundwater contamination.\n\nMany Asian countries inherited colonial legal systems and transitioned to permit systems after independence. Meanwhile, in indigenous societies in rural and mountainous areas, customary water usage practices still thrive, where water is shared by communities, settlements, and clans.\n\nAfrica represents an intersection of colonial legacy and customary law. Both English-speaking and French-speaking countries transitioned to state management after independence, but many regions have systems that cannot keep up with reality. Additionally, as demonstrated by the tensions between Egypt and Ethiopia over the Nile River, the question of \"whose water is it\" is also a security issue between nations.","image":"","captionJa":"","captionEn":"","published":"","name3":"L'eau appartient à qui","summary3":"L'eau tombe du ciel, s'infiltre dans la terre, coule dans les rivières et retourne à la mer. Dans ce cycle, l'homme boit l'eau, irrigue les champs et rizières, et maintient la vie.\n\n« À qui appartient cette eau ? » Face à cette question, beaucoup de personnes seraient perplexes. La question de la propriété de l'eau n'est pas simplement une affaire juridique, mais une interrogation fondamentale qui questionne les relations entre les hommes, les relations entre le pouvoir et les citoyens, les relations entre la génération présente et les générations futures. Il s'agit d'une interrogation qui vise à établir une base commune de dialogue entre ceux qui partagent l'usage de l'eau, en considérant l'eau qui nous entoure sous l'angle de la propriété.","detail3":"Il n'y a pas de bonne réponse. La quantité d'eau, la saisonnalité, les modes de vie et les concepts religieux constituent l'arrière-plan de cette question. Dans certaines régions, l'eau appartient à Dieu, dans d'autres, elle est la propriété de la tribu, et dans d'autres encore, elle constitue une ressource publique gérée par l'État.\n\nL'eau circule dans l'environnement terrestre, elle n'est pas seulement utilisée sur les terres cultivées, mais circule aussi dans le corps humain. L'eau utilisée par les agriculteurs en amont s'écoule vers les villages en aval et atteint la mer. Tracer des frontières dans l'eau est aussi un acte qui va à l'encontre des lois de la nature. Le contrôle de l'eau a toujours été, en tous temps et en tous lieux, un moyen de gouvernement pour les détenteurs du pouvoir, et pour les utilisateurs, c'est aussi une question de vie ou de mort. La façon de définir les droits sur l'eau devient un miroir qui reflète l'équité même de la société. L'eau est une ressource commune de la Terre que personne ne peut créer. Peut-on la « posséder » ? Les sociétés du monde entier ont chacune cherché une réponse à cette question dans leur histoire et leur sagesse respectives.\n\nLe Japon ne reconnaît pas la propriété de l'eau et établit des droits d'usage à durée limitée par la loi sur les cours d'eau. Après la nouvelle loi sur les cours d'eau de 1964, le système a acquis un caractère fortement public, avec le principe fondamental que l'eau appartient à tous.\n\nL'Europe a une forte tradition de « chose publique » issue du droit romain, et même si des capitaux privés acquièrent des sources d'eau, ils ne peuvent pas contrôler librement l'eau. L'intérêt public a toujours la priorité dans l'utilisation de l'eau.\n\nAux États-Unis, les différences régionales sont importantes : à l'Est prédominent les « droits riverains » permettant aux propriétaires de terres adjacentes d'utiliser l'eau, tandis que dans l'Ouest aride, ce sont les droits de priorité « premier arrivé, premier servi » qui dominent. Des régions comme le bassin du fleuve Colorado, où la demande dépasse l'offre, voient naître des conflits juridiques constants entre États.\n\nEn Chine, les terres et l'eau sont sous gestion étatique, mais il existe un grand écart entre le système et la réalité, avec la pénurie chronique d'eau au Nord et la pollution des eaux souterraines.\n\nDe nombreux pays d'Asie ont hérité des systèmes juridiques de l'époque coloniale et sont passés à des systèmes de permis après l'indépendance. D'autre part, dans les sociétés indigènes des zones rurales et montagneuses, l'usage coutumier de l'eau comme bien partagé par la communauté, le village ou le clan perdure encore aujourd'hui.\n\nL'Afrique voit s'entrecroiser l'héritage colonial et le droit coutumier. Tant dans les pays anglophones que francophones, la transition vers la gestion étatique s'est faite après l'indépendance, mais dans de nombreuses régions, les institutions ne parviennent pas à rattraper la réalité. De plus, comme le montrent les tensions entre l'Égypte et l'Éthiopie autour du Nil, la question « à qui appartient l'eau » est aussi un problème de sécurité nationale entre États.","caption3":"","images":[]}];
const CATEGORIES = [{"rowNum":2,"code":"CAT01","nameJa":"灌漑技術","reading":"かんがいぎじゅつ","nameEn":"Irrigation Technology","order":1,"name3":"Techniques d'irrigation"},{"rowNum":3,"code":"CAT02","nameJa":"水資源利用","reading":"みずしげんりよう","nameEn":"Water Resource Utilization","order":2,"name3":"Utilisation des ressources en eau"},{"rowNum":4,"code":"CAT03","nameJa":"管理","reading":"かんり","nameEn":"Management","order":3,"name3":"Gestion"},{"rowNum":5,"code":"CAT04","nameJa":"設備","reading":"せつび","nameEn":"Equipment","order":4,"name3":"équipements"},{"rowNum":6,"code":"CAT05","nameJa":"営農","reading":"えいのう","nameEn":"Agricultural management","order":5,"name3":"agriculture"},{"rowNum":7,"code":"CAT06","nameJa":"環境","reading":"かんきょう","nameEn":"Environment","order":6,"name3":"environnement"},{"rowNum":8,"code":"CAT07","nameJa":"政策制度","reading":"せいさくせいど","nameEn":"Policy System","order":7,"name3":"Système de politiques"},{"rowNum":9,"code":"CAT08","nameJa":"計画評価","reading":"けいかくひょうか","nameEn":"Plan Evaluation","order":8,"name3":"Évaluation du plan"},{"rowNum":10,"code":"CAT09","nameJa":"社会的経済","reading":"しゃかいてきけいざい","nameEn":"Socioeconomics","order":9,"name3":"Économie sociale"},{"rowNum":11,"code":"CAT10","nameJa":"","reading":"","nameEn":"","order":10,"name3":""}];
const CAT_MAP = {};
CATEGORIES.forEach(c => { CAT_MAP[c.code] = c; });

let currentLang = 'ja';
let currentCat = 'all';
let openTermId = null;      // t.id of the currently open term (persists across renders)
let openDetailOpen = false; // whether detail panel is also open (persists across renders)
let _termIdByItemId = {};   // itemId → t.id, rebuilt each renderTerms

function setLang(lang, btn) {
  // Case 3: Same language clicked while something is open → close and reset to list
  if (lang === currentLang && openTermId !== null) {
    openTermId = null;
    openDetailOpen = false;
    renderCatFilter();
    renderTerms();
    return;
  }
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const si = document.getElementById('search-input');
  si.placeholder = lang === 'ja' ? 'キーワードで検索...' : 'Search...';
  renderCatFilter();
  renderTerms();
}

function catName(cat) {
  if (!cat) return '';
  if (currentLang === 'lang3') return cat.name3 || cat.nameEn || cat.nameJa;
  if (currentLang === 'en') return cat.nameEn || cat.nameJa;
  return cat.nameJa;
}
function termName(t) {
  if (currentLang === 'lang3') return t.name3 || t.nameEn || t.nameJa;
  if (currentLang === 'en') return t.nameEn || t.nameJa;
  return t.nameJa;
}
function termSummary(t) {
  if (currentLang === 'lang3') return t.summary3 || t.summaryEn || t.summaryJa;
  if (currentLang === 'en') return t.summaryEn || t.summaryJa;
  return t.summaryJa;
}
function termDetail(t) {
  if (currentLang === 'lang3') return t.detail3 || t.detailEn || t.detailJa;
  if (currentLang === 'en') return t.detailEn || t.detailJa;
  return t.detailJa;
}
function termCaption(t) {
  if (currentLang === 'lang3') return t.caption3 || t.captionEn || t.captionJa;
  if (currentLang === 'en') return t.captionEn || t.captionJa;
  return t.captionJa;
}

function kanaToRomaji(str) {
  if (!str) return '';
  const pairs = [
    ['きゃ','kya'],['きゅ','kyu'],['きょ','kyo'],
    ['しゃ','sha'],['しゅ','shu'],['しょ','sho'],
    ['ちゃ','cha'],['ちゅ','chu'],['ちょ','cho'],
    ['にゃ','nya'],['にゅ','nyu'],['にょ','nyo'],
    ['ひゃ','hya'],['ひゅ','hyu'],['ひょ','hyo'],
    ['みゃ','mya'],['みゅ','myu'],['みょ','myo'],
    ['りゃ','rya'],['りゅ','ryu'],['りょ','ryo'],
    ['ぎゃ','gya'],['ぎゅ','gyu'],['ぎょ','gyo'],
    ['じゃ','ja'],['じゅ','ju'],['じょ','jo'],
    ['あ','a'],['い','i'],['う','u'],['え','e'],['お','o'],
    ['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko'],
    ['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so'],
    ['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to'],
    ['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no'],
    ['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho'],
    ['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo'],
    ['や','ya'],['ゆ','yu'],['よ','yo'],
    ['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro'],
    ['わ','wa'],['を','wo'],['ん','n'],
    ['が','ga'],['ぎ','gi'],['ぐ','gu'],['げ','ge'],['ご','go'],
    ['ざ','za'],['じ','ji'],['ず','zu'],['ぜ','ze'],['ぞ','zo'],
    ['だ','da'],['ぢ','di'],['づ','du'],['で','de'],['ど','do'],
    ['ば','ba'],['び','bi'],['ぶ','bu'],['べ','be'],['ぼ','bo'],
    ['ぱ','pa'],['ぴ','pi'],['ぷ','pu'],['ぺ','pe'],['ぽ','po'],
    ['ぁ','a'],['ぃ','i'],['ぅ','u'],['ぇ','e'],['ぉ','o'],
    ['ー','-'],
  ];
  let result = '';
  let i = 0;
  while (i < str.length) {
    if (str[i] === 'っ') {
      const rest = str.slice(i + 1);
      let nextRomaji = '';
      for (const [k, v] of pairs) {
        if (rest.startsWith(k)) { nextRomaji = v; break; }
      }
      result += nextRomaji ? nextRomaji[0] : 't';
      i++;
      continue;
    }
    let matched = false;
    for (const [k, v] of pairs) {
      if (str.startsWith(k, i)) {
        result += v;
        i += k.length;
        matched = true;
        break;
      }
    }
    if (!matched) { result += str[i]; i++; }
  }
  return result;
}

function sortTerms(arr) {
  return [...arr].sort((a, b) => {
    if (currentLang === 'ja') {
      const ra = a.readingJa || termName(a), rb = b.readingJa || termName(b);
      return ra.localeCompare(rb, 'ja');
    }
    return termName(a).localeCompare(termName(b));
  });
}

function renderCatFilter() {
  const btnAll = document.getElementById('btn-all');
  if (btnAll) btnAll.classList.toggle('active', currentCat === 'all');
  const sel = document.getElementById('categorySelect');
  if (sel) {
    const placeholder = currentLang === 'ja' ? '分野を選ぶ' : 'Choose category';
    let html = '<option value="">' + placeholder + '</option>';
    CATEGORIES.forEach(function(c) {
      html += '<option value="' + esc2(c.code) + '"' + (currentCat === c.code ? ' selected' : '') + '>' + esc2(catName(c)) + '</option>';
    });
    sel.innerHTML = html;
    console.log('ドロップダウン選択肢数:', sel.options.length);
  }
}

function setCat(code) {
  currentCat = code;
  openTermId = null;
  openDetailOpen = false;
  renderCatFilter();
  renderTerms();
}

function setCatFromSelect(sel) {
  setCat(sel.value || 'all');
}

function renderTerms() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = TERMS.filter(t => {
    if (currentCat !== 'all' && t.catCode !== currentCat) return false;
    if (!q) return true;
    return (termName(t) + termSummary(t) + (t.readingJa || '') + (t.name3 || '') + (t.nameEn || '')).toLowerCase().includes(q);
  });
  const sorted = sortTerms(filtered);
  const wrap = document.getElementById('term-list-wrap');
  const countEl = document.getElementById('result-count');

  const labels = { ja: '件の用語', en: ' term(s)', lang3: ' term(s)' };
  countEl.textContent = sorted.length + (labels[currentLang] || '件');

  if (sorted.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="icon">🔍</div><div>${currentLang === 'ja' ? '該当する用語が見つかりません' : 'No terms found'}</div></div>`;
    return;
  }

  const detailLabel = currentLang === 'ja' ? '詳細を見る' : 'Show details';
  const detailCloseLabel = currentLang === 'ja' ? '閉じる' : 'Close';

  _termIdByItemId = {};
  const items = sorted.map((t, i) => {
    const itemId = 'item-' + i;
    _termIdByItemId[itemId] = t.id;
    const name = esc2(termName(t));
    const romajiHtml = (currentLang === 'ja' && t.readingJa) ? `<span class="term-romaji">${esc2(kanaToRomaji(t.readingJa))}</span>` : '';
    const summary = esc2(termSummary(t));
    const detail = termDetail(t);
    const caption = termCaption(t);

    let detailHtml = '';
    const hasImages = t.images && t.images.length > 0;
    if (detail || hasImages || t.image) {
      const detailText = detail ? '<div class="term-detail-text">' + esc2(detail) + '</div>' : '';
      const cap = esc2(caption);
      let imgHtml = '';
      if (hasImages) {
        const imgTitle = currentLang === 'ja' ? '図・写真' : 'Figures and Photos';
        imgHtml = '<div class="term-images-section"><div class="term-images-title">' + esc2(imgTitle) + '</div>';
        t.images.forEach(function(img) {
          imgHtml += '<div class="term-image-item"><img class="term-detail-image" src="' + img.dataUrl + '" alt="' + cap + '">';
          if (cap) imgHtml += '<div class="term-detail-caption">' + cap + '</div>';
          imgHtml += '</div>';
        });
        imgHtml += '</div>';
      } else if (t.image) {
        imgHtml = '<div class="term-image-item"><img class="term-detail-image" src="images/' + esc2(t.image) + '" alt="' + cap + '" loading="lazy">';
        if (cap) imgHtml += '<div class="term-detail-caption">' + cap + '</div>';
        imgHtml += '</div>';
      }
      detailHtml = `
        <button class="detail-toggle" id="dtbtn-${itemId}" onclick="toggleDetail('${itemId}')">
          <span id="dtlabel-${itemId}">${detailLabel}</span>
          <span class="detail-arrow">▼</span>
        </button>
        <div class="term-detail-panel" id="detail-${itemId}">
          ${detailText}
          ${imgHtml}
        </div>`;
    }

    return `<div class="term-item" id="${itemId}">
      <button class="term-toggle" id="toggle-${itemId}" onclick="toggleSummary('${itemId}')">
        <span class="term-toggle-text">${name}${romajiHtml}</span>
        <span class="term-arrow">▼</span>
      </button>
      <div class="term-summary-panel" id="summary-${itemId}">
        <div class="term-summary-text">${summary}</div>
        ${detailHtml}
      </div>
    </div>`;
  });

  wrap.innerHTML = `<div class="term-list">${items.join('')}</div>`;

  // Restore open state after re-render (e.g. after language switch)
  if (openTermId !== null) {
    const restoredItemId = Object.keys(_termIdByItemId).find(k => _termIdByItemId[k] === openTermId);
    if (restoredItemId) {
      _applyOpenState(restoredItemId);
    } else {
      openTermId = null;
      openDetailOpen = false;
    }
  }
}

function _applyOpenState(itemId) {
  const toggleBtn = document.getElementById('toggle-' + itemId);
  const summaryPanel = document.getElementById('summary-' + itemId);
  if (!toggleBtn || !summaryPanel) return;
  toggleBtn.classList.add('open');
  summaryPanel.classList.add('open');
  if (openDetailOpen) {
    const btn = document.getElementById('dtbtn-' + itemId);
    const panel = document.getElementById('detail-' + itemId);
    const labelEl = document.getElementById('dtlabel-' + itemId);
    const closeLabel = currentLang === 'ja' ? '閉じる' : 'Close';
    if (btn && panel) {
      btn.classList.add('open');
      panel.classList.add('open');
      if (labelEl) labelEl.textContent = closeLabel;
    }
  }
  const el = document.getElementById(itemId);
  if (el) el.scrollIntoView({ behavior: 'instant', block: 'center' });
}

function toggleSummary(itemId) {
  const toggleBtn = document.getElementById('toggle-' + itemId);
  const summaryPanel = document.getElementById('summary-' + itemId);

  // Close previously open summary (and its detail) if a different term
  if (openTermId !== null && _termIdByItemId[itemId] !== openTermId) {
    const prevItemId = Object.keys(_termIdByItemId).find(k => _termIdByItemId[k] === openTermId);
    if (prevItemId) {
      const prevToggle = document.getElementById('toggle-' + prevItemId);
      const prevPanel = document.getElementById('summary-' + prevItemId);
      if (prevToggle) prevToggle.classList.remove('open');
      if (prevPanel) prevPanel.classList.remove('open');
      if (openDetailOpen) {
        const prevDetailBtn = document.getElementById('dtbtn-' + prevItemId);
        const prevDetail = document.getElementById('detail-' + prevItemId);
        if (prevDetailBtn) prevDetailBtn.classList.remove('open');
        if (prevDetail) prevDetail.classList.remove('open');
      }
    }
    openDetailOpen = false;
  }

  const isOpen = summaryPanel.classList.toggle('open');
  toggleBtn.classList.toggle('open', isOpen);
  openTermId = isOpen ? _termIdByItemId[itemId] : null;

  // If closing summary, also close detail
  if (!isOpen && openDetailOpen) {
    const detailBtn = document.getElementById('dtbtn-' + itemId);
    const detailPanel = document.getElementById('detail-' + itemId);
    if (detailBtn) detailBtn.classList.remove('open');
    if (detailPanel) detailPanel.classList.remove('open');
    openDetailOpen = false;
  }

  if (isOpen) {
    setTimeout(() => toggleBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 10);
  }
}

function toggleDetail(itemId) {
  const btn = document.getElementById('dtbtn-' + itemId);
  const panel = document.getElementById('detail-' + itemId);
  const labelEl = document.getElementById('dtlabel-' + itemId);
  const detailLabel = currentLang === 'ja' ? '詳細を見る' : 'Show details';
  const detailCloseLabel = currentLang === 'ja' ? '閉じる' : 'Close';

  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  if (labelEl) labelEl.textContent = isOpen ? detailCloseLabel : detailLabel;
  openDetailOpen = isOpen;
}

function esc2(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

console.log('分類データ:', CATEGORIES);
renderCatFilter();
renderTerms();
</script>
